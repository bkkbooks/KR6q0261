body:
  text: 雲峰悅禪師初住翠巗語録室中舉古師一日謂侍者曰汝問訊了一邊立地是什麼道理答云不會師云過這邊立侍者便過師云無端無端舉僧問雪峰如何是佛峰云寐語作什麼師云古人與麼道喚作應病與藥放過即不可若不放過你這裏下得什麼語僧擬議師以拂子驀口打舉法燈禪師初開堂日示衆云山僧本欲跧棲巗竇隨衆過時又緣清涼老人有不了底公案今日出來為他分析時有僧問如何是不了底公案燈便打云祖禰不了殃及兒孫僧云過在什麼處燈云過在我殃及你師云這漢一期與奪也似光前絶後及乎拶著又却龍頭蛇尾如今莫有為清涼作主底麼舉教中道法身流轉於五道是故衆生現時法身不現乃竪起拂子云這箇是拂子那箇是法身又云這箇是法身那箇是拂子會麼法身吞却拂子拂子吞却法身於此若不會十月仲陽春舉黃檗一日問百丈云從上相承底事和尚如何指示於人百丈據坐檗云後代兒孫將何傳受百丈云我將謂你是箇人便歸方丈師云憐兒不覺醜然雖如是盡法無民舉玄沙和尚一日見長生乃作一圓相生云一切人出此不得沙云情知你向鬼窟裏作活計生云某甲只恁麼和尚作麼生沙云一切人出此不得生云某甲適來與麼道為什麼不得和尚便道得沙云我道得你道不得師云道得道不得總在玄沙圈繢裏如今還有出得底麼舉僧問趙州學人乍入叢林乞師指示趙州云你喫粥了也未僧云喫粥了也州云洗鉢盂去其僧大悟後雲門拈云且道有指示無指示若道有指示向伊道什麼若道無指示其僧因什麼悟去師云雲門不識好惡恁麼說話大似為蛇畫足與黃門栽鬚翠巗則不然這僧與麼悟去入地獄如箭射舉雪峰示衆云盡乾坤大地撮來如一粒粟米大拋向面前漆桶不會打鼓普請看師云雖然匹上不足翠巗更與葛藤拈拄杖云還見雪峰麼舉黃檗在南泉會裏為首座一日捧鉢盂向南泉位上坐南泉入堂見乃問長老什麼年中行道檗云威音王已前泉云猶是王老師兒孫在下去檗便過第二位坐泉便休師云從來叢林極有商量或有道須知黃檗有陷虎之機又道須知南泉有殺虎之威若據與麼說話誠實苦哉殊不知這般老賊有年無德一箇喫飯坐處也不依本分若在翠巖門下說什麼威音王已前王老師更大直須喫棒了趂出舉雲門大師示衆云佛法也大有只是舌頭短師云雲門大師與麼道也是秦州來僧云和尚作麼生師便打舉祖師道泡幻同無礙云何不了悟達法在其中非今亦非古師驀拈拄杖云三世諸佛六代祖師天下衲僧鼻孔總在這裏又打香臺一下云南贍部洲北鬱單越舉汾州和尚示衆云識得拄杖子行腳事畢師拈起拄杖云這箇豈不是拄杖子阿那箇是你行腳事復云楖𣗖橫擔不顧人直入千峰萬峰去舉古者道有物先天地無形本寂寥能為萬象主不逐四時凋且道是什麼物又云水長船高舉古者道過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法師云停囚長智養病喪軀驀拈拄杖云什麼處去也舉古者道禪非意想道絶功勳汝等諸人作麼生參舉祖師道如來一切法為度一切心我無一切心何用一切法還信得及麼若信得及止宿草庵且居門外若信不及長連床上有粥有飯舉肇法師道智有窮幽之鑒而無知焉神有應會之用而無慮焉古人與麼道也大殺費力爭如諸上座寒即圍爐向火熱即竹林溪畔坐然雖如是我且問你畢竟事作麼生舉祖師道吾本來茲土傳法救迷情你道這漢還自救得也未又道一花開五葉結果自然成一人傳虗萬人傳實舉古者道剃髮著袈裟宜應行聖道自餘間雜事俱為生死因師云你等諸人橫檐拄杖撥草瞻風繞天下行腳且道還曾踏著田地也無僧無對師云虗生浪死漢舉瑞巖空寂禪師尋常方丈內自召主人公自云喏又云惺惺著師云鬼窟裏作活計却問傍僧云你還識瑞巗老漢麼僧無對師云蒼天蒼天舉教中云有智若聞則能信解無智疑悔則為永失師云釋迦老子壓良為賤你還甘麼若甘去行腳眼在什麼處若不甘轉身一句作麼生道舉智門和尚道何物苦求而不得何物不求而自來何物鐵椎打不破何物晝合而夜開若人會得山僧意琉璃殿上長青苔師云會麼穿破你髑髏拶破你鼻孔師一日僧侍立次師忽召云某甲僧應諾師云過去諸佛也與麼未來諸佛也與麼僧云和尚又作麼生師便打復云來來僧近前師云我早是無端入屎坑裏是你屎臰氣也不知舉盤山和尚道似地擎山不知山之孤峻如石含玉不知玉之無瑕師云這老漢生來莽鹵學處顢頇似地擎山如石含玉什麼處得這消息來舉教中道此見及緣元是菩提妙淨明體祖師亦云六塵不惡還同正覺師云會麼直饒你向這裏參見祖師了更買草鞋行腳三千里外也被翠巗換却眼睛了也還有不甘底麼舉睦州見僧來云見成公案放你三十棒師云作賊人心虗舉古者道虗堂閴寂夏修持閉戶踈人怪亦知儂家自有同風事千里無來却肯伊師云說什麼千里無來直得萬里無來鼻孔也在翠巖手裏僧云和尚只見錐頭利不見鑿頭方師呵呵大笑云道什麼僧擬議師以拄杖趂出舉盤山道心若無事萬法不生師云會麼僧云不會師云賴遇你不會山僧拾得口喫飯舉睦州示衆云放開也在我捏聚也在我師云負入不負出舉古人道山河石壁不礙眼光師云作麼生是眼又拈起拄杖打禪床一下云須彌山百雜碎即不問你且道娑竭羅龍王年多少舉舍利弗問須菩提夢中說般若波羅蜜與覺時是同是別師遂喝云當時若下這一喝免見落三落四須菩提云此義幽深吾不能說此會有彌勒大士當往問之師云果然舍利弗遂回首問彌勒彌勒云誰名彌勒誰是彌勒者師云什麼處去也舉五泄初參石頭才到門便問一言相契即住一言不契即去石頭據坐五泄拂袖便行石頭遂召闍黎闍黎五泄回首石頭云從生至死只是這箇回頭轉腦作什麼五泄因而有省師云石頭老坐不定把不住似這般擔板漢教去便休又喚回頭來却被他塗糊一上道我向這裏有箇悟處驢年未夢見在舉古德云擬將心意學玄宗狀似西行却向東徒經纍劫終難會會得還歸六道中僧云某甲不會師云苦瓠連根苦甜瓜徹蒂甜舉木平參洛浦問一漚未發時如何浦云移舟諳水脉舉棹別波瀾木平不契後參盤龍亦如前問龍云移舟不別水舉棹即迷源木平於是大省師云這漢當初於洛浦言下悟去猶較些子却向盤龍死水裏淹殺後來有人問如何是木平答云不勞斤斧師云果然只在這裏諸禪德大凡發足超方也須甄別邪正識辨真僞帶些眼筋始得然雖如是賊過後張弓舉趙州問南泉知有底人向什麼處去泉云山下作一頭水牯牛去州云謝和尚指示泉云昨夜三更月到窗師云若不是南泉洎乎打破蔡州舉法眼示衆云識得凳子周匝有餘雲門云識得凳子天地懸殊師云官不容針私通車馬舉僧問葉縣省和尚諸餘即不問如何是當今施設省云有你這驢漢問僧云恁麼則打鼓弄琵琶去也省云捺胃放屁聲師云然則倚勢欺人爭奈事不孤起葉縣失却一隻眼還有點檢得出麼若也點檢得出翠巗分坐與你若檢點不出橫按鏌鎁全正令太平寰宇斬癡頑舉祖師示衆云吾有一物非青黃赤白男女等相汝等諸人還識麼師云當時忽有箇漢出來為衆竭力不惜身命便與掀倒禪床喝散大衆子孫也未到斷絶却有沙彌出來道某甲識祖云你既識喚作什麼云是諸佛之本源神會之佛性祖便打云吾喚作一物尚不中你更喚做本源佛性此子已後設有把茅蓋頭只成得箇知解宗徒師便喝云祖禰不了殃及兒孫如今還有不甘底麼舉僧問汾州如何是接初機句州云你是行腳僧如何是驗衲僧句州云西方日出卯如何是正令行底句州云千里馳來呈舊面如何是定乾坤底句州云北俱盧洲長粳米飯食者無貪亦無嗔州云將此四轉語驗天下衲僧師云將此四轉語被天下衲僧勘破舉保壽開堂三聖為請主才升座聖推出一僧保壽便打聖云似恁麼為人瞎却鎮州一城人眼去在壽擲下拄杖便歸方丈師云臨濟一宗掃地而盡因什麼到這裏驀拈起拄杖云什麼處去也舉興化一日與同光帝坐次帝云朕收下中原獲得一寶只是無人酬價興化云略借陛下寶看帝以兩手舒開幞頭腳化云君王之寶誰敢酬價師云會麼真不掩僞曲不藏直有眼者辨取舉睦州問僧什麼處來僧云那邊劄州云老僧屈僧云和尚即得州云擔枷過狀劈脊便打師云睦州何用繁詞那邊劄劈脊便打舉先地藏問修山主甚處來主云南方來藏云南方近日佛法如何主云商量浩浩地藏云爭如我這裏插田博飯喫師云會麼插田博飯喫言中誰辨的午後打齊鐘金剛曾失色舉睦州示衆云裂開也在我捏聚也在我時有僧問如何是裂開州云三九二十七菩提涅槃真如解脫即心即佛我且恁麼道你又作麼生僧云某甲不恁麼道州云盞子落地楪子成七片師云會麼相罵饒你接嘴相唾饒你潑水舉雪竇示衆云要知真實相為但以上無攀仰下絶己躬自然常光現前箇箇壁立千仞師云雪竇與麼為人入地獄如箭舉五通仙人問佛佛有六通我有五通如何是那一通佛召仙人仙人應喏佛云那一通你問我師云大小瞿曇被這外道勘破了也有傍不肯的出來我要問你如何是那一通舉古人道牽牛向水東不免官中徭役牽牛向水西不免官中徭役不如隨分納些子師云說什麼納些子盡乾坤大地色空明暗情與無情總在翠巖這裏放行則隨緣有地把住則逃竄無門且道放行好把住好舉僧參南院才入方丈以手指云敗也院乃拈起拄杖度與僧僧才接院便打師云這僧雖然頂上有光爭奈腳下似漆直饒十字縱橫朝打三千暮打八百舉古人道無邊剎境自他不隔於毫端十世古今始終不離於當念師云手擎日月背負須彌即不問你新羅國裏一句作麼生道舉古人道閙市裏識取天子百草頭上薦取老僧雲門道蝦䗫入你鼻孔裏毒蛇穿你眼睛中且向葛藤處會取師云雲門大師恁麼道大似和泥脫墼若無後語疑殺天下人翠巖今日因行不妨掉臂乃竪起拂子云還見雲門麼舉世尊一日於涅槃會上人天普集以手摩胸告大衆云汝等善當觀我紫磨黃金身瞻仰令足莫令後悔若言吾滅非吾弟子若言吾不滅亦非吾弟子于時百千萬衆一時悟道師云然則膏肓之門不足以發藥翠巖且作死馬醫你等諸人皮下還有血麼舉南泉一日問黃檗定慧等學明見佛性此理如何檗云十二時中不依倚一物始得泉云莫是長老見處云不敢泉云漿水錢且致草鞋錢教什麼人還檗便休師云若不同床臥焉知被裡穿舉古者道露裸裸赤灑灑四維無遮障上下沒可把師云朝游羅浮暮歸檀特即不問你腳跟下一句作麼生道舉龐居士問馬祖不昧本來人請師高著眼祖直上士云一等無弦琴唯師彈得妙祖直下覷士禮拜祖便歸方丈士隨後云今日弄巧成拙師云且道賓家弄巧成拙主家弄巧成拙還有人揀得出麼若揀得出三十棒一棒也較不得若揀不出來年更有新條在惱亂春風卒未休舉教中云有諍則生死無諍則涅槃師云直得風行草偃響順聲和不求諸聖不重己靈無纖芥可留猶是爭諍法且作麼生是無諍底法舉古者道三世諸佛不知有師云如蟲蝕木狸奴白牯却知有師云雪上加霜舉德山問龍潭久嚮龍潭及乎到來潭又不見龍又不現潭云子親到龍潭山便休師云你識龍潭老麼僧擬議師以拂子驀口打僧入室舉僧問趙州萬法歸一一歸何所師便喝僧茫然師却問趙州道什麼僧擬議師以拂子驀口打舉僧問智門祚和尚如何是佛門云踏破草鞋赤腳走如何是佛向上事門云拄杖頭上挑日月師乃問僧會麼僧云不會師乃以頌示之鞋穿赤腳走衲僧休大口日月杖頭挑面南看北斗僧便禮拜出師云來來僧乃回頭師云莫教撞著露柱舉溈山祐和尚方丈頌云溈山方丈峭峻難上若人踏著氣如樊將師云作家宗師天然有在僧云和尚作麼生師有頌示之翠巗方丈曾無遮障衲子入來便見和尚僧便禮拜起師云還見翠巗這箇老漢麼僧擬議師以拂子驀口摵舉僧問香林如何是衲衣下事林云臘月火燒山師乃問僧會麼僧云不會師云你為什麼謾老僧其僧良久云某甲也有箇會處師云香林亦須喫棒小參舉先百丈因歲暮示衆云你一隊後生經律論固是不知也入衆參禪禪又不會臘月三十日且作麼生折合去師云灼然諸禪德去聖時遙人心淡薄看却今之叢林更是不得也所在之處或聚徒三百五百浩浩地只以飯食豐濃寮舍穩便為旺化也中間孜孜為道者無一人設有十箇五箇走上走下半青半黃會即總道我會各各自謂握靈蛇之寶孰肯知非洎乎挨拶鞭逼將來直是萬中無一苦哉苦哉所謂般若叢林歲歲凋無明荒草年年長就中今時後生才入衆來便自端然拱手受他別人供養到處菜不擇一莖柴不般一束十指不霑水百事不干懷雖則一朝快意爭奈三塗纍身豈不見教中道寧以熱鐵纏身不受信心人衣寧以洋銅灌口不受信心人食上座若是去直饒變大地作黃金攪長河為酥酪供養上座也未為分外若也未是至於滴水寸絲便須披毛戴角牽梨拽杷償他始得不見祖師道入道不通理復身還信施此是決定底事終不虗也諸上座光陰可惜時不待人莫待一朝眼光落地菑田無一簣之功鐵圍陷百刑之痛莫言不道珍重偈頌原居二首挂錫西原上玄走苦問津千峰消積雪萬木自回春谷暖泉聲遠林幽鳥語新翻思遺隻履深笑洛陽人挂錫西原上誰同振此風卷簾千嶂日坐石一枝笻雪嶺書無說衡陽信不通回觀清景外雲鳥自憧憧三印一印印泥賢愚共知裂轉鼻孔頂上金槌一印印水徒張脣嘴未涉流沙洪濤競起一印印空明月清風爍迦羅眼齊後之鐘春日閒居四首林下春時節融融萬物新眷茲和煦力孰不謂通津林下春時節幽居境倍清曉雲分嶽色流水帶鶯聲林下春時節遲遲日漸暄不知歌有道泉石自相便林下春時節誰同狎此心野花開不盡巗檜冷森森布袋和尚五首散誕不拘儀軌終日拖泥帶水茫茫竟未知歸教伊從誰雪恥困來抱囊無語傍觀盡生疑慮未免開獻諸人是甚間家破具貧道本無遮護舉目知君罔措可憐二月三月是處蜂狂蝶舞莫訝衣裳破碎入廛且無忌諱橫身要道等人那箇便知圈繢日暮愛游貧里豈是圖他小利分明報你諸人臘水氷霜滿地和泥合水五首余有一道千聖不到北走南奔相頭買帽是何之道雲橫碧嶠余有一辨風生嶽面舉目千差知君不薦是何之辨僧堂佛殿余有一說善知時節若人會得眼裏添榍是何之說春寒秋熱余有一劒寒光若練虎嘯風生飛霞走電是何之劒灰頭土面余有一機聖凡共知拈却鼻孔舉起須彌是何之機淵明皺眉示學者三首赫日光中誰不了底事堂堂入荒草擔簦負笈苦勞心從門入者非家寶演宗乘提祖教千年枯骨何堪咬南北東西歸去來拈得鼻孔失却口經不看禪不會終日擁爐長瞌睡五湖禪子競頭來眨上眉毛三門外翠巗不會禪仰面看青天打破大唐國笑殺老南泉因雪示衆二首雪雪片片交飛無暫歇萬里江山一樣平要津把斷底時節文殊印普賢訣杲日當空還漏泄無言童子念摩訶憍梵鉢提長吐舌宗本義宗本才彰義已賒徒將心識話周遮漁人夜唱歸煙島樵父春行踏落花六相義成壞總別同異帝網交參六義拈起大地山河透出過現未世文殊夢裏揚眉普賢空中彈指三十年後自看且恁和泥合水頌古十二首灌水不滿巵運雪不填井吁哉碧眼人迢迢涉葱嶺絶粒既無功負舂寧有省一花五葉開猿嘯諸峰頂入門何必辨來機潦倒禪和不自知柏樹庭前剛指注翻令平地下針錐抱拙少林已九年趙州忽長庭前柏可憐無限守株人寥寥坐對千峰色平常心是道舉步入荒草翻嗟王老師到底不能曉玉兔金烏任飛走桃花見後謂無疑壯志由來本是伊若問玄沙言未徹現前贓物自家知趙州有語喫茶去明眼衲僧皆賺舉不賺舉未相許堪笑禾山解打鼓杖林山下竹筋鞭頭尾拈來總一般莫怪玄沙不出嶺他家元是釣魚船言中辨的老禪和驀直臺山路不蹉勘破却回人莫問嶽陽船子洞庭波踏著稱槌硬似鐵𥋾禪和猶未瞥三冬嶺上火雲生六月長天降大雪杜禪和杜禪和一箇糊餅無奈何禮拜任君頭著地海東船子過新羅洞山有語麻三斤衲子擎拳要問津因憶舊年看草字張顛顛後更無人休問藏身北斗撩他露柱煩惱𨁝跳撞入燈籠穿却湖南長老因僧舉泐潭頌乃有頌示之北斗藏身事不孤韶陽猶是喪殘軀而今澤國垂綸者猶把腥膻誑懵夫留僧侍余函丈二三秋日損由來道未酬何事解衣輕取別鉢囊猶挂樹梢頭數珠落落循環在手茫茫未知出跳雖然本自圓成爭奈其中一竅放行怛薩舒光把住毗沙匿耀有時捉向手中貴與衲僧取笑南峰師子山狀奪西河類雄雄鎮北峰爪牙終不露狐兔自潛蹤雲門上庵草堂危構若耶西九夏幽居景物奇簾卷亂峰初雨後白雲流水自相隨送化士二首化門舒卷豈同時出塞還須斬萬機道泰却旋林下日卷簾間看嶽雲歸送文禪者禪人別我訪南宗吳楚山川去幾重莫謂臨岐無可贈萬年松在祀融峰送寧首座一語通諸密開權涉化門當機如有路北斗坐南坤送就維那振錫歸韶石重來欵竹扉無言宣祖意溢目太陽輝送華禪者一字不出頭十字不挑腳可惜少林人端坐無斟酌孰云錯金錫高擎返故鄉清風浩浩生寥廓送聰山主故國曾不住他鄉無暫留肩橫一枝錫何處問蹤由寄慈濟大師凜凜氷風臨晚景環廬獨坐雙峰頂茫茫六合曾未知月寫千江萬江影寄福嚴禪師二首跡遁寒巗雲鳥絶陰崖流水花微發昨夜天風掃石床寥寥坐對三生月一葉落兮天下秋古今人事謾悠悠皇恩三讓名還大千載真風詠未休寄雲蓋鵬禪師情忘應許道相交肯謂川途有所遙月皎五峰湘水白雲蒸石廩露偏饒寄南華慈濟禪師曹溪何幸示來書忽憶當年在大愚堪笑堪悲無限事甜瓜生得苦葫蘆握草為金未足奇韶陽風骨與誰知年來老大渾無用應對盧公獨斂眉寄木山長老刊石休誇自點頭武陵法道欲誰酬年來應是慵開眼獨坐龍門見九州寄龍王進長老南北山居道不殊不殊猶未得通途龍峰地暖花應秀石稟雲寒萬仞孤與李君行者辭家日久慕參禪不憚崎嶇甚可憐報汝速須歸故里闌冬耕取昔年田暮冬旅懷雪壓怪松枝欲折衰病畏寒長擁爐添薪坐久眼忽瞑偃臥不知山月晡瞻木平道人嶽頂雲披清風貌古一漚未形萬機起縷道極致淳行敦亡矩稽首木平不勞斤斧禪人寫余真固命余贊頂高頰拳祖佛之怨脣尖鼻缺禪庭之孽天下人憎這箇老傑十五十六天輪地軸日面月面神號鬼哭少室從風竹馬年而今莫問胡家曲咄自詒一首壞衲曾披蒙雪頂繞軒松竹冷相侵虗堂夜永坐將半花落嵓前知幾深山居四首片片殘紅隨遠水依依煙樹帶斜陽橫笻石上誰相問猿嘯一聲天外長靜聽涼飇繞洞溪漸看秋色入冲微漁人撥破湘江月樵父踏開松子歸壠麥重重覆紫煙太平時節見豐年野雲忽散孤峰出列派橫飛落㵎泉凍把巖根雪尚稠暮雲間鎖遠峰頭地爐榾柮高燒起石銚烹茶時一甌答雲峰正大師二首溢目江山雪正深旅庭寒色尚沉沉尤欣象外有良契時以嘉言慰此心竹齊欹枕病方回春餤梅花忽寄來珍重此恩何以報搘笻時上石樓臺寄道友散盡浮雲落盡花到頭明月是生涯天垂六幕千山外何處清風不舊家對菊淡然金菊映秋光底事無人泛玉觴翻憶陶潛舊池上肯教和草過重陽退居寄承天偶作五首道薄常慙繼祖猷退居嵓谷任春秋齊時自有盂羮飯六合清風卒未休道薄常慙繼祖天瞬眸金色已虗傳而今猶舉僧伽服端坐雞峰誑後賢道薄常慙繼祖燈老來林下笑盧能抱腰持石長三尺不愧黃梅會裏僧道薄常慚繼祖心九年何事絶知音到頭無賴空回首皮髓紛拏直至今道薄常慙繼祖門隨家豐儉且安貧掌間日月須彌走把住南星對北辰十二時歌雞鳴丑眹兆之前還亂走夢裏論量幾萬般天明無是虗開口平旦寅山河大地掌中擎金剛焰裏空彈指碧眼胡僧來未能日出卯烜赫威光無剩少茫茫宇宙未知歸競向途中鬬機巧食時辰南北東西誰是親鉢裏不逢香積飯深慙枉作出家人禺中巳信手拈來無不是迷却南街走北街草鞋踏破因誰置日南午翻出囊中無一縷銅頭鐵額知未知草偃風行立千古日呹未休話真如論實義官家不許夜行人誰教醉酒街頭睡晡時申遊子前來問要津鉢盂打破渾閒事茶鹽少了却生嗔日入酉朝參暮請何曾有不如靜坐念金剛從他笑破衲僧口黃昏戌一點寒燈照幽室鐘鼓喧轟閙一場摩訶般若波羅蜜人定亥啐之機遭哂怪自從胡亂知幾年不曾少人一文債夜半子開眼尿床到如此老胡猶自涉崎嶇石塔空留鎮熊耳師嘉祐七年七月將示寂上堂有頌住世六十五年為僧五十七夏玄徒休問指歸鼻孔大頭向下題雲峰悅禪師語録悅禪師語者青山白雲開遮自在碧潭明月撈摝方知鐵石崩崖霜弓劈箭不受然燈記莂自提三印正宗假令古佛出頭也下一椎定當前則激惠南老子出泐潭死水而印慈明後則勸祖心禪師撥大愚寒灰而見黃檗看儂兩著須天下碁客受先破此一塵與四海宗點眼有懷疑者是不肯山谷老人擬欲全提且救取無為居士黃庭堅題
