body:
  text: 大隨開山神照禪師語録西蜀沙門元德重編上堂云你不見道一塵含法界所以道有一智人破塵出經卷量等三千大千世界你欲破不破我今舉起大家求此事三千世界收在一微塵四大海水歸一滴須彌納芥子中若求自己祇在一毫毛你若一毫毛處見得三千大千總成經卷祇是自己動這箇境界不得所以真境不現說什麼纖毫覺處總是刀避箭懼境藏形你喚這箇作什麼兄弟如石壓草相似或然拈却石依舊習氣祇在須是隨處了却始得與境為主免塵境使喚始得大難大難千難萬難祇是殼解他後銜鐘負鞍阿誰苦才有些子覺觸處便擬望與人為師大錯須說凡了却凡須說聖了却聖舉一例諸無非恁麼不易不易珍重珍重下座問如何是大隨一面事師云無東西南北問如何是生死中事師云水上浮漚內外不見問如何是中理一句師云表裏不從進云師決志事如何師云言下知音問如何是道用心處師云莫自謾問陀那微細識到此如何分師云你眼祇解觀色還解聽聲否問萬法歸一一歸何處師云萬法元不歸問六國未寧時如何師云臣灰功進云直得君臣道合時如何師云不見有君臣問如何是自在師云不自在進云不自在時如何師云却自在問中雪瑤階時如何師云不厭世境問曹溪一路事如何師云老僧道如不淨坑進云何以如此師云佛祖兩路了不相干問久處寒巖何以日不照師云不照寒巖寒巖終不出來就你日光問離光影如何是師性師云和光吐出進云莫鬼語師便打問如何是最初一句師云是末是本問如何是大隨境師云不似學人進云何故不道師云不然問如何是最初處師云莫妄想問隱隱不停波時如何師云敬禮常住三寶進云息浪停波為什麼沙石轉多師云為你斷伊問學人祇如浮雲以鏡捉光何處安排師云與雲為主問寸草未生時如何師云老僧無米喫終不下大隨山問祖意教意是同是別師云不究始不顧末問路逢古佛時如何師云你或逢駝驢象馬喚作什麼師云夫上代諸德莫非求實不自瞞昧豈比飛蛾投火自傷自壞他明白了被生死輪回拘障不得所以識不能識智不能知不聞道釋迦掩室淨名杜口須菩提無說而說釋梵絶聽而聽此事大難大難珍重上堂問萬法從心起未審心從何起師云石牛沿江走水底火燒天問如何是大隨山師云耳不聞眼不見進云如何是山中人師云千人衆裏萬人衆裏不向一人不背一人問掘一丈見一丈空將一丈土填一丈空未審空歸何處師云莫將這箇道理為佛法出去出去問佛法遍一切處未審教學人什麼處駐足師云大海從魚躍長空任鳥飛問撲碎驪龍珠請師明活寶師云明活寶且置作麼生是你撲碎底珠僧無語問法報化三身佛亦非說如何是本來身師云海底如意珠始終無不應問如何是大人相師云肚上不帖榜師問僧向什麼處去僧云西山住庵去我向東山喚汝汝便來得麼僧云不然師云汝住庵未得問生死到來時如何師云遇茶喫茶遇飯喫飯進云誰受供養師云合取鉢盂師庵側有一龜僧問一切衆生皮裏骨這箇衆生為什麼骨裏皮師遂拈草履向龜邊著復云會麼僧無語問如何是諸佛法要師舉拂子云會麼僧云不會師云麈尾拂子問如何是學人自己師云是我自己進云為什麼却是和尚自己師云是你自己問如何是無縫塔師云高尺五進云某不會師云鶻崙磚問如何是一切智空師云心空即是進云更有來時作麼生師云不是空進云還稱向上事也無師云不隈問和尚百年後付法與何人師云露柱火爐進云還受也無師云火爐露柱有一行者領衆到師處師問云參得底人喚東作什麼對云不可喚作東師咄云臰驢漢又喚作什麼行者無語衆皆散問但有一法耳不聞眼不見皆是光影如何是光影中人師咄云莫無禮莫無禮問理不言詮時如何師云言詮即理問如何是和尚家風師云赤土畫簸箕進云未審此理如何師云簸箕有脣米跳不出師問座主講什麼教主云百法論師拈拄杖云從何而起主云從緣而起師云苦哉苦哉師問僧什麼處去僧云禮普賢去師舉拂子云文殊普賢總在這裏僧作圓相拋向背後却展兩手師叫侍者云取一帖茶與這僧去問遠聞大隨水到來祇見箇漚麻池師云汝祇見漚麻池阿裏見大隨水進云如何是大隨水師云苦澀難下觜進云還喫得否師云喫著便死師因燒山次見一蛇以杖挑向火中咄云這箇形骸猶自不放捨你向這裏死如暗得燈遂有僧問正當恁麼時還有罪也無師云石虎叫時山谷響木人吼處鐵牛驚僧因馳書辭師問曰學人此去未審師將何言到彼中師云好為通達再問臨岐參晚請師垂示師云無事早歸僧從五臺山來師問云五臺山何似大隨山僧問云如何是大隨山師云是僧耳背高聲問來僧高聲問如何是大隨山師云若千山與萬山問魚遊陸地時如何師云拗不曲處是闍黎所貴進云却下碧潭時如何師云立足事難明師勘僧云從什麼處來僧云從蜀中來師云未入蜀時在什麼處盤泊僧云無處所師云莫是處所有過耶僧云若有處所鈍置人眼師云天堂地獄有一坐具分似落坑鼓相似不鼓而自鳴堪作什麼問生死到來時還免得否師云飢時喫飯寒則著衣上堂云夫沙門釋子見有如無始得向一切時中與凡聖等與解脫等方有少許出處若不如此大難大難珍重上堂問大地及日月時至皆歸盡未曾有一事不被無常吞還有吞不得者也無師云汝喚什麼作無常進云不究竟為無常師云無常却究竟自是汝不究竟其僧不肯師便打師勘居士云此身是什麼服制士云父母俱亡師云喫茶去居士應諾出去師喚回咄云你對老僧謾語父母祇在你莫說學無上道自己父母尚乃不知出去出去問如何是玄旨師云直須玄去進云如何是玄中玄師云不返去問古人立雪斷臂為求何法師云古人不斷臂進云古人斷臂因什麼道却不斷臂師云自是向雪堆裏樂問金雞未啼時如何師云失却威音王進云正當啼時如何師乃笑問柴裏蟲柴裏死水裏蟲合作麼生師云一切尋常問金鴈附書為什麼不露翼師云不通虗信問道場獻寶誰人能辨師云虗空能辨師忽示微疾不見客時有僧隔簾問咫尺之間為什麼不相覩師云如今相覩何不問來僧便問如何是相覩底事師云老僧不安有什麼心情對你上堂云間即遊天寂即歸地問上無片瓦下無卓錐時如何師云汝即今在什麼處居止問無常迅速不與人期忽若到來時如何師云速問速問進云便問師云太不道速生問啐同時如何瞻覩師云是動是靜問出殼時如何師云是末是本又云見麼問普雨為什麼不潤師云普雨問滴水成氷古人為什麼不許師云古人即如此若是老僧道向虗空裏挂破琉璃鉢問既是師子為什麼被文殊騎師云調伏自在問孤巗無紋繡特達事如何師云孤巗有紋繡特達事顯現問處水之魚為什麼渴死師云祇為魚不親下口問父子至親岐路各別時如何師云為有父子俗士施師鉢盂問未施鉢時師用什麼師云使最末後者一僧欲下山為衆化緣辭師師云汝若道得一句即放汝去若未然且歸堂休歇辦取自己事去師問盡十方空界是王老師檀越未審化什麼人去僧云但請和尚疏頭來便與師道師云汝且辦自己事去問毀佛謗僧時如何師云僧有何過佛辜負你箇什麼你毀謗他僧無語上堂云今時沙門向因中辨果果裏辨因始得僧便問有一人不屬因果時如何師近前捉定云我今時沙門向因中辨果果裏辨因汝云一人不屬因果別道別道僧無語師便打出上堂僧問過去未來即不問如何是現在師云虗空還著得碾砑石麼問來時無阻隔去時無滯礙正當恁麼乞師一句師云虗空無邊際大海平如掌般若性等等上堂普告大衆云汝等還知有三處不立質礙有緣二際無分豈知來去三身四智非聖不無八解六通非凡不有雖則衆生盡有佛性不可將蠢蠢而對佛耶然則高下無偏爭奈途中有異此身難得胎卵易成況是釋子之徒又乃祖宗苗裔三衣覆體曩劫修來四事供須非從今日人前行相總似高僧乃至語言不如俗子稱名便是傳法沙門子細尋思還傳箇什麼一向毀他經教有目如盲純乃謗於祖宗有心也祇如木石不解忖己德行終日恣縱無明以無慚愧之心兀兀何曾覺悟此身若失永劫沉淪非但却復人身有福底畜生也難得問孤峯頂上玩月輪時如何師云何不了却孤峯事玩他月輪作什麼進云豈無內外明徹事耶師云內外明徹事作麼生進云無有不照師呵曰這鈍驢也擬學馬走僧無語師復云問你諸方雲水闍黎莫道老僧這裏有佛法與你諸人說向諸方行腳參尋知識說箇什麼汝又領箇什麼莫道禮三拜後便起近前問若也言下便契時猶未是了底人莫向口頭取俊他時人天眼目者非是一生兩生修來盡是恆沙劫功成果滿始得如是所以向你叢林裏示現下來祇圖你今時人勤苦修行祇恐你出家人失却人身莫等閒過日老僧這裏有什麼佛法與你諸人說自是你諸人上得山來云我修行學道是佛向上人且問你佛向下人作什麼模樣不可老僧這裏有佛向上人有佛向下人來向諸人說邪你若不言我不可知你肚皮裏事也你或若問老僧也則隨汝根樹與汝說不可教老僧亂道得麼祇如老僧行腳時不揀叢林有供養無供養處祇要看他眼目稍似根性有些些器量方欲過一夏或一冬若是根性鄙劣者三朝兩日便行算來參六十餘員大知識有大眼目者那無一二餘者豈有真實知見祇是圖你諸人供養欲望福報你又有什麼福報與伊不可出家來空趂聚頭喫飯耶雖然如是四大之身誰免得直饒心超聖境身是凡夫又乃假借增修今時人便去向裏許埋沒却人身諸人莫謾向口頭裏無礙却成謗佛毀法見須實見聞須實聞始得假饒說似斬釘截鐵直須時中不瞞自己始得一車芥子猶未點著在來時便道我是不思議底人縱然除得身邊粗重猶餘微細不知粗重尚乃不知豈可說於解脫之法細中之細佛尚不知微愚凡夫豈能測得但是世間有者並從顛倒所生欲得解脫塵勞無過心中自省摩訶般若是解脫法身子細尋思復是誰有誰無老僧也不是醉凡詐聖祇是習氣不除上合諸佛心印中合一切人天下合蠢動含靈師僧家披如來法服須求出離時不待人光陰頃刻珍重珍重上堂僧問真如法界以三昧為香花廓周沙界亦同一家龍門為什麼無宿客灢水為什麼足蝦蟇師云真如法界不以三昧為香花廓周沙界亦無家目前問者豈不是智淵座主耶主云是師云祇這便是灢水足蝦蟇師復云拋却從前活計認本源生涯主無語師云經有經師論有論師律有律師你十二時中合談何事還因箇什麼停得模樣不可三箇作隊五箇成群趂衣劫食邪到處不免撓他施主坐臥心頭難勝於檀越直饒你𨁝跳向虗空裏行也是國王管界不可將持齊奉戒隨時轉一卷經用答四恩三有也又爭報答得自是諸人時中事修行到辟支佛地方能消得人天供養博地凡夫祇是異俗之形喫了不知慚愧空自趂說己是他非出言欲斷人命根吐氣便作毒蛇之行說著自己三界無過毀挫他人祇如蟲蟻若是古佛有此標榜如今欲微效些些從上已來或無此則因何所起如此容縱豈言清德若也不達本源未免滴瀝還他改皮換骨泥犁苦海誰人替得諸人大須竭力不得因循過日學禪學道則不無你諸人且道禪有可參道有可學否若言有學者無有是處若言無學者亦無有是處不可顒然去也因地還從此去直須打底分明了却生死根本縱饒異類中受生也終不昧己靈始得四大合成祇是汝之窟宅這邊脫去那邊早生那邊脫來這裏早別作箇模樣汝不思量看阿那箇是汝本來之身須向彼中究取莫謾走南州北州終無了日光陰迅速珍重珍重上堂云此性本來清淨具足萬德但以隨染淨二緣而有差別故諸聖悟之一向淨用而成覺道凡夫迷之一向染用沒溺輪回其體不二故般若云無二無二分無別無斷故時僧遂問劫火洞然大千俱壞未審此箇性壞不壞師云壞進云恁麼則隨他去也師云隨他隨他去也僧無語時會中三百餘僧盡皆不肯皆云從上已來祇說不壞之性和尚何故却云壞邪衆各惶然時有一僧上堂頭白師云適來僧問和尚話和尚答他其僧似不肯和尚答底語師云只有此一僧不肯為如更有人不肯邪僧云只是一僧師云直得三千大千世界人總不肯老僧猶較些些子非但這一僧其僧後至投子和尚處投子云闍黎近離甚處僧云遠離西川大隨投子問云彼中還有尊宿也無僧云有一禪師住大隨山現有三百餘衆子云有何言句接人試與老僧舉看僧云某甲昨問大隨劫火洞然大千俱壞未審此箇壞不壞子云大隨如何答僧云大隨答道壞僧云某更問恁麼則隨他去也大隨又答道隨他隨他去也子云汝作麼生會大隨語僧云某甲不肯此語子云闍黎早錯了也大隨恁麼道隨他隨他去汝又如何僧云至今未決子遂呼侍者令裝香大展坐具望西川大隨山遙禮三拜已嘆曰不是大隨和尚伊是箇古佛此乃真善知識汝速往彼懺悔參取老僧無如是法與汝說速去速去於是僧便回大隨和尚已歸寂復回投子投子和尚亦乃歸寂蜀主賜師紫衣師號并遣內侍朱延溥侍奉師師不受師復云山僧偶住未經多時隈巗傍水養道存真何人虗譽致令王者如斯異恩謝使遠來勞煩却送還王老僧祇可布衣遮體不須名服向身王恩雖重老朽何堪於是天使遂回奏凡三次送來不受師又云老僧不為名利來此須要得箇人不可青山白雲中趂你是非將來之世捨一報身後草也無喫多少金毛師子問著便作驢鳴馬喊諸仁者似老僧行腳時到於諸方多是一千少是七百五百衆或在其中經冬過夏未省時中空過向溈山會裏做飯七年於洞山會中做柴頭三年重處即便先去祇是了得自己干他人什麼事知諸佛菩薩盡是勤苦不計劫數捨金輪王寶位及頭目髓腦所愛之物國城妻子不可算數所以始得名為佛似諸闍黎還曾捨得箇什麼作得箇什麼勤苦便道我會出世間法世間法尚不會些些子境界現前便自張眉怒目消容不得說什麼解脫法長連牀上坐不搖十指喫他信施了合眼合口便道我修行修道感果如是合消得祇是謾自己如百丈和尚置于堂宇祇要辦事底人諸闍黎還辦得箇什麼事其中有不動身手日消得萬兩黃金若是消得者豈可如此見解不可從母腹中來如是邪但會得世間法是則名為出世間法世間法尚乃不會豈況佛法祇如一大藏教盡是金口所宣如來祕密汝口裏念將來總成魔語豈得了為什麼不了若了時達磨不從西來也祇如達磨未來此土時還有佛法也無又爭得道無譬如人有一寶墜在淤泥中勤苦纍劫尋求不得或有一人善知寶所直從泥中指出此寶以示失寶之人失寶之人一見便識是我本物了無得失達磨西來亦復如是不可祇是老僧是善知識邪遍地衆生總是善知識祇是見覺未明不可道伊無也若言有時諸人肯禮蠢蠢之徒作佛麼譬如明珠墮在泥中未遇其人豈有出期有此衆生比如無情還同頑物既在三衣之下直須親近知識早是幾生修來始得如此不可却入輪回六趣去也若是得自在底人論箇什麼鑊湯爐炭刀山劒樹四生六道於中如喫美食若未得如是便實受此報一失人身載求欲似如今者萬中無一莫未得謂得未證謂證未聞謂聞自謾自誑失却光陰虗延日月展轉祇是無明檐重乍可為俗隨所任運遣過時日却乃無業如今作沙門每日有業有什麼業踏底是國王地著底是檀信衣食底是檀信食骨肉是父母之體若也不了將何酬答所以言有業祇如老僧不可是了底人捨此一報身隨業而行誰言定得唯佛與佛乃能知之時有僧問不假言句如何得知師云假言句尚乃不知僧無語禮拜師忽一日上堂衆集定師乃作患風勢告衆曰還有人醫得老僧口麼衆僧競送藥俗士聞之亦多送藥師並不受經七日後師自摑口令正復云如許多時鼓這兩片皮至今無人醫得老僧口於是齊前升座辭衆儼然端坐告終大隨開山神照禪師語録序開封郭凝述元德上人自蜀挈大隨老録欲罄囊資鏤板於杭廣其說于天下余曰自老盧衣止不傳逮敷百年枝分派別披法衣據座唱道者不啻萬數大抵穿鑿破裂隨言取義析文生解求其直截根源如古尊宿者固未易得今欲闢其邪而示之正使知所趨嚮不亦難哉然世必有一覩斯録然契而獨得者庶乎佛日重輝慧命不絶於是乎書時崇寧四年閏二月十五日也大隨開山神照禪師行狀師諱法真貌古有威眉垂覆睫嘗聞老宿輩皆稱為定光佛示蹟於劒南梓州鹽亭縣王氏家生族本簪纓妙齡夙悟決志尋師於慧義寺今護聖寺竹林院是也師圓具後遂遊南方初見藥山道吾雲巖先洞次至嶺外大溈和尚會下數載食不至充臥不求暖清苦鍊行履操不群大溈一見乃深器之一日大溈問曰闍黎在老僧此中不曾問一轉話師云教某甲向什麼處下口溈云何不道如何是佛師便作手勢掩溈口溈嘆曰子真得其髓從此名傳嶺外聲振寰中爾後聿旋西蜀寄錫於天彭珊口山龍懷寺路傍煎茶普施三年忽一日往後山見一古院號大隨山群峰矗秀㵎水清泠中有一樹圍四丈餘根蟠劫石勢聳雲霄南開一門裏面虗通不假斤斧自然一庵師乃居之比夫迦葉三峰維摩丈室不遠矣時人皆目之為木禪庵師居十有餘年影不出山迹不出俗道德彌著聲聞遐彰知者四方不遠千里櫛足函丈朝參暮請虗往實歸時蜀王崇重師名凡三詔不從王慕師孤風無由一見遂於光天元年十月十五日遣內侍賫紫衣師號寺額等賜師師不受凡三度送至師確意却之王愈欽師德再遣使出敕云寡人心願此回禪師如准前不受乃卿之罪也回必誅卿天使奉聖旨再往師處師亦不受天使勤懇拜禮告云禪師此回若更不受君命某必受戮願師慈悲免某禍患師不獲已受之師既受已使復告師求回表謝恩師云老僧自住山來無紙墨汝隨我口傳語大王須善保治家治國事無偏傾領取傳言無令忘失欲求相見是何年月使依師言回闕奏王王深悅再令天使詣山中長生侍奉師師亦不受復云老僧不為名利須得箇人作什麼天使忙然師且權留之師於乾德元年己卯七月十五日齊前辭衆端坐而化俗壽八十六僧臘六十六時王聞之哀慕師心不勝慘怛急宣中書令王宗壽賫香燭備具等到山致祭敕葬歸塔神異頗多不可具述祭文維乾德元年歲次己卯十月乙未朔十五日己酉弟子扶天佐命忠烈功臣開府儀同三司檢校太尉太子太傅兼中書令食邑五千戶嘉王宗壽謹以香燭茶果之奠致祭于故神照禪師之靈惟靈大教蓍龜釋宗水鑑傳心印以悟道握智珠以談空三乘洞曉其真如四衆頗虔於精妙自𢹂瓶錫來駐靈山斥鷲嶺之高僧超人天之勝果雲臻士庶渴法如仰於醍醐雨驟緇黃得旨似沾於甘露方化緣而大布何香火而或虧蓋以諸行無常是生滅法爰歸真寂永斷沉淪弟子宗壽幸以孱庸久欽德宇克慕出塵之益將隆離垢之能豈料法舟俄登彼岸今則遷神已卜歸塔行期恨無緇地之能併寫終天之訣敢陳蘋藻式表追攀靈鑑澄明伏惟尚饗
