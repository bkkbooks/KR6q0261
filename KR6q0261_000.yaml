front:
  text: 重刻古尊宿語録序過去如是如是見在如是如是未來如是如是幸自可憐生無端黃面老漢拈花瞬目金色頭陀忍俊脫不覺漏泄一人傳虗萬人傳實何時而已哉人根有利鈍故機語有開斂針砭藥餌膏肓頓起縱橫展拓太虗不痕雖古人用過時無古今死路活行死棊活著觀照激發如龍得水故曰言語載道之器雖佛祖不得而廢也七佛偈及西天此土三十三傳枝出派列莫知其幾授受證據洎夫抑揚示誨見於傳燈而多有載不盡者往往散落異時有藏主者旁搜廣採僅得南泉而下二十二家示衆機語厥後又得雲門真淨佛眼佛照等數家總曰古尊宿語非止乎此也據其所搜採而言耳夫古人得親故用親行到故説到其所説者如國家兵器不得已而用之從上為人只貴眼正是豈末流刻楮畫花雕蚶鏤蛤瞎學者眼所可同日語覺心居士出善女倫秉烈丈夫志操不為富貴所障世相所縻著淨名衣坐空生室安住正受動靜提撕是孰使之然哉謂所編古尊宿語刊于閩中而板亦漫矣兩浙叢林得之惟艱勇捐己資鋟梓流通命禪衲精校重楷不鄙索序噫亦異矣昔月上女抗舍利弗發明大涅槃菴提遮對曼殊室利不生生不死死義達磨來震旦以後其間善女等倫橫機諸大老發明向上者多矣近世秦國計氏與夫空室道人皆以鍾鼎家世而為般若眷屬今覺心則發揮古宿機語以遺佛種無二無二分無別無斷故覺心魏氏紹興丞相文節公孫余文昌之室先瑩住林菴虗席命慈林解無言者攝解催請主菴人覺心著語云菴主只在菴中為甚麼不見道有又無道無却有又不近又不遠舉頭鷂子過新羅參得著喫碗餘偈語多有皆不計較而得則日用中無非禪悅法喜之樂矣併見于此時聖宋咸淳丁卯春清明日江浙等處明州府阿育王山廣利禪寺住持沙門物初大觀序唐宋諸碩師傳佛心宗道大德備室中垂示勘辨學者徵拈代別皆有機語流布寰中久矣惟傳燈一書嘗賜入藏諸師之語傳燈不能備載者有賾公藏主別集南泉趙州黃檗臨濟雲門真淨佛眼東山二十餘家總若干卷題之曰古尊宿語實有補於宗門
