body:
  text: 舒州白雲山海會演和尚初住四面山語録參學才良編師開堂日授疏示衆云兵隨印轉將逐符行請對尊官分明剖露宣疏了指法座云此大寶華王座從朝至暮與諸人同起同坐諸人還見麼若見更不在升若不見莫道今日謾你便升座拈香云此一瓣香先為今上皇帝伏願常居鳳扆永鎮龍樓次拈香云此一瓣香奉為州縣官僚伏願乃忠乃孝惟清惟白永作生民父母長為外護紀綱又拈香云此一瓣香得來久矣十有餘年海上雲遊討一箇冤讐未曾遭遇一到龍舒果遇其人方契憤憤之心今日對大衆雪屈須至爇却為我見住白雲端和尚從教熏天炙地一任穿過蔡州有鼻孔底辨取龍門和尚白槌云法筵龍象衆當觀第一義師云若論第一義西天二十八祖唐土六祖立在下風一大藏教白雲萬里摩竭掩室毗耶杜口正在夢中千佛出世寐語未了文殊普賢拗曲作直所以道設使言前薦得猶是滯殼迷封縱饒句下精通未免觸途狂見若也把定封疆説什麼法堂前草深一丈直得凡聖路絶鳥飛不度天下衲僧無出氣處衆中莫有不甘底麼出來相見時有僧問優曇花現方便門開朝宰臨筵如何舉唱師云今日好晴學云杲日當空清風匝地師云省得我多少問如何是人中境師云寶閣凌空金鐸響怪松隈險野猿啼學云如何是境中人師云鼻直眼橫乃云更有問話者麼若無雙泉今日向第二義門放一線道與諸人相見和泥合水一上且要釋迦彌勒動地雨花文殊普賢觀音勢至各踞一方助佛揚化皆務本事器量堪任雙泉不免也入一分共説東家杓柄長西家杓柄短任從春草青青炎光爍爍秋樹葉零冬氷片薄何故如是且要諸人順時保愛謝辭不録乃拈起拄杖云古人道拈起也天回地轉放下也草偃風行四面即不然拈起也七穿八穴放下也錦上鋪花且道還有為人處也無良久云來年更有新條在惱亂春風卒未休師在白雲授帖拈起示衆云大衆只恁麼會得埋沒宗風過犯不小幸有見成公案請維那對衆宣讀宣帖了授法衣提起云既是大庾嶺頭提不起為什麼却在者裏且道者裏底是那裏底是乃云携瓶自汲清涼水却著袈裟作主人便披指法座前云象王回師子步儂家看著雙眉聚然雖如是事到如斯難為辭讓但有路可上更高人也行便升座僧問禪非意想道絶功勳轉身一句作麼生道師云大衆見你學云也知和尚有此機鋒師云獨出闍黎學云今日却成造次師云捧上不成龍問沙場久戰名遂今朝不涉功勳作麼生道師云長蛇猶自可偃月怎生當學云金鏃慣調曾百戰鐵鞭多力恨無讐師云知君不是金牙作爭解彎弓射尉遲學云眼親不如手親師云新長老敗闕學云口是禍門師噓乃云秋風颯颯玉露垂珠水碧山青蛩吟蟬噪圓通門大啓文殊普賢穿過汝諸人鼻孔自是汝諸人當面諱却復云諸佛不出世四十九年説未審説箇什麼少林有妙訣殃及子孫至今分踈不下更説什麼妙訣若人識祖佛當處便超越超越與未超越則且置你道祖佛即今在什麼處若無人道得山僧不惜眉毛與汝諸人拈出拍禪床一下小參僧問如何是佛師云肥從口入乃舉德山示衆云今夜不答話有問話者三十棒衆中舉者甚多會者不少且道向什麼處見德山有不顧性命底漢試出來道看若無山僧為大衆與德山老人相見去也待德山道今夜不答話問話者三十棒但向伊道某甲話也不問棒也不喫你道還契他德山老人麼到者裏須是箇漢始得況法演遊方十有餘年海上參尋見數員尊宿自謂了當及到浮山圓鑑會下直是開口不得後到白雲門下咬破一箇鐵酸餡直得百味具足且道餡子一句作麼生道乃云花發雞冠媚早秋誰人能染紫絲頭有時風動頻相倚似向階前鬬不休入院日上堂僧問携笻領衆祖令當行把斷封疆師意如何師云秋風吹渭水落葉滿長安學云四面無門山嶽秀今朝且得主人歸師云你道路頭在什麼處學云為什麼對面不相識師云且喜到來乃舉祖師道吾本來茲土傳法救迷情一花開五葉結果自然成達磨大師信腳來信口道後代兒孫多成計校要會開花結果處麼鄭州梨青州棗萬物無過出處好上堂舉古人道若有一人發真歸源十方虗空悉皆消殞雙泉則不然若有一人發真歸源十方虗空築著磕著到興化上堂僧問和尚未離四面時如何師云在屋裏坐學云離後如何師云走殺闍黎乃舉法眼頌云山水君居好城隍我亦論靜聞鐘角響間對白雲屯大衆法眼雖不拏雲攫霧爭奈遍地清風四面今日試與法眼把手共行靜聞鐘角響且不是聲間對白雲屯且不是色既非聲色作麼生商量乃云洞裏無雲別有天桃花似錦柳如煙仙家不解論冬夏石爛松枯不記年上堂云天上無彌勒地下無彌勒十字街頭立被人喚作賊便下座上堂僧問四面無門山嶽秀箇中時節若為分師云東君須子細偏地發萌芽學云春去秋來事宛然也師云才方搓彈子便要揑金剛乃舉古人云我若向你道即禿却我舌若不向你道即啞却我口且道還有為人處也無四面有時擬為你吞却只被當門齒礙擬為你吐却又為咽喉小且道還有為人處也無乃云四面從來柳下惠歲旦上堂云元正啓祚萬物咸新揚盡大千沙界都來只在一塵乃展手云是新是舊有人出來道看若無四面且世諦流布去也遂叉手云孟春猶寒伏惟首座大衆洎諸知事尊體起居萬福上堂僧問千峯寒色即不問雨滴嵓花事若何師云今日也相似學云一句逈超千聖外千山鎖斷萬重關師云一滴落在什麼處學云錯師云錯學云錯錯師便打乃云千峯列翠岸柳垂金樵父謳歌漁人鼓棹笙簧聒地鳥語呢喃紅粉佳人風流公子一一為汝諸人發上上機開正法眼若向者裏薦得金色頭陀無容身處若也不會喫粥喫飯許你七穿八穴白衆出隊上堂云明日匹馬單槍為國出戰得勝回戈之日滿路歌謠大衆作麼生是歌謠一曲乃云囉邏哩囉邏哩還有人和得麼良久云鴛鴦繡了從君看莫把金針度與人寒食夜小參僧問羣迷久渴冒雨登山向上之機請師方便師云不免入山一回學云恁麼則步步踏實去也師云空手却回去學云若是那邊還的當也無師云罕遇知音學云謝師證明師云知音底事作麼生僧劃一劃師云又被風吹別調中學云往往隨他口頭走師云更是阿誰乃云李白桃紅山青水緑雲橫洞口月皎長空若只向者裏薦得法眼道月明幽室寒星分拱辰異便須瓦解氷消韶國師道通玄峯頂不是人間心外無法滿目青山亦須百雜碎何也盡乾坤大地不消一揑然雖如是事無一向今夜且放過一著上堂舉梁武帝問達磨如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識又僧問六祖黃梅意旨什麼人得祖云會佛法底人得僧云和尚還得麼祖云不得僧云和尚為什麼不得祖云我不會佛法師云大小大祖師問著底便是不識不會為什麼却兒孫遍地乃云一人傳虗萬人傳實小參僧問施主遠趨於丈室請師一句利於人師云教天下人成佛去學云悠悠塵內客不謾入山來師云中間猶有衆生在僧便喝師云且道是佛是衆生學云四面眼難謾師云你向什麼處見四面僧拂袖歸衆師云作家乃云滿口道得底却不知有知有底又道不得且道過在什麼處將成九仞之山莫惜一簣之土上堂舉雲門垂語云古佛與露柱相交是第幾機自代云南山起雲北山下雨師云大小大雲門大師元來小膽四面道古佛與露柱相交是第四機良久却云者箇説話面皮厚三寸出語成不遜好將臨濟棒一日打三頓什麼人下得手雖然罪過彌天新赦咸放結夏上堂僧問五天結制分付蠟人未審雙泉如何示衆師云足不履地乃云結夏無可供養大衆作一家宴管顧諸人遂擡手云囉邏招囉邏搖囉邏送莫怪空踈伏惟珍重上堂云於三七日中思惟如是事釋迦老子半夜逾城直往雪山早是漏逗不少更思惟箇什麼便下座上堂舉藥山久不上堂主事報云大衆久思和尚示誨山云打鼓著大衆方集山便歸方丈主事云和尚許為衆説法何故一言不措山云經有經師論有論師爭怪得老僧師云雖然以己妨人爭奈賊身已露諸人要識藥山麼間持經卷倚松立笑問客從何處來上堂舉僧問洞山如何是善知識眼山云紙撚無油師云洞山老漢不是無只是太儉忽有人問四面如何是善知識眼只向伊道瞎何故且要相稱乃云紙撚無油也大奇不堪拈掇有誰知回身却憶來時路月下騰騰信腳歸上堂舉教中道若謂如來有所説法即為謗佛只如一大藏教甚處得來若言無説五千四十八卷什麼處消遣到者裏須是箇人始得還會麼莫謗四面好上堂舉僧問投子如何是十身調御投子下禪牀立或有人問四面如何是十身調御老僧亦下禪牀立為什麼却依樣畫貓兒待我計校成即説向你上堂舉藥山問石頭三乘十二分教某甲粗知承聞南方直指人心見性成佛某實未明乞師指示石頭云恁麼也不得不恁麼也不得恁麼不恁麼總不得山僧在衆日聞兄弟商量道即心即佛亦不得不即心即佛亦不得若恁麼説話敢稱禪客何故殊不知石頭老人文武兼備韜略雙全若是四面見處也要諸人共知只見波濤涌不見海龍宮上堂云三世諸佛遙望頂禮六代祖師開口不得四面今日且權為指使且道是箇什麼一二三四五雷門誇布鼓謾説李將軍藍田射石虎上堂云真如凡聖皆是夢言佛及衆生並為增語或有人出來道盤山老𠰚但向伊道不因紫陌花開早爭得黃鶯下柳條若更問道四面老𠰚自云喏惺惺著上堂云仲冬嚴寒伏惟首座大衆尊體起居萬福兩彩一賽便下座上堂云有一則語舉似諸人第一不得錯舉便下座上堂云昨宵年暮夜今朝是歲旦都大尋常日世人生異見不解逐根元只管尋枝蔓新舊只如今子細分明看若也更商量秦時鐸鑠鑽諸院長老入山師上堂云臨濟入門便喝是甚碗鳴聲德山入門便棒拗曲作直雲門三句曹洞五位大開眼了作夢何故如此國清才子貴家富小兒嬌到龍門上堂云有舌胡利無口非啞七出八沒風流儒雅便下座到海會上堂云白雲山裏白雲人把定封疆無縫罅無縫罅知幾價莫有知價底麼乃云一二三四五到興化上堂云世事冗如麻空門路轉賒青松林下客幾個得歸家共唱胡笳曲分開五葉花幸逢諸道友同上白牛車大衆車在者裏牛在什麼處芳草渡頭尋不見夜來依舊宿蘆花下座甘露資長老把師住云舒州管界元來有箇草賊師云和尚也須隄防資擬議師便拓開上堂云祖師道葉落歸根來時無口祖師恁麼道猶欠悟在便下座上堂僧問祖意教意是同是別師云人貧智短馬瘦毛長乃云祖師説不著佛眼看不見四面老婆心為君通一線便下座上堂云春氣乍寒乍暖春雲或卷或舒引得韶陽老子放出針眼裏魚乃云錯謝主事上堂僧問王索仙陀婆時如何師云七孔八竅學云如何是王索仙陀婆師云鸞駕未排齊號令學云如何是仙陀婆師云眼瞤耳熱僧禮拜師云點乃云文殊張帆普賢把柂勢至觀音共相唱和贏得雙泉閙中打坐打坐即不無且道下水船一曲作麼生唱囉邏哩囉邏哩俗氣不除上堂云今宵正月半乾坤都一片普賢門大開相逢不相見乃云過在阿誰上堂云默默默無上菩提從此得賺殺人便下座上堂云適來思量得一則因緣而念早忘了也却是拄杖記得乃拈起拄杖云拄杖子也忘了遂卓一下云同坑無異土咄上堂舉鏡清問玄沙學人乍入叢林乞師指箇入路沙云還聞偃溪水聲麼清云聞沙云從者裏入師云果是得入一任四方八面若也未然輒不得離却者裏謝典座上堂云小繩錢貫大繩井索日急要用笊籬木杓雖然破家具應用有處著著錯南北東西水灑不著冬至上堂云少年天子此日拜郊林泉之士遠望歌謠萬歲萬歲便下座有一道姑入山禮拜請上堂云道可道非常道真可笑姮娥一夜繡鴛鴦解把金針呈巧妙將並老黃梅兒孫一何拙如今箇箇口吒呀問著烏龜喚作鱉四面今日與君決列怎生雪冤家冤家莫向背地裏吐舌次住太平語録參學清遠集師入院日僧問遠別雙泉來臨禪衆入門一句願師舉揚師云也待一一過學云恁麼則清涼山遠人休去只此焚香便見師師喝云話也不領學云今朝親見面端的勝聞名師云猶自喃喃問如何是太平境師云數層寶塔侵天起萬本喬松匝地寒學云如何是境中人師云間持經卷倚松立笑問客從何處來學云人境已蒙師指示向上宗乘事若何師云須信下方城郭近果然鐘磬接笙歌問如何是佛師云露胸跣足學云如何是法師云大赦不放學云如何是僧師云釣魚船上謝三郎乃云我本無心有所希求今此寶藏自然而至世間之寶能變窮為富此之一寶能轉凡成聖且道如今是凡是聖太平道總不是何故苦瓠連根苦甜瓜徹蒂甜上堂云達磨無端少林面壁二祖斷臂一生受屈黃蘗樹頭討甚木蜜太平今日兩眼如漆李廣神箭是誰中的上堂云十方諸佛六代祖師天下善知識皆同者箇舌頭若識得者箇舌頭始解大脫空便道山河大地是佛草木叢林是佛若也未識得者箇舌頭只成小脫空自謾去明朝後日大有事在太平恁麼説話還有實頭處也無自云有如何是實頭處歸堂喫茶去上堂僧問如何是賓中賓師云少喜多瞋學云如何是賓中主師云傳言送語學云如何是主中賓師云鍾馗小妹學云如何是主中主師云一言才出口地上繡絪開乃云近日太平院禪和多聚散參底老婆禪喫底籼米飯知事失照顧主人少方便雖然沒滋味要且緩緩咽謝莊主上堂云一不做二不休不風流處也風流若要公私濟辦好看露地白牛上堂云此箇物上拄天下拄地皖水作口皖山作鼻太平退身三步放你諸人出氣上堂僧問牛頭未見四祖時如何師云頭上戴纍垂學云見後如何師云青布遮前學云未見四祖時為什麼百鳥銜花獻師云富與貴是人之所欲學云見後為什麼百鳥不銜花獻師云貧與賤是人之所惡乃云西天二十八祖也恁麼道唐土六祖也恁麼道天下老和尚也恁麼道獨有太平不恁麼道何故寡不敵衆且道畢竟如何妙舞更須知遍拍三臺須是大家催上堂云上是天下是地南北東西依舊位釋迦老子弄精魂達磨西來多忌諱忽有箇漢出來道和尚低聲但向伊道祇要拋磚引玉上堂云山僧今日將山河大地盡作黃金該有情無情總令成佛去然後太平不入者保社何故爭之不足讓之有餘上堂云太平不會禪一向外邊走臘月三十日贏得一張口且道那箇是太平口自云兩片皮也不識上堂舉寶壽作街坊時見兩人相諍一人以手打一拳云你得恁無面目寶壽因而得入若人於此知落處可謂公辦私辦大衆聽取一頌甚妙也甚妙於此知性命劈鼻與一拳當時便打正上堂云太平淈𣸩漢事事盡經遍如是三十年也有人讚歎且道讚歎箇什麼好箇淈𣸩漢上堂舉教中道假使滿世間皆如舍利弗盡思共度量亦復不能知尋常衲僧家高揖釋迦不拜彌勒是會佛智不會佛智衆中有則有只是藏牙伏爪太平有箇見處不惜眉毛舉向諸人待有人問隨口便答上堂僧問如何是奪人不奪境師云秋風吹渭水落葉滿長安學云如何是奪境不奪人師云路上逢人半是僧學云如何是人境俱不奪師云少婦棹輕舟歌聲逐流水學云如何是人境俱奪師云高空有月千門掩大道無人獨自行乃云數日已來連綿大水所到之處皆有損傷曹源一滴瀰滿人間衲僧一吸鼻孔遼天且道名字既同為什麼損益有異誰知遠煙浪別有好思量上堂云一葉落天下秋一塵起大地收收即不無何人親手月中仙桂和根拔海底驪龍把角牽上堂云撮土為金猶容易變金為土却還難轉凡成聖猶容易轉聖成凡却甚難何故誰肯屈尊就卑且道不凡不聖一句作麼生道乃云不得教壞人家男女上堂舉三祖見二祖禮拜問曰請師懺罪二祖云將罪來與汝懺三祖云求罪不可得二祖云與汝懺罪竟因成一頌舉似大衆無孔笛子氈拍板五音六律皆普遍時人不識黃幡綽笑道儂家登寶殿上堂云淺聞深悟深聞不悟爭奈何爭奈何獻佛不在香多上堂云開眼為晝合眼為夜坐斷舌頭誰談般若金色頭陀不入保社上堂舉風穴云若立一塵家國興盛野老嚬蹙不立一塵家國喪亡野老謳歌太平即不然若立一塵法堂前草深一丈不立一塵錦上鋪花何也不見道九九八十一窮漢受罪畢才擬展腳眠蚊蟲獦蚤出上堂因雪舉僧問雲門不起一念還有過也無門云須彌山師云有時問著師僧或竪一指或進一步或下一喝或拂袖便去上座未在何故太平未曾向二三月間下一陳雪向汝諸人在如今有箇漢出來道老和尚莫七顛八倒見今下也不是乃展手云了上堂僧問蓮花未出水時如何師云在泥裏學云出水後如何師云在水上問王子未登九五時如何師云逢人多問路學云正登九五時如何師云天下太平學云登九五後如何師云誰論好醜乃云末後最殷勤儂家隨處新大千沙界裏不免箇中人且道那箇是箇中人平蕪盡處是青山行人更在青山外上堂舉雲門道平地上死人無數出得荊棘林者是好手時有僧云恁麼則堂中第一座有長處雲門云蘇嚧蘇嚧太平即不然平地上箇箇丈夫荊棘林裏坐得底是好手何故乃云格上堂云將四大海水為一枚硯須彌山作一管筆有人向虗空裏寫祖師西來意五字太平下座大展坐具禮拜為師若寫不得佛法無靈驗有麼有麼便下座大衆散師高聲云侍者侍者應喏師云收取坐具復問侍者云還收得坐具麼侍者提起坐具師云我早知你恁麼也上堂僧問佛未出世時如何師云大憨不如小憨學云出世後如何師云小憨不如大憨乃云入荒田不揀信手拈來草不認大哥妻元來是嫂嫂鄭州出鵝梨青州出大棗無事巾單下箇箇從頭咬上堂云山僧昨日入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪動轉行坐青黃赤白一一見了子細看時元來青布幔裏有人山僧忍俊不禁乃問長史高姓他道老和尚看便休問什麼姓大衆山僧被他一句直得無言可對無理可伸還有人為山僧道得麼昨日那裏落節今日者裏拔本上堂云有鹽曰醎無鹽曰淡太平聞説口似匾簷便下座上堂云神通妙用不欠絲毫通人分上何用忉忉泥多佛大水長船高上堂云一月普現一切水一切水月一月攝誠哉是言也可謂塑不成畫不就昨夜三更白如晝謝典座上堂云變生作熟雖然易衆口調和轉見難醎淡若知真箇味自然飢飽不相干上堂拈起拄杖云昨夜三更夢見拄杖子教我一片禪向我道和尚明日早起上堂舉似大衆昨日錦上鋪花今日腳踏實地但看今日明朝説甚祖師來意翻思黃面老人謾道靈山授記直饒大地山河借我鼻孔出氣不如放下身心自然仁義禮智為亡僧下火舉起火把云火風四大互相違背當此時節隨緣自在次日又為一僧舉起火把云昨日也恁麼今日也恁麼且道昨日是今日是説甚是不是你看是甚火色上堂云今朝正月半與諸人相見嫩麥長新苗粒粒皆成薦不薦全藉春風扇次住海會語録參學景淳集師入院開堂日宣疏了乃云疏帖一時讀了若是具金剛眼睛底何必重説偈言雖然如是事無一向便升座拈香罷四面白槌云法筵龍象衆當觀第一義師云金鏃慣將平祖道鐵鞭多在恨無讐莫有不顧危亡底衲僧麼出來相見僧問白雲山下祖令當行如何是祖令師云一二三四五學云恁麼則昨日太平今朝海會師云高著師僧問昔日為霖去今朝領衆來朝賢臨座下願震一聲雷師云你還聞麼學云風送好雲歸碧洞水潮滄海助波濤師云知心有幾人學云寒山常撫掌拾得每殷勤師云將謂無人學云也不得壓良為賤師云且禮拜著乃云問話且止夫第一義適來若於四面捶下薦得千聖不能近祖師言不到天下作者拱手歸降何也況第一義本來清淨不受諸塵如何説得同道方知今日放過一著向建化門中別作箇解話會是以紹先聖之遺蹤稱提祖令為後學之模範建立宗風若非當人曷能傳授謝詞不録乃云陳謝既畢不可空然有一頌舉似大衆日暖風和花正開七重山鎖白雲來翻思城市繁華處又出松門步一回師在太平受帖拈起示衆云恁麼會去早是鈍漢何也若憑説五千四十八卷豈不是説若不憑説又如何辨白請維那分明拈出讀疏了遂升座乃云祖令當行十方坐斷其中莫有不惜性命者麼出來與老僧相見時有僧出云日月易見好事難逢師云令人疑著問公箋已至師今受祖意西來願舉揚師云雲從龍風從虎學云人天既獲聞真諦更有尖新事也無師云有學云如何是尖新底事師云蹉過也不知問白雲長老太平禪師於其中間未審如何辨的師云你試定當看學云莫是月無來去影現千江師云一任鑽龜打瓦遂云法不孤起仗境方生明鏡當臺好醜自現久參上士言下知歸晚學初機當須子細是以古人道法無去來無動轉者輒成山頌舉似大衆觸目光明處處新其中那箇辨疏親祗園枝上千花秀一度芬芳一度春上堂僧問如何是佛師云悉達多太子學云逾城時如何師云自有四天王在學云到雪山時如何師云蘆芽穿膝鵲巢頂上學云爭奈未是學人安身處師喝云禮拜了退乃云天地為洪爐烹煉強與弱大道本無元卷舒由橐鑰凡聖路坦然各自看謀略謝首座上堂云槌破蟠桃核得見其仁捋斷驪龍鬚得遇其寶雖然如是也未是好手黃帝失玄珠於赤水使智索之而不得使離未索之而不得使契詬索之而不得乃使罔象直饒罔象得之亦未是好手爭似今日與大衆同使一箇通事舍人雖然如是也只得一半上堂云永嘉道取不得捨不得不可得中只麼得祖師道不是心不是物不是佛大衆且道是箇什麼乃云到江吳地盡隔岸越山多結夏上堂僧問如何是白雲境師云七重山鎖潺湲水學云如何是境中人師云來千去萬學云人境已蒙師指示向上宗乘又若何師云面赤不如語直乃云此夏居白雲禪人偶聚會三月九旬中尊卑相倚賴粥飯與茶湯精粗隨忍耐逐意習經書任運行三昧彼此出家兒放教肚皮大上堂云昨日有一則因緣擬舉似大衆却為老僧忘事都大一時思量不出乃沉吟多時云忘却也忘却也復云教中有一道真言號聰明王有人念者忘即記得遂云唵阿盧勒繼娑婆訶乃拍手大笑云記得也記得也覔佛不見佛討祖不見祖甜瓜徹蒂甜苦瓠連根苦下座解夏上堂云一塵起大地收一葉落天下秋金風動處警砌畔之蛩吟玉露零時引林間之蟬噪遠煙別浦行行之鷗鷺爭飛絶壁危巒處處之猿猱競嘯又見漁人舉棹樵子謳歌數聲羌笛牧童戲一片征帆孤客夢可以發揮祖道建立宗風九旬無虗棄之功百劫在今時之用如斯話會衲子攢眉不見道一塵不立始歸家若有纖毫非眷屬上堂僧問見來不釆時如何師云各自守疆界進云見來却釆時如何師云看築著你鼻孔學云謝師答話師云放乃云古人道如何是不動尊朝到西天暮歸唐土大衆莫是動而不動不動而動麼只者便是白雲見處郡中回上堂云船上無散工時時事不同昨朝城郭裏今日白雲中且道不動尊在什麼處自云氣似韛袋令人可愛自出緣化回上堂云白雲海會院足水兼柴炭唯少麻與麥衆人皆盡見親去化檀那疏却阿羅漢且望大慈悲一一看佛面大衆佛身充滿於法界且作麼生看我道不隔一條線上堂云幸然無一事行腳要參禪却被禪相惱不透祖師關如何是祖師關把火入牛欄上堂云我有一柄掃盡雪山雪我有一張口臨事無可説我有一雙眼和盲悖訴瞎任意過平生烏龜喚作鱉處世學為人喫水須防噎仰山曾道底兩口一無舌四海五湖人當陽瞥不瞥上堂舉靈雲悟桃花頌云三十年來尋劒客幾經葉落又抽枝自從一見桃花後直至如今更不疑玄沙云諦當甚諦當敢保老兄未徹在師云説什麼諦當更參三十年始得上堂僧問如何是佛師云獨木橋子學云如何趣向師云緊峭草鞋乃云幸然可憐生剛地學參問既然參得了未免肚裏悶悶即自家悶困即自家困祖佛生冤家好與槌一頓且道佛祖過在什麼處若人會得許你具一隻眼桐樹郭宅請升座云桐林郭評事家門幸食祿性靜好吾宗溫良如美玉封疏請諸山營齋殖洪福二人長老共談玄正值陽和二月天渴鹿飲溪氷作水野猿啼樹霧成煙黃梅路上多知己今日同乘般若船乘船即不無且道説箇什麼事幸遇三春明媚因行不妨掉臂囉邏哩囉邏哩乃拍手大笑云是何曲調萬年歡上堂云二月春將半相呼同賞玩寒食近清明百花開爛熳或上白雲峯或遊赤水畔野外摽墳人路傍酒醉漢半笑半悲啼真誠堪讚嘆人人謂我泄天機子細分明與批判看看五湖禪客莫輕酬記取今朝者公案上堂舉趙州問婆子什處去婆云偷趙州笋去州云或遇趙州又作麼生婆連打兩掌州便休去師云趙州休去不知衆中作麼生商量白雲也要露箇消息貴要衆人共知婆子雖行正令一生不了趙州被打兩掌咬斷牙關婆子可謂去路一身輕似葉趙州高名千古重如山上堂云僧問雲門如何是一代時教門云對一説師云對一説卷盡五千四十八風花雪月任流傳金剛腦後添生鐵施主請上堂云道吾與漸源往山下弔慰源拊棺問曰生耶死耶吾云生也不道死也不道源云為什麼不道吾云不道不道回至中路源云和尚須與某甲道若不道即打和尚去也吾云打即任打道即不道源便打至院吾令潛去白雲今日忿氣不甘須要斷者公案道吾第一不解與身作主第二不能隨機入俗當初待伊問道生耶死耶但向伊道等歸院裏向你道當時若著得者語靈利漢一踏踏著大小大道吾和尚也又免得一頓拳頭有眼底子細看解夏上堂云九旬三箇月彈指瞥然間忙者直然忙間者直然間事事無窮盡千古白雲山上堂舉雲門一日普請般柴次乃拋下一片柴云一大藏教只説者箇師云大小雲門錯下注腳老僧當時若見向伊道普請處不得狼藉若點檢得出免你普請上堂僧問如何是先照後用師云王言如絲學云如何是先用後照師云其出如綸學云如何是照用同時師云舉起軒轅鑑尤頓失威學云如何是照用不同時師云金將火試乃舉僧問首山如何是佛首山云新婦騎驢阿家牽大衆莫問新婦阿家免煩路上波吒遇飯即飯遇茶即茶同門出入宿世冤家上堂僧問如何是臨濟下事師云五逆聞雷學云如何是雲門下事師云紅旗閃爍學云如何是曹洞下事師云馳書不到家學云如何是溈仰下事師云斷橫古路僧禮拜師云何不問法眼下事學云留與和尚師云巡人犯夜乃云會即事同一家不會萬別千差一半喫泥喫土一半食麥食麻或即降龍伏虎或即摝蜆撈蝦禾山唯解打鼓祕魔一向擎扠者箇一場戲笑皆因微笑拈花白雲隨隊骨董順風撒土撒沙若無者箇腸肚如何衣錦還家且道還家一句作麼生道今日榮華人不識十年前是一書生上堂云但知喫果子莫管樹曲彔不識曲彔樹爭解喫果子不過祖師關爭會敵生死如何是祖師關拈却大案山上堂云一向恁麼去路絶人稀一向恁麼來孤負先聖去此二途祖佛不能近設使與白雲同生同死亦未稱平生何也鳳凰不是凡間鳥不得梧桐誓不棲上堂舉法眼道識得橙子周匝有餘雲門道識得橙子天地懸殊師云這兩人一人過船一人渡水若點檢得出許你具正法眼上堂云望天祈好雪祥瑞實難加鵲噪青松上變成白老鴉紫騮牽出薄寒馬金鐙粧成銀鏤花苦苦苦箇什麼忽然變成雨石臺師弟至上堂僧問如何是和尚家風師云鐵旗鐵鼓學云只有者箇為復別有師云釆石渡頭看學云忽遇客來如何祗待師云龍肝鳳髓且待別時學云客是主人相師師云謝供養乃云昔日先師頌臨濟三頓棒云一拳拳倒黃鶴樓一躍躍翻鸚鵡洲有意氣時添意氣不風流處也風流大衆若到白雲門下須要衆人助拳上堂舉起拳頭云若喚作拳頭一似不曾行腳若不喚作拳頭對面相謾除此之外也少一拳不得出隊歸上堂云出隊半箇月眼不見鼻孔忘却祖師禪拾得箇骨董且道向什麼處著一分奉釋迦牟尼佛一分奉多寶佛塔謝首座上堂云彌勒看不見釋迦説不得恁麼尊貴生日用無差忒得不得識不識三德六味味逾多千古萬古為規則上堂僧問如何是燃燈前師云令人疑著學云如何是正燃燈師云錯認定盤星學云如何是燃燈後師云一場懡㦬乃云每月有箇十五無始劫來盡數數到彌勒下生未免有甜有苦且道畢竟如何南山白額大蟲元是西山猛虎上堂云日可冷月可熱衆魔不能壞真説大衆作麼生是真説潑狼潑賴若信不及白雲為你道一要衆人會二要龍神知乃拈起法衣云者箇真紅色剛然道是緋
