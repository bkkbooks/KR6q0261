山來師云近日打殺一門僧是否僧無語師云這箇蝦蟆問僧什麼處來僧叉手近前師云太狼籍生僧無語師云這掠虗漢問僧什麼處來僧云江西來師云江西米貴賤僧云不曾入師云念你遠來放你三十棒問僧什麼處來僧云江西來師云江西此去多少僧云不曾量度師云文彩已彰問僧什麼處來僧云江西來師云夏在什麼處僧云雲居師云有何言教僧云即今作麼師云這箇師僧親從高處來僧云和尚為什麼與麼道師云本色打米餅保老師問僧什麼處來僧云江西來師作打勢云踏破多少草鞋僧無語師云來來你曾過梅嶺麼僧云過師云今日好秋涼問僧什麼處來僧云江西來師云還有不喫飯底麼僧云有師云這箇是噇飯底問僧你頭上一問為什麼不道僧云什麼處不道師云且喜得你出頭來問僧什麼處來僧云雙林來師云途中事借問得麼僧云和尚問什麼處師云你上大人也未曾夢見出去勘看經僧第二問僧看什麼經僧云般若經師云鼻孔裏藏身鉢盂裏藏却匙筯眼睛裏換却髑髏刪在什麼經裏僧云某甲不知刪在什麼經裏師云來來祇如大般若經一切智智清淨是麼僧云是師拈起拄杖云見這箇麼僧云此是色法師云忽有人供養看經僧你也隨隊喫飯問僧曾看經是麼僧云是師云是又云不得謾我僧云和尚為什麼不領話師云果然唬我問僧什麼處來僧云雙林寺來師云傅大士道什麼僧云他不問和尚和尚又問他作什麼師云什麼處得這老婆説話來問僧什麼處來僧云雙林寺來師云還見傅大士麼僧云不錯祇對和尚師云吽吽牢裏作活計問僧什麼處來僧云雙林寺裏來師云在彼看經麼僧云和尚什麼處得這箇消息師云兩俱失有同學師兄來相看喫茶次師兄問行腳事作麼生師恰遇沙彌過茶次便與一摑咄這沙彌師兄云是即是你道我作麼生師云蝦跳不出斗問一僧今日施主開經麼僧云是師云好生著莫教錯僧云某甲不教錯師云入地獄如箭射問僧曾講經麼僧云不會師云去問僧看什麼經僧云涅槃經師云茶毗品最在後曾看麼僧云曾看師云大喻三千小喻八百問僧什麼處來僧云齋來師云將嚫錢來僧云和尚欠少什麼師云蝦蟆呌問僧什麼處來僧云齋來師云猴猻繫露柱問僧什麼處來僧云齋來師云打草蛇驚問僧什麼處去來僧云齋來師云施主還具眼麼僧云某甲罪過師云你為什麼隨我僧無語問僧什麼處來僧云齋來師云將什麼報答施主僧云不用更言師云斤不當兩僧云此是和尚分上事師云吽吽且放你三十棒問僧什麼處來僧云和尚莫錯伸一問師云爭奈頭上一條繩何僧云莫錯師云枷上更著杻問僧什麼處去來僧云齋來師云施主眼瞎師見僧瞻視云你大有年幾也僧云請和尚道師云四十六也未僧云莫錯師云這死蝦蟆問僧今日喫得多少鹽醋僧拈起鉢盂師云可惜許鹽醋牛欄裏作活計問一上座何不覓箇住處座云盡大地覓箇住處不可得師云繩子為什麼在我手裏座云和尚恁麼道即得師云非但髑髏鼻孔也穿過問一覺上座見説在叢林裏多口把不住是闍黎麼覺云和尚什麼處得這箇消息師云一任𨁝跳覺云不可語不得師云吽吽轉見敗闕又云老僧若置一問教你喪身失命覺云和尚不可壓良為賤師云蘇嚕蘇嚕娑訶又云來來是你曾看教麼教中道謗斯經故獲罪如是作麼生是教意覺云教中不説有意師云入地獄又拈起拄杖云這箇是什麼覺云拄杖師云這粘鑊湯漢問河北僧彼中有趙州和尚你曾到麼僧云某甲近離彼中師云有何言教示後徒僧云尋常問新到什麼處來僧云南方來州云喫茶去師乃呵呵大笑云慚愧又問祗如趙州意作麼生僧云此亦是方便師云趙州被你一杓屎潑僧無語師見僧辭去問什麼處去僧云往徑山去師云忽然有人問你作麼生道得一句語塞得伊口僧云某甲有語師云去問僧什麼處去僧云禮拜徑山去師云這老漢好打破髑髏著師見一僧云恰似箇律師一般驀然悟去一箭穿過髑髏三千里僧擬作問勢師云蘇嚕蘇嚕娑訶勘講經論座主大師第三師問僧正正應諾師云講唯識論麼正云不敢小年曾讀文字來師拈起糖餅擘破作兩片你作麼生正無語師問僧正喚作糖餅是不喚作糖餅是正云不可不喚作糖餅師却喚沙彌來來你喚作什麼沙彌云糖餅師云你也講得唯識論有紫衣大師來參師師見來便拈起帽子問大師京中喚作什麼大師云朝天帽師云恁麼則老僧不去也大師無語師問大德曾蘊何業德云小年曾習唯識論師云三界唯心萬法唯識是麼德云是師指門扇云這箇是什麼德云色法師云簾前賜紫對御談玄五戒不持德無語問座主講什麼經主云法華經師云與老僧講來主云某甲依章疏師云你不會講主云某甲實不會講却請和尚講師云你不是聽經人主云昨日蒙和尚慈悲為某甲今日講師云三段不同今當第一主云此是古人章疏師云你見箇什麼道理主無語師云這喫夜飯漢不能打得你去有座主善解二十四家書師問你解二十四家書是否主云不敢師遂於空中作書勢云是什麼字主云不會師云吽吽這箇阿師脫空妄語道我解二十四家書永字八法也不識主無語師云來來曾講華嚴經否主云不敢師云不怪伸一問得麼主云和尚問什麼師咄云講得碗裏又云你問我主云請和尚講師云心不負人主云不會師云對牛彈琴問座主講什麼經主云涅槃經師云開口便作屎臰氣主云爭奈古教何師云奴見婢殷勤不肯休主無語師云近前來主便近前師云祇這也無主宰便打一日有座主來師問見説座主講得經是否主云不敢師云吽吽這喫夜飯保老師云來來講得什麼經論主云唯識法華經師云拈起鼻孔將兩耳來主云鼻孔作麼生拈得師云這念言語漢又云法華經云十方國土中唯有一乘法是否主云是師云佛殿裏即不問三門頭鴟鶻上道將一句來主云此是玄機師云玄你屋裏老爺脫空妄語漢有講論座主來參師師云你為什麼義墮主云和尚未曾問某甲師云西天則斬頭截臂我這裏與你口喫飯有一座主講得七本經論來參師師云你是講得七本經論是否主云不敢師拈起拄杖驀頭打一下主云某甲不因和尚洎虗過一生師云道什麼主擬開口師便打主云謝和尚重重相為師云依稀近佛莽鹵為僧有一座主講得六本經論來參師師云見經中有問論中有主主云某甲依章疏講不會玄機師云你講得碗裏主云某甲也未曾分外師云出去有座主來參師師問莫便是講唯識論是麼主云不敢師云朝去西天暮歸唐土會麼主云不會師云吽吽五戒不持問座主講什麼經主云講華嚴經師云更有箇漢子即不問你文殊普賢又作麼生主云不會師云近前來主便近前師便打一棒云會麼主云不會師云飢逢王膳不能餐病遇醫王爭得瘥與你注解了問僧講什麼經主云金剛經師云曾講辨正論麼主云不敢師云五戒不持又問講金剛經是否主云是師拈拄杖云是什麼主云此是色法師云講得碗裏又云經中道凡所有相皆是虗妄若見諸相非相即見如來是否主云是師云這脫空妄語漢噇夜飯保老師問座主蘊何業主云唯識論師云教中言作麼生主云某甲祇是尋行數墨却是禪門中不知師云實語當懺悔問講金剛經座主荷擔如來即不問你寺門前金剛為什麼入你鼻孔裏去主云和尚什麼語話師云你講得夢裏問講楞嚴經座主經中有八還四義是否主云是師以拄杖點一童子頂上一下云是什麼義主無語師云此義文長赴在來日問如何是自己事師云老僧不解相怪速禮三拜又云觀世音菩薩進云不會師云大慈悲菩薩西峯長老來置茶果次師問今夏在甚麼處安居峯云蘭溪師云多少衆云七十餘人師云時中將何示徒峯拈起柑子師云著甚死急師問僧近離甚處云瀏陽師云彼中老宿祇對佛法大意道甚麼云遍地無行路師云老宿實有此語那云實有師拈拄杖打云這念言語漢師見僧行胡餅乃問行甚麼云胡餅師云這俗漢雲門來敲門師云阿誰門云文偃師開門攔𦚾扭住云道道門擬議師便推出云秦時𨍏轢鑽師問秀才先輩治甚經才曰治易師云易中道百姓日用而不知且道不知箇甚麼才曰不知其道師曰作麼生是道才無對僧問一氣還轉得一大藏教也無師曰有甚饆饠䭔子快下將來問如何是禪師曰猛火著油煎師臨終召門人曰此處緣息吾當逝矣乃跏趺而寂郡人以香薪焚之舍利如雨乃收靈骨塑像於寺壽九十八臘七十六睦州和尚語録小序師法嗣黃檗初住睦州觀音院常餘百衆得數十載後捨衆住開元寺房織蒲鞋鬻養母親時人號為陳蒲鞋其機鋒語句今集之二三焉睦州和尚名道蹤嚴州人姓陳氏受業不載得法於黃檗運和尚馬祖第四世唐宣宗懿宗時人
