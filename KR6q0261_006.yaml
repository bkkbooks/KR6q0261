body:
  text: 睦州和尚語録南嶽下五世嗣黃檗上堂對機第一上堂云你諸人還得箇入頭處也未若未得箇入頭須得箇入頭若得箇入頭不得辜負老僧又云明明向你道尚自不會豈況蓋覆將來問如何是學人自己師云觀世音菩薩進云學人不會師云大慈悲菩薩問如何是祖師西來意師云一隊衲僧來一隊師僧去問如何是展演之言師云量才補職進云如何是不展演之言師云伏惟尚饗問如何是向上一路師云你問將來我與你道進云便請道師云抖擻多年穿破衲襤毿一半逐雲飛問請師講經師云買帽相頭進云謝師慈悲師云拈頭作尾拈尾作頭還我第三段來問如何是徑截一路師云大衆久立速禮三拜進云請師道師云有頭無尾漢又云來來還我徑截一路來僧無語有座主問某甲雖講得經兼行腳不會教意時如何師云灼然實語當懺悔進云乞師指示師云你若不問老僧緘口無言你既問老僧不可緘口去也進云便請道師云心不負人面無慚色問知時者是大沙門如何是大沙門師云我向鼻孔裏問你進云作麼生問師云自領出去又云來來我共你葛藤你却問我問如何是大沙門師云觀世音菩薩會麼進云不會師云大慈悲菩薩問以一重去一重即不問不以一重去一重時如何師云昨日栽茄子今朝種冬瓜問一句道盡時如何師云義墮也進云什麼處是某甲義墮處師云三十棒教誰喫問祖意與教意是同是別師云青山自青山白雲自白雲進云如何是青山師云還我一滴雨來進云學人道不得請師道師云法華峰前陳涅槃句後收上堂大衆雲集師云章表將來時有僧出應諾師云據狀領過問佛法大意請師舉唱師云我者裏不曾泥裏洗土塊你諸方作麼生道僧無語有大德曾講法華經來問和尚某甲雖講不會教家大意極則處師云不得錯舉問如何是向上事師指一僧云那箇師僧何不問僧無語有僧舉雪峰語乞師指示峰云是什麼學云乞師指示峰云因什麼到與麼地舉了僧遂問祇如雪峰和尚意作麼生師便打師看經次僧問看什麼經師云金剛經僧云六朝翻譯次當第幾師云一切有為法如夢幻泡影問如何是教意師云我不答你進云和尚為什麼不答師云為你念來問如何是西來意師云那箇師僧何不近前來僧便近前師云我喚浙東人干浙西人什麼事問如何是曹溪的的意師云路逢劒客須呈劒不是詩人莫獻詩時有座主問三乘十二分教某甲粗知未審宗門事乞師提綱師云問著宗門事有什麼難道恰問著老僧鼻孔你頭上漫漫腳下漫漫教家喚作什麼主云教家無這箇意旨師以拄杖趂上堂云汝等快與快與老僧七十九也看看脫去也僧便問師百年後向什麼處去師云三十年後有人舉在問迦葉上行衣誰人合得披師云抖擻多年穿破衲襤毿一半逐雲飛會麼僧云不會師云有時挂向肩頭上也勝時人著錦衣問終日著衣喫飯如何免得著衣喫飯師云著衣喫飯進云不會師云不會即著衣喫飯有座主問三乘十二分教即不問如何是宗門中事師云老僧入你鉢囊裏主云和尚為什麼在學人鉢囊裏師云有什麼檳榔豆蔻速將來主云和尚欠少箇什麼師云這賊今日敗也進云學人乍入叢林乞師指示師云量才補職進云學人咨和尚師咄云這扶籬摸壁漢三家村裏保頭也不能作得師因赴齋回有僧就師乞嚫錢師云赴齋得三十文僧云便請師云施者雖無厭受者應知足問佛法大意請師提綱師云拈將來與你提綱進云便請和尚道師云拆東籬補西障有僧名宗闡宗闡咨和尚師云住僧便住師咄云名也不識又云有闡即判快道快道闡無對有俗官問一氣還轉得一大藏經麼師云有什麼絁紬快將來問古人有言究竟一路如何是究竟一路師云吽吽你這榜子我這裏難遇筆墨兩狀一時領過進云某甲有什麼過師便打趂問從上已來老宿作家還有差別異路難會底道理麼師云有進云如何是差別異路難會底道理師云待你三生六十劫信去始得進云某甲乍入叢林乞師指示師云你不解問進云和尚作麼生師云放你三十棒自領出去問十方國土中唯有一乘法如何是一乘法師云你若不問我即不知你若問我我即知進云為什麼如此師云吽吽什麼處得這箇問來僧無語問説即振動乾坤不説即絲毫不挂説即是不説即是師云道什麼僧再舉師云這脫空謾語漢進云某甲話在師云説即振動乾坤是你恁麼道僧云是師拈拂子便打云吽吽這裏嚇我來問教意請師提綱師云但問將來我與你道進云便請道師云佛殿裏裝香三門頭合掌問學人有問未審師還許也無師云灼然賊來須打客來須看進云未審和尚作麼生道師云這賊不能打得你問三乘十二分教從何而得師云對機故得問請和尚答一轉語得麼師云得進云請便道師拽拄杖趂上堂云不受謾底人出來有僧出應諾師云被我挑一塊屎劈喉嚨塞却劈眼打也爭不受謾師因看金剛般若經僧問和尚看甚經師云無二無二分無別無斷故會麼僧云不會師云我念經也不得有俗官問和尚依教不依教師云光剃頭淨洗鉢作麼生不依教師因齋次有俗官問請師施食師云三德六味施佛及僧吽吽快將來老僧要喫俗官云請和尚施財師云弟子施財和尚施法先到老僧後到佛又俗官問弟子今日開藏經乞師一句提綱藏經師云此問難得官云便請提綱師云對牛彈琴師因看經次僧問和尚看什麼經師云涅槃經茶毗品最在後問如何是超佛越祖之談師驀拈拄杖示衆云我喚作拄杖你喚作什麼僧無語師再將拄杖示之云超佛越祖之談是你問麼僧無語師因焦山借斧頭師喚童子取斧頭來童子取得來向師前云未有繩墨且斫粗師遂喝又喚童子來來作麼生是你斧頭童子遂作斫勢師云斫你屋裏老爺頭不得師舉黃檗和尚語云天下老和尚一氣道在我者裏要放你也在我這裏要不放你也在我這裏僧便問如何是一氣道師云量才補職僧云如何是不放一氣道師云伏惟尚饗問如何是禪師云猛火著油煎問不擇一切請師提綱佛法師云山河大地畜生驢馬進云為什麼不會師云你若被我把住直須百雜碎僧云和尚不可一向師云不信道百雜碎問近入叢林乞師方便師云你近入叢林進云是師云心不負人面無慚色進云某甲不會師云近前來與你注解僧近前師云去上堂大衆侍立師喝出去大衆不出去師又再喝大衆茫然師舉拄杖一時趂下去師因看華嚴經僧問是什麼經師云大光明雲青色光明雲紫色光明雲那邊是什麼雲僧云南邊是黑雲師云今日應有雨又云將為是箇師子兒元來是箇老鼠兒上堂云還有踏倒禪牀底出來有僧出來應諾師云北來拋鈎釣鯨鯤下場頭却釣得箇蝦蟆出來問如何是禪師云還我第二段來進云不會師云三段不同萬里崖州問如何是佛師云裂轉鼻孔問如何是葛藤一句師云山河大地是你問進云如何提綱拈掇師云到我問問托即乾坤大地不托即絲髮不逢時如何師云吽吽不曾見師却問先𨁝跳三千里倒退八百你作麼生學云諾師云先責一狀好打者漢又云來來我共你葛藤托即乾坤大地你且道洞庭湖水深多少進云不曾量度師云是洞庭湖水又作麼生進云祇為今時師云這葛藤尚不會得便打問大衆雲臻合談何事師云作麼問華藏海即不問如何是向上一路師云好來好來師舉古人語次問大衆云三乘十二分教成得箇什麼邊事有僧云今日大衆普請不易師云不要將出來僧云打鼓喫藥石師云莫拈出僧云和尚得恁麼忉忉生師云我也祇要你恁麼道問如何是觸途成滯底句師云我也祇道進云作麼生道師云吽吽箭過西天十萬里向大唐國裏等候僧打門問己事不明乞師指示師才開門僧擬開口問師便劈口摑問如何是學人入頭處師云一不得了進云某甲不會師云這箇語話三十年後大行問如何是禪師云摩訶般若波羅蜜進云不會師云抖擻多年穿破衲襤𣯶一半逐雲飛睦州僧正并諸大德衆請師上堂師問僧正僧正應諾師云監寺𠰚正云不在師云都監闍黎𠰚正云不在師云上座𠰚正云不在師云三段不同今當第一向下文長赴在來日不詞謹退便起諸大德罔措師舉古人語云揑聚也在我裂破也在我僧問如何是裂開師云菩提涅槃真如解脫三九二十七還我第一籌來又云即心是佛我且恁麼道你作麼生僧云某甲不恁麼道師云盞子落地楪子成七片僧云如何揑聚師乃斂手而坐一日睦州刺史問如何是禪宗事師云近前來近前來史近前師云得恁麼脫空妄語史無語師遂問曾見什麼人來史云曾見恁麼老宿來師云更作麼生史云看經來師驀打牀一下云教中喚這箇作什麼史云教中不説師云教中道治生産業與正理不相違背又作麼生史無對師又打牀一下云大凡喚這箇作什麼史云喚作牀師云這喫飯粘漢睦州陳操尚書因齋次尚書自行餅餤與僧僧遂引手接尚書却縮手僧無語尚書與諸官在鎮樓上坐忽見有數僧來官人云有幾箇衲僧來尚書云不是官人云爭知不是書云待來到這裏與你勘其僧遂至尚書驀喚云上座上座僧回首無語書云不信道上堂衆集師云忽然忽然有僧出來云却請大衆歸堂去師拍繩牀一下云苦殺人僧遂回頭師舉拄杖一時趂下問如何是佛法徑截師云三人兩人不問進云便請和尚道師云三人一狀領過問一言道盡時如何師云吽吽築著老僧當門齒進云已蒙和尚指示師云有頭無尾漢錢唐去國三千里僧無語問一句淨盡時如何師云摘却你眉毛換却你眼睫僧無語師云吽吽脫空謾語漢問如何是向上一路師云朝看東南暮看西北問不涉廉纖請師道師云三段不同今當第一向下文長赴在來日問如何是教意師云還我一問來進云未審和尚作麼生道師云吽吽不敢望你分外話也不領問如何是量才補職師云不要補進云為什麼不要補師云蝦蟆之類別有一僧出來請和尚道師云不要攪擾百姓養子方知父慈會麼僧云如何是養子方知父慈師云心不負人面無慚色問如何是禪師云歸依佛法僧進云不會師云咄這蝦蟆得與麼惡業問學人有疑請師一決師云獨掌不浪鳴進云不會師云隻絲不成束自領出去問徑截處乞師指示師云早朝有人問了也進云早朝有人問了且致請師道師云三門頭市合金剛腳子小兒子簸錢問如何是教意師云一問不再舉問如何是一代時教師云上大人丘乙己問如何是急師云通你一問進云如何是急中急師云朝向西瞿耶尼暮向北鬱單越俗官問弟子廣陳供養師有何方便師云祇怕你不問官云便請和尚道師云心不負人面無慚色問以八不成是何章句師彈指一下云會麼進云不會師云上來講讚無限勝因蝦蟆𨁝跳上天蚯蚓驀過東海問如何是子師云這死兒進云如何是子之機師云昨日有師僧趂出去你今日又來這裏進云過在什麼處師云敕貶朝官問如何是機前一句師云老僧一問教你摸進云莫便是麼師云對牛彈琴問正當説時時如何師云你為什麼話墮進云什麼處是話墮處師云擔枷過狀萬里崖州自領出去問大衆雲集合談何事師云那箇師僧置將一問來學人舉頭師便打云老僧却不恁麼進云未審和尚作麼生問師云佛殿裏裝香三門頭合掌又云你不解問進云未審作麼生問師云速禮三拜放你三十棒又云後園生菜熟水淘飯問如何是向上事師云向下文長又云慚愧解問進云請和尚道師云心不負人面無慚色問如何是教眼師云十方國土中唯有一乘法進云此是經文師云驢年會麼進云如何是教眼師云量才補職問如何是衲僧眼師云朝看東南暮看西北上堂云觀自在菩薩行深般若