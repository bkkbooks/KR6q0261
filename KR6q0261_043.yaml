法王法法王法如是卓拄杖下座上堂拈拄杖云涅槃心易曉差別智難明古人道你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子歸宗則不然你有拄杖子我奪却你拄杖子你無拄杖子我與你拄杖子大衆芭蕉與麼歸宗不與麼且道與麼是不與麼是擲下拄杖云是什麼良久云是即龍女頓成佛非即善星生陷墜上堂山門今日供養羅漢為十方檀越酬還心願亡者生天現存獲福召云大衆但祇隨例餐䭔子莫問人間短與長復拈起拄杖云我生已盡梵行已立所作已辦不受後有三界不奈伊何堪受人天供養這一隊少叢林漢總好與二十拄杖喝一喝下座上堂大衆彼我雖殊根塵有異然則性自平等無平等者平等尚無況有不平等者驀拈拄杖云情與無情共一體處處皆同真法界遂擲下云撲落非他物且道是什麼物喝一喝下座隆慶長老來上堂大衆教中道佛滅度後為善知識者總是見佛來然則其為善知識者亦不可容易覩善知識者亦不可輕慢隆慶禪師斯之謂也老僧與知事首座大衆同增歡慶乃喝一喝云虎溪宗派龍山子孫吉州隆慶大啓禪門古人所謂從門入者不是家珍驀拈起拄杖云為是家珍為是外物大衆却請隆慶禪師決斷擲下拄杖下座因開福專使至上堂近有人從成都來乃得潭州信却説廬陵米價高驀拈起拄杖云風行草偃擲下云是什麼喝一喝下座上堂日往月來大盡小盡光陰已去生死漸近大衆總是祖師門下客須知生死不相關且道歸宗與麼説話還有過也無良久云父母不聽不得出家上堂舉昔日臺山路上有一婆子凡有僧問臺山路向什麼處去婆云驀直去僧擬行婆云好箇阿師又恁麼去師云遊臺山者憧憧往來莫知其數未有一人不被伊瞞唯趙州一日謂衆曰臺山下婆子被老僧勘破了也大衆雖然不受伊瞞若點檢來也好喫婆手中棒且道趙州過在什麼處若知趙州過方解不受人瞞歸宗門下莫有不受人瞞底麼喝一喝下座上堂如來大師云不能了自心如何知正道又寒山菩薩云一念了自心開佛之知見大衆是什麼直下了取拈拄杖云何誰不見阿誰不知知見分明又擊禪床云阿誰不聞阿誰不了了心平等若此觀者名為正觀若他觀者名為邪觀卓拄杖下座上堂良久云船子下揚州大地無寸土蛇咬蝦蟇聲更有衆生苦驀拈拄杖擲下云今朝二十五喝一喝下座上堂今朝六月旦萬物隨時變地肥茄子多雨足甜瓜賤紅桃大似拳緑李圓如彈誰識歸宗大道心拈來一一人難辨驀拈拄杖云你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子又作麼生辨若辨得出不虗在歸宗過夏若辨不出禪床且替他喫棒乃擊禪床下座上堂大道不假雕鐫人心何須造作但知一切臨時拈來無非妙藥驀拈拄杖云豈不是妙又擲下云拋來擲去有什麼過乃喝云才有是非紛然失心上堂古人有大智慧隨宜自在無可不可故僧問古德如何是古佛心答云墻壁瓦礫是僧云墻壁瓦礫豈不是無情德云是僧云無情還解説法否德云常説熾然説無間歇其僧於言下大悟證無情説法師云古佛身心如飲醍醐渴心永寂奇特甚奇特安樂則不妨安樂若是德山臨濟烜赫兒孫他亦不喫這般茶飯何也不是他所食之物且道德山臨濟兒孫所食何物良久乃噓噓佛法門中可謂刁刀莫辨魚魯難分下座上堂今朝六月二十五莫問超佛及越祖但祇粥飯飽便休日月朝昏自回互驀拈拄杖云回互不回互佛殿走出三門僧堂跳過廚庫拄杖子穿却諸人鼻孔回而更相涉乃擲下良久云不爾依位住喝一喝下座上堂一葉落天下秋廬山山北到江州驀拈拄杖擲下云若知撲落非他物須信縱橫得自由解夏日上堂四月十五結夏七月十五解夏世俗諦中有秋有夏有解有結佛法門中無是無非無得無失莫非妙用有時結也九十日內水泄不通聖凡路絶誰敢咳嗽若咳嗽也須是你解咳嗽始得有時解也十方通徹去來自在亦須知有路頭去處始得且道不解不結又作麼生良久喝一喝下座上堂欲識佛性義當觀時節因緣昨日撞鐘送法眼入塔今朝擊鼓集禪衆升堂千般時節萬種因緣總不出這箇大衆且道這箇是什麼乃喝云異生見解我執不同又爭怪得老僧上堂今朝八月中秋正是月圓當戶所謂盲者不見非日月之咎故經云是法平等無有高下迷者自迷悟者自悟大衆當知不得莽鹵上堂一切衆生總一般妙明日用更無偏等間却被邪師指剛道西來別有禪驀拈拄杖云且道是西來是妙明心地復擲下云試斷看喝一喝下座上堂云今朝九月一夜來霜氣寒當知門外路一一透長安喝一喝下座上堂諸州丐士經年去次第歸來復納疏打鼓普請共證明今朝九月二十五大衆證明則不無須知鉢盂飯粒粒皆辛苦鉢裏飯滋味大衆總知歸宗道今朝九月二十五又且如何良久乃呼侍者參退請諸郡化主喫茶喝一喝下座上堂今朝十月一天下暖爐開衲僧頂門眼依舊蒙塵埃歲月既已往死生還到來床添新藁薦一任雪成堆遂拈袈裟角云大衆人人有分須是頂門眼開始得喝一喝下座上堂古人所謂終日忙忙那事無妨師云不妨簡要只如開單展鉢拈匙把筯揚眉瞬目有什麼妨處行住坐臥動靜去來又有何異驀拈拄杖敲香卓云妨箇什麼復擲下云不可喚作忙也敢問大衆那事作麼生良久喝一喝下座上堂是日已過命亦隨減如少水魚斯有何樂唯二乘禪定寂滅為樂是為真樂學般若菩薩法喜禪悅為樂是為真樂三世諸佛慈悲喜捨四無量心為樂是為真樂石霜普會云休去歇去冷湫湫地去是謂二乘寂滅之樂雲門云一切智通無障礙拈起扇子云釋迦老子來也是謂法喜禪悅之樂德山棒臨濟喝是三世諸佛慈悲喜捨之樂除此三種樂不為樂也且道歸宗一衆在三種內三種外良久云今日莊主設饡飯俵嚫錢參退僧堂內普請喫茶去喝一喝下座上堂萬法是心光諸緣唯性曉本無迷悟人只要今日了好大衆修山主見處與大衆見處日用無差大衆見處與歸宗長老見處日用無差歸宗見處與雲峰山主日用無差雲峰見處與深首座日用無差乃喝云莫分彼我彼我無差心光共曉日用堪誇驀拈拄杖云阿誰不見阿誰不曉擊香卓云阿誰不聞復擲下云是什麼喝一喝下座上堂舉龐居士云十方同聚會箇箇學無為此是選佛場心空及第歸大衆總是選佛之人既到歸宗門下須是一箇箇心空及第歸不可作長行粥飯僧彼此出家離世俗誰言祖獨有南能上堂今朝臘月初五有事為君直舉靈湯禪師到來救濟大開府庫差珍異寶不慳所好臨時揀取雖然一一歸宗不妨却分賓主乃喝云且道是賓是主復喝云賓主歷然久參到此也須莽鹵上堂獨樹不成林人人總知有梵剎一才興大家出隻手驀拈拄杖云家家門前火把子復擲下云各自看取喝一喝下座上堂今朝臘月二十五雲門一曲為重舉驢腳佛手總現前明眼衲僧多莽鹵喝一喝下座上堂滿目文殊普賢境界直下分明道無不在驀拈拄杖擲下云拋來擲去有什麼過喝一喝下座上堂二月仲春漸暄時來萬化可憐到處桃紅柳緑石頭也生暖煙驀拈拄杖擲下云有意氣時添意氣不風流處也風流喝一喝下座上堂靈光獨耀迥脫根塵體露真常不拘文字此是百丈大智禪師舉揚大衆作麼生良久云在家疑是客別國却為親喝一喝下座上堂南閻浮提衆生以音聲為佛事所謂此方真教體清淨在音聞是以三乘十二分教五千四十八卷一一從音聲演出乃至諸代祖師天下老和尚種種禪道莫不皆從音聲演出庭前柏樹北斗藏身德山呵佛罵祖臨濟喝豈不從音聲演出何況世間所有一切事法不從音聲成就者然後音聲無盡演説無盡見聞無盡利樂無盡苟入此法門得旋陀羅三昧自在海良久唱云十方羅漢喝一喝下座上堂今朝三月初五正是清明景序豈獨遊人往來更兼蜂狂蝶舞須信自在神通彼此性真妙具萬物總非斷滅衲僧別求禪悟棄本逐末喝一喝云驢年下座上堂今朝三月初十劄久雨不晴船子下揚州東海鯉魚打一棒洞庭湖裏浪滔天須知大道本無偏喝一喝下座上堂今朝三月十五又是月圓當戶祖意教意同別但看雞寒上樹驀拈拄杖云春無三日晴夏無十日雨復擲下云處處緑楊堪繫馬家家門底透長安喝一喝下座上堂如來世尊云菩薩覺成就故不與法縛不求法脫不敬持戒不憎毀禁不重久習不輕初學何以故一切究竟覺彼此成佛故如是則僧也如是俗也如是凡也如是聖也如是賢也如是愚也如是驀拈拄杖云拄杖子亦如是擲下云如是如是上堂舉西天昔有七女遊尸陀林見一死尸妹問姊曰尸在這裏人在什麼處姊曰妹妹妹應喏姊曰在什麼處於是空中散花女曰空中散花者誰應曰我是帝釋見聖者善説般若感我天宮特來散花聖者欲何所須我當供給女曰別無所須只要箇無根樹子帝釋曰我天宮無種不有若要無根樹子即無女曰帝釋帝釋應喏女曰這箇是什麼帝釋遂隱去大衆且道帝釋是會了隱去不會了隱去又道善説般若感我天宮又道無無根樹子大衆且作麼生明得不辜負聖女若也不會不得辜負帝釋歸宗亦有箇無位真人憨憨癡癡跛跛挈挈且恁麼過時喝一喝下座王主簿到上堂僧問雲門大師欲一棒打殺釋迦老子和尚又欲糞掃堆頭窨殺雲門未審和尚罪過還許學人點撿也無師云且莫造次學云和尚坐斷廬山為什麼不識某甲這話師云三十棒學云關師云點學云劄師云念汝做街坊復云憶在報寧時彼彼各年少而今住山來各各已衰老休話人間短與長相逢把手呵呵笑呵呵笑逍遙自合無為道驀拈拄杖敲香臺云不可不自在復擲下云不可不逍遙喝一喝下座上堂僧問馬祖下尊宿一箇箇屙轆轆地唯有歸宗老較些子黃龍下兒孫一箇箇硬剝剝地祇有真淨老師較些子學人恁麼道還扶得也無師云打疊面前搕𢶍却進云若不同床睡焉知被底穿師不對進云這箇為上上根忽遇中下之流如何指接師亦不對進云非但和尚一場懡㦬學人亦乃一場敗闕師云三十年後悟去在復云一切禪與道觸目無非妙貴賤但臨時不要生機巧驀拈拄杖云三世諸佛説不到諸代祖師傳不及遂擲下云是什麼喝一喝下座住寶峰禪院語録師開堂日接得左司手中疏乃示衆云左司傳授炟赫現前泐潭把呈分明薦取薦與不薦却付與表白表白擬接復收回云不見到權柄在手縱奪臨時非但泐潭如是左司衆官神通變化各各具足却度與表白宣罷於是就座問話畢師乃云適來白槌云法筵龍象衆當觀第一義且道何名第一義如何所觀大衆當知欲得分明現前可以直截自觀若能自觀名為正觀若他觀者名為邪觀而今莫有能自觀者麼既能自觀即能他觀且道即今左司衆官僧俗大衆一一是箇什麼噫觀音妙智力能救世間苦可謂一一圓妙一一本靈一一神通變化總不欠少了無生死可相關若不能自觀者為迷真覺性還却受輪回然洪州乃江西大都督府古今已來人傑地靈佛事興盛昔有馬祖以禪道化人亮座主乃教法救世亮一日來參馬祖祖曰見説座主大講得經論是否亮云不敢祖云將什麼講亮云將心講祖曰心如工伎兒意如和伎者又爭講得經亮乃抗聲云心既講不得虗空莫講得麼祖曰却是虗空講得亮不肯便出去祖召云座主亮回首豁然大悟師云而今聞却是虗空講得多便向虗空裏釘橛殊不識馬大師神通光明解黏去縛又龐居士問馬祖云不與萬法為侶者是什麼人祖曰待汝一口吸盡西江水即向汝道師云禪門多作奇特商量玄妙解會又不見馬大師威光自在裁長補短又大梅初參馬祖問如何是佛祖曰即心是佛師云如今往往向即心裏喪身失命須還他馬大師觀機設法應病與藥一切臨時無可不可其大梅蒙馬師開示豁悟本心一得永得更不他觀直入深山庵居巖穴後因有僧遊山見之問曰庵主住此山多少時梅曰只見四山青又黃僧又問出山路向甚麼處去梅曰隨流去祖聞之令一僧去問云和尚見馬師得箇什麼便住此山梅曰馬師向我道即心是佛我便向這裏住僧云馬師近日佛法又別梅云作麼生別僧云又道非心非佛師云且道馬大師還有為人底意也無梅云這老漢惑亂人未有了日在任汝非心非佛我祇即心是佛師云知恩方解報恩僧回舉似祖祖召大衆云梅子熟也龐居士遂去問梅曰久嚮梅子熟還許學人摘喫也無梅云你向什麼處下口士云百雜碎梅云還我核子來師云且道此二人相見還有優劣也無梅臨遷化時聞鼯鼠聲乃曰即此物非他物汝等善護持之吾今逝矣師云大衆既非他物是什麼物復云近有無盡居士曰大都此物非他物豈有南宗與北宗如今衲子多是爭南宗北宗雲門臨濟却被箇俗漢子點破雲門臨濟兒孫不勝懡㦬久立諸官伏惟珍重入院上堂馬祖傳心石門泐潭乾師總師前三後三老僧到來如何指南遂拈拄杖云你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子良久云我雖與你同條生不與你同條死乃擲下拄杖喝一喝下座因雙林下生長老來上堂云寶山不易到既到莫空回莫有不空回者麼遂擲下拄杖云是什麼良久云不見雙林釋迦老又聞彌勒下生來喝一喝下座上堂今朝正月二十五孟春猶寒人共舉分明佛法不二門甜者自甜苦者苦喝一喝下座開馬祖塔日上堂放過一著落在第二有利無利不離行市家家門外緑柳垂不獨春風折桃李馬祖堂開二月初二觸目遇緣法門大啓不如歸去來良久云向什麼處去馬祖堂中燒香罷僧堂裏喫茶施主看藏經請上堂云毗盧藏中有大經卷舍真空而體寂鏡妙色以圓明驀拈拄杖云三世諸佛一大藏教盡在裏許阿誰不見阿誰不聞聞見分明是箇什麼喝一喝下座出外歸上堂歸來閏二月閴寂寶山中城隍耳目盡塵勞萬事空春水緑野花紅須信禪家道莫窮信手拈來一枝草臨機生殺任西東上堂舉僧問馬祖如何是佛祖曰即心是佛師云馬大師也是看孔著楔然現前一衆雖不受馬駒所踏是不可忘古人大慈悲故誰教從來今日清明良久云與大衆同到塔上燒香上堂今朝二月二十五野草間花相共舉信手拈來一一玄癡人莫認庭前樹衆中莫有不受惡水潑者麼遂拈拄杖擲下云祇這拄杖子亦不辜負大衆喝一喝下座上堂時光迅速那事如何雖然如是我不敢輕於汝等汝等皆當作佛故先覺云一切障礙即究竟覺驀拈拄杖云不是究竟覺遂擲下拄杖云拋來擲去有何障礙喝一喝下座上堂今朝三月初十知事首座大衆尊候萬福良久云山前大小麥穗也未直歲照顧牛馬莫教踐踏秧苗典座厨中調和衆口監院庫下坐籌帷幄決勝千里諸寮舍各各照顧火燭勝上座設饡飯供養馬祖大寂禪師大衆總飽老僧亦飽驀拈拄杖云拄杖子亦飽山河大地亦飽遂卓云參退堂中喫茶上堂擲下拄杖云撲落非他物且道是什麼物縱橫不是塵既不是塵是箇什麼山河及大地全露法王身山河大地諸人總見那箇是法王身良久云只為分明極都緣日用親上堂一夏九十日看看將欲畢為報求佛人今朝七月一教中道佛身無為不墮諸數且道如何是無為佛身於此薦得不逐四時之所遷萬物之所變若也不薦人漸老又經秋等間白却少年頭喝一喝下座上堂今朝八月初五禪家安間國土甜則甘草元甜苦則黃檗元苦若也得意忘言自然超今越古上堂古人道毫釐有差天地懸隔且道毫釐不差又如何良久云僧堂裏喫茶上堂今朝八月十五又是月圓當戶月不照人人不問月彼此不相干趙官家國土不如歸去來田中晚稻近日好雨喝一喝下座化主回上堂演上人今日作齋供養羅漢為供養過去耶見在耶未來耶若供養過去已過去未來未至見在無住三世既不有一心何所依乃召云演上座正好供養過去亦如是見在亦如是未來亦如是彼亦如是此亦如是一切諸法亦如是復召云演上座正好供養供養亦如是如是如是上堂道德經曰大巧若拙大辨若訥師云達人到此身心一如身外無餘十方世界只在目前上堂一年十二月倐忽又臨頭人漸老水長流世有何人便肯休休休不如歸去來自有無繩水牯牛喝一喝下座上堂方上人今日為施主供養羅漢且道羅漢來也無若來在什麼處若不來又供養他作什麼乃顧謂大衆云要識真羅漢麼元來總在這裏復召云方上座還見麼正好供養來無所從去無所至一一不生一一不滅性真妙明常住世間清淨本然周遍法界若也如是萬兩黃金亦消得若不如是滴水難消老僧隨例餐䭔子也得三文買草鞋聖節上堂率土之土皆屬王土率土之民莫非王民今朝臘月八日當釋迦如來成道之辰是今上皇帝降誕之日所謂前聖後聖聖德共明人王法王王道同久應千年之慶運統萬國之歡心伏惟皇帝陛下萬歲萬萬歲復召衆云大殿上念佛祝延聖壽下座上堂舉佛在之日有一女人禮佛乃於座前入定佛遂敕文殊出之文殊入百千金剛三昧出女子定了不可得時有網明亦入三昧唯彈指三下女子從定便起師云且道文殊與網明見處還有優劣也無若道無文殊何故出女子定不得只如今日擊動法鼓大衆齊到座前與網明出女子定為是同是別不見古人道欲識佛性義當觀時節因緣大衆總是祖師門下參玄上士試觀看若見得出家事畢解脫安樂世俗塵勞不用間觀喝一喝下座上堂數日出入或風或雨或陰或晴或聚或散或鄉或村或縣或邑及至歸來三門依舊向南開復云大衆歸堂喫茶上堂出家沙門清淨佛子莫於袈裟下失却人身所以古人道了即業障本來空未了還須償夙債且道袈裟下了箇什麼便業障本來空未了箇什麼還須償夙債出家門中也須子細不得莽鹵一等行腳離鄉別井出一叢林入一叢林訪尋善知識決擇生死直須子細假饒了得我更問你只如僧問雲門二祖是了未了雲門云確衆中作麼生商量時中如何受用大衆要會麼良久云昨日化主歸山一年在外化導不易有利無利不離行市喝一喝下座上堂西瞿耶尼北鬱單越家家門前長安道到處通徹驀拈拄杖云拄杖頭上千差萬別乃擲下拄杖喝一喝下座
