body:
  text: 寶峰雲庵真淨禪師住金陵報寧語録二師開堂日拈香云此一瓣香恭為今上皇帝祝延聖壽萬歲萬萬歲伏願堯風永扇同日月之盛明湯德彌新共乾坤而久固此一瓣香恭為報寧大檀越主特進相公判府左丞伏願舉族享於百祥小大增乎善慶更冀特進相公判府左丞兄兄弟弟長為佛法之塹牆子子孫孫永作皇家之梁棟此一瓣香奉為提刑大夫運判朝奉洎文武官僚常居祿位然提刑衆官總同二相公夙承佛記示作王臣佛法長興外護斯在以因向果皆成佛道於是趺坐白槌云法筵龍象衆當觀第一義師乃垂一足云大衆為是一耶是二耶良久云上士一決一切了中下多聞多不信有疑請問僧問昔日梵王請佛蓋為群迷今朝相公請師當為何事師云看進云與麼則靈山一會今日親聞師云聞底事作麼生進云大衆證明師云錯問遠離洞山丈室已坐報寧道場如何是不動尊師云東西南北進云一言已布王官耳吾道今朝得再昌師云大家在者裏進云相公證明學人禮謝問昔日李公登藥嶠雲在青天水在瓶今日丞相請師未審有何言句師云金桃帶葉摘緑李和衣嚼進云與麼則法不孤起仗境方生師云重疊關山路進云洎乎蹉過師云不少也僧問曹溪一路闔國人聞報寧一路什麼人聞師云天下人聞進云莫是和尚為人處也無師云且得你承當進云作家宗師師云一任闍黎卜度復云欲識佛性義當觀時節因緣時節既至因緣自會大衆今日一會要知麼是大衆成佛時節淨緣際會大丞相荊國公及判府左丞施宅舍園林為佛剎禪門固請大善知識開演西來祖道所以教外別傳直指大衆即心見性成佛大衆信得及麼若自信得及即知自性本來作佛縱有未信亦當成佛但為迷來日久一乍聞説誠難取信以至古今天下善知識一切禪道一切語言亦是善知識自佛性中流出建立而流出者是本佛性是末近代佛法可傷多棄本逐末背正投邪但認古人一切言一為禪為道有甚干涉直是達磨西來亦無禪可傳唯只要大衆自悟自成佛自建立一切禪道況神通變化衆生本自具足不假外求如今人多是外求蓋根本自無所悟一向客作數他人珍寶都是虗妄終不免生死流轉大衆今二相公特建此大道場作大佛事出大衆生死流轉復大衆本來廣大寂滅妙心開發本來神通大光明正法眼藏但迷則長居凡下悟則即今聖賢大衆言多去道轉遠笑他明眼道人衆中莫有明眼道人麼今時佛法混濫要分邪正使大衆不墮邪見作人天正眼有麼良久云我終不敢輕於汝等汝等皆當作佛下座上堂淨法界身本無出沒大悲願力示現受生乃拈拄杖云釋迦老子又來也只為子孫不了大衆若喚作釋迦又是拄杖子若喚作拄杖子又是釋迦於此莫有人斷得麼若無報寧潑惡水去也良久云容顏甚奇妙光明照十方我昔曾供養今復還親覲遂擲下下座因請主事上堂祖師門下燈燈相續心心相印一燈滅而一燈然一心隱而一心照故萬般之事須藉心明心若不明是事失準諸禪德要不失準麼僧堂裏大家著力上堂日出心光曜天陰性地昏不知天地者剛道有乾坤直饒識得心大地無寸土廓徹十方自性境界觸事全真若透不過眼不開俱屬勝量己見愚故菩薩遊戲神通淨佛國土成就衆生心不喜樂所以若論此事實謂止止不須説我法妙難思諸增上慢者聞必不敬信乃喝云向下文長上堂臘月二十八一年將合煞孟春又到來萬事從頭活遂拈拄杖擲下召大衆云拄杖子已活也見麼為他無佛法禪道知見所以不被四時八節聲色所轉諸禪德莫也要活麼但是事一時放下當人一大事全體出現自然活𡎺著礚著䶥䶥齖齖如虎戴角阿呵呵下座上堂好諸禪德若能離諸相定入法王家法王法道廓無涯威德自在勝伏群邪一心空寂妙用河沙上堂七分八分百億妙門黃龍老傑纍及兒孫然則知恩方解報恩莫有解報恩底麼你是箇漢才聞報寧説汝只道得七八分便好拽倒地上驀面唾槌煞擲與狗喫豈不快哉亦未為分外阿呵呵空將未歸意説向欲行人上堂舉臨濟一日與普化在施主家齋濟云毛吞巨海芥納須彌為復是神通妙用法爾如然化便踏倒卓子濟云得即得太粗生化云者裏是什麼所在説粗説細至明日又去一家齋濟又問昨日供養何似今日化又踏倒卓子濟云得即得太粗生化云瞎漢佛法説甚粗細師云古人一等參禪悟得脫灑見處明白得用便用不在擬議之間何也為他無佛法知見為礙而今莫有無佛法為礙者麼良久喝云設有又打在無事甲裏請首座上堂一番新一番舊新舊相資要成就諸禪德且道成就箇什麼為成就佛事耶成就道場耶成就叢林耶若與麼成就豈有教外別傳乃拈拄杖云此為復是教內教外是新是舊不得喚作拄杖子便成就取好遂擲下下座上堂僧問如何是佛師呵呵大笑進云何哂之有師云我笑你隨語生解進云偶然失利師遂高聲云不要禮拜僧便歸衆師復笑云隨語生解復云好大衆也無禪也無道也無玄也無妙快活當明者一竅一竅不明愁殺人動即依他和屎合尿參上堂法無定旨深淺隨機通人分上祇可自知莫有通人麼點則不到喝一喝下座上堂僧問學人一面琴不是凡間木今朝捧上來請師彈一曲師云大衆側耳進云得聞於未聞去也師云是何指法僧提起坐具師云哀哉哀哉汝命何太短進云且喜勿交涉師云不是知音進云不如歸去來蔥嶺有人憶師云何得忘却焦桐進云在者裏師云放下著復云適來一曲諸人罔措再為一彈快須聽取驀拈拄杖橫按良久云一曲兩曲聞不聞悲風流水何方去卓拄杖下座上堂長安甚閙我國晏然驀拈拄杖云雲門大師來也劄久雨不晴以拄杖敲香卓云新羅在海東臨濟小廝兒祇具一隻眼普化賊漢佯狂詐顛叵耐豐干饒舌指出文殊普賢上堂心隨萬境轉轉處實能幽隨流認得性無喜亦無憂好諸禪德恁麼也得不恁麼也得恁麼不恁麼總得如來説一合相即非一合相須菩提好與三十棒下座上堂僧問聲前薦得未是作家喝下承當猶為鈍漢學人上來請師相見師云家富小兒嬌進云也是説道理師云與你一文錢進云今日不著便師云養子之緣僧便喝師云不要哭不要哭問昔日相國之家今朝佛僧之舍未審是同是別師云白鷺灘頭月進云不曉師機願垂方便師云緊捎草鞋僧擬議師云重疊關山路復云萬般施設不如常又不驚人又久長好諸禪德古人道處今人行處可謂似地擎山不知山之孤峻如石含玉不知玉之無瑕良久云祇恐不是玉是玉也大奇上堂舉三聖問雪峰透網金鱗以何為食峰云待你出得網來即向你道三聖云一千五百人善知識話頭也不識師云俊哉俊哉快活快活恰似一隻子莫驚著報寧即不然透網金鱗以何為食待你出得網來即向你道待他道一千五百人善知識話頭也不識但拽拄杖打出三門外復云也好快活恰似一隻虎莫動著諸禪德且道報寧快活何似三聖快活莫有快活底漢麼出來定當看良久喝一喝云把手拽不住上堂僧問爇香煙上騰集四衆座下為復是神通法爾為復是總不與麼師云一時被闍黎道了也進云有意氣時添意氣不風流處也風流師云你作麼生會僧便喝師云儱侗禪和僧又喝師擲下拂子云何不更打一棒僧擬議師云棒上不成龍問真淨界中才一念閻浮早是八千年還許學人稱真淨之名也無師云許進云若然者永劫飄流無時解脫師云百草頭上薦取老僧進云恁麼則小出大遇去也師云且莫錯認好僧禮拜師云果然復云佛法二字也大難明三世諸佛向你諸人腳跟下走過你擬要見他早是眼睛落地驀拈拄杖擲下云你且道三世諸佛與拄杖子相去幾何良久喝一喝下座上堂舉雪峰云南山有條鱉鼻蛇你等諸人出入好看師云雪峰無大人相然則蛇無頭不行長慶恰如箇新婦兒怕阿家相似便道堂中今日大有人喪身失命雲門拽拄杖攛向雪峰面前作怕勢師云為蛇畫足玄沙云用南山作什麼師云道我見處親切不免只在窠窟裏更無一人有些子天然氣槩報寧門下莫有天然氣槩底麼不敢望你別懸慧日獨振玄風且向古人鶻臭布衫上知些子氣息也難得上堂舉起拄杖云舉起也靈光洞曜迥脫根塵復斜亞云放下也體露真常不拘文字不舉不放復名何物遂擲下云看良久喝一喝下座上堂云東家杓柄長西家杓柄短拈起黑漆盆却是白瓷碗大唐天子笑不休火裏蝍蟟三隻眼參住廬山歸宗語録開堂日宣疏罷師拈香乃趺坐棲賢長老白槌了便有僧出問草庵孤坐誰知出格家風拄杖橫空未審是何宗旨師云雲間五老水滿雙溪進云若然者劒為不平離寶匣藥因救病出金瓶師云一條界破青山色進云忽遇五馬行春日萬家和氣生又且如何師云却被闍黎道著進云海神知貴不知價留與人間光照夜師云靈利衲僧問飛錫一聲天地動爐煙起處遍乾坤為國開堂於此日師將何法報皇恩師云耶舍塔前消息在進云皇恩答處蒙師指朝宰臨筵事若何師云已有隨車雨何須動地雷進云若然者虎出渡河皆此日珠還合浦賀今朝師云知恩有幾人復云諸佛心印祖祖傳授所謂教外別傳者蓋取其要妙也其要妙之道在人不在教乘所以歸宗長老得之以妙明心印印僧俗大衆彼我無差同成佛道還信得及麼權郡大夫得之以妙明心印印一郡千里之事則自然殊途同歸一毛頭一一明了一一無差然後卷舒自在縱奪臨時皆吾心之常分非假於他術提刑都官得之以妙明心印印十方華藏世界海祇在一毛頭於中或行或坐或去或來遊山玩水選勝尋幽法喜禪悅皆吾心之常分非假於他術衆官得之各以妙明心印印之則王事民事一一明了一一無差然後可行則行可止則止皆吾心之常分非假於他術諸山禪師得之三世諸佛一切法門各以妙明心印印之則法法明了一一無差然後應機接物通變臨時或日面月面佛手驢腳或豎拂拈槌或呵佛罵祖作大佛事皆吾心之常分也遂拈拂子劃云劃斷葛藤便擲下云是什麼良久喝一喝下座師在筠州九峰辭衆晚參遂舉拂子云昔日世尊拈花迦葉微笑今夜歸宗舉拂大衆寂然為復寂然者是微笑者是又是箇什麼只如歸宗舉拂與世尊拈花是同是別若言同法無同相若言別豈有兩般久參先德聞舉便了後進初機却須子細良久云法法總歸宗臨機要變通靈源明妙處平等主人翁師初入寺升座僧問遠公符命禪師俯應機祖令當行也方便指群迷師云深進云深意又如何師云淺進云學人如何領會師云點云大衆證明學人禮謝師云老僧今日失利問遠離九峰丈室已屆歸宗道場如何是不動尊師云鷓鴣啼處百花香進云萎花風掃去香水雨飄來師云今也如是古也如是進云若然者將為少林消息斷如今蹤迹宛然存師云如何是少林消息僧禮拜師云點即不到師云佛法要妙但歸其宗苟歸宗也自然無可不可一切成現海印發光今與大衆同已歸宗住平等本際敢問何者是宗何者是要妙良久云祇為分明極翻令所得遲上堂為新舊化主云舊者已還新者復作新舊相資放過一著遂拈拂子云不可作新舊會既不作新舊會又落在什麼處若知落處受用無窮若不知落處亦受用無窮知落處受用無窮則可知不知落處因甚麼受用無窮明眼衲僧試斷看上堂舉赤眼因見蛇便與斬斷傍僧云久嚮歸宗元來只是箇粗行沙門眼曰你粗我粗師云大衆只知赤眼斬蛇向其僧道你粗我粗且古人見處作麼生遂舉拂子云今日歸宗舉拂子與當時歸宗斬蛇是同是別良久云人人有箇真天佛妙用縱橫總不知今日分明齊指出斬蛇舉拂更由誰上堂頭陀石被莓