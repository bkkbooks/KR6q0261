body:
  text: 東林和尚雲門庵主頌古侍者悟本錄舉世尊未離兜率已降王宮未出母胎度人已畢東林頌是非海裏橫身入豺虎羣中自在行莫把是非來辨我平生穿鑿不相關雲門頌利刃有蜜不須䑛蠱毒之家水莫甞不䑛不嘗俱不犯端然衣錦自還鄉舉世尊纔生下乃一手指天一手指地周行七步目顧四方云天上天下唯我獨尊東林頌老胡不免出胞胎也解人前恁麼來指地指天稱第一眾生四十九年災雲門頌老漢纔生便著忙周行七步似顛狂賺他無限癡男女開眼堂堂入鑊湯舉世尊在靈山會上拈花示眾是時眾皆罔措唯迦葉尊者破顏微笑世尊云吾有正法眼藏涅槃妙心分付摩訶大迦葉東林頌海水翻空滾底流魚龍蝦蟹信沉浮可憐金色頭陁子直至如今笑未休雲門頌拈起一枝花風流出當家若言付心法天下事如麻舉外道問佛不問有言不問無言世尊良久外道遂讚嘆云世尊大慈大悲開我迷雲令我得入作禮而去阿難問佛云外道有何所證而言得入佛云如世良馬見鞭影而行東林頌迷悟髑髏前徒勞更舉鞭只持鷄狗戒不學祖師禪雲門頌兩處牢關擊不通纖塵不動自乖宗忽然業鏡百雜碎黃面瞿曇失却蹤舉達磨大師九年面壁東林頌少室山前風過耳九年人事隨流水若還不是弄潮人切須莫入洪波裏雲門頌金鼇一挈滄溟竭徒自悠悠泛小舟今日烟波無可釣不須新月更為鈎舉二祖立雪多時達磨問曰汝當何求二祖云請師安心達磨云將心來吾為汝安二祖良久云覔心了不可得達磨云為汝安心竟東林頌二祖當年立少林滿庭積雪到腰深叉手當胷無一事不求不覔不安心雲門頌覔心無處更何安嚼碎通紅鐵一團縱使眼開張意氣爭如不受老胡瞞舉世尊在靈山會上有一女人近彼佛坐入于三昧文殊白佛云何此女人得近佛坐而我不得佛云汝但覺此女令從三昧起汝自同之文殊遶女人三匝鳴指一下乃托至梵天盡其神力而不能出世尊云假使百千文殊亦出此女人定不得下方過四十二恒河沙國土有罔明菩薩能出此女人定須臾罔明從地湧出作禮世尊世尊勑罔明出此女人定罔明却至女人前鳴指一下女人於是從定而出後有老宿問僧文殊是七佛之師為什麼出女人定不得罔明為甚却出得東林頌不假文殊神通休要罔明彈指爾時靈山會中女子從定而起雲門頌出得出不得是定非正定罔明與文殊喪却窮性命舉讓和尚一日云道一在江西為人說法總不見寄箇消息來遂遣一僧往馬祖處候見伊上堂但出問云作麼生待渠有語記取來其僧依教往問之祖曰自從胡亂後三十年不曾少鹽醬東林頌胡亂三十年不少鹽與醬江西馬大師南嶽讓和尚雲門頌見得分明識得親舉來猶自涉途程直饒不犯毫芒者也是拈䭔䑛指人舉百丈再參馬祖祖竪起拂子丈云即此用離此用祖掛拂子於舊處良久祖云你已後開兩片皮將何為人丈取拂子竪起祖云即此用離此用丈亦掛拂子於舊處祖便喝百丈直得三日耳聾東林頌江西一喝動乾坤大用全機是滅門三日耳聾風過樹累他黃蘗喪兒孫雲門頌馬駒喝下喪家風四海從茲信息通烈火焰中撈得月巍巍獨坐大雄峯舉南陽忠國師一日喚侍者侍者應喏如是三召三應國師云將謂吾辜負汝却是汝辜負吾東林頌世路風波不見君一回見面一傷神水流花落知何處洞口桃源別是春雲門頌啞子得夢與誰說起來相對眼麻迷已向人前輸肺腑從教他自覔便宜舉溈山示眾云有句無句如藤倚樹疎山問忽遇樹倒藤枯時如何溈山呵呵大笑歸方丈疎山隨後云某甲三千里賣却布單特為此事來和尚何得相弄溈山遂喚侍者云取錢與這上座去遂囑云向去有箇獨眼龍為子點破去在後聞明招出世徑去禮拜招問甚處來曰七閩云曾到大溈麼曰曾到云大溈有何言句山遂舉前話招云溈山頭正尾正只是不遇知音山便問忽遇樹倒藤枯時如何招云却使溈山笑轉新山於言下省悟乃曰溈山元來笑中有刀東林頌有句無句藤倚樹元來白飯用米做高樓吹笛柳如烟滿地春風落飛絮雲門頌若將此語定綱宗孤負明招獨眼龍笑裏忽分泥水路方知千里共同風舉明招問僧虎生七子那箇無尾僧云第七箇無尾東林頌無尾大虫難傍近近前便是傷人命除非自解據號頭自然頭正尾亦正雲門頌第七於菟沒尾巴食牛之氣已堪誇叢林悱悱爭唇吻幾箇行人得到家舉南泉示眾云江西馬大師說即心即佛王老師不恁麼不是心不是佛不是物恁麼道還有過麼東林頌剔起便行三萬里只今休去八千年分明更為從頭舉一任諸方取次傳雲門頌倒腹傾膓說向君不知何故尚沉吟而今便如猛提取付與世間無事人舉南泉和尚示眾云心不是佛智不是道東林頌心不是佛智不是道青山白雲落花芳草若是靈利阿師終不回頭轉腦雲門頌雨散雲收後崔嵬數十峯倚欄頻顧望回首與誰回舉黃檗示眾云汝等諸人盡是噇酒槽漢恁麼行脚何處有今日還知大唐國裏無禪師麼時有僧出問只如諸方匡徒領眾又作麼生黃檗云不道無禪只是無師東林頌大唐國內無禪師禮拜歸堂更不疑堪笑河陽新婦子不如臨濟小廝兒雲門頌身上著衣方免寒口邊說食終不飽大唐國裏老婆禪今日為君注破了舉臨濟凡見僧入門便喝東林頌一喝喝上四禪天臨濟元來不會禪盡道朝陽生戶外不知夜月落堦前雲門頌入門便喝全無巴鼻引得兒孫弄粥飯氣舉臨濟坐次麻谷問十二面觀音那箇是正面濟下禪牀擒住云十二面觀音甚處去也速道速道麻谷却轉身坐禪牀濟拈棒便打麻谷接住相捉歸方丈東林頌大悲觀音開正面官不容針通一線鼠拽葫蘆有底忙鬼爭漆桶無人頌雲門頌昧却當陽箇一著牽來拽去牙施呈不知除却王維手更有何人畵得成舉臨濟問僧什麼處來僧便喝濟便揖坐僧擬議濟便打又一僧來濟竪起拂子僧禮拜濟便打復見僧來立竪起拂子僧不顧濟亦打東林頌主賓都落第三機陣陣開旗不展旗石火光中分勝負倒騎鐵馬上須彌雲門頌五月五日午時書赤口毒舌盡消除更饒急急如律令不須門上畵蜘蛛舉臨濟云赤肉團上有一無位真人常在汝等諸人面門出入未證據者看看時有僧出問如何是無位真人濟下繩床搊住云道道僧擬議濟托開云無位真人是什麼乾屎橛東林頌面門出入見還難無位真人只尺間去路一身輕似葉高名千古重如山雲門頌腦後見腮村僧大開眼了作夢雖然趂得老鼠一棒打破油甕舉趙州訪臨濟州纔洗脚濟便下來問如何是祖師西來意州云正值老僧洗脚濟近前側聽州云會即便會啗作麼濟拂袖便行州云三十年行脚今日為人錯下注脚東林頌洗脚處更不安排側聆時非是啗趙州臨濟二老人相見何曾不注脚雲門頌一人眼似鼓槌一人頭似木杓兩箇老不識羞至今無處安著舉趙州問南泉如何是道泉云平常心是州云還假趣向也無泉云擬向即乖州云不擬又爭知是道泉云道不屬知不屬不知知是妄覺不豁豈可強是非耶州於言下頓悟玄旨東林頌若謂平常心是道枝蔓向上更生枝貼肉汗衫如脫了喚來眼上與安眉雲門頌勸君不用苦勞神喚作平常轉不親冷淡全然沒滋味一回舉起一回新舉趙州云諸人被十二時使老僧使得十二時東林頌百年三萬六千日一日朝昏十二時使殺老僧渾不管不知閙裏有誰知雲門頌使得十二時辰呼來却教且去倚官挾勢欺人茫茫無本可據舉趙州一日將拄杖上茱萸法堂東西來去萸云作什麼州云探水萸云我這裏一滴也無探箇什麼州將拄杖靠壁而去東林頌茱萸這裏無一滴趙老無言便走去春去秋來三百年拄杖至今猶靠壁雲門頌深淺聊將拄杖探忽然平地起波瀾傾湫倒嶽驚天地到海方知徹底乾舉趙州一日從殿上過乃喚侍者一聲侍者應喏州云好一殿功德侍者無對東林頌殿上喚來先應喏不知業識太茫茫雖然功德已成就爭柰當初不放光雲門頌好一殿功德總是過去佛百福相嚴身不使旃檀刻日日香烟夜夜燈看來當甚乾蘿蔔舉趙州問投子大死底人却活時如何投子云不許夜行投明須到東林頌大死底人還却活不許夜行投明到陳州人出許州門翁翁八十重年少雲門頌禾黍不陽豔競栽桃李春翻令力耕者半作賣花人舉臺山有一婆凡僧問臺山路向甚處去婆云驀直去僧纔行三五步婆云好箇師僧又恁麼去後有僧舉似趙州州云待我去為勘過這婆子明日便去亦如是問婆亦如是對州歸謂眾曰臺山婆子我已為勘破了也東林頌劈面三拳連腮七掌盡大地人不知痛癢雲門頌天下禪和說勘破爭知趙州已話墮引得兒孫不丈夫人人黠過冷地臥舉趙州問南泉知有底人向什麼處去泉云山前檀越家作一頭水牯牛去州云謝師答話泉云昨夜三更月到窻東林頌眼中見慣是尋常又不驚人又久長留得寒窻夜來月三更依舊照茅堂雲門頌度體裁衣量水打碓毫髮不差且居門外舉趙州一日在方丈內聞沙彌喝參州向侍者云教伊去侍者纔教去沙彌便珍重州向傍僧云沙彌得入門侍者在門外東林頌得入門在門外說向人人不會更高聲我耳背雲門頌琴瑟風松蕭蕭雨檜師子咬人韓獹逐塊舉趙州一日在東司上見文遠過遂喚云文遠遠應喏州云東司上不可與你說佛法東林頌老僧正在東司上不將佛法為人說一般屎臭旃檀香父子之機俱漏泄雲門頌趙州有密語文遠不覆藏演出大藏教功德實難量舉趙州一日共文遠行次忽指面前地云這裏好造箇巡鋪遠便近前展兩手云把將公驗來州與一掌遠云公驗分明過東林頌天子居閙市裏老僧在百草頭擺手御街來往不怕巡火所由雲門頌一正一邪一倒一起文遠趙州裏動指舉趙州一日在佛殿上見文遠禮佛以拄杖打一下遠云禮佛也是好事州云好事不如無東林頌平生侍奉老師全無些子氣息佛法妙性天機一字教他不得雲門頌文遠修行不落空時時瞻禮紫金容趙州拄杖雖然短腦後圓光又一重舉僧問趙州狗子還有佛性也無州云無僧云上從諸佛下及螻蟻皆有佛性狗子為什麼却無州云為伊有業識在東林頌宣德門前過回頭便招禍若要無事時且歸屋裏坐雲門頌有問狗佛性趙州答曰無言下滅胡族猶為不丈夫舉趙州示眾云金佛不度爐木佛不度火泥佛不度水真佛屋裏坐東林頌金佛木佛泥佛度爐度水度火盡入趙州紅爐烈焰光中煅過一聲白雪陽春萬古無人能和雲門頌九十七種妙相顧陸筆端難狀趙州眼目精明見心肝五臟舉僧問趙州萬法歸一一歸何所州云我在青州作一領布衫重七斤東林頌半夜墨漆黑捉得一箇賊點火照來看元是王大伯雲門頌青州七斤衫盡力提不起打破趙州關總是自家底舉僧問趙州承聞和尚親見南泉是否州云鎮州出大蘿蔔頭東林頌鎮州出大蘿蔔頭師資道合有來由觀音院裏安彌勒東院西邊是趙州雲門頌參見南泉王老師鎮州蘿蔔更無私拈來塞斷是非口雪曲陽春非楚詞舉僧辭趙州州云甚處去僧云南方學佛法去州云你到南方有佛處不得住無佛處急走過三千里外逢人不得錯舉僧云恁麼則不去也州云摘楊花摘楊花東林頌有佛之處不得住無佛之處急走過三千里外摘楊花他日歸來舉似我雲門頌有佛處不得住生鐵秤鎚被虫蛀無佛處急走過撞著嵩山破竈墮三千里外莫錯舉兩箇石人相耳語恁麼則不去也此語已行遍天下摘楊花摘楊花唵嚤呢噠哩吽㗶吒舉趙州問僧甚處來僧云雪峯來州云雪峯近日有何言句僧云雪峯道盡大地是沙門一隻眼汝等諸人向甚處屙州云上座若去為我寄箇鍬子與雪峯東林頌大地是眼何處屙天下不柰雪老何趙州寄箇鍬子去方得此話圓堶堶雲門頌途路波吒數十州傳言送語當風流不知脚下泥生刺踏著錐人脚指頭舉保壽問胡釘鉸莫便是否鉸云不敢壽云還釘得虗空麼鉸云請打破虗空來壽便打云他後有多口阿師與你點破在胡釘鉸後舉似趙州州云你因什麼被他打鉸云不知過在什麼處州云只這一縫尚不柰何更教打破胡釘鉸便領州却云且釘這一縫東林頌一縫分明在當頭下手難饒君釘鉸得終是不圓全雲門頌直饒釘得這一縫點檢將來非好手可憐兩箇老禪翁却向俗人說家醜舉有僧與疎山造壽塔了來白疎山山問你將多少錢與匠人僧云一切在和尚山云為將三文與匠人為將兩文與匠人為將一文與匠人若道得與吾親造塔僧無對羅山時在大庾嶺住庵其僧到羅山問甚處來云疎山來羅山云近日有何言句僧遂舉前話羅山云還有人道得麼僧云未有人道得羅山云你却回舉似疎山道大嶺和尚聞舉云若將三錢與匠人和尚此生決定不得塔若將兩錢與匠人和尚與匠人共出一隻手若將一錢與匠人帶累匠人眉鬚墮落其僧便回舉似疎山山聞此語具威儀望大庾嶺禮拜歎曰將謂無人大庾嶺有古佛光明射到此間却向僧云汝去大庾嶺道猶如﨟月蓮花其僧却回舉似羅山山云早已龜毛長數丈東林頌袖頭打領無添減腋下剜襟有短長大庾嶺頭一尊佛疎山兩度放毫光雲門頌鑿壞十方常住地三錢使盡露屍骸羅山古佛雖靈驗未免將身一處埋舉羅山在禾山送同行矩長老出門次山把拄杖向前一攛矩無對山云石牛欄古路一馬勿雙駒後有僧舉似踈山山云石牛欄古路一馬生三寅東林頌不踏門前路春歸又一年落花紅滿地芳草碧連天雲門頌出門握手話分携古路迢迢去莫追却笑波心遺劒者區區空記刻舟時舉德山一日飯遲先托鉢下堂雪峯時作飯頭纔見便問這老漢鐘未鳴鼓未響托鉢向什麼處去德山便歸方丈雪峯舉似巖頭頭云大小德山不會末後句德山聞舉令侍者喚巖頭來問你不肯老僧那頭密啟其意德山來日上堂言語異常頭於僧堂前撫掌大咲云且喜得堂頭老漢會末後句他後天下人不柰何雖然如是只得三年後三年果遷化東林頌鐘未鳴鼓未響依前托鉢歸方丈德山不會末後句巖頭密意誰相亮只得三年也大奇留與諸門作榜樣雲門頌一撾塗毒聞皆喪身在其中總不知八十翁翁入場屋真誠不是小兒戲舉雲門大師示眾云世界恁麼廣闊為什麼鐘聲披七條東林頌七條披向鐘聲上徧界難藏比丘相若以色見音聲求迦葉師兄是虗妄雲門頌鐘聲披起鬱多羅碧眼胡兒不柰何一箭雙鵰隨手落拈來元是柵中鵞舉德山凡見僧入門便棒東林頌棒下真鍮不愽金德山徹底老婆心後人只看波濤湧不見龍王宮殿深雲門頌入門便棒郎當不少依而行之胡麻廝繳舉百丈每日上堂常有一老人聽法一日不去百丈乃問立者何人老人云某甲於過去迦葉佛時曾住此山有學人問大修行底人還落因果也無對云不落因果墮在野狐身今請和尚代一轉語丈云汝但問老人便問大修行底人還落因果也無丈云汝昧因果老人於言下大悟東林頌百丈野狐塞雁㗸蘆李廣神箭張顛草書雲門頌不落不昧石頭土塊驀路相逢銀山粉碎拍手呵呵笑一場明州有箇憨布袋舉深明二上座同行見捕魚忽見一魚跳出網深云俊哉一似箇衲僧相似明云爭似當時不入他網深云你猶欠悟在明行三十里方省東林頌網中跳出便飛騰好箇天然俊衲僧何似當初未入網悟來方始是知音雲門頌俊哉一躍透重淵霹靂追之去不還却笑龍門燒尾者依前點額在波瀾舉甘贄行者詣南泉設粥南泉白槌云為狸奴白牯念摩訶般若波羅蜜行者便出去泉粥後問典座行者在甚處典座云當時便去也泉遂打破粥鍋東林頌狸奴白牯念摩訶爭似南泉打粥鍋雖然佛法無多子天下叢林不柰何雲門頌南泉打破閑家具浩浩諸方作話看今日為君重舉過明明歷歷不顢頇舉首山和尚拈起竹篦子問僧云喚作竹篦即觸不喚作竹篦即背且道喚作什麼東林頌舉起竹篦子如何便道家秘魔巖不會隨後便擎叉雲門頌背觸非遮護明明直舉揚吹毛雖不動遍地是刀鎗舉玄沙問僧甚處來僧云瑞巖來沙云瑞巖有什麼言句云和尚尋常喚主人公自應喏云惺惺著他後莫受人瞞沙云一等弄精魂猶較些子東林頌一主人公死一主人公活若解弄精魂兩頭皆透脫雲門頌瑞巖家風喚主人公昨夜南山虎咬大蟲舉興化見同參來纔上法堂化便喝僧亦喝化又喝僧復喝化近前拈棒僧又喝化云你看這瞎漢猶作主在僧擬議化直打出法堂侍僧問適來僧有何相觸忤化云是他適來也有權也有實也有照也有用我將手向伊面前橫兩遭到這裏去不得似這般瞎漢不打更待何時東林頌霹𮦷驚天地那容掩耳聽須知興化老一半是人情雲門頌鏌鎁在握天魔膽落明眼衲僧休更卜度舉興化謂克賓維那曰汝不久為唱導之師賓云不入這保社化云會了不入不會了不入賓云總不恁麼化便打云克賓維那法戰不勝罰錢五貫設饡飯一堂至來日興化自白槌去克賓維那法戰不勝罰錢五貫設饡飯一堂不得喫飯即時出院東林頌法戰從來許克賓掣旗奪鼓兩分明直須盡法方無媿老漢他年要話行雲門頌丹山生鸑鷟師子產狻猊棒下摩醯眼徒誇第一機舉興化謂眾曰我聞長廊下也喝後架裏也喝諸子汝莫盲喝亂喝直饒喝得興化上三十三天却撲下來一點氣也無待興化蘇息起來向汝道未在何故如此我未曾向紫羅帳裏撒真珠與你諸人去在你虗空裏胡喝亂喝作什麼東林頌紫羅帳裏撒真珠禪客相承總掠虗拍手呵呵開口笑釋迦彌勒是他奴雲門頌對眾全提摩竭令豈是閑開兩片皮喝下瞎驢成隊走夢中推倒五須彌舉興化上堂云今日不用如何若何便請單刀直入興化為你證據時有旻德長老出眾禮拜起來便喝化亦喝德又喝化又喝德禮拜歸眾化云適來若是別人三十棒一棒也較不得何故為他旻德會一喝不作一喝用東林頌單刀直入更休論擬議之間賓主分不是放他旻德過須知興化棒頭明雲門頌暗中携手上高山及至天明各自行無限中途未歸客明明開眼墮深坑舉三聖云我逢人則出出則不為人興化云我逢人則不出出則便為人東林頌人貧多智短馬瘦見毛長獨宿雙峯寺同焚一炷香雲門頌陽焰何曾能止渴畵餅幾時充得饑勸君不用栽荊棘後代兒孫惹著衣舉南泉見鄧隱峯來指淨缾云淨缾是境你不得動著境與我將水來峯將淨缾傾水於南泉面前泉便休歸宗云鄧隱峯也是亂瀉東林頌南泉不指淨缾隱峯何曾瀉水從教打瓦鑽龜佛法不在這裏雲門頌眼中無翳休挑刮鏡上無塵不用磨信脚出門行大路橫擔拄杖唱山歌舉石頭云恁麼也不得不恁麼也不得恁麼不恁麼總不得東林頌四海狼烟靜中原信息通罷拈三尺劒休弄一張弓雲門頌好箇話端阿誰解舉舉得十分未敢相許舉三聖問雪峯透網金鱗以何為食峯云待汝出網來即向汝道聖云一千五百人善知識話頭也不識峯云老僧住持事煩東林頌錦鱗透網欲吞舟一向衝波逆水流却被漁翁閑引釣隨波逐浪共悠悠雲門頌全死中全活全活中全死一箇訝郎當一箇福建子舉夾山云猿抱子歸青嶂後鳥㗸花落碧巖前法眼云我二十年作境話會東林頌三十年前此寺遊木蘭花發院新修如今再到經行處樹老無花僧白頭雲門頌境話會來雖未是却問如今作麼生清涼元本鼻頭直夾山依舊兩眉橫舉睦州喚僧僧回首州云擔板漢東林頌電火光中休草草劒輪鋒上莫忉忉等閑却放全身入終不當頭犯一毫雲門頌睦州擔板那容眨眼闊狹短長不須增減舉僧問睦州一氣還轉得一大藏經也無州云有甚饆羅䭔子快下將來東林頌睦州只受錐頭利這僧不見鑿頭方直饒轉得百千藏這般供養也尋常雲門頌一氣轉一大藏教頓漸偏圓權與實無邊妙義炳然彰元來一字也不識舉臨濟會中兩堂首座齊下喝僧問還有賓主也無濟云賓主歷然東林頌作家相見終不錯兩兩同時看啐喝下雖然賓主分爭如普化搖鈴鐸雲門頌以平報不平王法本無親臨濟雖明眼也是黃龍精舉普化常於街市搖鈴云明頭來明頭打暗頭來暗頭打四方八面來旋風打虗空來連架打臨濟令侍者去纔見如是道便把住云總不與麼來時如何普化托開云來日大悲院裏有齋東林頌慺㦬須要逞聰明金榜何曾得掛名捋下幞頭歸去也莫騎驢子傍人門雲門頌先師會裏呈真處臨濟堂前喫菜時連此三回露拴索咄這㳂臺盤乞兒舉明招一日天寒上堂大眾才集招云風頭稍硬不是你安身立命處且歸暖室商量便歸方丈大眾隨至立定招云才到暖室便見瞌睡以拄杖一時趂下東林頌風頭稍硬難安立暖氣纔通瞌睡來却笑明招閑費力無端兩處強差排雲門頌夜半明星當午現愚夫猶待曉鷄鳴可憐自屎不知臭又欲重新拈似人舉保壽開堂三聖推出一僧壽便打聖云恁麼為人非但瞎却這僧眼瞎却鎮州一城人眼在壽擲下拄杖歸方丈東林頌棒頭瞎却一城人三聖撩地保壽瞋正令只堪提一半一盲引得眾盲行雲門頌提起須彌第一槌電光石火太遲遲象王行處狐蹤絕師子咆哮百獸危舉有一古德一日不赴堂侍者來請赴堂齋德云我今日在莊裏喫油糍飽侍者云和尚不曾出入德云你但去問取莊主侍者才出門忽見莊主歸謝和尚到莊喫油糍東林頌近在口皮邊遠過河沙國世間多少人不得油糍喫雲門頌和尚不赴堂莊主謝臨屈一字入公門九牛撤不出舉玄沙云若論此事喻似一片田地四至界分結契賣與諸人了也只有中心樹子猶屬老僧在東林頌萬事由王老師樹子未屬你在廣額屠兒成佛二祖大師償債雲門頌祖父田園都賣了四邊界至不曾留柰何猶有中心樹惱亂春風卒未休舉僧問首山如何是佛山云新婦騎驢阿家牽東林頌阿家新婦兩同條只尺家鄉路不遙可笑騎驢覔驢者一生錯認馬鞍橋雲門頌新婦騎驢阿家牽步步相隨不著鞭歸到畵堂人不識從今嬾更出門前舉烏臼見玄紹二上座來遂問二禪伯近離什麼處僧云江西臼便打僧云久嚮和尚有此機要臼云你既不會第二箇近前來僧擬議臼亦打云同坑無異土參堂去東林頌赤身挨白刃死中還得活一箭自迷蹤萬車皆喪轍雲門頌猛𦦨不容蚊蚋泊大海那能宿死屍任是三頭并六臂望風無不竪降旗舉僧問雲門如何是佛門云乾屎橛東林頌不用唐言譯休將梵語傳摩醯首羅眼對面隔西天雲門頌雲門乾屎橛全超法報化無事出山遊百錢杖頭掛舉僧問雲門不起一念還有過也無門云須彌山東林頌一念不起須彌山飜著襴衫退步看直上拄天下拄地言前薦得也顢頇雲門頌巍巍一座大彌盧荷負非于氣力麤縱使不隨言語會却來當面受荼糊舉僧問大愚芝和尚如何是佛芝云鋸解秤搥東林頌鋸解秤搥渾似鐵大愚老子重饒舌水流㵎下太忙生雲在嶺頭閑不徹雲門頌問佛如何是宗師即便酬秤搥將鋸解言外度迷流舉僧問興化四方八面來時如何化云打中間底僧便禮拜化云興化今日赴箇村齋回來中路撞著一陣卒風暴雨却向古廟子裏閃避得過東林頌一陣狂風驟雨來却於古廟且閑隈雖然打人鬼窟裏吞炭藏身又一回雲門頌古廟裏頭回避得紙錢堆畔暗嗟吁閑神野鬼皆驚怕只為渠儂識梵書舉雪峯示眾云望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也東林頌盡道親曾相見來依前還是狗來腮好將大棒驀頭榍貴得盲人便眼開雲門頌望州烏石與僧堂業識忙忙不可當提起衲僧拄杖子五湖四海沸如湯舉夾山示眾云目前無法意在目前不是目前法非耳目之所到東林頌年來萬事總成魔老去閑添白髮多道泰不傳天子令時清休唱太平歌雲門頌癡人面前休說夢生鐵團上須尋縫明明說與却作聾只管外邊閑打閧舉無業國師云若一毫頭凡聖情念未盡不免入驢胎馬腹裏去白雲端和尚云設使一毫頭凡聖情念淨盡亦未免入驢胎馬腹裏去東林頌一道如絃直心親手更親箭穿紅日影方是射鵰人雲門頌移身不移步移步不移身走却金師子捉得玉麒麟舉靈雲見桃花悟道東林頌桃花尋劒客不語笑春風白頭歸未得家住海門東雲門頌總道見桃花悟道此語不知還是無茫茫宇宙人無數那箇男兒是丈夫舉玄沙云諦當甚諦當敢保老兄未徹在東林頌敢保老兄猶未徹玄沙之言何太切君看陌上桃花紅盡是離人眼中血雲門頌打破鬼門關日輪正當午一箭中紅心大地無寸土舉洞山云言無展事語不投機承言者喪滯句者迷東林頌只要拔榍抽釘為人解粘去縛如何洞山老人先自藤虵繞脚雲門頌言無展事語不投機承言者喪滯句者迷逢人不得錯舉舉琅琊和尚問舉和尚近離甚處舉云浙中瑘云舡來陸來舉云船來瑘云船在甚處舉云舡在步下琊云不涉程途一句作麼生道舉云杜撰長老如麻似粟拂袖便行瑘却問侍者這僧是何人侍者云舉道者琊遂去安下處見問莫便是舉師叔麼莫恠某甲適來相觸忤舉便喝復問長老何時到汾陽瑘云恁時舉云我在浙中早聞你名元來見解只如此何得名喧宇宙瑘乃作禮東林頌官路無人獨自行兩家公驗甚分明路傍偷販私鹽客草裏蹲身過一生雲門頌奪得驪珠即便回小根魔子盡疑猜拈來拋向洪波裏撒手大家歸去來舉僧問風穴語默涉離微如何通不犯穴云常憶江南三月裏鷓鴣啼處百花香東林頌快騎駿馬上高樓南北東西得自由最好腰纏十萬貫更來騎鶴下揚州雲門頌忽爾出門先見路才方洗脚便登船神仙秘訣真堪惜父子雖親不可傳舉趙州訪道吾吾見來著豹皮裩把吉撩棒在三門前等候才見州來便高聲唱喏而立州云小心祗候著吾又唱喏一聲而去東林頌稽首兩足尊瞻仰不蹔捨眉間白毫光照耀大千界雲門頌有禮有樂有唱有酬人平不語水平不流舉臨濟遷化時示眾云吾滅後不得滅却吾正法眼藏三聖出云爭敢滅却和尚正法眼藏濟云已後有人問你向他道什麼三聖便喝濟云誰知吾正法眼藏向這瞎驢邊滅却東林頌到老不曾開話路臨行回首却叮嚀深深海底猶嫌淺直向金剛水際行雲門頌瞎驢一跳眾皆驚正法那堪付與人三要三玄俱喪盡堂堂把手出重城舉僧問乾峯十方薄伽梵一路涅槃門未審路頭在什麼處峰拈拄杖面前劃一劃云在這裏僧請益雲門門拈起扇子云扇子勃跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾東林頌乾峯不用指陳雲門休打骨董自然東海鯉魚築著帝釋鼻孔雲門頌撦破雲門一柄扇拗折乾峯一條棒二三千處管弦樓四五百條花柳巷舉雲門大師云聞聲悟道見色明心作麼生是聞聲悟道見色明心乃云觀世音菩薩將錢來買糊餅放下手云元來却是饅頭東林頌南無觀世音菩薩補陀岩上紅蓮舌不知成佛是何時打刀須用并州鐵雲門頌見色明心事已差聞聲悟道更交加觀音妙智慈悲力荊棘林生優鉢花舉雲門大師拈起拄杖舉教云凡夫實謂之有二乘扸謂之無緣覺謂之幻有菩薩當體即空乃云衲僧見拄杖但喚作拄杖行但行坐但坐總不得動著東林頌二乘菩薩何年盡諸佛凡夫早晚休世情但將公道斷人心難似水長流雲門頌剔開金殿鎻撞動玉樓鐘泣露千般草吟風一樣松舉陸亘大夫問南泉肇法師也甚奇恠解道天地與我同根萬物與我一體泉乃指庭前花召大夫云時人見此一株花如夢相似東林頌若知天地本同根終不應來更問人却得南泉親指似等閑花發夢中春雲門頌天地同根伸一問未曾擡步已亡家無陰陽處花重發玉本無瑕却有瑕舉玄沙示眾云諸方老宿盡道接物利生忽遇三種病人來作麼生接患盲者拈搥竪拂他又不見患聾者語言三昧他又不聞患瘂者教伊說又說不得且作麼生接若接此人不得佛法無靈驗東林頌盲聾喑啞接不得玄沙枉費閑心力扁鵲盧醫拱手歸三人俱是膏肓疾雲門頌玄沙三種病人話透出雲門六不收莫待是非來入耳從前知己反為讎舉玄沙見新到才禮拜沙云因我得禮你東林頌利刀自斷命根不要依草附木若有一法與人永入拔舌地獄雲門頌夫子不識字達摩不會禪玄沙無此語切莫妄流傳舉南院上堂云赤肉團上壁立千仞時有僧問赤肉團上壁立千仞豈不是和尚道院云是僧便掀倒繩床院云你看這漢亂做僧擬議院便打出院東林頌掌中擎白日舌上覆金錢壁立爭千仞毫光徹梵天雲門頌赤肉團邊用得親主賓有理各難伸兩箇駝子相逢著世上如今無直人舉百丈侍馬祖遊山歸忽然哭同事問曰憶父母耶丈云無事曰被人罵耶丈云無事曰哭作什麼丈云問取和尚同事往問馬祖祖云你去問取他同事回至寮中見百丈呵呵大笑同事曰適來為甚哭如今為什麼笑丈云適來哭而今笑同事罔然東林頌世間名利閑榮辱雲雨紛紛手翻覆悲歌相繼不堪論棒頭無眼黃粱熟雲門頌有時笑兮有時哭悲喜交并暗催促此理如何舉向人斷絃須得鸞膠續舉楊岐和尚問僧栗棘蓬你作麼生吞金剛圈你作麼生跳東林頌楊岐老人𤨏口訣萬里長城一條鐵斫牌禪客如到來不動金槌腦門裂雲門頌金剛圈栗棘蓬玄沙三種病石鞏一張弓直截為君說新羅在海東舉僧問楊岐如何是佛岐云三脚驢子弄蹄行僧云便恁麼去時如何岐云湖南長老東林頌三脚驢子忒㬠好長放後園教喫草等閑牽出向人前踢倒湖南瞎長老雲門頌楊岐一頭驢只有三隻脚潘閬倒騎歸攧殺黃幡綽舉僧問青原思和尚如何是佛法大意原云廬陵米作麼價東林頌廬陵米價少知音佛法商量古到今繡出鴛鴦任人看無端須要覔金針雲門頌老青原沒縫罅問佛法酬米價差毫𨤲成話霸無面目得人怕舉僧問巖頭古帆未掛時如何頭云後園驢喫草東林頌後園驢喫草莫隨言語討跳上驀腰騎來往長安道雲門頌後園驢喫草一老不一老驀地撞出來鬬湊得恰好舉僧問巖頭古帆未掛時如何頭云小魚吞大魚東林頌小魚吞大魚門上釘桃符邪魔俱不入佛法也消除雲門頌小魚吞大魚直路太縈紆古帆休更問處處得逢渠舉僧問五祖如何是臨濟下事祖云五逆聞雷東林頌從來五逆怕聞雷不似大蟲看水磨孤峯頂上要同行十字街頭還共坐雲門頌五逆聞雷曾參顏回一粒豆子𪹼出冷灰舉僧問圓悟和尚如何是佛悟云口是禍門東林頌的的當陽句明明箭後路著靴人喫肉赤脚人趂兔雲門頌口是禍門電激雷奔娑竭出海震動乾坤舉佛眼和尚讀靈源十二時歌有偈云一日日一時時龍門老心自知東林頌時時日日日日時時七顛八倒孰是孰非雲門頌日日日日時時時時違時失候箇老古錐舉南禪師云鐘樓上念讚床脚下種菜時如何黃檗勝禪師云猛虎當路坐東林頌猛虎當路坐游魚脚底過不學紫胡老便打劉鐵磨雲門頌直出直入當面不識更擬如何著甚死急舉二十四祖師子尊者因賓國王秉劒於前云師得蘊空否曰已得曰既得蘊空離生死否曰已離曰既離生死可施我頭否曰身非我有豈況於頭王便斬之白乳湧高數尺王臂自墮東林頌船子下揚州浮萍逐水流一聲河滿子千古動悲愁雲門頌殺人須是殺人漢當下一刀成兩段頭臂雖虧劒刃鋒何似秦時𨍏轢鑽舉芭蕉和尚云你有拄杖子我與你拄杖子你無拄杖子我奪却你拄杖子東林頌綿州附子漢州薑最好沉黎出麝香魯子師僧才一嗅鼻頭裂破眼睛黃雲門頌十字街頭見成行貨擬欲商量漆桶蹉過舉汾陽十智同真東林頌十年海上覔冤讎不得冤讎未肯休芍藥花開菩薩面㯶櫚葉散夜叉頭雲門頌兔角龜毛眼裏栽鐵山當面勢崔嵬東西南北無門入曠劫無明當下灰舉雲門大師抽顧頌鑒咦東林頌韶陽一鑒生鐵餕餡直下咬破咦莫恠相賺雲門頌雲門鑒咦少有人知咄無孔鐵槌舉龐居士問馬大師不與萬法為侶者是什麼人大師云待汝一口吸盡西江水即向汝道東林頌大海波濤淺小人方寸深海枯終見底人死不知心雲門頌一口吸盡西江水甲乙丙丁庚戊己咄咄咄囉囉哩舉法華經大通智勝佛十劫坐道場佛法不現前不得成佛道東林頌種穀不生豆苗蒸砂豈能成飯大通智勝如來一箇擔板底漢雲門頌燕坐道場經十劫一一從頭俱漏泄世間多少守株人掉棒擬打天邊月舉維摩云其施汝者不名福田供養汝者墮三惡道東林頌入林不動草入水不動波鑊湯無冷處合眼跳黃河雲門頌獨坐許誰知青山對落暉花須連夜發莫待曉風吹舉圓覺經云居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實東林頌舉手攀南斗翻身倚北辰出頭天外看誰是我般人雲門頌荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨花蛺蝶飛舉楞嚴經云見見之時見非是見見猶離見見不能及東林頌拄杖頭邊無孔竅大千沙界猶嫌小毗婆尸佛早留心直至而今不得妙雲門頌春至自開花秋來還落葉黃面老瞿曇休搖三寸舌舉文殊菩薩所說般若經云清淨行者不入涅槃破戒比丘不入地獄東林頌鵠白烏本玄松直棘自曲清淨比丘僧却須入地獄雲門頌壁上安燈盞堂前置酒臺悶來打三盞何處得愁來舉楞伽經五法三自性二種無我東林頌破瓶豈復作瓶事焦種不應生孽芽如彼虗空盤大子毛輪垂髮翳開花雲門頌陝府鐵牛白癩嘉州大象耳瞶兩箇病痛一般咄哉漆桶不快舉殃崛摩羅尊者於一長者家持鉢適值其家一婦人產難長者遂白尊者曰尊者是佛弟子如何救得我家產難尊者曰我乍入道未能相救當去問佛尊者遂往見佛具陳斯事佛言汝但去說我自從賢聖法來未曾殺生尊者依佛所說往告長者婦人聞之當時分免東林頌月裏姮娥不畵眉只將雲霧作羅衣不知夢逐青鸞去猶把花枝葢面歸雲門頌華陰山前百尺井中有寒泉徹骨冷誰家女子來照影不照其餘照斜領東林和尚雲門庵主頌古終
