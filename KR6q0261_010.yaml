body:
  text: 汾陽昭禪師語錄南嶽下九世嗣首山念師太原俞氏子剃髮受具杖䇿遊方所至少留隨機叩發歷參知識七十一員後到首山問百丈卷席意旨如何山曰龍袖拂開全體現曰師意如何山曰象王行處絕狐蹤師於言下大悟拜起而曰萬古碧潭空界月再三撈漉始應知有問者曰見何道理便爾自肯師云正是我放身命處後遊衡湘及襄沔間每為郡守以名剎力致乃曰我長行粥飯僧傳佛心宗非細事也前後八請堅臥不答洎首山歿西河道俗遣僧契聰迎請住持師閉關高枕聰排闥而入讓之曰佛法大事靖退小節風穴懼應讖憂宗旨墜滅幸而有先師先師已棄世汝有力荷擔如來大法者今何時而欲安眠哉師矍起握聰手曰非公不聞此語趣辦嚴吾行矣既至燕坐一榻足不越閫者三十年道俗同曰汾州而不敢名住後上堂謂眾曰汾陽門下有西河師子當門踞坐但有來者即便齩殺有何方便入得汾陽門見得汾陽人若見汾陽人者堪與祖佛為師不見汾陽人盡是立地死漢如今還有人入得麼快須入取免得孤負平生不是龍門客切忌遭點額那箇是龍門客一齊點下舉起拄杖曰速退速退珍重上堂先聖云一句語須具三玄門一玄門須具三要阿那箇是三玄三要底句快會取好各自思量還得穩當也未古德已前行脚聞一箇因緣未明中間直下飲食無味睡臥不安火急決擇莫將為小事所以大覺老人為一大事因緣出現於世想計他從上來行脚不為遊山翫水看州府奢華片衣口食皆為聖心未通所以驅馳行脚決擇深奧傳唱敷揚博問先知親近高德盖為續佛心燈紹隆祖代興崇聖種接引後機自利利他不忘先跡如今還有商量者麼有即出來大家商量僧問如何是接初機底句師曰汝是行脚僧曰如何是辨衲僧底句師曰西方日出卯曰如何是正令行底句師曰千里持來呈舊面曰如何是立乾坤底句師曰北俱盧州長粳米食者無貪亦無嗔乃曰將此四轉語驗天下衲僧纔見你出來驗得了也問如何是學人著力處師曰嘉州打大像曰如何是學人轉身處師曰陝府灌鐵牛曰如何是學人親切處師曰西河弄師子乃曰若人會得此三句已辨三玄更有三要語在切須薦取不是等閑與大眾頌出三玄三要事難分得意忘言道易親一句明明該萬象重陽九日菊花新上堂汾陽有三訣衲僧難辨別更擬問如何拄杖驀頭楔時有僧問如何是三訣師便打僧禮拜師曰為汝一時頌出第一訣接引無時節巧語不能詮雲綻青天月第二訣舒光辨賢哲問答利生心却眼中楔第三訣西國胡人說濟水過新羅北地用鑌鐵復曰還有人會麼會底出來通箇消息要知遠近莫祇恁麼記言記語以當平生有甚利益不用久立珍重問布鼓當軒掛誰是知音者停鉏傾麥飯臥草不擡頭問如何是道場師曰下脚不得問如何是祖師西來意師曰徹骨徹髓曰此意如何師曰徧天徧地問真正修道人不見世間過未審不見箇甚麼過師曰雪埋夜月深三尺陸地行舟萬里程曰和尚是何心行師曰却是你心行問大悲千手眼如何是正眼師曰瞎恁麼則一條拄杖兩人舁師曰三家村裏唱巴歌曰恁麼則和尚同在裏頭師曰謝汝殷勤問如何是和尚家風師曰三玄開正道一句破邪宗曰如何是和尚活計師曰尋常不掌握供養五湖僧曰未審喫箇甚麼師曰天酥酡飯非珍饌一味糧羮飽即休問牛頭未見四祖時如何師曰新神更著師婆賽曰見後如何師曰古廟重遭措大題僧問如何是大道之源師曰掘地覓青天云何得如此師曰識取幽玄師舉三玄語曰汝還會三玄底時節麼直須會取古人意旨然後自心明去更得通變自在受用無窮喚作自受用身佛不從他教便識得自家活計所以南泉云王老師十八上已解作活計僧便問古人十八上已解作活計未審作箇什麼活計答曰兩隻水牯牛雙角無欄棬復曰若要於此明得去直須得三玄旨趣始得受用無礙自求慶快以暢平生大丈夫漢莫教自辜觸事不通彼此無利濟與汝一切頌出曰第一玄法界廣無邊森羅及萬象總在鏡中圓第二玄釋尊問阿難多聞隨事答應器量方圓第三玄直出古皇前四句百非外閭氏問豐干乃曰這箇是三玄底頌作麼生是三玄底旨趣直教決擇分明莫只與麼妄道我曾親近和尚來與我說了脫空謾語誑嚇他人喫鐵棒有日莫言不道又因採菊謂眾曰金花布地玉蕋承天杲日當空乾坤朗耀雲騰致雨露結為霜不傷物義道將一句來還有道得底麼若道不得眼中有屑直須出却始得所以風穴云若立一塵家國興盛野老嚬蹙不立一塵家國喪亡野老安貼於此明去闍黎無分全是老僧於此不明老僧即是闍黎闍黎與老僧亦能悟却天下人亦能瞎却天下人要知闍黎與老僧麼拊其兩膝曰這裏是闍黎這裏是老僧且問諸上座老僧與闍黎是同是別若道是同去上座自上座老僧自老僧若道是別去又道老僧即是闍黎若能於此明得去一句中有三玄三要賓主歷然平生事辦參尋事畢所以永嘉云粉骨碎身未足酬一句了然超百億又曰臨濟兩堂首座一日相見齊下喝僧問臨濟還有賓主也無答云賓主歷然師作偈曰兩堂首座總作家其中道理有紛拏賓主歷然明似鏡宗師為點眼中花師舉揚宗乘渠渠惟以三玄三要為事臨濟宗真要訣也汾州在河東地苦寒立者往往足指墮師因此罷夜參一日宴坐有異僧仗錫乘雲而至問曰和尚何故罷夜參師答以苦寒之故異僧云和尚會下有六人成大器願勿惜法施言訖乘雲而去師明日陞座記以偈曰胡僧金錫光為法到汾陽六人成大器勸請為宣揚自此夜參遂不復罷時楚圓守芝慧覺智圓谷泉齊舉等俱在座下叢林知名師初開堂有僧問靈山一會迦葉親聞今日一會什麼人得聞師云大眾側聆進云恁麼則羣生有賴師云不因陞寶座爭顯六師能問師唱誰家曲宗風嗣阿誰師云不歷僧祇劫直出古皇前進云恁麼則郡城有望師云五嶽峯巒秀四海盡歸潮問虗空權譬喻隨處得彰名未審是箇什麼物師云居天人不測入地更深埋進云恁麼則學人雖不識歷劫盡沾恩師云劒良胳膊從他閙劈腹開心始是明師小參云莫有人問話麼有即出來僧問氷綻魚散時如何師云水清魚不現長波自往來進云龍王當居何位師云在處存金殿乾坤我獨尊進云恁麼則更無過者師云按劒誰得妙當人不自傷師乃云若是按劒手汾陽不奈何還識得劒麼與你註破寰中無當剋海內獨橫行珍重問如何是祖師西來意師云多年松樹饒皴𭽬心間自有一條明問凡有問答賓主各逞嘉奇少室無言將何委的師云千人叢裏罕逢此問學云千山萬水來於此已奉慈悲事坦然師云坐斷日頭天地黑萬象森羅在目前學云官不容鍼私通車馬學人禮拜師云不禮拜更待何時問如何是一句前事師云不落言詮明的旨纖毫纔動即參差學云如何是一句後事師云兩陣相逢不廻避學云恁麼則透皮徹骨去也師云橫拖倒拽任塵漫學云終不敢辜負和尚師云至孝是重華問如何是法眼師云已曾𭣟瞎學云未審向上事如何師云撈天摸地問久嚮汾陽威勢全略展金毛示眾看師云三日後露學云恁麼則退身三步師云一月後再來問祖師心印絕有言詮臨機一句事如何師云三千里外看途程學云恁麼即退後去也師云萬仞峯巒不離此處問問問不轉時如何師云龍馬加鞭急鑾鈴嚮洛川問久嚮西河師子及乎到來為什麼不見師云汝識師子學云恁麼則大眾盡得隨喜師云腦裂始知忙問正法門中如何是和尚得入處師云眾星攢夜月不落紫微宮學云恁麼則朗月獨當天也師云不昧夜行人師上堂云一切眾生本源佛性譬如明月當空祇為浮雲遮障不得顯現便有僧問明月當天却被片雲遮時如何師云老僧有過闍黎須知學云恁麼則分明辨的師云退後莫思量問舉步涉千谿尋源路轉迷箇中一句子請師為提撕師云千年無影樹今日見枝柯學云若不申此問爭得見師機師云瞽人看畵壁上堂云夫說法者須及時節觀根逗機應病用藥不及時節總喚作非時語所以稜嚴會上云欲知佛性義當觀時節因緣若明君臣父子邪正觸淨顯然自分喚作野老謳歌皇道坦然佛法現前擒縱自在生殺臨機或明賓中主或明主中賓或明賓中賓或明主中主或兼帶或探竿影草或一句中有三玄三要還有問者麼出來對眾商量時有僧問智慧門難解難入學人不會請師指示師云真正無私語句下要分明學云恁麼則謝師親開方便門也師云千萬年後不得忘却問靈龜未兆時如何師云海裏搖船笑舉棹望程途問甘露水頻淋為什麼百草不生芽師云田疎不貯水龍王爭奈何問寒暑漸盛貧者何依師云不掛無私服終日樂咍咍學云恁麼則應不孤露也師云深岩隱不得露地不彰形問不悟祖宗不信大道時如何師云打破琉璃卵透出鳳凰兒學云今日親見和尚也師云三千里外筭途程問匹馬單鎗離羣獨戰時如何師云舉手不拈弓低頭失却箭學云和尚是大善知識為什麼如此師云敗將不斬問學人欲涉雲霄去到彼如何為有情師云塞外將軍行正令不展紅旗得勝歸問面前無障礙為什麼開口不得師云盡日無記說喃喃語更新學云恁麼則已能師子吼也師云不用野干鳴學人便喝師云恰是學人擬議師便喝學人禮拜師云敗將不斬問如何是衲衣下事師云赫赤窮漢學云乞師方便指妙捷句來看師云木女穿鍼山色秀石人牽線海雲生問涅槃無異路方便有多門作麼生是無異路底句師云鍾皷分明在日月不曾昏學云恁麼則狗子吠人聲師云不咬破人衣師上堂纔陞座便有僧問從上一人行棒一人行喝未審成得箇什麼邊事師云總不曾用學云堪嗟楚下鍾離昧師云庶子當機失戰場學人便喝師云作家學人禮拜師云却不作家以拄杖點便喝問殺父殺母佛前懺悔殺佛殺祖向什麼處懺悔師云燈連挑夜月度盡幾多人學云恁麼則水精宮裏觀明月師云映輝明寶燭炎赫爍旌幢問日裏不點燈即不問如何是黑裏不揚眉師云牀底掃不出學云恁麼則和尚是用心人也師云天外豈能知師上堂大眾方集便有僧問如何是汾陽境師云子夏峯高登者少西河水滿問津多學云如何是境中人師云坐久看風信燒香燭聖燈師因頌五位纔畢便有僧問如何是正中來師云旱地蓮花朵朵開學云開後如何師云金蕋銀絲承玉露高僧不坐鳳凰臺問如何是正中偏師云玉兔就明初夜後金鷄須報五更前問如何是偏中正師云毫末成大樹滴水作江河問如何是兼中至師云意氣不從天地得英雄豈藉四時推問如何是兼中到師云玉女拋梭機軋軋石人打皷響師因僧請問逐位頌出云正中來金剛寶劒拂天開一片神光橫世界晶輝朗耀絕塵埃正中偏霹𮦷鋒機著眼看石火電光猶是鈍思量擬議隔千山偏中正看取輪王行正令七金千子總隨身途中猶自覓金鏡兼中至三歲金毛牙爪備千邪百恠出頭來哮吼一聲皆伏地兼中到大顯無功休作造木牛步步火中行真箇法王妙中妙六相頌見是阿那律分明無一物大地及山河演出波羅蜜聞是䟦難陀聲通總莫過遠近一齊了更不念摩訶香是殑加女慈悲心徧普淨穢盡能知即此我人母味是憍梵鉢甜苦尋常說入口辨辛酸恰似當天月觸是瞬若多善惡總能和屠割無瞋喜祇箇是彌陀意是大迦葉毗盧俱一法幽室顯然分枝派千花葉龍德府尹李矦與師有舊虗承天寺致之使者三反不赴使者受罰復至云必欲得師俱往不然有死而已師笑曰老僧業已不出院借往當先後之何必俱耶使者云師諾則先後惟所擇師乃令設饌具裝畢告眾曰老僧去也誰人隨得一僧出云某甲隨得師曰汝日行幾里僧云五十里師云汝隨我不得又一僧出云某甲隨得師曰汝日行幾里僧云七十里師云汝也隨我不得侍者出云某甲隨得但和尚到處某甲即到師曰汝却隨得老僧言訖謂使者曰吾先行矣怡然坐逝侍者即立化師壽七十八坐六十五夏并州承天嵩禪師語錄南嶽下十世嗣首山念上堂云文殊仗劒五臺橫行唐明一路把斷誵訛三世諸佛未出教乘網底遊魚龍門難渡垂鈎四海只釣獰龍格外玄談為求知識若也舉揚宗旨須彌直須粉碎若也說佛說祖海水便須枯竭寶劒揮時神光萬里放汝一路通方說話把斷咽喉諸人甚處出氣師問僧迦葉門前客祇園會裏人云特來禮拜師云洎不問過僧便喝師云錯僧又喝師云放你三十棒僧云許和尚具一隻眼師云喫棒了聽欵問師唱誰家曲宗風嗣阿誰師云地連嵩嶽水接伊川云與麼則風穴一句親明旨未審家風事若何師云汝原無異路寶應萬羣機問萬法還從一法生一法從甚處生師云湘州匙筯管陶綿問如何是學人的的用心處師云著衣喫飯自家事云與麼則和尚慈悲也師云寒溫冷暖大家知問如何是承天家風師云胡餅日日新鮮佛法年年依舊云只這便是為別更有師云更有則錯云與麼則笑殺衲僧口也師云不得不笑云洎合不問過師云苦痛蒼天問鈍根樂小法不自信作佛作佛後如何師云水裏捉麒麟云與麼則便登高座也師云騎牛上三十三天問古人東山西嶺青意旨如何師云波斯鼻孔大云與麼則西天迦葉東土我師師云金剛手板闊問大悲千手眼𨚗箇是正眼師云開化石佛拍手笑晉祠娘子解謳歌問如何是不動尊師云鎮天涯云意旨如何師云或在山中或在樹下問如何是佛師云金榜題名天下傳云與麼則承天皷響天下咸聞師云紫羅帳裏盛莫遣外人聞問古人拈槌竪拂意旨如何師云騎驢不著上堂云全眾生之佛性寂寂涅槃便得心心寂照法法虗融物物是道佛佛密契祖祖潛通三世坦然十方不泯只為眾生不了迷己認他便乃塵勞擾擾妄想攀緣即相離真迷己逐物都為一念不覺便見空裏花生不覺眼中有翳此迷無本性畢竟空覺本無迷似有迷覺覺迷迷滅覺不生迷所以經云諸法如是生諸法如是滅若能如是解諸佛常現前誰復釋迦毗盧文殊普賢是有是無若道是有作何面目若道是無諸上座向什麼處行立諸上座何不外遺於法界內脫於身心心不繫身身如虗空身不繫心心同法界且道喚作虗空即是喚作法界即是若喚作虗空又不與諸人說話若喚作法界三界無法何處求心衲僧分上還怎生得若於本分猶是葛藤問有相即不問如何是無相師云忻州齊和尚云如何會得師云代州鴈門關問牛頭未見四祖時如何師云魚龍攪不轉云見後如何師云河枯水竭問未具胞胎時還有語句也無師云百尺竿頭揚眉瞬目云未審意旨如何師云路上行人點頭嚥唾問六國未寧時如何師云王令不在云寧後如何師云獨坐無憂樹自然見太平問隔闊年深時如何師云迷子不歸家云歸後如何師云誰肯問孫臏問如何是一色師云九月嚴寒節云一色後如何師云家家造寒衣問臨濟推倒黃蘗為什麼維𨚗喫棒師云正狗不偷油鷄㗸燈盞走問劒刃磨來久請師握刃看師云昃首甑人携劒去云與麼則喚九作十也師云國除三害定無迍問蓮華未出水時如何師云隱隱地云出水後如何師云不礙眾人看師掛紫衣僧問和尚是大善知識不拘名利為什麼却著紫衣師云世尊黃金相老僧紫磨身云與麼則前佛後佛同一字也師云過去梵王引現在釋迦欽問如何是奪人不奪境師云家鄉有路無人到云如何是奪境不奪人師云暗傳天子勑陪行一百程云如何是人境兩俱奪師云無頭蝦蟇脚指天云如何是人境俱不奪師云晉祠南畔長柳巷問十二時中如何用心師云鷄寒上樹鴨寒下水云與麼則不假修證不尋佛祖師云省得山僧一半力問萬法歸一一歸何所師云梁王城畔趙官家云與麼則四海歸依也師云當今天子聖堯舜也不如師因開方丈門不得有僧問石壁山河無阻礙此門鎻為什麼開不得師云石壁山河即易就中此門難開云開後如何師云是什麼問如何是此經師云郭家剪子天下人聞問和尚能救世間苦還救得這箇也無師云喚什麼作這箇云與麼則漸漸地凍冬後數九師以手一劃云爭奈者箇何云和尚今日上堂師云只有牽船人不知有梢翁問如何是賓中主師云相逢不相識云如何是主中賓師云家貧未是貧路貧愁殺人云如何是主中主師云王言如絲其出如綸師因賀歲太保問今日新歲已臨舊歲何在師云今日釘桃符保無語師云會麼云不會師云去年今日事保罔措乃有頌今日釘桃符摧邪道自如誰人相委悉除是碧眼胡問三乘教外別傳一句如何是別傳一句師云高麗元是新羅國云法海之中得其用也師云波斯鼻孔長三尺新羅走馬大唐知問到此城幾里師云五里云往還不易師云賊打不防家問如何是吹毛劒師云好云用者如何師云棺木裏努眼問不在內不在外不在中間在什麼處師云露地白牛㗸瑞草云未審意旨如何師云滿目溪山一帶烟上堂云第一單鎗甲馬第二甲馬單鎗第三撒星排陣第四衣錦歸鄉有僧問如何是單鎗甲馬師云不是金牙作爭敢射尉遲云如何是甲馬單鎗師云金鏃馬前落婁樊喪膽魂云如何是撒星排陣師云陣雲橫海上未辨聖明君云如何是衣錦歸鄉師云四海無消息回奉聖明君百法座主問百法千重鎻因明閉不開師云且出千重鎻云出後如何師云處處無障礙縱橫任意遊鄭工部入院見法座便問是什麼人位次師云老僧云自家爭敢師云工部莫壓良為賤部云真箇師云不敢遂把手入方丈部云此室常出入未甞有難得之法長老還有也無師以袖拂工部面云與麼則今日得清涼也師云且與後人作牓樣問如何是學人用心處師云光剃頭淨洗鉢云如何是學人行履處師云僧堂前佛殿後問如何是截人之機師云要用便用云請和尚便用師云拖出這死漢有尼大德會四眾到院設齋乃脫羅綺服布素問卸却珍御服著弊垢衣入塵化導是維摩分上事是弟子分上事師云維摩會上誇天女今日闍黎決眾疑云今日不昧於當時也師云真師子兒一撥便轉女弟子問金剛經中六波羅密𨚗箇第一師云長城齊崩倒方見本來人云學人不會請師直指師云白骨如山嶽滴血驗真容問如何是佛師云擬心即差用心即乖云畢竟如何師云大盡三十日小盡二十九問祖師西來三藏東被當明何事師云佛殿部署葢僧堂老僧脩云恁麼則全明今日事也師云今日事作麼生僧便喝師云放汝三十棒鄭工部至茶話次云汾陽有箇昭禪師愛看讀某甲留一偈師云略請見示部舉云黃紙休遮眼青雲自有陰莫將閑學解埋沒祖師心師云工部慣得其便部云者賊師云更不再勘工部問百尺竿頭獨打毬萬丈懸崖絲繫腰時如何師云幽州著脚廣南廝撲部無語師云勘破這漢部云二十年江南界裏這回却見禪師師云瞎老婆吹火知郡張侍郎與部署到見方丈割破問和尚有護法善神為什麼却被惡人窺筭師云賊是小人智過君子上堂辭親割愛拋離俗網來入寶所禮拜金仙為師作釋種眷屬既離苦海已達彼岸長行般若之慈舟撈漉愛河之溺子脚踏十方肩擔四海口說一乘之法眼識不二之門內無所有外無所依身如虗空虗空難比豈不號為無著邪既到此地黃河為酥酪須彌為飯食大地為臥具帝釋梵王執侍巾瓶維摩為侍者文殊普賢掃床摺被等妙二覺隨驢把馬所以經云一切眾魔及諸外道皆吾侍者諸德不教你作鄉頭里正耆長大戶一箇箇作師子兒去成佛作祖去入如來藏去如來者諸法如義無所從來亦無所去故號如來豈不快哉諸德三界無法何處求心四大本空佛依何住莫袈裟下多藏毒藥自傷其身乃有頌曰苦哉苦哉寔苦哉萬劫千生金地來袈裟底下藏毒藥却教佛自受沉埋問靈草未生芽時如何師云切忌動著云生芽後如何師云昨夜遭霜了問師子未出窟時如何師云眾獸潛藏云出窟後如何師云眾獸腦裂問二邊純莫立中道不須安意旨如何師云廣南出象牙云不會請師直指師云番國皮毬八百價問如何是先照後用師云打動漢下皷和起楚王歌云如何是先用後照師云龍沮解布千般計韓信能施堰水功云如何是照用同時師云長虵堰月齊排出韓信張良唱大歌云如何是照用不同時師云霸王已歸烏江去竪起金鷄賀太平問不在內不在外不在中間在什麼處師云西天白氎東土絲綿云未審此語如何師云南嶽五臺問寶所化城相去多少師云舉足下足問六塵境上施躭染方便門中為指歸師云懷州牛膝天下人聞云與麼則慈音一唱開玄路頓使歸程直到家師云鎮州蘿蔔可重三斤問三句之中𨚗句是極則師云徧地露形終不見云更有安身立命處也無師云一生長是鎮天涯楊大年李駙馬與師問答問彌陀演化在西方達磨傳心來東土胡來漢現水到渠成五臺鎮靜以崢嶸百谷朝宗而浩渺一靈之性托境而現形三有之中憑何而立命師云仙人無婦玉女無夫楊云尼剃頭不復生子師云陝府鐵牛能哮吼嘉州大像念摩訶李云側跳上山巔師云騎牛不著靴李問玄沙不出嶺保壽不渡河善財參知識五十三員惠遠結黑白一十八士雪峯三度上投子智者九旬講法華這六箇漢為復野干鳴為復師子吼道道師云水急魚行澁峯高鳥不栖楊云泗州大聖師云土上加泥又一重李云舌上覆金錢師云半夜歌樂動誰人得知音又問風穴提印南院傳衣昭公演化於西河嵩師領徒於并壘南宗之旨北土大興且道二師承誰恩力師云不入蓮池浴懶向雪山遊楊云清涼山裏萬菩薩師云維摩會中諸聖集李云背負乾薪遭野火師云口是禍門問忉利透日月之上四禪免風火之災三交駕大牛之車臨汝握全提之印彌猴有一面古鏡狸奴有萬里神光直下承當是何人也師云朝看東南暮觀西北楊云狸奴白牯却知有師云淹殺塚頭蒿李云月裏煑油鐺師云石人腰帶又問一切諸佛盡在裏許動即喪身失命著兩頭俱瞎擬議之時千山萬水直下會得也是炭庫裏坐地有不惜眉毛者通箇消息來師云百雜碎楊云平生不妄語師云也要道過李云出穴兔遭罥師云東西無滯礙南北得自在復有頌曰一言纔出徹龍庭攪動須彌帝釋驚三世諸佛齊坐了杖頭傀儡弄䨥睛楊答云今年桃李味甘香一顆千金買得甞貯藥胡盧拖鼠尾穴門小窄轉難藏師又答千年桃核未聞香幾度逢春難得甞靈龜曳尾除蹤迹沙中抱子更難藏楊又答五臺山裏有文殊羅漢天台洞裏居為問紫胡一隻狗何如普化一頭驢師又答忽聞師子吼引出象王威把定聖凡路誰人敢揚眉擬議塵沙劫動念隔千岐瞬目他方去早已著灰泥楊再答蜘蛛網中坐蟲兒不敢過昨夜三尺雪百鳥盡遭餓果熟樹低垂鵝肥甑箄破借問末山尼何如劉鐵磨師再答山高人難上海深不見底樵夫謾踏鞋漁父休誇水言却超百億收來維摩詰若覔同道人曠劫不相識師作宗本頌左顧右黃昏莾鹵展手回來早是彰露且道作麼生是彰露底句楊云正殺人時𥅄出頭師云兩脚梢空手叉胷李云左鬚右髮隱文章師云名利已彰天下去丫頭女子倒騎牛師復云維摩一默文殊贊善若遇老僧在彼各與三十棒且道這二老漢過在什麼處楊云頭破作七分如阿梨樹枝師云迦葉不擎拳阿難不合掌李云似犢牛兒未用角時師云忙屈拳打令師復云教有明文佛身充滿於法界老僧今日充滿於法界侍郎即今在什麼處楊云布裙一截泥努出膝葢子師云寬口布袴三尺杖李云河水一擔直三文師云只見鼻頭津不見頂後濕鄭工部到汾陽昭和尚處茶話次部云某甲留一偈贈師偈曰黃紙休遮眼青雲自有陰莫將閑學解埋沒祖師心復云只將此偈驗天下長老汾陽云與麼則汾陽也在裏頭部云擔枷過狀昭云更不再勘部云兩重公案昭云知即得部良久昭噓一聲部云文寶文寶昭云在甚所在部云不容某甲出氣爭得嗔他道淹滯長老在此昭云是何言歟部云寔昭云也不得放過部云請師一偈昭云不閑紙墨遂上札荒草尋幽徑岩松逈布陰幾多玄學客失却本來心師在首山會下因一日問如何是佛法的的大意山云楚王城畔汝水東流師於此大悟乃作三玄偈曰要用直須用心意莫定動三歲師子吼十方沒狐種我有真如性如同幕裏隱打破六門關顯出毗盧印真骨金剛體可誇六塵一拂永無遮廓落世界空為體體上無為真到家時首山聞得乃請師喫茶問云三頌是汝作耶師云是山云或有人教汝現三十二相時如何師云某甲不是野狐精山云惜取眉毛師云和尚落了多少山以竹篦向師頭上打云這漢向後亂做去在師自後辭山山以拄杖付師接得有頌云和尚拄杖照破龍象臨濟家風落在我掌山云莫相帶累師以坐具便打山云果然帶累師云今日捉敗這老賊山云又似得便宜又似落便宜
