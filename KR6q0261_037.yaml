body:
  text: 鼓山先興聖國師和尚法堂玄要廣集上堂大衆已集時有學人才禮拜師云高聲問學人咨和尚師便喝出問從上宗乘如何體會師叱之問攢𢳇將來皆不相似單刀直入時如何師云失命漢問如何是學人自己親躬事師云還返仄麼學云即今事如何師云不可瞎去也問如何是本參底事師云因什麼得到與麼地師云若是猛利底撩著便休去大蟲著角相似有什麼近處更有一格人腳不跨石門怪他得麼不可事須踏前踏後納箇如何醉人相似且宗門中事作麼生降茲已下根性遲回事須從人決擇方定紀綱且作麼生決下可問一句答一句喚作決也若與麼驢年去到這裏也須是箇漢始得大不容易兄弟決擇之次如履輕氷將為等間句裏相鬬道我解問話貴轉數多合殺成得箇什麼邊事只是箇識路中人且無自由分兄弟事本因人因人立事人達即事渾事渾即無成無成須得無成句有人道得麼出來無事莫立珍重師有時上堂云實不敢欺兄弟亦不敢昧兄弟然且沒人辨時有學人問和尚與麼道還盡師本意也未師云放汝殘生問從上宗乘如何舉唱師以拂驀口打學人禮拜起才問有問有答師云老兄不是這腳手問承師有言從門入者非實黃梅行者傳何事師云道什麼學人再問師云去不為汝有僧才禮拜起師云道什麼學云佛未出世時如何師云合取口問如何是從上來不昧底事師云是什麼問才施方便蓋為今時向上宗乘復何言論師云拽出著問如何是正宗師云別日來商量問若將寂默為宗維摩一生受屈如何道即得不屈於維摩師云合取臀著師云諸和尚盡道向諸方參學未委參什麼學什麼還有參得者無有即出來對衆驗看諸和尚為復參禪參道參佛參法參毗盧師法身主參佛向上事涅槃後句若實參此句得為大妄喚作望上心不息與諸和尚了無交涉時有學人問如何是佛法大意師云吐却著問凡有言句盡是觸犯宗風未審如何是宗門中事師云合取口問衆星攢蔟時如何師云覓什麼師云大事未辦宗脉不通切忌記持言句意識裏作活計不見道意為賊識為浪盡被漂淪沒溺去無自由分諸和尚必若大事未通不如休去大歇去身心純靜去好時中莫駐著事却易得露這箇是事不得已相勸之言古人喚作死馬醫若是箇漢向他與麼道如同寱語一般且諸人分上作麼生十二分教還用得一字麼諸方老宿語還用得一句麼若十二分教是兄弟在阿那教中若諸方老宿語當得兄弟兄弟在阿那句中所以道十二分教唱不得凡聖攝不得今古流不得言句該不得與麼話蓋為刺頭入在教門裏且與伊拆開若有箇漢總未通這箇消息向他與麼道被伊驀口摑𡱰沸作麼不可怪得他也兄弟大須甄別莫吉凶不辨有辨者出來對衆驗看時寒久立珍重師別時上堂云兄弟有什麼近前商量若待這裏說無好事及兄弟牽經引論得麼若有人問但向宗乘中致一問來待今日與兄弟答宗乘中話時有學人才禮拜師云大衆看有與麼不識羞漢其僧罔措師便喝出師云若也宗脉未露記著一字如飲毒藥喪身失命為什麼故如此都來是不具眼如今更有一般底大作群隊聚頭念經念論說圓說頓披這衣服作箇與麼語話還羞麼還返仄麼還有些些子衲僧氣息麼且問圓為什麼人施頓為什麼人設還辨得端由麼相共魯論不識好惡還知道十二分教唱不起麼且唱什麼不起不可只與麼道便休去也豈不見古來丹霞石鞏石室高僧熏天炙地登時端由衆皆具委道他在什麼經裏披尋於阿那論中討得古人道西天一段事總被今時人埋沒却覓箇出頭處不得更有老宿道大唐國內盡是一隊滅胡種賊即者便是人家男女乍入叢林何處會得聞舉經舉論便刺頭入裏許念言念句便遇著這般底便是殺人賊是汝一人半人猶可在惑賺他多少人家男女千生纍劫披枷帶鎖於自己事轉踈轉遠如今奉勸諸兄弟大丈夫漢一等是離鄉涉井訪道尋師為自己事也須眨上眉毛著些子精彩於親躬事有辨明處確乎不拔莫受人謾莫受人惑如今且不受謾不受惑底事作麼生到這裏也須是箇惡漢殺人不眨眼漢沒意智漢始得切不得掠虗亂呈解數被向腳跟下尋著就已築著沒去處二十楖𣗖棒劈脊鼓山打這般掠虗底尋常人難得喫別處即放過鼓山即不得若放過到處轉見虗頭曾打著一兩箇亂與底聲鐘集衆勘過一下下交到所在不是行棒圖逞威風同這行戶有什麼惡心悲他僧相圓備只是事持掠虗業次輕慢上流與他整頓插脊梁骨圖他改悔別換身心遇著鼓山與麼鎚鍛也須慶幸始得有一兩處將向頭頂上擎著敢把指頭指著怕伊發去無如是理不是立兄弟說這葛藤然且理要區分事須甄別莫滅胡種各歸堂珍重師上堂大衆雲集衆人盡皆罔測於師師乃云南泉在日亦有人舉南泉時事要且不識南泉還有識者麼試出來驗看時有學人才禮拜起師云作麼生學人咨和尚師云不才謹退師云若是靈利底撩著便休去似這般漢千里萬里去也有什麼救處進前退後納箇如何醉人相似有什麼衲僧氣息既然如此且宗門中事作麼生諸和尚到這裏也須是箇漢始得大不容易兄弟鼓山不惜口業向汝諸人道不假記一字亦不用一功亦不用眨眼亦不用呵氣大坐著便紹却去諸和尚且道紹什麼為復紹佛紹法紹禪紹道紹佛向上事涅槃後句若紹此句得為大妄喚作望上心不息與諸兄弟了無交涉於諸人分上作麼生紹普請驗看是什麼為復是凡是聖是毗盧師法身主在什麼處居住什麼年月有渠方圓闊狹長短大小試道看還有絲髮大物解蓋覆得麼還有分毫許間隔得麼向阿那裏抄向阿那裏寫諸和尚與麼顯露與麼節要何不直下便承當取又更刺頭入他言句裏意識中學有什麼交涉不見道意為賊識為浪走作馳求終無歇分若自不具眼就人揀辨卷子裏抄冊子裏寫假饒百千萬句龍宮海藏一時吞納盡是他人不干自己亦喚作識學依通猶如水母借蝦為眼無自由分亦如盲者辨色依他語故實不能辨色之正相若是學經律論他自有人在所以鼓山尋常道經有經師律有律師論有論師有函有號有部有帙白日明窗夜附燈燭自有人傳持在禪師作麼生還有人道得麼試出來道看時有學人問如何是目前顯現底機師云道什麼學人再問師喝出問四十九年前即不問四十九年後事如何師云句超方外千聖難追問常辦無念者如何師云關闍黎什麼事學云常辦於此師云莫受屈學云不屈者如何師云有什麼救處問擬心即差不擬心如何體會師云待汝好心問問如何是向上一路師云即今是什麼路學人無對師云去看汝不是這腳手問如何得不辜負於師師云汝有什麼罪過師云諸和尚與麼問還會麼還識辨緇素麼鼓山向前見一兩箇長老被人問著維摩意作麼生他便眼孔定動地恰似箇泥揑聖僧相似有什麼交涉還當得本參底事麼若言當去何不立取維摩傅大士為祖師問取露柱聖僧即休何故更用達磨與麼來所以鼓山道凡聖不到今古那追不唱言前寧談句後他家諸聖興來蓋為人心不等遂展多門為病不同處方各異在有斥有居空破空二患既除中道須遣直道釋迦掩室居士毗耶大士梁時童子當日一問二問三問盡有也是衲僧分上事作麼生還有人道得麼試出來道看不可說君說臣說父說子得麼諸和尚古人是事不得已立箇君臣父子外進內紹是功紹得了非功合是功合得了非功蓋為中下之流權施此句所以鼓山道君臣父子蓋為成特立事立功以明緇素既墮中下須合須同得合得同無人辨識當與麼時還有肯重者麼有當荷者麼有這邊那邊麼若有還是托開去也更有一句作麼生敢道托開麼莫錯會好到這裏須是箇沒意智漢殺人不眨眼漢始得若是鈍根底只向言句上脫去爭能會得時有學人問得句忘言時如何師云即今得什麼句學云不是西來亦非自己師云吐却著問己事未明以何為驗師云嗄學人再問師曰一點隨流食咸不重問如何是包盡乾坤底句師云近前來學人便近前師云是什麼學云不會乞師指示師云去鈍置人作麼問峭絶無依時如何師云病鳥栖蘆學云直得醒醒還有紹處也無師云亦不關闍黎事問如何是真實人體師云因什麼得到與麼地問未到玄源如何究理師云相去多少師云更有作家解問者出來良久無人師云入到石門何處得如許多疑來歸堂珍重師別日上堂云諸和尚古人道佛之與法是建立化儀禪道兩名是止啼之說名不干事事不干名依執滯名於他玄隔所以鼓山曾向兄弟說句不當機言非展事承言者喪滯句者迷得魚忘筌得意忘言借網求魚魚非網也所以道教排不到祖不西來盡乾坤人口到這裏百雜碎直道十二分教唱不得凡聖攝不得今古流不得言句該不得與麼道也只為他向化門裏作活計事須與伊拆開若是箇漢總未通這消息向伊與麼道被伊驀口摑𡱰沸作麼不可怪他也雖然如此據什麼道理所以鼓山道更有一人不跨石門不跨石門事作麼生諸和尚衆中亦有江西湖南幽燕魏府三千五千一萬里地盤山涉嶺既到這裏高山頂上終不為看山玩水無非決擇萬劫千生事故委萬劫千生事也只在如今如今安即如今便安徹只如今便徹忽若衆中有一人大肯去大安樂去是不虗食人之施不辜於己不負於彼去住自由出入無難盡乾坤無敵宗風不墜後進有依所以古聖道若有一人悟道地神報虗空神虗空神報非想非非想天遞相告報云下界有人得道有濟人之分天上人間遞相慶賀盡是諸和尚分上更弱於阿誰既然未得如此便須兢兢惕惕如臨深泉如履薄氷時不可延命不可待似箇當風燭子𩖼地脫去也如今且不如休去歇去身心淳朴去似一亘長空去時中莫間但且與麼去鼓山所以道明道為之傳不間為之行德行俱備今時稱斷稱斷是今時更有一人作麼生到這裏也須自有來由始得莫記他人言句就人揀辨終無自由分於諸和尚作麼生出來商量時有學人才禮拜起云某甲咨和尚師云吔學人云輪中不轉時如何師云珍重師云諸和尚更有什麼事出來問良久無人師乃云總不出來蓋為把他稍緊不相共扶持致令如此有江西湖南諸處參學師僧好織造底出來莫道鼓山口似楄擔只慮埋沒宗風走作兄弟但出來待與揑些子時有學人問心珠不曉己事未明請師一照師云乾坤不掩爾自徒迷問作何方便得紹師宗師云岸谷無風徒勞展掌學云如何即是師云錯也問萬機不湊本事何來師云傷機之患千聖難除問四面松林如何是直路師云嶽秀千枝盲龍不辨問即今如何唱師云洪雷一震蟄戶無私仁者作麼生問己事未明如何明得師云鏡中無影演若自迷問如何是鼓山師云衆嶽難偕學云還許學人躡也無師云汝試下足看問如何是諦實一路師云一句迢然古今難辨問彼無消息如何知音師云汝自罪過我不將來學云還有為人處也無師云與麼即戒鼓無擊問巨海驪珠如何取得師云來言雖重不賞鋒圭問十二時中不涉緣塵如何據驗師云浪息千江孤輪不墜問如何是鼓山正主師云嶽不明根迷人自重問如何是目前一路師云耶合掌不得問如何合得諸聖位師云玄直渠不踐千聖位在什麼處問步步進前如何得達祖意師云鼻地人難舉問古人卸臂當為何事師云方外之說仁者難知師云諸和尚鼓山與麼東道西道亦不辜兄弟只是教緩然即如此奉勸諸和尚莫學言句走作兄弟昧却兄弟直饒通得也只是箇識路中人不見古人喚作食瘡膿鬼喫涕唾鬼喫不淨鬼未喚作人在諸和尚莫與切不得亂呈解數若亂與被鼓山聲鐘集衆向腳跟下尋著勘著無去處二十楖𣗖棒劈脊莫道不道更有什麼事出來無事各歸堂珍重師上堂云諸和尚上來為什麼有什麼苦屈底事有什麼不了處還有疑者麼若有即出來與兄弟定當時有學人問承古人有言橫說豎說未知有向上一重關捩如何是向上關捩師便打一棒問如何是宗門中事師便側掌問如何是鼓山一路師云即今是什麼路問承古人有言妙旨迅速師側掌云住住學云和尚為什麼不道師云且行腳去問目前一句如何曉得師云什麼處不曉學云爭奈這箇何師云這箇是什麼問如何得成道去師云害顛作麼學云不害顛如何得成道師云這鈍漢問根性遲回如何用功師云功即不得學云為什麼不得師云向什麼處功問從上宗乘以何為的師云無的問學者憑何師云汝曾學得多少來學云與麼即不從今日去師云從什麼處去學云待有去處即咨和尚師云有什麼交涉問如一燈然百千燈如何是一燈師云是什麼問如何是和尚家風師云莫少去就問古路無蹤如何進步師云不是途中客進什麼學云向去者如何師云無闍黎下足處學云總不與麼時如何師云莫自恥問自古相傳窮其際即今妙旨示何人師云嶽秀靈芝異學云異底事如何師云過也問如何是直下事師云莫自欺學云不自欺事如何師云還返仄麼師云諸和尚還會麼此事不露蓋為塵沙劫來多遊異徑所以於自己事却成違背如今若欲得易會麼但是從前記持食噉之事一時瀉却著身心純靜去一片去忽被道伴觸撥著此事便發明去所以鼓山曾向兄弟道譬如一池沼衆人共臨但把杖攪其水覓見形影了不可得轉渾轉濁所以傍邊有一人便問汝與麼攪作麼云我要見形影便被與一咄這癡漢汝與麼攪驢年去任經塵沙劫無有見期汝但一時放下杖著各自休歇去良久中間波澄浪靜沙土自沉非但形影森羅萬象悉現其中這裏便須問得這水始得咄這水還照也無若道照亦是汝與麼道若道不照亦是汝與麼道水道什麼雖然如此須問得水有水句若問不得問者無功這箇便是驗兄弟處還有人道得麼出來良久無人師乃云今日說這多多無事久立珍重師上堂大衆已集時有學人問承古人有言寂是法王根動是法王苗如何是法王師云是什麼問承和尚有言直下猶難會尋言轉更賒如何是直下事師云賒也學云還許學人進步也無師便喝出問學人在塵還有出身處也無師云汝即今在什麼處學云與麼即任運隨流也師云莫𥧌語問進者不明請師一撥師云近前來與汝撥學云謝和尚指示師云碗鳴聲作麼問如何是大悟底人師云不囑學云為什麼不囑師云不向悟中取問不起于座請師掣電之機師云醉作麼問如何是無價珍師云莫妄想問如何是不假言說第一義師云放汝殘生問不辨古機如何建立師云不立學云如何即是師云是即非學云為什麼如此師云虧闍黎什麼處問生死海廣如何得渡師云汝即今在阿那邊問如何是妙旨師云如何不妙旨問如何是徑截一路師云這瞎漢學云與麼即學人得問力師云畫篋不曾呈師云汝莫一向於途路上走無有了時一等行腳直須身心淳朴日夜懇苦救取徹始得莫只是問得一言半句便將當自己胸襟賺汝只如兄弟行腳來還曾遇什麼老宿發覺因什麼道伴得入還得噴地大省也未若有出來便定得兄弟虗之與實向這裏下得一句盡乾坤撼不動這箇便是諸兄弟不虗行腳底事只如盡乾坤撼不動句作麼生下試出來道看若也未得如此奉勸兄弟直不得念言念語明朝後日覓箇歇處不得有事近前無事歸堂珍重師有時上堂云當人分上各有與麼事為什麼不承當取又更上來覓什麼近日多見師僧入叢林只是舉經舉論於自己事有什麼交涉時有學人問既不許看經又不許讀外書如何是大曉一句師便打一棒問己事不明乞師指示師云什麼劫中曾昧問目前一路如何指的師云目前是什麼問如何是大道之源師云不囑學云為什麼不囑師云不是源中事問古人道但得本不愁末如何是本師云是什麼問波澄浪息為什麼摩尼不現師云汝且喚什麼作摩尼學云與麼學人退一步師云汝無端進前退後作麼問凡有言句盡是與蛇畫足如何是不畫足師云放汝二十棒學云今日得遇和尚師云莫𥧌語問風不鳴條雨不破塊時如何師云闍黎分上作麼生學云却請和尚道師云屈汝什麼處問如何得不狥諸有師云關汝什麼事問欲出輪回如何得出師云即今在什麼處問如何是佛法大意師云佛法大意即且置問如何是本來心師云如今是什麼心問如何是直下事師云尋言轉更賒問寂是法王根動是法王苗如何是法王師云關闍黎什麼事學云為什麼不關師云根苗俱不得問無風為什麼往往波生師云什麼處得來學云即今有師云把將來問十二時中如何行履即得決定師云我道乾坤不跨足學云如何進向師云若進向即跨足學云畢竟事如何師云咽中不踐師云諸和尚問得百千句亦不干自己只如仁者自己事作麼生莫只向這邊那邊經冬過夏因循度日無有了時塵沙劫來流浪生死如汲井輪略無停息今生既得人身又是男子又得出家僧相圓備不窮講肆擁毳入叢林這箇便是升騰之時除疑殄惑之時得大無畏之時得大自在之時各自清白取更弱阿誰各自努力歸堂珍重師別日上堂云諸和尚有什麼病敗什麼處缺少亘古亘今恆然如是何須向長連床上癡兀兀地便當得去汝但於一切處驗還出得汝去處麼不見古聖道如人在空如魚在水或行或坐不離於空逆流順流不離於水既然如此且合作麼生兄弟莫自受屈莫自淪自溺既到這裏不奈何也只成一場妄想有什麼事出來時有學人問如何學即得不昧真機師云什麼劫中曾昧問己事未明請師直指師云瞎却汝得麼問生死沉輪如何得出師云在裏許多少時問盡令提綱猶是野干鳴如何是師子吼師便劈口打問六國不寧如何整葺師云古殿不曾坐什麼處不寧學云如何領會師云是汝不會問如何是大圓鏡師云不曾照學云辨者如何師曰不曾照辨什麼問於當人分上如何發言師云不是途中客發什麼言學云還與麼道也無師云是汝與麼道問此座高廣吾不能升未審什麼人升得師云得此病來多少時學云便請和尚藥師云這鈍漢問己事未明如何明得師云彼常不隱鏡指顏開問從上諸聖還有不依師者無師云闍黎因什麼人師云兄弟諸聖興來蓋為人多錯會言佛演法祖唱玄微只為夙昧天機致使迷倒所以教排不到祖不西來仁者分上作麼生各自有與麼事莫自退屈莫只踏步向前覓若覓即失若親即踈塵沙劫來未曾有一捻土解蓋覆得兄弟各自努力歸堂珍重師於佛殿前上堂大衆雲集師登座顧視大衆乃却起立頃間便歸法堂僧從師到法堂後師問僧投機不辨隔岸難明仁者作麼生其僧無對便問如何是不假言說第一義師云驢年會得麼問強弱即不問如何是平常之道師云因什麼得到與麼地學云還得平常也無師云莫碗鳴聲問宗乘中事乞和尚提撕師云是什麼師却喚近前這箇是提撕汝喚作宗乘中事即不得學云未審宗乘中事如何師便打一棒問如何是西來意師云石人筆下看問如何是作家師云你行腳為什麼學云與麼即某甲不疑師云何處得作家問如何是最初一句師云什麼處收拾得來問如何是末後一句師云自鈍致作麼問臨行之際乞師一言師云終不敢鈍致汝問千年松樹尚有偃枝學人雖披入衆衣未曉出塵路乞師方便師云九霄雖異世畢竟杳難同問堂堂地來時如何師云堂堂不奈何問己事未明如何為驗師云乾坤不掩時人自迷問如何是學人立足處師云不從諸聖得云便與麼去時如何師云猶是時人進向處學云不落進向事如何師云還反仄麼諸和尚大凡行腳須識辨宗風莫只是尋言逐句無有了時雪峰和尚道三世諸佛不能唱十二分教載不起所以鼓山道有一人與麼來總未曾通這箇消息向伊與麼道被伊把黃泥驀口塞還怪得他也無恐人亂塞人口所以道鼓山有不跨石門句作麼生道到這裏須是其人莫亂道時有學人問如何是不跨底事師以拂子驀口打師却問還會麼學云不會師便咄云不是者腳手師云若己事未露就人揀得卷子裏抄𠕋子裏寫有什麼用處不如明取自己事明道為之德不間為之行德行俱備今時稱斷更有一人作麼生諸和尚也莫泥水不分清濁不辨末法時代天下交馳兄弟得共林泉與道伴一處齧嚼此事也須慶幸始得直須曉夜懇苦莫虗度光陰各歸珍重師於三門前上堂問僧有一人從水塘頭來便轉去汝作麼生學云和尚也須許他始得師云便劈脊棒汝作麼生學無對師云不才謹退也是掠虗漢問如何是不假言說第一句師云放汝三十棒問不起於座如何是掣電之機師云醉作麼問凡有言句盡落標指如何是月師云還識羞麼問據何眼目消得人天應供師云瞎漢問未達本源如何履踐師云相去多少云爭奈學人疑何師云阿誰罪過問只在途中請師指示師云在途中多少時云謝和尚指示師云莫塗污人好問苦澀處請師道師云收取好問十二時中如何履踐即得不辜於自己師云直須不辜於自己問澄源浪靜為什麼真形不現師云什麼處收拾得云究竟如何師云非究竟不與闍黎通云豈無方便師云方便是什麼人分上問承和尚有言不許學人揀話又不許擇話如何行履即得不違和尚所囑師云還自恥麼問九霄峰外月室內一輪燈如何是一輪燈師云岸谷無風徒勞瞪目問名言妙句教網所詮不涉三科請師直道師云肘後不曾傳問十二時中如何究竟生死師云將生死來學云與麼即無究竟處師云似你與麼語話問參禪學道須是其人學人與麼來請師直道師云瞎顛作麼學云謝和尚指示師云放你二十棒問人人盡言請益未審師如何拯濟師云鼻地人難肯問作何準則即得不背於古師云不可諱去也學云謝師指示師云便被喫棒問千手千眼阿那箇是正眼師云用正眼作麼問如何是目前機師云即今是什麼機學云不會乞師指示師云殼地人不踐問二邊不立中道不存是如何師云即今在什麼處學云豈無和尚為人處師云教我為阿誰學云屈什麼處師乃與杖問古人道相逢不擎出舉意便知有如何是舉意便知有師云阿誰舉問如何是學人最親最切處師云妄想作什麼學云還得當也無師云收取好什麼語話問作麼生是木馬石人騎不背空王印師云泥牛步處盲者徒施問作麼生是動容揚古路師云不欲得商量問作麼生是別傳底事師云收取蝦蟇口不得師云諸和尚各自有與麼事莫受屈未曾缺少未曾有寸土解蓋覆得汝為什麼却不會去更踏步向前覓途中踐土不曉室中且室中事作麼生只欲得人說是汝自己事為什麼却不會唯是他人屋裏事總會得只是傍家喫老師涕唾向意識裏作解有什麼交涉行腳不遇其人所以道苦屈在初記著一字歷劫作野狐精若靈利底不假老師多多久立各自努力珍重師有時上堂云時時與麼打鐘打鼓上來覓什麼有什麼苦屈底事不見古人道總是一隊喫酒糟漢把棒一時趂下鼓山如今直下老婆心有疑者出來問時有學人問近入叢林不會乞和尚慈悲指示師云我不敢誑呼汝學云不誑呼事作麼生師打一棒問如何是徑截之言師云最徑學云如何是不假言詮師云即今有多少問承古人有言有相身中無相身如何是有相身中無相身師云即今是什麼身學云如何是無明路上無生路師云即今是什麼路問學人單貧請師拯濟師云有什麼事學云爭奈單貧何師云論劫受苦問承古人有言巧說不得只用心傳如何是心傳師云道什麼學云不會師便喝出問投機便轉是如何師云作麼生轉學人才進前師便喝出問大事未辦時中以何為驗師云時中不得步學云如何得相應師云不相應學云為什麼不相應師云不為汝問急切處乞師一言師云調達不得肯問承古人有言大體寬無際小心塵不容如何是大體寬無際師云大小學云如何是小心塵不容師云因什麼到與麼地問承古人有言一切衆生日用而不知如何是日用事師云這箇是什麼人語問二龍爭珠誰是得者師云珠在什麼處問承古人有言一花開五葉結果自然成如何是自然成底果師云即今是什麼問從上宗乘請師直示師乃叱之問諸聖未興以何為眼師云闍黎眼在什麼處問和尚慈悲如何體會師打一棒問只如僧問洞山云三身中阿那身不墮於諸數洞山云吾常於此切只如洞山云吾常於此切是墮是不墮師云汝又向這裏弄性命也問終日動靜為什麼不明自己師云只為終日動靜所以不明學云不動靜時如何師云是什麼問山中和尚才見師僧禮拜便喫棒意作麼師云因什麼不行腳去問南泉以手打膝云這裏即易又云這裏即難僧問云只如却手豈不是舉唱宗乘師便以手打膝云此不是舉唱宗乘作麼學云只如却手意作麼生師云汝自看問如何是第一句師便把杖作驀口刺勢問深深無底淺淺無源時如何師云得此病來多少時也師云近來師僧只愛舉經舉論說圓說頓所以道經有經師論有論師律有律師有函有號有部有帙白日明窗夜附燈燭自有人傳持在關汝衲僧什麼事汝且道圓為什麼人施頓為什麼人設因偏說圓得成圓頓本自圓成不因偏說這箇是圓頓教於衲僧分上作麼生各有區分莫滅胡種各歸堂珍重師勘僧語問古人道嚙鏃擬開口驢年亦不會師云古人與道有損有益師問新羅僧上山來作什麼對云禮拜和尚師云盡世不標向什麼處禮對云向不標處禮師云念汝是新羅人放汝三十棒問徑山小師云徑山偈道回首還家不得歸師云歸是時人歸豈不是對云是師云他不得你箇歸豈不是對云是師喚云嚴闍黎對云吔師云是歸是不歸有僧製得雪峰實録云師每至上堂良久顧視大衆遂云是什麼師云雪峰只有此語為當別更有僧云別更有師云案圓也下山去問學人才施三拜便知有二十下鐵棒未審從上宗乘諦當不謬本參乞師方便願垂決擇師便與一下棒其僧歸堂不肯師云令打鐘喚上勘師云汝道才施三拜便知有二十下鐵棒豈不是汝與麼道對云是師云還有過否對云有過師云有過不打作麼便與棒趂下山師問修訥維摩座主云文殊讚淨名乃至無有文字語言是名真入不二法門與麼讚還合得維摩意也無對云作麼不得師云維摩意作麼生對云語默平等師云這箇是座主與麼道維摩意作麼生座主道不得方乃禮拜問上座從什麼處來對云從西院來師云西院還接上座也無對云接師云西院作麼生接上座對云問某甲道是什麼師云西院與麼問上座對云是師云識得上座也對云與麼即不得未審西院意作麼生師云是什麼問淨道者云古人道這裏即易這裏即難這裏即不問這裏事作麼生對云還有這裏那裏也無師云此猶是這裏事也道不得喫棒趂下山師云這漢向後覓箇死處不得審問諸院老宿語師與囷山上雪峰囷山問共和尚鬬行師云輸也歸時下船問共和尚鬬船師云若道鬬船也是輸也囷山云重重失利師與長慶入佛殿見佛前鉢盂拈起云家常師云何得又更無厭師却拈起問長慶長慶云飯未熟師云太吝惜生長慶云穩便即收取師云恰是師問保福古人道是不是非不非是即龍女頓成佛非即善星生陷墜與麼道還留是非不留是非保福云未却是非師云與麼是非有什麼了時師見保福共僧在茶堂說話師云莫葛藤保福云葛藤即不得商量佛法還得也無師作摑勢保福云過在什麼處師又行一摑問東使只如仰山祇對溈山於面前與一畫意作麼生東使云作家麼師云兄真箇與麼作麼生東使云日可冷月可熱被師攔胸與一托問翠嵓古人道無端起佛見聞法想被佛威神力故左降二鐵圍間作麼生是二鐵圍翠嵓云起佛見聞法想師云起什麼佛見聞什麼法想無對問大普云於萬像中還有自己否老宿云有師云這箇豈不是燈籠云是師云識得老兄也師共長慶囷山在道場院見託真郎君來長慶問見說郎君是中塔還是否郎君只在面前立長慶云何曾是中塔師云正是中塔囷山云不是中塔保福指雪峰上院主山問長慶教中云妙峰頂莫只這便是否長慶云是即是可惜許問師只如長慶與麼道意作麼生師云若不與麼紅旗遍野白骨連山前後帝王問訊語忠懿王入萬歲寺見佛像指問師云是什麼佛師云請大王鑒王云鑒即不是佛師云鑒即不是佛是什麼惠宗見師不安問莫是時節至否師云即今是什麼時惠宗云與麼即無來去也師云亦是聖躬與麼道又因志上座說云昨夜見天王面前現惠宗問因師什麼不向某甲面前現云却是陛下見少帝遣內臣送書上山只乃封題而已師覽而神之尋內臣拜辭師云聖人若問如何祇對師云但道盡乾坤有所依賴師在雪峰日往泉州問盤龍侍中疾其時尹司徒聞到司徒令傳語云數日四大不安風勞發動師傳語云此是司徒句即今司徒在阿那侍中無對清源王太尉問安國了院主云劫火洞然向什麼處回避院主云這裏回避太尉不肯自代云不回避進云為什麼不回避太尉云他不出頭回避什麼師云什麼處見他道不出頭師因與清源王太尉說話云但是世間一切雜學底事盡是網太尉云只如今還網得也無師云太尉太尉乃展手云即今有什麼師云只這一網亦不少太尉舉南陽喚侍者事趙州云如空中書字雖然不成而文彩已彰師云只如與麼道是宗國師不宗國師太尉云宗與不宗俱是彰也師云只如趙州意旨作麼生太尉云不辜負趙州師云此是句也趙州意作麼生太尉云作麼師云彰也趙州意作麼生太尉無對偈頌七首直下猶難會尋言轉更賒擬論佛與祖特地隔天涯有曲無絃索宮商調不同若人才和得拍拍盡為龍綵筆除裝色更濃針挑瘡患理難同維摩昔日稱何事迷從西土却還東何事最堪依巗中獨坐時路險人難到巒高鳥不飛白雲長滿洞論劫未曾虧不話曹溪旨焉干道者機石室周圓慶已多有人不到復如何待封此樣呈諸友開時只好笑呵呵十八郎殿下送綵毬上於方丈頂掛便請偈衆綵裁成已工多妙最殊收歸方丈裏長玩一明珠十八郎殿下又送偈上國師兼請和師乃答之建化開遮假立名無名之說亦難停其中薦得非關識朗月當空不自明北京秀長稱為澤南派傳宗祖諱能黃卷暫詮呼作性教外須參有別行附十八郎下原偈無形無本亦無名日用驅驅不暫停對面向人多不識縱橫自在轉分明權時來寄君家宅萬種千般是事能認取當來真本性一時拋棄事皆行甌閩鼓山先興聖國師和尚法堂玄要廣集序夫釋迦西現張教網於多門達磨東來指人心於徑路不由名相頓悟真乘靡歷化城直之寶所而自少室之花開六葉漕溪之胤布諸方爰出石頭號純金鋪蓋以格高調古言嶮理幽厥後子孫從宗行步闊狹毫釐弗差矣即有先興聖國師法嗣雪峰乃石頭五葉也師坐道場則三十二年擁毳侶則一千餘衆或抵牾學者提唱宗乘機鋒迅而金翅取龍格致高而般倕匠物言如雷火搓之而一點隨游事比蟾輝唱之而孤輪不墜破空有而旋敲中道話君臣而匪稱當人排淨名而未是本參斥圓常而非為極則往前所集漏落者多漸邁金烏恐成水鶴今以了宗大師昔推入室今契傳衣凡於樞要之言並蘊胸襟之內寫瓶傳器分燈散明盧有拋遺再從編録總一十六會偈頌次之自量淺識之徒獲覩未聞之教揮毫承命聊述端由時乾德三年乙丑角黍後五日紹文序書鼓山國師玄要廣集後廣辨興聖國師語録一小編唱高和寡後世禪學或不能知舊本差大難入包囊中帶行今禪者守𧷤僧挺重刊小本以廣流通禪衲有自江西湖南來者知南方雪峰宗旨則復少挫鋒鋭行矩卷波瀾於性海也紹興戊午三月晦日住鼓山老禪士圭書鼓山國師和尚名神晏大梁人姓李氏衛州白鹿山受業得法於雪峰存和尚壽七十七臘五十八石頭第六世五代晉天福中示寂
