body:
  text: 舒州龍門佛眼和尚語録住南康雲居嗣法善悟編聖節上堂皇帝以天下為家兆民為子父子一體天下一家王愛於民民敬於王愛敬既同王道無外所以佛言如民得王又云如民之王且王外無民民外無王王在民外民不受賜民在王外王道不廣如何曰民無知曰民如何曰王聖神曰王今上皇帝至神至聖為民父母天寧降誕之節日月星辰連珠合璧江河淮濟激濁揚清乾坤造化草木蟲魚呈祥瑞顯奇特皆皇帝至德之所感致也伏願南山比壽北嶽齊齡永永萬年無窮無極遂下禪床作舞曰會麼山僧舞蹈揚塵萬歲萬歲萬萬歲下座上堂拈起拄杖卓一下云圓明了知不由心念抵死要道墯坑落塹畢竟如何乃靠拄杖下座上堂舉昔有一秀才見長沙和尚看千佛名經問曰許多佛祇聞其名未審居何國土長沙曰黃鶴樓崔皓題後秀才還曾題否對曰不曾長沙曰無事題一篇好秀才罔措大衆秀才問佛居何國土長沙為什麼却恁麼道秀才尋常嘲風詠月為什麼長沙面前一辭不措若是黃鶴樓有什麼難題處聽取山僧題破遂云容顏甚奇妙光明照十方我適曾供養今復還親覲下座上堂平旦寅狂機內有道人身大衆二六時中折旋俯仰行來走去説是説非分南説北運用施為開單展鉢喫粥喫飯盡是狂機且道那箇是道人身良久云碧落有情空悵望瑤臺無路可追尋下座上堂適來山僧夢在寢堂上聞法鼓遂下堂階夢見諸人上來近前問訊便登法座侍者燒香了如今正在夢中之人施陳夢事你等諸人還夢見麼若真見得是為覺人不省夢鄉宛爾沉沒還有一法與你為對麼不見古人道目前無法意在目前不是目前法非耳目之所到可不是奇特還夢見麼釋迦如來道如寤時人心縱精明欲何因緣取夢中物遂拈起拂子敲禪床云是什麼還聞麼復竪起拂子云還見麼良久云人間天上諸知識爭似龍門夢得親下座上堂僧問古者道諸佛不出世四十九年説諸佛既不出世為什麼四十九年説師云你疑來多少時也進云祖師不西來少林有妙訣祖師既不西來為什麼少林有妙訣師云知恩者少負恩者多進云恁麼則一人傳虗萬人傳實師云虗處作麼生傳來進云任從滄海變終不為君通師云禮拜著師復云始自隻履西歸卷衣南邁空聞消息流落人間古往今來遞相敬受大似一人傳虗萬人傳實山僧病多諳藥性年老變成精不是刻剝古人免見互相埋沒諸人應是從前覺觸往日見知從人邊請益得來言語中舉時中的出入遊戲則不無究竟真實大事萬不可得但能情亡理喪計盡途窮無施設處用心正是作功夫處山僧尋常祇道喫茶去今日也道喫茶去會盡諸方五味禪何似山僧喫茶去下座上堂擬思量何劫悟不思量終莽鹵欲思不思踏破時萬里無雲常顯露常顯露妙用恆沙非旦暮諸禪伯正好休征罷戰永息干戈傍水倚山成就大事況是人生易老壽命幾何或若生死現前畢竟將何支準不見古德道若不安禪靜慮到者裏總須茫然久立上堂來來去去去來時去去來來離覺知了得去來無礙方知塵劫不思議所以道來無所來去無所去去來之際生死昭然前念生是來後念滅是去求其來去了不可得乃至前生後生今年去年更無絲毫遷變之相如斯會得始絶去來但以衆生背覺合塵去來輪轉苟能洞達復有何事昔石頭大師一日問龐居士子近日如何居士曰卒説不及乃呈一頌日用事無別唯吾自偶諧頭頭非取捨處處勿張乖朱紫誰為號丘山絶點埃神通并妙用運水及搬柴石頭默然許之後造江西問馬大師不昧本來人請師高著眼大師直下士云一等沒絃琴唯師彈得妙大師直上大衆若不是馬大師被他一問百雜碎諸人喚什麼作本來人若無本來人作麼生眼見色耳聞聲種種施為運轉諸人還見本來人麼如今盡道本來人無形無相不曾著衣喫飯不生不死如此會得爭合本來人要知麼諸人總是本來人一段生死變化煩惱無明又如何消遣聽取一頌與子偕行今日路如君共看本來人同名同姓同形段無死無生無色塵畢竟如何切忌喚作本來人下座上堂舉僧問洞山初和尚如何是佛對云麻三斤大衆有恁一件事何故無人知得洞山見人不知了遂自頌曰七寶畫牛頭黃金為點額春晴二三月農人皆取則寒食好新正鐵錢三四百諸仁者此一轉因緣盡謂粗言及細語皆歸第一義又云臨機應用一切尋常如斯會解埋沒古人要見洞山老子麼鴻鵠一舉千里飛鑽雲子與天齊鳳凰不是凡間物為瑞為祥自有時久立師到真乘請上堂真乘舉石霜遍界不曾藏語師云遍界不藏全體露絲毫有見事還差會中誰是先陀客不動纖塵便到家真實到家之者得意忘言伶俜在外之人隨情起解情解既起名相是興言意兩忘十方咸暢豈不見適來堂頭已普告大衆如何更令山野稱提蓋為妙旨幽深人難洞達何也既知咫尺之間為什麼却道不覩師顏既言遍界遍空如何更云不曾藏覆還見落節處麼若見得便見石霜老子雪峯大師亦知龍門山僧與真乘長老又此一衆禪和總有分什處山僧未離本院不到此中時真乘無一人龍門長老山僧離本院度荒山來到真乘諸人一一相見此間有一人龍門長老若有一人龍門長老於法成增若無一人龍門長老於法成減減故落斷增故落常既墯斷常豈云正見一似上座未出家時無一人上座既出家後有一人上座你諸人如何裁斷得心地安樂去還裁辨得麼向此有箇入處更有什麼事也或若未明良久曰不解作客久立上堂獨自坐方信西來有達磨獨自行不用紅蓮足下生獨自語分明向誰誰肯許獨自參剎剎塵塵示指南相逢相問窮端的莫道山僧解放憨端師翁忌辰上堂昔人已乘白雲去此地空餘緑水流緑水一去不復返白雲千載空悠悠湖南舊説老楊岐失却金毛師子兒江南江北無覔處龍門今日順風吹順風吹囉囉哩水急風高下釣磯上堂鳥從空裏飛人向心中住人死心宛然鳥沒空何預人生一過鳥此心實可據但自了其心無勞問來去所以須菩提問世尊云何住世尊答曰如是住卵生胎生濕生化生有色無色有想無想等皆令入無餘涅槃而滅度之而實無有一衆生實滅度者還會得麼三界萬法實無絲毫生滅動靜之相祇由迷此決定惑為色身之內所以質礙名色領納曰受思惟曰想遷流曰行分別曰識皆由自心之所成立為不知此名為五陰遂成色心二法不見道照見五蘊皆空度一切苦厄現前五陰之身為有耶為無耶若能如是見得實無生死等事或未然者豈無去來有一則無生死因緣舉似大衆昔漸源同道吾弔慰乃拊棺問道吾曰生耶死耶道吾曰生也不道死也不道漸源不省後聞僧念蓮經應以比丘身得度者即現比丘身而為説法忽然省得遂至石霜携鍬法堂上從東過西從西過東石霜曰作什麼漸源曰覔先師靈骨石霜曰洪波浩渺白浪滔天覔什麼先師靈骨漸源曰先師靈骨猶在大衆還見得麼拈起拄杖曰者箇是拄杖子那箇是靈骨者箇是靈骨那箇是拄杖子遂卓一下云長安夜夜家家月影落寒潭幾箇知上堂若論此事如人買田地相似四至界畔一時分明結契了也唯有中間樹子猶屬我在大衆既是四至分明結契了也為什麼中間樹子猶屬他不見道千年田八百主若識得中間樹子耕鋤任你耕鋤布種任你布種開花任你開花結子任你結子若無中間樹子爭喚作常住良久云作麼生自云高處高平低處低平上堂云龍門別無奇妙剛謂單傳心要豈惟淺水無魚撥剔全無孔竅二時展鉢開單逐日屙屎送尿萬事與人一般子細看來好笑既是萬事與人一般為什麼稱善知識良久云我也理會不出上堂今之叢林天下多有求一人會無情説法則無莫道會得討一人舉此話亦難得何也須是曾親聞説法來方可舉示如未曾親聞縱有舉示祇益塵勞於其慧命無所滋益大衆會既少舉尤難叢林雖有日凋殘若欲明斯旨應須離念看一人如領解大衆盡心安既是一人領解為什麼大衆盡心安若不如此爭稱出離之門上堂舉志公曰我見世間之人各執一般異見祇知傍𨫼求餅不解返本觀麵餅則從來是麵造作由人百變大衆會麼狸奴白牯念摩訶貓兒狗子長相見諸禪客薦不薦若言自性本圓明大似捫空追閃電知得麼含元殿上更覔長安慈氏宮中願生內院上堂僧問千尺絲綸直下垂一波才動萬波隨如何是一波師云你尋常如何吞吐僧云如何是衆波師云著衣喫飯有甚難僧云鈎頭一句請師道師云你自道取僧云雄雄江上垂綸者竿上時時有錦鱗師云沒交涉師復云諸仁者無過此時也長恁麼亦有不恁麼時禪學人道無有不恁麼時説箇恁麼已是不恁麼也恁麼時名為得念不恁麼時名為失念如今問諸人為常失念亦有不失念時禪學人道常名得念時説箇得念已是失念了也要知得恁麼但了取不恁麼時要明得念但識取失念時故先德道恁麼恁麼又云不恁麼不恁麼好奇怪諸高德是以釋迦如來又云得念失念無非解脫成法破法俱名涅槃地獄天宮皆為淨土你等還知得一段真實事否若知得永超終始之患十二時中自然安樂無事也下座上堂云不動龍門內行參古佛機親逢渠面目肯話自容儀凡聖心平等高低路坦夷丹霞燒木佛院主落鬚眉何故下座上堂舉六祖大師在大庾嶺頭示明上座曰不思善不思惡正當恁麼時阿那箇是明上座本來面目明即大悟大衆還會者話麼正當恁麼時歷劫不曾迷步步超三界歸家頓絶疑上堂舉僧問忠國師如何是本身盧舍那師曰與我過淨瓶來其僧過淨瓶師曰却將舊處著其僧送去舊處再來問如何是本身盧舍那師曰古佛過去久矣此一則法門若非證入莫曉宗猷若縱心猿終成解會尋常盡道甚處來不是盧舍那更不識了再問豈不是過去久矣又道國師自受用三昧再三若問盧舍那自是古佛過去久矣又云如何是本身盧舍那良久處好會取若不委知遂落草向你道與我過淨瓶來如斯解會但縱心猿不見國師云得之於心伊蘭作栴檀之樹失之於旨甘露乃蒺䔧之園要知麼太陽門下日日三秋明月堂前時時九夏大衆如何是盧舍那歸堂喫茶去下座上堂昔趙州和尚訪庵主問曰有麼有麼庵主豎起拳頭趙州曰水淺不是泊船處拂袖而出又訪一庵主問曰有麼有麼庵主豎起拳頭趙州曰能縱能奪能殺能活禮三拜而去師云庵主一般豎起拳頭趙州何故肯一箇不肯一箇且道得失在什麼處趙州自起自倒勘破多少阿師庵主坐斷要津過了多少寒暑要識趙州麼拍禪床右角云識取趙州要識二庵主麼拍禪床左角云識取庵主還有人點檢得失處出麼良久云易開終始口難保歲寒心下座吳居士請上堂身是佛身須信六根清淨行名佛行故知三業圓明身淨則垢無所生行明則暗無所起垢生由乎迷淨淨作垢而莫覺莫知暗去必由得明明即暗而難信難解所以諸聖常加被羣生自棄遺苟易慮於可作之初革情向誤為之後親開智鑰仰扣慈關他心慧眼以洞知重罪宿冤皆可懺菩薩悲願遍滿娑婆衆生哀投無不冥感是知明暗共體垢淨同源凡夫有成佛之期大士有度生之分苟不如此萬善徒興公達居士與如道人洞明泡幻了悟浮生共入山來究明斯事今晨請山僧升座説法記得昔日裴休訪華林和尚問曰師還有侍者否林曰有一兩箇休曰在什麼處林乃喚大空不空時二虎自庵後哮吼而出休覩之驚悸林語二虎曰有客且去二虎哮吼而去休問曰師作何行業感得如斯林乃良久曰會麼休云不會林云山僧常念觀音大衆會他此箇意旨麼常念觀音力伏猛獸道眼通明萬緣何有良哉大士時時垂手念茲在茲安樂長壽下座上堂永嘉一宿而悟遂曰幾回生幾回死生死悠悠無定止自從頓悟了無生於諸榮辱何憂喜大衆説有生死亦是言詮説無生死亦是言詮既涉言詮則是事迹且事麁易顯理妙難彰故言近而旨遠如何以至近之言明其至遠之旨不其難哉先聖道得旨忘言遺事觀理後人不曉便乃事外尋理言外求旨譬如以手撮摩虗空徒自疲勞終無所益要知得力用意處麼須即事無事即言無言悟入方親解會不得若如是隱顯施為神用難測也不見僧問首山如何是佛法大意首山曰楚王城畔汝水東流便有人悟去歸堂上堂五色燈光眚所成但除其眚莫除塵若言本眼何曾眚乃是臨河渴死人上堂僧問劫火威音前別有一壺天御樓看射獵不是刈茅田乃提起坐具云未審者箇喚作什麼師云正見刈茅田僧便喝師云猶作主在師復云祇宜説一句有人會得去猶較些子或若無人會得山僧却成妄語思量了不如且休各自大家堂中喫茶自由自在免見他時異日被人破何也將軍自有嘉聲在不得封侯也是間喫荼去下座上堂舉南泉和尚謂衆曰王老師賣身去也有人買麼時有一僧云某甲買師曰好一員禪客南泉云不作貴不作賤你作麼生買其僧無對師云噁笑殺人有數尊宿為此僧著語趙州道明年與和尚作一領布衫一人道成何道理一人道和尚屬某甲後來雪竇道別處容和尚不得大衆許多尊宿爭頭競買也要運出自己家財王老師交關未成不敢胡亂分付者般行貨古今亦少見之龍門今日亦賣身去也然則有貴有賤賤則分文不直貴則金玉難偕你買也屬你你不買也屬你若識得龍門龍門與你作道伴有人處無人處起心動念總知得你善則令汝行惡則令汝止縱經三塗歷八難一步不相捨離常與你作道伴你若不識龍門龍門與你作冤家教你出家使汝行腳令汝尋師遣汝體究遂教你不會令汝茫然令汝求覔解會令汝巧作道理遂令淨妙國土而作土石山河常樂法身而作無明煩惱成不自在常生退失一步不放捨常與你作冤家大衆龍門屬你諸人來多時識得是道伴不識是冤家還有人明得此旨麼乃拈拄杖點一下曰一道伴二冤家通逆順遍河沙眼是空翳是花得龍門道無涯遂放下拄杖子云少賣弄歸堂去上堂臘月扇子功勳絶浩浩涼風動寥泬豈止炎蒸六月天暫時與君解煩熱下座五祖和尚到上堂曹溪大師傳衣歸嶺南後來讓和尚得法授與馬大師馬大師接得百丈百丈得黃蘗黃蘗得臨濟臨濟得興化興化得南院南院得風穴風穴得首山首山得汾陽汾陽得慈明大師慈明大師接得一人楊岐和尚如今與他得底事看此老子云我者裏如閙市裏上竿子相似是人皆見瞞你眼得麼楊岐老後來接得端和尚一人此老子曾住此山來有頌曰海底珠動時雲中月還現涼夜無狂風清光都一片端師翁後來接得先師一人先師有言曰祇從咬破一箇鐵餕餡直得百味具足此老子所以一生口硬好説硬話伏自先師付囑之後大法傳持以來末後東山一時分付今五祖堂頭和尚此日幸對人天廣衆請不吝慈悲重為顯揚使先宗有據吾道益明莫不大幸上堂泡幻同無礙如何不了悟眼裏瞳人吹呌子達法在其中非今亦非古六隻骰子滿盆紅大衆時人為什麼坐地看楊州鉢盂著柄新翻樣牛上騎牛笑殺人上堂諸人未到龍門山將道龍門在世間既到龍門心自在杉松拂拂水潺潺諸人還識龍門山麼若也不識未免山青水緑百年光陰能有幾許未回光達本已前都成夢幻遂拈拄杖云六道衆生造罪造業三世諸佛成佛作祖盡在山僧拄杖頭上諸人還見麼卓一下云百雜碎了也復展手云把將絲毫許來又卓一下云手執夜明符幾箇知天曉下座上堂獬豸同欄辨者嗤薰蕕共處須芬郁諸仁者得底人終不自異於人而從前千聖悉所稱讚實有異於人處譬如二人同胞胎共父母同舍同學同一師授至於飲食語言之間悉無有異一日同入試院同一題目而一人得第一人落第及第者永異民庶落第者乃是常人是二人初無改易而貴賤高低有異恰如得與不得初無有異而一人得之位齊諸聖一人迷之遂作凡夫人雖不殊迷悟遼遠大衆可不驚怖者哉所以香林和尚云老僧二十年前見與我一般一輩人盡皆得道我日夜思量他得箇什麼便如此去我二十年中常看後來也得恁麼你看他先德苦切之言實可取信豈可守株徒喪日月各宜體悉已後也須得去不勞久立下座上堂龍門三月半大鼓聲聲喚喚得一時來特地生迷亂大衆既是喚得一時來為什麼特地生迷亂此段好因緣諸人怎生斷不解斷轉迷亂若解斷較一半良久曰因緣一段無人斷留與諸方共斷看上堂收得本名度牒踏遍自己山川聞有龍門長老走來學道參禪恁麼惺惺漢子如何立地瞌眠忽然睡醒眼開元來天生自然師乃失聲曰噁討殺我討殺我皇天皇天尋殺我雖然如是知是般事便休直須運出自己家財莫自拘於小節參堂上堂且道山僧即今還有為人處麼若有為人處即埋沒山僧若無為人處即埋沒上座彼此出家兒莫遞相埋沒好要知麼山僧將你本分事舉似你諸人何不於你本分事上識取識得麼若道便是某甲本分事也如向眼睛上下一釘相似若道我雖有本分事實未了知你又披什麼衣服大衆既是恁麼人識取恁麼事久立又奚為珍重上堂僧問納須彌於芥中擲大千於方外衲僧門下總用不著學人欲使泥牛耕巨海須彌駕鐵船師還許也無師云十字縱橫一任行取僧云踏破澄潭月穿開碧落天師云猶未知衲僧分上事在僧云有意氣時添意氣不風流處也風流師云洪州腰帶師復云春光漸盡夏景將臨悠悠之徒貪生過日我今問你諸人從早至夜念念不住是有思量是無思量人人必謂是有思量我且問你作麼生思量何不識取你諸人思量了隨而興作運為也我問你作麼生興作何不識取你諸人於興作時起種種言説且作麼生言説何不識取都緣是自家先迷了祇管隨處流浪所以道道源不遠性海非遙但向己求莫從外覔覔即不得得亦不真如在虗空退至何所還肯麼你諸人在我者裏或暫經冬夏或久涉炎涼若到別處人問龍門事不可指東劃西亂有所説却成欺罔也各將為事各將為事因成四偈思無思思萬邪一正不識玄旨徒勞念靜作無作作貫色通聲水中鹽味不見其形言無言言不費脣舌未説之法林中之葉龍門潦倒告報諸人既然如是何故因循賢席頭納疏上堂一葉飄瓢水上歸姑蘇春色照岩扉坐禪片石重來看却笑山雲拂蘚衣所以沉空滯寂之士名為貪著小乘混世同塵之人謂之圓通之侶不捨道法而現凡夫事豈是植種於空現前日用是大總持門一一親得其力如斯之旨事可量哉昔日黃梅散席道在老盧坐折連床湖南最盛古今榜樣作者同知進止合儀動靜可法況龍門新興保社意在求人衆手淘金誰是得者有麼有麼令人思百丈解踏馬駒行參上堂杜順文殊事可知定光如來老大隋張三李四何王趙問你渠今是阿誰市賣魚忘進趣案頭分肉露全機男兒鎖子黃金骨苦痛無明墮汙泥結夏上堂登龍門下無凡客不假風雷自有奇三月進修從此始經行宴坐可思議三月安居九旬禁足稟如來之教旨乃釋子之清規橋彴津梁人間天上或垂手入者未嘗離於此座觀心入定者亦常遊乎十方此豈可以有心知豈可以無心會苟能如是何生而不護何足而不禁覆被萬靈廣益羣品或不由斯道者吾末如之何也下座上堂今時學者不究佛語祇究祖師語殊不知祖師語即是佛語莫如此揀擇却成誘佛法去祇如雲門大師示衆曰人人盡有光明在看時不見暗昏昏作麼生是光明自代云三門佛殿廚庫僧堂又云好事不如無者箇是祖師語是他道三門佛殿廚庫僧堂諸人尋常看時是看是不看若看他道看時不見暗昏昏如何得成光明既是光明了又道好事不如無作麼生又不要去且如楞嚴會上説箇晦昧為空空晦暗中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真精妙心中所現物者箇説話甚是子細且道與雲門道底事相去多少莫祇明祖師語不究佛語有人曰我亦不用佛語不用祖師語祇用自語祖師語佛語尚不要更用自語又道我宗無語不用言語有語尚不是況無語耶莫作夢從朝至夜佛法作一邊祖師語作一邊有語作一邊無語作一邊妄想作一邊無妄想作一邊若恁麼真可謂看時不見暗昏昏也久立上堂十方世界龍門寺大地山河是學徒隨順衆緣成解脫算來全不費工夫上堂舉僧問趙州學人乍入叢林乞師指示趙州曰喫粥了也未僧云喫粥了也州云洗鉢盂去其僧言下便悟大衆山僧今朝喫粥也洗鉢盂祇是不悟既是為善知識為什麼却不悟還會麼豈可喚鍾作甕終不指鹿為馬善人難犯水銀無假冷地忽然破管取一時放下上堂龍門若為作端午打動衆人塗毒鼓髑髏破後遣誰聞鑒覺盡時敢言普是謂南山鱉鼻蛇好箇大雄白額虎可憐開眼覔眼人赫日光中尋入路上堂飄飄颻颻楊柳花紅紅赤赤遠天霞屈屈曲曲龍門路僻僻靜靜野僧家尚不心頭懷勝解誰能劫外算河沙休糧方子齋兼粥任運還鄉苦澀茶好大哥喫茶去上堂七七四十九面南看北斗死去與生來泥牛大哮吼所以釋迦老子未離兜率已降王宮未出母胎度人已畢如此則毗盧境界止在人間涅槃妙心更於何覔昔日那吒太子析肉還母析骨還父然後現本身運大神通大衆肉既還母骨既還父用什麼為身學道人到者裏若見得去可謂廓清五蘊吞盡十方聽取一頌骨還父肉還母何者是身分明聽取山河國土現全軀十方世界在裏許萬劫千生絶去來山僧此説非言語下座上堂撫掌大笑良久曰大衆笑箇什麼山僧笑古往今來一切人有瞥地有不瞥地不瞥地之人如黑地數甕有甚分曉瞥地之人便自回頭轉腦東問西問譬如衣錦夜遊問來問去問去問來忽然如晝見日便云譬如有目日光明照見種種色多少分明雖然如此更須知有向上事末後句始得罷參大衆始於瞥地終於罷參古往今來莫過如此山僧所以笑他恰如春夢相似諸人還曾夢見麼莫道無事法爾天真好豈不見大庾嶺頭曾趕上少室岩前立到腰豈得不遇於人好大哥喫茶去下座行者剃髮上堂山僧因而度得小師一人遂拈起拄杖示衆云見麼法名崇木俗姓葛良久又云爾既投吾出家今為汝受三歸五戒乃云崇木歸依佛歸依法歸依僧已為汝作三歸今為汝翻十邪受五戒汝當聽受所謂身口意也身有三過謂殺盜淫意有三過謂貪恚癡口有四過妄言綺語兩舌惡口作此十者名為十惡無此十者名為十善汝今於三業門中稟受戒法所謂不殺不盜不妄不淫不飲酒是五戒相汝依吾教信受奉行復卓拄杖一下云崇木聞吾教訓乃告吾曰和尚所説但崇木從來無身口意亦不知何以為持犯縱聞三歸我不知何者名佛法僧聞五戒相從何受持雖煩和尚如此崇木並無領覽處師放下拄杖曰此真吾弟子也是真歸依也真受得戒也所以昔人云和尚何不畜一沙彌老宿云有無眼耳者為吾尋一人來正是此意也好得力小師大衆會得否拈起拄杖云扶過斷橋水伴歸明月村久立上堂總別同異兼成壞祇是山僧與衆人高廣須彌入芥子無邊剎海在微塵晝復夜秋復春境寂心融事事真七寶大車既如此去來語默莫因循禪和子聞説了呵呵大笑道我會也我會也師乃呵呵笑云你會也且道西天那蘭陀寺後孤峯頂上如今有什麼人在彼中修行見麼見麼下座上堂趙州道箇洗鉢去其僧豁爾知歸鳥窠吹起布毛侍者當下得旨為復是就伊明破為復是吐露向伊亦不是就伊明破亦不是吐露向伊大衆會麼本有之性為什麼不會為四面璘和尚挂真虗空無相不拒諸相發揮寶鏡無形豈礙羣形頓現相與形而常偽空與鏡而常真故即偽即真不生不滅大衆或若虗空頓消殞寶鏡不臨臺光境俱亡復是何物六十三年即且置且道即今四面老子在什麼處遂拈起真云生涯何所有今古與人傳上堂夏已半山中早晚不甚熱知事毗贊外無恙首座大衆康休西庵首座旦暮流慈法樂無量山門內外雍肅表裏安涅槃山法性海豈容取證造詣擬議於其間哉在夫山僧與諸人登高而履深不可坐取安佚而無所得也各宜悉察昔有一禪客親近一老宿甚勤老宿每見來即揮手曰未在未在且去如是經久其僧中夜思惟曰並不蒙一言開示祇管道我未在教我怎生奈何思量來思量去忽然省得歡喜無量至明日上去見老宿老宿見來便點頭曰是也是也大衆者箇便是達磨大師所傳宗旨且如何便見得良久云鳥守空池魚從腳下過總不知歸堂五祖忌辰上堂趙州不見南泉山僧不識五祖甜瓜徹蒂自甜苦瓠連根自苦上堂達磨大師入中國至今幾千年得其道者甚衆領其旨者實多大似一人傳虗萬人傳實大衆流言止於智者諸人三十年後莫道見龍門來上堂先聖道法性海中親認得竪起拂子云還有認得底麼良久云認得也在法性海中認不得也在法性海中大衆既總在法性海中何故却有認得認不得且道此理如何每常兄弟道何處不是法性海山僧直是不肯你道病在何處有人道病在有道理處山僧問伊如何得無道理去他道珍重便出或道今日七來日八大衆若總恁會如何見得古人道法性海中親認得去莫將間學解埋沒祖師心解夏上堂尊者憍陳如九旬最親切老少幸相依上下皆歡悅瞻聽離聞見承覽亦超絶四海五湖人勿謂真機泄上堂昔仰山夏末禮拜溈山溈山問曰子今夏作何所務仰山云開得一片田種得一籮粟溈山云子今夏也不空過仰山却問和尚今夏作何所務溈山云晝日一餐早晨一粥仰山云和尚今夏亦不空過言了退後吐舌溈山云子何得自持白刃斷其命根仰山拂袖便出大衆溈山父子尋常相見遊戲神通不同小小還有知得底麼若無山僧與諸人説看開一片田密密綿綿兩頓粥飯其道自辦山僧一夏與諸人相見自是諸人不薦若或薦成一片是什麼一片看取當門箭
