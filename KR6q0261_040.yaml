body:
  text: 雲峰悅禪師初住翠巖語録門人齊曉編師在同安受翠巖請升座僧問師唱誰家曲宗風嗣阿誰師云新長老不答話進云恁麼則大愚的子汾陽親孫師云放你二十棒師乃云山僧今日平地喫交了也你等諸人還知敗闕麼然官不容針私通車馬拍禪床下座次夜小參僧問昔日靈山分半座二師今日意如何師云天高誰側首進云恁麼則昔日靈山今日翠巖也師云地闊少知音學人喝師便打僧問抱璞投師請師雕琢師云不雕琢進云為什麼不雕琢師云雲從龍風從虎僧問佛不化本國和尚為什麼歸鄉住持師云放過一著僧擬議師便打乃云莫更有作家禪客本分衲僧何妨出來共相證據有麼布袋裏盛錐子不出頭來也大好大凡扶竪宗乘亦須是箇人始得若未有奔流度刃石火電光底眼不勞拈出臨濟大即與德山座次德山云今日困濟云老漢寱語作麼山擬拈棒濟便掀倒禪床師云奇怪諸禪德看此二員作家一拶一捺略露風規大似把手上高山然雖如是未免傍觀者哂且道誰是傍觀者喝一喝擊禪床下座離同安衆請上堂僧問今離鳳嶺將屆龍沙如何是不動尊師云天寒雨至進云特地上來伸此問師為如何不指南師云緊捎草鞋乃云山僧道慚荒薄德揣無堪豈謂使命遐飛僧徒雲請此蓋堂頭和尚友于情深發揮道廣但厲履氷之志敢忘報德之誠而又翠巖一行專使附近四十餘人數日之間頗多喧聒其於感愧併集山懷兼此者一行參隨高德既蘊成人之美更敦尅志之心其如跋涉長途各希愛護然出家達士以利人為己任動若行雲止猶谷神豈有心於彼此情繫於動靜者哉既無心於彼此亦無繫於去來所以紜紜自彼於我何為如是則冀諸上人高橫金錫輕卷雲袍明日遂行胡往弗利師在上藍開堂宣疏罷遂指法座云還有不受人謾底麼有即出來推倒禪床喝散大衆然未是作家也且救得一半還有麼良久云既無人出來山僧今日不惜眉毛不免指鹿為馬翻日作月去也三十年後莫錯怪人好便升座祝聖畢又拈香云大衆此一瓣香天不能蓋地不能載塵沙諸佛天下老師未敢正眼著諸人向什麼處摸索然官不容針私通車馬奉為先翠巖芝禪師乃跏趺而坐維那白槌云法筵龍象衆當觀第一義師云祖禰不了殃及子孫事到如斯寧容分雪所謂出世利生之事呼為第一義門但有言説都無實義諸人若也委悉山僧出世事畢其或未然有疑請問僧問承教有言若有聞法者無一不成佛此日朝蓋臨筵如何是法師云劒過遠矣爾方刻舟進云大愚山上曾施力豫章今日正宣揚師云臨崖看滸眼特地一場愁問師唱誰家曲宗風嗣阿誰師云識法者懼進云一言才出駟馬難追師云放過一著僧撫掌師云自領出去問朝蓋已伸三請禮乞師一句露尖新師云重言不當吃進云恁麼則雲散家家月春來處處花師云斫額望扶桑問師有衝天之略學人有入地之謀兩陳交鋒如何即是師云山僧打退鼓僧擬議師便喝學云相逢盡道休官去林下何曾見一人師云拖出去乃云問話且止佛法正論非競辨而可求擊揚鏗鏘以摧異學諸祖之道豈其然乎所以一大藏教不能自詮十方諸佛不能提唱輝騰今古逈絶見知圓滿十虗寧有方所只為情生智隔想變體殊雖終日行而不自覺是以勞他先聖回首塵勞曲開方便方便即有還證明得麼若也證明得便能隨機利物應化無方出沒卷舒人間天上然雖如是即不得向衲僧門下何故笑破他口師入山大衆出接首座問德山宗乘即不問作麼生是臨濟大用師云你甚處去來首座擬議師便掌首座云滕王閣又作麼生師喝云領衆歸去入院升座僧問鼓聲絶名香爇臨濟德山請師決師云頭戴天腳踏地進云學人今日失利去也師云錢唐去國三千里進云真善知識師云放你一頓問知師久蘊囊中寶今日當機事若何師云何不高聲問進云恁麼則學人退身去也師云還我話頭來學云諾師云杜撰衲僧乃云山僧昔年曾到今日重來非唯人事增歡抑亦林泉加秀且道不傷物義一句作麼生道良久云天高東南地傾西北下座上堂僧問師登寶座舉唱宗乘學人上來請師垂示師云楚石不當玉進云相識滿天下知心能幾人師云朽木不可雕復云此是普光明殿華藏師子之座人天普集凡聖共居今日曲順人情如何剖露若以宗乖舉唱直須大地荒涼就下平高未免遭他笑怪且道不落化門一句作麼生道良久云惜取眉毛好便下座上堂諸佛出世平地陷人祖師西來承虗接響一大藏教誑呼閭閻明眼衲僧自救不了諸人到者裏憑何話會良久云為衆竭力禍出私門擊禪床下座上堂寶劒已失虗舟徒刻買帽相頭江南江北擊禪床下座上堂僧問如何是道師云路不拾遺進云如何是道中人師云草賊大敗僧禮拜師噓一聲乃云臨濟先鋒放過一著德山後令且在一邊獨露無私一句作麼生道良久云翠巖今日失利以拂子擊禪床便下座上堂三轉法輪於大千其輪本來常清淨毗婆尸佛在你諸人眉毛眼睫上放光動地轉大法輪看看見諸人不會却向翠巖拂子頭上般涅槃去也擊禪床下座上堂僧問名喧宇宙知師久翠巖家風略借看師云滑石不打連底凍僧便喝師云作什麼僧擬議師便打問鴻門未踏時如何師云劈進云踏後如何師云裂進云恁麼則天下歸漢去也師噓一聲乃云千人排門不如一人踏關一人踏關千人萬人得到無疑安樂之地豈不快哉如今還有踏關者麼良久云見義不為何勇之有擊禪床下座上堂拈起拄杖云金鱗不現虗勞力收取絲綸歸去來擲拄杖下座上堂過去諸佛已滅未來諸佛未生正當今日佛法委在翠巖放行則隨機利物把住則瓦解氷銷且道把住好放行好良久云咄這野狐精以拂子擊禪床下座上堂髑髏常干世界鼻孔摩觸家風驀拈起拄杖云玄沙老子穿過了也會麼復云無人過價打與三百擊禪床下座上堂僧問寶劒未出匣時如何師云在匣裏進云出匣後如何師云京三汴四問如何是和尚家風師云大木大皮裹進云忽遇客來將何祗待師云小木小皮纏問如何是祖師西來意師云解纜放船問如何是佛法大意師云天長地久進云恁麼則大盡三十日小盡二十九師云釋迦老子為什麼失却鼻孔僧無語師云脫空謾語漢復云真不掩偽曲不藏直現在可驗固是謾人眼不得且作麼生是諸人眼還驗得麼若也驗得翠巖瓦解氷消若驗不得分付德山和尚便下座四月八日上堂僧問如何是佛師云寸釘入木進云意旨如何師云三生六十劫復云教中道四月八是佛生之日放大光明照耀十方地湧金蓮華自然捧雙足東西及南北各行於七步分手指天地作師子吼聲上下及四維無能尊我者後來雲門大師舉了云老僧當時若見一棒打殺與狗子喫却且圖天下太平師曰奇怪諸禪德雲門雖有定亂之謀且無出身之路若也辨得許你頂門具一隻眼便下座上堂翠巖今日不惜眉毛向你諸人道一大藏教祖師西來天下老和尚橫説竪説並不是衲僧分上事且作麼生是衲僧分上事驀拈起拄杖云這一隊漆桶便下座上堂竿木隨身逢場作戲然雖如是一手不獨拍衆中莫有作家禪客本分衲僧何妨出來共相唱和有麼時有僧出禮拜師云依稀似曲才堪聽又被風吹別調中下座上堂僧問靈山拈花意旨如何師云一言才出駟馬難追進云迦葉微笑意旨如何師云口是禍門問國師三喚侍者意旨如何師云有年有德復云不用愛聖聖是空名不用厭凡凡是妄立若得聖凡情盡喚作體露真常所以古者道但盡妄緣即如如佛諸人還信得及麼若信得及止宿草庵且居門外三十年後鼻孔撩天莫錯怪人好擊禪床下座上堂官不容針私通車馬今日不惜身命與大衆舉箇古人話良久云毗婆尸佛早留心直至如今不得妙便下座上堂汝等諸人與麼上來大似刺頭入膠盆與麼下去也是平地喫交直饒不來不去朝打三千暮打八百便下座上堂一刀兩段未稱宗師就下平高固非作者翠巖到這裏口似𬄈簷你等諸人作麼生商量良久云欲得不招無間業莫謗如來正法輪便下座上堂看風使帆諸方共用斬釘截鐵翠巖不然光吞萬象一句作麼生道良久云龍頭蛇尾漢下座上堂未達境唯心起種種分別達境唯心已分別即不生知諸法唯心便捨外塵相諸禪德只如大地山河明暗色空法法現前作麼生説箇捨底道理於此明得正在半途須知向上更有一竅在便下座上堂三界無安猶如火宅出身一句作麼生道良久云雲在嶺頭間不徹水流澗下大忙生下座上堂若見諸相非相即山河大地並無過咎諸上座終日著衣喫飯未曾咬破一粒米未曾挂著一條絲便能變大地作黃金攪長河為酥酪然雖如是著衣喫飯即不無衲僧門下汗臭氣也未夢見在下座解夏上堂僧問西天以蠟人為驗和尚此間以何為驗師云鐵彈子進云學人無用功處也師云學語之流問如何是諸佛出身處師云十字街頭進云豈無方便師云千重百匝復云日月易流光陰倐忽始見安居又當自恣此夏喜得大衆各各道體康安然出家之流曠達無礙初秋夏末或東去或西去出一叢林入一叢林忽有人問上座翠巖和尚今夏如何為人被他一問如何祗對莫道九九八十一莫道但得雪消去自然春到來莫道日出東方夜落西莫道合取狗口莫是下一喝撫一掌坐具驀口摵拂袖便行諸禪德如斯布露深屈翠巖既不然者別作麼生披露試對衆道看還有道得底麼衆無語師云若到諸方莫道我從翠巖來便下座上堂僧問萬法歸一一歸何所師云黃河九曲進云恁麼則今古無間斷也師云可憐沙塞鴈嗚咽與春期問如何是第一句師云垂手過膝問如何是第二句師云萬里崖州問如何是第三句師云糞箕掃帚問巔山巖崖還有佛法也無師云有進云如何是巔山巖崖佛法師云猢猻倒上樹復云老儒道仁者見之謂之仁智者見之謂之智百姓日用而不知是故君子之道鮮矣肇法師亦謂在天而天處人而人原夫能天能人者豈天人之所能哉諸禪德故知先聖垂範理契必同你等諸人如何委悉良久云穿僧堂入佛殿北斗裏藏身三門頭合掌阿呵呵是什麼擊禪床下座上堂僧問學人心眼未通乞師方便師云十字街頭石幢子僧無語師云會麼僧云不會師云你豈不是洪州人問達磨未來時如何師云流沙浪闊進云來後如何師云熊耳山高問如何是禪師云軍期急速進云有什麼交涉師曰日馳五百復云雲從龍風從虎水流濕火就燥且道衲僧就箇什麼竪起拂子云總在這裏裂開也在我揑聚也在我良久喝一喝云王令稍嚴下座寒食日上堂諸上座還會麼冬至寒食一百五家家冢上添新土翻思拾得與寒山南北東西太莾鹵南泉不打鹽官鼓以拂子擊禪床下座上堂天明平旦萬事成辦北俱盧州長粳米飯下座因入城衆請上堂僧問如何是豫章境師云樹色遠分仙尉宅湖光寒浸昔賢亭進云如何是境中人師云朝看東南暮看西北問如何是名無翼而長飛師云天上星進云如何是道無根而永固師云地下木有俗弟子問如何是佛師云著衣喫飯量家道進云恁麼則退身三步叉手當𮌎去也師云醉後添杯不如無復云語不投機承言者喪直饒你説得天雨四花地搖六震衲僧門下總是喫棒數然事無一向理出多門曲順機緣豈無方便所以古者道閙市裏識取天子百草頭上薦取老僧拘留孫佛在你諸人腳跟下放光動地轉大法輪乃竪起拂子云看看見你諸人不會却向翠巖拂子頭上入火光三昧去也擊禪床下座上堂未離兜率已降王宮未出母胎度衆生畢古人與麼道只見錐頭利不見鑿頭方下座上堂僧問承教有言唯此一事實餘二即非真如何是此一事師云鼻孔大頭向下進云與麼則晨朝有粥齋時有飯也師云惜取眉毛好問如何是無縫塔師云四稜著地如何是塔中人師云香風吹萎花更雨新好者問如何是衲衣下事師云皮裏骨問牛頭未見四祖時如何師云庵內人不知庵外事見後如何師云水流澗下任縱橫問丹霞燒木佛意旨如何師云橫三竪四進云院主為什麼眉鬚墮落師云七通八達復云始從鹿野苑終至跋提河四十九年間都來説一夢你等諸人還曾夢見麼所以道眼若不睡諸夢自除且作麼生是不睡底眼還驗得麼若也驗得塵沙諸佛天下祖師總向上座眼裏百雜碎若驗不得翠巖今日死中得活上堂道是常道法是常法汝等諸人切莫枉用身心馳求語句所以道但有纖毫即是塵舉意便遭魔境撓且道不涉廉纖一句作麼生道驀拈起拄杖云放過一著便下座上堂看窟籠著楔罕遇當人通褒貶一句作麼生道良久云不得春風花不開花開又被風吹落以拄杖卓一卓下座上堂僧問學人解問譊訛句請師不答訝人機師云髮長僧貌醜進云恁麼則日日香煙夜夜燈師云腦後合掌問承教有言但一月真中間自無是月非月如何是真月師云瞎驢趂大隊進云恁麼則早知今日事悔不慎當初師云腳頭腳尾乃拈拄杖示衆云我喚這箇作拄杖子你諸人喚作什麼若喚作拄杖子蝦跳不出斗若不喚作拄杖子平地上喫交還有道得底麼良久云翠巖今日失利擲拄杖下座上堂有佛處不得住無佛處急走過你等諸人橫簷拄杖向什麼處行腳良久云東勝身洲持鉢西瞿耶尼喫飯下座上堂假使心通無量時歷劫何曾異今日且道今日事作麼生良久云烏龜鑽破壁以拂子擊禪床下座上堂乾坤之內宇宙之間中有一寶祕在形山諸禪德頭上是天腳下是地口裏有舌面上有鼻寶在什麼處良久喝一喝下座上堂見聞覺知無障礙聲香味觸常三昧衲僧道會也山是山水是水飢來喫飯困來打睡忽然須彌山𨁝跳入鼻孔裏摩竭魚穿你眼睛中作麼生商量良久云參堂去上堂北鬱正中宵閻浮即當晝輪回如未惺薝蔔何曾嗅諸上座還會麼有智不假年高無智徒勞百歲冬至上堂運推移日南長至大家知有何勞特地日落三更騎驢入市參上堂觸目不會道猶較些子運足焉知路錯下名言諸上座翠巖今日將錯就錯你等諸人見色有眼聞聲有耳嗅香有鼻了味有舌因什麼却不會去良久云武帝求仙不得仙王喬端坐却升天以拂子擊禪床下座上堂門裏出身易身裏出門難冬行春令即且置不涉程途一句作麼生道良久云渾家送上釣魚船便下座上堂普賢行文殊智補陀巖上清風起瞎驢趂隊過新羅吉獠舌頭三千里上堂觀色即空成大智而不住生死觀空即色成大悲而不住涅槃諸禪德還會麼東勝身洲走馬西瞿耶尼著撲看看不審維摩老子喝一喝擊禪床下座上堂天得一以清地得一以寧君王得一以治天下衲僧得一旱地遭釘以拂子擊禪床下座上堂動容揚古路不墮悄然機師云古人與麼放開了也還跳得出麼直饒你跳得出鼻孔也在翠巖手裏且道翠巖鼻孔在什麼人處良久云得人一牛還人一馬下座上堂僧問不涉廉纖請師速道師云須彌山僧擬議師便打問如何是第一要師云蛇穿鼠穴如何是第二要師云猢猻上樹如何是第三要師云村裏草鞋問如何是般若體師云箭穿楊葉進云如何是般若用師云李廣陷番問如何是清淨法身師云紫枝荻樹云向上更有事也無師云有進云如何是向上事師云風吹日炙復顧視左右云放憨作什麼便下座上堂謹白參玄人是何言歟光陰莫虗度雪上更加霜下座上堂道遠乎哉觸事而真聖遠乎哉體之即神所以娑婆世界以音聲為佛事香積世界以香飯為佛事翠巖這裏祇於出入息內供養承事過去未來塵沙諸佛無一空過者過現未來塵沙諸佛是翠巖侍者無一不到如一不到三十拄杖諸上座還會麼將此身心奉塵剎是則名為報佛恩擊禪床下座歲旦上堂僧問大衆雲集合談何事師云花須連夜發進云與麼則草偃風行也師云萬里望雲關進云入水見長人師云速禮三拜復云三十六旬竟今朝還復起剎那不相知諸法何曾爾尊卑敘禮儀歡戚同居止廓哉總持門而人不能啓玉兔金烏藏頭露尾以拂子擊禪床下座上堂德山入門便棒臨濟入門便喝看這兩箇老漢一場敗闕然則事不孤起起必有因翠巖不著便蓋是為衆竭力你等諸人平地喫交過在阿誰良久云當斷不斷反遭其亂驀拈拄杖一時趂下上堂摩竭掩室已不及初毗耶杜詞至今話欛向上一路千聖不傳是什麼熱要當衲僧門下壁立千仞也是賊過後張弓是你諸人心憤憤口悱悱皮下還有血麼總在這裏遞相埋沒有什麼了期以拄杖趂下上堂即今休去便休去若覓了時無了時此事若向言語上作解會意根下卜度天地懸殊大丈夫一刀兩段猶未相應豈況被人喚去方丈裏塗糊指注舉楞嚴肇論根塵色法向上向下有無得失他時後日死不得其地近世更有一般宗匠二三十年馳聲走譽只管教人但莫上他言句喚作透聲色便問東答西以為格外之句將此狂解遞相沿襲從此混傷宗教誑惑後生苦哉苦哉我王庫中無如是刀總若似與麼行腳清風月下守株人涼兔漸遙芳草緑下座上堂汝等諸人與麼上來大似拋却甜桃樹尋山摘醋梨大凡行腳人十二時中也須管帶些子始得豈可只與麼隨行逐隊虗生浪死看他先聖百般不奈何了向人道我今為汝保任此事終不虗也你等諸人還信麼直饒向這裏信得及也是聽事不真喚鐘作甕以拂子擊禪床下座到南嶽承天升座僧問二師相見時如何師云石橋通大路進云恁麼則千里同風師云一字兩頭垂進云大衆證明學人禮謝師云鈍置殺人問寶座既登於此日翠嶺家風略借看師云雨來山色暗進云莫便是和尚家風也無師云鐵山南面三千里師乃云承天師兄早是瞞你諸人了也翠巖乍到不可雪上更加霜然則一言才出駟馬難追事到如斯不免塗灰抹土蓋為祖禰不了殃及兒孫三十年後鼻孔遼天莫錯怪人好下座次住法輪語録初入寺升座僧問法席久虗師子吼乞師方便震雷音師云好生聽取進云與麼則一音才剖大衆沾恩師云雲綻不須藏九尾恕君殘壽速歸丘僧便禮拜師乃云法不孤起仗境方生道不虗行遇緣即應然通方之士舉必知歸遊涉之徒何妨進步有麼良久云釣竿斫盡重栽竹不計功程得便休上堂一道直如弦家家當戶前有人爭共進至竟總論先喝一喝擊禪床下座上堂觀色即空成大智故不住生死觀空即色成大悲故不證涅槃驀拈拄杖云竪窮三際橫遍十方塵沙諸佛天下祖師盡在拄杖頭上縱橫十字轉大法輪見麼見麼見你諸人不會走入新羅國裏去也卓拄杖下座上堂春日雨滋霑溥逐根苗得門戶甜者甜兮苦者苦便下座上堂相逢不擎出舉意便知有也是萬里望鄉關所以保福有言擊石火睒電光透得透不得未免喪身失命而今還有透得底麼良久云為衆竭力禍出私門下座上堂火熱風動搖水濕地堅固然於一一法依根葉分布所以雲從龍風從虎水流濕火就燥且道衲僧就箇什麼良久云千箇作團萬箇作隊困則一處睡夢則各自做便下座上堂僧問久戰沙場為什麼功名不就師云誰遣你進云道泰不傳天子令時清休唱太平歌師云誰遣你復云元首明哉股肱良哉風以時雨以時五穀熟萬民安有什麼事但能隨順世緣自然合於正理不見祖師道入得世間出世無餘諸禪德還會麼良久云三邊若得渾無事四海何愁不太平下座開堂升座僧問善法堂開於此日第一義諦請師宣師云何不早問進云學人未曉師深旨乞師方便再垂慈師云去去西天路迢迢十萬餘問如何是法輪境師云岣嶁峰高雲半出進云如何是境中人師云五湖來往任縱橫問如何是和尚為人一句師曰雨來山色暗進云莫便是和尚為人處也無師云你眼在什麼處僧擬議師便打乃云且住且住大象既消希音杳絶旁通實化開拓權門於是三藏五乘對機設教猶國家兵器不得已而用之爾後達磨西來單傳心印一花五葉分布寰中大似持聾作啞何故況你諸人各有一段事耀古騰今通廓等於太虗明淨同乎皎鏡現在可驗固是瞞人眼不得且何者是諸人眼還驗得麼若也驗得塵沙諸佛三乘十二分教六代祖師天下老和尚盡向諸人眼裏百雜碎若驗不得前是案山後是主山良久復拈香云此日一會固非小緣匝地普天孰不欣慶更不敢祝贊皇風回同諸僚何故古人道吾禱久矣豈況當今聖主賢臣者哉久立大衆伏惟珍重上堂直得地搖六震天雨四花祖師門下白雲千里萬里下座上堂叮嚀損君德無言最有功任從滄海變終不為君通諸禪德還會麼口是禍門擊繩床下座上堂拈起拄杖云掌鉢盂向香積世界為什麼出身無路挑日月於拄杖頭上為什麼有眼如盲直得風行草偃響順聲和無纖芥可留猶是交爭底法作麼是不交爭底法以拄杖卓一卓下座上堂舉教中道此見及緣元是菩提妙淨明體又道林木池沼皆演法音交光相羅如寶絲網奇怪諸禪德古聖與麼説話喚作回首塵勞曲開方便所以道如我按指海印發光汝暫舉心塵勞先起會麼拂子且將揮世界拄杖權為答話人以拂子擊禪床下座上堂僧問浩浩之中如何辨主師云波斯入閙市進云與麼則不假披沙也師云學語之流僧便禮拜師云語不離巢道焉能出蓋纏片雲橫谷口迷却幾人源下座上堂有情之本依智海以為源含識之流總法身而為體只為情生智隔想變體殊達本情亡知心體合諸禪德會麼古佛與露柱相交佛殿與天王鬬額若也不會單重交拆擊禪床下座上堂拂子吞却須彌山尋常言論德山卓牌閙市裏作麼生商量良久云官不容針私通車馬下座上堂僧問金烏未必常當午玉兔半夜不曾昏時如何師云點即不到僧無語師云會麼僧云不會師云到即不點問如何是心地法門師云莫從人覓進云不從人覓如何得師云此去衡陽不遠乃云諸禪德既入叢林善參知識知識非他非他謾覓法性遍圓心源湛寂避尚無門求之何益君不見黃檗掩耳百丈卷席直下分明無別消息得失是非一時氷釋喝一喝下座上堂玄沙不出嶺保壽不渡河善財參知識五十三員慧遠結黑白一十八士雪峰三度上投子智者九旬談法華且道這箇漢是野干鳴師子吼喝一喝擊禪床下座上堂未離兜率已降王宮未出母胎度衆生畢法輪到這裏有口無用處你等諸人還相委悉麼若相委悉天下老和尚鼻孔總在你手裏若也不會啼得血流無用處不如緘口過殘春下座上堂舉不顧即差互擬思量何劫悟乃竪起拂子云如今舉了也你作麼生顧良久云擬思量何劫悟擊禪床下座上堂舉教中道於三七日中思惟如是事我寧不説法疾入於涅槃師便喝云當時若有人出來下得這一喝塞却老胡咽喉豈不天下肅靜四夷蕩蕩而今放開了也是你諸人還皮下有血麼良久云為衆竭力禍出私門拍禪床下座上堂古鏡照精其精自形古教照心其心自明諸禪德會麼心明諸法朗性昧衆緣昏日月不到處特地好乾坤喝一喝下座上堂十方同聚會箇箇學無為此是選佛場心空及第歸古人一期與麼道衲僧家還甘也無若甘去行腳眼在什麼處若不甘轉身一句作麼生道良久喝一喝拍禪床下座上堂聲色不到處病在見聞言詮不及處過在唇吻離却咽喉一句作麼生道還有人道得麼若道得坐却天下人舌頭若道不得法輪門下有粥有飯下座上堂便與麼會也是雪上加霜更待鼓兩片皮白雲千里萬里擊禪床下座上堂語不離窠臼焉能出蓋纏白雲橫谷口迷却幾人源所以言無展事語不投機承言者喪滯句者迷你等諸人到這裏憑何話會良久云欲得不招無間業莫謗如來正法輪珍重上堂舉教中道林木池沼皆演法音交光相羅如寶絲網又道鐘鳴鼓響宣真實水緑山青為舉揚諸禪德還會麼忽若有箇衲僧出來道話墮也且作麼驅遣良久云啼得血流無用處不如緘口過殘春上堂舉古者道學道先須有悟由還如曾鬪快龍舟雖然舊閣間田地一度嬴來方肯休古人與麼道大似貪觀白浪失却手橈衆中還有檢點得出底麼若檢點得出救取古人若檢點不出法輪今日失利去也擊禪床下座後住雲峯語録上堂古者道風動心搖樹雲生性起塵若明今日事暗却本來人今日事且置作麼生是本來人良久云鶴有九臯難翥翼馬無千里謾追風珍重冬日上堂節令屆書雲山家何所論一輪才出海萬類盡沾恩以拂子擊禪床下座上堂舉明教大師示衆云初秋夏末莫道我不向你諸人道大家看火燭師云明教老人憐兒不覺醜蓋由土曠人稀是你諸人今夏在這裏老僧深不欲向你道惜取眉毛好便下座上堂古者道古路若為登金仙道可憑不勞平有物不物未全稱且道全稱一句作麼生道雲峰打退鼓以拂子擊禪床下座上堂臨濟先鋒放過一著德山後令且在一邊獨露無私一句作麼生道良久云堪嗟楚下鍾離末以拂子擊禪床下座上堂古人道動容揚古路不墮悄然機還會麼古人與麼和底翻了也有般漢聞之如風過樹有什麼救處以拂子擊禪床下座上堂舉興化問克賓維那汝不久為唱道之師克賓云我不入這保社化云你會了不入不會了不入克賓云我總不恁麼化便打遂罰錢五貫設饡飯了趂出院後來却法嗣興化師云還會麼路遙知馬力歲久見人心以拂子擊禪床下座上堂古人道言多去道轉遠祇如未言道在什麼處乃云欲得不招無間業莫謗如來正法輪以拂子擊禪床下座上堂教中道種種取捨皆是輪回未出輪回而辨圓覺彼圓覺性即同流轉若免輪回無有是處你等諸人到這裏且作麼生解圓覺良久云荷葉團團團似鏡菱角尖尖尖似錐以拂子擊禪床下座上堂舉僧問法眼云秋風才動貧者何依法眼云若能知恩即解報恩師乃云還會麼一葉飄空便見秋法身須透閙啾啾來年更有新條在惱亂春風卒未休以拂子擊禪床下座上堂僧房闃寂夏修持閉戶踈人怪亦知儂家自有同風事千里無來却肯伊且作麼生是同風事還會麼糊餅蒸作家常茶飯一言半句古人葛藤雲峯與你兩無交涉下座上堂舉教中道歸源性無二方便有多門聖性無不通順逆皆方便還會麼所以道不浪階隨功涉位經有經師論有論主你道衲僧門下還有這箇消息麼良久云一言才出駟馬難追下座上堂聲色不到處病在見聞言詮不及處過在脣吻離却咽喉脣吻一句作麼生道還有人道得麼若也道得坐却天下老師三世諸佛舌頭若道不得但知隨例餐䭔子也得三文買草鞋下座上堂舉教中道知幻即離不作方便離幻即覺亦無漸次大衆還會麼須彌𨁝跳入你鼻孔裏即且從你道娑竭龍王年多少肉重千斤智無銖兩下座
