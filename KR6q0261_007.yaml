body:
  text: 汝州南院禪師語要南嶽下七世嗣興化師諱慧顒河北人也上堂云赤肉團上壁立千仞有僧問赤肉團上壁立千仞豈不是和尚語師云是僧便掀倒禪牀師云你看這瞎漢亂做僧擬議師便打趂出院上堂云諸方只具啐同時眼不具啐同時用僧問如何是啐同時用師云作家不啐啐同時失僧云猶是學人問處師云你問處作麼生僧云失師便打其僧不肯後到雲門會裏舉前因緣説不肯其時有傍僧云當時南院棒折那僧聞此語言下大悟方見南院答話處僧却來汝州省覲值南院已遷化却上風穴禮拜風穴認得便問上座是當時問南院啐同時話者否僧云是穴云會也未僧云會也穴云當時作麼生僧云當時如在燈影裏行相似穴示你會也問大用不逢人時如何師云雞鵝舞道引入千峯問十方通暢時如何師云八極連門禍問龍躍江湖時如何師云瞥嗔瞥喜問傾湫倒嶽時如何師云老鴉無觜問從上古人見不盡處師還見也無師云握髮吐餐人不顧滿朝盡道好周公僧向口上打師云道者大煞瞎僧云有恁麼瞎老漢恁麼道師便打問從上諸聖向什麼處去也師云不上天堂即入地獄僧云和尚作麼生師云你還知寶應老落處也無僧擬議師便打一拂云你還知喫拂子底麼僧云不會師云正令却是你行又打一拂子問如何是第一句師云你試道看僧便喝師拍手云大衆好喝僧又喝師便打問回旋空中時如何師云四面連架打問龍獸相交時如何師云狗脊坡頭問丹霄獨步時如何師云日馳五百問金榜題名請師印可師云日下拽腳問大震虹霓請師引驗師云日下三刻問黃巢過後何處回避師云六纛旗下問忽遇捉著時如何師云賊首頭犯問寶劒未出匣時如何師云泥乾跌宕僧云出匣後如何師云天魔唱快問楊朱泣歧時如何師云白狗臨刑莫怨天問人逢碧眼時如何師云鬼爭漆桶問獨步青霄時如何師云四衆圍繞僧云四衆圍繞時如何師云梵音絶處行問寂寂無聲時如何師云打了拖聲勢問鳳栖不到處時如何師云忽聞庭前撲煞老鴟梟問如何是歸宗理事絶師云納孺處錯問如何是日輪正當午師云理事甚分明便打問如何是獨步四山頂師云深深海底行問如何是自在如師子師云金鎚勒咽索白棒擁將行問久在貧中如何得濟師云滿掬摩尼親自捧學云教人眼瞎師云眼裏無筋一世貧學云挑筋了瞎師便打問奔流度刃疾焰過風時如何師云住學云住即瞎師打禪床僧便喝師拈棒僧云老和尚莫掣猱奪棒打老和尚去在師云今日被這瞎漢鈍置煞我僧云陳敗不禁苕菷掃問匹馬單槍來時如何師云且待我斫棒問如何是佛法大意師云無量大病源僧云請師醫師云世醫拱手問師唱誰家曲宗風嗣阿誰師云掌塔戴雕冠口中更河海問如何是無相涅槃師云前三點後三點僧云無相涅槃請師證照師云三點前三點後問萬里無雲時如何師云飢虎投崖問古殿重興時如何師云明堂瓦插簷僧云與麼則莊嚴畢備也師云斬草蛇頭落問二王相見時如何師云十字街頭吹尺八問如何是無相道場師云斫破鬼神村上堂云是你諸人盡會向諸方去來不是不知不見還知老僧這裏有諱麼僧便問請和尚諱師云推算決疑問如何是薝蔔林師云鬼厭箭問如何是不動尊師云邂逅到崖州問擬驀要津時如何師云灰糞堆問百了千當時如何師云未是好手問大義爭權時如何支擬師云光漆文社僧云將何奉獻師云切以生芻祭惟驢糞問如何是乾坤主師云周人遺刀心剜九竅問麟閣圖形請師憐念師云纓拂面塵問如何是解脫漿師云苞茆滲血簋物不多問如何是金剛不壞身師云老僧在你腳底僧便喝師云未在不是僧又喝師便打問南宗北祖如何顯示師云大庾嶺頭雲太行山下賊僧云如何明會師云幽燕經劫殺吳越笑呵呵僧云畢竟如何師云莫言無法説最苦是新羅問薄地天龍如何辨識師云有什麼難辨僧云便請辨師云瘦眼生盲莖毛磔索僧云如何醫治師云氣針抉舌上雷電震雲間僧云忽遇葉公時如何師云見假不知驚著否至今猶是眼翻天問日出扶桑時如何師云閻浮樹下過問凡聖同居時如何師云兩箇貓兒一箇獰問栴檀鬱密時如何師云獨柳樹下坐問近不得時如何師云冤家難解脫問萬仞龍門今朝透過時如何師云全存霹𮦷聲僧云恁麼則全承布雨去也師云泥人眼赤問如何是道師云鷹過長空無一物問獨遊滄海時如何師云雷震青空畜生燒尾問運足不知路時如何師云鳥道盲人遇問中間不會時如何師云靜處踝了打問投機不遇時如何師云足下全身去問金鎖斷時如何師云失僧云金鎖既斷為什麼却失師云崖州路上問行人問燃燈前即不問燃燈後亦不問如何是正燃燈師云滅僧從東過西邊立師云野狐精問不施寸刃便登九五時如何師云單杖控天街太白過後望問如何是無縫塔師云八花九裂問如何是塔中人師云頭不梳面不洗問萬里無雲時如何師云寸步不可過問剪鐵鏌鎁猶恨鈍齧鏃當鋒事如何師云剪即死僧便喝師拍膝一下僧又喝師拈棒僧云老和尚莫盲枷瞎棒奪却棒來打老和尚去莫言不道師云今日無端黃面浙子鈍置一場僧云老和尚莫掣猱好問如何是佛師云如何不是佛問惜宗風護三乘如何是道師云更夢見什麼上堂云過去祖佛盡皆恁麼道時有僧問道箇什麼師云大哉問上上根器人來師還接也無師云接僧云便請和尚接師云且喜共你平交問如何是佛師云我不曾知僧禮拜師便打上堂云有解問話者出來時有僧出禮拜師云是者老漢罪過便下座問如何是和尚家風師云秋收冬藏問如何是寶應正主師云杓大碗小問如何是寶應水師云了云飲者如何師云了問牛頭未見四祖時如何師云今日不答話問擬伸一問師意如何師云是何公案僧應諾師云放你三十棒問如何是祖師西來意師云五男二女問如何是寶應劒師云天下老和尚答話了也將此語別處問去僧云用者如何師便打問祖意與教意是同是別師云黃尚書李僕射僧云不會師云牛頭南馬頭北問萬代留名時如何師云光漆郊社問如何是佛法大意師便喝僧云老和尚莫探頭好師又喝僧便禮拜師云放過即不可便打問如何是佛法大意師便喝僧便禮拜師云今夜兩箇俱是作家禪客與寶應老稱提臨際正法眼藏若要一喝下辨賓主問取二禪客問學人有一問在和尚處時如何師云你問道什麼僧便喝師便休至明日上堂衆集師云昨日問話師僧在什麼處僧才出師拈棒便打問如何是佛師云待有即向你道僧云與麼則和尚無佛也師云正當好處僧云如何是好處師云今日是三十日上堂云諸方盡是把蛇頭求歇終不敢向第二頭答賓家話若是本色衲僧便莫共語作麼生是本色衲僧良久云有輸有贏有防禦使問長老還具見聞覺知也無師與一踏踏倒勘辨問僧近離什麼處云襄州師云來作什麼僧云特來禮拜和尚師云恰遇寶應不在僧便喝師云向你道不在又喝作什麼僧又喝師便打僧禮拜師云這棒本是你打我我且打你要此話行瞎漢參堂去師見新到來竪起拂子僧云敗闕師放下拂子僧云猶有這箇在師便打問園頭瓠子開花也未僧云開花已久師云還著子也無僧云昨日遭霜了也師云大衆喫箇什麼僧擬議師便打問風穴南方一棒作麼商量穴云作奇特商量穴却問和尚此間一棒作麼商量師拈拄杖云棒下無生忍臨機不讓師問僧近離甚處云長水師云東流西流僧云總不恁麼師云作麼生僧珍重師便打問僧近離什麼處僧云龍興師云發足莫離葉縣否僧便喝師云好好問你又惡發作什麼僧云喚作惡發即不得師便喝云你既惡發我也惡發近前來僧近前師云我也沒量大罪過瞎漢參堂去師有時把住一僧云作麼作麼僧無對師云三十年來弄馬騎有時把住一僧云會麼僧云不會師云牛頭南馬頭北問僧夏在什麼處僧云五臺師云文殊還説著老僧也無僧云不説著師云今日遇作家有時見僧來參便把住參頭云是什麼僧無語師云三十年弄馬騎今日被驢撲又自云大衆莫道間處語問僧近離甚處云襄州師云什麼物恁麼來云和尚試道看師云適來禮拜底僧云錯師云錯箇什麼僧云再犯不容師云三十年弄馬騎今日被驢子撲瞎漢參堂去問大德講什麼經僧云維摩經師指云會麼僧云不會師云侍者點茶來問僧夏在什麼處云湖南師云喚維那來上板頭安排著問僧名什麼云普參師云忽遇屎橛作麼生僧不審師便打風穴禪師語録南嶽下八世嗣南院師諱延沼餘杭劉氏子也上堂舉寒山詩曰梵志死去來魂識見閻老讀盡百王書未免受捶栲一稱南無佛皆以成佛道問滿目荒郊翠瑞草却滋榮時如何師曰新出紅罏金彈子簉破闍黎鐵面皮問如何是互換之機師曰和盲愂訴瞎問真性不隨緣如何得證悟師曰豬肉案上滴乳香問如何是清淨法身師曰金沙灘頭馬郎婦問一色難分請師顯示師曰滿罏添炭猶嫌冷路上行人祇守寒問如何是學人立身處師曰井底泥牛吼林間玉兔驚問如何是道師曰五鳳樓前曰如何是道中人師曰問取皇城使問不傷物義請師便道師曰劈腹開心猶未性燥問未定渾濁如何得照師曰下坡不走快便難逢問如何是衲僧行履處師曰頭上喫棒口裏喃喃問靈山話月曹溪指月去此二途請師直指師曰無言不當啞曰請師定當師曰先度汨羅江問任性浮沉時如何師曰牽牛不入欄問凝然便會時如何師曰截耳臥街問狼煙永息時如何師曰兩腳捎空問祖令當行時如何師曰點問不施寸刃便登九五時如何師曰鞭尸屈項上堂舉古云我有一隻箭曾經九磨煉射時遍十方落處無人見師云山僧即不然我有一隻箭未嘗經磨煉射不遍十方要且無人見僧便問如何是和尚箭師作彎弓勢僧禮拜師曰拖出這死漢問牛頭未見四祖時如何師曰披席把碗曰見後如何師曰披席把碗問未達其源時如何師曰鶴冷移巢易龍寒出洞難問不露鋒鋩句如何辨主賓師曰口銜羊角鰾膠粘問將身御險時如何師曰布露長書寫罪原問學人解問誵訛句請師舉起訝人機師曰心裏分明眼睛黑問生死到來時如何師曰青布裁衫招犬吠曰如何得不吠去師曰自宜軃避寂無聲問如何是真道人師曰竹竿頭上禮西方問魚隱深潭時如何師曰湯蕩火燒問如何是諸佛行履處師曰青松緑竹下問如何是大善知識師曰殺人不眨眼曰既是大善知識為甚麼殺人不眨眼師曰塵埃影裏不拂袖畫戟門前磨寸金問一即六六即一一六俱亡時如何師曰一箭落雙雕曰意旨如何師曰身亡迹謝問摘葉尋枝即不問直截根源事若何師曰赴供凌晨去開塘帶雨歸問問問盡是揑怪請師直指根源師曰罕逢穿耳客多遇刻舟人問正當恁麼時如何師曰盲龜值木雖優穩枯木生花物外春上堂大衆集定師曰不是無言各須英鑒問大衆雲集師意如何師曰景謝祁寒骨肉疏冷師在南院作園頭一日南院到園問云南方一棒作麼生商量師曰作奇特商量良久師却問和尚此間作麼生商量南院拈棒云棒下無生忍臨機不讓師師於是豁然大悟南院云汝乘願力來荷大法非偶然也汝聞臨濟將終時語不曰聞之南院云臨濟道誰知吾正法眼藏向這瞎驢邊滅却渠平生如師子逢人即殺及其將死何故屈膝妥尾如此對曰密付將終全主即滅又問三聖如何亦無語乎對曰親承入室之真子不同門外之遊人南院頷之又問汝道四種料簡語料簡何法對曰凡語不滯凡情即墮聖解學者大病先聖哀之為施方便如楔出楔云如何是奪人不奪境曰新出紅罏金彈子簉破闍黎鐵面門又問如何是奪境不境人曰芻草乍分頭腦裂亂雲初綻影猶存又問如何是人境俱奪曰躡足進前須急急促鞭當鞅莫遲遲又問如何是人境俱不奪曰常憶江南三月裏鷓鴣啼處百花香又問臨濟有三句當日有問如何是第一句臨濟云三要印開朱點窄未容擬議主賓分師隨聲便喝又問如何是第二句臨濟云妙解豈容無著問漚和爭赴截流機師曰未問已前錯又問如何是第三句臨濟云但看棚頭弄傀儡抽牽全藉裏頭人師曰明破即不堪於是南院以為可以支臨濟不辜負興化先師所以付託之意師依止六年而南院歿後唐長興二年雲遊至汝水見草屋數椽依山如逃亡人家問田父此何所田父云古風穴寺世以律居僧物故又歲飢衆棄之而去餘佛像鼓鐘耳師曰我居之可乎田父云可師乃入留止晝乞村落夜燃松脂單丁者七年檀信為新之成叢林晉天福二年州牧聞其風盡禮致之上元日開法嗣南院漢乾祐二年牧移守郢州師又避寇往依之牧館於郡齋升座曰祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是時有蘆陂長老出問某甲有鐵牛之機請師不搭印師曰慣釣鯨鯢澄巨浸却嗟蛙步𩥇泥沙蘆陂佇思師喝曰長老何不進語蘆陂擬議師打一拂子曰還記得話頭麼試舉看蘆陂擬開口師又打一拂子牧主云信知佛法與王法一般師問曰太守見何道理牧主云當斷不斷反受其亂師便下座寇平汝州有宋太師者施第為寶坊號新寺迎師居焉法席冠天下學者自遠而至周廣順元年賜寺名廣惠師凡住二十有二年以皇宋開寶六年癸酉八月旦日登座説偈曰道在乘時須濟物遠方來慕自騰騰他年有叟情相似日日香煙夜夜燈至十五日跏趺而化前一日手書別檀越閲世七十有八坐五十有九夏
