body:
  text: 舒州龍門佛眼和尚普説語録住南康雲居嗣法善悟編師云山僧教人識取自己師僧家聞得了却云初機學人看底事有甚難會你且緩緩且子細你用何者名自己祇如古德對自己語云遊山玩水你道我會也更是阿誰又對自己云是你自己你道我也會得是我自己且如對伊道山河大地又道噇飯時飯是你自己又怎生會又却去不得古德云盡大地是你自己又且如何消遣每常見人錯會了舉轉古人事問伊祇如鏡清問玄沙曰學人乍入叢林乞師指箇入路沙云還聞偃溪水聲麼清云聞沙云從者裏入清從是得旨我問你聞時聞箇什麼箇箇對曰聞水聲如此見解堪作何用據他所見聞處歷歷地一時領得離此聞外無聲可得盡從我者裏顯現者箇是業識有底對云不是水聲是聞自己山僧向道自己了如何聞自己所謂認心認性佛法是箇省力易會法門人自辛苦古人見不奈何了向人道你試一念靜思看好言語後人不明古人意了去那裏閉眉合眼捺伏身心堆堆地坐了等悟好癡好癡久立師云不見祖師道風鳴耶鈴鳴耶便好休歇也更煩他道非風鈴鳴乃心鳴耳你更討什麼參請也及至此土道非風幡動仁者心動祖師恁麼印證因何不會祇為箇能所所以道因能立所所既妄立生汝妄能無同異中熾然成異今時人言決擇且如何決擇莫是道者箇是入門底語者箇是初機語那箇是久參語麼總不如是元來一時放下正是決擇於一切時無異緣自早辰起披衣洗面歸寮等事你喚作雜想也祗要你見色時無能見所見那裏不是聞聲時無能聞所聞心裏思量時無能思所思佛法最易最省力自是你費力自作艱難若易處不見且究理而坐既來龍門參禪莫將來比諸處妄想卜度但退步看須會去然有般兄弟受整理有不受整理有愚者有智者有可救有不可救且如不受整理者硬將生死業識來用將粥飯氣來用問著則瞪眼進前退後舉坐具在髑髏裏皮袋裏昏昏地認箇識情此不可救你但放下了退步來看方會又有般上座道我都不作道理都無計較不著聲色不依染淨聖凡迷悟一道清虗大光明中都無是事此又被智光蓋却著在智邊亦不可救有此兩般病前病猶淺後病更深你但肯拈放一邊退步看亦自然會去此事甚是省力古人道甚是省要又道費力作麼有時見師僧來此間費力喫許多辛苦作什麼須要求些言語向皮袋裏有甚交涉然有一真實方便極好若非久參者不會疑著如玄沙一日欲説法大衆立久都不説一言遂兩兩三三散去沙云你看今日真實為他也無一人搆得待我開兩片皮一時近前來也你來龍門討方便討法門討安樂龍門也無方便與人也無一法與人也無安樂法與人何故若有方便却成埋沒上座籠上座趙州道你但究理而坐三二十年若不會截取老僧頭去亦則要成一片去豈不見二祖大師隨處説法聞者皆得正念不立文字不論修證因果時有禪師聞之遣高弟潛聽説法不回禪師大怒因大會次親語云我費許多力挑撥你你因何得恁麼辜負耶彼云我眼本正因師故邪者箇是參學樣子也後人問雪峯云我眼本正因師故邪時如何峯云迷逢達磨僧云我眼何在峯云不從師得須是恁麼始得古云道常合人人自逐物經中道若能轉物即同如來物且如何轉又道凡所有相皆是虗妄若見諸相非相即見如來古人道若見諸相非相即不見如來但退步絶機照子細看忽然著怎生奈你何久立師云無迷無悟到得恁麼田地方安樂最省力祇是箇無迷無悟底人十二時中有何法迷却上座應須衷私自家裁斷看三界二十五有迷心故有如今如何得無去既無未得迷情決然不奈何須證取無迷無悟事方得灑落行腳人喚作袈裟下事事若未了禍事也此是大苦馬鳴祖師説箇三細六粗動即有苦如何得不動去不是説一句兩句便當得談玄談妙説義説理坐禪入定當得自家無事獨自思量看平生所作所為他人不知你自返照是合道理不合道理到者裏自瞞不得也好時好日不趂取究令徹去先師出世時道此大寶華王座每日與諸人同起同坐自是諸人當面諱却也好言語又道十餘年海上雲遊覔箇冤讐不曾遭遇及到龍舒果見其人方契憤憤之心好言語恁麼説話少有人説得山僧行腳三十有餘年也老僧得道時諸人未生在後生家信取恁麼説底事逐日退省看教徹去久立師云禪門名迦葉大寂定門不動一絲子無所不通不動一毛頭無所不達非是祇恁麼不動便休去諸人十二時中但不起心動念了一時會得通達一切名迦葉門下人方入得大寂定且何法為緣為礙雖許人參究許人學祇是不許人起心動念會若逢緣遇境或一言半句才念動心起作解俱在散位也明上座大庾嶺上不思善惡了方見得便道某甲雖在黃梅實不知得佛言不此岸不彼岸不中流南泉云不是佛不是物正是你今人管帶處但恁麼學如秀才及第一回從此是官人心要一回了是佛方無疑各自將為事莫趂閧過久立師云諸人分上各有一段事回頭方識得須是解回頭且如何回頭不尋尋尋不尋者箇便是人難措入處也不尋如何尋尋如何不尋若但尋何異尋聲逐色若一向不尋又何異土木瓦石須是尋而不尋不尋而尋若入得也始和會得尋與不尋所以道不尋不尋法身圓寂尋尋應用不差尋不尋不尋尋境智冥會體用一如故得三身四智五眼六通從是開明學道人解恁麼回頭尋究始得豈不見僧問仰山和尚別有何徑截願乞指示山云別有別無轉令汝昏昧汝是甚處人云幽州人山云汝還思彼中不云常思山云所思者樓臺殿閣市井人煙有許多般你返思思底還有許多般麼云無許多般山云據汝見處祇得一玄得坐披衣向後自看大衆者僧道所思有許多般思底無許多般見解有偏致令仰山道祇得一玄道眼不正若據山僧所思樓臺殿閣有許多般便是無許多般思底無許多般便是有許多般可驗現今目前有許多般便是無許多般無許多般便是有許多般亦如毗目仙人執善財手善財見無量世界微塵數諸佛仙人放手宛然依舊好大衆放下手了宛然依舊且作麼生會會取好久立師云先聖道法法本來法好雲門拈拄杖云不是本來法良久曰若如是則三毒四倒五蘊六入十二處十八界二十五有不是本來法何不恁麼會取多少省力佛法是箇最省力底事何嘗不現前自是你不會又向你道無法無非法何於一法中有法有不法祇為馳求不息了一切處皆是馳求思惟道理也是馳求看古人公案也是馳求看禪册子也是馳求假饒靜坐念念不住亦是馳求要會麼則你那馳求便是不馳求箇中極難信入難做功夫不安樂者蓋為你等不沉則掉所以道不會去如今如何得不沉不掉則你那一念起是生滅流轉為是業識耶為是不動耶恁麼翻覆看來便有些子道理久立師云同床共被夢各不同先聖云同共一法中而不得此事且如生死一法中入得生死而不被生死縛者在生死被生死縛者同共一法中一人縛一人脫豈不是夢各不同你尋常生死作一邊無生死作一邊思量作一邊不思量作一邊有言説作一邊無言説作一邊山僧此中也無衲僧事及向上事祇論出生死事不祇恁麼説一句了休須是即生死中見無生死事豈不見永嘉大師見六祖云生死事大無常迅速六祖云何不體取無生了無速乎嘉云體即無生了本無速又如曹山辭洞山洞山云什麼處去曹山云不變異處去洞山云不變異處豈有去耶曹山云去亦不變異豈不是了得底人你思量為一邊不思量為一邊於言説外做箇無言説縱饒你會得箇無言説處分明才有言説便礙著你也終日行住坐臥不曾行住坐臥何不恁麼參究有時師僧來此下一句拍一拍那裏當得見解不出二邊你須是去思量看我分明在生死中如何得無生死去莫道便是也我本來無生死不由你説者一句子便了有底聞人説無生死便道是也本來無生死若恁麼作解便難會也既不許人作道理起會解又不許人説却如何作功夫你不見古人道我祇把你將來底示你箇入處珍重師云看見今時叢林中兄弟似總不説此事相似祇如天下到處叢林知識説禪説道入室升堂無不是説此事何故道不曾説著説則説也則是説不著不惟説不著亦不解不解恁麼作功夫祇管道正令全提十方坐斷佛來也打魔來也打一向説禪元來緊要處不曾説著山僧者裏所説者是諸方掉下不要者等間地糞掃堆頭拈將來問人又却道不得祇如今早入室問道明得底人見香臺時是香臺不是香臺若道是香臺與尋常人一般若不是香臺香臺却分付與誰輕輕將來問著便七花八裂蓋緣尋常總去間處做功夫我且問你不説入衆來未行腳未入衆時見香臺時喚作什麼曰喚作香臺又曰大家喚作香臺何不思量因什麼喚作香臺禪須是恁麼參要明你無始時來事修山主道不見本來法障礙是從來若人有障礙顛倒幾千回先師道如人睡著將一點糞著在鼻端上初不覺知及至起來或聞臭氣嗅褊衫謂是褊衫臭遂脫却褊衫拈得物來一切皆臭不知道臭在他鼻上忽有智人向伊道不千別物事剛自不信智人云你但將手向鼻上揩看則是不肯若肯揩一揩方知早較些子遂以水洗去之全無臭氣若嗅一切物元來皆無臭氣參禪亦然不肯自休歇向己看者下尋會解那下尋會解覔道理做計較皆總不是若肯回光就己看之無所不了不見道一根既返源六用皆不行但如此觀却有悟明分久立師才坐呵呵笑曰猶自不會良久又曰我恁麼説向你猶自不會若到別處更作麼生會也諸方不是走作你便坐定你我者裏也不走作你亦不坐定你直是省力易會因何却不會祇為你千方萬便巧作道理所以難會去佛法是箇易會安樂底法雖然易會祇是難入難做功夫若是諸方坐定你便有箇做功夫處走作你便有箇咬嚼處兄弟家來説道不敢道是則你那不敢道是却如何何不恁麼去看祇恐你向者裏亂會亂有領覽祇要教你不動一念便明得去又有道據我見處千是萬是也此正是如焦穀芽如敗種子永不發生你已道是了也更如何救須是深疑著此事所以道凡夫有返覆又有者會了却説不得縱説得亦不成道理不要草草子細體究山僧與你同參我若會時你也須會始得你若不會山僧亦不會也不見玄沙指面前一點白問僧見麼僧云見沙云我也見你也見因甚却不會有箇同參禮上座見先師得一年半凡入室祇向伊道上座也分些緇素麼度度去度度如此似恁麼説話如何解會如何做功夫今之時也無恁麼尊宿為人也亦無恁麼上座參請也若是別人則煩悶去了也一日聞先師上堂云同門出入宿世冤家懵然地心下如落稱鎚相似從前見解如去空中花相似從此見諦須是如此做功夫如此證悟禪須是恁麼參今夏已一月也殊不見兄弟有覺觸處直須鼎省精神若是無人説著無人開示便難做功夫也既是遇人便好做功夫須是分緇素始得久立師云而今行腳兄弟可信道有頓悟底事也諸方亦可説有頓悟底事若無頓悟底事如何却名叢林蓋為從來相傳祇是看古人公案或看一則或兩則略有一知一解若有理會不得處亦尋縫罅鑽研求會既會得了道此事祇如此也便在叢林中流布將去皆不説著頓悟底事若無頓悟底事則三界二十五有如何消遣疑情如何消落去今早有箇師僧來説道見聞不昧一向去認見聞便道是也則是不見那不昧處問他方世界事又不知問根塵下事又不破如何却以凡夫情量便同頓悟底事山僧今日普告大衆但信取有頓悟底事譬如村夫於耕田處拾得一粒金丹服後渾家上升又似白衣拜相相似教中説你那凡夫情量如似土坯未曾經大火中煅過都用不得須是經大火中煅過始得却似得一回頓悟相似山僧自川中來祇參一人知道此人説話與古人一般嘗問先師道聞禪門中有悟道果否先師云是若無悟那裏得你但緩緩地參山僧便寬心參究有復首座見地明白所以山僧常去詢問祇向山僧道須是自家做活計莫來問我一日舉趙州夾火示僧云不得喚作火是什麼山僧深疑著分明是火如何却不喚作火如是看三年常自思惟爭敢以凡夫情量便問他聖人所證處又曾聽法華云是法非思量分別之所能解常得此一念如今兄弟家道便是者箇也為你一起解會了便不會也又先師曾到李提刑宅提刑請就書閣中燒香了將傳燈録白先師某雖俗人素留心此道每看此録多有不會處一一望和尚開示先師云此事不如是理會須有省悟始得若有悟處無不會者自不消問人若無省悟祇那會處亦未是在提刑云吾師説得是又山僧平生事因作知客在火爐上會得自後無有不會底事衆中兄弟須是見頓悟底事始得今時叢林中例皆不説著也久立師云山僧分上無有不是者若有一絲毫不是處爭敢説向人爭敢指示人山僧分上是時無能是底心又無所是底法所以方敢説向人若約諸人分上明知有不是處所以來就人決擇若已是了更幾時去問人也然而山僧者裏祇指你是處你若不是終不敢道你是等你是也山僧肯你也祇賭是大衆山僧無有不識者或曾見人來或有悟處或無悟處有無會解皆知得伊如世良醫一見便識病或冷或熱可醫不可若一一問候方知此乃庸醫如前日舉法眼指簾子有二僧去捲法眼云一得一失你等事須不得道有什麼得失又道一人會來去捲是得一人不會來去捲是失若恁麼怎生會醫如今明未得蓋為悟心未諦如不識病稱醫者他人會也不識不會也不識有無見處總辨別不得却如何為人如何説向人須是剋骨究實始得若肯去剋骨究實無有不會者不見古人道你但究理而坐三二十年若不會截取老僧頭去作尿鉢子僧家有時道是也却到剋骨究實却走作不定如隔窗看馬騎相似忽爾便過直須似三二萬斤鐵相似牽不前推不後方知是實你等才被人撼著早動也更著力推一下便倒了也須是洞明頓見三百六十骨節八萬四千毛窺一時開張內身外器法法皆是本來法無有不是始得而今師僧依倚方能道得若一時去却則無湊泊處又謂空過了諸人無過此時好也既在其中定省精神努力究取珍重師云若論平等無過佛法唯佛法最平等若道我會你不會不是佛法也你會我不會亦不是佛法也教中道是法平等無有高下名阿耨菩提山僧見處與諸人齊等諸人見處亦與山僧齊等又古人道諸人知處良遂總知良遂知處諸人不知因何却不知去良由仁者心有高下不依佛慧遂見此土土石諸山穢惡充滿須依佛慧始得也聖人説底便是平等法也道卵胎濕化四生九類我皆令入無餘涅槃而滅度之如是滅度無量衆生實無衆生得滅度者豈不是平等法古人道涅槃名廣度無餘一味收卵胎并濕化空有及沉浮薩埵能降住菩提道自周倐然纖芥在此岸永淹留才有纖毫不盡便是此岸也又道剎那流入意地便為生死根栽豈可亂有所證妄生解會耶古有尊宿向人道各各有初心在最初發心行腳必為生死故發心或厭苦故發心或為事緣逼迫不獲已發心皆名發心何故令人看初發底心謂你最初發底一念不易轉頭來最有力此是你參底禪也若得現前時祇是此心明淨也中間求訪宗師日夜推究祇是養育此心乃至悟得了便見未發心時亦則不失馬鳴祖師謂之始覺即本覺本覺即不覺本始不二名究竟覺又道初發心時即成正覺謂先證得果頭佛六度萬行成熟之事也所以令你但推究初發底心且山僧見處與諸人一般何不恁麼會去久立師云明眼漢沒窠臼你尋常搆不及者祇是眼不明眼若明却搆得也所以説道明眼人難得你才道是恁麼便是窠臼也若是明眼人即不恁麼不見德山示衆道今夜不答話問話者三十棒若不是明眼漢怎生搆得才搆不得便落意思即成眹兆故德山平生則嵓頭一人搆得所以道須是明眼漢始得久立師良久告衆曰祖師真實好知音呵呵笑了又云也祇得恁麼説也若明得者親得受用便有履踐處若涉道理涉計較涉言説則不會也亦不親得受用也你在廊下東行西行時寮舍裏洗衣擇服時還見得祖師真實好知音麼良由不見問著便腳忙手亂病在什麼處病在你尋常祇是思量計較中來不親得受用皆是去長連牀上閉目藏睛擘劃思量得盡上窮銀漢下徹黃泉方説得一兩句却到間處時又不知下落也目前盡是礙人之物輕輕問著便去不得如今據實理論不要亂説我且問你不與粥飯喫三日時還動得麼定是動不得也才方喫得些粥飯方能動得若恁麼盡是粥飯氣到者裏便要得人也須是見得非粥飯氣底事始得禪須是恁麼參如此方名決擇既喫粥飯了須扶持你者事把來參取恁麼一件事你却總不知却去間處用了也説是非管間事或思量或擘劃可惜許盡把來胡亂用了你不知才擬心早是後世也剎那流入意地便為生死根栽也又五蘊身存尚不知百骸散後何處覔近日有者一向祇恁坐地初時惺惺地餉間便瞌睡十箇九箇坐地睡著苦苦不會做功夫那裏硬坐要會不是此理怎生見得丹霞豎起拂子龐居士舉起槌子丹霞擲下拂子居士放下槌子又云昨日公案作麼生丹霞放身臥居士便出去此豈不是真實知音豈容你亂説容你下注腳又嵓頭道夫沙門者一一從自己胸襟流出蓋天蓋地始得那裏是靜坐思量來先師道你睡時睡時參取喫飯時喫飯時參取又古人道坐時有坐時道理立時有立時道理豈不見投子問翠微西來密旨可得聞乎翠微佇立顧視投子云未曉玄言乞師再指翠微云更要第二杓惡水潑在投子便悟諸人不得受用在十二時中蹉過多少好事所以我道祖師真實好知音良久又道祖師之道如青天白日相似為什麼有人迷路久立師云你諸人會不得過在何處你都盧是不會根本是不會了更求覔會處古人道莫棄者邊著那邊若如此轉難會也向你道根本是不會何不恁麼看如法眼行腳時地藏問何往法曰行腳去曰還會行腳事麼曰不會曰要知行腳事不會者是法眼從此省悟我問你既不會又如何是得須有入路方知不是強會底事巧會千般你根本不會了堪作何用須著用意究你看不會從何處得來你要知麼你者不會本無來處既無來處此不會却如何及乎明得者不會無去處恁麼地看時你管取須明得祇被你不解做佛法中人一向祇在世間用心未曾片時究此事如何得便會去及乎被人問著胡道亂説不是恁麼事舊日曾聞一人老僧説香林和尚見僧來曰你説得不無你你下階兩三步早不恁麼也莫亂説好你看古人根窮人是如何將為事佛法無虗棄底道理會取會取珍重師云雲門大師曰汝若實未搆且順朱識取叢林中參學人亦須順理而進不敢望有超過底事大凡今之學人事作一邊理作一邊所以致令身心不得安樂何不且教事常順理去未説無始劫來事祇據一念入母胎頓變根身器界自是已來莫不皆是事一報身中種種何嘗有一法不是事者如今如何消遣此箇事得順理去且事有形段理無相狀古人一得其理了事便如理融通去豈不見昔人聞板鳴乃撫掌大笑曰我會也我會也此豈不是順理而學何不且去十二時中恁地觀究做得者般功夫久久成熟自然與理相應祖師道要急相應唯言不二不祇説了便了要得相應始得溈山道事理不二真佛如如多見不能順朱把來一時顛倒了空理會古人言語公案差別問難節記門庭以為參學苦哉苦哉學道不如此後生兄弟更是不知空腹高心十年五歲過却光陰並無所得無明人我客氣殊不念出家事將來如何去各各究取莫久立為李舍人普説師云實無一法為緣為對若有一絲頭便是一絲頭你諸人如何見得無一法為緣為對底道理若向者裏明得現前何處更有身心可求若實無箇證入處都來祇是生死流注如今問諸人你現今種種分別念慮作麼生都無法為緣現前我見你你見我作麼生無法為對道人家須是恁麼翻覆體究始得山僧道佛法便是諸上座諸上座便是佛法是有語路來體解無語路來體解是有可趣向處無可趣向處從上古佛先德現前在此盡大地凡夫四生六趣現前在此向者裏直下了得實無一絲毫子豈是取一邊捨一邊豈有一段本來事有一分今時妄想則為馳求取捨至今不得現前既有許多流轉法可厭可棄所以諸佛出世祖師西來使汝尋師訪道祖師邊事透不過時直下如銀山鐵壁相似且如何是銀山鐵壁元來是自家屋裏事思量來者般事我未會已前如銀山鐵壁如今會了元來我是鐵壁噁鐵壁鐵壁所以道祖師常在世間祇如世間如何了先聖道自從認得曹溪路了知生死不相干須是你自家踏著始得方知道佛祖常時垂手須一一從自己胸中流出自然明得諸聖出世善巧方便祇如諸人每日説底話還有方便善巧麼乃至動轉去來種種施為有善巧方便無善巧方便豈不見洞山參見雲門門見來便問近離甚處山云查渡者一句語如何是會來恁麼説是不會來恁麼説是肯了恁麼道是未肯了恁麼道雲門又問夏在什麼處山云湖南報慈門云幾時離山云八月二十五門云放你三頓棒洞山一夜不安明日上去問訊云昨日蒙和尚放某甲三頓棒不知過在什麼處門云飯袋子江西湖南便恁麼商量也山於言下見道且有過無過合喫棒不合喫棒即且置你道者僧悟處是如何古人為人作麼生或若者裏明得自從無始劫來是實無一絲毫為解礙方從是出生便了他諸聖行履處未能如此莫道是諸聖行履處十二時中行履處何嘗分明祇為無始劫來顛倒迷亂六趣何曾見還猶如蠅子透窗相似不見端師翁有頌云為愛尋光紙上鑽不能透處幾多難忽然撞著來時路始覺從前被眼瞞如今既在此門中不可中塗困躓縱然學道得旨後閨閣中物揚不下明得此事還被此事留滯不見道金鎖玄關留不住行於異類且輪回到得恁麼田地方可為人師如今去聖時遙人多懈怠尋常説正法像法末法山僧道法無正像末佛法常在世間得時便是正法失時便是像末法諸人決然要辦此事緊要是出生死然本無生死可得何故三際求之不可及先佛道過去心不可得現在心不可得未來心不可得祇如歷歷分明聽法者是誰是過去耶現在耶未來耶須知是一箇無始時來無知覺者如此看來豈是與一法為緣為對如今天下禪僧盡道祇是者箇漢是定有者箇漢是定無者箇漢道橫也是者箇漢豎也是者箇漢也道六十二見諸外道種盡從佛法中來所以貧道頃在舒之龍門時常勸人如此做功夫後到褒山亦不忘此旨非時愛與兄弟東説西説喚作非時語緊要處却在當人不見昔日溈山和尚在百丈作典座一日司馬頭陀問云野狐話作麼生會溈山撼門扇司馬云是則是太粗生溈山曰佛法説什麼粗細你道問他野狐話他却撼門扇且道緊要在什麼處要會麼盡是金毛師子子莫於中路却輪回久立
