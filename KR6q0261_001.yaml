body:
  text: 大鑑下一世南嶽大慧禪師諱懷讓金州人也俗姓杜於儀鳳二年四月八日降誕感白氣應於玄象在安康之分太史瞻見遂奏聞高宗皇帝帝乃問何祥瑞太史對曰國之法器不染世榮帝傳敕金州太守韓偕親往存慰其家家有三子惟師最小年始三歲炳然殊異性惟恩讓父乃安名懷讓至年十歲惟樂佛書時有三藏玄靜過舍見而奇之告其父母曰此子若出家必獲上乘廣度衆生至垂拱三年方十五歲辭親往荊州玉泉寺依弘景律師出家通天二年受戒後習毗尼藏一日自歎曰夫出家者為無為法天上人間無有勝者時同學坦然知師志氣高邁勸師同謁嵩山安禪師安啓發之乃直詣曹溪禮六祖六祖問什麼處來師云嵩山安和尚處來祖云什麼物與麼來師無語遂經八載忽然有省乃白祖云某甲有箇會處祖云作麼生師云說似一物即不中祖云還假修證也無師云修證即不無污染即不得祖云只此不污染是諸佛之護念汝既如是吾亦如是西天二十七祖般若多羅讖汝曰震旦雖闊無別路要假兒孫腳下行金雞解銜一粒粟供養什邡羅漢僧又讖傳道一法心裏能藏事說向漢江濵湖波探水月將照二三人祖云先師有言從吾向後勿傳此衣但以法傳若傳此衣命如懸絲惟示道化聽吾偈曰心地含諸種普雨悉皆萌頓悟華情已菩提果自成汝向後出一馬駒踏殺天下人應在汝心不須速說師侍奉一十五載唐先天二年始往南嶽居般若寺示徒云一切萬法皆從心生心無所生法無能住若達心地所作無礙非遇上根宜慎辭哉僧問如鏡鑄像像成後光歸何處師云如大德未出家寺相狀向什麼處去僧云成後為什麼不鑑照師云雖然不鑑照謾他一點不得馬祖居南嶽傳法院獨處一庵唯習坐禪凡有來訪者都不顧師往彼亦不顧師觀其神宇有異遂憶六祖讖乃多方而誘導之一日將甎於庵前磨馬祖亦不顧時既久乃問曰作什麼師云磨作鏡馬祖云磨甎豈得成鏡師云磨甎既不成鏡坐禪豈能成佛祖乃離座云如何即是師云譬牛駕車車若不行打牛即是打車即是又云汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理馬祖聞斯示誨豁然開悟禮拜問云如何用心即合無相三昧師云汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道馬祖云道非色相云何能見師云心地法眼能見乎道無相三昧亦復然矣祖云有成壞否師云若以成壞聚散而見道者非也聽吾偈曰心地含諸種遇澤悉皆萌三昧華無相何壞復何成馬祖一蒙開悟心地超然侍奉十秋日益深奧師入室弟子六人各印可曰汝等六人同證吾身各契其一一人得吾眉善威儀常浩一人得吾眼善顧盻智達一人得吾耳善聽理坦然一人得吾鼻善知氣神照一人得吾舌善談說嚴峻一人得吾心善古今道一後馬祖闡化於江西開元寺師問衆曰道一為衆說法否衆曰已為衆說法師云未見通箇消息來遂遣一僧去囑云待伊上堂時但問作麼生記取答話來僧如教回舉似師馬祖云自從胡亂後三十年不曾少鹽醬師然之師天寶三年八月十一日示寂於南嶽敕諡大慧禪師最勝輪之塔吏部侍郎歸登撰塔記大鑑下二世馬祖大寂禪師師諱道一漢州什邡人也俗姓馬氏江西法嗣布於天下時號馬祖焉問如何是修道師云道不屬修若言修得修成還壞即同聲聞若言不修即同凡夫云作何見解即得達道云自性本來具足但於善惡事上不滯喚作修道人取善捨惡觀空入定即屬造作更若向外馳求轉踈轉遠但盡三界心量一念妄想即是三界生死根本但無一念即除生死根本即得法王無上珍寶無量劫來凡夫妄想諂曲邪僞我慢貢高合為一體故經云但以衆法合成此身起時唯法起滅時唯法滅此法起時不言我起滅時不言我滅前念後念中念念念不相待念念寂滅喚作海印三昧攝一切法如百千異流同歸大海都名海水住於一味即攝衆味住於大海即混諸流如人在大海中浴即用一切水所以聲聞悟迷凡夫迷悟聲聞不知聖心本無地位因果階級心量妄想修因證果住其空定八萬劫二萬劫雖即已悟却迷諸菩薩觀如地獄苦沉空滯寂不見佛性若是上根衆生忽遇善知識指示言下領會更不歷於階級地位頓悟本性故經云凡夫有反覆心而聲聞無也對迷說悟本既無迷悟亦不立一切衆生從無量劫來不出法性三昧長在法性三昧中著衣喫飯言談祗對六根運用一切施為盡是法性不解返源隨名逐相迷情妄起造種種業若能一念返照全體聖心汝等諸人各達自心莫記吾語縱饒說得河沙道理其心亦不增總說不得其心亦不減說得亦是汝心說不得亦是汝心乃至分身放光現十八變不如還我死灰來淋過死灰無力喻聲聞妄修因證果未淋過死灰有力喻菩薩道業純熟諸惡不染若說如來權教三藏河沙劫說不可盡猶如鉤鎖亦不斷絶若悟聖心總無餘事久立珍重上堂龐居士問不與萬法為侶者是什麼人師云待汝一口吸盡西江水即向汝道又問不昧本來身請師高著眼師直下士云一等沒弦琴唯師彈得妙師直上士禮拜師歸方丈居士隨後云適來弄巧成拙問如何是佛師云即心是佛問離四句絶百非請師直指西來意師云我今日無心情汝去西堂問取智藏僧至西堂問西堂以手指頭云我今日頭痛不能為汝說得汝去問海兄僧去問海兄海兄云我到者裏却不會僧回舉似師師云藏頭白海頭黑師採藤次見水潦便作放勢水潦近前接師即便踏倒水潦起來呵呵大笑云無量妙義百千三昧盡在一毛頭上識得根源去師令僧馳書與徑山欽和尚書中畫一圓相徑山才開見索筆於中著一點後有僧舉似忠國師國師云欽師猶被馬師惑問和尚為甚麼說即心即佛師曰為止小兒啼曰啼止時如何師曰非心非佛曰除此二種人來如何指示師曰向伊道不是物曰忽遇其中人來時如何師曰且教伊體會大道問如何是西來意師曰即今是甚麼意師問僧什麼處來云湖南來師云東湖水滿也未云未師云許多時雨水尚未滿道吾云滿也雲巖云湛湛地洞山云什麼劫中曾缺少又問如水無筋骨能勝萬斛舟此理如何師曰這裏無水亦無舟說甚麼筋骨一夕西堂百丈南泉隨侍玩月次師問正恁麼時如何堂曰正好供養丈曰正好修行泉拂袖便行師曰經歸藏禪歸海唯有普願獨超物外師問百丈汝以何法示人丈豎起拂子師曰祇這箇為當別有丈拋下拂子僧問如何得合道師曰我早不合道問如何是西來意師便打曰我若不打汝諸方笑我也有小師耽源行腳回於師前畫一圓相就上拜了立師曰汝莫欲作佛否曰某甲不解揑目師曰吾不如汝小師不對有講僧來問曰未審禪宗傳持何法師却問曰座主傳持何法主曰忝講得經論二十餘本師曰莫是師子兒否主曰不敢師作噓噓聲主曰此是法師曰是甚麼法主曰師子出窟法師乃默然主曰此亦是法師曰是甚麼法主曰師子在窟法師曰不出不入是甚麼法主無對百丈代云見麼遂辭出門師召曰座主主回首師曰是甚麼主亦無對師曰這鈍根阿師洪州廉使問曰喫酒肉即是不喫即是師曰若喫是中丞祿不喫是中丞福師入室弟子一百三十九人各為一方宗主轉化無窮師於貞元四年正月中登建昌石門山於林中經行見洞壑平坦謂侍者曰吾之朽質當於來月歸茲地矣言訖而回既而示疾院主問和尚近日尊候如何師曰日面佛月面佛二月一日沐浴跏趺入滅元和中諡大寂禪師塔名大莊嚴大鑑下三世百丈懷海禪師福州長樂人也師參馬大師為侍者檀越每送齊飯來師才揭開盤蓋馬大師拈起一片胡餅示衆云是甚麼每日如此師經三年一日隨侍馬祖路行次聞野鴨聲馬祖云什麼聲師云野鴨聲良久馬祖云適來聲向什麼處去師云飛過去馬祖回頭將師鼻便搊師作痛聲馬祖云又道飛過去師於言下有省却歸侍者寮哀哀大哭同事問曰汝憶父母耶師曰無曰被人罵耶師曰無曰哭作甚麼師曰我鼻孔被大師搊得痛不徹同事曰有甚因緣不契師曰汝問取和尚去同事問大師曰海侍者有何因緣不契在寮中哭告和尚為某甲說大師曰是伊會也汝自問取他同事歸寮曰和尚道汝會也教我自問汝師乃呵呵大笑同事曰適來哭如今為甚却笑師曰適來哭如今笑同事罔然明日馬祖升堂才坐師出來卷却簟馬祖便下座師隨至方丈馬祖云適來要舉轉因緣你為什麼卷却簟師曰為某甲鼻頭痛馬祖云你什麼處去來師云昨日偶有出入不及參隨馬祖喝一喝師便出去馬祖一日問師什麼處來師云山後來祖云還逢著一人麼師云不逢著祖云為什麼不逢著師云若逢著即舉似和尚祖云什麼處得者箇消息來師云某甲罪過祖云却是老僧罪過師再參馬祖祖豎起拂子師云即此用離此用祖挂拂子於舊處良久祖云你已後開兩片皮將何為人師遂取拂子豎起祖云即此用離此用師亦挂拂子於舊處祖便喝師直得三日耳聾後住洪州大雄山以居處巖巒峻極故號百丈既處之未期月參玄之賓四方至溈山黃檗當其首一日師謂衆曰佛法不是小事老僧昔被馬大師一喝直得三日耳聾黃檗聞舉不覺吐舌師曰子已後莫承嗣馬祖去麼檗曰不然今日因和尚舉得見馬祖大機大用然且不識馬祖若嗣馬祖已後喪我兒孫師曰如是如是見與師齊減師半德見過於師方堪傳授子甚有超師之見檗便禮拜因僧問西堂有問有答即且置無問無答時如何堂曰怕爛却那師聞舉乃曰從來疑這箇老兄曰請和尚道師曰一合相不可得師謂衆曰有一人長不喫飯不道饑有一人終日喫飯不道飽衆無對雲巖問和尚每日區區為阿誰師曰有一人要巖曰因甚麼不教伊自作師曰他無家活僧問抱璞投師請師一決師云昨夜南山虎咬大蟲云不繆真詮為甚麼不垂方便師云掩耳偷鈴漢云不得中郎鑑還同野舍薪師便打僧云蒼天蒼天師云得與麼多口云罕遇知音拂袖便出師云百丈今日輸却一半佛鑑云雖得一場榮刖却一雙足至晚侍者問和尚被這僧不肯了便休師便打者云蒼天蒼天師云罕遇知音者作禮師云一狀領過有一僧哭入法堂師云作什麼僧云父母俱喪請師揀日師云明日一時埋却問如何是奇特事師云獨坐大雄峯僧禮拜師便打西堂問師你向後作麼生開示於人師以手卷舒兩邊堂云更作麼生師以手點頭三下上堂云靈光獨耀迥脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛問依經解義三世佛冤離經一字如同魔說時如何師云固守動靜三世佛冤此外別求如同魔說馬祖令人馳書并醬三甕與師師令排向法堂前乃上堂衆才集師以拄杖指醬甕云道得即不打破道不得即打破衆無語師便打破歸方丈上堂衆才集師以拄杖趂下却召大衆大衆回頭師云是什麼溈山問仰山百丈再參馬祖豎拂因緣此二尊宿意旨如何仰山云此是顯大機大用溈山云馬祖出八十四人善知識幾人得大機幾人得大用仰山云百丈得大機黃檗得大用餘者盡是唱道之師溈山云如是如是師因普請開田回問運闍梨開田不易檗云衆僧作務師云有煩道用檗云爭敢辭勞師云開得多少田檗作鋤田勢師便喝檗掩耳而出師問黃檗甚處來檗云山下採菌子來師云山下有一虎子汝還見麼檗便作虎聲師於腰下取斧作斫勢檗約住便掌師至晚上堂云大衆山下有一虎子汝等諸人出入好看老僧今朝親遭一口後溈山問仰山云黃檗虎話作麼生仰山云和尚如何溈山云百丈當時便合一斧斫殺因什麼到如此仰山云不然溈山云子又作麼生仰山云不唯騎虎頭亦解把虎尾溈山云寂子甚有險崖之句師每日上堂常有一老人聽法隨衆散去一日不去師乃問立者何人老人云某甲於過去迦葉佛時曾住此山有學人問大修行底人還落因果也無對云不落因果墮在野狐身今請和尚代一轉語師云汝但問老人便問大修行底人還落因果也無師云不昧因果老人於言下大悟告辭師云某甲已免野狐身住在山後乞依亡僧燒送師令維那白槌告衆齊後普請送亡僧大衆不能詳至晚參師舉前因緣次黃檗便問古人錯對一轉語落在野狐身今人轉轉不錯是如何師云近前來向汝道黃檗近前打師一掌師云將謂胡鬚赤更有赤鬚胡時溈山在會下作典座司馬頭陀舉野狐話問典座作麼生典座以手撼門扇三下司馬云太粗生典座云佛法不是者箇道理後溈山舉黃檗問野狐話問仰山仰山云黃檗常用此機溈山云汝道天生得從人得仰山云亦是稟受師承亦是自宗通溈山云如是如是黃檗問從上古人以何法施人師良久黃檗云後代兒孫將何傳授師云將謂你者漢是箇人便歸方丈師與溈山作務次師問有火也無溈山云有師云在什麼處溈山把一莖柴吹過與師師接云如蟲蝕木因普請鋤地次有僧聞鼓聲舉起鋤頭大笑歸去師云俊哉此是觀音入理之門後喚其僧問你今日見甚道理云某甲早辰未喫粥聞鼓聲歸喫飯師呵呵大笑問如何是佛師云汝是阿誰云某甲師云汝識某甲否云分明箇師豎起拂子問汝見拂子否云見師更不管師令僧去章敬處見伊上堂說法你便展開坐具禮拜起將一隻鞋以袖拂却上塵倒頭覆下其僧到章敬一依師旨章敬云老僧罪過廣録夫語須辨緇素須識總別語須識了義不了義教語了義教辨清不了義教辨濁說穢法邊垢揀凡說淨法邊垢揀聖從九部教說向前衆生無眼須假人雕琢若於聾俗人前說直須教渠出家持戒修禪學慧若是過量俗人亦不得向他與麼說如維摩詰傅大士等類若於沙門前說他沙門已受白四羯磨訖具足全是戒定慧力更向他與麼說名非時語說不應時亦名綺語若是沙門須說淨法邊垢須說離有無等法離一切修證亦離於離若於沙門中剝除習染沙門除貪瞋病不去亦名聾俗亦須教渠修禪學慧若是二乘僧他歇得貪瞋病去盡依住無貪將為是是無色界是障佛光明是出佛身血亦須教渠修禪學慧須辨清濁語濁法者貪瞋愛取等多名也清法者菩提涅槃解脫等多名也只如今鑑覺但於清濁兩流凡聖等法色聲香味觸法世間出世間法都不得有纖毫愛取既不愛取依住不愛取將為是是初善是住調伏心是聲聞人是戀筏不捨人是二乘道是禪那果既不愛取亦不依住不愛取是中善是半字教猶是無色界免墮二乘道免墮魔民道猶是禪那病是菩薩縛既不依住不愛取亦不作不依住知解是後善是滿字教免墮無色界免墮禪那病免墮菩薩乘免墮魔王位為智障地障行障故見自己佛性如夜見色如云佛地斷二愚一微細所知愚二極微細所知愚故云有大智人破塵出經卷若透得三句過不被三段管教家舉喻如鹿三跳出網喚作纏外佛無物拘繫得渠是屬然燈後佛是最上乘是上上智是佛道上立此人是佛有佛性是導師是使得無所礙風是無礙慧於後能使得因果福智自由是作車運載因果處於生不被生之所留處於死不被死之所礙處於五陰如門開不被五陰礙去住自由出入無難若能與麼不論階梯勝劣乃至蟻子之身但能與麼盡是淨妙國土不可思議此猶是解縛語彼自無瘡勿傷之也佛瘡菩薩等瘡但說有無等法盡是傷也有無管一切法十地是濁流河衆作清流說豎清相說濁過患向前十大弟子舍利弗富樓那正信阿難邪信善星等箇箇有榜樣箇箇有則候一一被導師說破不是四禪八定阿羅漢等住定八萬劫他是依執所行被淨法酒醉故聲聞人聞佛法不能發無上道心所以斷善根人無佛性教云喚作解脫深坑可畏之處一念心退墮地獄猶如箭射亦不得一向說退亦不得一向說不退祇如文殊觀音勢至等却來須陀洹地同類誘引不得言他退當與麼時祇喚作須陀洹人祇如今鑑覺但不被一切有無諸法管透三句及一切逆順境得過聞百千萬億佛出世間如不聞相似亦不依住不聞亦不作不依住知解說他者箇人退不得量數管他不著是佛常住世間而不染世法說佛轉法輪退亦是謗佛法僧說佛不轉法輪不退亦是謗佛法僧肇云菩提之道不可圖度高而無上廣不可極淵而無下深不可測語也垛生招箭言鑑覺猶不是從濁辨清許說如今鑑覺是除鑑覽外別有盡是魔說若守住如今鑑覺亦同魔說亦名自然外道說如今鑑覺是自己佛是尺寸語是圖度語似野干鳴猶屬黐膠門本來不認自知自覺是自己佛向外馳求覓佛假善知識說出自知自覺作藥治箇向外馳求病既不向外馳求病瘥須除藥若執住自知自覺是禪那病是徹底聲聞如水成冰全冰是水救渴難望亦云必死之病世醫拱手無始不是佛莫作佛解佛是衆生邊藥無病不要喫藥病俱消喻如清水佛似甘草和水亦如蜜和水極是甘美若同清水邊數則不著不是無是本有亦云此理是諸人本有諸佛菩薩喚作示珠人從來不是箇物不用知渠解渠不用是渠非渠但割斷兩頭句割斷有句不有句割斷無句不無句兩頭迹不現兩頭提汝不著量數管汝不得不是缺少不是具足非凡非聖非明非暗不是有知不是無知不是繫縛不是解脫不是一切名目何以不是實語若為雕琢虗空作得佛相貌若為說道虗空是青黃赤白作得如云法無有比無可喻故法身無為不墮諸數故云聖體無名不可說如實理空門難湊喻如太末蟲處處能泊唯不能泊於火焰之上衆生亦爾處處能緣唯不能緣於般若之上參善知識求覓一知一解是善知識魔生語見故若發四弘誓願願度一切衆生盡然後我始成佛是菩薩法智魔誓願不相捨故若持齊戒修禪學慧是有漏善根縱然坐道場示現成等正覺度恆沙數人盡證辟支佛果是善根魔起貪著故若於諸法都無貪染神理獨存住甚深禪定更不升進是三昧魔久耽玩故至上涅槃離欲寂靜是魔業若智慧脫若干魔網不去縱解百本圍陀經盡是地獄滓若覓如佛相似無有是處如今聞說不著一切善惡有無等法即為墮空不知棄本逐末却是墮空也求佛求菩提及一切有無等法是棄本逐末祇如今粗食助命補破遮寒渴則掬水喫餘外但是一切有無等法都無纖毫繫念此人漸有輕明分善知識不執有不執無脫得十句魔語出語不繫縛人所有言說不自稱師說如谷響言滿天下無口過堪依止若道我能說能解說我是和尚汝是弟子者箇同於魔說無端說道目擊道存是佛不是佛是菩提涅槃解脫等無端說一知一解見舉一手豎一指云是禪是道者箇語繫縛人未有住時祇是重增比丘繩索縱然不說亦有口過寧作心師不師於心不了義教有人天師有導師了義教中不為人天師不師於法未能依得玄鑑且依得了義教猶有相親分若是不了義教祇合聾俗人前說祇如今但不依住一切有無諸法亦不住無依住亦不作不依住知解是名大善知識亦云唯佛一人是大善知識為無兩人餘者盡名外道亦名魔說如今祇是說破兩頭句一切有無境法但莫貪染及解縛之事無別語句教人若道別有語句教人別有法與人者此名外道亦名魔說須識了義教不了義教語須識遮語不遮語須識生死語須識藥病語須識逆順喻語須識總別語說道修行得佛有修有證是心是佛即心即佛是佛說是不了義教語是不遮語是總語是升合擔語是揀穢法邊語是順喻語是死語是凡夫前語不許修行得佛無修無證非心非佛佛亦是佛說是了義教語是遮語是別語是百石擔語是三乘教外語是逆喻語是揀淨法邊語是生語是地位人前語從須陀洹向上直至十地但有語句盡屬法塵垢但有語句盡屬煩惱邊收但有語句盡屬不了義教了義教是持不了義教是犯佛地無持犯了義不了義教盡不許也從苗辨地從濁辨清祇如今鑑覺若從清邊數鑑覺亦不是清不鑑覺亦不是清亦不是不清亦不是聖亦不是不聖亦不是見水濁說水濁過患水若清都無可說說却濁他水若有無問之問亦有無說之說佛不為佛說法平等真如法界無佛不度衆生佛不住佛名真福田須辨主客語貪染一切有無境法被一切有無境惑亂自心是魔王照用屬魔民祇如今鑑覺但不依住一切有無諸法世間出世間法亦不作不住知解亦不依住無知解自心是佛照用屬菩薩心心是主宰照用屬客塵如波說水照萬像以無功若能寂照不自玄旨自然貫串於古今如云神無照功至功常存能一切處為導師衆生性識他為未曾踏佛階梯是黐膠性多時黏著有無諸法乍喫玄旨藥不得作聞格外語他信不及所以菩提樹下四十九日默然思惟智慧冥難說無可比喻說衆生有佛性亦謗佛法僧說衆生無佛性亦謗佛法僧若言有佛性名執著謗若言無佛性名虗妄謗如云說佛性有則增益謗說佛性無則損減謗說佛性亦有亦無則相違謗說佛性非有非無則戲論謗始欲不說衆生無解脫之期始欲說之衆生又隨語生解益少損多故云我寧不說法疾入於涅槃向後返尋過去諸佛皆說三乘之法向後假說假立名字本不是佛向渠說是佛本不是菩提向渠說是菩提涅槃解脫等知渠擔百石擔不起且與渠一升一合擔知渠難信了義教且與渠說不了義教且得善法流行亦勝於惡法善果限滿惡果便到得佛則有衆生到得涅槃則有生死到得明則有暗到但是有漏因果翻覆無有不想酬獻者若欲免見翻覆之事但割斷兩頭句量數管不著不佛不衆生不親不疏不高不下不平不等不去不來但不著文字隔渠兩頭捉汝不得免苦樂相形免明暗相酬實理真實亦不真實虗妄亦不虗妄不是量數物喻如虗空不可修治若心有少許作解即被量數管著亦如卦兆被金木水火土管亦如黐膠五處俱黏魔王捉得自在還家夫教語皆三句相連初中後善初直須教渠發善心中破善心後始名好善菩薩即非菩薩是名菩薩法非法非非法總與麼也若祇說一句令衆生入地獄若三句一時說渠自入地獄不干教主事說到如今鑑覺是自己佛是初善不守住如今鑑覺是中善亦不作不守住知解是後善如前屬然燈後佛祇是不凡亦不聖莫錯說佛非凡非聖此土初祖云無能無聖為佛聖若言佛聖者亦非九品精靈龍畜等類及釋梵已來皆能通變上品精靈亦知今古百劫時事豈得是佛如阿修羅王身極長大敵兩倍須彌山與帝釋戰時知力不如領百萬兵衆入藕絲孔裏藏通變辨才不少他且不是佛教語節級奢緩升降不同未悟未解時名貪瞋悟了喚作佛慧故云不異舊時人祇異舊時行履處問斬草伐木掘地墾土為有罪報相否師云不得定言有罪亦不得定言無罪有罪無罪事在當人若貪染一切有無等法有取捨心在透三句不過此人定言有罪若透三句外心如虗空亦莫作虗空想此人定言無罪又云罪若作了道不見有罪無有是處若不作罪道有罪亦無有是處如律中本迷煞人及轉相煞尚不得煞罪何況禪宗下相承心如虗空不停留一物亦無虗空相將罪何處安著亦云禪道不用修但莫污染亦云但融冶表裏心盡即得亦云但約照境祇如今照一切有無等法都無貪取亦莫取著亦云合與麼學學似浣垢衣衣是本有垢是外來聞說一切有無聲色如垢膩都莫將心湊泊菩提樹下三十二相八十種好屬色十二分教屬聲祇如今截斷一切有無聲色流過心如虗空相似合與麼學如救頭然始得臨命終時尋舊熟路行尚不徹到與麼時新調始學無有得期臨終之時盡是勝境現前隨心所愛重處先受祇如今不作惡事當此之時亦無惡境縱有惡境亦變成好境若怕臨終之時慞狂不得自由即須如今便自由始得祇如今於一一境法都無愛染亦莫依住知解便是自由人如今是因臨終是果果業已現如何怕得怕是古今古若有今今亦有古古若有佛今亦有佛如今若得直至未來際得祇如今一念一念不被一切有無等法管自古自今佛祇是人人祇是佛亦是三昧定不用將定入定不用將禪想禪不用將佛覓佛如云法不求法法不得法法不行法法不見法自然得法不以得更得所以菩薩應如是正念於法罄然獨存亦無知獨存之法智性自如如非因所置亦名體結亦名體集不是智知不是識識絶思量處凝寂體盡忖度永亡如海大流盡波浪不復生亦云如大海水無風匝匝之波忽知匝匝之波此是細中之粗亡知於知還如細中之細是佛境界從此初知名三昧之頂亦名三昧王亦名爾𦦨智出生一切諸三昧灌一切諸法王子頂於一切色聲香味觸法剎土成等正覺內外通達悉無有閡一色一塵一佛一色一切佛一切色一切塵一切佛一切色聲香味觸法亦復如是一一遍滿一切剎土此是細中之粗是善境界是一切上流知覺聞見亦是一切上流出生入死度一切有無等是上流所說亦是上流涅槃是無上道是無等等呪是第一之說於諸說中最為甚深無人能到諸佛護念猶如清波能說一切水清濁深流廣大之用諸佛護念行住坐臥若能如是我時為現清淨光明身又云如汝自等語等我亦如然一佛剎聲一佛剎香一佛剎味一佛剎觸一佛剎事悉皆如是從此上至蓮華藏世界縱廣總皆如是若守初知為解名頂結亦名墮頂結是一切塵勞之根本自生知見無繩自縛所知故繫世有二十五又散一切諸煩惱門縛著於他此初知二乘見之名為爾𦦨識亦名微細煩惱便即斷除既得除已名為回神住空窟亦名三昧酒所醉亦名解脫魔所縛世界成壞定力所持漏向別國土都不覺知亦名解脫深坑可畏之處菩薩悉皆遠離亦云失腳作轉輪王令四天下人一日行十善此福智猶不能算自己鑑覺名王緣念著有無諸法名轉輪王祇如今於藏腑中都不納一切有無等法離四句外名空空名不死藥為喚前王名不死藥雖云不死藥與王共服亦非二物亦非一物若作一二解亦名轉輪王祇如今有人以福智四事供養四百萬億阿僧祇世界六趣四生隨其所欲滿八十年已後作是念然此衆生皆已衰老我當以佛法而訓導之令得須陀洹果乃至阿羅漢道如是施主但施衆生一切樂具功德尚自無量何況令得須陀洹果乃至阿羅漢道功德無量無邊猶不如第五十人聞經隨喜功德報恩經云摩耶夫人生五百太子盡得辟支佛果而皆滅度各各起塔供養一一禮拜歎言不如生於一子得無上菩提省我心力祇如今於百千萬衆中有一人得者價直三千大千世界所以常勸衆人須玄解自理自理若玄使得福智如貴使賤亦如無住車若守此作解名髻中珠亦名有價寶珠亦名運糞入若不守此為解如王髻中明珠與之亦名無價大寶亦名運糞出佛直是纏外人却來纏內與麼作佛直是生死那邊人直是玄絶那邊人却來向者岸與麼作佛人及獼猴俱不能行人喻十地菩薩獼猴喻凡夫讀經看教求一切知解不是一向不許解得三乘教善得瓔珞莊嚴具得三十二相窟宅覓佛即不得教云貪著小乘三藏學者猶不許親近何況自為是破戒比丘名字羅漢涅槃經中被配入十六惡律儀中同於畋獵漁捕為利養故殺害大乘方等猶如甘露亦如毒藥消得去如甘露消不去如毒藥讀經看教若不解他生死語決定透他義句不過莫讀最第一亦云須看教亦須參善知識第一須自有眼須辨他生死語始得若辨白不得決定透不過祇是重增比丘繩索所以教學玄旨人不遣讀文字如云說體不說相說義不說文如是說者名真說若說文字皆是誹謗是名邪說菩薩若說當如法說亦名真說當令衆生持心不持事持行不持法說人不說字說義不說文說道欲界無禪亦是帶一隻眼人語既云欲界無禪憑何得至色界先因地上習二種定然後得至初禪有想定無想定有想定生色界四禪等天無想定生無色界四空等天欲界灼然無禪禪是色界問如今說此土有禪如何師云不動不禪是如來禪離生禪想問如何是有情無佛性無情有佛性師云從人至佛是聖情執從人至地獄是凡情執祇如今但於凡聖二境有染愛心是名有情無佛性祇如今但於凡聖二境及一切有無諸法都無取捨心亦無無取捨知解是名無情有佛性祇是無其情繫故名無情不同木石太虗黃華翠竹之無情將為有佛性若言有者何故經中不見受記而得成佛者祇如今鑑覺但不被有情改變喻如翠竹無不應機無不知時喻如黃華又云若踏佛階梯無情有佛性若未踏佛階梯有情無佛性
