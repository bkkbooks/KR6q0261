body:
  text: 汝州葉縣廣教省禪師語録師初開堂日才升法座大衆雲集師捻香示衆云此一瓣香不從他方得即汝州水土然願皇帝萬歲重臣千秋文武百僚常居祿位但某道薄人微觸事荒瑣謝郎中巡檢司徒諸官員等光揚佛日野干説法釋迦和南梵王前引帝釋後隨重法不重人謝西州和尚遠發緘封曲獎卑能悚惕無盡兩院主首街市檀越堂內僧衆請某開堂説箇什麼即得若説三乘五性來又有經律論座主宣揚若説仁義禮智信又有夫子夫子是儒童菩薩入化俗若是闡揚宗旨又有諸方宿德和尚穿鑿了也更教某甚處運斤斧即得便有僧問祖祖相傳心印印印皆親師今出世法嗣何人師云寰中天子勑塞外將軍令學云法海一滴蒙師指向上家風事若何師云高祖殿前樊噲怒須知萬里絶煙塵問昔日世尊説法梵王親躬此日朝騎臨筵將何指教師云塞鴈過時聲咽咽喜鵲喃喃悅殺人進云與麼即法雨洪傾人天有賴也師云雲綻家家月春來處處花問不落諸緣請便道師云落問如何是無縫塔師云頭不梳面不洗問如何是出家人師云緊褁頭進云與麼即在家出家師云粗麻鞋問喫却施主食將何報答他師云老僧罪過進云與麼即萬兩黃金亦消得師云家醜不外揚問寶劒未出匣時如何師云不可錯怪老僧進云出匣後如何師云換手捶胸問如何是禪師云文殊殿問如何是道師云法堂是老僧蓋進云禪道相去多少師云汝問我答進云向上還更有事也無師云有如何是向上事師云七棒對十三學家禮拜師云教休不肯休直待雨霖頭問如何是清淨法身師云廁坑頭籌子問臨機一句請師速道師云速進云與麼即沙場無眹迹也師云滴血驗身容師乃云達磨西來為傳東土直指人心見性成佛獨標萬像物外宣揚悟之者纖毫不隔迷之者背覺合塵中下之機也須子細莫虗過時光各各有之況以西來的意教外別傳道契一言縱橫自在打破髑髏揭却腦蓋豈不是慶快僧問學人來日擬入帝京帝王不顧時如何師尋時頌答云一年春盡一年春觸日無私遍乾坤時人盡唱無私曲罕遇知音對者稀進云與麼即處處通身去也師云底事作麼生進云十方世界盡是學人行履處師云真師子兒進云謝師證明師云一翳在眼空花亂墜問如何是佛法大意師云麥賤米貴問如何是當機一句師云有你驢漢問進云與麼即打鼓弄琵琶也師云捺紂放屁聲問如何是隨色摩尼珠師云鬧市散本進云未審意旨如何師云拍手唱歌行問維摩丈室不以日月為明和尚丈室以何為明師云眉分八字進云未審意旨如何師云雙耳垂肩問如何是古佛心師云何不高聲問進云莫者便是也無師云是即錯進云如何得不錯師云千錯萬錯問如何是非非法義師云十字路頭坐進云不會意旨如何師云一任衆人看問如何是金剛不壞身師云百雜碎進云不會意旨如何師云終是一堆灰問如何是出家人師云草深不露頂進云露頂後如何師云搒殺冢頭蒿問無邊身菩薩來還起也無師云水牯牛進云與麼即頭上安頭師云一頓五升料問蓮花未出水時如何師云競生頭角進云出水後如何師云一場懡㦬問承古有言未得入頭直須入頭既得入頭不得孤負老僧意旨如何師云獨腳蝦蟆能上樹進云未審意旨如何師云野鵲帶席帽問如何是戒定慧師云破家具師上堂良久云夫行腳禪流直須著忖參學須具參學眼見地須得見地句方始有相親分始得不被諸境惑亦不落於惡道畢竟如何委悉有時句到意不到妄緣前塵分別影事有時意到句不到如盲摸象各説異端有時意句俱到打破乾坤界光明照十方有時意句俱不到無目之人縱橫走忽然不覺落深坑問如何是道師云萬緣俱頓息夜半繡鴛鴦問如何是祖師西來意師以手劃一劃進云不會此意如何師云合掌靈山問世尊問如何是和尚心師云長三尺進云如何通信師云方圓二寸餘問學人未到來時如何師云疑殺老僧進云到來後如何師兩手捶胸問慈雲起處雷聲大廣教門下霹𮦷聲時如何師云今冬頻雨雪來年麥大熟進云恁麼即大衆有依倚也師云焰頭誇富貴今古化灰塵問起坐相隨為什麼不識師以手劃一劃進云恁麼即直截根源也師云冥冥一去杳杳何知師上堂良久云宗師血脈或凡或聖龍樹馬鳴天堂地獄鑊湯爐炭牛頭獄卒森羅萬像日月星辰他方此土有情無情以手劃一劃云俱入此宗此宗門中亦能殺人亦能活人殺人須得殺人刀活人須得活人句作麼生是殺人刀活人句道得底出來對衆道看若是道不得即辜負平生珍重問忽遇大闡提人來還相為也無師云西天出白氎進云未審此意如何師云東土波斯鼻孔大問十方薄伽梵一路涅槃門如何是一路涅槃門師云洞山見雲門進云未審意旨如何師云山僧是冀州人問如何是真道人師云露崖崖進云不會意旨如何師云莫遣外人聞問心地法門與佛相去多少師云闍梨致問老僧有答進云未審意旨如何師云五九盡日春問如何是道師云家家門前長安路問如何是西來意師云齋後一碗茶問己事未明以何為驗師云閙市裏打靜槌進云意旨如何師云日午點金燈問如何是無縫塔師云破皮厚三寸進云未審意旨如何師云金榜題名天下傳問如何是清淨法身師云蝗蟲步蜪驚人恐餐食苗稼盡傷心進云為什麼學人不識師云無心伏物賀太平師上堂有僧問才上法堂來時如何師拍禪床一下進云未審此意如何師云無人過價打與三百問清淨伽藍為什麼魚鼓喫飯師云打草蛇驚問路絶煙塵時如何師云無手行者能打餅進云恁麼即傀儡人抽牽也師云無目之人不假燈師上堂云聞鐘聲即尋聲而來如無鐘聲向甚處去即得若是上來下去是何面目不來不去又濕地上坐了也作麼生是衲僧出氣底鼻孔道得底出來道看直饒道得也是勿交涉若是道不得也即墮坑落塹便下座問煞父煞母佛前懺悔煞佛煞祖向甚麼處懺悔師云長連城進云不會意旨如何師云天靈蓋問承古有言良由取捨捨即是不捨即是師云大洋海底鑽龜卜進云恁麼即取捨俱忘也師云遇明眼人舉似問如何是佛法大意師云杏熟來年麥進云不會意旨如何師云棗收當年禾學人禮拜師云彭祖壽年八百歲莫忘却稀禾稹麥問如何是衲僧活計師云城東太山廟進云不會意旨如何師云判官手裏筆問如何是露地白牛師云破盆子進云未審意旨如何師云堪作麼問不落言詮請師便道師云西方極樂世界進云恁麼即滿口道不得也師云東土樹子大問如何是和尚受用處師云長三尺問如何是毗盧體師云寒時寒煞熱時熱煞進云不會意旨如何師云冬天著火向夏月取涼行問學人心病請師一服妙藥師云破皮厚三寸進云未審意旨如何師云杖頭挑取師上堂云廣教有驗人關截人機活人句還有人道得麼若是道不得辜負平生問和尚朝也説暮也説還接得幾人師云洎合疑殺老僧問靈山如畫月曹溪如指月如何是真月師云昨日擊金鐘告報天下聞進云恁麼即山河大地也師云大衆齊合掌香煙滿乾坤問無目人來請師指路師云坐餐都不問莫作問禪賓進云不會此理如何師云紫羅袋裏盛官誥金榜題名天下傳問大施門開請師垂示師云腦後抽簪進云便恁麼會時如何師云孤峯無宿客進云噓噓師便打問如何是世尊不説説師云涅槃山側畔香煙滿乾坤進云如何是迦葉不聞聞師云觀音勢至引到西方問如何是學人親切處師云昨日十九今日二十問如何是毗盧師法身主師云僧排夏臘俗列耆年進云向上還更有事也無師云有進云如何是向上事師云萬里崖州君自去臨行惆悵怨他誰問布鼓當軒擊誰是知音者師云眼中有澀釘進云未審此意如何師云喬翁賽南神師上堂云諸禪德若是説禪説道説佛説法來又匝匝地遍天遍地也更教廣教説箇什麼即得若約至理論似此之輩且去涅槃堂內粥飯裏將養始得謂何如此當言不避截舌若是説禪禪是病若是説道道亦非真説佛被佛謾説法被法障也錯怪廣教雖是善因而招惡果何不離此之外試與廣教相見看方有參學分始得不被諸境惑亦不落於惡道還委悉得麼直饒委得入地獄如箭射無人替代渠莫道不道珍重問遍歷寰中未曾逢一人時如何云師碗進云恁麼即碧霄雲外無依倚也師云未曾解開紂僧云錯師云尋時打二十棒趂出院問如何是密密處用心師云閙市裏輥毬進云未審意旨如何師云一任衆人看問如何是涅槃門師云三更無忌諱進云未審此意如何師云却忌五更時問西州和尚遷化向什麼處去師云寶塔元無縫靈骨鎮天涯問如何是涅槃路師云玄沙不出嶺寶壽不渡河問如何是止令一句師云古墓裏點燈猶作怪樹上呌喚闍梨意如何問六國來朝時如何師云南有雪峯北有趙州進云恁麼即萬里絶煙塵也師云目前無一物不換太陽春問遠遠相投請師一接師拈起火示云會麼云不會師云滿爐添炭猶嫌冷路上行人只守寒問維摩默然文殊讚善此意如何師云莫埋沒維摩進云恁麼即清淨道場師云莫錯認定盤星問春來萬物秀石頭為什麼不生芽師云為報遐方參禪子只為粗心致今廣教打二十進云又太不慈悲生師云禍福無門唯人自召師上堂云説底法即便是也十二時中行住坐臥喫粥喫飯合掌頂禮粗言細語鬪打相爭揮拳掉臂是也不是若道不是即法有二見若道是為什麼不休去不歇去若約至理論須是待廣教與你打破髑髏揭却腦蓋廓然山河無礙豈不慶快還委悉得麼直饒委悉得入地獄如箭射無人替代渠莫言不道珍重問彼自無瘡勿傷之也道合隨機請師應用師云今年頻雨水何人不傷心進云恁麼即雲散青天出山高衆岫歸師云日出天然異森羅觸目真問忽逢大闡提人來師還相為也無師云法久成弊進云慈悲何在師云年老却成魔問如何是第一句師云失如何是第二句師云臰肉來蠅如何是第三句師云今日好晴云三句不分時如何師云來日到崖州問寶劒未出匣時如何師云劈口著云出匣後如何師云拈却牙齒問如何是論頓不留朕迹師云日午打三更石人側耳聽云如何是語漸返常而合道師云問處分明覿面相呈問三災競起如何救之師云廣教不問你來日喫鈐槌云不會師意如何師云涅槃山側念彌陀問如何是百骸俱潰散一物鎮長靈師云晴乾開水道無事設曹司云未審此理如何師云雨下街頭濕晴乾便無泥問禁足九旬須藉無蟲之地甚處是無蟲之地師云趂熟人民亂縱橫五月麥熟盡息心云不知甚麼處立身師云夏月多毒熱行人盡休歇問雪山童子捨身為求諸行此行如何師云掉臂街頭走仰面看青天云恁麼即迷人尋著向城路也師云此人入地獄萬劫出應難問如何賓中賓師云慙惶沒心情如何是賓中主師云相手前程如何是主中賓師云起坐甚分明如何是主中主師云大祭不留身問如何超師之作師云老僧眉毛長多少問古人一言便悟和尚種種説學人為什麼不悟師云草鞋無底云畢竟如何師云皮襪無根問如何是和尚四無量心師云放火煞人云慈悲何在師云遇明眼人舉似師上堂良久云總被須彌山塞却你諸人眼也還覺麼莫不識痛癢若是去却須彌山方有參學分作麼生是去却須彌山底句若是道得底試對衆道看若是道不得也且莫亂磕便下座問師子吼時全意氣文殊仗劒意如何師云飛砂走石人驚怪決定彎弓射尉遲問如何是佛師云白馬駝經云如何是道師云善信扼喉問本來無一物以何法示於人師云無法示於人問不施寸刃便登九五時如何師云不封不樹云未審此意如何師云今古不同且應時問承古有言藏身不吞炭意旨如何師云莫遣外人聞云山雉枉遭傷此意如何師云天網疏而不漏問夏終此日師意如何師云今年夏末去年秋東京西洛任意遊問大用現前不存軌則時如何師云虗空無筋骨金槌打不入進云恁麼即百雜碎也師云彌陀佛前親聞玉偈問如何是塵中獨露身師云塞北千人帳江南萬斛船進云恁麼即非塵也師云學語之流一扎萬行問如何是和尚深深處師云貓有歃血之恩虎有起尸之德進云莫便是也無師云碓搗東南磨推西北問承教中有言三人同坐解脫床如何是解脫床師云有言須得句進云未審此意如何師云不用更遲疑問萬法歸一一歸何處師云北邙山下進云未審意旨如何師云千年中一遇問世尊為一大事因緣故出現於世如何是一大事因緣師云梁園城裏丹鳳門進云不會意旨如何師云襄州出大悲問行住坐臥如何用心得不落於惡道師云莫用心問如何是文殊活人底草師云須彌頂上雨霖霖進云如何是文殊煞人底草師云錯問如何是功用智師云舉目千山秀大海徹底清問疑情未息如何除遣師云碓搗東南磨推西北問學人迷路請師直指師云三更不閉戶進云未審此意如何師云日午不點燈問承古有言不在內不在外未審在什麼處師云南斗六星北斗七問一物不將來時如何師云放下著進云恁麼即纖毫不隔也師云且擔著師上堂云諸苦所因貪欲為本若滅貪欲無所依止若是無貪欲心在處潦潦隨所碌碌山河大地不礙眼光不礙眼光則且止你道雪山童子眉毛長多少衆中還有道得者麼試對衆道看為你證據若道不得辜負平生便下座問學人不曉三玄義請師方便第一玄師云截舌三分進云如何是第二玄師云沒蹬驢子夜三更進云如何是第三玄師云晴乾開水道無事設曹司問美玉貴金門何異荊山體師云錯進云恁麼即鳳飛在處祥雲聚龍行何慮少風雷師云騎驢不把鞭一世勿模樣問如何是第一要師云全令提綱行正令却須當道與人看進云如何是第二要師云坐餐都不問莫作問禪賓進云如何是第三要師云包含大地人皆喜滿路歌謠賀太平問如何是西來意師云骨崙背象牙問色身病法身病師云江山無阻滯日月鎮長明問承聞一子出家九族生天某甲兩人出家合作甚道理師云截舌三分進云未審意旨如何師云閙市裏臥街問擬過青山時如何師云金州出好漆問文殊云前三三後三三未審意旨如何師云昨夜風寒緊今日又溫和問如何是百尺竿頭進步底句師云南贍部洲北鬱單越問如何是西來意師云冬無積雪夏無餘糧問如何是古今無異路師云俗人盡褁頭進云未審意旨如何師云闍梨無席帽問得船便渡時如何師云鈍根阿師進云恁麼即直截根源也師云下坡不走快便難逢問如何是奪人不奪境師云臰肉來蠅進云如何是奪境不奪人師云沒鐙驢子夜三更進云如何是人境兩俱奪師云光漆無人識進云如何是人境俱不奪師云須彌頂上雨霖霖問如何是一印印空師云今年夏末臘人氷進云如何是一印印水師云未逢秋草死爭忍下階行進云如何是一印印泥師云兩重公按就萬里江山應不回問寂寂無依時如何師云觀身實相進云與麼即謝師指示師云廓然無邊進龍女獻珠得成佛學人無珠可獻還得成佛也無師云好日多同贈土不贈金進云恁麼即謝師指示師云恐魔逐我後鎮壓在廳階問古路重開時如何師云無目之人不假燈進云恁麼即七縱八橫沒去處也師云拍手唱歌行問師子吼時無意氣文殊仗劒意如何師云一送荒郊裏千峯永不回進云恁麼即大衆齊合掌一時念彌陀師云不因寒食節餘日且難來問香煙起處大衆側聆當為何事師云專聽三下鼓喫粥五更時進云此理如何師云朝霞不出門暮霞行千里問國師禮倒鐵天王意旨如何師云驚動十方剎進云此理如何師云當言不避截舌師上堂云僧堂入佛殿裏過佛殿入僧堂裏行須彌山騎牛説話木人打鼓唱歌露柱每日搊箏犍椎拍手笑他若遇大乘根器不在於言下若是中下之機也須子細珍重問未遇衆緣時如何師云虗空無瑕翳到者盡息心進云遇衆緣後如何師云任你大海變桑田廣教誰能管得你問抱璞投師請師雕琢師云把將來看進云恁麼即得遇和尚師云元來是箇糞毬問古人有不了之句請師為學人説師云破皮厚三寸問自己面目終日不見時如何師云拈却牙齒著進云見面後如何師云大衆盡皺眉問黑雲遮日時如何師云道士戴簪冠進云見日後如何師云金剛眼睛大如拳問生死事大如何免得攀緣去師云喚什麼作生死進云與麼即是佛性也師云又是七顛八倒問看經即是不看即是師云青山無異路東西任意遊進云太不定生師云自是盲者過非日月咎問萬里無雲時如何師云今年大旱問古鏡未磨時如何師云磨他作什麼進云磨後如何師云堪作什麼問古佛舍利為什麼拈不上來師云家藏利器盜者息心問路逢達道人不將語默對未審將什麼對師云將拄杖對問驪龍頷下有珠如何取得師云用這糞毬作什麼師有時上堂大衆雲集師良久以手槌胸三兩下喚侍者侍者應喏師云老僧今日頭痛珍重問聞鐘聲只有這箇聲為復別有師云腦後三斤問真性不隨緣如何得正悟師云大洋海底紅塵起須彌頂上浪滔天問如何是大作業底人師云城外斬屠兒進云不會此意如何師云一斤稱不住問大乘以心能荷萬善時如何師云上天無路入地無門進云不會此理如何師云沙門島裏望家鄉汝州寶應馳開堂法嗣書來上堂有僧問花開五葉法遍乾坤時如何師云九月重陽節菊花撲鼻香進云恁麼即慈雲普潤也師云廓然無一物光明照十方問如何是第一玄師云平常道在語必幽玄問如何是第二玄師云有問有答日月長明問如何是第三玄師云何勞龜十問行年問鐘聲才罷大衆臨筵向上宗乘請師舉唱師云僧排夏﨟俗列耆年進云恁麼即一雨普潤於大千也師云日出天然異光明照十方問善法堂中伸一問未審師還接也無師云蜀地錦觀陶綿進云恁麼即承和尚慈悲也師云廓然無障礙縱橫任意遊師上堂云諸禪德衲僧是通變道人若遇鑊湯爐炭諸般厄難又如何免得若是免不得何名通變道人作麼生是透脫諸般厄難底句還有透脫得者麼試對衆道看為你證據若是透脫不得即是萬人作冢無人替代渠便下座問師登師子座祖意事若何師云行為佛事坐是道場進云恁麼即橫身三界外也師云三界外底事又作麼生僧便喝師云疑殺老僧這瞎驢問向上一路千聖不傳如何是不傳底事師云爐中添火猶嫌冷路上行人只守寒進云未審此理如何師云冬無積雪夏無餘糧進云恁麼即謝師指示師云杖擲高聲唱棒頭頂見血學家禮拜師云教休不肯休直待雨霖頭問承古有言盡日忙忙那事無妨如何是那事師云大衆一時聞進云此理如何師云行人盡帶悲問百丈昔時參馬祖豁然蕩盡更無疑學人今日專請益乞師方便為全提師云黃河有九曲陝府出鐵牛進云大盡三十日小盡二十九已蒙師指示向上機鋒又如何師云深領這一問擔枷過狀有辱先宗進云恁麼即學人禮拜有分也師云兩重公按就萬里江山應不回問衆手淘金誰是得者師云杖頭著眼看進云請師盡令師云灼然落深坑問匹馬單鎗離君獨戰時如何師云腦後抽簪進云恁麼即陳敗將軍馬空回也師云受領銀錢莫久停廣教勘辨語并行録偈頌師勘一僧曰近離什麼處僧云東京師云你因甚口上破僧云和尚也須子細師云七棒對十三庫下喫茶去師問僧日暮投林朝離何處僧云新戒不曾學禪師云生身入地獄下去後有僧舉到隨州智門明教大師大師云何不道鎖鑰在和尚手裏因僧人事一箇書筒師問曰是箇什麼僧云和尚識取好師云元來是箇漆桶僧云請和尚收師云棺木裏努眼因聞童子念經聲乃問僧曰聞念經聲麼僧云今日勘破師云作家僧云草賊大敗師云老僧今日失利師勘五人新到云總是雲居供養主那僧云是師云是即一齊坐因僧入室請益趙州和尚柏樹子話師云我不辭與汝説還信麼僧云和尚重言爭敢不信師云汝還聞簷頭水滴聲麼其僧豁然不覺失聲云㖿師云你見箇什麼道理僧便以頌對云簷頭水滴分明瀝瀝打破乾坤當下心息師為欣然師因不安有僧問四大本空病從何來師云口談藥方終不瘥僧云不會此意如何師云唯有醍醐心地涼師因與僧俗三五人行次師拄一條白棒一僧問云只是少一箇皮五指師遂竪起展五指問曰會麼其僧俗云不會師云五輪指上放毫光師因去將息寮看病僧僧乃問云和尚四大本空病從何來師云從闍黎問處來其僧喘氣又進云不問後如何師云撒手臥長空其僧云㖿便告寂師與僧行路次因見死人僧便問車在這裏牛在什麼處師云你蹩躃行僧云牛又無行箇什麼師云你既無牛因甚踏破腳僧云恁麼即親從葉縣來也師云莫亂走師因與僧摘藤花次有僧問此日摘藤花他時還有果報也無師云有即錯僧云恁麼即無果報也師云你却是箇作家師在首山會裏首山一日問云喚作竹篦則觸不喚作竹篦即背合喚作什麼物即得師於言下豁然頓契遂於手中掣得竹篦拗折擲于階下却云是什麼首山云瞎師便禮拜師後到襄州廣德廣德垂示云禪德直須是箇師子兒始得諸人總具箇師子兒師便出問承和尚有言諸人總具個師子兒如何是和尚師子廣德便作師子吼師云這箇猶是野干鳴還我師子來隨後便喝撫一掌德云真師子兒師云是何語話德云好好問兄弟師云也不得放過師到洞山問洞山廓然無依法歸何處山云三翻羯磨師云恁麼即知音不和也山云知音不和底事作麼生師云龜毛拂子長三尺山云你因什麼眉鬚墮落師便禮拜問僧近離甚麼處僧云襄州師拽童子打一摑便喝出磚庵廣教磚庵廓然無邊隨緣度日任性癡憨森羅萬像凡聖共傳有人到此雪山西畔送僧往東京攀送老兄入梁園杲日當軒不計年為報我師林下偈無心照破萬重關師有頌三首上監務祠部祠部見處少人知棲心歇地更無疑有人借問平生事日出東方月落西祠部見處處處通山河大地是家風任他前面花錦樹無心伏物演真宗祠部見處廓然安森羅萬像在目前任他前面歡與樂隨緣度日化人天先師有頌師逐句下釋語背陰山子日陽多云逈然無背面南來北往意如何云不墮有無邊有人借問西來意云從來無間斷東海東頭有新羅云大地不奈何師不安有二頌我今有病無見無聞清虗之理日月長明我今有病罕遇知音直饒明得喪却平生年老有頌幻年七十三真性不隨緣廓然無障礙清虗獨湛然僧不問話乃述頌五首是你不問話山僧不答禪日頭恰正午笑破土地口是你不問話山僧沒合煞日午打三更露柱夜説法是你不問話山僧實驚訝冬後一百五廣南出象牙是你不問話山僧沒可把鼻孔在這裏拈來驀頭打是你不問話山僧沒可誇蕩蕩隨緣去湖南出紵麻木魚歌木魚歌木魚歌橫身三界臥擺頭掉尾瞬金鱗凡聖縱橫不奈何老胡聞聳耳聽聲聲振動古佛心逍遙自在無私曲蕩蕩行時任騰騰指日月太山崩踴踴躍躍魔軍驚哮吼吟時雲隊隊大洋海底霹𮦷聲共施主送羅漢供到南嶽有頌夙生慶幸共結良緣羅漢遺蹤日月青天松蘿鬱茂取性巖邊道人行處滿目江山露地白牛廓然無伴森羅萬像只在目前若人不會何處相見有人問著直下看箭邀僧遊山頌遊山日促路嶮巇結束行裝莫駐疑來日遍看山有色擬心棲處隔山迷山門供養主經過覔頌諸方化主往來多青山緑水意如何演若達多應認影不知子過新羅讚寶應第二代和尚真師真師真貌古稜層言直訣烈去住分明森羅萬像普濟羣心往來禪子大嶽石崩我師之真何用丹青形如滿月遍布乾坤送僧往東京有頌攀送高僧入梁園春去秋來不計年蕩蕩行時無邪路江山無滯笑西天雪山童子言下喝擬議中間萬萬年燈籠一盞金燈號玲瓏四方八面不施工照破乾坤黑暗處山河大地是家風送供養主化主別仙邑南北無西東超然威音外縱橫處處通明暗皆自爾寂然天地空萬緣俱頓息哮吼振乾坤先師三周年忌師真似日三周已畢遍在乾坤翹足七日大展壃風狐魅屏迹香茶供養光漆誰識與僧看椹子椹子黑榔檔無心是道場高僧餐一頓果熟自馨香送氊供養主前程化道莫辭辛隨緣兀兀任浮沉雲去水來為伴侶時時哮吼振乾坤雪下有頌四首此日好雪誰言氷潔粟米白銀新羅日月此日好雪萬民樂業大展長空凡聖路絶此日好雪何勞言説萬物無心江山日月此日好雪廓然敗賊逼塞乾坤誰人分別夏末送僧高僧相伴過九旬誰人言説話宗乘離凡離聖縱橫妙何人擬議落千峯僧親近云不知和尚門風師有頌廣教無門風縱橫處處通大地紅塵起失却主人翁雨下此日好雨乾坤無路日月長明西方淨土人事手巾與史諫議述十頌廣教手巾無功無能觸目受用青山白雲廣教手巾亘古亘今寂寥虗廓打破乾坤廣教手巾不協衆情有人借問大嶽石崩廣教手巾何勞心神明暗自爾青山白雲廣教手巾瞬目相呈露地白牛非凡非聖廣教手巾誰見誰聞直下便會喪却平生廣教手巾日月長明縱橫自在新羅國人廣教手巾非功織成隨緣度日任性浮沉廣教手巾逼塞乾坤賢愚意解笑殺胡僧廣教手巾不用持論言前薦得翳却眼睛西禪深和尚請齋頌云莫推延莫推延從來此事只如然﨟雪氛氛兩度降不由人主不由天大師答頌不推延不推延森羅萬像在目前﨟雲氛氛天地黑露地白牛遍大千遊草庵頌忽覩庵園任性癡憨有人到此如隔關山備茶筵送供養主師後逐句識有鹽無醋釋云如賊入空屋有菜無油云無私可隔隨緣兀兀云任性浮沉百味珍羞云觸類有得僧言話次乃有頌一到仙州四十秋隨緣兀兀到此休幸遇高僧相伴後縱橫不意到峯頭僧寫真呈師師遂成頌自識之誰人寫真動用乾坤妙筆丹青口吐詞華明暗自爾乾濕同方何勞心神任性浮沉吾真非假觸類有得圖畫非真擬心即差容貌陋質天不能蓋遍布乾坤應物現形年邁乃有頌廣教六十八凡聖俱歇滅有人相借問九月重陽節廣教六十八誰人相體察直下便會得腦後三斤鐵送供養主一年春盡一年春相煩動道任浮沉森羅萬像無私曲一聲才動斬乾坤扇子廣教一柄扇本來無背面有時在手中要且無人見拄杖山僧一條杖縱橫無比量有時在手中應用遍十方笻竹杖笻竹九節縱橫無邪大展長空凡聖路絶頌兩堂上座下喝兩堂上座齊下喝瞽目之人無分別凡言賓主句下分何勞龜卜問前程示徒廣教一言凡聖共傳直下便會萬里江山僧請益兀兀隨緣任浮沉不拘春夏及秋冬闍梨請益平生事問取寒山始知音衲僧衲僧不用持論言前薦得腦後三斤李都尉問和尚生日述成十頌山僧生日處處真隨緣兀兀任浮沉森羅萬像無私曲日出天然照乾坤山僧生處廓然寧不拘凡聖自在行任他前面歡與樂無心伏物賀太平山僧生處碧雲中情與非情共一真明暗盡時無邪路明明不墮聖凡前山僧生處少知音任性隨緣過幾春有人借問平生事石人打鼓木人聽山僧生處據令行十方禪子盡皆驚若人解接無根樹海裏能挑水底燈山僧生處正令行野老謳歌盡傳名若人不識金剛用涅槃山側井中人山僧生處亘古今誰人言説話宗乘離凡離聖縱橫妙腦後抽簪祭鬼神山僧生處在林中碧澗虎聲騁英雄喝回驚動十方剎萬里江山入千峯山僧生處峯頂上迦葉聞鐘出洞門粉骨碎身千萬劫思量難報我師恩山僧生處碧潭中不拘春夏及秋冬一刀兩段須休去何人擬議落千峯僧親近乃有頌廣教一言直下人嫌若人借問萬里江山上堂有頌四十五年在仙州凡聖縱橫任君遊有人借問如何事夜至三更到崖州
