body:
  text: 舒州龍門佛眼和尚語録住南康雲居嗣法善悟編為亡僧下火幾度曾經恁麼來者回又是入天台一堂道侶同相送珍重峨嵋下五臺遂下火云遏辣辣上堂近日亡僧遷化此一則因緣有人會得麼大凡參學須見生死根源生死若有則不明道生死若無又作麼生無得多見時流錯會妄作主宰今日試舉先聖兩則語證驗今人錯處祇如臨濟和尚示衆云有一無位真人常在你等面門出入未證據者看如今一氣才斷便乃爛壞蟲生面門出入無位真人此時作麼生主張既無可主張古人因緣又作麼生消殺古人又道你去父母未生時明取你本來面目諸人如今盡是父母生後所有許多時行住坐臥施為運用却分付何人若無分付處古人語又作麼生消殺莫是不干此身之事任生任滅直明本性否莫錯會且如厭身如桎梏猒智如雜毒出三界了尚祇名羊鹿之人見身心無起滅無內外不住不去不取不捨平等趣入故名大乘根機看來亦祇為明生死之道諸人未了生死疑情參學有什麼是處要得省心力麼但明取若身若心若外世界種種變化悉由何發現須是一得了始得迷情不現說法恆沙不了後並無用處達磨大師曰吾本來茲土傳法救迷情一花開五葉結果自然成可謂無承當人也歸堂喫茶去上堂僧問德山如何是宗門奇特事山曰我宗無語句實無一法與人師云漏逗了也僧問雪峯和尚見德山得箇什麼便歸來峯云我當時空手去空手回師云漏逗了也睦州喚僧僧回頭州云擔板漢師云漏逗了也一漏逗二漏逗三漏逗用意攙前先在後莫於佛祖結冤親好看衣珠常離垢家中人鬪頭走淮南笑殺龍門叟有人若會笑因由眼似銅鈴大如斗阿呵呵歸堂去郭公朝散施寶蓋上堂舉木平和尚行腳時問洛浦一漚未發時如何浦云移舟諳水脉舉棹別波瀾木平不契遂問盤龍龍云移舟不辨水舉棹即迷源木平遂於言下大悟後住木平李王詔至金陵問道於他法眼有偈云木平山裏人貌古言復少相看陌路同論心秋月皎壞衲線非蠶助歌聲有鳥城郭今日來一漚曾已曉誠哉是言也作麼生明他向盤龍言下悟底事若有人問龍門一漚未發時如何龍門實難吐露良久遂云一漚未發時寶蓋向空垂瑞色飄飄起香風𩖼𩖼吹何勞輕舉拂不假略揚眉五百曾親獻如來印可之昔日毗耶離城五百長者子各持七寶蓋來詣佛所佛之威神令諸寶蓋合成一蓋遍覆三千大千世界諸人還信得及麼非但古人今諸人皆有此一蓋還曾窺得著麼若窺得著步步莫非玄路言言盡轉法輪其或未然山僧雖老拙寶蓋助宣揚久立上堂龍門老自云作麼復問你畢竟是誰對云是你復云你夏中做得箇什麼事對云難說向你祇恐你落在見聞又云但說無妨師乃提出拄杖云有見有聞是凡夫無見無聞是二乘有人識得否良久云鴛鴦繡了從君看不把金針度與人參撥田劄子至上堂謝恩畢舉百丈和尚謂衆云你等為我開田我與你說一段大義衆開田了請師說大義百丈起來展手舒伸大衆古人得恁麼徑截還會他恁麼方便處麼百丈說大義辛勤事可知龍門無道理大衆絶狐疑帝力乾坤重君恩雨露垂有人相借問雲外略揚眉為什麼揚眉良久云萬古長春上堂鼓聲才動法義已周大衆上來尋光而至山野高提祖印諸人共息狐疑直須倒嶽傾湫切莫尋枝摘葉所以道者裏聚集為你僧堂裏底者裏聚集為你寮舍裏底會得麼好於處處參知識休用從前解會禪上堂云南閻浮提人就中多閙亂無想四禪天根性最遲緩遲速不同倫染淨難回換兩箇五伯文元來是一貫貫貫啞子拍手高聲喚聾人聽得佯不管天明日出是夜半智者大師談止觀大衆此理如何良久云看檀越請上堂舉端師翁住圓通日楊次公郭功甫每住參問此道後來往復淮南常求法要一日功甫訪之白雲師翁遂上堂云前來蒙次公大儒訪及為上堂曾舉一遍今日功甫到來不可隱覆更為舉一遍此語甚是奇特乃曰上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也遂下座大衆言雖麁淺理實甚深若不會上大人如何登孔聖門通曉六經子史百氏詩書縱使身名顯達不曉上大人如何佐國安使功成身退至於百工伎藝負販庸人孩稚小童無上大人如何成就能事山林河海日月星辰上聖下凡無上大人不能安立大衆好上大人還會麼孔門弟子如能識折桂登科第一人下座上堂三平禪師道祇此見聞非見聞師云捻土為香更無聲色可呈君師云人思舊念箇中若了無餘事師召大衆云立處孤危體用無妨分不分師云巡堂看取下座衆巡堂了復謂衆云有人會得麼又云會得麼衆無對師云癡漢癡漢黃龍山死心和尚遺書至上堂死心心已死心死死由生拗折黃龍角翻身臥地行者老子從來翻著襴衫倒携席帽口頭麁慥肚裏柔和點檢叢林呵叱學者雖傳晦堂道愛用雲門禪以罵風罵雨為訓徒以種菜種蔬為作務興災降禍少喜多嗔愚人見即攢眉智者點頭相許要去便去果然作家騰身元是莫徭人睡中失却死心老嗚呼哀哉法門不幸上堂虗名虗相谷音鑑像棄而不修豈明幻妄少不努力老矣惆悵靜以思之隨機稱量古德云譬如百歲老兒作歌舞豈是小兒戲大衆會他恁麼道麼百歲老兒作歌舞側首低眉聽節鼓心中聽拍雖了然手腳來遲轉辛苦乃起身作舞云會麼老作少難下座上堂一葉落天下春無路尋思笑殺人下是天上是地此言不入時流意南作北東作西動而止喜而悲蛇頭蠍尾一試之猛虎口裏活兒是何言歸堂去上堂眉毛眼睫最相親鼻孔脣皮作近鄰至近因何不相見都緣一體是全身上堂提拄杖卓一下乃顧視曰拄杖子拄杖子你無住持干懷又無病痛苦惱如此黑瘦何也拈拄杖呵呵大笑云是何言也若色見聲求是行邪道昔臨濟德山由之發明見諦後來明眼尊宿由之接物度人豈不見黃蘗普請次蘗謂臨濟云我最得者拄杖氣力臨濟近前奪下拄杖推倒黃蘗黃蘗遂云扶起我來扶起我來時有一僧近前扶起云和尚爭容得者風顛漢恁地無禮蘗却打其僧數下臨濟乃云蒼天蒼天大衆當時拄杖子如今却在龍門手裏乃提起召大衆云還有臨濟手段底麼出來出來龍門却是放得下遂拋下拄杖放身便倒云有扶得者出來良久云既無臨濟之人又無扶起之者龍門自起自倒有甚用處歸堂去下座甘露和尚入山上堂達磨不來唐土地久天長二祖不往西天山青水緑龍吟霧起虎嘯風生秋雨垂空浮雲蔽日諸人有眼還見麼有耳還聞麼既具見聞何者是迷何者是悟何物為緣何物為對要知迷悟升沉理畢竟須還本分師先佛道身相屬四大心性歸六塵四大體各離誰為和合者大衆身心既乃如此現今復是何物近來參學之人盡皆奔馳語句舉論古今於本分事全不明了所以正宗淡薄道法澆漓幸遇和尚到來伏望震潮音示真旨抉重瞙顯衣珠四衆傾誠不勝䖍請黃龍靈源和尚遺書至上堂昔開正續銘今示真歸告一路涅槃門行說皆親到明然臨濟燈妙唱黃龍道空海久澄虗雲濤方浩浩橫吞巨海高駕鐵船隱顯同源卷舒無際者其唯靈源乎禪師居究竟地住本覺場雖曰示生實無生而可示雖曰示滅實無滅而可示明明密密密密明明真化不移何方出沒所以遺言作訓真告普聞能事始終一期云畢而某曩歲遊方之始邂逅龍舒許以半面之交氣投分感雖則荊山隱玉已遇良知爾後蚌腹剖珠登舟獲劒歐峯再會素願尤諧歡洽妙期有同符節自初及此三十年間理契同風至音無間夫何遽別特示遺書感存念亡此情彌切雖然如是佛佛不思議不許長住世大衆審思惟畢竟祇者是然則子期既沒伯牙絶絃蓋傷其無知音爾況此至道離見超情莫逆于心夫何言也昔人問長沙南泉遷化向什麼處去沙云石頭作沙彌時參見六祖云不問石頭作沙彌時參見六祖南泉遷化向什麼處去沙云教伊尋思去師乃呵呵笑云會麼會麼水長船高泥多佛大共至靈前不勞觀聽蔣山佛鑑和尚遺書至上堂噁噁師兄師兄出在我前去復我先噁噁師兄師兄出在我前許我並駕而齊肩去復我先使我隻翼而孤騫豈不念茲苦海羣迷未度況乃五湖玄學負笈趨筵遽辭舟楫孰濟長川然佛法道理自有因緣此蓋衆生無祐薄福使然永違叢社法炬無傳我聞如來雙林示滅又聞達磨隻履西遷佛佛祖祖其道綿綿況我鍾山佛鑑法兄妙機無間出沒應緣去來生死吾何預焉而某於師門最為深契在鴈序手足相連義交金石氣薄雲天聽遺音而何忍念朽質以非堅同心共照夫復何言尚記得如來滅度阿難問迦葉曰世尊傳金襴外更傳何法迦葉曰阿難阿難應喏迦葉曰倒却門前剎竿著大衆若無者箇公案生死熾然白雲師翁道金襴之外復何傳弟應兄呼豈偶然倒却門前剎竿著免教依舊倚墻邊大衆會得麼倚墻邊倚墻邊寂滅光中禮白蓮上堂達磨大師所傳心印看看掃地盡也如今還有人見達磨大師麼若見得方解承當若見未得切忌認著所以正宗淡泊異道崢嶸昔日王常侍參睦州一日州問曰今日何故入院遲侍云為看馬打毬所以來遲州云人打毬馬打毬侍云人打毬州云人困麼侍云困馬困麼侍云困州云露柱困麼侍惘然無對歸至私第中夜間忽然省得明日見州云某會得昨日事也州曰露柱困麼侍曰困州遂許之此是達磨大師宗旨露柱不解打毬如何却困還有明得者麼人困馬困未是困露柱之困始是困好於言下證無生莫向言中尋尺寸百丈若無雙耳聾臨濟爭解領三頓盡將業識作流傳此道今人棄如糞久立上堂昔有使頭使下二人一時奉事觀音一日使下偷使頭錢走使頭燒香禱告觀音願我捉得使下使下亦燒香禱告觀音願使頭不見我當此之際觀音救誰即是祇救使頭又違使下祇救使下又違使頭若一時總救事甚相違山南辨和尚道若要行大道三步作一跳大衆好語祇恐人粗心子細究之又却出踈不出山僧為你一一分剖看若人要會先須識取觀音要識觀音麼大慈悲心是更須知大慈悲心從甚處流出現今歷歷聽法者無心而流出萬宗若識得了使頭方解作得使頭非唯作得使頭亦乃識得使下此使下是使頭底使下離使頭外別無使下若識得觀音了使下方解作得使下非但作得使下亦乃識得使頭此使頭是使下底使頭離使下外別無使頭若恁麼使頭使下但是空名使下使頭悉皆無寄大慈悲心熾然獨脫也既識得使頭又識得使下更須識得錢帛使頭見之是使頭錢帛使下見之是使下錢帛離使頭使下外別無有錢帛亦須知使頭錢帛自不干使下事使下錢帛亦不干使頭事各不相到雖不相到使頭錢帛即是使下錢帛使下錢帛即是使頭錢帛同一物耳若恁麼既同若恁麼既異皆大慈悲心之作用也即知得錢帛又須明取得失使頭失財時是使頭失使下得財時是使下得得失不在別人分上如此則使頭失時是使下得時使下得時是使頭失時得失雖殊而不異得失各異而常同豈別有一物作同作異也若使頭若使下若錢帛若得失一一明了方名觀自在菩薩古人云得失是非諸佛智一人無心眼耳聾上堂云西瞿耶尼打鼓南贍部洲上堂大衆十方齊至等聞野客稱揚此聲遍滿十方照破聞見色香堪笑釋迦老子等間動地放光大衆歸堂徐公大夫入山上堂何處求通達疑根自不凡頓明心即佛陡覺海非鹹善財樓閣路日進丹霄步凡夫云未然我道常披露大衆譬如自面豈辨鬚眉又如眼根不自見眼面若有見即非本頭若見眼根眼即同境所以石鞏自射無下手處乃證全身龐公問心一口吸盡遂得真實此所謂大丈夫之事業也不見道大丈夫秉慧劒般若鋒兮金剛焰非但能摧外道心早曾落却天魔膽莫不是了見本來面目證得清淨法眼故得稱為大丈夫也此日伏蒙提宮大夫朝斾入山光臨泉石頃者山野輒效先德開法施場住持此山數年之間傍資修換為禪者遊心之地工役既畢輒以土木之功干干視聽願得雄偉之文以彰不朽為來者之益伏蒙惠示莫大之幸山僧雖不曉義理觀此嘉作近世所稀豈此此山之幸亦天下叢林之幸甚也昔向居士木食㵎飲以所悟布之文字求二祖大師印證曰影由形起響逐聲來弄影勞形不識形為影本揚聲止響不知聲是響根除煩惱而趣涅槃喻去形而覔影離衆生而求佛果喻默聲而尋響當知得無所得失無所失未及造謁聊伸此意伏望答之二祖大師答曰備觀來意皆如實真幽之理竟不殊本迷摩尼謂瓦礫豁然自覺是真珠無明智慧等無異當知萬法悉皆如愍此二見之徒輩伸詞措筆作斯書觀身與佛不差別何須更覔彼無餘居士得偈欣然奉侍諸仁者古人悟心布之文字實是希有還見二祖大師與居士所證所得之事麼良久云浩劫有窮斯文不泯久立上堂慮而解思而知孤燈難並太陽輝不是心不是佛為君掃蕩精靈窟摩天子入雲飛千里萬里祇一突阿剌剌下座上堂不起踈慵不進修實無言說實無求奪飢人口中之食驅耕夫手裏之牛真快活百無憂自是不歸歸便得五湖風浪拍天流陳與明還佛頂心經願請上堂唵齒臨唵齒臨唵部臨唵部臨大衆此是甚麼言語義理如何還有人會得麼若道是言語又不成言語若道有道理又不成道理可謂言詮不到分別不及先聖呼為密語又曰真言一切言音從是而生一切語教從是而出山僧適來看經中得七字陀羅尼能滅千災成就萬德今對諸人舉此七字陀羅尼一遍諸人諦聽遂默然屈第一指至第七指曰諸人聞得麼恐諸人不聞更舉一遍又默然屈一指至七指曰聞得麼大衆唯佛與佛乃能知之自餘羣生悉皆罔措有方便門名曰重說偈言今更再三分明說此七字呪曰佛頂心經齊願了大衆曉得其中旨趣麼待山僧奉為解釋一字字要知落處若論佛祇是當人更無物若論頂晝夜舒光照前境若論心看時無相用時深若論經解語能言不是聲若論齊所為所作盡和諧若論願猶如身在龍門院若論了無慮無疑心皎皎心皎皎增添福壽災殃少論量功德廣難思須彌未大滄溟小山僧適來說者是真言世人祇知有言不知有真若不知真所言皆妄何者名為真言能出萬宗故曰真言亦名三昧王亦名萬字頂亦名微妙章句亦名祕密大總持至心受持大有靈驗所謂山僧七字呪也乃屈指曰一二三四五六七諷誦受持皆祕密如人親入寶山中一切珍奇從此出久立上堂道可學耶實不可學心可悟耶實不可悟不學不悟真機全露明月娑婆浮生旦暮眼若不睡諸夢除古今出入無門戶遂召大衆曰是什麼上堂山僧略升此座大衆永息狐疑各各金毛師子去來哮吼全威臨濟高聲連喝德山拈棒痛槌縱有一言半句終不別作路歧大衆抖擻精神著瞌睡作麼是甚生次第事你自鈍置山僧恁麼道要人到不要人到試點撿看上堂舉洞山和向示衆曰兄弟初秋夏末或東去西去直須向萬里無寸草處去始得又云祇如萬里無寸草處作麼生去石霜聞之乃曰出門便是草僧舉似洞山洞山曰大唐國內能有幾人師曰出門便是草間殺龍門老北去禮文殊南來登五老𩯭髮已蒼浪言歸恨不早獨立秋風前相思望江島好好不用更尋討上堂什麼物恁麼來休將明鏡挂高臺什麼物恁麼去分明不用當頭舉舉得分明得更難澄潭不許蒼龍盤便恁會太無端遂拍手呵呵大笑云華藏毗盧世界寬上堂好一隊其中人還見其中事麼若是其中人必見其中事也良久呵呵大笑曰會麼苟不然者雖有其中事元來不是其中人縱是其中人元來不了其中事了得其中事作得其中人復何憂哉不見溈山曰有句無句如藤倚樹時有人問樹到藤枯時如何溈山呵呵大笑又有乾峯示衆曰法身有三種病二種光一一透得始解穩坐雲門出衆而問曰庵內人何故不見庵外事乾峯呵呵大笑大衆有人或問道此二老宿意旨如何龍門拍手呵呵而笑良久曰你諸人何不與我放下布袋解開肚皮笑一聲子上堂釋迦世尊已成正覺彌勒大士當來下生老盧持過嶺南達磨携來東土各謂度生已畢我願云周如何六道四生猶在土石諸山未殞淨妙國土不逢為是願力未充為是業果難盡為復別有道理還有人斷得麼若不同床睡焉知被底穿歸堂喫茶去上堂空生不解嵓中坐春暖桃花樹樹紅漏泄天機無覔處都緣露柱挂燈籠燈籠燈籠却有古風露柱露柱善解提舉一旦師姑是女兒大悟堂中喫茶去上堂心是根法是塵兩種猶如鏡上痕痕垢盡時光始現心法雙亡性即真根塵既謝鏡光現前心法雙亡如何則是赤胳身無妄想眼聞耳見離攀緣上堂迎日出門去已覺披煙霧冒月望山歸重露濕禪衣心悄悄步遲遲無孔笛再三吹哩哩㦬㦬㦬哩遊子乍聞征袖濕佳人猶唱翠眉低君更聽莫狐疑是何曲歸堂去上堂真實到家之士何暇論家決定證得之人寧標所證論家論證乃閭閻負販之徒無證無家誠飄露伶俜之子何不興決烈之志啓特達之懷舉措看他上流勿謾隨於庸鄙一一從自己胸中流出與我蓋天蓋地去始得總似你恁麼參學驢年去上堂海門山長安道茫茫煙水連芳草樓頭客馬上郎一聽落梅悲故鄉春風過眼花飛盡蝴蝶翩翩過短墻君更聽是何章會不得參堂去政和八年九月奉勑住和州褒禪上堂謝恩畢僧問千里遠聞音信好不涉程途事若何師云不挂三寸進云一輪明月當空照萬里清風宇宙寬師云却有商量進云路上忽遇禪人問時如何師云有甚難答進云雲離谷口千山秀月到天心四海明師云誰是恁麼人師復云大衆現前豈不是舒州龍門山適來勑旨豈不是和州褒禪寺令山僧往彼傳法住持且何者是傳底法要知佛法旨趣麼不離龍門山要見褒禪寺不離褒禪寺要見龍門山龍門山則易見褒禪寺即難見有人見得褒禪寺麼若明得便有佛法旨趣若也未明良久云帝力丘山重君恩宇宙寬不才何以報處處得心安久立到褒禪入方丈師據座云昔定明禪師燕坐此峯住大三昧悲濟弘誓澤及一方山僧忝繼先蹤續明後焰十方坐斷祖令當行鳴鼓升堂各須諦聽上堂聖皇帝賜與名山賢宰臣宣行睿旨俾令貧道傳法住持衆中還有荷擔重任者麼試出衆道看僧問古人道權借一問以為影草未審此理如何師云子是何心行進云可謂手執夜明符幾箇知天曉師云曾問幾人來進云到者裏多少人錯會師云闍梨又作麼生進云三十年後有人會去師云猶較些子僧問一塵才起大地全收時如何師云兩塵也進云恁麼則無邊剎境自他不隔於毫端十世古今始終不離於當念師云含山縣裏事作麼生見得進云山河及大地全露法王身師云者箇闍梨却好商量師復云龍蛇易辨衲子難瞞辨別得否山僧未來此間時是山法席久虗叢林不振當此之時還知定明禪師是汝諸人善知識麼山僧既來此間法席初開叢林復建亦定明禪師是汝諸人善知識所以道有佛無佛性相常住若解恁麼看得吾有道光矣昔日有一員尊宿衆集定起來作舞曰諸人會此意否諸人無對寂曰山僧不捨道法而現凡夫事師乃呵呵笑曰奇怪若是褒禪即不然乃起作舞告衆曰諸人會我意否良久云清貧長樂下座上堂褒禪乍住太乾枯月白風清入畫圖人間縱有千般樂不及今朝事事無乃呵呵大笑好大哥上堂雲中石塔摩星斗定明禪師大張口是你之言若解參不必腰包天下走遂卓拄杖一下曰鳥對初陽自在啼犬逢生漢連聲吼又卓拄杖一下曰歸堂上堂祇知今日明朝不覺今朝明日事事一似安排箭箭自然中的甜者甜於黃連苦者苦過白蜜喫得者般滋味乃以手作舞曰不妨邏邏哩哩下座正月一日上堂以拄杖劃一劃云天得一斗牛女虗危室畢地得一草木山河并土石君得一上下四維無等匹召大衆曰萬象森羅影現中一顆圓明光的歷有歡榮有愁戚或冤親或順逆富且貴貧且乞萬樣千般誰運為空谷之聲隨應出鴛鴦繡了任君看不露金針太綿密褒禪奉勸各回頭莫待臨行却啾唧識取摩訶般若光萬古悠悠是今日久立上堂如來無二種語諸人如何會如來語作麼生是二種語須明取始得一離間語二和合語無此二者是名如來語何名離間語能聽法者雖願樂聽受而所說法者不為開示是名離間語能說法者雖樂開示而聽法者不樂聽受是名離間語雖說無有能說可說雖聽無有能聽可聽得如此者方名和合語當觀此離間語和合語一耶二耶同耶異耶如此證知捨離間語當得和合語而如來無此二語者不說不聽而已然不說不聽亦有二事一凡夫二聖智正如凡夫無所開示無所聽受冥然莫覺故曰無明亦名為無說無聽二聖智所到到其無說無聽亡賓主絶行解自居究竟實地亦名無說無聽學者當善分別勿生異見不可瞞頇不分上堂舉趙州和尚一日趙王來不下禪床曰會麼王曰不會州曰自小持齊身已老見人無力下禪床騰騰和尚朝見則天仰視則天曰會麼天曰不會騰騰曰山僧持不語戒忠國師見肅宗帝以手指頭帽子曰會麼帝曰不會國師曰天寒莫怪不下帽子大衆明得三人意旨麼譬如寶舟到岸獲大富而濟有餘玉戶抽關升于堂而入乎室猶在門外無奈不入之何困守孤貧豈是珠寶之咎還會麼卞和刖足歸堂上堂面前過便知是張三李四背後過為什麼却不見壁者邊便見是條臺倚子壁那邊為什麼分踈不得咫尺之間尚爾況十方世界耶參學人若不明當知參學事卒未在光陰迅速入寺來早已九十日諸郡發心化士且寬懷打疊遂拈拄杖曰東西南北四方人地濶天遙最是親衡嶽天台連魏闕乃彈指一下曰輕輕彈指不勞神復拈拄杖曰山河大地日月星辰草木叢林盡在拄杖頭上還見麼良久曰腰纏十萬貫騎鶴上揚州久立上堂趙州有喫粥因緣好一則因緣者僧當下悟去會得麼你拈動鉢盂匙筯時便不會古人意了也祖師有風幡話你諸人十二時中為什麼一似大蟲看水磨相似國師有無情說法據你諸人合明得為什麼却不聞若一一明得便是有地頭底禪和子歸堂祈雨上堂定明妙應禪師說法如雲如雨不是時人不聞又非不善其語如斯一味靈通過了幾多寒暑縱逢敗種焦芽方便一時救取知府曾公舍人入山祈雨上堂舉劉禹端公問雲居雨從何來對云從端公問處來師云雨從何來不須尋討遍滿虗空拔濟枯槁定明妙應靈通知府舍人台造真箇是為雨為霖莫不為欣為好且問諸人是定明雨舍人雨百姓雨定當得麼良久卓拄杖一下云三下座上堂卓拄杖一下云大衆你諸人昨夜為什麼一時在露柱裏藏身及乎天既明喫粥了上來聽參為什麼却在欄干上立地見麼直饒如此通神變更問起雲塔裏師上堂抵死要行雲水腳剛然求悟本來心為蛇畫足勞筋骨辜負青山緑水深豈不見德山老子向你道未踏船舷時好與三十棒也諸人也著些子精彩著飯袋子也好與三十棒遂卓拄杖一下下座退褒禪上堂一去一來松上鶴半開半合嶺頭雲搘笻獨立千峯外唯把南山祝聖君知府錢公奏請再住褒禪上堂大衆君命重宣降薜蘿不容靜處薩婆訶襴衫席帽寒酸甚又向人前唱哩囉哩囉拍一拍哩囉又拍一拍云去年梅今歲柳顏色馨香依舊人漸老水長流無心道合頭下座上堂舉蓮花峯庵主拈拄杖示衆云古人到者裏為甚麼不肯住自云為他途路不得力如是二十年無人會得此語後有老宿聞舉云是即是少進語在有僧問如何進語宿云但問畢竟如何僧持此語問庵主主曰楖栗橫擔不顧人却入千峯萬峯去師橫按拄杖於肩上高聲喚云和尚和尚又云闔國人追不再來千古萬古空相憶上堂舉嚴陽尊者問趙州一物不將來時如何州云放下著尊者當下大悟師云好大衆還見得悟處麼盡力放不下著力擔不起將謂一物無元是自家底見得自家底心中大歡喜自茲家業興一舉九萬里臘月初一上堂僧問萬法是心光諸緣唯性曉盡大地是色那箇是心師云不要瞞老僧進云盡大地是心那箇是色師云闍梨念來多少時進云祇如色心二字如何透得師云祇知渡水不覺腰深進云彼此沒便宜師云一任啖師復云一年止有此三十日二陽發生之月學般若者與汝道情相應否今有二問問諸人一問問肯者一問問不肯者先問肯者曰你恁麼來多少時也你須道多時也問你既多時所對目前聲色與你為惱害否若與你為惱害上座未恁麼在若不與你為惱害是照見了然後不為惱害不用照見了不為惱害若用照見了方見不為惱害即名照見心未名恁麼在若不用照見心如何知得無惱害據作此見了我問頭不得第二問不肯者云你不恁麼來得多少時也師大笑云好一問你出家沙門作佛弟子含齒戴髮巍巍堂堂如何却不恁麼得何異俗人直饒你真箇不恁麼也則因恁麼然後有不恁麼在據此見亦了我問不得不見石頭大師道恁麼也不得不恁麼也不得恁麼不恁麼總不得尚有人講不得被馬大師道我有時揚眉瞬目有時不揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是他便會去師良久曰還知麼泥多佛大水長船高下座上堂未達境惟心起種種分別達境唯心已分別即不生分別既不生便捨外塵相乃拈拄杖示衆云不可不喚作拄杖子也且作麼生說捨底道理有人於此云喚什麼作拄杖子便違他古佛道不壞假名而談實相又道更有什麼拄杖子也則世間萬法不成安立又道依舊喚作拄杖子則一切凡夫莫不幸甚也大衆到者裏如何即是須信道雲中石塔不是人間檻外雲山非由心變風摩雨掃日照煙蒙妙用縱橫隱顯一際自可以幽栖鳥道開豁胸懷妙契真規十方洞照直得如此更須知有衲僧孔竅始得如何是衲僧孔竅咄卓拄杖下座上堂舉溈山和尚坐次見仰山從方丈前過溈山云若是百丈先師子須喫痛杖始得仰山云今日事作麼生溈云合取兩片皮有分仰云此恩難報溈云溈山年邁非子不才仰云今日親見百丈師翁溈云子向什麼句中見先師仰云不道見祇是無別溈云始終作家師云從上來至百丈有不犯之令溈山深得其旨能向劒刃上行仰山飲氣扶持且不犯鋒傷手有般漢祇管行棒下喝還明他不犯之令麼不見道始終作家諸人每日來去什麼處得見百丈上堂暫時斂念是處是慈氏門門有善財介爾有心土石山河瓦礫荊棘大衆作聖作凡能染能淨有如是威神具如是妙用直得恁麼曹溪門下客見時猶未是少林消息祇如少林消息你曹溪門下客合作生麼下座上堂蘇武牧羊辱而不屈李陵望漢樂矣忘歸是在外國在本國佛諸弟子中有者雙足越坑有者聆箏起舞有者身埋糞壤有者呵罵河神是習氣是妙用至於擎杈打地豎拂敲床睦州一向間門魯祖終年面壁是為人是不為人信知一切凡夫埋沒寶藏殊不丈夫諸人何不擺柂張帆拋江過岸不可釘樁搖櫓何日到家既作曹溪人又是家裏漢還見是家裏事麼上堂舉先師在白雲會中作磨頭一日端師翁下來曰你還知一件事麼先師曰不知師翁曰近有數禪客自廬山來問他皆有悟入處教伊說亦說得有來由舉因緣向伊亦明得教下語亦下得端師翁良久謂先師曰磨頭祇是未在你道如何先師聞了心下不安得七日七夜不成腸肚正中心下乃自思惟曰既悟了說亦說得明亦明得如何却未在忽然中夜方會得從前寶惜一時放下遂白端師翁師翁起來手舞足蹈某曾侍奉先師聞先師舉此因緣謂某曰參學須是一時放下方得安樂大衆還見得否放得下好脫灑放不下牛拽杷堪笑諸方老古錐打鼓說禪無尾無尾不驚怕不驚怕可嗟訝解踏毗盧頂上行不言亦自傳天下好大哥上堂舉百丈大智禪師謂衆曰併却咽喉脣吻道將一句來溈山云却請和尚道五峯云和尚也須併却雲嵓云和尚有也未師云此是叢林中流布底事雪竇禪師後來品評此三人語各有淺深却請和尚道虎頭生角出荒草和尚也併却龍蛇陳上看謀略和尚有也未金毛師子不踞地如今衆中或去請益或去過話有人道此三句語未契得百丈喚作抑而不揚却請和尚道百丈云不辭向汝道恐已後喪我兒孫此豈不是抑而不揚和尚也須併却百丈云無人處斫額望汝何處是有肯他也則是抑而不揚和尚有也未百丈云喪我兒孫更是不肯也祇如百丈道併却咽喉脣吻道將一句來甚生次第事既併却咽喉脣吻明箇什麼邊事也好扶持取下座退院離褒禪辭衆上堂舉六祖大師示衆云汝等速理舟楫吾欲歸新州去弟子曰和尚去後早晚却回祖曰葉落歸根來時無口師云是什麼說話去了却更來做什麼不見東山先師道大小大祖師猶缺悟在師呵呵大笑云諸人還會得麼聽取一頌歸根得旨復何論洞口秦人半掩門花落已隨流水遠空留野雲屯到蔣山上堂玄沙白紙費封題一聽雷音萬仞低慰釋私懷已無量那堪更唱邏羅哩乃呵呵大笑曰古人道笑須三十年誠哉此語某頃在白雲時與堂上佛果師兄道聚其樂無涯至今樂猶未已也又呵呵大笑云一手不獨拍兩手鳴摑摑舉意超情念相看同路陌摩雲鍾阜高遍界烏輪赫妙機速雷電神珠不在額珍重人天大導師衲僧一見喪魂魄何也誰敢正眼覷著下座
