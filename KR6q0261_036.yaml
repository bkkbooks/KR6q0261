body:
  text: 投子和尚語録師示衆云你諸人來者裏覓言覓語新鮮句簇花四六徒口裏有可道我老兒氣力稍劣口觜遲鈍亦無間言語與你你若問我我便隨你問答也無玄妙可及你亦不教你垛根終不向上向下有佛有法有凡有聖亦不存坐繫縛你諸人變現千般總是你諸人生解自擔帶將來自作自受我者裏無物到你也無表無裏説似你諸人有疑更問僧問表裏不收時如何師云你擬向者裏垛根問大藏教中還有奇特事也無師云演出大藏教問如何是佛向上人師云現佛身問如何是無情説法師云啞問如何是眼未開時事師云目淨修廣如青蓮問一切諸佛阿耨菩提皆從此經出未審此經從何而出師云已有名字你當奉持問如何是諸佛出身處師云惡人問枯木裏還有龍吟也無師云我道你髑髏裏有師子吼僧問如何是密密不傳師云你與麼問有什麼益問如何是不點汙師云啞師示衆云上祖周行七步目視四方一手指天一手指地云天上天下唯我獨尊如今諸方道向上更有事在若言道有道無即是走作諸人未有了期若道有言有句即同夢幻無如許多名目為你問故所以有言你若不問教老漢向什麼處道若有一法與你即是誑呼你所以古人圓滿十方無一法可是可非有事請道問請師説法師云教我説箇什麼問一剎那頃珠在什麼處師云啞問金鎖未開時如何師云開也問如何是露地白牛師云叱叱學云飲噉何物師云喫喫問國師三喚侍者意旨如何師云賺殺人問一法普潤一切群生如何是一法師云雨下也問和尚講什麼經師云槌鐘著問如何是佛語師云對衆生説問如何是佛法師云佛法問如何是法中法師云法中法問如何是祖師西來意師云莫諱問還鄉曲子什麼人唱得師撫掌問一塵含法界時如何師云早是數塵也問如何是無相佛師云錯著名字問才問便知時如何師云遲也問如何是沙門立足處師云若有立足處不名沙門學云如何是沙門師云沙門沙門問切急相投乞師指示師云緩緩問來師示衆云你與麼問了也大好莫間處脫不得相稱無量劫來間處著急向自己處却間所以難得相稱蓋緣日夕一切處路熟恰到自己緊急處便懈怠去便不欲得去所以辛苦過在阿誰切莫因循各自辦事作麼生辦向一切處辦今後不得取次過日莫待臨脫衣裳時忙不及也事多之際各自取靜莫説間話去問三身如何分師云一二三問請師一句塞斷衆人口師放下拂子問如何是量外事師云無你下口處學云者裏事如何師云不喚量外事問如何是投子實頭為人處師拽學人向前却推向後問金雞未鳴時如何師云無者音響學云鳴後如何師云各自知時問如何是大庾嶺頭提不起底師提起衲衣學云不問者箇師云看你提不起問和尚如何接人師云你也近前問最省心力處請師一言師召學人名學云與麼則千生萬劫不忘和尚也師云費力問祖祖相傳未審傳箇什麼師云老僧不解妄語問學人擬欲修行時如何師云虗空不曾爛壞問如何是投子一源水師云一滴也無學云飲者如何師云絶飢渴問如何是語中骨師云無可露學云無可露是骨是語師云據你者一問毛也摸不著在問不逐境緣請師一句師云好問師指庵前一片石謂雪峰云三世諸佛總在裏許雪峰云須知有不在裏許者師云不快漆桶師與雪峰遊龍眠路有兩條峰問云那箇是龍眠路師以杖子指之峰云東土西去師云不快漆桶雪峰一日哭入庵師便起身立峰佇思被師推出問一槌便成時如何師云不是性躁漢學云不假一槌時如何師云漆桶雪峰又問此間還有人參也無師將钁頭拋向面前峰云恁麼則當處掘去也師云不快漆桶峰辭師送出門召曰道者峰回首應師曰途中善為趙州和尚出桐城路見師乃問云莫是投子庵主麼師云茶鹽錢布施我趙州先歸庵內坐師後攜一瓶油歸趙州云久嚮投子到來只見箇賣油翁師云汝只識賣油翁不識投子趙州云如何是投子師拈起油瓶云油油問出門不見佛時如何師云佛奚山刈草次師送一盞茶與奚山云森羅萬象盡在裏許奚山接得茶潑却云森羅萬象在什麼處師云可惜一盞茶問大作業底人來師如何接師云你有什麼蓋覆處學云正與麼時合作麼生師云不合一切不共一切問如何是露刃劒師云殺一切人活一切人學云忽遇師來又作麼生師云鈍屢生問如何是入室則爺娘師云無所生問如何是徑截一路師云無迃曲問知有道不得時如何師云每日向你道學云如何道師云拈却口著問如何是祖佛未經歷處師云名邈不得學云正與麼時如何師云不是祖佛經歷處問的的不明時如何師云明也問盡乾坤是箇什麼人師云不持名字學云不持名字如何體會師云體會即閙問如何是末後一句師云最初明不得問如何是寂住實頭事師云牽不向前推不向後問十二時中如何行履師云一念萬年學云瞥起時如何師云覺即失問只者箇什麼劫中有師云不隨時學云誰是不隨時者師云汝與麼問不得學云請師道師云不從千劫萬劫得學云與麼則天上人間覓不得也師云切忌作與麼知解問從苗辨地因語識人未審將什麼辨識師云引不著問古琴無絃時如何師云無絃琴最妙學云請師彈師云無音響問道人相見合談何事師云我者裏無道人問不將一物來時如何師云者箇什麼處得來問如何是火𦦨裏轉法輪師云處處了却學云了後如何師云無法輪可轉問暫時不在時如何師云阿誰向你道問萬象未臻即不疑未審特立四天下是什麼人師云現佛現祖問祖佛如何辨師云嘔吐未詳問如何是法祖師云間言語問如何是大善知識師云毗盧也喻不及問學人欠闕請師接師云不現無盡藏問萬法從一法生未審一法從何生師云你聽看問喚作如如早是變也今時沙門須向異類中行如何是異類師云恰似你與麼問我學云古人意旨如何師云不與麼問我問歸根得旨隨照失宗如何是旨師云旨學云如何是失師云失問如何是伽藍師云已有名字問虗空喻不及時如何師云恰是恰是問念念不錯時如何師云謾語問如何是孤峰頂上節操松師云平地上著不得學云請師著師云唧問如何是無語師云不與麼問問世間名言即不問如何是出世事師云聽學云莫便是否師云幾曾向你道是不是問三身那身説法師乃彈指問學人不明請師燭師云啞學云爭奈學人不會師云會即冰生問萬法從何生師云佛法僧學云法從何起師云聽看問舉目是犯如何是不犯師云大有人覓過覓過不得學云豈無指示也師云不可更將過與你也問如何是沙門行師云不作模樣問承古有言唯言不二不二事如何師云你好問我便道學云如何道師云唯言不二問明暗不挂時如何師云道什麼問如何是無礙一句師云與麼學云此猶是礙師云是是問如何是死人舌師云你道不得問如何是活人眼師云無暖氣問得座披衣時如何師云你有什麼蓋覆處問院中有三百人還有不在數者也無師云一百年前五十年後看取問如何是不起模畫樣師云不誑呼你學云師意如何師云不可教你起模畫樣也學云與麼則誑呼人也師便打問能所俱忘時如何師云無與麼事莫作與麼知解問抱璞再呈請師雕琢師云不為棟梁材學云與麼則卞和無出身處也師云擔帶即伶俜辛苦學云不擔帶時如何師云不教你抱璞再呈請師雕琢問如何是學人本分事師云不繞處問人問那吒析骨還父析肉還母如何是那吒本來身師放下拂子叉手問佛法二字如何辨得清濁師云佛法清濁學云不會師云你適來問箇什麼問世間什麼物最先師云你問底問不作罪不作業底人還有過也無師云喚伊出來學人擬議次師云去不干你事問請師歷落道一句師云好問如何是毗盧師云已有名字問如何是毗盧師師云未有毗盧時會取問大衆雲臻合談何事師云聽問妙觀察智誰是當者師云不是你分上事學云雖然如此也要分明師云不妙也問大衆雲臻和尚如何祇待師撫掌三下問和尚有什麼力抵當得許多師云水性多柔軟能乘萬斛舟學云忽遇大力者來時如何師云不消一盞水問間言長語即不問適來問底和尚道什麼師云間言長語問十二分教是有是無師云無與麼惡言語問共語不知音時如何師云與麼學云與麼時如何師云共語不知音問三乘教外別傳箇什麼師云一二三學云不會乞師指示師云你問我不可將別語對你也學云不將別語對請師道師云道道問學人有一問未曾有人答時如何師云你見者烏龜子縮頭縮尾爭奈者一塊子何問請師耳裏道師云道道問貧子還家時如何師云無寶藏與你學云為什麼向外馳走師云誰遣你問毫釐不分時如何師云什麼處得者箇來問親手分付一去不來如何師云不可得學云却返時如何師云正好供養問如何是法王主師云四大本空五陰非有問大庾嶺趂得及為什麼提不起師云不可向你道祖師遺下一隻履問針頭不露時如何師云露也學云何似師云不喚作針頭問一息未分時如何師云即今是幾息問不犯目前請師道師云早是犯了也學云者箇是犯不犯目前請師道師云不識好惡問貧子入門時如何師云不教汝除糞掃學云見師後如何師云不向你道衣中有寶問請師一劒師驀口摑問墮落三塗底人如何師云深達罪福相問如何是一句子師云兩句也問一念未生時如何師云得與麼謾語問如何是不薦處師云汝與麼問不得問如何是動師云恰似你與麼問學云如何是靜師云也不嫌鬧問如何是不道師云合取口問曙色未分時如何師云無與麼言語問天上天下唯我獨尊如何是我師云推倒者老胡有什麼罪過問如何是和尚師師云迎之不見其首隨之罔眺其後問如何是一代時教師云法華維摩楞伽思益問祖意與教意同別師云踈不得親不得學云親踈不得請師道師云祖意教意問如何是逆行師云叱叱問一等是水為什麼海鹹河淡師云天上星地下木問不有不空時如何師云説有説空問一人辦心諸天辦供未審辦什麼心師云今日請供養主了也問木人歌什麼人和師云今人和學云莫是和尚意旨也無師云是什麼曲調問不凡不聖時如何師云立凡立聖學云總不與麼時如何師云你問箇什麼問如何是道師云道道學云如何用師云用用師在京日往檀越家投齋檀越將一盤草出師前師以兩手作拳安頭上檀越便將飯來後有僧問師在京投齋意旨如何師云觀世音菩薩問一問便休時如何師云不了問鑄像未成時身在什麼處師云莫造作學云爭奈不現何師云隱在什麼處問如何是佛法綱宗師云今日無錢借長官問古澗寒泉時如何師云不流於海學云飲者如何師云口也無問無目底人如何進步師云遍十方學云無目為什麼遍十方師云還更著得目也無問如何是一色師云不似銀盤裏盛白玉問照燭不破時如何師云習盡不是道問佛用工得不得師云大有人定當定當不得學云請師定當師云終不向你道用工得用工不得問石筍未抽條時如何師云爭合與麼問學云還解抽條也無師云雖然不是石筍抽條葉更多問密室內事如何師云無人知學云和尚還知也無師云爭肯你亂道問日月未明佛與衆生在什麼處師云見老僧嗔便嗔見老僧喜便喜問才生便死時如何師云何生何死問破戒比丘什麼處著師云不與罪福為主問一句子無人道得時如何師云屋子蓋了也問覿面事如何師云莫諂曲問如何是祖師西來意師云彌勒佛覓箇授記處不得問如何是玄中的師云不到你口裏道問亡僧向什麼處去也師彈指云與麼去也問諸佛出世為一大事因緣和尚出世當為何事師云尹司空請我開堂問文彩未生時如何師云虗空合喫多少棒問和尚自住此山有何境界師云丫角女子白頭絲問古人拈槌豎拂還當不當師云不當學云為什麼不當師拈起拂子云只為者箇問未問已前事如何師云爭解開口問古人拈槌豎拂意旨如何師云只為你問學云不問時如何師豎起拂子問忘却將來時如何師云者箇𠰚舒州太守尹建峰送茶碗子與師云者箇是某甲自將來底茶碗子師接得了召太守建峰應諾師云喫茶問不從萬有如何覓心師云你從我爭箇什麼問者裏是什麼所在足人爭師云不知學云為什麼不知師云爭箇什麼問放下不明時如何師云誰教你執學云不敢執師云放下不明箇什麼問終日區區為什麼不得成就師云無你用工處學云用工不得請師接師云終日區區問默默無言請師答話師云不是無言不同默默學云不同默默底事作麼生師云不與麼學云不與麼時如何師云苦哉問言不干舌時如何師云簷頭水滴滴地問和尚每日上堂供養什麼人師云不可説不可説問不可以智知不可以識識時如何師云不與麼學云不會乞師指示師云不可以智知不可以識識問未達道底人如何接師云飢即喫飯渴即飲水問三寸明不得句下不從師時如何師云高聲問老僧耳聾學云請師指示師云鈍屢生問有句無句如藤倚樹樹倒藤枯時如何師云將知你誑呼多少人來問凡聖相去幾何師下禪床立問萬法從一法生未審一法從何生師云回首看問牛頭未見四祖時如何師云與人為師學云見後如何師云不與人為師問如何是沙門最苦處師乃皺眉問未有言句已前如何辨其尊貴師云已有句是尊是貴問靈松無異色時如何師云不是靈松標不出問三拜已前事如何師云不知學云現問次師云三拜已前事作麼生問學人不別問請師不別答師云奇怪問古人密用如何師云不從踈處起學云合從什麼處起師云疏也有座主參師師云近前來座主便近前師云去問未有此身作箇什麼來師云無所不經無所不歷問如何是千年石上古人蹤師云碣上著不得問二祖斷臂當為何事師云粉骨碎身問收攝不得時如何師云無可拋撒問劫火洞然時如何師云寒威威地問纍劫來來無盡燈不曾挑剔鎮長明時如何師云纍劫來來無盡燈不曾挑剔鎮長明問頭頭不到時如何師云你問什麼事問一問便休時如何師云太多也問暗裏得時如何師云不向你道煩惱山是菩提學云與麼則雲遊垛根也師云雲遊則伶俜辛苦垛根則禍患俱生問十二時中如何行履師云不從一法學云如何報得四恩三有師云莫受一法問玄中認得時如何師云得即失問曹溪一路闔國知聞未審投子意旨如何師撫掌三下問萬仞峰頭時如何師云什麼處不是問如何是法身主師撫掌三下問徑截一路乞師指示師云會麼問如何是空王殿師云建立不得問句句相投請師接師云不接學云為什麼不接師云句句相投問如何是和尚師師云莫造次問有言有句皆有所歸無言無句事作麼生師舉起拄杖云者箇是什麼問如何是衲衣下事師云天不能蓋地不能載問古人道法不孤起仗境方生如何是境師敲禪床學云與麼則觸目是也師云是什麼問塵劫來誰為主師召僧名僧應諾師云是什麼問蓮華未出水時如何師云隱隱地學云出水後如何師云蓋覆不得問諸佛師學人不識乞師指示師云天不能蓋地不能載問如何是和尚活計師提起衲衣云盡底呈似你學云為復只是者箇別更有在師云不識好惡問六國未寧時什麼人作主師云自有本來者學云如何是本來者師以拂子驀口打問四山相逼時如何師云身在什麼處學云爭奈四山何師云逼殺你問千里投師乞師一接師云老僧今日腰痛問和尚未見先師時如何師云通身不奈何學云見後如何師云通身撲不碎學云還從師得也無師云終不相辜負學云與麼則從師得也師云得箇什麼學云與麼則辜負先師也師云非但辜負先師亦乃辜負老僧問七佛是文殊弟子文殊還有師也無師云適來與麼道也大似問作甚麼業來遍身紅爛師云諸見不生問師子是獸中之王為什麼被六塵吞師云不作大無人我問雷聲振地為什麼百草不抽芽師云芭蕉只麼長問僧繇為什麼摹志公真不得師云只為看他面孔學云不看他面孔時如何師云是什麼問達磨未來時如何師云遍天遍地學云來後如何師云蓋覆不得問如何是空王佛師云不應量問雪覆蘆花時如何師云明白無邊際問如何是十身調御師下禪床立師不安時有李司徒令人送藥到傳語師云若斷得人間來往生彌勒內院若未斷人間來往却向弟子家中結緣師回傳語云不如具正法眼好山下有婆子家中失却牛上山請師卜師乃召婆婆應諾師云牛在問如何是無情説法師云莫惡口師上堂示衆云他古人才出來便一手指天一手指地道天上天下唯我獨尊十方世界無有過者如今更被諸方出來道向上別有事在若言道有道無即是走作學家未有休時有什麼了期但莫著名言數句了諸事自然不著即無位次不同你一切法一切法攝不得本無得失夢幻如許多名目不可強與他安立誑呼你諸人得麼為你諸人問故所以有言你若不問我向你道什麼即得若有一法與你老僧罪過你若道無你諸人又問我箇什麼所以道早不屬你巧言妙句若與麼會去即第一不得擔帶你諸人幸是可憐生擔帶負物作什麼見即便見你若不見一切不得作巧言妙句問老僧巧來妙去即轉轉勿交涉賺殺人所以我儂尋常問你諸人佛前佛後不説別事你諸人道看是什麼見什麼問如何是無生曲師云無人唱得學云忽有人唱得時如何師云生也師上堂云是你諸人口似刀子鑷子相似有什麼當處雖然如此莫趂俊道有不潦底打你在莫言不道問蓮花在水時如何師云千人萬人不見學云出水後如何師云應量恰好問法從何生師竪起一指師示衆云人人總道投子實頭忽若下山三步外有人問你投子實頭底事你作麼生向他道問和尚年多少師云春風了又秋風問如何是截鐵之言師云莫費力師問翠微二祖見達磨有何所得微云你今見吾有何所得師又問如何是佛理微云佛即不理師云莫落空否微云真空不空翠微有頌送師其有讖矣佛理何曾理真空有不空大同居寂住敷演我師宗投子和尚語録序鄮山野叟居素述投子和尚王化舒州桐城投子山寂住院師初參翠微問如何是祖師西來意微以目顧視師欲進語微云更要第二杓惡水潑從此識通超諸三昧智辨猶雷發雲漢瀑瀉懸崖函蓋相應諸方取則而有升堂問答語要盛行叢林入道禪者皆以師語參問知識其有所歸數亦多矣子因僧入室舉師之訛舛衆矣乃於間暇披閲詳究內有繁詞不涉理者與除之後語不及初者與刪之以為一集庶叢林學者於郢匠前無誚乳水而失醍醐者也時辛酉季夏月四明鄮山紫璘供奉山堂刊定云耳投子和尚名大同舒州人姓劉氏洛下保唐寺受業得法於翠微無學和尚壽九十六石頭第四世五代梁乾化中示寂
