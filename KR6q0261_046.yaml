body:
  text: 滁州琅琊山覺和尚語録參學門人元聚集示衆云主賓互換坐斷乾坤料簡雙施誰人舉目釋迦聖主示滅雙林達磨大師真歸熊耳琅邪門下還有具眼衲僧真正道流麼若無應病與藥診候臨時示衆云汝等諸人在我這裏過夏與你點出五般病一不得向萬里無寸草處去二不得孤峯獨宿三不得張弓架箭四不得物外安身五不得滯於生殺何故一處有滯自救難為五處若通方名導師汝等諸人若到諸方遇明眼作家與我通箇消息貴得祖風不墜若是常從即須寢息何故裸形國內誇服飾想君太殺不知時師上堂有僧出打一圓相師便打云道道僧云不道不道師又打僧云三世諸佛不出於此師又打乃云大衆教中道以手指比丘犯波逸提山僧今日入地獄如箭射師一日上堂舉汾陽先師道汾陽門下有西河師子當門據坐但有來者即便咬煞作何方便入得汾陽門得見汾陽人琅邪者裏也有些子琅邪有據坐師子若有來者即自喪身失命作何方便入得琅邪門得見琅邪人此兩轉語汝等諸人還點檢得出也無若點檢得出方名擇法眼若不如是且無安身立命處卓拄杖一下便下座上堂云彼我無差色心不二遂拈拄杖云你若喚作拄杖子有眼如盲若不喚作拄杖子還同避溺而投火你若脫體會去但知喚作拄杖子卓拄杖一下便下座上堂舉釋尊道若見諸相非相即見如來遂拈拄杖云山僧喚者箇作拄杖子阿那箇是相良久云向下文長付在來日以拄杖卓一下便下座上堂拈起拄杖云山僧有時一棒諸佛降生有時一棒轉大法輪有時一棒入般涅槃你且道諸佛降生轉大法輪入般涅槃相去多少良久云莫謗如來正法輪珍重小參有僧問放過一著滿目光生把斷要津萬木凋弊學人上來請師垂示師云老僧退後學云放過總由和尚去也師云闍黎進前三步學云不入虎口爭見虎牙師云十字路頭望空啓告又僧問十年磨一劒霜刃未曾試時如何師云本分作家學人便喝師云老僧失利學云恰是師乃呵呵大笑師乃舉先梁山云南來者與三十棒北來者與三十棒然雖如是不當宗乘師云梁山好一片真金將作頑鐵賣却琅邪即不然南來者與三十棒北來者與三十棒從教天下衲僧貶駁珍重上堂云夫學般若菩薩須得智觀現前方有少分相應所以先聖道當觀過去猶夢故不可得當觀未來猶電故不可定當觀現在猶雲故髣佛而有且道學般若菩薩當如何觀不用思量低頭難得卓拄杖便下座師因巡寮次舉布袋和尚凡在市鄽中以破紙裹一片乾糞見人便相呈云兜率陀天底兜率陀天底遂令學衆下語竟有云云師末後下語云慈氏菩薩又舉布袋和尚凡見人以手背上便拍一下人才回首云與我一文錢遂令學徒下語師末後云但拋一文錢與伊上堂舉汾陽先師云夫學般若菩薩須參活句莫參死句如今人便道函蓋乾坤是活句截斷衆流是死句漝麼會莫辜負他汾陽也無衆中有一般禪客商量道如何是活句今日好天晴如何是死句萬里崕州若漝麼會學到驢年也即是死句山僧與你一時注破了也作麼生是活句遂卓拄杖便下座上堂云夫參學之人直須真慧現前鑒照無差不見道差之毫釐失之千里才有異見名為異道所以異道有二種見因緣自然以斯為執故乃成於異所謂因而無始緣而無終又先聖道諸法不自生亦不從他生不共不無因是故説無生山僧雖然與麼道你且不得與麼會若與麼會入地獄如箭射珍重上堂舉僧問馬大師如何是佛大師云即心是佛如何是道云無心是道云佛與道相去多少大師云佛如展手道似握拳師云古人方便即不可山僧者裏也有些子若無人買山僧自賣自買去也如何是佛巖前多瑞草如何是道澗下足靈苗佛與道相去多少數片白雲籠古寺一條淥水繞青山珍重師因小參僧問言前薦得辜負平生句下承當又成狂見未審和尚如何為人師云橫挑日月竪括乾坤僧云真學人師師云本分衲僧其僧便喝師默坐僧云了師笑云不能打得你師乃舉僧問汾陽先師切急相投時如何汾陽云水中抱鶖子又問急切相投時如何汾陽云裸形見阿難師云有一轉語截斷天下人舌頭有一轉語能開人眼目你若揀得出與你一條拄杖擲下拄杖便下座上堂舉三聖老人去參德山才相見便展坐具德山云不用展不用展者裏無殘羮餿飯三聖云設有向什麼處著德山不語三聖將取坐具參堂去衆中商量極有云云不見道若無欒布作爭得見韓光珍重上堂云諸仁者未出僧堂時聖僧已相為了也未到佛殿上重説偈言來至法堂上三通鼓罷一炷香焚便好散去何故不見安養國中水鳥樹林悉皆念佛知足天上樹相撑觸演説苦空山僧與麼道為是壓良為賤為當是據理而論若不甘者但請對衆出來山僧與你證據若也無去簑衣箬笠從偏側收取絲綸歸去來珍重上堂云有句無句如藤倚樹樹倒藤枯恰好喫棒你且道過在什麼處良久云不是僧繇手徒説會丹青以拄杖卓一下便下座上堂云與麼來者上間安排不與麼來者下間挂搭向上人來獨自悽悽暗渡江更有一人向什麼處著良久云釣竿斫盡重栽竹不計工程得便休珍重升座僧問承師有言與麼來者上間安排不與麼來者下間挂搭總不與麼來者又作麼生師云今日遇著衲僧其僧便喝師云廚前喫飯師乃云先聖道明暗交謝寒暑迭遷有物流動人之常情又放光云法無去來無動轉故若然者旋嵐偃嶽日月歷天江河競注野馬飄鼓而無流動若如是諦觀且道條然一句作麼生道良久云石火夜燒山大地齊合掌珍重上堂舉祖師道真性心地藏無頭亦無尾應緣而利物方便呼為智師云既是方便呼為智且道畢竟喚作什麼良久云任從滄海變終不與君通珍重上堂云世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和修不知吾有三昧汝亦不知師云為什麼不知不是不知理合如斯若人會得南北東西若不如是更擬何之卓拄杖一下上堂云你等諸人但自隨緣飲任性浮沉在聖而不增處凡而非減若能如是方乃皇風蕩蕩觸處間間乃云道也太煞道了更須子細始得珍重上堂舉先聖云若也廣尋文義猶如鏡裏求形更乃息念觀空喻似日中逃影諸禪德不涉二途作麼生道良久云看看便是春風至氷釋魚行鳥亂飛珍重上堂舉汾陽先師頌云三玄三要事難分得旨忘言道易親一句分明該萬象重陽九日菊花新師乃喝一喝云是第幾玄良久云你也沒量罪過我也沒量罪過卓拄杖便下座上堂云君臣道合猶是法身邊事君不見君臣不見臣猶是法身向上事向上向下轉使心地不安且作麼生是法身良久云任是僧繇手難畫志公真珍重上堂云若論此事説什麼龍樹馬鳴提婆鶖子辨似懸河智如流水莫能知之摩竭掩室衆手難淘淨名默然如何即是百丈卷席諸方云云祖師面壁叢林浩浩到者裏若辨得出山僧與你一條拄杖若辨不出山僧有通方句且道作麼生是通方句良久云手攜隻履西天去珍重上堂舉先聖道有物先天地無形本寂寥能為萬象主不逐四時凋師云好箇頌却成兩橛若有人點檢得出許你具一隻眼珍重上堂云若欲求佛即心是佛若欲求道無心是道無心故非法而不生即心故歷劫而常堅若然者法法無差心心不斷所以古德道君但隨緣得似風飛砂走石不乖空但於事上通無事見色聞聲不用聾珍重上堂云春風颯颯古佛嘉猷淥水潺潺道人活計若與麼會貶向崖州本色衲僧如何理論良久云果聞猿叫斷腸聲珍重上堂舉世尊云一切衆生妄認四大為自身相六塵緣影為自心相且問諸仁者在眼曰見在耳曰聞在鼻嗅香在舌知味在手執捉在足運奔亦不喚作衆生亦不喚作佛性你且道喚作什麼良久云香嚴含悲接拄杖仰山撲破溈山鏡珍重上堂云承言須會宗勿自立規矩若人下得通方句我當刎頸而謝之珍重上堂舉雪峰云若論此事如一面鏡相似胡來胡現漢來漢現有僧云忽遇明鏡來時如何雪峰云胡漢但隱師云不見道驗人端的處下口即知音珍重上堂云山僧因看華嚴金師子章第九由心回轉善成門又釋云如一尺之鏡納重重之影像若然者道有也得道無也得道非亦得道是亦得雖然如是更須知有拄杖頭上一竅若也不會拄杖子穿燈籠入佛殿撞著釋迦𥕤倒彌勒露柱拊掌呵呵大笑你且道笑箇什麼以拄杖卓一下便下座上堂舉先德道吾早年來積學問亦曾討疏尋經論分別名相不知休入海算沙徒自困却被如來苦呵責數他珍寶有何益且問諸人作麼生是自家珍寶若也不會拄杖子叫屈去也卓一下珍重上堂云江月照松風吹永夜清宵何所為淥水澗中流不住白雲片片嶺頭飛珍重上堂云先德道今古應無墜分明在目前片雲生晚谷孤鶴下遙天岸柳含煙緑溪花帶雨鮮誰人知此意令我憶南泉師云你且道南泉意作麼生良久云兩眼已隨青嶂合雙眉猶帶野花顰珍重上堂舉傅大士云未有無心境曾無無境心境忘心自滅心滅境無侵師遂拈起拄杖云山僧喚者箇作拄杖子你等諸人喚什麼作境你若道得山僧有通方句若道不得與你七百錢珍重上堂云若論此事直饒辨似懸河智如流水且與那事沒交涉昔有僧問風穴大師如何是道大師云五鳳樓前如何是道中人大師云問取城隍使道與道中人相去多少大師云月似羅中鏡星如霧裏燈師云衆中商量極有云云山僧今日與你頌出月似羅中鏡星如霧裏燈滿堂清淨衆盡是坐禪僧珍重上堂云如釋尊言應如是知如是見如是信解不生法相師遂拈起拄杖云山僧喚者箇作拄杖子何者是法相卓拄杖下座上堂云山僧常向諸人道擬心即差動念即錯不擬不錯一任你諸人貶剝你且道貶剝什麼處良久云想君不是金牙作爭解彎弓射尉遲上堂舉僧問曹山雪覆千山為什麼孤峰獨露曹山云須知有異中異進云如何是異中異曹山云不覆千山頂師云曹山慈悲濃厚接引羣生要會即不可山僧者裏不然如何是異中異片片梅花飛落地珍重上堂拈起拄杖云山僧有時一棒作箇幔天網打俊鷹俊有時一棒作箇布絲網撈蝦摝蜆有時一棒作金毛師子有時一棒作蝦蟇蚯蚓山僧打你諸人一棒且作麼生商量你若緇素得出不妨拄杖頭上眼開照四天下若也未然從教立在古屏畔待使丹青入畫圖珍重上堂舉魯祖凡見僧來便面壁而坐衆中商量極有多般梁山受業先師曾有一頌魯祖三昧最省力才見僧來便面壁若是同心達道者不在揚眉便相悉山僧即不然祖師面壁播諸方無限禪人謾度量無事晚來江上立數株寒柏倚斜陽珍重師舉行腳時在衆中與一尊宿談論次因舉僧問長沙和尚南泉遷化向什麼處去長沙云東家作驢西家作馬僧云畢竟如何長沙云要騎即騎要下即下其尊宿遂問師云莫是對他語否師云無莫是成他問否師云無莫是點他語否師云無畢竟如何師云磬聲斷後不許易價因成一頌示衆云要騎即騎要下即下磬聲斷後不許易價師上堂拈起拄杖示衆云先佛世尊道觀法性空是無上智山僧喚者箇作拄杖子汝諸人作麼生觀有智不假年高無智徒勞百歲卓拄杖下座上堂示衆云古人道有時先照後用有時先用後照有時照用同時有時照用不同時若也先照後用露師子之爪牙若也先用後照縱象王之威猛若也照用同時如龍得水致雨騰雲若也照用不同時提獎嬌兒拊憐愛子諸仁者此古德建立法門為合如是不合如是若合如是似紀信登九龍之輦不合如是若項羽失千里烏騅還有人為琅邪出氣也無如無山僧自道去也卓拄杖下座上堂云夫參學人須是不滯於性相始得若談於性即滯於相若談於相即滯於性者裏須是性相都泯理事混融方解即事即理即性即相當此之時如拳十指展縮自由乃拈起拄杖云拄杖走入新羅高麗國中大醉報道今年米貴地神惡發生嗔拄杖即今入地便擲下拄杖下座僧問大事未辦時如何師云金燈連夜照不覺五更鐘進云大事已辦時如何師云跣足踏氷雪方知徹骨寒問談真即逆俗順俗即違真離此二途請師舉唱師云水底石牛吼木裏瑞花開進云若然者不因觀北斗爭得見南星師云世亂奴欺主年衰鬼弄人放汝三十棒遂舉大陽和尚示衆云平常無生句妙玄無私句體明無盡句後有僧請益如何是平常無生句白雲覆青山青山頂不露如何是妙玄無私句寶殿無人不侍立不種梧桐免鳳來如何是體明無盡句手指空時天地轉回途石馬出紗籠第一句道得師子嚬呻第二句道得師子踞地第三句道得師子返躑縱也周遍十方擒也坐在一處正當與麼時作麼生委悉若委悉不得來朝更向楚王看便下座上堂云山僧昨日因禪人請益郢州大陽和尚三句語山僧昔曾奉侍巾瓶來今日不可不報答他大陽和尚去也山僧亦有三句語如何是平常無生句言前無的旨句後絶追尋如何是妙玄無私句金鳳不棲無影樹玉兔何曾下碧霄如何是體明無盡句三冬枯木秀九夏雪花紅將此三轉語供養大陽和尚雖然如此又不可辜負我汾陽先師去也山僧亦有三轉語供養我汾陽先師如何是平常無生句啐如何是妙玄無私句如何是體明無盡句好師乃頌云啐好林間問三老不餐王母桃自有仙家棗便下座上堂舉一老宿道臨濟入門便喝也是齋後打鐘德山入門便棒也是平地陷人諸仁者便道是幸然無事向好肉上剜瘡枝條上強生節目似這般見解更買三二十緉草鞋始得又有一般老宿云臨濟入門便喝德山入門便棒到者裏凡聖路絶纖毫不立坐斷天下人舌頭汝若擬議喪身失命似這般見解滴水也難消所以先師道德山棒臨濟喝獨震乾坤橫該抹琅邪即不然臨濟入門便喝且不得粗心德山入門便棒更須子細且道教汝諸人子細箇什麼云停囚長智養病喪軀以拄杖卓一下上堂拈起拄杖云十方諸佛降生也在拄杖頭上轉大法輪也在拄杖頭上入般涅槃也在拄杖頭上汝等諸人作麼生委悉良久云不可待緣木求魚見危致命卓拄杖下座上堂云夫參學者須是智眼開明始得今時諸尊宿才見竪拂敲床揚眉瞬目便作是非褒貶不見汾陽先師道識得拄杖子一生參學事畢又泐潭澄和尚道識得拄杖子入地獄如箭射聽取山僧一頌汾陽拄杖子天下走禪流秋風急似箭春雨潤如油便下座僧問昔日靈山以桴擊鼓轉大法輪今日師登法座請師演唱師云白雲進云大衆臨筵如何證據師云淥水潺潺進云淮甸一輪月長江萬里清師云罕遇知音僧問如何是琅邪境師云山高海闊進云如何是境中人師云天長地久進云人境已蒙師指示向上宗乘事若何師云速禮三拜僧問談真即逆俗順俗即違真如何得不相違去師云杖頭挑日月進云施主臨筵請師再垂方便師云袖裏貯乾坤進云野花連地發春草遍園生師云釣人江上立不覺失漁舟師乃云只麼地散去亦有少分相應雖然有少分相應有似鈍鳥棲於枯枝遊魚處於涸轍作麼生是透脫一句卓拄杖下座僧問承師有言開口錯擬心差離此二途請師別道師云蘇武不入單于帳進云與麼則今日失利去也師云旁觀塞草亂斑斑進云早知今日事悔不慎當初師云愁人莫向愁人説師因出州看陳轉運喫茶次乃問師云佛法總不在思量是否師云既不在思量如何道得運使大笑云爭到者裏道不得師云請運使問待山僧道運使遂將前問問師師答云有過者且恕十三無罪者莫決八棒運使呵呵大笑乃就師乞頌師遂與頌云莫於言上覓切忌意中尋疾𦦨過風旨思量海嶽沉師歸山升座舉似大衆頌後續兩句云祇陀親捨樹長者布黃金師因雪上堂云雪雪大地山河一齊説文殊普賢真妙訣拈取拄杖驀頭撇豐干林下笑呵呵兩箇猢猻探水月僧問一法若有毗盧墮在凡夫萬法若無普賢失其境界正當與麼時還許文殊出頭來也無師云樓頭吹畫角妄聽五更鐘進云學人未曉乞師再指師云未到長城不肯休進云不入洪波裏爭見弄潮人師云草上斑斑衆者看師乃舉靈樹和尚欲竪行狀要選一轉語上如契和尚意者可以問如何是祖師西來意人人下語皆不契雲門為首座下語云師方乃契得靈樹師頌云師師師知知知三三兩兩過遼西一雙紅杏換消梨上堂拈起拄杖云盤山道向上一路師云滑南院道壁立千仞師云險臨濟道石火電光師云鈍琅邪有定乾坤底句各各高著眼高著眼卓拄杖下座僧問承教有言法不在內不在外不在中間未審在什麼處師云逢人莫錯舉進云還許學人請益也無師云啼得血流無用處其僧禮拜師云猶較些子問九夏賞勞誰人得薦師云周秦漢魏進云與麼則昨夜一聲鴈西風萬里秋師云靜處薩婆訶師乃拈起拄杖云在天則清在地則濁在人則神在物則靈且道在山僧手裏喚作什麼良久云拄杖子上堂舉仰山和尚見雪師子遂問雲門還有過得此色者麼雲門遂推倒著雪竇拈云雲門只會推倒不會扶起即今問汝諸人推倒扶起相去多少拄杖子拶過眉毛鼻孔裏呵呵大笑便擲下拄杖僧問雪峰三度上投子九度上洞山為什麼却去德山倒戈卸甲師云人平不語水平不流進云石火電光人不顧隨機設化有誰聞師云地無三寸土人無隔宿恩進云霜後始知松柏操事難方見丈夫心師云江南兩浙水師乃云見苦斷集取捨難忘獨契真常悲心未廣三祇五位滯在長塗一念成佛心源未曉諸仁者若也薦得去如金鱗透網遊泳波瀾似俊鳥離籠翱翔碧落諸仁者若能如是方有少分相應若也未然且莫雲居羅漢僧問古人借問田中事插鍬叉手意如何師云袈裟浮淥水螺髻拂青雲進云不入洪波裏爭見弄潮人師云作麼生是弄潮人其僧便喝師云七棒對十三問古人道承言者喪滯句者迷離此二途如何即是師云逢人莫舉僧應諾師云作什麼僧便喝師云好箇衲僧僧拊掌便禮拜師云不消多師乃舉先聖道法爾不爾俱為唇齒汝等諸人作麼生會若會得開眼尿床若也不會遠之遠矣便下座師遂持此語遍問諸禪者云汝作麼生會衆皆下語不契末後有僧云請和尚下語師便起歸方丈僧問古人道問無橫竪答者由師擬伸一問師意如何師云你試問看進云劒閣路雖險夜行人更多師云想君不是金牙作進云與麼則為衆竭力禍出私門師云教休不肯休師乃云諸方盡道拈槌竪拂瞬目揚眉曲為中下之流山僧即不然山僧拈起者拄杖子也不為上上之人亦不為中下之者且道尋常用處作麼生若知得一竅方解穿窗透牖動地搖天若也未然且向天台看華頂却來南嶽度石橋便下座上堂舉先聖道見身無實是佛身了心如幻是佛幻了得身心本性空斯人與佛何殊別者箇是拄杖子阿那箇是佛良久云一時吹取入門來上堂云千説萬説不如一決諸人者且道決箇什麼良久云點鐵化為金玉易勸人除却是非難歸堂去上堂舉永嘉和尚道但得本莫愁末如淨琉瑙含寶月遂拈起拄杖云者箇是拄杖子阿那箇是本云任是深山更深處也應無計避王徭珍重上堂舉清平有僧問如何是有漏答云笊籬云如何是無漏答云木杓師云古人與麼道實謂奇特山僧為你諸人頌出有漏笊籬無漏木杓烜赫禪和妄生卜度靈利座主何處摸𢱢金牙解使神鏘李廣箭穿雙鵠歸去上堂云東湧西沒蓋是尋常南北縱橫未為極則透皮徹骨則不問汝鼻孔遼天一句作麼生道良久云堪羡一堂無事客臥雲深處不朝天珍重上堂云拄杖若是頭上安頭拄杖不是斬頭覓活離此二途猶是無依滯魄透脫一路猶是著肉汗衫汝等諸人各具金剛眼睛到者裏作麼生會若也不會拄杖子透過渤海看看卓拄杖一下上堂云盡大地是箇糊餅從他江南兩浙河北關西咬者咬嚼者嚼𥋾禪和被山僧劈頭打一棒走入露柱裏藏身且道露柱裏明得什麼邊事若也不會拄杖子為汝念箇揭諦真言以拄杖卓一下上堂拈起拄杖云永嘉道心是根法是塵兩種猶如鏡上痕痕垢盡除光始現心法雙忘性即真者箇是拄杖子阿那箇是心卓拄杖一下上堂云依經解義三世佛冤離經一字又同魔説且作麼生得不傷物義去汝等諸人聽山僧一頌地凍草枯水寒氷結借問禪人是何時節臨濟走過新羅德山愁眉不悅珍重上坐舉先梁山云從南來者與二十棒從北來者與二十棒雖然如此且不當宗乘師遂拈拄杖云點與不點等盡抹為微塵卓拄杖一下上堂舉先聖道森羅及萬象一法之所印盡大地是一條拄杖汝等諸人作麼生會卓拄杖一下便下座上堂舉虎溪菴主僧問在者裏多少年主云只見春生夏長年代總不記得僧云大好不記得庵主云你道我在者裏多少年僧云春生夏長庵主云閙市裏虎師云聽取山僧一頌閙市中心虎能歌不解舞命值木星君不遇羅睺土便下座上堂舉先聖道才有是非紛然失心到者裏還有商量也無云心粗者失欺敵者亡珍重僧問今夜鐘鳴時道人盡來此向上宗乘請師舉唱師云我到者裏總開口不得學云退身三步去也師云言不虗設學云今日失利師云放你三十棒問拈捶竪拂即不問瞬目揚眉事若何師云趙州曾見南泉來進云學人未曉乞師再垂指示師云今冬多雨雪貧家爭奈何進云百花皆毀折冬後一陽春師云真師子兒善師子吼師乃舉先韶陽大師道咄咄咄力韋希禪子訝中眉垂諸高德韶陽只有先鋒且無殿後山僧者裏即不然咄咄咄橫該抹天不長兮地不闊珍重僧問久欽尊德今日功明時如何師云山高日出早進云與麼則白馬敲金鐙朝天萬里歸師云親面龍顏一句作麼生道學云一片月生海幾家人上樓師云在舍只言為客易臨岐方覺告人難師乃云過去諸佛已般涅槃好與三十棒見在諸佛轉大法輪好與三十棒未來諸佛當出於世好與三十棒諸高德若要報佛之深恩當如是學學則從諸人不得辜負老僧珍重上堂云先聖道在有破有居空破空二幻既除中道不立若然者山僧拄杖向什麼處著魚躍已隨流水去鶯啼猶送落花來珍重上堂云拈起拄杖作靠山猛虎放下拄杖如入水蛟龍靠山猛虎作麼生商量入水蛟龍如何話會若也不知者一竅拄杖子笑汝去也卓拄杖一下便下座上堂云若論此事如洪鐘待扣聲應長空如寶鏡當軒影臨萬象天不能蓋地不能載賢愚共處其間聖凡出之不得山僧與麼道大有人笑去在他也笑我也笑誰人知此竅三十年更笑去在珍重僧問一塵才起大地全收一塵未起時如何師云李廣射落雲中鴈進云龍吟霧起虎嘯風生也師云驚得胡兒走似煙問開口即錯動舌即乖如何是的師云摩竭陀國金剛怒學云離咽喉唇吻又作麼生道師云驗人端的處下口即知音進云與麼則野花開滿地流水自西東師云者回放過後度難逢卓拄杖一下師云拈起拄杖千花競發放下拄杖萬樹齊凋不拈不放一月在天衲僧當此之時作麼生道良久云秋燕不聞梁上語却看鴻鴈過長天珍重上堂云擊水魚頭痛穿林宿鳥驚黃昏不擊鼓日午打三更諸禪德既是日午為甚却打三更良久云昨見垂楊緑今逢落葉黃珍重上堂示衆云色即是空非色滅空我喚者箇作拄杖子你等諸人喚作什麼乃云欲知瀚海路須是去來人珍重上堂云句中薦得遊子返於故鄉意中薦得方解事於尊堂若然者須是轉身吐氣始得若能如是方解百尺竿頭進步句中無意意中無句既能如是且作麼生轉身吐氣若也不會拄杖子為汝吐氣去也卓拄杖下座上堂示衆云拈起拄杖更無上上放下拄杖是何模樣髑髏峰後即不問汝諸人馬鐙裏藏身一句作麼生道若道不得拄杖子道去也卓一下便歸方丈上堂示衆舉先聖道説法不有亦不無山僧不可欺賢罔聖埋沒諸人去也何以如此也是湖南人賣便下座上堂舉先百丈禪師示衆云百丈有三訣喫茶珍重歇直下若承當知君猶未徹師拈云百丈與麼道美則美矣善則善矣雖然如是即有順水之波且無滔天之浪山僧即不然琅邪有三訣淥水青山月三冬枯木花九夏寒巖雪珍重僧問把斷綱宗則不問通風一句請師宣師云清風戞地紅𦦨亘天學云若然者撒手臥長空攢眉却回去師云真師子兒善師子吼學人便喝師卓拄杖一下學云和尚著忙作什麼師呵呵僧問昔日憂闐王刻像蓋為佛在忉利天説法今日施主刻像未審佛在什麼處説法師云三山鎖夜月進云大衆側聆學人未曉師云照破萬家門進云恁麼則日出乾坤耀雲收山嶽青師云驗人端的處進云早知燈是火師云直待雨淋頭師乃舉先聖道至道無難唯嫌揀擇下面注云但莫憎愛洞然明白師云汝諸人到者裏作麼生下得一轉語契古人良久云汝也不著便我也不著便兩箇蒸餅一斗好歸堂去僧問古人對拄杖子為什麼哭蒼天師云蓬頭跣足進云蒼天蒼天師云瞎漢放你二十棒學云諾諾師云棺木裏瞪眼僧問無言無説猶辱宗風舉唱談玄埋沒宗旨離此二途請師別道師云千年田八百主進云將謂胡鬚赤更有赤鬚胡師云試對衆驗看僧禮拜師云將謂南番舶主元來此土商人師乃云內空故無眼耳鼻舌身意外空故無色聲香味觸法不是無何故不見石頭大師道然於一一法依根葉分布歸堂去僧問客路如天遠侯門似海深琅邪門下如何進道師云六六三十六進云學人未曉乞師再垂方便師云臥雲深處不朝天進云恁麼則雲收山嶽靜春暖百花榮師云靜處薩婆訶問承教有言諸法從本來常自寂滅相學人見山是山見水是水時如何師云賊是小人智過君子進云莫言侵早起更有夜行人師云此回放過後度難逢卓拄杖一下師乃云上不在天下不在地中不在人若然者四生六道承何恩力汝且道著力一句如何道得若道不得拄杖子與彌勒釋迦鬪打去也卓拄杖一下拈古舉外道問佛不問有言不問無言世尊據坐外道云世尊大慈大悲開我迷雲令我得入外道去後阿難白佛外道見何道理讚歎而去世尊云如世良馬見鞭影而行師拈云依稀似曲才堪聽又被風吹別調中仰山夜夢入五百聖堂為第二座時有一尊者起來白槌云次當第二座説法仰山遂起白槌云摩訶衍法離四句絶百非謹白其五百聖衆各各散去師拈云且道五百聖衆散去是肯他仰山不肯他仰山若肯他仰山又辜負仰山若不肯仰山猶如平地上喫交山僧今日不惜兩莖眉毛與汝諸人注破摩訶衍法離四句絶百非你若舉似諸方諸方若與麼會入地獄如箭射舉趙州一日與文遠論義鬬劣不鬬勝勝者輸果子文遠云請和尚立義州云我是一頭驢文遠云某甲是驢糞趙州云將果子來師拈云趙州大似蕭何制律文遠也似蕭何制律舉僧問如何是夾山境夾山云猿抱子歸青嶂裏鳥銜花落碧巖前法眼云我二十年作境話會師拈云且道如今作麼生會良久云上士遊山水中人坐竹林舉崔禪上堂云出來打出來打時有僧出來云崔禪聻崔禪擲下拄杖下座師拈云久經行陳者終不展旗鎗舉臨濟示衆云但有問訊不虧欠伊總識得伊來處與麼來者恰似失却不與麼來無繩自縛一切時中莫亂斟酌會與不會都來是錯分明與道一任天下人貶剝師拈云作麼生貶作麼生剝良久云垂鈎四海為釣驪龍格外玄談蓋尋知己喝一喝舉順德問僧窗外什麼聲僧云雨滴聲順德云衆生顛倒迷己逐物師拈云得即得大似平地上陷人舉鼓山示衆鼓山門下不得嗽咳時有僧出來咳嗽一聲鼓山云作什麼僧云傷寒山云傷寒即得師拈云雷聲甚大雨點全無舉寶壽初開堂日三聖為請主便推出一僧問話其僧才禮拜寶壽便打三聖云若與麼為人已後瞎却鎮州一城人眼在寶壽擲下拄杖便歸方丈師拈云不是三聖爭到今日然雖如此錯會者多舉巖頭問德山云是凡是聖德山便喝巖頭禮拜後洞山聞云若不是奯公大難承當巖頭云洞山老人錯下名言我當時一手擡一手搦師拈云巖頭無人問著不妨奇特才被洞山腦後一錐直得瓦解氷消舉興化道此一炷香擬欲承嗣三聖三聖與我太孤擬欲承嗣大覺大覺與我太賒此一炷香不如承嗣臨濟先師師拈云且道因甚承嗣臨濟良久云路逢劒客須呈劒不是詩人莫獻詩舉僧問踈山如何是法身踈山云枯樁僧云如何是法身向上事山云非枯樁僧云法身還遍一切處也無山云遍僧云淨瓶內還有也無山云無僧云大好遍山便打又僧問曹山云滿月彎弓時如何師云善射不中的學云為什麼不中的師云左來左中右來右中學云大好不中的師便打又僧問雲居明鏡當臺如何師云不鑒照學云為什麼不鑒照師云胡來胡現漢來漢現學云大好不鑒照師便打師拈云一轉語賓家有道理主家無道理一轉語主家有道理賓家無道理一轉語賓主俱無道理若也揀得出鼻孔在琅琊手裏若也揀不出一任草鞋裏𨁝跳舉僧問洞山初和尚如何是道山云卓學云擬向如何山云失卓後僧持此語問徹和尚未審洞山意旨如何徹云虎鬬龍傷師拈云金烏藏海岸玉兔離青霄舉百丈一日升堂大衆集定以拄杖一時趂下法堂却召大衆大衆回首乃云月似彎弓少雨多風師拈云若入洪波裏須是弄潮人舉雲門云釋迦老子初生下時目顧四方一手指天一手指地道天上天下唯我獨尊我當時若見一棒打殺與狗喫却圖得天下太平師拈云將此身心奉塵剎是即名為報佛恩舉曹山云莫行心處路不挂本來衣何須更與麼切忌未生時師拈云不傷物義一句作麼生道良久云庭前翠竹禪人種嶺上青松野客栽舉間禪師示衆云不生想念本來無體大用現前不説時節後臨遷化時問侍者云坐去者誰侍者云僧伽又云立去者誰侍者云僧會間禪乃周行七步垂手而終師拈云生既如是死亦如然舉趙州行腳時到一鄉院經旬日臨去乃辭院主院主云何往趙州云臺山禮拜文殊去院主云某甲有頌相送云何處青山不道場遙須䇿杖禮清涼雲中縱有金毛現正眼觀時非吉祥趙州乃問作麼生是正眼院主無語師拈云啼得血流無用處舉米倉與寶壽同赴州主齋次州主令客司傳語請二人長老談論佛法寶壽云請師兄長老答話米倉便喝寶壽云未曾奉問喝箇什麼米倉云猶欠少在寶壽却與一喝師拈云大似點火夜行舉臨濟上堂云赤肉團上有一無位真人常從汝等面門出入未證據者看時有僧出問如何是無位真人臨濟下禪床搊住其僧擬議濟乃托開云無位真人是什麼乾屎橛便歸方丈師拈云臨濟可謂氷凌上度過九鞠劒刃上拾得全身舉百丈開田次問黃檗運闍黎開田不易檗云衆僧作務百丈云有煩道用檗云爭敢辭勞百丈云開得多少田也檗乃將鋤頭築地三下百丈便喝黃檗掩耳便出師拈云百丈一喝可謂垂絲於萬丈潭中黃檗掩耳獨聳於千峰之上舉雲居上堂云譬如人將三十貫錢買得一隻獵狗只解尋得有蹤迹忽遇羚羊挂角時莫道蹤迹氣息也覓不著時有僧出便問羚羊挂角時如何雲居云六六三十六僧無語雲居云會麼僧云不會居云不見道絶蹤迹師拈云雲居與麼稱提大似八尺布衫丈二袖舉趙州到茱萸處執杖子於法堂上從東邊過西邊茱萸便問作什麼州云探水茱萸云我者裏一滴也無探箇什麼趙州靠了杖子便出去師拈云世亂奴欺主年衰鬼弄人舉僧問藥山平田淺草麈鹿成羣如何射得麈中主山云看箭僧便作倒勢山云拖出者死尸著僧𨁝跳便出山云揑泥丸漢有什麼限師拈云賊出關門家中叫屈舉乾峰上堂云舉一不得舉二放過一著落在第二雲門在座下出來云昨日一人新到從天台來却往南嶽去也乾峰下座搊住云維那來日不得普請便托開歸方丈師拈云路遙知馬力歲久見人心舉趙州聞俗行者勘僧云我有十貫錢若有人下得一轉語即捨此錢前後有人下語並不契趙州遂往行者家行者云若下得一轉語即捨其錢趙州戴笠子便行師拈云武帝求仙不得仙王喬端坐却升天舉巗頭為渡子時凡見人來舉棹示之忽有一婆子抱一孩子來問云呈橈舞棹即不問且道婆手中孩兒甚處得來巗頭便打婆云婆生七子不遇知音只者一箇也不消得便拋向水中師拈云欺敵者亡舉百丈見趙州來參百丈云甚麼處來州云南泉來丈云南泉近日有何言句示徒州云今時人直教悄然去百丈云悄然且致茫然一句作麼生道州近前三步百丈咄之州作縮頭勢百丈云大好悄然趙州拂袖便出去師拈云趙州老人向師子窟中換得牙爪舉小乘毗沙論有一聚落毒龍所居時有五百尊者往彼降他不得後有一尊者彈指一下其龍即降師拈云若據教乘自有科判琅琊者裏即不然只者彈指也不消得然雖如是且莫困魚止濼病鳥棲蘆與仰山參巗頭巗頭才見竪起拂子仰山便展坐具巗頭放下拂子仰山收坐具巗頭云我不重你放即重你收師拈云巗頭與麼道錯批判者多仰山出去切不得粗心與黃檗見僧來乃云諸方老宿盡在我拄杖頭上僧便禮拜僧後到大樹處舉前話大樹云黃檗與麼道曾夢見諸方也未其僧却回舉似黃檗黃檗云我者話已行遍天下師拈云大樹與麼道大似有眼如盲黃檗一條拄杖天下人咬嚼不碎舉臨濟上堂有僧出禮拜濟便喝僧云老和尚莫探頭好濟云你道落在什麼處僧便喝又僧問如何是佛法大意濟便喝僧禮拜濟云你道好喝也無僧云草賊大敗濟云過在什麼處僧云再犯不容臨濟乃云要會臨濟賓主句請問取適來問話二禪客師拈云真金須入火舉金剛經云一切有為法如夢幻泡影如露亦如電應作如是觀師拈云先聖可謂誠實之言然雖如是錯會者如麻似粟舉僧問石霜咫尺之間為什麼不覩師顏霜云我遍界不曾藏僧又到雪峰處問云遍界不曾藏意旨如何峰云什麼處不是石霜師拈云雪峰雖有利人之心且無出人之眼石霜雖有出人之眼未知向上一竅舉淨名經云諸菩薩各各説不二法門於是文殊曰如我意者於一切法無言無説無示無識離諸問答是為入不二法門於是文殊師利問維摩詰我等各各自説已仁者當説何法是菩薩入不二法門維摩默然文殊讚言善哉善哉乃至無有文字語言是為真入不二法門師拈云文殊與麼讚歎也是灼卜聽虗聲維摩默然切不得鑽龜打瓦舉圓明云瘥病不假驢駝藥三角云瘥病須假驢駝藥師拈云圓明可謂小慈妨於大慈三角貪他一斗米失却半年糧舉僧問同安如何是向去底人安云寒蟬抱枯木哭盡不回頭又問如何是却來底人安云火裏蘆花秀鋒春恰似秋又問如何是不來不去底人安云石羊遇石虎相逢早晚休師拈云古人雖解箭穿鴻鴈要且不解繞樹射猿舉僧問白兆師唱誰家曲宗風嗣阿誰師云自小不曾歷他家門戶僧云與麼則竺乾的子白兆兒孫師云承言者喪滯句者迷師拈云巧人須得巧人佐拙人須得拙人扶舉僧問風穴寶塔元無縫金門即日開時如何穴云智積佐來空合掌天王捧出不知音如何是塔中人穴云萎花風掃去香水雨飄來師拈云風穴若無後語大似紀信詐降舉大般若經云善現問舍利弗云以何為佛眼舍利答云以性空為佛眼善現嘆云善哉善哉從上諸佛皆以性空為佛眼從佛口生從法化生師拈云望天不見天地不見地舉教中道清淨本然云何忽生山河大地師拈云清淨本然云何忽生山河大地舉肇法師云旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天而不周師拈云肇法師與麼道也是平地上陷人山僧者裏即不然巖前淥水嶺上白雲舉無著到五臺文殊處喫茶次文殊提起琥珀盞子問云南方還有這箇麼無著云無文殊云尋常將什麼喫茶無著便休去師拈云若也是去可謂虎口裏奪餐若也非去移舟看水勢舉棹別波瀾舉石霜在溈山會下作米頭一日篩米次溈山云施主物不要拋撒石霜云不拋撒溈山於地上拈得一粒米云汝道不拋撒者箇是什麼石霜無語溈山云莫欺者一粒百千粒盡從者一粒生石霜云百千粒從者一粒生未審者一粒從什麼處生溈山呵呵大笑便歸方丈至晚上堂云大衆米裏有蟲師拈云溈山一粒米彈破衲僧牙舉僧問寶壽萬境來侵時如何寶壽云莫管他僧禮拜壽云莫動著動著即打折你驢腰師拈云若無遣蛇手誤煞世間人舉泰首座到洞山處洞山晚間排果子管顧他洞山便問云首座有一物上拄天下拄地黑如漆常在動用中動用中收不得且道過在什麼處首座云過在動用中洞山喚侍者收却果子牀不得果子喫師拈云若不是洞山老人焉能辨得雖然如此洞山老人猶欠一著在舉水潦參馬大師問如何是祖師西來意被馬大師一踏踏倒起來拍手呵呵大笑當下大悟便承嗣馬大師住後有僧問如何是祖師西來意水潦云自從馬師一踏後直至如今笑不休師拈云大衆你道水潦還曾悟也未舉龐居士問馬大師不昧本來身請師高著眼馬大師直下居士云一等沒絃琴唯師彈得妙馬大師直上看居士便禮拜馬大師便歸方丈居士隨後入方丈內云弄巧得拙師拈云一夜作竊不覺天曉舉南院見僧來竪起拂子僧云敗闕南院放下拂子僧云猶有者箇在南院便休師拈云狂狗趂塊師子咬人舉南泉示衆云道非物外物外非道時有趙州出來便問如何是物外道南泉便打趙州接住拄杖云和尚莫打某甲已後錯打人去在南泉云龍蛇易辨衲子難謾乃擲下拄杖便歸方丈師拈云不見道酒逢知己飲詩向會人吟舉順德問僧近離什麼處僧云三峯德云夏在什麼處僧云五峯德云放你三十棒僧云未審某甲過在什麼處德云為你出一叢林入一叢林師拈云割菜鎌子舉僧問廣德如何是佛德云畫戟門開見墜仙僧馳此語至州中悟空處便問畫戟門開見墜仙意旨如何空云直饒親見釋迦來智者咸云不是佛廣德後聞遙望城中禮拜云悟空古佛豈止羊二十口師拈云廣德腦後添釘悟空眼中拔楔雖然善順機宜敢保他家未徹舉雪峯與玄沙行次峯指一片地云好造無縫塔玄沙云高多少雪峯看上又看下玄沙云人天福報即不無若是靈山受記未夢見在峯云你作麼生玄沙敲轎子云舁舁師拈云國清才子貴家富小兒嬌舉桐峯庵主有一老人參庵主問從什麼處來老人不對主云善能對機善能對機老人遂拈一枝草示庵主庵主便喝老人禮拜庵主便歸庵老人隨後看庵主云與麼疑煞天下人在師拈云不見道當斷不斷反遭其亂
