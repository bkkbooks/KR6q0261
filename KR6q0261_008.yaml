body:
  text: 汝州首山念和尚語錄南岳下九世嗣風穴師諱省念萊州狄氏子入院上堂云佛法付與國王大臣有力檀那令其佛法不斷絕燈燈相續至于今日大眾且道續箇甚麼良久云今日須是迦葉師兄始得時有僧問靈山一會何異今朝師云墮坑落塹僧云為什麼如此師云瞎僧問師唱誰家曲宗風嗣阿誰師云少室巖前親掌示僧云更請洪音和一聲師云如今也要大家知問如何是和尚家風師云一言截斷千江口萬仞峯前始得玄問如何是首山境師云一任眾人看僧云如何是境中人師云喫棒得也未僧禮拜師云喫棒且待別時問如何是佛法大意師云楚王城畔汝水東流僧云如何是學人親切處師云五九盡日又逢春僧云畢竟事如何師云冬到寒食一百五問司徒郎中臨座側祖胤西來願舉揚師云王臣三請今朝赴萬民樂業普皆安僧云與麼則慈雲普潤處處皆通也師云野老謳歌時人皆唱復云諸上座佛法無多子只是你諸人自信不及若也自信得去千聖出頭來你面前亦無下口處何故只為你自信得及不向外馳求所以柰何不得直饒釋迦老子到這裏也與三十棒然則如此初心後學憑箇什麼道理且問你諸人還得恁麼也未良久云若得恁麼直須恁麼無事珍重上堂僧問從上諸聖向什麼處行履師云牽犁拽杷問古人拈槌竪拂意旨如何師云孤峯無宿客僧云未審意旨如何師云不是守株人問如何是菩提道師云此去襄縣五里僧云向上事如何師云往來不易上堂僧問如何是首山師云東山高西山低僧云如何是山中人師云恰遇棒不在僧禮拜師便打問如何是道師云爐中有火無心撥處處無蹤任意遊僧云如何是道中人師云坐看煙霞秀不與白雲齊問諸聖說不到處請師提唱師云萬里神光都一照誰人敢並日輪齊問學人身心聚散時如何師云不聞天樂響僧云如何收攝師云莫逐四時移問菩薩未成佛時如何師云眾生僧云成佛後如何師云眾生眾生問覺花未發時如何辨真實師云冬不寒臈後看僧云莫便是也無師云錯問六國未寧時如何師云什麼處去來僧云寧後如何師云大地火起問寶劒未出匣時如何師云怨阿誰僧云出匣後如何師云不斬無罪之人僧禮拜師云斬問寶劒未出匣時如何師云你不惜猶可僧云出後如何師云伏惟尚饗僧云忽遇師子吼時如何師云一任野干鳴僧便喝師云果然僧又喝師云放你三十棒僧禮拜師云這瞎漢復云諸上座不得盲喝亂喝者裏尋常向你道賓則始終賓主則始終主賓無二賓主無二主若有二賓二主即是兩箇瞎漢所以我若立時你須坐我若坐時你須立坐則共你坐立則共你立雖然如是到這裏急著眼始得若是眼孔定動即千里萬里何故如此如隔牕看馬騎相似擬議即沒交涉諸上座既然於此留心直須子細不要掠虗好他日異時賺著你在諸人若也有事近前無事珍重上堂僧問蓮花未出水時如何師云徧天徧地問出水後如何師云特地一場愁問殺父殺母佛前懺悔殺佛殺祖向什麼處懺悔師云水深一丈問離凡離聖請師一句師云不可錯怪老僧也僧云謝師指示師便打問魚鼓未鳴時如何師云望天不見天僧云鳴後如何師云地不見地問和尚是大善知識為什麼却首山師云不坐孤峯頂常伴白雲閑問四眾圍繞師說何法師云打草祇要驚蛇僧云未審怎生下手師云適來洎合喪身失命問不落三寸請師速道師云老僧到這裏却道不得闍棃道看僧云猶落三寸請師別道師云首山今日失利問如何是首山境師云千花逈秀一葉長芳僧云如何是境中人師云好事不如無問因緣未熟時如何師云進僧云熟後如何師云退問二龍爭珠誰是得者師云得者失僧云不得者又如何師云珠在什麼處僧擬議師便打問維摩默然未審意旨如何師云罕逢穿耳客多遇刻舟人問如何是首山出身語師云誰人障閡得僧云與麼則自在去也師云去即打折你腰師乃云要得親切第一莫將問來問還會麼問在答處答在問處你若將問來問老僧在你脚底你若擬議則沒交涉時有僧出禮拜師便打僧問挂錫幽巖時如何師云錯僧云錯師便打上堂僧問終日忙忙那事無妨如何是那事師云孤峯頂上千花秀萬仞嵳峩嶮處行僧云莫便是和尚為人處也無師云大眾謌謠送千峯永不回僧云回來底事又作麼生師云粉骨碎身猶未報三年一度送錢財僧禮拜師云噓噓問一切諸佛皆從此經出未審此經從何而出師云低聲低聲僧云如何受持師云切不得染汙問作何行業報得四恩三有師云殺人放火僧云與麼則大作業底人也師云苦痛深問世尊滅後法付何人師云好箇問頭無人答得僧云如何是世尊不說說師云任從滄海變終不為君通僧云如何是迦葉不聞聞師云聵人徒側耳問古人言見色便見心諸法無形將何所見師云一家有事百家忙僧云學人不會乞師再指師云三日後看取問入京朝聖主只到潼關却便回時如何師云猶是鈍漢問路逢達道人不將語默對未審將什麼對師云瞥爾三千界僧云與麼則目視不勞也師云天恩未遇後悔難追問仗鏌鎁劒來取師頭時如何師噓一聲僧云苦痛深師便打問得船便渡時如何師云猶是鈍漢問權借一問以為影草時如何師云放你三十棒問久在貧中請師賑接師云不接僧云為什麼不接師云喫棒得也未隨聲便打問如何是古佛心師云鎮州蘿蔔重三斤問龍宮海藏當有何物請師一別師云不掛三寸舌僧云為什麼不掛三寸舌師云誰知句後親問不落僧祇如何修證師云近前來與你道僧近前師便打問丹霞掩耳黃蘗拄杖意旨如何師云坐參都不問暢殺子平生僧云稀逢難遇請師指示師云莫椀鳴問虗空以何為體師云老僧在你脚底僧云和尚為什麼在學人脚底師云知你是瞎漢問祇如和尚道老僧在你脚底意旨如何師云橫身不怕侵泥水識者方知大作家問祇如和尚道知你是箇瞎漢又作麼生師云將寶奉君君不識却令瞽叟墮生盲問如何是玄中的師云有言須道却僧云此意如何師云無言鬼也嗔問如何是衲僧眼師云此問不當僧云當後如何師云堪作恁麼問如何得離眾緣去師云千年一遇僧云不離時如何師云立在眾人前問諸佛未見時如何師云拈匙不把筯僧云見後如何師云喫忘却匙問佛未出世時如何師云不可錯怪老僧也僧云出後如何師云舉似天下人問如何是超毗盧之句稱釋迦之譚師云妙語無多子親言舉似誰僧云湛然時如何師云未明心地諦難過首山關僧擬進語師便打問如何是大安樂底人師云不見有一法僧云將何為人師云謝闍棃領話問如何是常在底人師云亂走作什麼問一毫未發時如何師云路逢穿耳客僧云發後如何師云不用更遲疑問無絃一曲請師音韻師良久云還聞麼僧云不聞師云何不高聲問著問大悲千手眼那箇是正眼師云即便𣤩瞎僧云𣤩瞎後如何師云撈天摸地問如何是和尚說法底口師云掛在壁上僧云忽有人來問時如何師云待我取回來即向你道問學人此處不薦擬向南方時如何師云速僧云却不恁麼去時如何師云後會雖逢問如何是離凡聖底句師云嵩山安國師僧云莫便是和尚極則處也無師云南岳讓和尚僧云如何是和尚家風師云無絲傀儡有人牽僧云牽後如何師云妙有無言不較多僧云如何是妙有無言不較多師云有言須得句僧云如何是無絲傀儡有人牽師云當明提祖道方得後人棲問學人乍入叢林乞師指示師云闍棃到老僧會裏得多少時僧云經冬過夏師云莫錯舉似人問有一人蕩盡來時師還接也無師云蕩盡即致那一人是誰僧云風高月冷師云僧堂內幾人坐臥僧無語師云賺殺老僧問學人求出世間時如何師云借水獻花先供養莫教落後索香錢僧云死生事大乞師一薦師云透漏遺蹤無走路僧云恁麼則被他捉著也師云今日到長安問如來演說三乘教未審是什麼教師云千言無一中僧云為什麼千言無一中師云不是上鈎人問一切法皆空如何悟得真空理師云南地先抽笋塞北著皮裘僧云莫落是非也無師云自家看取問青青翠竹還有佛性也無師云南天北地僧云恁麼則推窮佛理也師云北地南天問鐘鼓未鳴時如何師云問前不鳴問後打僧擬議師便喝問如何是迦葉門前一盞燈師云孤峯朗月連天照性似寒泉徹底清僧云勞而無功時如何師云日輪當午無私照自是時人見有移問寶劒未出匣時如何師云大洋海底澄心鏡僧云出匣後如何師云天外吒沙獨擺捎師乃云第一句薦得堪與祖佛為師第二句薦得堪與人天為師第三句薦得自救不了時有僧問如何是第一句師云大用不揚眉棒下須見血僧云慈悲何在師云送出三門外問如何是第二句師云不打恁麼驢漢僧云將接何人師云如斯爭柰何問如何是第三句師云解問無人答僧云即今祇對者是誰師云莫使外人知僧云和尚是第幾句薦得師云月落三更穿市過問維摩一默文殊贊善未審此意如何師云當時聽眾必不如是僧云既不如是維摩默然又且如何師云知恩者少負恩者多乃云若論此事實不掛一箇元字脚便下座次住廣教語錄師入院上堂有僧問曹溪一句天下人聞廣教一句什麼人聞師云不出三門外僧云為什麼不出三門外師云舉似天下人僧問如何是真如體師云徧乾坤僧云如何是真如用師云動天地問如何是大海師云出頭天外看僧云恁麼則包含不盡也師云不見本來身問如何是學人自己師云是你自己問黑豆未生芽時如何師云萬里崖州君自去臨行惆悵怨他誰僧云有何罪過師云昨夜貶文殊僧云未審什麼時回師云專候天恩僧云天恩到時如何師云齊賀太平年問牛頭未見四祖時如何師云不唧𠺕僧云見後如何師云不唧𠺕問久負沒絃琴請師彈一曲師云正值嚴凝久披簑帶雨歸問觀身無相觀法亦然時如何師云晴天開水路僧云恁麼則掃地而盡去也師云孤月照高岑問萬機喪盡時如何師云死水不藏龍僧云轉動後如何師云碧眼胡僧笑點頭問如何是正修行路師云貧兒不雜食僧云撒手歸家去也師云香臭不曾聞僧云三春無二月十五正團圓師云不是闍黎用心處僧云如何是學人用心處師云要行即行要坐即坐問十二時中作何行業即免生死師云你喚什麼作生死僧云與麼則無生死可免師云大眾盡皺眉問如何是超佛越祖之談師云塞北風霜緊江南雪不寒問承古有言自從一見桃花後直至而今更不疑意旨如何師云三尺杖子兩人舁僧云還許學人舁也無師云放下著師問僧恁麼來者是甚麼人僧云問者是誰師云老僧僧便喝師云向你道是老僧又惡發作麼僧又喝師云恰遇棒不在手僧云草賊大敗師云今日又似得便宜又似落便宜問如何是道師云脚下深三尺問蓮花未出水時如何師云水深一丈進云出水後如何師云從地高三尺其時有化主問學人與麼去時將何稟受師云叉手奉賓德舉似莫沉吟僧云恁麼還當也無師云物逐人興僧云今日點茶當為何人師云去此無消息無心永莫回問如何是真如體師云敲磚打瓦僧云此意如何師云切忌踏著僧云有一人不會唐言梵語來時師還接也無師云舉意便知有何勞側耳聽問學人不識文墨拾得箇字來未審喚作什麼字師云久為雲水客休作問禪賓問如何是現前三昧師云三更不閉戶僧云還許學人商量也無師云切忌五更初問若能轉物即同如來三門佛殿請師轉師云長安道上無私曲縱遇知音到者稀問學人親到寶山空手回時如何師云家家門前火把子問靈丹一粒點鐵成金至理一言轉凡成聖如何是至理一言師云更舉一徧僧云與麼則退身三步