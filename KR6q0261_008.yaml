臨濟會下有僧出來禮拜臨濟便喝僧云老漢莫探頭好濟云汝道落在什麼處僧便喝又有僧問如何是佛法大意濟便喝僧禮拜濟乃召眾云你道適來這一喝好喝也無僧云草賊大敗濟云過在什麼處僧云再犯不容濟云要識臨濟賓主話問取堂中二禪客師云諸兄弟學般若菩薩直須諦當去始得雖然如是曉者還稀珍重師一日上堂汾陽昭和尚出問百丈卷蓆意旨如何答云龍袖拂開全體現進云未審師意如何答云象王行處絕狐蹤昭於是言下大悟遂提起坐具顧視大眾云萬古碧潭空界月再三撈漉始應知禮拜歸眾時葉縣省和尚作首座纔退便問昭兄你適來見箇什麼道理便與麼道云正是我放身捨命處省便休小參示眾云老僧擬欲歸鄉什麼人隨得去時有僧問未審和尚什麼時去師云待有伴即向汝道僧云無伴底事作麼生師云盡日不逢人明明不知處僧云忽遇一人又作麼生師云迷子不歸家失却來時路僧云請師指箇歸鄉路師云枯木藏龍不存依倚僧云和尚什麼時節却回師云一去不知音六國無消息僧云正當歸鄉底事又作麼生師云獨唱胡家曲無人和得齊僧云忽遇知音在時如何師云山上石人齊拍掌溪邊野老笑呵呵僧云歸鄉回來底事又作麼生師云八國奉朝衣四相無遷改僧云未審居何位次師云文殊不坐金臺殿自有逍遙竹拂枝問如何是梵音師云驢鳴狗吠問如何是截徑一路師云或在山間或在樹下問如何是和尚不欺人底眼師云看看冬到來僧云畢竟如何師云即便春風至問遠聞和尚無絲可掛及至到來為什麼有山可守師云道什麼僧便喝師亦喝僧禮拜師云放你三十棒久立眾慈伏惟珍重師出鏡清十二問答洎翠岩代語師於一語下代三轉問時至草庵無一物為什麼却有盈餘清云要道何難岩云適來道什麼師代云自不知又云洎成忘却又云共語不知音問盡乾坤不出一剎那今時人向什麼處辨明清云共語商量岩云向你道什麼處辨明師代云不問他別人又云明眼人笑你又云用辨即非問無神通菩薩為什麼蹤跡難尋清云波斯眼黑岩云莫鬼語師代云不是用心處又云被他捉著又云不勞舉步問辨得親踈底人為什麼却被親踈不肯清云不平按劒岩云當得也無師代云莫守閑又云大有人不解恁麼問又云不可辨親踈問明知生是不生之相為什麼却被生之所流清云明知無力岩云不關老兄事師代云自領過又云喚什麼作生死又云爭得不知有問人人具眼逢訪道人道即是不道即是清云頭上仙陀岩云莫道乞辨明師代云分明舉似他又云莫道乞答話又云若不是寶應洎合遭他毒手問體本無瑕翳為什麼坐施良藥清云却正道著岩云且放老僧過師代云知過人難得又云更教誰喫棒又云今日草賊大敗問達者同遊一路行為什麼不行清云已到平頭岩云老兄還達也未師云不爭先又云到了不知又云但請先行問盡令提綱為什麼不塞時人口清云自還得岩云老兄還知明州米價麼師代云還曾失麼又云須知老兄又云爭知今日問無形本寂寥為什麼有物先天地清云寶公曲尺誌公剪刀岩云領過得也未師代云欺他作什麼又云阿誰與麼道又云不是闍棃置問問十方薄伽梵為什麼一路涅槃門清云家無二主岩云怪得人麼師代云到者方知又云一尚不可得又云常防此問問同氣連枝為什麼却根莖有異清云邵案迸彩岩云阿誰道有異師代云紹得麼又云見有前後又云今朝二十五師出風穴四賓主語僧云如何是賓中賓穴云攢眉看白雲師別云去來長自在不與白雲齊問如何是賓中主穴云入市雙瞳瞽師別云高聲唱呌遶街行問如何是主中賓穴云回鑾兩耀新師別云定國安賀太平問如何是主中主穴云磨礱三尺劒待斬不平人師別云收番猛將寸草不留師出四種照用語問如何是先照後用師云南岳嶺頭雲太行山下賊問如何是先用後照師云太行山下賊南岳嶺頭雲問如何是照用同時師云收下南岳嶺頭雲捉得太行山下賊問如何是照用不同時師云昨日有雨今日晴師出四賓主語問如何是賓中賓師云青山綠水分問如何是賓中主師云棒下取分明問如何是主中賓師云退己讓人問如何是主中主師云斬盡不留身師出四料簡語問如何是奪人不奪境師云人前把出遠送千峯問如何是奪境不奪人師云打了不曾嗔冤家難解免問如何是人境兩俱奪師云萬人作一塚時人盡帶悲問如何是人境俱不奪師云問處分明答處親師出德山三轉語於一句中各下三轉問如何是函葢乾坤句師云大地雪漫漫又云普天匝地又云海底紅塵起如何是截斷眾流句師云不通凡聖又云洎合放過又云橫身三界外問如何是隨波逐浪句師云要道便道又云有問有答又云此去西天十萬八千師舉僧問禾山如何是道山云耕人田不種僧云如何是道中人山云禾熟不臨場因僧問師出語云耕人田不種意旨如何師云大勛不竪賞僧云禾熟不臨場意旨如何師云任從風雨爛師出盤龍和尚問行者接待不易行者云開心椀子盛將來無縫合兒合將去師云橫擔拄杖登霄漢使煞農夫煑粥人師出僧問如何是祖師西來意答云風吹日炙師又云多年塵土無人拂一身常在鎮天涯勘辯語師在風穴會中密常勤誦蓮經眾咸謂念法華也偶知客退即就請師一日風穴見師侍立次乃垂涕告之曰不幸臨際之道至吾將墜于地矣師云觀此一眾豈無人邪穴云雖敏者多見性者少師云如某者如何穴云吾雖望子之久猶恐耽著此經不能放下師云此亦可事願聞其要於是風穴上堂舉世尊以青蓮目顧視大眾迦葉正當與麼時且道說箇什麼若道不說而說又是埋沒先聖且道說箇什麼師乃拂袖而退穴擲下拄杖便歸方丈侍者隨後入室請益念法華為什麼不祇對和尚穴云念法華會也次日師與真園頭同上問訊次穴又問真曰作麼生是世尊不說說真曰鵓鳩樹頭鳴穴云你作許多癡福作什麼何不體究言句又問師曰汝作麼生師曰動容揚古路不墮悄然機穴云你何不看法華下語師受風穴印可之後泯迹韜光人莫知其所以因楚和尚初至汝州宣化安下風穴令師傳語纔相見展坐具次便問展即是不展即是楚云自家看取師便喝楚云我曾親近知識來未甞輙敢恁麼造次師云草賊大敗楚云來日若見風穴和尚待一一舉似師云一任一任不得忘却師乃先回舉似風穴穴云今日又被你收下一員草賊師云好手不張名楚次日纔到相見便舉前話穴云非但昨日今日連贜捉敗於是師乃名振四方遠近學者承風而湊初住汝州首山為第一世也石門遣使馳開堂書至師乃集眾於法堂上使纔近前人事師約住云是洞上宗乘是雪嶺家風使云書中已載師云一不成二不是使無語師云且坐喫茶一日師問僧近離甚處僧云襄州師云路上曾逢達磨也無僧近前不審師云這箇是驢前馬後底僧云和尚又如何師云非公境界且坐喫茶僧纔坐師又問在什麼處過夏僧云石門師云水牯牛安樂麼僧云及時水草師云為什麼傷人苗稼僧云對和尚不敢造次師云放過即不可便打師一日問僧是凡是聖僧云非凡非聖師云太不定生僧云離此二途請師速道師云首山今日燒香供養你去也僧云某甲特來禮拜師云滴水難消一日問僧近離什麼處僧云廣慧師云穿雲不渡水渡水不穿雲離此二途速道速道僧云某甲昨夜宿長橋師云你恁麼合喫首山棒僧云某甲未曾參堂師云兩重公案僧云恰是師云那那又一日師見僧參次乃問近離甚處僧云襄州師云夏在甚處僧云洞山師云還我洞山鼻孔來僧云不會師云却是老僧罪過又一日問僧上人近離甚處僧云南方師云遠來不易且坐喫茶又一日問僧近離甚處僧云襄州師云有事相借問得麼僧云便請師云且喜沒交涉又云子過新羅又問僧近離甚處僧云西京師云路上還逢達磨也無僧云適來已參見和尚了也師云為什麼築著鼻孔僧云已知痛痒師云打破大唐國裏覔箇知痛痒底人了不可得且坐喫茶有僧來參師乃問近離甚處僧云龍門師拽傍僧摑一摑喝出去一日有僧侍次師乃喚僧名僧應諾師云且去別時來為你說僧云而今尚自不說別時決定不說師云我也罪過你也罪過僧一日入室師云且去別時來僧應諾師便打師每見僧來便云恁麼來者是誰僧云問者是誰師云是老僧僧便喝師云向道是老僧又惡發作什麼僧又喝師云恰遇棒不在僧云草賊大敗師云得便宜是落便宜有僧入室師便喝僧亦喝師又喝僧禮拜師便打云伏惟尚嚮一日因僧入室師喚僧名僧應諾師云錯僧云某甲有什麼敗闕處師云錯有新到相見師問從什麼處來僧云芭蕉來師云芭蕉有何言教僧云曾見有僧問牛頭未見四祖時如何蕉云知僧云見後如何蕉云不知後有僧舉問襄陽石門徹禪師只如二尊宿意旨如何徹云先行不到末後為初僧一日入室師云恁麼來者是誰僧云某甲師云莫道是別人僧禮拜師云適來見箇什麼道理即禮拜僧云今日大似因齋慶讚師云我適來一期向你恁麼道速須吐却僧云也知和尚曲為某甲師云後有人問你向他道什麼僧拂袖便出去師召僧名僧回首師便喝僧云這老賊師乃以頌示之曰四門通一要一要具三玄在賓全正令立主要須圜又一夜師行道次見暗裏有僧師乃問是誰曾不對師云我也識得你僧大笑師云你不得道是別人復作一頌示之輕輕踏步恐人知語笑分明更莫疑智者只此猛提取莫待天明失却鷄師次住寶安山廣教禪院亦為第一世後徇眾請入城下寶應禪院即南院第三代三處法席海眾常臻淳化三年十二月初四日午時上堂示眾曰今年六十七老病隨緣且遣日今年記却來年事來年記著今朝日果至四年十二月日與時無爽前記上堂辭眾仍作偈曰白銀世界金色身情與無情共一真明暗盡時俱不照日輪午後是全身言訖安坐日將昳而逝壽年六十八茶毗收舍利偈頌示眾諸子謾波波過却幾恒河觀音指彌勒文殊不奈何靈雲見桃花分明歷世三十春因悟桃花色轉新人人盡得靈雲意不識靈雲是何人玄沙云諦當甚諦當玄沙道處少人知密密相逢更莫疑今古相傳親的旨少年多是白頭兒四賓主頌悟了却從迷裏悟迷悟從來無差互始知本末至于今今古相承無別路無別路莫問人說今古問來事元是主從他人問賓主識得賓全是主主中賓賓中主更互用無差互賓中賓主中主兩家用莫讓主把定乾坤大作主不容擬議斬全身始得名為主中主偶作三頌我有一機不假修持若人問著便喚沙彌我有一著不自棲泊若人更問劈口便著我有一宗勿示西東若人擬議別喚王公送化主四頌報你參禪賓人中有見親若求端的旨臈月望陽春臨行少語足人憐莫辱家風汙舊賢保護盡從今日去靜坐寒窻月那邊幾多真子向西東物外縱橫莫用功隨處化緣皆是道臨行一句盡流通廓然無事少人聞任意縱橫勿計程步步登高看前路莫教失脚墮深坑示眾三首背陰山子向陽多南來北往意如何若人問我西來意東海東面有新羅咄哉巧女兒攛梭不解織貪看闘鷄兒水牛也不識咄哉拙郎君巧妙無人識打破鳳林關穿靴水上立
