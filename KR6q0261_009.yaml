body:
  text: 石門山慈照禪師鳳巖集南嶽下十世嗣首山師開堂拈香云西天二十八祖唐土六祖過去聖人盡得傳衣付法至唐代六祖之後得道者如稻麻竹葦不傳其衣只傳其法皆以香為信今日一瓣香為什麼人通信某甲雖不言大衆已委悉爇此一炷香也僧問師唱誰家曲宗風嗣阿誰師云山連嵩嶺地近洛川問和尚開堂於此日先將何法報君恩師云撑天拄地云君恩如此祖意如何師云分明領話問如何是佛師云卭州多出九節杖云謝師指示師云莫作答佛話會却問如何是祖師西來意師云九里江上望舶船云意旨如何師云市舶亭前人不識問寶劒未出匣時如何師云在匣裏云出匣後如何師云放汝一線道僧禮拜師便打上堂云上上之機人法俱遣中下之機但除其問猶有法在下下之機據問而行若是出格道人全體作用諸上座盡是出格道人老僧爭敢作用問如何是一著子師云明明似日連天照暗暗昏昏人自迷云如何得不迷師云千里萬里早參示衆云且道昨日與今朝是同是別古人道昨日今朝事恰同又道昨日今朝事不同同與不同即且置且道即今一句作麼生波隨月照影逐日移師入州看官路逢延慶長老問中路相逢一句作麼生道師云某甲禮拜和尚有分明日到院茶話次昨日聞學士說新石門和尚和尚久在石門為什麼說新去師云腦後合掌問來時無物去時空二路都迷如何得不迷去師云稱頭半斤稱尾八兩上堂云十五日已前諸佛生十五日已後諸佛滅十五日已前諸佛生你不得離我這裏若離我這裏我有鈎子鈎你十五日已後諸佛滅你不得住我這裏若住我這裏我有錐子錐你且道正當十五日用鈎即是用錐即是遂有頌云正當十五日鈎錐一時息更擬問如何回頭日又出問如何是無縫塔師云直下看云如何是塔中人師云退後退後問如何是古佛心師云踏著稱槌硬似鐵云意旨如何師云明日向你道問青山緑水即不問急切一句作麼生道師云垂手過膝兩耳垂肩汝州先師忌問先師還來也無師云三巡茶罷一炷香云齊後向什麼處去師云風搖樹響人不顧葉落歸根始知音上堂云鳳凰巖下鐘鼓喧轟石門家風朝朝舉唱問答賓主甚是分明棒喝臨機誰人同道若是同道者對衆證據良久云霜天冷徹骨雪路少人行問如何是石門境師云一任衆人看云如何是境中人師云明日來喫棒問嵩少地近汝海波深石門玄機請師指示師云幾時到汝海來僧無語師便打問如何是和尚家風師云一句每當機逢人直是道問如何是賓中賓師云禮拜甚分明云如何是賓中主師云地無回顧云如何是主中賓師云往復問前程云如何是主中主師云萬里絶同侶問如何是奪人不奪境師云山河大地云如何是奪境不奪人師云番人失氈帳云如何是人境俱奪師云有何佛祖云如何是人境俱不奪師云問答甚分明問如何是先照後用師云突兀峯頭點巨火長安城裏不通風云如何是照用同時師云突兀峯頭無巨火長安城裏絶人行云如何是照用不同時師云昨日十五今日十六大傑張茂崇問摩騰入漢已涉繁詞達磨單傳請師指示師云冬不寒﨟後看問五目不覩其容二聽不聞其響落聲色即是不落聲色即是師云問從何來問瞻之在前忽然在後復是何物師云築著鼻孔問若能轉物即同如來萬象是物如何轉得師云喫了飯無些子意智問拈槌竪拂皆是止啼之說揚眉瞬目未為作者之機如何是現前受用師云早衙放過晚後出來問寸絲不挂法網無邊為什麼却分迷悟師云兩桶一擔問心隨境轉境逐心生心境兩忘甚處即是師云待你悟始得問有情有用無情無用如何是無情應用師云獨扇門子晝夜開問法尚應捨何況非法如何是非法師云喫粥喫飯問愛河浮更沒苦海出還沉如何出得師云錯早參示衆云月未沒日已出萬象凝然什麼處不分明既然分明分明一句作麼生道良久云日月照臨無影樹不勞把住繞街行示衆問答須教起倒全龍頭蛇尾自欺瞞如王秉劒由王意似鏡當臺要絶觀開口早經千萬里低頭思慮萬重關指人若也無正眼何啻前程作野干上堂云朝朝鼓響夜夜鐘鳴聚集衆流復有何事過去諸聖成就此門諸上座各各不缺少某甲已是不識好惡諸上座更要喫辛受苦上堂云無事不要生事歸堂上堂云鐘鼓才罷賓主已分大衆齊來照用俱了若恁麼會得繼紹古人若會不得實為罔措莫有會者麼出來對衆證據上堂云切忌蹉過歸堂喫茶上堂云第一句道得石裏迸出第二句道得挨拶將來第三句道得自救不了歸堂上堂云但得本莫愁末如何是諸上座本莫是上來下去禮佛禮塔入室摳衣歡娛笑樂麼若認得這箇是四大五蘊莫是趣寂息念不出不入不聚不散麼會得認得箇精魂如何是上座本良久云歸堂上堂云春景溫和萬物蘇舒山青水緑真堪養道遊方禪子甚是及時祖佛家風且喜沒交涉僧侍立次師云已是撒沙著諸人眼裏也如今更不敢不識好惡歸堂問寒時又寒熱時又熱寒底是熱底是師云杖頭傀儡人長弄問逐日開單展鉢以何報答施主之恩師云被這一問和我愁殺云恁麼則謝供養也師云得什麼人氣力僧禮拜師云明日更喫一頓上堂云春景溫和春雨普潤萬物生芽什麼處不沾恩且道承恩力一句作麼生道良久云春雨一滴滑如油問如何是學人自己法身師云每日搬柴不易云此是大衆底如何是學人自己底師云三生六十劫問大悲千手眼為什麼在此師云見箇什麼云恁麼則千百億化身師云且領前話乃云上來下去為什麼事若有所得埋沒諸兄弟若無所得圖箇什麼得與不得且置如何是見前妙用底事良久云雲覆千山不露頂雨滴街前漸漸深歸堂問請師指示箇修行路師云殺人放火云彼此修行為什麼却如此師云果然不修行問親切處請師的旨師云莫忘却云莫忘却時如何師云一年三百六十日云恁麼則不忘却也師云你見箇什麼道理云適來謝茶師云未在云請師別道師云兩社一寒食早參示衆月未沒日又出日月往來無間隔奉勸禪流莫追尋追尋特地生疑惑上堂云鳳凰山下鐘鼓喧轟石門家風朝朝舉唱大衆上來賓主已分開口動舌照用俱了若恁麼薦得甚處有佛祖若未薦得憑何過日薦得薦不得即且致作麼生是無佛祖底句良久敲禪牀下座小參早朝擊鼓法堂上聚會晚後鐘聲方丈裏相見法堂上聚會即不問作麼生是方丈裏相見底句自代云不通風問還有不報四恩三有者麼師云有云如何是不報四恩三有者師云撒手臥長街光音非旨趣問牛頭未見四祖時為什麼百鳥㗸花獻師云果熟馨香鳩鳥云見後為什麼不㗸花師云萬象頓息鬼神愁云見與不見是同是別師云山河不礙青霄路妙用縱橫處處通問親到寶山求寶時如何師云求得即不中云求得後如何師云不中不中乃云擬心即差動念即乖不擬不動正在死水裏作活計作麼生是衲僧轉動一句良久云朝聞鼓動暮聽鐘聲上堂云三春景裏日暖風和水畔經行林間宴坐覩茲時景賓主已分開口動舌照用俱了若能如是解去會得賓中主作麼生是主中主良久云一條濟水透過新羅一日問直歲清凉堰從你堰若遇洪水滔天時堰得麼云在裏頭師云與誰同伴歲無語却請和尚代云透過新羅問和尚若遇洪水滔天時堰得麼師云上拄天下拄地云若遇劫火洞然時作麼生師云橫出竪沒上堂云四山霧起大地黯黑日月收光正當與麼時如何辨主良久拍禪牀下座師浴出僧問三身中𨚗身澡洗師云困送亡僧歸喫茶次問亡僧遷化向什麼處去師云風搖樹響葉落歸根學人良久師云會麼云不會師乃澆茶三滴問如何得人身去師云我常欲作驢身上堂云上來下去參請不無作麼生是依時及節底句良久云朝聞鼓響夜聽鐘聲歸堂問門外三車學人欲上牛車時如何師云未是極則處云如何是極則處師云犬吠虗聲切癡人望太陽問三叉路頭未審教學人往何路師云莫錯上堂云鐘聲才罷鼓聲喧鐘鼓相交會人天臨機妙用無別法開口動舌顯三玄臨機照用須子細互換賓主疾如烟進前更欲求佛祖擬議早是隔西天上堂云五白猫兒爪距獰養來堂上絶蟲行分明上樹安身法切忌遺言許外甥作麼生是許外甥底句莫錯舉上堂舉普化語僧便問大悲院裏有齊意旨如何師云日暖隈陽坐天寒不舉頭上堂云聞鐘聲即尋鐘聲來無鐘聲向什麼處來若不來叢林何在既來是何面目直饒不來不去正在死水裏作活計作麼生是衲僧出氣一句良久云珍重問十二時中如何用心師云喫粥喫飯云與麼則打軟去也師云打軟去也問昨夜轉一位今朝轉一位兩頭俱轉時如何師云未是衲僧極則云如何是衲僧極則師云春末臨朱夏云畢竟了如何師云九九八十一上堂云各各英雄丈夫兒堂堂物我更何疑現前歷歷明如日展縮當人示疾時超然不得長空路獨脫禪光得自知多聞方便談今古濟物須彰閃電機良久云去去西天路迢迢十萬餘上堂云天地與我同根萬物與我一體諸上座維𨚗打鐘還覺心痛也無若不覺痛與古人相違若覺痛為什麼含笑上來直須子細僧入室問正當與麼時還有師也無師云燈明連夜照甚處不分明云畢竟事如何師云來日是寒食問古人急水灘頭毛毬子意旨如何師云雲開月朗問急水灘頭連底石意旨如何師云屋破見青天云屋破見青天意旨如何師云通上徹下小參示衆云學般若菩薩須具般若眼不具般若眼即被般若謾却你去作麼生是上座般若眼出來對衆道看良久云沉却也珍重問如何是佛法大意師云出你口入你耳云莫祇這便是也無師云分明聞分明聽問為什麼朝朝風起雨點全無師云只是龍王不動頭云畢竟事如何師云待雨下了向你道云雨下了和尚為什麼不說師云老僧罪過問如何是人境兩俱奪師展兩手云不會師彈指三下問十二時中如何辨主師云著衣喫飯量家第云辨得後如何師云作麼生是主僧無語上堂云擬心即差動念即乖不擬不動正在死水裏作活計作麼生是衲僧轉身處只如古人與麼道還有為人處也無若言為人依言縛殺你若言不為人意在什麼處所以道涅槃心易曉差別智難明又云知見立知即無明本知見無見斯即涅槃若向這裏明得去未具衲僧眼直須子細上堂云三春景謝朱夏將臨是禪子罷游之際幽窗掛錫之辰林下相逢合談何事良久云擬指千差路回光百萬程問牛頭未見四祖時如何師云雲散見青天云見後如何師云澄潭月現問如何是道師云車碾馬踏云如何是道中人師云竪坐橫眠上堂云香烟才起是處皆知大衆雲臻從上宗乘只可如是若能如是解掣鼓奪旗亙換主賓照用同時棒喝齊彰直饒你如是解只是箇賓中主作麼生是主中主便有僧問香烟才起是處皆知未審主山後如何師云向你道還信麼云特伸請益師便喝云和尚為什麼諱人道著師云瞎僧禮拜乃云一句語中須具三玄一玄門中須具三要從上諸聖總具三玄三要他若不具三玄三要總屬盲用既能如此留心直須子細良久云石門後輩諸事寡拙久立先參歸堂憩歇問佛未出世時如何師云平云出世後如何師云平云未審出世與未出世是一是二師云妙用當機顯回光只在人問大事未辦時如何師云切云辦後如何師云切問如何是玄談師云掉向墻南問如何是祖師西來意師云叉手當胸云意旨如何師云打躬近前問一處火發任從你救八方齊發如何師云快云還求出也無師云若求出即燒殺你僧禮拜師云直饒你不求出也燒殺你大雨上堂云朝陽雲掩夜月收光四山烟霧起大地絶纖埃正當與麼時什麼人作主雖然如是爭奈千江競注萬派流源被大海一時包了也莫道總包容了爭奈奔波濟水透過新羅上堂云金烏西墜玉兔東升晝夜循環有何了日何不日南午處正位上看半夜子時長連牀上偃息正當與麼時可謂千聖情盡影像全無雖然如是未是極則處直須動轉始得直饒動轉只是肯得洛浦灌溪未肯得他三聖興化開口動舌早成病棒喝臨機構也難眨眼直須行正令上堂云晚看千家戶不扄時聽秋杵一聲聲途中多少未歸客却到家中事怎生諸上座休向途中直須歸家若得歸家直得親於父母不得教生其恩愛直須殺却父母既殺却父母便須出家既然出家便能親於佛祖雖然如是須去却佛祖始得既殺却父母去却佛祖方可有纖粟衲僧見解猶未得衲僧全體作用良久云作麼生是衲僧全體作用殺父殺母去佛去祖未是衲僧極則處進前更擬問如何北邙山下有甚數上堂云雲山聚會意為平生挈杖諸方擬逃生死何得空過遣日為什麼不進步商量若欲進步商量特地乖違便言只恁麼休去更辜負平生總不如是又向什麼處留心良久云歸堂上堂云龍騰滄海魚鱉潛蹤虎嘯高岩野狐屏跡象王蹴踏寶岸皆崩師子嚬呻百獸隱匿鳳凰展翅衆鳥迷巢祖師家風中下莫湊目連鶖子運智運通金色頭陀瞬眸釋主聲聞莫測十地寧知空生才唱天早雨花豈況繁詞率爾亂說通一線道直須滿口道將來道道直饒道得也是順邈將來上堂云參玄上士遊方高人直須具衲僧眼目良久云開口直教千聖情盡萬緣無繫父母俱亡賓主不立若如是解者猶是衲僧少許見解未是衲僧全體受用作麼生是全體受用良久云歸堂喫茶上堂云諸上座各各氣宇如王須具衲僧眼目大地山河不礙眼光莫受人瞞且道于闐國王作何面目時有僧問承和尚有言山河大地不礙眼光未審于闐國王作何面目師云不出戶云未審與什麼人同道師云至切是家親上堂云朝朝擊鼓夜夜鐘聲聚集禪流復有何事若言無事屈延諸德若言有事埋沒從上宗乘開口動舌總沒交涉雖然如是初機後學須藉言語顯道作麼生是顯道底良久云林中百鳥鳴柴門間不扄上堂問承古有言十五日已前用鈎十五日已後用錐即今十五日和尚用什麼師云這一條拄杖是清化主捨云和尚莫盲枷瞎棒師云罪不重科乃云虗空有盡此道無窮如拳作手如手作拳皆是自己展縮並不缺少不由他人各各具足不肯承當勸請諸上座承當埋沒諸上座直下承當去承當箇什麼歸堂喫茶董侍郎問文殊是七佛之師未審文殊以何為師師云獨鎮五峰頭查學士與師坐次弄鎗客參士便問弄鎗如何下手師云逢場作戲問無情說法意旨如何師云朝朝樹響夜夜風鳴云如何委悉師云晝有日照夜有月明問德山棒臨濟喝如何是一喝下事師云我不作這活計云意旨如何師云非公境界問金鱗未出網時如何師云待汝出網來向汝道云即今出也師意如何師云西海裏事作麼生僧便喝師云瞎僧禮拜問若能轉物即同如來未審三門佛殿如何轉師云我向汝道汝還信麼云和尚誠言安敢不信師云這漆桶僧禮拜問如何是衲衣下事師云露地不通風云與麼則一百五日看也師云放你三十棒僧禮拜問不施寸刃便登九五時如何師云七縱八橫云與麼則簾卷扇開去也師云舌拄上齶僧禮拜問黑豆未生芽時如何師云正與麼云生芽後如何師云鬼門關外今霄路萬里崖州獨自行問如何是吹毛劒師云鋹云用後如何師云伏惟尚響僧侍立次師問什麼處坐云後架裏坐師云你向什麼處舉話云與主人公舉話師云主人公姓什麼云不得姓師云名什麼云不得名師云與麼則不識主人公也僧便喝師不對問如何是互換之機師云東邊立了西邊立云還相見也無師云相見事作麼生僧便喝師云瞎僧禮拜問師唱誰家曲宗風嗣阿誰師云汝水河邊曾對勝失却橈棹至于今云汝原一曲師親唱向上宗乘事若何師云當處不留人劃時送千里師勘僧云孤輪獨照深山裏近離何方到此來云近離白馬師云更不再勘僧無語師云且坐喫茶師問僧韶陽境土君知好六祖家風試道看僧無語師云却是石門罪過且坐喫茶舉鹽官和尚喚侍者將犀牛扇子來者云扇子破也官云扇子既破還我犀牛兒來者無語代云欄下舉僧問龍牙十二時中如何著力牙云如無手人行拳始得師云道即殺道只得一半云和尚作麼生師云如無舌人欲唱歌始得舉僧問石門徹和尚實際理地如何進步徹云鳥道無前僧進語云幽谷白雲藏白擬心棲處隔山迷師別云栖心不住栖心地物外縱橫任法間舉徹和尚離谷隱有僧問師住襄陽去盡襄陽男女各置一問問問各別和尚如何支遣徹云一音剖出塵沙句豁達虗空應萬機師別云頭頭上活物物上具師問僧昔日叢林親際會再登鳳嶺事若何云奉別和尚經今一年師云本分行腳僧僧無語師云坐喫茶次住谷隱山太平寺語升座拈香云此一炷香供養十方諸佛人天大衆先願國安民泰教法興隆此一炷香十五年前已呈醜拙了也如今還有委悉者麼對衆商量時有僧問不施寸刃便登九五時如何師云罕逢此問云與麼則人天有賴大衆沾恩師云是何言歟乃云問話且止欲得親切莫將問來問你擬進前早沒交涉了也豈況忉忉有何所益若論佛法不在問處雖然如是早是多途況久立尊官珍重上堂云襄陽蕩蕩廣闊而無際無涯漢水滔滔深遠而有終有始峴山一帶橫貫乾坤楚岫千峰竪該日月鳳林關下直透荊南來往遊人且無障礙諸上座盡是透關底人作麼生是透關底句試道看擬議千差路回光萬里程問祖令未行時如何師云獨臥沙場云未審其中事作麼生師云寒灰不再焰問終日忙忙𨚗事無妨如何是𨚗事師云覔頭不見云為什麼如此師云三日後看僧禮拜師噓問如何是沙門行師云三三兩兩各不相知云畢竟如何師云截舌有分問一陽才啓天地咸知依時及節事如何師云午夜燈光連宵照云照後如何師云茶烟香篆一時清問逐境不入流時如何師云早入了也云入流不逐境時如何師云未是極則處云如何是極則處師云七棒對十三問如何是奪人不奪境師云峴山亭邊好用功云如何是奪境不奪人師云雪消流水湧云如何是人境俱奪師云霜結滿亭寒云如何是人境俱不奪師云放你一線道問日往月來遷不覺年衰老還有不老者麼師云有云作麼生是不老者師云虬龍筋力高聲呌晚後精靈轉更多問如何是學人深深處師云烏龜水底深藏六云未審其中事若何師云路上行人莫與知問如何是印空底句師云舌拄上齶云如何是印水底句師云說話對聾人云如何是印泥底句師云頭上喫棒口裏喃喃問一句當機請師說法師云莫妄想云不妄想後如何師云仙人禮枯骨餓鬼打死尸問浩浩之中如何辨主師云襄江競渡船云未曉之人如何領會師云且領前話問學人擬歸鄉請師指路頭師云借人扶上馬云莫便是和尚為人處也無師云葛嶺𨚗邊看問師子是獸中之王為什麼却被六塵吞師云須知六塵好手僧禮拜師云得便宜是落便宜問不斷廉纖句如何絶眹迹師云絶迹即不好云與麼去如何師云瞎僧禮拜問只尺之間為什麼不覩師顏師云折角泥牛無欄圈云與麼則依而行之師云遍地間田任意耕問承教有言當觀法王法法王法如是如何是法王法師云如是云畢竟如何師云我知你與麼道問王子未登九五時如何師云六宮深處坐云登朝後如何師云當殿不稱尊問世尊說法天雨四花和尚說法有何祥瑞師云莫碗鳴問有問有答俱落魔境無問無答如何辨道師云舌拄上齶云與麼則學人罪過師云放你三十棒問如何是先照後用師云外頭月明屋裏黑云如何是先用後照師云屋裏月明外頭黑云如何是照用同時師云今日好寒云如何是照用不同時師云喫棒了呈欵問如何是函蓋乾坤句師云好雪寒云如何是截斷衆流句師云好怕你云如何是隨波逐浪句師云今日立春問馬大師一喝百丈直得三日耳聾如何師云萌芽未出土枯葉已遭風僧擬議師便喝僧云喝即任喝某甲不耳聾師云罪不重科問海宴河清為什麼龍王不現師云待有即現云即今為什麼不現師云疏田不貯水龍王不奈何問若人有福曾供養佛未審佛曾供養什麼人來師云明月照臨山谷裏背岩陰樹不招風云恁麼則早晨燒香晚後禮拜師云苦痛蒼天伏惟尚嚮問承古有言只這如今誰動口意旨如何師云莫認驢鞍橇作阿爺下頷問伯牙遇子期時如何師云夜靜更深彈一曲云遇後如何師云琴破絲斷一時休問承教有言如我按指海印發光汝暫舉心塵勞先起如何是海印發光師云青霄無異路問說通行不通時如何師云莫以己妨人云行通說通時如何師云未信你在問不施寸刃便登九五時如何師云南面事作麼生云才施小刃便獲大功也師云大好不施寸刃問如何是和尚不涉衆詞底句師云我向你道還信麼云與麼則鐵卵生兒樹上飛師云一任揑怪上堂云二年前葛藤今日再舉知有者已暢平生不知有者對面千里諸上座盡是知有者二年前事作麼生道良久云顏回不知何處去却教夫子淚漣漣上堂云道安岩下朝朝鐘鼓聲喧傘蓋山前日日烟霞覆地猿啼嶺上魚躍淵中山高則九夏花開谷深則三冬積雪知有者暢怏於平生不知有者空愛好山好水諸上座盡是知有者不喚作山不喚作水且道喚作什麼開口即邈擬議即差上堂次遇狂風起乃曰狂風忽起拔樹鳴條祖令正行誰人當抵善戰者不顧其首善鬬者必獲其功莫有善戰妙鬬者麼出來山僧為你證明良久云陳雲橫海上拔劒攪乾坤上堂云寶花王座獨有慈尊旃檀林中別無異黨狐非師子類燈非日月明知有者已暢平生未知有者直須子細上堂舉仰山三生話次僧問古人且致和尚即今第幾生中師云快活快活云與麼則隨流認得無礙去也師云縛繫不自在上堂云若據對答如撒砂相似若約提綱宗乘舉唱佛法無一人半人雖然如是被箇衲子出來請師舉唱佛法向伊道什麼即得若打他即龍頭蛇尾且道向伊道什麼良久云山僧與上座兩家不著便偈頌歲旦示衆一句為君宣今朝是大年桃符已入土遍地扯金錢俗情多失位山僧獨欣然直饒不恁麼冢上別鉏田冬日示衆一句為君說諸法及時節冬月是冬寒夏熱是夏熱甚處不周旋何勞苦施設施設不施設言詞盡須決更擬問如何舶底用鑌鐵僧請益溈山三生話師以頌答昨夜三更得一夢清凉河裏泥牛鬬天明問取郭大翁識得南莊李胡子拄杖我有一條拄杖亘日撗按膝上大小節目分明頭尾無非一樣卓下大地豁開竪起擎擡萬象閙市若遇知音回頭劈脊便棒照用照時把斷乾坤路驗破賢愚喪膽魂饒君解佩蘇秦印也須歸欵候天恩用便生擒到命終却令蘇息盡殘軀歸欵已彰天下報放汝殘年解也無照用同時棒下玄不容擬議騁愚賢輪劒直衝龍虎陳馬喪人亡血滿田照用不同時人人會者稀秋空黃葉墜春盡落花飛總頌一喝分賓主照用一時行會得箇中意日午打三更三玄報你諸方道三玄句不分欲明親的旨﨟月太陽春三句第一句點刻分明莫莽鹵更擬進前問如何西天移來安此土第二句妙用臨機無差互開口動舌勿交涉棒下分明須薦取第三句問答分明有言語諸方盡有好商量三歲孩兒皆怕苦石門山慈照禪師鳳巖集序夫能仁出現若秋月落於寒潭祖意西來似春雷開於蟄戶鑿生靈之瞶耳指演若之迷頭不凡超凡唯能轉物得道者世無窮數紹法者代有奇人師汝水投針首山立雪親傳祖印匣祕禪刀查太守致三請之書遠禪師付一乘之座揮倚天之寶劒外道魂亡振踞地之金毛野干腦裂縱即立明方便互換主賓奪即坐斷乾坤誰論佛祖喝明四種棒顯三玄照出千差用非一句以此參徒遐集學者雲臻師既露於詞鋒禪子常親於語要編成二卷集號鳳巖光溥幸愧得聞實慚序引
