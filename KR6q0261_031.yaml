body:
  text: 舒州龍門佛眼和尚小參語録住南康雲居嗣法善悟編小參云好一轉語還有人答得麼良久云問答俱備所以古人道夫説法者當如法説且如法又作麼生説諸人既無風起浪者裏不免將無作有所以道其説法者無説無示其聽法者無聽無聞諸人既無聽而聽我者裏無説而説若得恁麼目前無一法可得何故且聽外無一絲毫説底説外無一絲毫聽底便能透過雙關俱無異相不必説與不説聽與不聽自然大地山河色空明暗更非別法可謂透出塵勞頓居實地雖現在三界中熾然出三界現在聲色裏熾然出聲色且如今與諸人説聽同時作麼生説箇不説不聽底道理須知端的明悟始得不見古人道非色聲香味觸法者箇去處也大殺不易參學之士若非到此田地管取目前有法外既有法內必有心內外緣生汩沒三界諸聖由茲而出現達磨特地而西來還知諸聖用心處麼祇是諸人心是更無別心亦無別法所以道十方薄伽梵一路涅槃門誠實無差方知道無迷無悟非聖非凡若實得恁麼便好韜光晦迹履踐諸聖玄塗其或未然直須管帶始得不見趙州和尚云十二時中許你一時外學僧便問許一時外學未審學什麼州云學佛學法祇如佛法尚為外學其餘十二時中作箇什麼始得大難其人所以如今與諸人相會喚作非時言論既是非時言論如何得相親去達道之人若能鎔瓶盤叉釧作一金攪酥酪醍醐為一味説什麼時與不時盡皆中的奉勸諸人快好究取二六時中去離塵緣莫起異念豈不聞昔日有人在高樓上見二比丘從樓前過有二鬼使掃併道路復有二鬼散花隨後及乎二比丘回次二鬼復在前叱喝噀唾二鬼隨後掃除腳迹其人遂下樓問二比丘所以其二人方悔感悟乃云我等去時共談佛理及至回時却言雜語諸禪德此雖粗境界子細推來乃是學道之人大事何故祇為情念瞥起外境現前念若不生無境可得所以先聖道以無念為宗而今但無凡聖異念種種心量亦無煩惱可斷亦無菩提可求於生無生於死無死不見昔日洞山和尚與密師伯遊山次忽見白兔從草中突出密云大似白衣拜相山云老老大大作者箇語話密云兄又作麼生山云積代簪纓暫時落魄者箇公案如何消遣得去且道是何道理諸人若會得白衣拜相便乃獨步丹霄永出常流若會得積代簪纓便解奪飢人之食祛耕夫之牛還委悉麼直饒一一委悉分明諸人分上總使不著如何是諸人分上事試斷看良久云討甚兔子珍重師還東山省覲衆請小參云暫下蓮峯輕屈指光陰倐爾又三年雖然不隔絲毫許爭似躬親到座前某伏自數日前陪從太平禪師象馭再登蓮嶠歸侍老師大和尚瞻禮慈容之間須知有相見底事敢問大衆作麼生是相見底事不可是你見我我見你是相見若恁麼全無佛法得力處何故世間諸趣彼此見存常在生死之中未有脫離之地所以雪峯和尚向人道望州亭與你相見了也烏石嶺與你相見了也僧堂前與你相見了也若據如斯指示豈待音容相接言氣相交始為相見諸高德夫為參學之士須實有去處始得還知麼如今敢道千里同風相見却易會對面相見却難知何故難知夾山老子道目前無闍梨座上無老僧諸來大衆盡在于此如何見得目前無闍梨堂上老師大和尚在座與諸大衆證明作麼生見座上無老僧不可等間過却將為間事晝夜被見聞風所飄鼓根塵陰界諸入纏縛不得自由生死事大須得箇悟由入頭處始得雖然如是格外道人實遭怪笑何故須知有向上一著且待異日他時別為諸人點破因記得昔日南泉趙州二尊宿皆是道超物外名播寰中時有一僧往山中見一禪伯在盤陀石上卓庵而坐僧遂問曰南泉出世浩浩地何不往彼問訊空坐何為庵主曰莫道南泉出世佛出世我亦不去僧持此語見南泉南泉大驚遂令趙州往驗看州到庵主處從東過西庵主不顧州又從西過東庵主亦不顧州遂當門立曰庵主你敗也庵主亦不顧遂拽下簾子而行庵主亦不顧大衆者一則因緣諸人作麼生委悉莫是趙州南泉不到庵主田地返被庵主勘破落他陷虎之機也無莫是庵主雖然並無受用臨機不解互換平地上死人也無諸仁者素非此理大凡行腳人須是道眼分明始得若道眼不明祇被南泉趙州庵主三人換却眼睛了也實無少許相應處若也道眼分明南泉趙州庵主便是上座更無異見也還相肯諾也無不見道曾經大海休誇水除却須彌總是塵久立解夏夜小參云一二三無言童子口喃喃三二一上下四維無等匹衲僧活計絶絲毫萬古徽猷是今日大衆作麼生是今日事現定東西僧俗燈燭熒煌作麼生見得箇絶絲毫底事若於此見得歷劫孤明未曾昏昧方信道達磨不來唐土二祖不往西天如是之事蓋是諸人背覺合塵流浪日久是以智光不得顯現所以遊方問道遍參知識若於一句下見得分明方知無量劫來事祇在今日然今日之事也大難委悉何故蓋為諸人現分別者心本元真實誤認分別致背真源但無許多分別之心自然時常顯露祇如此事還假方便也無山僧有箇方便普施大衆乃豎起拂子云還見麼若道見拂子翳却兩眼了也若道不見拂子生盲却兩眼了也眼則且置且道者拂子是有是無拂子若是有便心外有法拂子若是無壞却世諦學道之士到此如何理論如斯指注太甚壓良為賤若是真正道人也無如許多事故我釋迦如來在日建立箇方便門庭亦無如許多事每至結足安居不相往來各各求證道果於九十日中或有所得或無所得或有疑慮或無疑慮或有罪或無罪至休夏自恣之日方詣佛所各呈己見求佛印可故謂之自恣自大覺掩光已來人心閙亂致有朝參暮請種種見知所以不能得契本源也憶昔佛在竹園精舍與大比丘結足安居至自恣日時優波離尊者觀諸大衆如海清淨無有缺犯唯有文殊師利菩薩不樂所止之處好遊聚落違犯禁戒時優波離具以白佛欲擯出文殊世尊謂曰若擯得但擯時優波離遂集衆鳴犍椎左右上下皆是文殊遍虗空界一切之處悉是文殊世尊謂優波離曰汝欲擯那箇文殊時優波離放下犍椎禮拜懺悔云我小德小智不識大士境界大衆當時可惜放過甘為樂小法者若下得者一椎莫道文殊假使釋迦老子亦無容身之處諸人還知得者一椎落處麼若知得盡大地一切衆生四生六道一時瓦解氷消無絲毫可見或有箇衲僧出來道請和尚試下手看即向伊道動不如靜放過一著何故落霞與孤鶩齊飛秋水共長天一色小參云古人道若是陶淵明攢眉却回去如今敢問大衆攢眉去是具眼不具眼若是具眼何故回去若不具眼何故回去去底且從你道如今却來者裏圍繞者是具眼不具眼若是具眼何故圍繞若不具眼何故圍繞還有人裁辨得麼若裁得出無絲毫遺漏五日一參勞諸人訪及於此實為希有然既勞諸人訪及為復世諦人情為復是佛法受用若是世諦人情我輩沙門釋子聚會不可作世諦流通也如此則有何利益若是佛法受用作麼生見箇佛法受用底道理還有人會麼莫是諸人從門前恁麼來問訊叉手立地是佛法麼若是呼之無形應之有聲一切處受用無盡是佛法麼莫是渠不恁麼一切該不得眼不見耳不聞孔孔洞洞是佛法麼莫是阿師恁麼説諸人恁麼聽是佛法麼莫是本來無事何消得恁麼大似頭上安頭但隨時及節是佛法麼莫是佛法兩字不用道著山是山水是水僧是僧俗是俗如今且建立箇化門接引初機是佛法麼大衆素非此理莫錯好恁麼則佛法祇憑口裏意裏驅差將來若祇如此何處有佛法盡是無義語不實語虗誑語謗般若罪大不可當乍可不會却永劫無事切莫未得謂得起大我慢輕忽先達若也實得箇安樂處便須識得些子好惡辨取些子邪正不可瞞瞞盰盰儱儱統統祇恁自欺自誑山僧直是不昧諸聖如今在這裏不惜口業與諸人如此論量喚作論實不論虗我祇要一箇見解明白徹底悟得底人不要你許多作用奇特機鋒玄絶棒喝齊施如此者總不消得拈出也何故你未入門來時腳跟下已與你三十棒了也更來者裏揚眉動目彈指拂袖便出去道我勿廉纖無話會袖拂出去則且從你者一段疑情如何得見諦去且問你拂袖出道是了也祇如你大小二事時何不拂袖喫粥喫飯時何不拂袖相見問訊時何不拂袖須要説佛法時拂袖意在於何一處通千處百處一時通莫怪逆耳莫道絮無滋味我不圖你名聞利養祇要你悟得同報佛恩除此之外亦無別事你若真箇有箇入處方知山僧不分外已得者便好長養聖胎未得者正好疾速決擇你不見藥山久不上堂院主白曰大衆久思和尚示誨山曰但打鐘著院主打鐘衆已集山掩方丈門院主白曰和尚相許為大衆説法何故不出山曰院主經有經師論有論師律有律師又爭怪得老僧大衆你看他古人得恁麼奇特豈似而今教者兩片皮喃喃地一似教書相似有甚麼利濟各請散去珍重衆散師復云大衆三十年後不得錯舉小參云今時人須是自尊自貴自成自立始得若能如此方有箇休歇處雖有箇休歇亦無休歇之量若不如此揑目生花見事便差但識山僧拂子便得祇如拂子且作麼生識乃豎起云還見麼若見且不識山僧拂子若不見亦不識山僧拂子且如何是自尊自貴底道理近來兄弟以遊山為訪道觀看名參學稱為行腳還當行腳事麼要見五臺清涼京師兩浙廬山湖南天台鴈蕩江南江北好山好水好寺院拈起拂子云子細看取一生行腳事畢或若劬勞跋涉真實自輕大衆切須自尊自貴將知尊貴邊合著得箇什麼無事不須久立師姑本是女人做阿嫂元是大哥妻好大哥歸堂去普説師云法身有三種病二種光一一透得始解穩坐地又楞嚴會上如來説五十種禪病如今向諸人道直是無病始得龍門道祇有二種病一是騎驢覔驢二是騎却驢了不肯下你道騎却驢了更覔驢可殺是大病山僧向你道不要覔靈利人當下識得除却覔底病狂心遂息既識得驢了騎了不肯下此一病最難醫山僧向你道不要騎你便是驢盡大地是箇驢你作麼生騎你若騎管取病不去若不騎十方世界廓落地此二病一時去心下無事名為道人復有什麼事所以趙州問南泉和尚如何是道泉云平常心是道州從此頓息馳求識得祖病佛病無不透得後來遍到諸方無有出其右者蓋緣他識病不見一日去訪茱萸䇿杖從東過西從西過東茱萸作麼州云探水萸云我者裏一滴也無探箇什麼州靠却杖而出看他露些風規甚能奇特如今僧家例以病為法莫教心病好久立師云不與萬法為侶者豈不是出塵勞耶心不知心眼不見眼既絶對待見色時無色可見聞聲時無聲可聞豈不是出塵勞耶無路徑處入得無縫罅處見得佛法亦無東西南北不道你是弟子我是師若己躬分明無有不是者參師時不見有師參自己時不見有自己看經時不見有經喫飯時不見有飯坐禪時不見有坐日用不差求絲毫相不可得恁麼見得豈不是自由自在久立師云不問又不得才問來又成自輕了不問又焉知亦須解問始得我向頂上錐劄你要你識痛癢如揭你灸瘡甲相似靈利人便知始得莫自欺我不瞞你不見古人問如何是祖師西來意尊宿大驚曰你問他西來意作麼何不問你自己意如何是自己意曰當觀密作用如何是密作用尊宿以目開合示之古人多少苦口後來子孫又不恁麼也入門來便喝更無如何若何生怕你明不得有恁麼一件事何不識取諸方愛教人看公案我者裏現成公案好看莫教看破大小大事諸人十二時中祇是妄想塵勞心念智慧未能發生所有流布皆從意思中來要作何用智慧如日出無不開朗喚作無分別智現前須得恁麼一回了從此去有著腳手處有與你語言分若是妄想塵勞山僧於你無著腳手處好笑好笑説東入西説西入東不奈你何若能轉頭來智慧開時便解道和尚元來與我説了我也與和尚説了搖頭時便擺尾受整理也你諸人謾道十年五歲參禪何曾做者般功夫來祇是趂口快你方來我者裏肯就己在也則功夫未成沒滋味在你在者裏十年五歲做得功夫熟也管取悟得去我也尋常教人做功夫説底話皆與他古人合不差一字你但會得了便知古人事也你莫道古人恁麼道我恁麼會得不是了也祗如古人説不是風動不是幡動仁者心動有多少言語到你分上是耶不是耶又道我是你你是我無過此也又人問雲門學人自己雲門道山河大地多少好是有是無山河大地若有去怎生見得自己若無現今山河大地如何説無來古人説與你了不悟不知龍門尋常向你道本有之事你分上現行現用不著尋討不著整理不著修證祇要你一信信得甚是省力難得如此人先師在白雲會裏端師翁常曰此道者天真自得之妙蓋緣有生知底事山僧見先師十年道不得祇為疑得深後來徹底理會得如今總不費力不是思量時有不思量時又不是也佛法不如此袈裟下事莫教埋沒山僧若不退思參究時一生也則埋沒了豈有者箇消息也而今道眼不明出世者多罪過罪過如何敢為人高座上也豎起拂子示人噁嚇殺人如盲如聾相似不驚不怖祇趂目前不憂後世打鬼骨臀苦苦你諸人有福德因緣未悟心切不可作出世人禍事禍事若有真實事自然馨香你看多少虗頭禪師久久一日不如一日如刻人糞作栴檀形到了祇是屎臭氣你諸人求出生死求要出離打教成一片又不是你和融然後成一片若教成一片決定不成一片也昔日有一僧曾參舉道者一日遊山問曰和尚香林道老僧三十年求成一片不可得此意如何舉道者曰老僧也恁麼却問其僧會麼曰不會舉道者又與者僧一偈曰香林成一片老僧也恁麼不待此月終重為子決破至月末舉道者遂遷化去你道一片事作麼生好不好香林成一片龍門也恁麼為報諸禪和當面莫蹉過各自下去久立師云看見了不奈何者多既看見如何却不奈何祇為不識所以不奈何若看見識得便奈何得也然發心參禪便要會得誰不願樂祇為無箇入處又強會不得一切處不契合一切處緣差用力取不得良久云你十二時中行住坐臥折旋俯仰種種事業一切處有超佛越祖底事祇是你才要解會時已無也真箇是無也你擬湊泊已背了也所以道看見祇是不奈何莫是不擬心不起解會時得麼展轉更是不得也會尚不得豈況不會若是靈利底人才聞山僧説向你便能大開眼見得豈不是沒量大人向道是法非思量分別之所能解又道智不到處若不如此爭稱佛法而今兄弟家祇是呈箇解會呈箇見處作道理何曾解恁麼來何曾得到恁麼田地來若是有道種性底人肯恁麼去須是深深地體究密密地看詳忽然奈何得便無疑情也你等不明祇為十二時中被雜念奪將去也蓋為你要學事業見物便愛見文字便愛尋逐時便緣將去也道業何由得辦凡學事業人各有時三十已上便不可學也學亦難成學得又何用若己事辦去學亦得在蓋已點化了也若己事辦又豈肯學也若二十上下猶可學若是靈利念生死之人亦不肯學也又凡是參禪須是心地平直心口相應心言直故如是始終地位無委曲相莫道我會也我奈何得也若奈何得那裏更去問人也你才説會禪也人你腳手看你説話所為底事因甚却道者箇如何那箇如何既是會禪又却是爭無明也祇如道默耀韜光是如何藏名晦迹又如何不異人心是道又如何各自省緣莫説是非且如行住坐臥進退俯仰一切處皆是超佛越祖山前水牯牛有佛法你才尋究則已無也何不恁麼識取久立師云龍門活計是千聖之骨髓未有一念不與諸人説自是諸人不肯承當所以却成山僧瞞你且什麼處不是與諸人説處禪僧家説道山僧不教人思量不教人會解不教人商量因緣不舉古舉今祇恁麼空過我若在別處一夏須明得公案三兩則須聽一件文字你若要商量舉古舉今却請別處去我者裏祇是一味禪所以喚作千聖骨髓我且問你適來因什麼問訊聖僧且問訊時還印證你麼還肯諾你麼若道印證你他是土聖僧豈解印證你若道肯諾你豈解肯諾你既不解肯諾印證又問訊作麼莫是仁義道中麼莫是覩相生善麼若是仁義道中衲僧家豈有仁義豈有覩相生善莫是事不獲已隨衆問訊麼又成何道理到者裏須是一一明始得不見長沙大師一日回頭見聖僧忽然知歸便云回頭忽見本來身本身非見亦非真若將本體同真體歷劫迢迢受苦辛諸人還會此箇道理麼珍重師云有時問著師僧總言不知不會祇管道飢來喫飯困來眠似此説話有什麼救處更道不知月之大小不管歲之餘𨳝誰理會你者般事我且問你作麼生説箇不知底道理你見人説了便恁麼道還曾會得那不知底道理麼古人道不知者無所不知無所不到喚作不知要你今時人到那不知底田地此是諸聖境界豈比如今拍盲不會喚作不知若總如此盡道我不知不管忽有人問著如何流通曹溪一路恐無人相續去也不得如此須是勤勤決擇始得珍重師云古有禪德問老宿云如何是出離之要宿云闍梨足下煙生禪德頓於言下得旨諸人還知出離事麼若起解會心則隔了也後來有尊宿云不敢辜負和尚足下煙生又有北院通辭洞山山謂曰子何處去通曰入嶺去山曰飛猿嶺峻好看通遲疑山曰通闍梨通應諾山曰何不入嶺去通頓於言下得旨古人為人處甚徑直每見人來無不示他是伊道入嶺去此意如何今人不明了須做箇會處以些子會是自隔了祇許體究不許會解一體體得了更不疑也然亦不易保任若入得是則無退失所以會處明得不如不會處見得亦有可保任分更無不照顧時不曉了時所以古人道平常心是道還可趣向也無擬向即乖看他不許你趣向又作麼生保任不易不易此豈不是出離事你若尋出離處所謂苦屈玄沙道盡大地是地獄劫住若向者衣線下不明是大苦屈不可等間久立師云三祖大師道不用求真唯須息見又道才有是非紛然失心者箇言語便是教你如今人作功夫處也你見他道不用求真便道更不須求也此便是見不息是非紛然終不到無求心祇成見解今時學道例皆如此看一轉語向語下通箇見處便將一切言句云無不是此事也恁麼記在心下用為己有殊不知道起見解失心了也執而不肯捨大小大癡人要得無所求心麼但莫生種種諸見非是冥然百不會喚作無求尋常十二時中目前不了蓋是見心取捨你又豈得知無分別心所以先聖曰有為無為有異耶答曰無異也天地河海風雲草木鳥獸人物生死變化目前皆名有為之相無為之道寂然不動無狀無名謂之無為如何得無異去永嘉大師道無明實性即佛性幻化空身即法身此兩者各別且如何明得即底道理須是證得無求心也便和融得無事十地中第五難勝地謂真智俗智極難得等入地時二皆平等故名難勝地學道兄弟二六時中了取教等好還知是你無分別心所畫出麼如畫師畫出種種好醜畫出五陰畫出人天正畫時不借他力能畫所畫俱無分別以不了故而起諸見見我見人自生好醜所以道畫師畫地獄醜狀百千般放筆從頭看特地骨毛寒若知是畫出何所怖畏也古人明得了一切處現成玄沙大師伐木次遇虎跳出侍者曰虎和尚沙叱曰是你虎又有僧禮拜次沙云因我得禮你此箇方便深符佛意法眼大師指面前狗子曰畫鏤出諸人看時莫就狗子身上明應須將來向自己分上看取始得方解他道才有是非紛然失心識取好久立師云如今直下信道是也已名不唧溜者況更不能直下信得又堪作什麼也直下信道是何名不唧溜者從前許多時什麼處去來須知已失一橛了也便見從前不了底却成分外之見我觀從上古人有從迷得悟者所有流布皆是從迷得悟法門有悟了知迷者所有流布皆是悟了知迷法門有無迷無悟者所有流布皆是無迷無悟法門其次來迷外得悟者亦甚多故不足道況不知悟亦不了迷此正是凡夫也從上南泉歸宗諸人方喚作無迷無悟之見如今學者也趂口説無迷無悟又何曾到來不得容易出言蓋為你有疑在我今問你一件事初入母胎時將得什麼物來你來時並無一物祇有箇心識又無形無貌及至死時棄此五蘊簷子亦無一物祇有箇心識如今行腳入衆中者箇是主宰也如今問你受父母氣分精血執受名為我身始於出胎漸漸長成此身皆屬我也且道屬你不屬你若道屬你初入胎時並不將一物來此箇父母精血幾時屬你又祇合長在百年依舊拋却死尸又何曾屬你若言不屬見今一步也少不得罵時解嗔痛時能忍作麼生不屬你得議定省看道是有是無管取分踈不下蓋為疑根不斷道有來初生時漸長至三歲五歲乃至二十時決定不移到四十五十而此身念念遷謝念念無常決定喚作有不得道無來種種運為皆解作得道無且不得昔有一人因行失路宿一空屋中夜有一鬼負一死尸至續有一鬼來云是我尸前鬼云我在彼處將來後鬼強力奪之前鬼曰此中有一客子可證二鬼近前云此尸是誰將來客子思惟道二鬼皆惡必有一損我我聞臨死不妄語者必生天上遂指前鬼曰是者鬼將來後鬼大怒拔去客子四肢前鬼愧謝曰你為我一言之證令爾肢體不全遂將死尸一一補却頭首心腹又被後鬼所取前鬼復一一以尸補之二鬼遂於地爭食其肉淨盡而去於是客子眼前見父母身體已為二鬼所食却觀所易之身復是何物是我耶非我耶有耶無耶於是心大狂亂奔走至一精舍見一比丘具述前事比丘曰此人易可化度已知此身非有也乃為略説法要遂得道果汝等諸人祇説參禪舉因緣便喚作佛法此是禪髓何不恁麼疑來參取會得麼你身不是有不是無有是心有身則未嘗有無是心無身則未嘗無你會得麼更説箇心亦不有亦不無畢竟不是你本有今無本無今有斷常見解久立
