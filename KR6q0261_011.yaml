body:
  text: 慈明禪師語録南嶽下十世嗣汾陽師諱楚圓族出全州清湘李氏少為書生年二十二依城南湘山隱靜寺得度其母有賢行使之遊方師連眉秀目頎然豐碩然忽繩墨所至為老宿所呵以為少叢林師笑曰龍象蹴踏非驢所堪嘗橐骨董箱以竹杖荷之遊襄沔間與守芝谷泉俱結伴入洛中聞汾陽昭禪師道望為天下第一決志親依時朝廷方問罪河東澤潞皆屯重兵多勸其無行師不顧渡大河登太行易衣類廝養竄名火隊中露眠草宿至龍州遂造汾陽先是汾陽預語首座非久有異僧至傳持吾道一日忽率首座遊山首座云何往汾州云接侍者去首座云和尚顛倒作什麼汾州云但去果逢師至即與同歸經二年未許入室師每詣方丈汾州揣其志必罵詬使令者或毀詆諸方及有所訓皆流俗鄙事一夕訴曰自至法席不蒙指示念歲月飄忽己事未明有失出家之利語未卒汾陽叱曰是惡知識敢裨販我舉杖逐之師擬伸救汾陽忽掩其口乃大悟曰是知臨濟道出常情乃服役七稔去謁唐明嵩神鼎諲洞山聰暨登楊大年李都尉之門機語契投於是法道大振宜春守黃公宗旦請開法南源次遷道吾石霜福嚴興化都尉李矦遵勗奏賜命服徽號僧問如何是道曰踏著不瞋云如何是道中人曰胸馱背負問如何是祖師西來意曰渾家送上渡頭船問如何是異類中人曰頭長腳短云謝師指示曰半幅全封云直恁麼去也曰闍山僧手裏僧無語師便打問蓮花未出水時如何曰水深蓋不得云出水後如何曰不礙往來看云花開後如何曰南北馨香云結子後如何曰餒魚餧鱉問如何是禪曰鼻孔入地師同大愚數輩辭汾陽相讓不肯作參頭汾陽云此行不可以戒﨟推聽吾偈曰天無頭吉州城外起戈矛將軍匹馬林下過員州城裏閙啾啾師遽出班云楚圓何人敢受和尚如此記莂即領衆作禮汾復祝之曰吾在先師處親證三昧汝今已得宜往南方大興吾道即造洞山寶禪師席終日面壁寶問達磨九年面壁意旨如何師云空腹高心寶翌日升堂請師充第一座師住南源開堂日白槌云法筵龍象衆當觀第一義師乃云大衆會麼宜陽秀水南嶽石橋若也不會謾你諸人去也所以道達磨西來教外別傳一句且道別傳個什麼直指人心見性成佛祇如諸人盡是祖師指出底人還信得及麼若信得及與祖佛同參若信不及可謂自生退屈此日一會不是小緣將一瓣香為我無得禪師且道諸人還識無得禪師麼若也不識有疑請問僧問世尊出世梵王前引帝釋後隨今日和尚出世請師説法師云好僧云恁麼則粉骨碎身去也師云三月野花鋪地錦九秋黃葉以為陰問如何是祖師西來意師云畝地三蛇九鼠上堂云若論此事絶有言詮侍者拈香早成多事所以釋迦掩室已涉繁詞居士默然却成多説何故彼彼出家彼彼行腳且問諸人作麼生是出家行腳底事莫是著衣喫飯行住坐臥廣學多聞無言無説麼若恁麼會大似掉棒打月既不許恁麼會又作麼生會衆中還有識好惡者麼有即出來對衆證明若也未能如是有疑請問僧問鼓聲才罷大衆雲臻祖意西來請師舉唱師云汝從甚處來僧云汾陽一句師親唱南源今日事如何師云汝見南源問有言有説皆是世諦之談無言無説未是衲僧行履處幸對人天請師垂示師云放山僧一線道與闍黎葛藤僧云恁麼則專為流通師云一片白雲橫世界個中誰是出頭人師入州崇勝和尚請上堂云者裏崇勝法堂不可向者裏説佛説法去也然雖如是官不容針私通車馬恁麼大似擔水河頭賣衆中還有檢點得底麼試出來檢點看有麼有麼時有僧問諸法已聞今日響請師方便演真乘師云天不高地不遠僧云孤峯出羣嶽萬里百花新師云不是直鈎客徒勞到海壖問昔日靈山分半座二師相見意如何師云來風可鑒進云恁麼則大衆側聆學人禮拜師云伶俐人難得問如何是古佛家風師云金蟾初出海何處不分明進云還許學人請益否師云大海無邊際不宿水雲人乃云若向言中取則埋沒宗風直饒句下精通敢保此人未悟所以道山青水緑噪鴉鳴萬派同源海雲自異未來諸佛口似燈籠過去諸佛應病施方現在諸佛墮坑落塹不落凡聖一句作麼生道良久云矢上更加尖便下座師至仰山請上堂云寶鏡當臺森羅自顯太阿在手殺活臨時且道還有該不著者麼有即倒道將一句來如無後學初心有疑請問時有僧問知師久臥深潭裏大仰升堂事若何師云雨來山裏暗雲出洞中明進云學人不會再伸請益師云拈取幡竿別處舂僧無語師云弄潮須是弄潮人問大通智勝佛十劫坐道場佛法不現前不得成佛道未審意旨如何師云一場懡㦬進云祇如大通智勝佛又如何師云八十翁翁若少年進云學人耳順之年乞師再垂方便師云衆人伏事問如何是佛師云蓮花捧足上堂僧問油盡燈滅時如何師云養子不及父問海上雲遊時如何師云苦問如何是和尚受用處師云困僧擬進語師便打問失前忘後時如何師云不上堂竪起拄杖云過去諸佛現在諸佛未來諸佛西天二十八祖唐土六祖天下老和尚總變成南源拄杖子去也汝諸人向什麼處安身立命看看拄杖子穿過你諸人髑髏去也還有識痛癢者麼有即出來對衆𨁝跳看若無南源今日失利喝一喝卓拄杖一下下座示衆云無明實性即佛性幻化空身即法身諸仁者若也信得去不妨省力可謂善財入彌勒樓閣無邊法門悉皆周遍得大無礙悟法無生是謂無生法忍無邊剎境自他不隔於毫端十世古今始終不離於當念且問諸人阿那個是當念只如諸人無明之性即汝本覺妙明之性蓋為不了生死根源執妄為實隨妄所轉致墮輪回受種種苦若能回光反照自悟本來真性不生不滅故無明實性即佛性幻化空身即法身只如四大五蘊不淨之身即無實義如夢如幻如影如響從無量劫來流浪生死貪愛所使無暫休歇出此入彼積骨如毗富羅山飲乳如四大海水何故為無智慧不能了知五蘊本空都無所實逐妄所生貪欲所拘不能自在所以世尊云諸苦所因貪欲為本若滅貪欲無所依止汝等若能了知幻身虗假本來空寂諸見不生無我人衆生壽者法皆如故幻化空身即法身法身覺了無一物唯有聽法説法虗玄大道無著真宗故云本源自性天真佛又云五陰浮雲空去來三毒水泡虗出沒若如是者為度一切苦厄乃至無量無邊煩惱知解悉皆清淨是為清淨法身若到這個田地便能出此入彼捨身受身地獄天堂此界他方縱橫自在任意浮沉應物舒光隨機逗教喚作千百億化身恁麼説話可謂無夢説夢和泥合水撒屎撒尿不識好惡乃呵呵大笑云若向衲僧門下十萬八千未夢見他汗臭氣在雖然如是事無一向但以假名字引導於衆生喝一喝示衆云馬大師即心即佛當人未悟盤山非心非佛只成戲論之談雪峯輥毬誑唬小兒之作雲門顧鑒笑殺傍觀小室自傷一場大錯德山入門便棒未遇奇人臨濟入門便喝太殺輕薄黃梅呈頌人我未忘更言祖祖相傳遞相誹謗到這裏須是個人始得所以道鷹生鷹子鶻生鶻兒然雖如此也是鞏縣茶瓶乃彈指一下示衆云上來也步步登高下去也通身無礙所以道有時先敲後唱有時先唱後敲有時敲唱同時有時敲唱不同時所以王登寶殿野老謳歌如今還有謳歌者麼良久云木人雖舉手石女不擡頭喝一喝示衆云百千法門同歸方寸河沙妙義總在心源無三界可出無菩提可求人與非人性相平等既然如是為甚麼那吒撲帝鍾良久云波斯鼻孔長又長示衆説佛説祖合泥合水向上向下衲僧破草鞋總不與麼無繩自縛且獨脫一句作麼生道還有人道得麼試對衆倒道將一句來有麼有麼良久云冢上更加泥喝一喝師問僧名甚麼僧云海滿師云海無增減為甚麼却滿云和尚莫謾海滿師云南源罪過師問僧近離什麼處云雲過千山碧師云著忙作甚麼云鴈去水聲淒師便喝僧亦喝師便打僧亦打師云你這瞎漢本分打出三門外念汝是新到且坐喫茶師問僧行腳人須知有行腳事作麼生是行腳事云知師云知底事作麼生云山高水深師云念汝遠來且坐喫茶僧云諾諾師問顯英首座近離甚處云金鑾師云夏在甚處云金鑾云前後夏在甚處云金鑾師云先前夏甚處云和尚何不領話師云我也不能勘得你教庫下供過奴子來勘且點一碗茶與你濕口師問僧近離甚處僧以手面前一劃師云是何言歟僧便喝師云作甚麼僧撫掌一下便打師云瞎漢亂做作麼以坐具直打出法堂師道過琅瑘時覺禪師住焉先是舉道者到琅琊造方丈覺問近離甚處云兩浙覺云船來陸來云船來覺云船在甚處云步下覺云不涉程途一句作麼生道舉以坐具摵一摵云杜撰長老如麻似粟拂袖便出覺問侍者此是甚人云舉上座覺遂親下旦過堂問莫是舉上座麼勿怪適來相觸忤舉便喝云我在浙江早聞你名元來見解只如此何得名播寰宇覺遂作禮云慧覺罪過及師至琅琊覺留之師為逗遛數日因夜話及之師笑曰舉見處才能自了覺默然師為作牧童歌曰牧牛童實快活跣足披蘘雙角撮橫眠牛上向天歌人問如何牛未渴回首看平田闊四方放去休欄遏八面無拘任意遊要收只在索頭撥小牛兒順毛捋角力未充難提掇且從放在小平坡慮上高峯四蹄脫日已高休喫草擔定鼻頭無少老一時牽向圈中眠和泥看伊東西倒笑呵呵好不好又將橫笛順風吹震動五湖山海島倒騎牛脫布襖知音休向途中討若問牧童何處居鞭指東西無一寶覺默得其遊戲三昧僧問如何是賓中賓師云禮拜更殷勤如何是賓中主師云拄杖常在手如何是主中賓師云拄杖掇乾坤如何是主中主師云劒握甑人手問如何是佛師云瀟湘斑竹杖問祖佛不立時如何師云口上生茆問才見便回時如何師云湖南鎮主進云末後殷勤請師道師云多少分明進云大衆側聆師云未敢相許問進前不得時如何師云截斷衆疑問步步登高時如何師云雲生足下問如何是南源狗師云觜問如何是禪師云鼻孔入地問如何是佛師云石打不入上堂云諸佛放光明助發實相義乃竪起拄杖子云者個是南源拄杖子阿那個是實相義你若見去被見聞所轉也若不見行腳眼在什麼處喝一喝下座上堂云一塵才舉大地全收一毛頭師子百億毛頭現百億毛頭師子一毛頭現千頭萬頭但識取一頭乃竪起拄杖子云者個是南源拄杖子那個是一頭喝一喝卓拄杖一下下座問如何是佛師云人老病生問如何是接初機底句師云一刀兩段問如何是驗衲僧底句師云寒山拾得問如何是正令行底句師云來千去萬問如何是立乾坤句師云天高海闊問與師並坐時如何師云線穿黃葉上堂云天地與我同根萬法與我一體乃竪起拄杖子云者個是南源拄杖子那個是體良久云渡河須用筏到岸不須船喝一喝卓拄杖一下下座上堂竪起拄杖云河沙諸佛河沙國土總被南源拄杖子一口吞却其中衆生不覺不知你衲僧鼻孔在什麼處若知去處橫擔拄杖目視雲霄若也不知長連牀上有粥有飯喝一喝下座俗官問如何是南源境師云鑿池秋待月種竹夏遮陽如何是境中人師云城中公子般般貴林下道人事事貧問久昧衣珠請師指示師云草賊大敗僧云透走無路師云腳踏不動座主問承教有言因緣自然即不問如何是因緣師云記來多少時也進云如何是自然師云速退速退妨他別人問師住道吾上堂僧問達磨西來曲為今時不屈宗乘請師舉唱師云雲雨灑長空花開遍地春進云澗松清冷淡曉月照長川師云一言既流通今古誰言異進云雲生嶺上花發巖前師云相逢盡道休官去林下何曾見一人進云今日遭逢和尚師便喝上堂云佛以一音演説法衆生隨類各得解且道晝行夜臥一句作麼生道良久以拄杖卓一下云德山證明下座問𧴛豸當軒學人擬議如何得入師云還覺頭痛麼上堂云心隨萬境轉轉處實能幽隨流認得性無喜復無憂拈起拄杖子云者個是道吾拄杖子那個是諸人心河沙國土河沙諸佛西天二十八祖唐土六祖盡在道吾拄杖子上轉大法輪諸人還見麼若見朝遊西天暮歸東土若也不見晨朝有粥齋時有飯卓拄杖一下下座上堂云有物先天地無形本寂寥能為萬像主不逐四時凋拈拄杖云者箇是道吾拄杖那箇是萬像主良久云若見諸相非相即見如來喝一喝卓拄杖一下下座上堂云有時先照後用有時先用後照有時照用同時有時照用不同時所以道有明有暗有起有倒乃喝一喝云且道是照是用緇素辨得麼試出來呈醜拙看若無道吾今日失利喝一喝下座上堂僧出禮拜起便喝師云作麼生僧又喝師云瞎僧禮拜師云三十棒且待別時來與你喫問古人面壁意旨如何師云有年無德師住石霜開堂日僧問維摩一默未稱師宗棒喝齊施中流罔措今日一會請師方便師云石笋逢春長霜花向日開進云與麼則陽鳥喃喃語雨過百花新師云不因漁父引焉知水淺深僧云峻水隨流急雲開照碧天師云我行荒草裏你又入深村僧應諾云官不容針更借一問師意如何師云放你三十棒三十年後方始知痛癢僧舞袖而退師云夢見問方木調弦時如何師云幡竿一尺二進云恁麼則和尚手出今時也師云腳撥不動僧云莫道不知音師云三十年後悟去不定問古鏡未磨時如何師云新羅打鼓進云磨後如何師云西天作舞上堂云青蓮視瞬已多繁迦葉微微笑自謾少室坐羞癡截臂黃梅呈解頌多般入門棒喝重重錯向上宗乘肉自剜公案現成誰懡㦬鑒咦啐哂傍觀一宿覺來知是誤不言師範更無端丈夫皆有衝天志北斗南星背面看偈頌因僧請益三玄三要頌第一玄三世諸佛擬何宣垂慈夢裏生輕薄端坐還成落斷邊第二玄伶俐衲僧眼未明石火電光知是鈍揚眉瞬目涉關山第三玄萬象森羅宇宙寬雲散洞空山嶽靜落花流水滿長川第一要豈話聖凡妙擬議涉長途擡眸七顛倒第二要峯頂敲犍召神通自在來多聞門外呌第三要起倒令人笑掌內握乾坤千差都一照報你通玄士棒喝要臨時若明親的旨半夜太陽輝因僧請益臨濟兩堂首座齊下喝頌啐之機箭拄鋒瞥然賓主當時分宗師愍物垂緇素北地黃河徹底渾因人請益慧超佛話有頌僧問如何是佛師云汝是慧超禮拜進前叉手思量十萬迢迢因僧請益雲門超佛越祖之談超佛越祖若何宣充齋糊餅恣情餐湖南展鉢新羅咬大石波斯索渡船因僧請益乃述三訣頌第一訣大地山河泄維摩才默然文殊便饒舌第二訣展拓看時節語默豈相干夜半秋天月第三訣遠路難登涉陸地弄舟船眼中藏日月三句頌第一句天上他方皆罔措俱輪顛倒論多端巍巍未到尼俱樹第二句臨濟德山涉路布未過新羅棒便揮達者途中亂指注第三句維摩示疾文殊去對談一默震乾坤直至如今作笑具因僧請益五位有頌正中偏半夜烏雞室裏鳴海底然燈光世界石上栽花長枝靈偏中正日落西山觀異影分明影像顯宗乘休把眉頭窺月井正中來木馬生兒遍九垓進退任行通鳥道豈並巢居界內隈兼中至彼彼丈夫全意氣矛盾交互不傷鋒展拓縱橫不相離兼中到黑白已前休作造須明露柱未生兒莫認狂辭途路走都一頌偏中歸正極幽玄正去偏來理事全須知正立非言説朕兆依俙屬有緣兼至去來興妙用到兼何更逐言詮出沒豈能該世界蕩蕩無依鳥道玄因僧請益風穴佛話杖林山下竹筋鞭南北禪人萬萬千莫怪相逢不下馬東西各自有前程寄李駙馬分身千百億悲智願難窮在俗還隨俗居宮即順宮頭頭皆巨護處處現神通珍重吾宗幸多能立古風仰觀天畔一論日幾度清光四上出大士蓬頭問志公摩訶般若波羅蜜注杜順和尚頌懷州牛喫禾河沙世界益州馬腹脹蟻衛碗送天下召醫人驢頭馬角灸豬左膊上畫虎成狸冬不人事頌一首示衆云東山林木高幾歲幾回雨南嶺松枝瘦石生石畔土金色見瞿曇二三七八五僧請益古人十二時歌乃頌之雞鳴丑夢裏逢人莽莽鹵平旦寅覺來路上弄精魂日出卯赫爀光明影裏坐食時辰食飽還知是病因禺中巳買賣論量入市肆日南午萬像分明作笑具日昳未張公喫酒李公醉晡時申省來端坐醉醺醺日入酉茆蓬竹戶硬撑拄黃昏戌日落西山狐魅出夜半子一輪明月蘇嚧哩人定亥老鼠牀頭作隊隊
