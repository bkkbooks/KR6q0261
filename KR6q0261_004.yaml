body:
  text: 鎮州臨濟慧照禪師語錄住三聖嗣法小師惠然集府主王常侍與諸官請師升座師上堂云山僧今日事不獲已曲順人情方登此座若約祖宗門下稱揚大事直是開口不得無你措足處山僧此日以常侍堅請那隱綱宗還有作家戰將直下展陣開旗麼對眾證據看僧問如何是佛法大意師便喝僧禮拜師云這箇師僧却堪持論問師唱誰家曲宗風嗣阿誰師云我在黃蘗處三度發問三度被打僧擬議師便喝隨後打云不可向虗空裏釘橛去也有座主問三乘十二分教豈不是明佛性師云荒草不曾鋤主云佛豈賺人也師云佛在什麼處主無語師云對常侍前擬瞞老僧速退速退妨他別人請問復云此日法筵為一大事故更有問話者麼速致問來你纔開口早勿交涉也何以如此不見釋尊云法離文字不屬因不在緣故為你信不及所以今日葛藤恐滯常侍與諸官員昧佗佛性不如且退喝一喝云少信根人終無了日久立珍重師一日到河北府府主王常侍請師升座時麻谷出問大悲千手眼那箇是正眼師云大悲千手眼那箇是正眼速道速道麻谷拽師下座麻谷却坐師近前云不審麻谷擬議師亦拽麻谷下座師却坐麻谷便出去師便下座上堂云赤肉團上有一無位真人常從汝等諸人面門出入未證據者看看時有僧出問如何是無位真人師下禪牀把住云道道其僧擬議師托開云無位真人是什麼乾屎橛便歸方丈上堂有僧出禮拜師偈便僧云老和尚莫探頭好師云你道落在什麼處僧便喝又有僧問如何是佛法大意師便喝僧禮拜師云你道好喝也無僧云草賊大敗師云過在什麼處僧云再犯不容師便喝是日兩堂首座相見同時下喝僧問師還有賓主也無師云賓主歷然師云大眾要會臨濟賓主句問取堂中二首座便下座上堂僧問如何是佛法大意師豎起拂子僧便喝師便打又僧問如何是佛法大意師亦豎起拂子僧便喝師亦喝僧擬議師便打師乃云大眾夫為法者不避喪身失命我二十年在黃檗先師處三度問佛法的的大意三度蒙佗賜杖如蒿枝拂著相似如今更思得一頓棒喫誰人為我行得時有僧出眾云某甲行得師拈棒與佗其僧擬接師便打上堂僧問如何是劒刃上事師云禍事禍事僧擬議師便打問祇如石室行者踏碓忘却移脚向什麼處去師云沒溺深泉師乃云但有來者不虧欠伊㹅識伊來處若與麼來恰似失却不與麼來無繩自縛一切時中莫亂斟酌會與不會都來是錯分明與麼道一任天下人貶剝久立珍重上堂云一人在孤峯頂上無出身之路一人在十字街頭亦無向背那箇在前那箇在後不作維摩詰不作傅大士珍重上堂云有一人論劫在途中不離家舍有一人離家舍不在途中那箇合受人天供養便下座上堂僧問如何是第一句師云三要印開朱點窄未容擬議主賓分問如何是第二句師云妙解豈容無著問漚和爭負截流機問如何是第三句師云看取棚頭弄傀儡抽牽都藉裏頭人師又云一句語須具三玄門一玄門須具三要有權有用汝等諸人作麼生會下座師晚參示眾云有時奪人不奪境有時奪境不奪人有時人境俱奪有時人境俱不奪時有僧問如何是奪人不奪境師云煦日發生鋪地錦嬰孩垂髮白如絲僧云如何是奪境不奪人師云王令已行天下徧將軍塞外絕烟塵僧云如何是人境兩俱奪師云并汾絕信獨處一方僧云如何是人境俱不奪師云王登寶殿野老謳謌師乃云今時學佛法者且要求真正見解若得真正見解生死不染去住自由不要求殊勝殊勝自至道流祇如自古先德皆有出人底路如山僧指示人處祇要你不受人惑要用便用更莫遲疑如今學者不得病在甚處病在不自信處你若自信不及即便茫茫地狥一切境轉被佗萬境回換不得自由你若能歇得念念馳求心便與祖佛不別你欲得識祖佛麼祇你面前聽法底是學人信不及便向外馳求設求得者皆是文字勝相終不得他活祖意莫錯諸禪德此時不遇萬劫千生輪回三界狥好境掇去驢牛肚裏生道流約山僧見處與釋迦不別今日多般用處欠少什麼一道神光未曾間歇若能如是見得祇是一生無事人大德三界無安猶如火宅此不是你久停住處無常殺鬼一剎那間不揀貴賤老少你要與祖佛不別但莫外求你一念心上清淨光是你屋裏法身佛你一念心上無分別光是你屋裏報身佛你一念心上無差別光是你屋裏化身佛此三種身是你即今目前聽法底人祇為不向外馳求有此功用據經論家取三種身為極則約山僧見處不然此三種身是名言亦是三種依古人云身依義立土據體論法性身法性土明知是光影大德你且識取弄光影底人是諸佛之本源一切處是道流歸舍處是你四大色身不解說法聽法脾胃肝膽不解說法聽法虗空不解說法聽法是什麼解說法聽法是你目前歷歷底勿一箇形段孤明是這箇解說法聽法若如是見得便與祖佛不別但一切時中更莫間斷觸目皆是祇為情生智隔想變體殊所以輪回三界受種種苦若約山僧見處無不甚深無不解脫道流心法無形通貫十方在眼曰見在耳曰聞在鼻齅香在口談論在手執捉在足運奔本是一精明分為六和合一心既無隨處解脫山僧與麼說意在什麼處祇為道流一切馳求心不能歇上佗古人閑機境道流取山僧見處坐斷報化佛頭十地滿心猶如客作兒等妙二覺擔枷鎻漢羅漢辟支猶如廁穢菩提涅槃如繫驢橛何以如此祇為道流不達三祇劫空所以有此障礙若是真正道人終不如是但能隨緣消舊業任運著衣裳要行即行要坐即坐無一念心希求佛果緣何如此古人云若欲作業求佛佛是生死大兆大德時光可惜祇擬傍家波波地學禪學道認名認句求佛求祖求善知識意度莫錯道流你祇有一箇父母更求何物你自返照看古人云演若達多失却頭求心歇處即無事大德且要平常莫作模樣有一般不識好惡禿奴便即見神見鬼指東劃西好晴好雨如是之流盡須抵債向閻老前吞熱鐵丸有日好人家男女被這一般野狐精魅所著便即揑恠瞎屢生索飯錢有日在師示眾云道流切要求取真正見解向天下橫行免被這一般精魅惑亂無事是貴人但莫造作祇是平常你擬向外傍家求過覓脚手錯了也祇擬求佛佛是名句你還識馳求底麼三世十方佛祖出來也祗為求法如今參學道流也祇為求法得法始了未得依前輪回五道云何是法法者是心法心法無形通貫十方目前現用人信不及便乃認名認句向文字中求意度佛法天地懸殊道流山僧說法說什麼法說心地法便能入凡入聖入淨入穢入真入俗要且不是你真俗凡聖能與一切真俗凡聖安著名字真俗凡聖與此人安著名字不得道流把得便用更不著名字號之為玄旨山僧說法與天下人別祇如有箇文殊普賢出來目前各現一身問法纔道咨和尚我早辨了也老僧穩坐更有道流來相見時我盡辨了也何以如此祇為我見處別外不取凡聖內不住根本見徹更不疑謬師示眾云道流佛法無用功處祇是平常無事屙屎送尿著衣喫飯困來即臥愚人笑我智乃知焉古人云向外作工夫總是癡頑漢你且隨處作主立處皆真境來回換不得縱有從來習氣五無間業自為解脫大海今時學者總不識法猶如觸鼻羊逢著物安在口裏奴郎不辨賓主不分如是之流邪心入道閙處即入不得名為真出家人正是真俗家人夫出家者須辨得平常真正見解辨佛辨魔辨真辨偽辨凡辨聖若如是辨得名真出家若魔佛不辨正是出一家入一家喚作造業眾生未得名為真出家祇如今有一箇佛魔同體不分如水乳合鵞王喫乳如明眼道流魔佛俱打你若愛聖憎凡生死海裏浮沉問如何是佛魔師云你一念心疑處是佛魔你若達得萬法無生心如幻化更無一塵一法處處清淨是佛然佛與魔是染淨二境約山僧見處無佛無眾生無古無今得者便得不歷時節無修無證無得無失一切時中更無別法設有一法過此者我說如夢如化山僧所說皆是道流即今目前孤明歷歷地聽者此人處處不滯通貫十方三界自在入一切境差別不能回換一剎那間透入法界逢佛說佛逢祖說祖逢羅漢說羅漢逢餓鬼說餓鬼向一切處游履國土教化眾生未曾離一念隨處清淨光透十方萬法一如道流大丈夫兒今日方知本來無事祇為你信不及念念馳求捨頭覓頭自不能歇如圓頓菩薩入法界現身向淨土中厭凡忻聖如此之流取捨未忘染淨心在如禪宗見解又且不然直是現今更無時節山僧說處皆是一期藥病相治總無實法若如是見得是真出家日消萬兩黃金道流莫取次被諸方老師印破面門道我解禪解道辯似懸河皆是造地獄業若是真正學道人不求世間過切急要求真正見解若達真正見解圓明方始了畢問如何是真正見解師云你但一切入凡入聖入染入淨入諸佛國土入彌勒樓閣入毗盧遮那法界處處皆現國土成住壞空佛出于世轉大法輪却入涅槃不見有去來相貌求其生死了不可得便入無生法界處處游履國土入華嚴世界盡見諸法空相皆無寔法唯有聽法無依道人是諸佛之母所以佛從無依生若悟無依佛亦無得若如是見得者是真正見解學人不了為執名句被他凡聖名礙所以障其道眼不得分得如十二分教皆是表顯之說學者不會便向表顯名句上生解皆是依倚落在因果未免三界生死你若欲得生死去住脫著自由即今識取聽法底人無形無相無根無本無住處活潑潑地應是萬種施設用處祇是無處所以覔著轉遠求之轉乖號之為秘密道流你莫認著箇夢幻伴子遲晚中間便歸無常你向此世界中覔箇什麼物作解脫覔取一口飯喫補毳過時且要訪尋知識莫因循逐樂光陰可惜念念無常麤則被地水火風細則被生住異滅四相所逼道流今時且要識取四種無相境免被境擺撲問如何是四種無相境師云你一念心疑被地來礙你一念心愛被水來溺你一念心嗔被火來燒你一念心喜被風來飄若能如是辨得不被境轉處處用境東涌西沒南涌北沒中涌邊沒邊涌中沒履水如地履地如水緣何如此為達四大如夢如幻故道流你祇今聽法者不是你四大能用你四大若能如是見得便乃去住自由約山僧見處勿嫌底法你若愛聖聖者聖之名有一般學人向五臺山裏求文殊早錯了也五臺山無文殊你欲識文殊麼祇你目前用處始終不異處處不疑此箇是活文殊你一念心無差別光處處總是真普賢你一念心自能解縛隨處解脫此是觀音三昧法互為主伴出則一時出一即三三即一如是解得始好看教師示眾云如今學道人且要自信莫向外覔總上他閑塵境都不辨邪正祇如有祖有佛皆是教迹中事有人拈起一句子語或隱顯中出便即疑生照天照地傍家尋問也大茫然大丈夫兒莫祇麼論主論賊論是論非論色論財論說閑話過日山僧此間不論僧俗但有來者盡識得伊任伊向甚處出來但有聲名文句皆是夢幻却見乘境底人是諸佛之玄旨佛境不能自稱我是佛境還是這箇無依道人乘境出來若有人出來問我求佛我即應清淨境出有人問我菩薩我即應慈悲境出有人問我菩提我即應淨妙境出有人問我涅槃我即應寂靜境出境即萬般差別人即不別所以應物現形如水中月道流你若欲得如法直須是大丈夫兒始得若萎萎隨隨地則不得也夫如㽄嗄上音西下所嫁切之器不堪貯醍醐如大器者直要不受人惑隨處作主立處皆真但有來者皆不得受你一念疑即魔入心如菩薩疑時生死魔得便但能息念更莫外求物來即照你但信現今用底一箇事也無你一念心生三界隨緣被境分為六塵你如今應用處欠少什麼一剎那間便入淨入穢入彌勒樓閣入三眼國土處處遊履唯見空名問如何是三眼國土師云我共你入淨妙國土中著清淨衣說法身佛又入無差別國土中著無差別衣說報身佛又入解脫國土中著光明衣說化身佛此三眼國土皆是依變約經論家取法身為根本報化二身為用山僧見處法身即不解說法所以古人云身依義立土據體論法性身法性土明知是建立之法依通國土空拳黃葉用誑小兒蒺藜夌刺枯骨上覔什麼汁心外無法內亦不可得求什麼物你諸方言道有修有證莫錯設有修得者皆是生死業你言六度萬行齊修我見皆是造業求佛求法即是造地獄業求菩薩亦是造業看經看教亦是造業佛與祖師是無事人所以有漏有為無漏無為為清淨業有一般瞎禿子飽喫飯了便坐禪觀行把捉念漏不令放起厭喧求靜是外道法祖師云你若住心看靜舉心外照攝心內澄凝心入定如是之流皆是造作是你如今與麼聽法底人作麼生擬修他證他莊嚴他渠且不是修底物不是莊嚴得底物若教他莊嚴一切物即莊嚴得你且莫錯道流你取這一般老師口裏語為是真道是善知識不思議我是凡夫心不敢測度他老宿瞎屢生你一生祇作這箇見解孤負這一雙眼冷噤噤地如凍凌上驢駒相似我不敢毀善知識怕生口業道流夫大善知識始敢毀佛毀祖是非天下排斥三藏教罵辱諸小兒向逆順中覔人所以我於十二年中求一箇業性如芥子許不可得若似新婦子禪師便即怕趂出院不與飯喫不安不樂自古先輩到處人不信被遞出始知是貴若到處人盡肯堪作什麼所以師子一吼野干腦裂道流諸方說有道可修有法可證你說證何法修何道你今用處欠少什麼物修補何處後生小阿師不會便即信這般野狐精魅許他說事繫縛他人言道理行相應護惜三業始得成佛如此說者如春細雨古人云路逢達道人第一莫向道所以言若人修道道不行萬般邪境競頭生智劒出來無一物明頭未顯暗頭明所以古人云平常心是道大德覔什麼物現今目前聽法無依道人歷歷地分明未曾欠少你若欲得與祖佛不別但如是見不用疑誤你心心不異名之活祖心若有異則性相別心不異故即性相不別問如何是心心不異處師云你擬問早異了也性相各分道流莫錯世出世諸法皆無自性亦無生性但有空名名字亦空你祇麼認他閑名為實大錯了也設有皆是依變之境有箇菩提依涅槃依解脫依三身依境智依菩薩依佛依你向依變國土中覔什麼物乃至三乘十二分教皆是拭不淨故紙佛是幻化身祖是老比丘你還是娘生已否你若求佛即被佛魔攝你若求祖即被祖魔縛你若有求皆苦不如無事有一般禿比丘向學人道佛是究竟於三大阿僧祇劫修行果滿方始成道道流你若道佛是究竟緣什麼八十年後向拘尸羅城雙林樹間側臥而死去佛今何在明知與我生死不別你言三十二相八十種好是佛轉輪聖王應是如來明知是幻化古人云如來舉身相為順世間情恐人生斷見權且立虗名假言三十二八十也空聲有身非覺體無相乃真形你道佛有六通是不可思議一切諸天神仙阿修羅大力鬼亦有神通應是佛否道流莫錯祇如阿修羅與天帝釋戰戰敗領八萬四千眷屬入藕絲孔中藏莫是聖否如山僧所舉皆是業通依通夫如佛六通者不然入色界不被色惑入聲界不被聲惑入香界不被香惑入味界不被味惑入觸界不被觸惑入法界不被法惑所以達六種色聲香味觸法皆是空相不能繫縛此無依道人雖是五蘊漏質便是地行神通道流真佛無形真法無相你祇麼幻化上頭作模作樣設求得者皆是野狐精魅並不是真佛是外道見解夫如真學道人並不取佛不取菩薩羅漢不取三界殊勝逈然獨脫不與物拘乾坤倒覆我更不疑十方諸佛現前無一念心喜三塗地獄頓現無一念心怖緣何如此我見諸法空相變即有不變即無三界唯心萬法唯識所以夢幻空花何勞把捉唯有道流目前現今聽法底人入火不燒入水不溺入三塗地獄如遊園觀入餓鬼畜生而不受報緣何如此無嫌底法你若愛聖憎凡生死海裏沉浮煩惱由心故有無心煩惱何拘不勞分別取相自然得道須臾你擬傍家波波地學得於三祇劫中終歸生死不如無事向叢林中牀角頭交脚坐道流如諸方有學人來主客相見了便有一句子語辨前頭善知識被學人拈出箇機權語路向善知識口角頭攛過看你識不識你若識得是境把得便拋向坑子裏學人便即尋常然後便索善知識語依前奪之學人云上智哉是大善知識即云你大不識好惡如善知識把出箇境塊子向學人面前弄前人辨得了不作主不受境惑善知識便即現半身學人便喝善知識又入一切差別語路中擺撲學人云不識好惡老禿奴善知識歎曰真正道流如諸方善知識不辨邪正學人來問菩提涅槃三身境智瞎老師便與他解說被他學人罵著便把棒打他言無禮度自是你善知識無眼不得嗔他有一般不識好惡禿奴即指東劃西好晴好雨好燈籠露柱你看眉毛有幾莖這箇具機緣學人不會便即心狂如是之流總是野狐精魅魍魎被他好學人嗌嗌微笑言瞎老禿奴惑亂他天下人道流出家兒且要學道祇如山僧往日曾向毗尼中留心亦曾於經論尋討後方知是濟世藥表顯之說遂乃一時拋却即訪道參禪後遇大善知識方乃道眼分明始識得天下老和尚知其邪正不是娘生下便會還是體究練磨一朝自省道流你欲得如法見解但莫受人惑向裏向外逢著便殺逢佛殺佛逢祖殺祖逢羅漢殺羅漢逢父母殺父母逢親眷殺親眷始得解脫不與物拘透脫自在如諸方學道流未有不依物出來底山僧向此間從頭打手上出來手上打口裏出來口裏打眼裏出來眼裏打未有一箇獨脫出來底皆是上他古人閑機境山僧無一法與人祇是治病解縛你諸方道流試不依物出來我要共你商量十年五歲並無一人皆是依草附葉竹木精靈野狐精魅向一切糞塊上亂咬瞎漢枉消他十方信施道我是出家兒作如是見解向你道無佛無法無修無證祇與麼傍家擬求什麼物瞎漢頭上安頭是你欠少什麼道流是你目前用底與祖佛不別祇麼不信便向外求莫錯向外無法內亦不可得你取山僧口裏語不如休歇無事去已起者莫續未起者不要放起便勝你十年行脚約山僧見處無如許多般祇是平常著衣喫飯無事過時你諸方來者皆是有心求佛求法求解脫求出離三界癡人你要出三界什麼處去佛祖是賞繫底名句你欲識三界麼不離你今聽法底心地你一念心貪是欲界你一念心嗔是色界你一念心癡是無色界是你屋裏家具子三界不自道我是三界還是道流目前靈靈地照燭萬般酌度世界底人與三界安名大德四大色身是無常乃至脾胃肝膽髮毛爪齒唯見諸法空相你不念心歇得處喚作菩提樹你一念心不能歇得處喚作無明樹無明無住處無明無始終你若念念心歇不得便上他無明樹便入六道四生披毛戴角你若歇得便是清淨身界你一念不生便是上菩提樹三界神通變化意生化身法喜禪悅身光自照思衣羅綺千重思食百味具足更無橫病菩提無住處是故無得者道流大丈夫漢更疑箇什麼目前用處更是阿誰把得便用莫著名字號為玄旨與麼見得勿嫌底法古人云心隨萬境轉轉處實能幽隨流認得性無喜亦無憂道流如禪宗見解死活循然參學之人大須子細如主客相見便有言論往來或應物現形或全體作用或把機權喜怒或現半身或乘師子或乘象王如有真正學人便喝先拈出一箇膠盆子善知識不辨是境便上他境上作模作樣學人便喝前人不肯放此是膏肓之病不堪醫喚作客看主或是善知識不拈出物隨學人問處即奪學人被奪抵死不放此是主看客或有學人應一箇清淨境出善知識前善知識辨得是境把得拋向坑裏學人言大好善知識即云咄哉不識好惡學人便禮拜此喚作主看主或有學人披枷帶鏁出善知識前善知識更與安一重枷鏁學人歡喜彼此不辨呼為客看客大德山僧如是所舉皆是辨魔揀異知其邪正道流寔情大難佛法幽玄解得可可地山僧竟日與他說破學者總不在意千徧萬徧脚底踏過黑沒焌地無一箇形段歷歷孤明學人信不及便向名句上生解年登半百祇管傍家負死屍行檐却檐子天下走索草鞋錢有日在大德山僧說向外無法學人不會便即向裏作解便即倚壁坐舌拄上齶湛然不動取此為是祖門佛法也大錯是你若取不動清淨境為是你即認他無明為郎主古人云湛湛黑暗深坑寔可怖畏此之是也你若認他動者是一切草木皆解動應可是道也所以動者是風大不動者是地大動與不動俱無自性你若向動處捉他他向不動處立你若向不動處捉他他向動處立譬如潛泉魚皷波而自躍大德動與不動是二種境還是無依道人用動用不動如諸方學人來山僧此間作三種根器斷如中下根器來我便奪其境而不除其法或中上根器來我便境法俱奪如上上根器來我便境法人俱不奪如有出格見解人來山僧此間便全體作用不歷根器大德到這裏學人著力處不通風石火電光即過了也學人若眼定動即沒交涉擬心即差動念即乖有人解者不離目前大德你檐鉢囊屎檐子傍家走求佛求法即今與麼馳求底你還識渠麼活潑潑地祇是勿根株擁不聚撥不散求著即轉遠不求還在目前靈音屬耳若人不信徒勞百年道流一剎那間便入華藏世界入毗盧遮那國土入解脫國土入神通國土入清淨國土入法界入穢入淨入凡入聖入餓鬼畜生處處討覔尋皆不見有生有死唯有空名幻化空花不勞把捉得失是非一時放却道流山僧佛法的的相承從麻谷和尚丹霞和尚道一和尚廬山拽石頭和尚一路行徧天下無人信得盡皆起謗如道一和尚用處純一無雜學人三百五百盡皆不見佗意如廬山和尚自在真正順逆用處學人不測涯際悉皆茫然如丹霞和尚翫珠隱顯學人來者皆悉被罵如麻谷用處苦如黃檗近傍不得如石鞏用處向箭頭上覔人來者皆懼如山僧今日用處真正成壞翫弄神變入一切境隨處無事境不能換但有來求者我即便出看渠渠不識我我便著數般衣學人生解一向入我言句苦哉瞎禿子無眼人把我著底衣認青黃赤白我脫却入清淨境中學人一見便生忻欲我又脫却學人失心茫然狂走言我無衣我即向渠道你識我著衣底人否忽爾回頭認我了也大德你莫認衣衣不能動人能著衣有箇清淨衣有箇無生衣菩提衣涅槃衣有祖衣有佛衣大德但有聲名文句皆悉是衣變從臍輪氣海中鼓激牙齒敲𥕤成其句義明知是幻化大德外發聲語業內表心所法以思有念皆悉是衣你祇麼認他著底衣為寔解縱經塵劫祇是衣通三界循還輪回生死不如無事相逢不相識共語不知名今時學人不得葢為認名字為解大䇿子上抄死老漢語三重五重複子褁不教人見道是玄旨以為保重大錯瞎屢生你向枯骨上覓什麼汁有一般不識好惡向教中取意度商量成於句義如把屎塊子向口裏含了吐過與別人猶如俗人打傳口令相似一生虗過也道我出家被佗問著佛法便即杜口無詞眼似漆突口如楄檐如此之類逢彌勒出世移置佗方世界寄地獄受苦大德你波波地往諸方覔什麼物踏你脚板闊無佛可求無道可成無法可得外求有相佛與汝不相似欲識汝本心非合亦非離道流真佛無形真道無體真法無相三法混融和合一處辨既不得喚作茫茫業識眾生問如何是真佛真法真道乞垂開示師云佛者心清淨是法者心光明是道者處處無礙淨光是三即一皆是空名而無寔有如真正學道人念念心不間斷自達磨大師從西土來祇是覔箇不受人惑底人後遇二祖一言便了始知從前虗用功夫山僧今日見處與祖佛不別若第一句中得與祖佛為師若第二句中得與人天為師若第三句中得自救不了問如何是西來意師云若有意自救不了云既無意云何二祖得法師云得者是不得云既若不得云何是不得底意師云為你向一切處馳求心不能歇所以祖師言咄哉丈夫將頭覔頭你言下便自回光返照更不別求知身心與祖佛不別當下無事方名得法大德山僧今時事不獲已話度說出許多不才淨你且莫錯據我見處寔無許多般道理要用便用不用便休祇如諸方說六度萬行以為佛法我道是莊嚴門佛事門非是佛法乃至持齋持戒擎油不㴸道眼不明盡須抵債索飯錢有日在何故如此入道不通理復身還信施長者八十一其樹不生耳乃至孤峯獨宿一食卯齋長坐不臥六時行道皆是造業底人乃至頭目髓腦國城妻子象馬七珍盡皆捨施如是等見皆是苦身心故還招苦果不如無事純一無雜乃至十地滿心菩薩皆求此道流蹤跡了不可得所以諸天歡喜地神捧足十方諸佛無不稱歎緣何如此為今聽法道人用處無蹤跡問大通智勝佛十劫坐道場佛法不現前不得成佛道未審此意如何乞師指示師云大通者是自己於處處達其萬法無性無相名為大通智勝者於一切處不疑不得一法名為智勝佛者心清淨光明透徹法界得名為佛十劫坐道場者十波羅密是佛法不現前者佛本不生法本不滅云何更有現前不得成佛道者佛不應更作佛古人云佛常在世間而不染世間法道流你欲得作佛莫隨萬物心生種種法生心滅種種法滅一心不生萬法無咎世與出世無佛無法亦不現前亦不曾失設有者皆是名言章句接引小兒施設藥病表顯名句且名句不自名句還是你目前昭昭靈靈鑒覺聞知照燭底安一切名句大德造五無間業方得解脫問如何是五無間業師云殺父害母出佛身血破和合僧焚燒經像等此是五無間業云如何是父師云無明是父你一念心求起滅處不得如響應空隨處無事名為殺父云如何是母師云貪愛為母你一念心入欲界中求其貪愛唯見諸法空相處處無著名為害母云如何是出佛身血師云你向清淨法界中無一念心生解便處處黑暗是出佛身血云如何是破和合僧師云你一念心正達煩惱結使如空無所依是破和合僧云如何是焚燒經像師云見因緣空心空法空一念決定斷逈然無事便是焚燒經像大德若如是達得免被佗凡聖名礙你一念心祇向空拳指上生寔解根境法中虗揑恠自輕而退屈言我是凡夫佗是聖人禿屢生有甚死急披佗師子皮却作野干鳴大丈夫漢不作丈夫氣息自家屋裏物不肯信祇麼向外覔上佗古人閑名句倚陰愽陽不能特達逢境便緣逢塵便執觸處惑起自無准定道流莫取山僧說處何故說無憑據一期間圖畵虗空如彩畵像等喻道流莫將佛為究竟我見猶如廁孔菩薩羅漢盡是枷鎻縛人底物所以文殊仗劒殺於瞿曇鴦掘持刀害於釋氏道流無佛可得乃至三乘五性圓頓教迹皆是一期藥病相治並無實法設有皆是相似表顯路布文字差排且如是說道流有一般禿子便向裏許著功擬求出世之法錯了也若人求佛是人失佛若人求道是人失道若人求祖是人失祖大德莫錯我且不取你解經論我亦不取你國王大臣我亦不取你辯似懸河我亦不取你聰明智慧唯要你真正見解道流設解得百本經論不如一箇無事底阿師你解得即輕懱他人勝負修羅人我無明長地獄業如善星比丘解十二分教生身陷地獄大地不容不如無事休歇去飢來喫飯睡來合眼愚人笑我智乃知焉道流莫向文字中求心動疲勞吸冷氣無益不如一念緣起無生超出三乘權學菩薩大德莫因循過日山僧往日未有見處時黑漫漫地光陰不可空過腹熱心忙奔波訪道後還得力始到今日共道流如是話度勸諸道流莫為衣食看世界易過善知識難遇如優曇花時一現耳你諸方聞道有箇臨濟老漢出來便擬問難教語不得被山僧全體作用學人空開得眼口總動不得懵然不知以何答我我向伊道龍象蹴踏非驢所堪你諸處祇指𮌎點肋道我解禪解道三箇兩箇到這裏不奈何咄哉你將這箇身心到處簸兩片皮誑謼閭閻喫鐵棒有日在非出家兒盡向阿修羅界攝夫如至理之道非諍論而求激揚鏗鏘以摧外道至於佛祖相承更無別意設有言教落在化儀三乘五性人天因果如圓頓之教又且不然童子善財皆不求過大德莫錯用心如大海不停死屍祇麼擔却擬天下走自起見障以礙於心日上無雲麗天普照眼中無翳空裏無花道流你欲得如法但莫生疑展則彌綸法界収則絲髮不立歷歷孤明未曾欠少眼不見耳不聞喚作什麼物古人云說似一物則不中你但自家看更有什麼說亦無盡各自著力珍重勘辨黃檗因入厨次問飯頭作什麼飯頭云揀眾僧米黃檗云一日喫多少飯頭云二石五黃檗云莫太多麼飯頭云猶恐少在黃檗便打飯頭却舉似師師云我為汝勘這老漢纔到侍立次黃檗舉前話師云飯頭不會請和尚代一轉語師便問莫太多麼黃檗云何不道來日更喫一頓師云說什麼來日即今便喫道了便掌黃檗云這風顛漢又來這裏捋虎鬚師便喝出去後溈山問仰山此二尊宿意作麼生仰山云和尚作麼生溈山云養子方知父慈仰山云不然溈山云子又作麼生仰山云大似勾賊破家師問僧什麼處來僧便喝師便揖坐僧擬議師便打師見僧來便竪起拂子僧禮拜師便打又見僧來亦竪起拂子僧不顧師亦打師一日同普化赴施主家齋次師問毛吞巨海芥納須彌為是神通妙用本體如然普化踏倒飯牀師云太麤生普化云這裏是什麼所在說麤說細師來日又同普化赴齋問今日供養何似昨日普化依前踏倒飯牀師云得即得太麤生普化云瞎漢佛法說什麼麤細師乃吐舌師一日與河陽木塔長老同在僧堂地爐內坐因說普化每日在街市掣風掣顛知佗是凡是聖言猶未了普化入來師便問汝是凡是聖普化云汝且道我是凡是聖師便喝普化以手指云河陽新婦子木塔老婆禪臨濟小廝兒却具一隻眼師云這賊普化云賊賊便出去一日普化在僧堂前喫生菜師見云大似一頭驢普化便作驢鳴師云這賊普化云賊賊便出去因普化常於街市搖鈴云明頭來明頭打暗頭來暗頭打四方八面來旋風打虗空來連架打師令侍者去纔見如是道更把住云總不與麼來時如何普化托開云來日大悲院裏有齋侍者回舉似師師云我從來疑著這漢有一老宿參師未曾人事便問禮拜即是不禮拜即是師便喝老宿便禮拜師云好箇草賊老宿云賊賊便出去師云莫道無事好首座侍立次師云還有過也無首座云有師云賓家有過主家有過首座云二俱有過師云過在什麼處首座便出去師云莫道無事好後有僧舉似南泉南泉云官馬相踏師因入軍營赴齋門首見員僚師指露柱問是凡是聖員僚無語師打露柱云直饒道得也祇是箇木橛便入去師問院主什麼處來主云州中糶黃米去來師云糶得盡麼主云糶得盡師以杖面前畫一畫云還糶得這箇麼主便喝師便打典座至師舉前語典座云院主不會和尚意師云你作麼生典座便禮拜師亦打有座主來相看次師問座主講何經論主云某甲荒虗粗習百法論師云有一人於三乘十二分教明得有一人於三乘十二分教明不得是同是別主云明得即同明不得即別樂普為侍者在師後立云座主這裏是什麼所在說同說別師回首問侍者汝又作麼生侍者便喝師送座主回來遂問侍者適來是汝喝老僧侍者云是師便打師聞第二代德山垂示云道得也三十棒道不得也三十棒師令樂普去問道得為什麼也三十棒待伊打汝接住棒送一送看他作麼生普到彼如教而問德山便打普接住送一送德山便歸方丈普回舉似師師云我從來疑著這漢雖然如是汝還見德山麼普擬議師便打王常侍一日訪師同師於僧堂前看乃問這一堂僧還看經麼師云不看經侍云還學禪麼師云不學禪侍云經又不看禪又不學畢竟作箇什麼師云總教伊成佛作祖去侍云金屑雖貴落眼成翳又作麼生師云將謂你是箇俗漢師問杏山如何是露地白牛山云吽吽師云啞那山云長老作麼生師云這畜生師問樂普云從上來一人行棒一人行喝阿那箇親普云總不親師云親處作麼生普便喝師乃打師見僧來展開兩手僧無語師云會麼云不會師云渾崙擘不開與你兩文錢大覺到參師舉起拂子大覺敷坐具師擲下拂子大覺收坐具入僧堂眾僧云這僧莫是和尚親故不禮拜又不喫棒師聞令喚覺覺出師云大眾道汝未參長老覺云不審便自歸眾趙州行脚時參師遇師洗脚次州便問如何是祖師西來意師云恰值老僧洗脚州近前作聽勢師云更要第二杓惡水潑在州便下去有定上座到參問如何是佛法大意師下繩牀擒住與一掌便托開定佇立傍僧云定上座何不禮拜定方禮拜忽然大悟
