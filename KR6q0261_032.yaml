什麼處懺悔雲門道露者公案一似熱鐵一團在心中七年喫盡辛苦衆中久參方知更與你説晦堂初參禪時自桂府來先見雲峯悅和尚三年不會他説話又參南禪師二年不會却過去山主院裏過夏因看傳燈録僧問多福如何是多福一叢竹福云一莖兩莖斜晦堂遂開悟今時人祇喚作問答語蓋用功不子細不曉古人方便山僧相勸兄弟既在林下各自學道勿空過時以悟為則久立師云親近善友先聖叮嚀付囑也今時學者須是依佛祖之言尋師決擇始得若不恁麼何名學者若要明此事須是起疑參究你若深疑此事便是般若智現前何故行腳事祇要疑情息你若不起疑爭得疑情息不見先師三十五方落髮便在成都聽習唯識百法因聞説菩薩入見道時智與理冥境與神會不分能證所證外道就難既不分能所證却以何為證時無能對者不鳴鐘鼓返披袈裟後來唐三藏至彼救此義云智與理冥境與神會時如人飲水冷暖自知遂自思惟冷暖則可矣作麼生是自知底事無不深疑因問講師不知自知之理如何講師不能對乃云座主要明此理我却説不到南方有傳佛心宗尊宿却知此事汝須行腳始得先師便行腳遊京師兩浙凡是尊宿便問此事無不對者也有説底也有下語底祇是疑情不破後來浮渡山見圓鑑看他升堂入室所説者盡皆説著心下事遂住一年令看如來有密語迦葉不覆藏之語一日云子何不早來吾年老矣可往參白雲端和尚先師到白雲一日上法堂便大悟如來有密語迦葉不覆藏果然果然智與理冥境與神會如人飲水冷暖自知誠哉是言也乃有投機頌云山前一片間田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風端和尚了點頭諸人此豈不是深疑了親近善知識然後明得祇如先師行腳參善知識後來却道問祖翁是如何自賣了却自買是如何須知無有剩也古人道總是你又道我未嘗有一句子到你若有一句子到你堪作什麼諸人要疑情破麼亦須是似先師一回始得久立師云你但看馬大師見僧下階乃召云大德僧回首大師云從生至老祇是者漢回頭轉腦作什麼其僧言下領旨此理如何從生至老祇是者漢你道是那箇漢你才起心要見者漢時便不見者漢者漢難見千難萬難今時人祇道是者箇漢更是阿誰不可別有也一百箇中有九十九箇如是會有甚巴鼻若恁麼如何明得從生至老底事如何便見得祇是者漢你若不見者漢四大五蘊總未知下落處且如祇今説法聽法是有説聽是無説聽若道你立我坐我説你聽三家村裏人也解恁麼道焉敢稱禪客若謂無聽無説又道從生至老祇是者漢所以到此須是求一箇了達底人決擇山僧向前未明得時總不奈何了便請益先師才問著時先師祇道我不會我不知我不如你又問禪畢竟是易參難參祇向我道你無事問難問易作麼參禪喚作金屎法未會一似金會了一似屎山僧甚不肯此語如今思量了語雖粗其間旨趣不淺此盡是了達之士發一言半句皆不虗也凡為人時皆不胡亂指示亦不亂許人今時有諸方知識有時説得是有時説得無巴鼻此理如何蓋為他亦未了達有時許人道是有時却道不是若如此爭明得從生至老祇是者漢子細看來今時人也祇是舊時人今時作用也祇是舊時作用千變萬化也祇是要你者裏自肯一肯方始得了當今時人不了當者祇是不解決擇如何是不解決擇處祇是將古人言句作解會將自己來錐鑽祇是如此到彌勒下生也不會何故向你道回頭轉腦便不是了也向者裏省力處更不用如何若何直下明取你諸人先將道理近前用古人言句自纏自縛一似淨淨潔潔一片地却將一手土撒在上面相似山僧前日入室垂示道你如今到者裏不可也似適來相似須有箇會處始得有者道適來也祇恁麼如今也祇恁麼你先走入情識裏了爭怪得你古人多少慈悲向你道行是佛行坐是佛坐一切法皆是佛法一切聲皆是佛聲你錯會了便道一切聲真箇是佛聲一切色真箇是佛色既不許如此會却如何即是向你道才涉眹兆時早支離了也欲將智照顯他時早昏暗了也如今但莫取我口各自由你做功夫看古人因緣亦得靜坐亦得一切處觀察亦得皆是你做功夫處一切處是你證入處但一處精專日來月往須被你打發去不見古靈和尚行腳歸其師問云汝離吾行腳得何事業曰某見百丈得箇安樂處遂舉百丈頌云靈光獨耀逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛其師於言下省悟又雪峯和尚見風吹芋葉動遂指似僧僧云某甲甚生怕怖峯咄云是你屋裏事怕作什麼其僧亦有省既一時是你屋裏事為什麼却不會蓋為你隨處流浪不常在家但如今對善知識時莫教忘却喚作順理而行就己知歸復云從生至老祇是者漢回頭轉腦作什麼各自看取久立師云如今明得了向前明不得底在什麼處如今明不得到幾時明得去祇恁麼翻覆體究也須會去所以道向前迷底便是即今悟底即今悟底便是向前迷底若言從前迷即今悟也又言明來暗謝智起惑忘恁麼還得麼那裏得如此則有暗可滅有惑可除不見古人道不改舊時人祇改舊時行履處你禪和家道有什麼難迷也祇是者漢悟也祇是者漢不可別有及乎問著他那箇是者漢便去不得不然胡説蓋緣未曾諦當證入此是諸人入骨髓底病謬底漢便認著一生休非但一生千生萬生亦祇休去若是靈利底他須解體究那箇是者漢直求入路處師乃噓一聲今時佛法淡泊衆中也難得人諸人既在龍門學道不可空過十二時管帶搆取見諸人也似不爭多你不見臨濟和尚道赤肉團上有一無位真人常從汝等諸人面門出入未證據者看時有僧出問如何是無位真人濟下禪床把住曰道道僧擬議濟便拓開又道汝眼放光照破山河也古人多少慈悲如今人不以為事須是尋人決擇你不見嵓頭雪峯欽山去見臨濟路上逢定上座頭問什麼處來定云臨濟來頭云和尚萬福定云和尚已遷化也頭云某等特去禮拜又值和尚遷化不知和尚有何言句請上座舉一兩則定遂舉臨濟上堂示衆云赤肉團上有一無位真人常從汝等諸人面門出入未證據者看看時有僧問如何是無位真人濟下禪牀擒住云道道僧擬議濟便托開云無位真人是什麼乾屎橛便歸方丈嵓頭不覺吐舌欽山云何不道赤肉團上非無位真人定便擒住云且道無位真人與非無位真人相去多少速道速道欽山直得面青面黑嵓頭雪峯同勸云者新戒觸忤上座且望慈悲定云若不是者兩箇老漢𡎺殺者尿牀子你看他道非無位真人定何故不肯今時學者那裏到者般田地祇管認箇五蘊身田強作主宰不能放下我今舉幾則語教諸人看雪峯參投子問者裏還有人參麼子擲下鋤頭峯云恁麼則當處掘也子云不快漆桶他道當處掘尚做漆桶又有南際長老見雪峯語論無不相契峯令見玄沙沙問古人道此事唯我能知長老作麼生會際云須知有不求知者沙云山頭老漢喫許多辛苦作麼你道此理如何又先師在海會端和尚會中時端和尚舉古人道如鏡儔像像成後鏡光向什麼處去會中有頭角兄弟下語皆不契端和尚云須是道者子始得先師時作街坊却從外歸端和尚舉前話問之先師近前問訊云也不爭多端和尚撫掌大笑人皆謂摩捋他教做化主什麼説話山僧此中祇要學道如要學道十二時中須是先去却無明人我何故人我乃庸人之事先師一生無人我山僧在他身畔作侍者見多少不曾有一念煩惱曾説舊時有箇上座在海會做知客先師因送一箇長老住四面乃率知客相送不知如何者上座便劈面唾先師你是甚人却教我送他惡言不止先師遂休總無人知得後來仍來太平先師請伊作知藏又做首座復自求作監院亦從之及先師住海會乃舉住太平知州不肯又惡罵謂不主張他先師方出言道者漢兩度罵我也以此見伊無人我今人才有些言語便要理會如此作麼生學道有時見初機兄弟入室祇是爭山僧他了也不奈何一似村裏人把扁簷共上將軍鬪我者裏七事隨身手中是關羽八十斤刀他便把扁簷劈頭打一棒見人不動又連打數下去我不是怕他蓋不是對手呵呵勸諸人不要粗心日夜行持做箇向上人縱然不悟亦是高上之士切須用心久立師云你才認著道是便被縛腳縛手更轉動不得也則被你一認認了縱有千般亦不是也你若不認著却有箇救處譬如造得一隻船上面一一裝載了要千里外至乎寶所才動手你先自釘下樁繫却船了却用力搖櫓你搖到彌勒下生也祇在岸邊你見船東簸西簸將謂是轉動又何曾離得一步來又似磨茶漢子從早至夜團欒旋轉極是好笑若眼目不分明底見你認著向你道是也被明眼人見點檢出來多少露栓索如今多分祇用箇如今底道總離如今不得祇被恁麼地釘下樁參學不得旨趣一時把來錯會了做箇主宰不知佛法不恁麼會不見麻谷持錫見章敬谷振錫一下卓然而立敬曰是是又見南泉亦如前泉曰不是不是谷曰章敬道是和尚何得道不是泉曰章敬則是是汝不是此是風力所轉終歸敗壞谷方省過你諸人看幾錯會一生爭得不就人決擇山僧初行腳時見先師偈句便信道此人似古聖説底事必有實證處便十年間參扣先師頌道學道先須得旨歸聞聲見色不思議若憑言語論高下一似從前未悟時又云空門有路人皆到到者方知旨趣長心地不生間草木自然身放白毫光我後生時雖造道未得心中知此非常句也祇如聞聲見色皆可思議又何緣得不思議及乎論箇證處却云一似未悟時未悟時皆可思議如何見箇證處此人得無所得至究竟地方解如此我後來十年外始領他事大凡行腳學道參尋莫癡坐就人決擇此法難了喚作隔宿不問道若得了便別也昨日也喫粥喫飯今日也喫粥喫飯豈昔人耶別也不同也趙州向人道喫粥了也未曰喫粥了也州曰洗鉢盂去便是別也吾豈常人也你道何處是別處久立
