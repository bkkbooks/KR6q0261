body:
  text: 舒州龍門佛眼和尚普説語録住南康雲居嗣法善悟編師到禪牀前立云山僧立地待你諸人搆去還搆得麼良久遂坐曰看見了也不易作箇主宰不見古人喚僧云上座僧回首古人云擔板漢正當恁麼時如何作箇主宰免他喚作擔板漢此事也不易搆喚作業識茫茫不見溈山問仰山盡大地人業識茫茫子如何辨仰山云某有箇驗處溈山云作麼生驗時有一僧從面前過仰山云上座上座其僧回首仰山曰祇者箇便是業識茫茫師云正當恁麼時如何作箇主宰免被他道業識茫茫去有般禪僧家強作主宰道待他喚時但莫應他便去應他作什麼你又不是木頭有底不然豎一拳下一咄喚作強作主宰且問你者裏喚時且從你豎拳下咄祇如前廊後架照顧不到忽然被人問著又如何祇對不可更下一咄豎一拳却須是實始得此事直是平等不論貴賤你看陳操尚書是箇俗官一日與僚屬在樓上見數僧打包過有一官人云數員禪客操云未信在待與勘過僧行到樓前操喚云上座僧皆舉頭操顧謂僚屬云不信道當恁麼時如何作得箇主宰免被他勘破古人道擔板漢則且置祇如後來人又道者僧喚既回頭因什麼却成擔板又作麼生會佛法到此信知有深遠處須久久淹浸不可強作主宰久立師云大凡修行須是離念此箇門中最是省力祇要離却情念明得三界無法方解修行離此外修較似辛苦不見古來有一持戒僧一生持戒忽因夜行踏著一物作聲謂是一蝦蟆腹中有子無數驚悔不已忽然睡著夢見數百蝦蟆來問索命其僧深懷怖懼及至天曉觀之乃一老茄耳其僧當下疑情頓息方知道三界無法始解履踐修行山僧問你諸人祇如夜間踏著時為復是蝦蟆為復是老茄若是蝦蟆天曉看是老茄若是老茄天未曉時又有蝦蟆索命還斷得麼山僧試為諸人斷看蝦蟆情已脫茄解尚猶存要得無茄解日午打黃昏久立一日衆集師出來大衆前行兩匝長噓一聲云山僧在你諸人肚裏走兩遭了也還知麼非但今日如此常在你諸人肚裏走來走去還知得麼喚作無瞞人之心實是如此山僧盡知得你是好是惡所以道諸人知處良遂總知良遂知處諸人不知良遂座主是箇解義阿師却明得者箇事不見一日去見麻谷谷見來不管他自將鋤入菜園裏良遂亦隨後去谷亦不顧便歸方丈閉却門他於是定省精神忽然明得便道和尚莫瞞良遂好你諸人如今還得恁麼也無也不易搆更有百丈會下古靈和尚得法歸來接他受業師非但古人今人亦有不見四五十年前有茶陵郁和尚作山主時因廬山化士到言話間為舉僧問法燈百尺竿頭如何進步燈云噁由是每日參詳至於喫粥喫飯時未嘗離念一日因赴外請騎驢子過橋橋損陷驢子腳倒不覺口中云噁忽然大悟乃有悟道頌云我有明珠一顆久被諸塵封褁今朝塵盡光生照破山河朵朵者箇便是樣子喚作實頭參學今時人但恁麼學取若信言語解會要明者箇事明不得也將合頭語合者箇事合不得也須知有省悟之由若真實參學但恁麼看據現定會些子言句便休也在諸人彼此行腳決擇生死大事不可據現定便休去也須是與他古人相似自討箇省發處始有真實參學分久立師云本有之性因什麼不會佛法無多子祇要省徑也不教滅除妄想遏捺身心閉目合眼便道是此事不如斯也須看現定是何道理為什麼却迷去恁麼最是親切祇如老僧未説向你諸人未曾聽時還有往來底分麼正當恁麼時切忌強作道理上至諸佛下至一切總皆如是所以聖與凡等邪與正等生死與涅槃等且問諸人過去毗婆尸佛迦葉佛古今三世是什麼人分上事十方有漏剎土是什麼人分上事山僧道總是你三十年後悟去始知龍門老僧説來切不得道是若恁麼此名外道見解久立師云如今被人問著道不得過在什麼處蓋為於無色處見色無聲處聞聲無道理處強作道理無主宰中強作主宰者裏消遣不下喚作翳眼猶存空花亂墜何故祇為心存在便道不得佛法無多子祇要平白地道得一句子便了且道作麼生是平白地一句子若有人問山僧祇向伊道兩句了也還會麼古人道佛祖言外邊事一一分明説了也祇是到者裏多是錯亂昏醉不省此若不見便是立地瞌睡漢子也諸人常在光明中開眼見了而不知教山僧怎生奈何久立師云恁麼與你東舉西舉便道與你説禪才轉腳時便作世諦流布將去你但念念在其中便有省發底分看來多祇在眼耳見聞覺觸處蹉過了也須是不離分別心識取無分別心不離見聞識取無見聞底不是長連牀上閉目合眼喚作無見須是即見處便有無見所以道居見聞之境而見聞不到居思議之地而思議不及久立師云諸人上來要箇什麼事須是當人自作活計莫聽他人説古人道我十八上便解作活計你諸人須是解自作活計始得你道作箇什麼活計但莫別求如今人多愛動腳動手者箇不解作活計了也喚作拋家散宅漂流去分明不會祇管尋討學些子知解記些子言句此喚作運糞入到者裏須是行李正當日久月深淹浸得熟便會去古人道一切處是你東去也是你西去也是你你是阿誰若云某甲者箇是情識須是透得過始得昔日天親問無著兄往內院見彌勒説什麼法著云説者箇法且道者箇是什麼法須是揀得出始得不要認著者箇多是被者箇一句子瞞住了也所以説病為法是故名為可憐愍者久立師云莫謂如今説底是未是在若有箇是便有箇不是所以道一切言句皆不與此事相應直須相應去此事不在別人還得相契也未且契契阿誰若道契於古人古人已往若道契他善知識善知識與你無交涉所以諸聖慈悲告報教契自心源且道那箇是自契底心源若有心可契決然契不得須是以無心之心則契矣久立師云十二時中須有箇契合處始得你豈不見靈雲一見桃花便契合此事香嚴擊竹便乃息心古人道若不契合此事則山河大地瞞你也燈籠露柱欺你也如今四生六道浩浩地祇為此事不明奉勸諸兄弟且先去却粗緣你十二時中思衣念食種種雜慮如燈焰相似未有一時停歇但除粗緣所有微細自然淨盡日久歲深自然會去也不著參喚作息意忘緣不與諸塵作對所以西來妙旨意在自明龍門長老也無禪與人參也無法與你商量祇要諸人自契參學門中唯以忘緣息慮為要者箇是從上宗旨祖不云乎以無念為宗無相為體若祇一喝一拍有什麼了期久立師云弘道而心常淡泊順事而意識奔馳但願道富身貧情踈德厚山僧者裏日日恁麼時時恁麼且道恁麼是什麼離却分別心識意度言句外道將一句來此事無你解會處如今但是心慮覺觀者皆有箇解會得及乎返窮己眼返思思慮之心為什麼人到者裏不知便説道從本已來非青黃赤白無相無狀我説向你道此喚作言語不是你本心本心如何思量己眼如何得見正當返觀時亦無能見之者有人去者裏一口吞盡慧眼豁開頓達本鄉也今時人若為到無見無聞處現定萬法亘然見人見屋種種萬象如湯涌沸未有一時停住祇如作嬰兒時也聞聲也見色祇是不解分別才曉事來便釆聽分別自那時前後分披了也到者裏要人整理不妨難為他得道人行時不見行坐時不見坐所以如來道眼見色與盲等耳聞聲與響等作麼生説如盲如響聞聲時無聲可聞見色時無色可見所見所聞皆如響等又如夢時見種種境界覺來還有許多般也無若有牀上祇是被與枕子若道無許多般又心中歷歷地記得説得如今白日所見所聞亦復如是所以道眼見耳聞底事經論可學唯有靈臺作麼生學久立師云釋迦老子在什麼處自云作麼作麼復云達磨大師在什麼處自云祇在作麼生説祇在底道理也不妨難明若於斯明得始知正法常住禪僧家多分祇道那舉處便是你若身壞命盡時若病説不得時又作麼生須是證入始得不見僧問德山從上諸聖向什麼處去山云作麼作麼莫是作麼便是諸聖麼你諸人若不將言語會便落他聲響流布縱饒不墯他聲響言句便落他無言無説處此事實無你意解卜度若存一絲毫便成趣向於己踈也饒你將玄機妙義去合他決定合不著若總不思量亦不可須是親證始得明見無疑矣久立師云今時人參學錯學不出二種病一是五蘊窟宅無言無説無形無段湛然不動處便道任他佛祖出來我也祇恁麼此是一病次認能言能語能聞運用施為行住坐臥者此亦是一病你還知道動是苦本風力所持麼若有人能離此二病解去體究者此人須有箇省發時節若不如是亦無整頓處又有二種善知識為兩般學人方便苦口有一般學人自作道理自吐箇消息進前退後豎拳合掌以為禪道善知識見他恁麼便苦口向伊道你錯會了也你無事硬認著作麼此是一種善知識又有一般學者云某甲不會不知未審如何某甲並無箇契入處是故善知識見伊恁麼了便向伊道你無事用求會求入作麼此亦是一種善知識前後兩般學者若聞善知識恁麼道善能回光體究必然明得若祇管道不會是自生退屈任是一千年也祇恁麼幸在其中更道不會求契合有什麼了日要會麼須是不立限量直下搆取始得久立師云今夜與你諸人説箇譬喻恰似諸人有箇眼能照見一切長短方圓等象為什麼却不自見但識取長短方圓等象若要見眼則不可你心亦如是其光照矚通徹十方包容萬有為什麼却不自知要會麼但識取照矚等事若見心則不可也古人道刀不自割指不自觸心不自知眼不自見則真實矣久立師云諸人許多時在此立地還見一人真善知識麼不可空立去也山僧祇喚作假長老先聖所以道但以假名字引導於衆生佛是西天老比丘不勞仁者分別取相何者是釋迦老人阿那箇是達磨大師祖師未來此時還有佛法麼作麼生道無得若道無祇成自瞞在少林面壁時還有許多言教公案麼恁麼得破多少省徑你不上來時山僧亦不見你上座亦不見山僧你不見我我不見你如何辨明若明得復有何事佛未出世時也恁麼佛出世後也恁麼佛滅度後也恁麼若到恁麼田地實無一星事你諸人行住坐臥飢餐渴飲怎生説箇無事除非見到底人方解如是昔大迦葉在靈山會上禮佛見彼大衆儼然便有箇見處道今此諸大衆如本未曾有你道此意如何諸人適來在下頭不見有許多人及乎上來分明見有許多人怎生説箇如本未曾有古有老宿問僧近離什麼處云城中宿云如今在什麼處云山中宿云我有一問問你若道得即住若道不得即去上座離城中城中少上座上座到山中山中剩上座城中若無上座則心法不周山中剩上座則心外有法僧無語諸人苟能於此參詳得所謂不落斷常二見六根怡然行住寂默一心不生萬緣俱息如或不然隨有隨無落斷落常譬如捨父逃走也到者裏實是不教你費一絲毫力便恁麼會取你若要和合者事教無縫罅時早已離披了也山僧往日思惟此事將謂三生兩生始可得悟去後來祇聞什麼人打發什麼人有見處便覺今人也解悟得時寒省緣辦得明究己躬此是大事久立師云若有人問你作麼生道還道得麼你等思量管帶道得一句子來有什麼用處三更半夜作麼生道天明起來作麼生道前廊後架作麼生道還道得麼須是眼明始得久立師云適來侍者報道雨不住若參時恐大衆不聞如今雨住也諸人還聞麼山僧道雨不住時最親切何故却為諸人無釆聽底心祇如諸方示人道雨聲為你説法了也還端的也無山僧即不然雨聲是你説法了也還會得麼直下明得更有什麼一絲毫頭子也今時行腳人須待將一句子契他善知識恁麼自苦自屈作什麼我更問你契那箇善知識若要契他善