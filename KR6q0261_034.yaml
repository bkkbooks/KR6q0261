  - {type: 其他, offset: 54, content: 世尊陞座文殊白槌, id: KR6q0261_X_034-mulu-3, level: '3'}
  - {type: 其他, offset: 90, content: 世尊拈花迦葉微笑, id: KR6q0261_X_034-mulu-4, level: '3'}
  - {type: 其他, offset: 126, content: 二祖請達磨安心, id: KR6q0261_X_034-mulu-5, level: '3'}
  - {type: 其他, offset: 161, content: 六祖風幡, id: KR6q0261_X_034-mulu-6, level: '3'}
  - {type: 其他, offset: 207, content: 國師三喚侍者, id: KR6q0261_X_034-mulu-7, level: '3'}
  - {type: 其他, offset: 233, content: 百丈野鴨子, id: KR6q0261_X_034-mulu-8, level: '3'}
  - {type: 其他, offset: 266, content: 百丈歸與同事坐次忽然哭事問曰憶父母耶丈云無事曰被人罵耶丈云無事曰哭作什麼丈云問取和尚事往問大師大師曰你去問取他事回至寮中見百丈呵呵大笑事曰適來為什麼哭而今為什麼却笑丈曰適來哭而今笑同事惘然, id: KR6q0261_X_034-mulu-9, level: '3'}
  - {type: 其他, offset: 388, content: 馬祖陞堂百丈捲席, id: KR6q0261_X_034-mulu-10, level: '3'}
  - {type: 其他, offset: 424, content: 百丈再參馬祖, id: KR6q0261_X_034-mulu-11, level: '3'}
  - {type: 其他, offset: 458, content: 黃蘗一日問百丈曰和尚在大師處有甚奇特言句乞師不恡丈遂舉再參馬祖因緣乃曰我當時被大師一喝直得三日耳聾黃蘗不覺縮項吐舌丈曰子已後莫承嗣馬祖麼蘗曰不然今因和尚得見馬祖大機大用要且不識馬祖若承嗣馬祖恐已後喪我兒孫丈曰如是如是, id: KR6q0261_X_034-mulu-12, level: '3'}
  - {type: 其他, offset: 586, content: 百丈開田說大義, id: KR6q0261_X_034-mulu-13, level: '3'}
  - {type: 其他, offset: 613, content: 黃蘗問百丈從上宗乘苗裔此間如何商量百丈默然蘗曰教後人如何委悉丈云我將謂你是箇人便起去蘗隨後入方丈曰某甲得得而來祇要箇印信足矣丈曰若恁麼他後不得辜負老僧, id: KR6q0261_X_034-mulu-14, level: '3'}
  - {type: 其他, offset: 716, content: 百丈一日問黃蘗何處去來蘗曰大雄山下採菌子來丈曰還見大蟲麼蘗便作虎聲丈便抽斧作斫勢蘗約住便與一掌丈便休至晚上堂謂眾曰大雄山下有一虎汝等諸人好看老漢今日親遭一口, id: KR6q0261_X_034-mulu-15, level: '3'}
  - {type: 其他, offset: 822, content: 百丈問黃蘗甚處來蘗云開田來丈云辛苦不易蘗云隨眾作務丈云有勞道用蘗云爭敢辭勞丈云開得多少田蘗遂钁地數下丈便喝蘗掩耳而去, id: KR6q0261_X_034-mulu-16, level: '3'}
  - {type: 其他, offset: 908, content: 黃蘗示眾汝等諸人盡是噇酒槽漢, id: KR6q0261_X_034-mulu-17, level: '3'}
  - {type: 其他, offset: 950, content: 黃蘗一日在南泉位中坐南泉遂問長老是甚年中行道蘗云威音王佛已前泉云猶是王老師孫在蘗遂歸本位坐, id: KR6q0261_X_034-mulu-18, level: '3'}
  - {type: 其他, offset: 1023, content: 南泉問黃蘗定慧等學明見佛性此理如何蘗云某甲十二時中不依倚一物泉云莫是長老見處麼蘗云不敢泉云漿水錢且置草鞋錢教什麼人還蘗不對, id: KR6q0261_X_034-mulu-19, level: '3'}
  - {type: 其他, offset: 1112, content: 南泉門送黃蘗泉曰如許大身材戴椰子大笠子蘗云三千大千世界總在裏許泉曰王老師𠰚黃蘗戴笠子便行, id: KR6q0261_X_034-mulu-20, level: '3'}
  - {type: 其他, offset: 1176, content: 百丈問南泉何處來泉曰江西來丈曰還將得馬師真來麼泉曰祇這是丈曰背後底𠰚泉拂袖便出, id: KR6q0261_X_034-mulu-21, level: '3'}
  - {type: 其他, offset: 1243, content: 南泉坐次一僧叉手而立泉云太俗生僧合掌泉云太僧生僧無對, id: KR6q0261_X_034-mulu-22, level: '3'}
  - {type: 其他, offset: 1297, content: 洞山謂雲居云昔南泉問座主講何經論主云彌勒下生經泉云彌勒幾時下生主云現在天宮當來下生泉云天上無彌勒地下無彌勒時雲居遂問洞山祗如天上無彌勒地下無彌勒未審誰與他安名著字洞山直得禪床震動乃曰膺闍黎, id: KR6q0261_X_034-mulu-23, level: '3'}
  - {type: 其他, offset: 1419, content: 南泉示眾云馬大師道即心即佛又云非心非佛老僧却不恁麼不是心不是佛不是物恁麼道還有過也無趙州出禮拜歸眾僧問趙州適來禮拜歸眾意作麼生州云却問取和尚僧上問南泉適來諗上座意作麼生泉云他却領得老僧意旨, id: KR6q0261_X_034-mulu-24, level: '3'}
  - {type: 其他, offset: 1541, content: 南泉斬猫兒, id: KR6q0261_X_034-mulu-25, level: '3'}
  - {type: 其他, offset: 1574, content: 晚趙州從外歸泉舉前話問之州脫草鞋戴頭上而出泉云子適來若在即救得猫兒, id: KR6q0261_X_034-mulu-26, level: '3'}
  - {type: 其他, offset: 1635, content: 南泉．歸宗．麻谷三人去禮忠國師, id: KR6q0261_X_034-mulu-27, level: '3'}
  - {type: 其他, offset: 1676, content: 大隋葢龜, id: KR6q0261_X_034-mulu-28, level: '3'}
  - {type: 其他, offset: 1708, content: 俱胝豎指, id: KR6q0261_X_034-mulu-29, level: '3'}
  - {type: 其他, offset: 1740, content: 德山參見龍潭吹紙燭, id: KR6q0261_X_034-mulu-30, level: '3'}
  - {type: 其他, offset: 1778, content: 魯祖面壁, id: KR6q0261_X_034-mulu-31, level: '3'}
  - {type: 其他, offset: 1810, content: 雪峯示眾云望州亭與上座相見了也烏石嶺與上座相見了也僧堂前與上座相見了也, id: KR6q0261_X_034-mulu-32, level: '3'}
  - {type: 其他, offset: 1873, content: 米和尚令僧問仰山今時人還假悟也無山云悟即不無爭柰落在第二頭米聞深肯之, id: KR6q0261_X_034-mulu-33, level: '3'}
  - {type: 其他, offset: 1935, content: 金牛和尚每至齋時自將飯於僧堂前作舞呵呵大笑云菩薩子喫飯來, id: KR6q0261_X_034-mulu-34, level: '3'}
  - {type: 其他, offset: 1991, content: 玄沙三種病人, id: KR6q0261_X_034-mulu-35, level: '3'}
  - {type: 其他, offset: 2021, content: 破竈墮和尚居嵩嶽山塢有一廟甚靈廟中唯安一竈遠近祭祀不歇烹殺物命甚多師一日領侍者入廟以拄杖敲竈數下云汝本磚瓦泥土合成靈從何來聖從何起又敲數下竈乃隳破墮落師云破也墮也須臾有一青衣峩冠忽然設拜師前師云是什麼人神云我本廟神久受業報今日蒙和尚說無生法忍遂得生天特來禮謝師曰是汝本有之性非吾強言神再禮而沒, id: KR6q0261_X_034-mulu-36, level: '3'}
  - {type: 其他, offset: 2195, content: 大眾遂曰如某等久在和尚左右不蒙示誨適來竈神說何法便得解脫師曰我也別無道理祇向伊道元是一堆泥土合成靈從何來聖從何起你等諸人何不禮拜眾遂作禮師云破也墮也大眾一時悟入, id: KR6q0261_X_034-mulu-37, level: '3'}
  - {type: 其他, offset: 2307, content: 趙州勘婆, id: KR6q0261_X_034-mulu-38, level: '3'}
  - {type: 其他, offset: 2347, content: 百丈野狐, id: KR6q0261_X_034-mulu-39, level: '3'}
  - {type: 其他, offset: 2379, content: 黃蘗問百丈古人錯答一轉話墮在野狐身今人轉轉不錯時如何丈曰近前來向汝道蘗近前打師一掌丈呵呵大笑云將謂胡鬚赤更有赤鬚胡, id: KR6q0261_X_034-mulu-40, level: '3'}
  - {type: 其他, offset: 2464, content: 司馬頭陀問溈山百丈野狐話你作麼生會溈山以手撼門扇三下司馬云太麤生溈山云佛法說甚麤細, id: KR6q0261_X_034-mulu-41, level: '3'}
  - {type: 其他, offset: 2525, content: 靈雲見桃花, id: KR6q0261_X_034-mulu-42, level: '3'}
  - {type: 其他, offset: 2558, content: 臨濟參黃蘗首座令問如何是佛法的的大意三度問三度被打, id: KR6q0261_X_034-mulu-43, level: '3'}
  - {type: 其他, offset: 2611, content: 雲門三頓棒, id: KR6q0261_X_034-mulu-44, level: '3'}
  - {type: 其他, offset: 2644, content: 雲門餬餅, id: KR6q0261_X_034-mulu-45, level: '3'}
  - {type: 其他, offset: 2682, content: 罽賓國王自將劒至師子尊者處問師得蘊空否尊者云已得王云既得蘊空可施我頭否尊者云身非我有豈況於頭王即斬之白乳高數丈王臂遂落, id: KR6q0261_X_034-mulu-46, level: '3'}
  - {type: 其他, offset: 2769, content: 仰山插鍬, id: KR6q0261_X_034-mulu-47, level: '3'}
  - {type: 其他, offset: 2801, content: 長慶萬象之中獨露身, id: KR6q0261_X_034-mulu-48, level: '3'}
  - {type: 其他, offset: 2838, content: 雪峯鼇山成道, id: KR6q0261_X_034-mulu-49, level: '3'}
  - {type: 其他, offset: 2872, content: 子胡狗, id: KR6q0261_X_034-mulu-50, level: '3'}
  - {type: 其他, offset: 2903, content: 鳥窠吹布毛, id: KR6q0261_X_034-mulu-51, level: '3'}
  - {type: 其他, offset: 2936, content: 玄沙虎, id: KR6q0261_X_034-mulu-52, level: '3'}
  - {type: 其他, offset: 2967, content: 五洩參石頭, id: KR6q0261_X_034-mulu-53, level: '3'}
  - {type: 其他, offset: 3000, content: 藥山一句子, id: KR6q0261_X_034-mulu-54, level: '3'}
  - {type: 其他, offset: 3033, content: 趙州喫茶, id: KR6q0261_X_034-mulu-55, level: '3'}
  - {type: 其他, offset: 3057, content: 盤山臨入滅垂示云還有人邈得吾真麼眾人競寫呈師師皆不納時普化出眾云某甲邈得山云何不呈似老僧看普化乃打筋斗而出, id: KR6q0261_X_034-mulu-56, level: '3'}
  - {type: 其他, offset: 3138, content: 女子出定, id: KR6q0261_X_034-mulu-57, level: '3'}
  - {type: 其他, offset: 3186, content: 良遂參見麻谷, id: KR6q0261_X_034-mulu-58, level: '3'}
  - {type: 其他, offset: 3220, content: 黃龍三關, id: KR6q0261_X_034-mulu-59, level: '3'}
  - {type: 其他, offset: 3260, content: 晦堂拳頭, id: KR6q0261_X_034-mulu-60, level: '3'}
  - {type: 其他, offset: 3292, content: 五祖老和尚凡見僧來便云屈屈僧云屈作什麼師云如今不屈更待何時, id: KR6q0261_X_034-mulu-61, level: '3'}
  - {type: 其他, offset: 3341, content: 又每見僧來展手問云何故喚作手, id: KR6q0261_X_034-mulu-62, level: '3'}
  - {type: 其他, offset: 3375, content: 又每遇僧請益祇云無這閑工夫, id: KR6q0261_X_034-mulu-63, level: '3'}
  - {type: 其他, offset: 3416, content: 室中垂示, id: KR6q0261_X_034-mulu-64, level: '2'}
  - {type: 其他, offset: 4569, content: 垂代, id: KR6q0261_X_034-mulu-65, level: '2'}
  - {type: 其他, offset: 6568, content: 示禪人心要, id: KR6q0261_X_034-mulu-66, level: '2'}
  - {type: 其他, offset: 9357, content: 三自省察, id: KR6q0261_X_034-mulu-67, level: '2'}
  - {type: 其他, offset: 9461, content: 誡問話, id: KR6q0261_X_034-mulu-68, level: '2'}
  - {type: 'cbeta:juan-end', offset: 9634, content: 古尊宿語錄卷第三十四, id: KR6q0261_X_034-juan-end, juan_n: '034', jhead: 古尊宿語錄卷第三十四}
  - {type: 序, offset: 9634, content: 佛眼禪師語錄序, id: KR6q0261_X_034-mulu-69, level: '2'}
  - {type: 序, offset: 9980, content: 宋故和州褒山佛眼禪師塔銘, id: KR6q0261_X_034-mulu-70, level: '2'}
