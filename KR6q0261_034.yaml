body:
  text: 舒州龍門佛眼和尚語録住南康雲居嗣法善悟編頌古外道問佛杲日連天照有無孰云善逝坐跏趺如今要見當年事邪正猶來在半途世尊升座文殊白槌法王法令若為酬潦倒文殊強出頭負纍釋迦猶可事至今千古閙啾啾世尊拈花迦葉微笑百萬人天望舉揚拈花微笑大乖張幾多業識茫茫者問著勞生沸似湯二祖請達磨安心若有絲毫付與人可師何得更全身人間天上迷逢處八兩元來是半斤六祖風幡非風幡動唯心動大海波瀾常洶湧魚龍出沒任升沉生死聖凡無別共無別共底怎麼樣祖佛傍觀空合掌國師三喚侍者潦倒江湖上竿頭事可咍一回浮子動又是上鈎來百丈野鴨子草裏尋常萬萬千報云飛去豈徒然鼻頭是甚間皮草十字縱橫一任穿百丈歸與同事坐次忽然哭事問曰憶父母耶丈云無事曰被人罵耶丈云無事曰哭作什麼丈云問取和尚事往問大師大師曰你去問取他事回至寮中見百丈呵呵大笑事曰適來為什麼哭而今為什麼却笑丈曰適來哭而今笑同事惘然一回思想一傷神不覺翻然笑轉新雲在嶺頭間不徹水流澗下太忙生馬祖升堂百丈捲席挂得帆來遇便風須臾千里到家鄉臨門上岸逢妻子歡喜情懷不可當百丈再參馬祖挂拂遭呵耳便聾衲僧奚若驗宗風金剛腦後抽生鐵華嶽三峯倒卓空黃蘗一日問百丈曰和尚在大師處有甚奇特言句乞師不吝丈遂舉再參馬祖因緣乃曰我當時被大師一喝直得三日耳聾黃蘗不覺縮項吐舌丈曰子已後莫承嗣馬祖麼蘗曰不然今因和尚得見馬祖大機大用要且不識馬祖若承嗣馬祖恐已後喪我兒孫丈曰如是如是家肥生孝子國霸有謀臣拳頭劈口槌未到無兒孫百丈開田説大義開田説大義後人莫容易百丈總持門淡而還有味黃蘗問百丈從上宗乘苗裔此間如何商量百丈默然蘗曰教後人如何委悉丈云我將謂你是箇人便起去蘗隨後入方丈曰某甲得得而來祇要箇印信足矣丈曰若恁麼他後不得辜負老僧打麵還他州土麥唱歌須是帝鄉人現成財本成家者多見飢寒在子孫百丈一日問黃蘗何處去來蘗曰大雄山下採菌子來丈曰還見大蟲麼蘗便作虎聲丈便抽斧作斫勢蘗約住便與一掌丈便休至晚上堂謂衆曰大雄山下有一虎汝等諸人好看老漢今日親遭一口大雄山下斑斑虎觸著傷人誰敢顧親遭一口老婆心何曾用著腰間斧百丈問黃蘗甚處來蘗云開田來丈云辛苦不易蘗云隨衆作務丈云有勞道用蘗云爭敢辭勞丈云開得多少田蘗遂钁地數下丈便喝蘗掩耳而去相見言談理不虧等間轉面便相輝畢竟水須朝海去到頭雲定覔山歸黃蘗示衆汝等諸人盡是噇酒槽漢大唐國裏無禪師不許會兮祇許知著肉汗衫如脫了方知棒喝誑愚癡黃蘗一日在南泉位中坐南泉遂問長老是甚年中行道蘗云威音王佛已前泉云猶是王老師孫在蘗遂歸本位坐彼此老來誰記得人前各自強惺惺一坑未免俱埋却幾個如今眼子青南泉問黃蘗定慧等學明見佛性此理如何蘗云某甲十二時中不依倚一物泉云莫是長老見處麼蘗云不敢泉云漿水錢且置草鞋錢教什麼人還蘗不對問答分明是切磋幾人於此見詨訛少年俱決龍蛇陳潦倒同吟稚子歌南泉門送黃蘗泉曰如許大身材戴椰子大笠子蘗云三千大千世界總在裏許泉曰王老師𠰚黃蘗戴笠子便行相見錦江頭相携上酒樓會醫還少病知分不多愁百丈問南泉何處來泉曰江西來丈曰還將得馬師真來麼泉曰祇這是丈曰背後底𠰚泉拂袖便出八面當風祇這是拂袖之談動天地堪愛賣身王老師不作賤兮不作貴南泉坐次一僧叉手而立泉云太俗生僧合掌泉云太僧生僧無對南北東西無不利令人深愛老南泉眉毛撕繫如相似鼻孔遼天不著穿洞山謂雲居云昔南泉問座主講何經論主云彌勒下生經泉云彌勒幾時下生主云現在天宮當來下生泉云天上無彌勒地下無彌勒時雲居遂問洞山祗如天上無彌勒地下無彌勒未審誰與他安名著字洞山直得禪床震動乃曰膺闍黎禪床驚震被搽糊惹得兒孫不丈夫拄杖劈頭連打出也教知道赤鬚胡南泉示衆云馬大師道即心即佛又云非心非佛老僧却不恁麼不是心不是佛不是物恁麼道還有過也無趙州出禮拜歸衆僧問趙州適來禮拜歸衆意作麼生州云却問取和尚僧上問南泉適來諗上座意作麼生泉云他却領得老僧意旨祖佛場中不展戈後人剛地起詨訛道泰不傳天子令時清休唱太平歌南泉斬貓兒五色狸奴盡力爭及乎按劒總生盲分身兩處重相為直得悲風動地生晚趙州從外歸泉舉前話問之州脫草鞋戴頭上而出泉云子適來若在即救得貓兒安國安家不在兵魯連一箭亦多情三千劒客今何在獨許莊周致太平南泉歸宗麻谷三人去禮忠國師同氣相求事可論一回見面一歡情兩行何處間文字一隊誰家好弟兄大隋蓋龜骨裏皮兮皮裏骨大隋老子無窠窟上士聞之笑未休中流特地生疑惑俱胝豎指老大宗師豎指頭一生用得最風流玄沙拗折無人會年來年去冷颼颼德山參見龍潭吹紙燭黃金為骨玉為稜莫把他家此日尋多少從來悟心匠盡將底事繼威音咦魯祖面壁池陽何處得捫摸後代商量苦也無古人剛地成多事敢問如今會也無雪峯示衆云望州亭與上座相見了也烏石嶺與上座相見了也僧堂前與上座相見了也密密堂堂早二三本來無物更何堪癡人見了生歡喜作者相逢滿面慙米和尚令僧問仰山今時人還假悟也無山云悟即不無爭奈落在第二頭米聞深肯之悟人千箇道無憂肯信遭他第二頭寂寞山花寒食後夕陽西去水東流金牛和尚每至齋時自將飯於僧堂前作舞呵呵大笑云菩薩子喫飯來長連床上狐屎尿三聖堂前狗吠春跳出金牛窠窟子月明照見夜行人玄沙三種病人玄沙三種病人有理不在高聲引得香嚴老子走來樹上懸身破竈墮和尚居嵩嶽山塢有一廟甚靈廟中唯安一竈遠近祭祀不歇烹殺物命甚多師一日領侍者入廟以拄杖敲竈數下云汝本磚瓦泥土合成靈從何來聖從何起又敲數下竈乃隳破墮落師云破也墮也須臾有一青衣峩冠忽然設拜師前師云是什麼人神云我本廟神久受業報今日蒙和尚説無生法忍遂得生天特來禮謝師曰是汝本有之性非吾強言神再禮而沒禍福威嚴不自靈殘杯冷𮌉享何人一從去後無消息野老猶敲祭鼓聲大衆遂曰如某等久在和尚左右不蒙示誨適來竈神説何法便得解脫師曰我也別無道理祇向伊道元是一堆泥土合成靈從何來聖從何起你等諸人何不禮拜衆遂作禮師云破也墮也大衆一時悟入春寒料峭凍殺年少切忌參商別無奇妙低頭侍奉歡喜問訊佛法商量傷子性命趙州勘婆趙州言勘破笑殺老禪和院主鬚眉落南泉打粥鍋趙州勘破却成罪過大地衆生千箇萬箇百丈野狐醉眠醒臥不歸家一身流落在天涯祖佛位中留不住夜來依舊宿蘆花黃蘗問百丈古人錯答一轉話墮在野狐身今人轉轉不錯時如何丈曰近前來向汝道蘗近前打師一掌丈呵呵大笑云將謂胡鬚赤更有赤鬚胡一問當機絶異同定乾坤箭驗勳功轟轟一掌胲腮下笑殺雄山者老翁司馬頭陀問溈山百丈野狐話你作麼生會溈山以手撼門扇三下司馬云太粗生溈山云佛法説甚粗細春至是花開朱顏安在哉可憐園裏色不入鏡中來靈雲見桃花春來依舊一枝枝同地同天道不疑未徹之言人莫問令余特地笑嘻嘻臨濟參黃蘗首座令問如何是佛法的的大意三度問三度被打擘開華嶽連天色放出黃河到海聲瞎驢死後蒿枝折大地如今有幾人雲門三頓棒奉君三頓曲周遮屈辱雲門老作家渡水穿雲五湖客欲將何物當生涯雲門糊餅雲門答糊餅言前句後領驢鞍爺下頷到了終不省塞却你咽喉把將糊餅來速道速道罽賓國王自將劒至師子尊者處問師得蘊空否尊者云已得王云既得蘊空可施我頭否尊者云身非我有豈況於頭王即斬之白乳高數丈王臂遂落楊子江頭楊柳春楊花愁殺渡頭人一聲殘笛離亭晚君向瀟湘我向秦仰山插鍬數目分明舉即難衲僧無不膽毛寒須知更有壺中路但向須彌頂外看長慶萬象之中獨露身萬象之中獨露身一回相見一回嗔東西南北吾皇化莫向江頭苦問津雪峯鼇山成道鼇山成道足人傳莫是從前話不圓賴有玄沙知始末遍身紅爛在漁船子胡狗老大宗師沒巴鼻養狗之緣太兒戲奪牌禪客如到來鉛刀爭及吹毛利鳥窠吹布毛欲求佛法往南方老大宗師為舉揚山花滿地雖狼藉一陳風來一陳香玄沙虎宗師方便太慈悲是汝之言實古錐萬里神光騰頂後肯將生死嚇愚癡五泄參石頭在途在舍若為酬莫把先師一例求雄雄宇宙如王者未免半邊無髑髏藥山一句子犢牛生子頗相諳兩眼通紅色似藍把火照來無覔處大家普請一時參趙州喫茶趙州一碗茶驗盡當行家一期雖似好爭免事如麻盤山臨入滅垂示云還有人邈得吾真麼衆人競寫呈師師皆不納時普化出衆云某甲邈得山云何不呈似老僧看普化乃打筋斗而出師真醜拙不堪呈用盡身心笑殺人彼中莫覔絲頭意白鼻崑崙賀新正女子出定出得出不得初不離是定聖者起凡情凡人而乃聖倒用與橫拈扶邪及顯正春雨春風竹戶涼落花啼鳥千峯靜良遂參見麻谷平生心膽向人傾到此門中有幾人別後都城舊知己暖煙斜日又黃昏黃龍三關佛手驢腳生緣黃龍元無此語直饒恁麼知之我儂亦未相許奉報四海禪人第一不得錯舉晦堂拳頭著眼看來寧免瞎全身何用佩金魚黃龍意氣雄豪甚祗為他家不識書五祖老和尚凡見僧來便云屈屈僧云屈作什麼師云如今不屈更待何時盡力不奈何按牛頭喫草若無錦繡文難以論嘉藻又每見僧來展手問云何故喚作手何故喚作手衲僧難開口擬議自顢頇可憐大蒙斗又每遇僧請益祇云無這間工夫彼此且無相負纍行人無不失鈎錐雖然不瞎衆生眼也好拳頭劈口槌室中垂示師云不負平生眼目還知龍門老為人處麼若知得終不相辜負若不知實無為人底道理師云上座未來此間時無一人上座既來此間後有一人上座祇是一人上座為什麼成有成無師云正恁麼時作麼生辦師云得底人還具四大五蘊麼師云真佛住在何處師云盡十方世界是你自己折旋俯仰復是何人師云古人道無情有佛性師云有情具覺知可容知有佛性無情無覺知若為知有佛性師云昨夜山前虎咬大蟲師云無目仙人能揣骨既是無目將什麼辨貴賤師從東過西顧謂衆曰是是復從西過東顧謂衆曰不是不是遂歸位立曰適來猶記得舉魯祖凡見人來便面壁而坐不知後來有甚人會得師云離却三界還見香臺麼師云有情説法易見無情説法難聞祇如無情説法什麼人得聞師云溈山接仰山師云現今是箇什麼何不猛會取師云有人問你隨問便答無人問你時作麼生道師云芥子納須彌且問你諸人即今在芥子外芥子內若道在芥子外如何納得須彌若道在芥子內許多大身材如何却在芥子內師云隔宿不問道今朝事作麼生師云山僧問你諸人尋常一件事諸人舊時曾到處忽然思量著一一在目前為將眼見耶將心見耶若道將眼見諸人思量舊時到處如何是眼見若道是心見心豈有見耶現今目前燈籠露柱是心見耶是眼見耶世尊道從本已來非心非眼且道是箇什麼舉古人道一堆火兩人坐我是你你是我師云你自是你向火我自是我向火為什麼却道我是你你是我師云無舌人解説説則説了也師却吐舌云爭奈者一片子何師云明來暗謝智起惑亡正當明時暗向什麼處去祖師道祇者明便是暗明暗覿體不可得師云黑地裏行時為什麼腳高腳低師云古人道世間法便是出世間法露柱是世間法如何明得知是出世間法去師云一切衆生眼見耳聞先聖去者裏有箇指示人處道即此見聞非見聞師云諸人正當見聞時作麼生見得非見聞師云忽然被人稱名道姓喚你一聲時你去者裏還入得麼師云山僧與諸人總在者裏其間有了者不了者作麼生辨得者箇是了者這箇是不了者作麼生辨師云諸人還會古人説底話麼那箇是古人作麼生是説底話若不恁麼明得祖教佛教俱為剩語作麼生是古人説底話師云十二時中作麼生是你相應底句師云不是山僧瞞你却是你瞞我作麼生是你瞞我處師云中夜間忽然會得去今朝起來所見所聞別也作麼生是別處師云此事易見難曉你等諸人還見狗子麼見生客則吠見熟客則搖尾且道是一耶是二耶若道是一吠則咬人搖尾則求食若道二來生也是客熟也是客所以道易見難曉須是向不一不二處會取山僧不誑呼你子細檢點看師云山僧齋時見箇蠮螉子在聖僧鼻孔裏出來入去得大無畏你諸人十二時中出來入去在什麼處師云古來有箇禪客依栖一人尊宿每日上去問訊才見來便道且去未在如是數年忽一日省得便上去宿才見來便云噁是也師云作麼生見得便知道是也師云不重久習不輕初學久習之人有何過不重初學之人有何能不輕正當撞著此二人相見時如何師云諸人大似開眼尿床還見開眼處麼師云須得作衲僧家説話且道衲僧家如何説話師云你上來時早是分外也更口吧吧堪作什麼師云曹溪大師道繁興永處那伽定祖師在你背後還見麼垂代師一日問侍者三人中那箇不在數代云和尚問不著又云某甲祇得緘口又云慙愧且得和尚委悉因病臂示衆云我一隻左臂因你諸人教我動不得因你諸人教我受無限辛苦代云和尚要如此分踈作麼又云不敢辜負和尚一隻左臂又云學人聞得不安不樂又云此是和尚成褫某甲祇恐某甲不到者田地舉古人云飛猿嶺峻你好看問僧你如何代云恁麼則不去也又云為什麼不去代云祇者便是飛猿嶺問大庾嶺頭提不起時如何代云你却會得好又云你適來披袈裟來麼據款結案又云依樣畫葫蘆聞書閣門開云無風自動好與三十棒舉古云泉眼不通被沙礙道眼不通被什麼礙古云被眼礙問僧祇如眼如何礙代云早知燈是火飯熟已多時問僧你許多時在什麼處安身立命代云少人知問南泉牽牛巡堂如何代云你尋常東行西行有佛法道理無佛法道理又云錯行此路問高麗淨瓶為什麼在者裏代云非但在者裏舉龐居士問馬大師不與萬法為侶者是甚麼人代云某甲已答和尚了也一日聞茶版聲又聞浴鼓聲問僧云赴那處即是代云聞時雖普不妨應處成偏應處雖偏不礙聞時常普問僧如鏡鑄像像成後鏡光向什麼處去代云老僧出家三十年也問孤燈獨照時如何代云露柱證明問如何是你受胎處代云和尚甚處去來問念念攀緣心心永寂時如何代云復有何事問我與釋迦老子同參釋迦老子具三十二相八十種好如何説同參底事代云莫來污我耳目問久嚮千佛到來為什麼一佛也不見代云已見千佛問識情不到處如何代云大蟲看水磨問識情不到處還聞雨聲麼代云將為某甲落他情識裏問大安樂底人還見有春夏秋冬麼代云若不恁麼爭喚作大安樂底人問衲僧家如何商量代云寒時言寒熱時言熱問如何是古人田地代云豈有異耶問飯袋子如何代云正道著因遊白蓮峯至半山亭有僧後到云和尚尚在這裏師云我到了來也僧無語代云也是齋後鐘呂少馮入室問和尚有何提誨師云若有提誨即埋沒足下又問請和尚徑直指示師云太迃曲生問有一物上拄天下拄地黑似漆常在動用中動用中收不得過在什麼處代云有什麼過謂僧云我為你著盡氣力如何著力代云早朝有粥齋時有飯問會佛法人為什麼病代云也知和尚心切師插一隻火筯在爐中云此意如何代云頂門上著一隻金剛箭又云刺破你眼睛穿過你心肝又云莫向虗空裏釘橛有一屠兒身上常出乳香舍利此意如何代云恐人不信又問別底屠兒為甚却無代云他得大闡提問虗空還有變異也無代云青黃赤白長短大小師豎起拂子問僧從什麼處得來代云也祗是某甲底夢中僧問和尚因什麼得悟代云莫搽糊我見畫兔子相咬師云咬殺也又云我也知你親示衆云會佛法底人不得龍門飯喫不會佛法底人亦不得龍門飯喫總不恁麼人亦不得龍門飯喫且道什麼人得喫代云無慙愧底人又云似我者得喫遊山次問僧竹密不妨流水過如何代云不許夜行投明須到問僧癩狗為什麼無毛代云已被和尚道了也又云直得恁麼因僧問病師云我身在這裏為什麼心不在這裏代云身在這裏你疑箇什麼又云洎合空過一生問亡僧遷化向什麼處去代云你問我又云深領和尚一問一日喫粥了白衆云許多人喫粥也無一人搆得便起去舉古德一日不赴堂侍者白云請和尚赴堂德云我今日在莊裏喫油糍來也者云和尚不曾出入為什麼却道在莊裏喫油糍來德云你但去問取莊主者才出莊主歸謝和尚莊中喫油糍代云事實如此聞鼯鼠聲侍僧問古人道即此物非他物意旨如何師云這老漢不識好惡與人説作什麼又云你尋常寮舍裏東語西話還有吉凶麼問廣額屠兒手中屠刀如何放下代云不須放也問面前是什麼代云無物問六祖不識字為什麼墜腰石上題云龍朔二年老盧記代云更須子細問侍僧汝恁麼供養老僧老僧將什麼報答你代云謝和尚報答因看月問侍僧那一半在什麼處去代以手指月問大地衆生如何度得去代云有箇度處僧云和尚如何度師云莫管他因僧亡問衆云齋後燒你也你如何代云事不徒然又云非但某甲又云深領此問師謂侍僧云我尋常向你説却成罪過代云也知和尚小心呂少馮再至褒禪見師師尋常以六隻骰子示禪人遂將三隻令侍者送與少馮仍傳語云此是老僧平生用不盡底少馮接得復令回語云謝和尚見惠祇得一半在師復令侍者傳語云一半留與老僧師一日到寶公塔前忽云雲光好法師安角在頭上既是雲光法師為什麼安角在頭上代云陋巷不騎金色馬回來却著破襴衫師在方丈坐見僧上來師云入室未到你次在代云恁麼則某甲伏惟謹退師因喫藥次問僧云適來胸中似有一物且道是何之物代云肺氣又云猶有者箇在又云者箇是什麼乃驟步而去師謂僧云開鋪席了也東買西賣僧云好茶師云賤貨自收師問僧你忽然死去時如何僧無語師呵呵大笑僧問如何是眹兆未生時事師云你何不早問師一日謂僧云扶不起設使一萬人也扶不起良久云祇有一人扶得起僧云未審是什麼人師云無力者師問僧燈籠什麼處得來代云驗在目前問僧忽遇虎狼刀劒時如何代云是虎狼刀劒問僧子已後如何代云一似今日問僧從緣得者永無退失者裏見得自己亦是生冤家還會麼僧云自己亦不見時如何師云時教阿誰敘僧無語師代云孟春猶寒師舉僧問雪峯知有向上事始有語話分時如何峯提起僧手云作麼生僧無語代云引得者老和尚到恁麼田地舉僧問法燈百尺竿頭如何進步燈云噁問僧下得什麼語代云平地神仙舉藥山謂高沙彌云見説長安甚閙高云我國宴然師問僧如何是我國代云四五百條花柳巷二三千處管絃樓五祖老和尚常展手問人云因何喚作手代云瞞我太煞示禪人心要不應於無際空中立分限若立無分限是無際空乃自負墮所以解空者無空想若人以語言名狀心終不得心不以語言名狀心亦不得心語言本是心名狀之故不得也無語言本是心不名狀之故不得也種種會當皆不與自心契上祖曰默契而已為若此道若未達但無妄念爾若人知是妄念作意止之者見有妄念故也知有妄念作意觀察令見正理亦見有妄念也知妄元是道乃無妄焉故達道者無所得也發意求道道即得之但不別求知無迷妄謂之見道近世皆曰無不是道譬如飯籮邊坐説食終不能飽為不親下口也證者絶能所也非別有玄理在尋常日用處如見色時是證時聞聲時是證時飲水食粥是證時一一絶能所此非久習不假薰煉蓋現成之事世人不識名曰流浪故云唯證乃知難可測學道者明知有是事何故不得旨而長疑蓋信未極疑未深也唯深與極若信與疑真是事也不解如此返照遂迷亂不知由緒困躓中途能自返省更無第二人也既曰此事又豈更知耶知是妄慮此事則不失也道不止説與示而後顯蓋體自常露説示者方便道用爾省悟者亦暫時岐路也或因説而證或因示而入或自覺觸以歸終無異事別得至心源而止也人言悟了方修此屬對治門雖然禪門亦許以正知見治之若論當人即不須若是也佛道長遠久受勤苦乃可得成者綿亘三世凡聖一如故曰佛道長遠不起異見未始遺棄故曰久受勤苦畢竟無別法故曰乃可得成此大丈夫事人不識問遂依來而答不知乃自問爾欲答誰耶人不識答遂依言起見不知乃自答爾何有旨趣耶故曰總是你好看好看或人曰從上古聖佛祖指示言教流布世間一一分明何故都是自己深負上古先聖苦口垂慈也今對之曰吾順佛祖宗趣爾自負吾不負也若言有所説即是謗佛祖曰莫作最後斷佛種人若不就己知歸所作皆成造偽縱記得河沙會盡塵墨於己何益故曰將聞持佛佛何不自聞聞外求有相佛與汝不相似尊宿云我今對你一句子亦不難你若一言下薦去猶較些子若不會老僧却成妄去夫今時學者競以問答為禪宗中關要不知是取捨作想心嗚呼就理就事之學蓋是近家語縱有少領覽未可休息豈不聞説涅槃之道圖度絶矣直須解自點檢始得人以迷心故進道乃來山林中見知識將謂別有一道可令人安樂不知返究向來迷處工夫最第一若不及此入山林而不返徒爾為也迷處極易而難入故先德曰難信難解又曰此是頓宗説道返照向來已是走作語況不爾耶後世遂用此語為平常無事一味實頭此又後學之不明服食之不審也從上來有二種方便有真實方便所謂説無有間有善巧方便所謂妙應羣機若從真實方便得入不假思量性自神解永無有退妙用河沙也若從善巧方便得入得坐披衣向後自看始得未足將為究竟此二種方便皆一法也不可須臾有失學者思之雪峯示人曰莫教老僧有一句子到你分上若有一句子到你分上堪作什麼也此是古人不得已而已後者不了古人意便謂自己分上無許多言談所以錯會也今時人多將目前鑒覺用為極則玄沙所以向人道深山逈絶無人處你道還有否悟心見性當如雪峯玄沙履實踐真當如南泉趙州今時學者但以古人方便為禪道不能與古人同參也譬如有力人負一百二十斤簷過獨木橋不傾不側何物扶持得如此耶其精緻無雜而已為道亦爾經中稱譬如師子捉象亦全其力捉兔亦全其力人問全什麼力曰不欺之力若見一毛髮異於心者則自喪身命故達道人無有不是者此力甚大但為無邊惡覺侵蝕致令力用有虧若無如許多異法異狀異緣異念則隨心轉變自在無礙道不用苦求求之即道失事不在苦融融之即事有不求不融道與事會也則何事而非道耶譬如目明之士入寶聚中而不知方便為無火燭光明所照也入矣即被觸擊自損身首謂是毒穴非寶聚也有智入中持燈燭光照見種種寶任意採擇得寶而出十二時中須用智光勿令六塵自傷觸也昔日永首座與慈明同辭汾陽而永未盡其妙相從慈明二十年終不脫灑一夕圍爐深夜慈明以火筯敲炭曰永首座永首座永乃咄之曰野狐精慈明遂指永而謂曰訝郎當又恁麼去也永由是方得究竟然畢命相隨凡慈明居常差別激問衆不能酬對唯永至慈明即點頭許可此所謂無病之藥學者罕得其要況後世知見會解之徒何由領是事哉得之當若永發藥當若慈明庶幾可也閙中得靜則井邑成山林煩惱即菩提衆生成正覺此語初心學人例道得會得作一種平等知見及其放心凡聖依前兩般靜躁殊用明知是解會須有安穩處始得一味不可強會近世多以問答為禪家家風不明古人事一向逐末不反可怪可怪昔人因迷而問故問處求證入得一言半句將為事究明令徹去不似如今人胡亂問趂口答取笑達者十二時中學道無頃刻棄捨此人縱未得入念念已是修行也尋常説修行不過三業六根清淨禪門更不必如是何故禪定之門念念與智波羅蜜平等一切處自無過患也久久心地通明之日從前並得滿足名一行三昧今時人全為定力復不開智眼所有機緣語句祇成諍論生滅心行夫禪學不是小小未用超佛越祖得了要超亦不難高郵孫承務作書問不落意想不在有無如何則可師答云若問如何則不可不問如何亦不可醉客豁醒神珠自瑩豈可預為之計然後領耶第一等靈利人尋討不著此一念難得自見見之即是無別有岐路也尋常例以前念為是以後念照之前後追逐以心用心心則成境率初已成心境了展轉更不堪如今後念不取自無起滅處當處解脫念本不生何更有有無意想為留礙一念悟心成正覺此之謂也念念無生念念無相與虗空等觸物遇緣皆佛之妙用無絲頭許對待衣珠獨耀十方世界事目擊可了不俟舉意然後知之此蓋大丈夫事業不可不成就取欲要是蓋有不是法為礙欲要得念良由前後皆失念故也晝夜不自在要與道合然無少許合處愈急愈不合病在取一捨一不善用心不得要術茫然不知日與道遠若安坐寧神不勞自辦故達磨大師謂楊衒之曰亦不捨智而近愚亦不拋迷而就悟達大道兮過量通佛心兮出度不與凡聖同纏超然名之曰祖不著棄一邊就一邊當知明明顯著明明作用拄定會取轉凡成聖點鐵成金要徑不可不如此究祇恐人兩頭走一既不成二又不是不識玄旨徒勞念靜二乘斷煩惱得證名為偏修不若應念化成無上知覺之速也修道人若遇煩惱起時如何古人云但以正知見治之余則不然祇以煩惱治之如此看來即不見有煩惱也何故煩惱不可更治煩惱如火不更燒火水更不濕水體性一同無可得露現此了煩惱本空不著除遣若起智斷治捺伏却成別用心有對待被他二境回換縱得亦迃曲有分限須行徑直路為上古人云劫火曾將無氣吹不勞功力當時萎此之謂也有時靜坐則心念馳散或然臨事又全失却都緣未得親證落二落三致有錯謬展轉之失古人云動靜不二真妄不二維摩明一切法皆入不二門若領此要萬動自寂滅也且如眼不至色色不至眼聲不至耳耳不至聲法法皆爾元是自心功德藏無可得取捨契者何往不利此正是那伽大定也今生出來自肯學道者蓋夙生曾種善根素有根本便解發心亦解疑著就己尋究又煩惱障薄有因有緣此人易可化度若未薰得此心正信不生縱聞之亦不生疑但如風過耳勸之又生瞋加誹謗此又何緣得顯露所以千人萬人中但一二人而已若自解作活計收拾得上生生從此去展轉明利更不退失功德一生勝一生入他諸佛閫域常與此事相應人間天上亦祇如此設對五欲八風一切境界與理符合不行三塗道一味平等正知見復有何事生死不可不畏須了此一段死生情偽始得安樂無過身心為纍耳身如桎梏當知身去來處心如猿猴當知心起滅處此二自何處去來起滅則身心圓明內外一如而已且心為內身則為外身為內物為外國師曰身心一如身外無餘則不見有生死當情可謂解脫大道也故能令人見聞不得不脫意想不得不息物境不得不融復奚疑哉三自省察一是身壽命如白駒過隙何暇間情妄為雜事既隆釋種須紹門風諦審先宗是何標格二道業未辦去聖時遙善友師教誠不可捨自生勉勵念報佛恩惟己自知大心莫退三報緣虗幻不可強為浮世幾何隨家豐儉苦樂逆順道在其中動靜寒溫自愧自悔誡問話近代問話多招譏謗蓋緣不知伸問致疑咨請之意後生相承多用祝贊順時語並非宗乘中建立如古人問若為得出三界去又問聲色如何透得又問此間宗乘和尚如何言論並是出衆當場決擇近時兄弟進十轉五轉沒巴鼻語或奉在座官員或莊嚴修設檀信俱不是衲僧家氣味又抽身出衆便道數句或時云某甲則不恁麼道又云和尚何不道夫問話者激揚玄極也不在多進語三兩轉而已貴得生人信不至流蕩取笑俗子也佛眼禪師語録序佛眼老師自得法東山三坐道場二十餘年行祖令於淮甸四方衲子雲奔輻湊不到龍岫謂之空回而師端居方丈惟以傳道為任的的示人晨夕無倦升堂入室當陽直指全用大機普説小參方便開諭巧除禪病要使學者頓悟本心大地山河森羅萬象曾非外物十方諸佛歷代祖師祇是當人心外無法心亦無心一道靈光隨處出現自然無法可取無法可捨不見一法為無為有為逆為順不見一法為內為外為去為來能所兩亡千差獨露從前惡覺情見妄想塵勞當體化為微妙三昧塵塵剎剎情與無情皆是自己真實本體之所建立若到這裏穩密田地便可縱橫變化任運施為於不二法中現作無量差別境界使人於千頭百面處見得根本毫髮不移便乃不為萬境回換獨出獨入透脫自由如是神通録中具載言言皆正令句句盡圓宗雖然鏤板示人切忌喚作言句若人開卷洞見指歸當知佛眼禪師至今不曾遷化宣和七年八月上休日遂寧馮楫謹敘宋故和州褒山佛眼禪師塔銘宣教郎前管句西京嵩山崇福宮李彌遜述江淮之南有大禪師號曰佛眼道行聞于朝勑居和州之褒山踰年以疾辭歸隱蔣山之東堂遠近奔湊執弟子禮以求法者不知幾何人名山大剎馳使延請者方來而未已也宣和二年冬至之前一日飯食訖整衣趺坐合掌加額怡然而逝其徒哀慕如亡津梁如失舟楫莫知攸濟嗣法兄佛果大師克勤狀師之行且謂彌遜曰師之於公聞風而悅一言而契今其逝公實見之知師莫若公是宜為銘乃序而銘云師姓李氏名清遠蜀之臨邛人捨家十四受具嘗依毗尼師究其説因讀法華經至是法非思量分別之所能解持以問講師莫能對乃曰義學名相非所以了生死大事遂捐舊習南遊江淮間遍歷禪席聞舒州太平演道者為世第一流宗師徑造其室恭事勤請既久益堅演深奇之謂可以弘持法忍壁立不少假冀其深造師七年未嘗妄發一語一日有所契洞徹超詣機辨峻捷莫當其鋒自是釋子爭歸之而師益靜默自晦不自為得隱居四面山大中庵屬天下新崇寧萬壽寺方擇人以處舒守王公渙之迎師住持師輒引去會龍門虗席遂補處焉居十有二年遷住褒禪師三領名剎所至莫不興起其在龍門道望尤振四方學者皆曰吾必師龍門由是雲集至居無所容師不起于座而化湫隘為巨剎壯者效筋力智者授軌度富者施資財初不靳也師嚴正靜重淡泊寡言笑動有矩則至出語和懌中節人服膺之其為教則簡易深密絶蹊徑離文字不滯於空無汗漫之説不以見聞言語辨博為事使人洞真源履實際非大有所契證不妄許可平居以道自任不從事於務嘗曰長老但端居方丈傳道而已與士大夫遊不為勢利屈苟道合則欣然造之不爾雖過門或不得見公卿大人高之樞密鄧公洵武聞其風奏錫紫衣師名司諫陳公瓘見所傳法語歎曰諸佛心宗衆生性海遠公涵泳深矣皆未識師也況其親炙者乎與佛果佛鑑同門莫逆道價相尚世稱東山二勤一遠云嘗宗百門義著圓融禮文又托楞嚴法華著普門禮字並行于世其參學得法者無慮數十人士圭善悟為之首而宿松無著道人李法慧頗臻其奧師壽五十有四僧臘四十將逝謂其徒曰諸方老宿必留偈辭世世可辭耶且將安往逮終無一言初在龍門作靈光臺以會葬苾芻之火化者且自為志曰余他日亦藏于此後門人函骨以歸龍門龍門之人悲且喜奉之如生以宣和三年正月壬寅塔成銘曰大智唯心無南北祖一離其源遂開牖戶守玄尚同執解隨趣岐行派流既倒莫遡洪融混合演得其醇師則嗣之道益以尊如收全潮衆波莫分如舉大地萬有以陳用晦而明厥問四馳覺迷解繆遠邇是依用捨孰測動言有規嚴以治己夷以示機端居叢林唯道是則化行事修不識靜默大興龍門蠱壞以飾洞明真源深履實際圓融普門並照兼利最後説法不立一偈嗚呼師乎孰識其歸淵澄月現舟行岸移於一舉手示大慈悲元珠在前罔象莫窺後學誰師靈光之福州鼓山白雲峯湧泉禪院住持嗣法士圭重勘
