body:
  text: 大鑑下三世語之餘百丈大智禪師僧問大通智勝佛十劫坐道場佛法不現前不得成佛道如何師云劫者滯也亦云住也住一善滯於十善西國云佛此土云覺自己鑒覺滯著於善善根人無佛性故云佛法不現前不得成佛道觸惡住惡名眾生覺觸善住善名聲聞覺不住善惡二邊不依住將為是者名二乘覺亦名辟支佛覺既不依住善惡二邊亦不作不依住知解名菩薩覺既不依住亦不作無依住知解始得名為佛覺如云佛不住佛名真福田若於千萬人中忽有一人得者名無價寶能於一切處為導師無佛處云是佛無法處云是法無僧處云是僧名轉大法輪問從上祖宗皆有密語相傳授如何師云無有密語如來無有祕密藏祇如今鑑覺語言分明覓形相了不可得是密語從須陀洹向上直至十地但有語句盡屬法之塵垢但有語句盡屬煩惱邊收但有語句盡屬不了義教但有語句盡不許也了義教俱非也更討什麼密語問空生大覺中如海一漚發如何師云空喻於漚海喻於性自己靈覺之性過於虗空故云空生大覺中如海一漚發問伐林莫伐樹如何師云林者喻於心樹者喻於身因說林故生怖故云伐林莫伐樹問語也垛生招箭言既垛生不得無患患累既同緇素何辯師云但却發箭途中相拄如其相差必有所傷谷中尋響累劫無形響在口邊得失在於來問却問所歸還被於箭亦如知幻不是幻三祖云不識玄旨徒勞念靜亦云認物為見如持瓦礫用將何為若言不見木石何殊是故見與不見二俱有失舉一例諸問本無煩惱三十二相如何師云是佛邊事本有煩惱今有三十二相祇如今凡情是問無邊身菩薩不見如來頂相如何師云為作有邊見無邊見所以不見如來頂相祇如今都無一切有無等見亦無無見是名頂相現問如今沙門盡言我依佛教學一經一論一禪一律一知一解合受檀越四事供養為消得否師云但約如今照用一聲一色一香一味於一切有無諸法一一境上都無纖塵取染亦不依住無取染亦無不依住知解者箇人日食萬兩黃金亦能消得祇如今照一切有無等法於六根門頭刮削併當貪愛有纖毫治不去乃至乞施主一粒米一縷線箇箇披毛戴角牽犂負重一一須償他始得為不依佛佛是無著人無求人無依人如今波波貪覓佛盡皆背也故云久親近於佛不識於佛性唯觀救世者輪迴六趣中久乃見佛者為說佛難值文殊是七佛祖師亦云是娑婆世界第一主首菩薩無端作見佛想聞法想被佛威神力故猶降二鐵圍山不是不解特與諸學人作標則令諸後學人莫作與麼見聞但無一切有無等法有無等見一一箇箇透過三句外是名如意寶是名寶華承足若作佛見法見但是一切有無等見名眼翳見所見故亦名見纏亦名見蓋亦名見孽祇如今念念及一切見聞覺知及一切塵垢祛得盡但是一塵一色總是一佛但起一念總是一佛三世五陰念念誰知其數是名佛𨵩塞虗空是名分身佛是名寶塔是以常歎言嗟見今日所依之命依一顆米一莖菜餉時不得食飢死不得水渴死不得火寒死欠一日不生欠一日不死被四大把定不如先達者入火不燒入水不溺倘要燒便燒要溺便溺要生即生要死即死去住自由者箇人有自由分心若不亂不用求佛求菩提涅槃若著佛求屬貪貪變成病故云佛病最難治謗佛毀法乃可取食食者是自己靈覺性無漏飯解脫食此語治十地菩薩病是從初至十地也祇如今但有一切求心盡名破戒比丘名字羅漢盡名野干灼然銷他供養不得祇如今聞聲如響等齅香如風等離一切有無等法亦不住於離亦無不住知解此人一切罪垢不能相累為求無上菩提涅槃故名出家猶是邪願況乎世間諍論覓勝負說我能我解貪一門徒愛一弟子戀一住處結一檀越一衣一食一名一利又言我得一切無閡祇是自誑祇如今能於自己五陰不為其主被人割截節節支解都無怨吝之心亦不煩惱乃至自己弟子被人鞭打從頭至足如上一一等事都無一念生彼我心猶依住無一念將為是此名法塵垢十地之人脫不去流入生死河所以常勸眾人須懼法塵煩惱如懼三塗乃有獨立分假使有一法過於涅槃者亦無少許生珍重想此人步步是佛不假脚踏蓮華分身百億祇如今於一切有無等法有纖毫愛染心縱然脚踏蓮華亦同魔作若執本清淨本解脫自是佛自是禪道解者即屬自然外道若執因緣修成證得者即屬因緣外道執有即屬常見外道執無即屬斷見外道執亦有亦無即屬邊見外道執非有非無即屬空見外道亦云愚癡外道祇如今但莫作佛見涅槃等見都無一切有無等見亦無無見名正見無一切聞亦無無聞名正聞是名摧伏外道無凡夫魔來是大神呪無二乘魔來是大明呪無菩薩魔來是無上呪乃至亦無佛魔來是無等等呪一變眾生諂曲修羅二變二乘曲諂修羅三變菩薩諂曲修羅是三變淨土但是一切有無凡聖等法喻如金鑛自己如理喻如於金金與鑛各相去離真金露現忽有人覓錢覓寶變金為錢與他亦如體真正無諸沙鹵有人乞䭔變為䭔與他亦如智臣善解王意王若行時索僊陀婆即便奉馬食時索僊陀婆即便奉鹽此等喻學玄旨人善能通達應機不失亦云六絕師子誌公云隨人造作百變十地菩薩不飢不飽入水不溺入火不燒倘要燒且不可得燒他被量數管定佛則不與麼入火不燒倘要燒便燒要溺便溺他使得四大風水自由一切色是佛色一切聲是佛聲自己滓穢諂曲心盡透過三句外得說此語菩薩清淨弟子明白所有言說不執無有一切照用不拘清濁有病不喫藥是愚人無病喫藥是聲聞人定執一法名定性聲聞一向多聞名增上慢聲聞知他名有學聲聞沈空滯寂及自知名無學聲聞貪瞋癡等是毒十二分教是藥毒未銷藥不得除無病喫藥藥變成病病去藥不消不生不滅是無常義涅槃經云有三惡欲一欲得四眾圍繞二欲得一切人為我門徒三欲得一切人知我是聖人及阿羅漢迦葉經云一欲求見未來佛二欲求轉輪王三欲求剎利大姓四欲得婆羅門大姓乃至厭生死求涅槃如是惡欲先須斷之祇如今但有取染動念盡名惡欲盡屬六天總被波旬管問二十年中常令除糞如何師云但息一切有無知見但息一切貪求箇箇透過三句外是名除糞祇如今求佛求菩提求一切有無等法是名運糞入不名運糞出祇如今作佛見作佛解但有所見所求所著盡名戲論之糞亦名麤言亦名死語如云大海不宿死屍等閑說話不名戲論說者辯清濁名戲論教文都總有二十一般空淘擇眾生塵累沙門持齋持戒忍辱柔和慈悲喜捨尋常是僧家法則會與麼會宛然依佛教祇是不許貪著依執若希望得佛得菩提等法者似手觸火文殊云若起佛見法見應當害己所以文殊執劍於瞿曇鴦掘持刀於釋氏如云菩薩行五無間而不入無間地獄他是圓通無間不同眾生五逆無間從波旬直至佛盡是垢膩都無纖毫依執如是名二乘道況乎諍論覓勝負說我能我解祇名諍論僧不名無為僧祇如今但不貪染一切有無諸法是名無生是名正信信著一切法名信不具亦名信不圓亦名偏信不具故名一闡提如今欲得驀直悟解但人法俱泯人法俱絕人法俱空透三句外是名不墮諸數人者是信法者是戒施聞慧等菩薩忍不成佛忍不作眾生忍不持戒忍不破戒故云不持不犯智濁照清慧清識濁在佛名照慧在菩薩名智在二乘及眾生邊則名識亦名煩惱在佛名果中說因在眾生名因中說果在佛名轉法輪在眾生名法輪轉在菩薩名瓔珞莊嚴具在眾生名五陰叢林在佛名本地無明是無明明故云無明為道體不同眾生暗蔽無明彼是所此是能彼是所聞此是能聞不一不異不斷不常不來不去是生語句是出轍語句不明不暗不佛不眾生總與麼也來去斷常佛與眾生是死語徧不徧同異斷常等是外道義般若波羅蜜是自己佛性亦云摩訶衍摩訶是大義衍是乘義若守住自己知覺又成自然外道不用守如今鑑覺不用別求佛若更別求又屬因緣外道此土初祖云心有所是必有所非若貴一物則被一物惑若重一物則被一物惑信被信惑不信又成謗莫貴莫不貴莫信莫不信佛亦不是無為雖不是無為又不是冥寞猶如虗空佛是大心眾生鑑覺多鑑覺雖多他鑑覺清淨貪瞋鬼捉他不著佛是纏外人無纖毫愛取亦無無愛取知解是名具足六度萬行若要莊嚴具種種皆有如不要他不用亦不失他使得因果福智自由是修行非是執勞負重喚作修行却不與麼三身一體一體三身一者法身實相佛法身佛不明不暗明暗屬幻化實相由對虗得名本無一切名目如云佛身無為不墮諸數成佛獻蓋等是升合擔語要從濁辯清得名故云實相法身佛是名清淨法身毗盧遮那佛亦名虗空法身佛亦名大圓鏡智亦名第八識亦名性宗亦名空宗亦名佛居不淨不穢土亦名在窟師子亦名金剛後得智亦名無垢檀亦名第一義空亦名玄旨三祖云不識玄旨徒勞念靜二報身佛菩提樹下佛亦名幻化佛亦名相好佛亦名應身佛是名圓滿報身盧舍那佛亦名平等性智亦名第七識亦名酬因答果佛同五十二禪那數同阿羅漢辟支佛同一切菩薩等同受生滅等苦不同眾生繫業等苦三化身佛祇如今於一切有無諸法都無貪染亦無無染離四句外所有言說辯才名化身佛是名千百億化身釋迦牟尼佛亦名大神變亦名遊戲神通亦名妙觀察智亦名第六識供養者淨三業前際無煩惱可斷中際無自性可守後際無佛可成是三際斷是三業清淨是三輪空是三檀空云何比丘給侍於佛所謂不漏六根者亦名莊嚴空無諸漏林樹莊嚴空無諸染華果莊嚴空無佛眼約修行人法眼辯清濁亦不作辯清濁知解是名乃至無眼寶積經云法身不可以見聞覺知求非肉眼所見以無色故非天眼所見以無妄故非慧眼所見以離相故非法眼所見以離諸行故非佛眼所見以離諸識故若不作如是見是名佛見同色非形色名真色同空非太虗名真空色空亦是藥病相治語法界觀云不可言即色不即色亦不可言即空不即空眼耳鼻舌身意不納一切有無諸法名轉入第七地七地菩薩不退七地向上三地菩薩心地明白易染說火即燒從色界向上布施是病慳貪是藥從色界向下慳貪是病布施是藥有作戒者割斷世間法但不身手作無過名無作戒亦云無表戒亦云無漏戒但有舉心動念盡名破戒祇如今但不被一切有無諸境惑亂亦不依住不惑亂亦無不依住知解是名徧學是名勤護念是名廣流布未悟未解時名母悟了名子亦無無悟解知解是名母子俱喪無善纏無惡纏無佛纏無眾生纏量數亦然乃至都無一切量數纏故云佛是出纏過量人貪愛知解義句如母愛子唯多與兒酥喫消與不消都總不知此語喻十地受人天尊貴煩惱生色界無色界禪定福樂煩惱不得自在神通飛騰隱顯徧至十方諸佛淨土聽法之煩惱學慈悲喜捨因緣煩惱學空平等中道煩惱學三明六通四無閡煩惱學大乘心發四弘誓願煩惱初地二地三地四地明解煩惱五地六地七地諸知見煩惱八地九地十地菩薩雙照二諦煩惱乃至學佛果百萬阿僧祇諸行煩惱唯貪義句知解不知却是繫縛煩惱故云見河能漂香象問見否答曰見問見後如何答曰見無二既云見無二不以見見於見若見更見為前見是為後見是如云見見之時見非是見見猶離見見不能及所以不行見法不行聞法不行覺法諸佛疾與授記難曰見既不是授記之言復何用記師云先悟宗人不被一切有無諸法相拘如浣垢衣故云離相名佛虗實盡不存中旨獨玄玄達一路同道後進契其階故云授記耳無明為父貪愛為母自己是病還醫自己是藥自己是刀還殺自己無明貪愛父母故云殺父害母一語類破一切法喫非時食者亦復如是祇如今但是一切有無等法盡是喫非時食亦名惡食是穢食置於寶器是破戒是妄語是雜食佛是無求人如今貪求一切有無諸法但是所有所作皆背也却是謗佛但有貪染盡名授手祇如今但不貪染亦不依住不貪染亦無不依住知解是名般若火是燒手指是不惜軀命是節節支解是出世間是掌世界於他方祇如今若於十二分教及一切有無諸法於藏腑中有纖毫停留是不出網但有所求所得但有生心動念盡名野干祇如今於藏腑中都無所求都無所得此人是大施主是師子吼亦不依住無所得亦無不依住知解是名六絕師子人我不生諸惡不起是納須彌於芥子中不起一切貪瞋八風等是悉能噏四大海水入口中不受一切虗妄語言是不入耳中不令身起一切惡於人是納一切火於腹中祇如今於一一境不惑不亂不瞋不喜於自己六根門頭刮削併當得淨潔是無事人勝一切知解頭陀精進是名天眼亦名了照為眼是名法界性是作車載因果佛出世度眾生則前念不生後念莫續前念業謝名度眾生前念若瞋即將喜藥治之即名為有佛度眾生但是一切言教祇如治病為病不同藥亦不同所以有時說有佛有時說無佛實語治病病若得瘥箇箇是實語治病若不瘥箇箇是虗妄語實語是虗妄語生見故虗妄是實語斷眾生顛倒故為病是虗妄祇有虗妄藥相治佛出世度眾生是九部教語是不了義教語瞋及喜病及藥總是自己更無兩人何處有佛出世何處有眾生可度如經云實無眾生得滅度者亦云不愛佛菩提不貪染有無諸法名為度他亦不守住自己名為自度為病不同藥亦不同處方不同不得一向固執依佛依菩提等法盡是依方故云至於智者不得一向教中所辯喻於黃葉亦如空拳誑小兒若人不知此理名同無明如云行般若菩薩不得取我語及依教敕瞋如石頭愛如河水祇如今但無瞋無愛是透山河石壁直為治聾俗病多聞辯說治眼病從人至佛是得從人至地獄是失是非亦然三祖云得失是非一時放却不執住一切有無諸法是名不住有緣亦不依住不依住是名不住空忍執自己是佛自己是禪道解者名內見執因緣修證而成者名外見誌公云內見外見俱錯眼耳鼻舌各各不貪染一切有無諸法是名受持四句偈亦名四果六入無迹亦名六通祇如今但不被一切有無諸法閡亦不依住不閡亦無不依住知解是名神通不守此神通是名無神通如云無神通菩薩足迹不可尋是佛向上人最不可思議人是自己天是智照讚即喜喜者屬境境是天讚是人人天交接兩得相見亦云淨智為天正智為人本不是佛向渠說是佛名體結祇如今但莫作佛知解亦無無不依住知解是名滅結亦名真如亦名體如求佛求菩提名現身意祇如今但有一切求心盡名現身意如云求菩提雖是勝求重增塵累求佛是佛眾求一切有無諸法是眾生眾祇如今鑑覺但不依住一切有無諸法是不入眾數祇如今於一一聲香味觸法等不愛於一一境不貪但無十句濁心是了因成佛學文句覓解者名緣因成佛見佛知佛則得說佛有知有見却是謗佛若云佛知佛見佛聞佛說即得見火即得火見即不得如刀割物即得物割刀即不得知佛人見佛人聞佛人說佛人如恒河沙是佛知是佛見是佛聞是佛說萬中無一祇為自無眼依他作眼教中喚作比量智祇如今貪佛知解亦是比量智世間譬喻是順喻不了義教是順喻了義教是逆喻捨頭目髓腦是逆喻如今不愛佛菩提等法是逆喻難捨喻於頭目髓腦如照著一切有無境法名頭被一切有無境法相撓著名手都未照前境時名髓腦聖地習凡因佛入眾生中同類誘引化導同渠餓鬼肢節火然與渠說般若波羅蜜令渠發心若一向在聖地憑何得至彼共渠語佛入諸類與眾生作船筏同渠受苦無限勞極佛入苦處亦同眾生受苦佛祇是去住自由不同眾生佛不是虗空受苦何得不苦若說不苦此語違負等閑莫說錯說佛神通自在不自在且慚愧人不敢說佛是有為是無為不敢說佛自由不自由除讚藥方外不欲得露現兩頭醜陋教云若人安佛菩提置有所是邊其人得大罪亦云如不識佛人前向渠與麼說無過如無漏牛乳能治有漏病其牛者不在高原不居下隰此牛乳堪作藥高原喻於佛下隰喻於眾生如云如來實智法身又無此病辯才無閡昇騰自在不生不滅是名生老病死疼痛㿇㿇是暗喫菌羮患痢疾而終是暗為藏明頭迹明暗都遣莫取無取亦無無取他不明不暗王宮生納耶輸陀羅八相成道聲聞外道妄想所計如云非雜食身純陀云我知如來決定不受不食第一須具兩隻眼照破兩頭事莫祇帶一隻眼向一邊行即有那箇邊到功德天黑暗女相隨有智主人二俱不受祇如今心如虗空相似學始有所成西國高祖云雪山喻大涅槃此土初祖云心心如木石三祖云兀爾忘緣曹谿云善惡都莫思量先師云如迷人不辯方所肇公云閉智塞聰獨覺冥冥者矣文殊云心同虗空故敬禮無所觀甚深修多羅不聞不受持祇如今但是一切有無諸法都不見不聞六根杜塞若能與麼學與麼持經始有修行分者箇語逆耳苦口可中與麼作得至第二第三生能向無佛處坐大道場示現成等正覺變惡為善變善為惡使惡法教化十地菩薩使善法教化地獄餓鬼能向明處解明縛能向暗處解暗縛撮金成土撮土成金百般作得變弄自由於恒沙世界外有求救者婆伽婆即披三十二相現其人前同渠語音與渠說法隨機感化應物殊形變現諸趣離我我所猶屬彼邊事猶是小用亦是佛事門中收大用者大身隱於無形大音匿於希聲如木中之火如鐘皷之聲因緣未具時不可言其有無傍報生天棄之如涕唾菩薩六度萬行如乘死屍過岸如在牢獄廁孔得出佛披三十二相相喚作垢膩之衣亦云若說佛一向不受五陰無有是處佛不是虗空何得一向不受佛祇是去住自由不同眾生從一天界至一天界從一佛剎至一佛剎諸佛常法又云若據三乘教受他信施供養他在地獄中菩薩行慈悲同類化導報恩不可常在涅槃又云如火見火但莫手觸火不燒人祇如今但無十句濁心貪心愛心染心瞋心執心住心依心著心取心戀心但是一句各有三句箇箇透過三句外但是一切照用任聽縱橫但是一切舉動施為語默啼笑盡是佛慧大鑑下四世筠州黃檗斷際禪師諱希運乃福州人也師初到洛京行乞吟添鉢聲有一嫗出林扉間云太無厭生師云汝猶未施責我無厭何耶嫗笑而掩扉師異之進而與語多所發檗須臾辭去嫗告之曰可往南昌見馬大師師至南昌大師已遷寂聞塔於石門遂往瞻禮時百丈大智禪師廬于塔傍師序其遠來之意願聞平日得力句百丈乃問巍巍堂堂從何方來師曰巍巍堂堂從嶺南來丈曰巍巍堂堂當為何事師曰巍巍堂堂不為別事便禮拜又舉我再參馬大師侍立次大師顧繩牀角拂子我問即此用離此用大師云汝他後開兩片皮將何為人我取拂子豎起大師云即此用離此用我挂拂子舊處被大師震威一喝我直得三日耳聾師聞是語不覺吐舌丈云子已後莫承嗣馬大師去否師云不然今日因師舉得見馬祖大機大用且不識馬祖若嗣馬祖已後喪我兒孫丈云見與師齊減師半德子甚有超師之作百丈一日問師甚處來師云大雄山下採菌子來丈云還見大蟲麼師作大蟲聲丈拈斧作斫勢師與丈一掌丈吟吟而笑即歸上堂云大雄山下有一大蟲汝等諸人也須好看百丈老漢今日親遭一口師在百丈普請開田次丈問運闍棃開田不易師云隨眾作務丈云有煩道用師云爭敢辭勞丈云開得多少田師將钁築地三下丈便喝師掩耳而去師問百丈從上宗乘如何指示於人丈據坐師云後代兒孫將何傳受丈云我將謂你是箇人便起去南泉問師黃金為城白銀為壁是甚麼人居止處師云聖人居止處泉云更有一人居何國土師近前叉手而立泉云道不得何不請王老師道師云更有一人居何國土泉云可惜許師上堂大眾纔集師拈拄杖一時打散復召大眾眾回首師云月似彎弓少雨多風師一日揑拳謂眾云天下老和尚總在這裏我若放一線道從汝七縱八橫若不放過不消一揑時有僧問放一線道時如何師云七縱八橫云不放過時如何師云普裴相國一日請師至郡以所解一編示師師接置於座略不披閱良久曰會麼裴曰未測師曰若便恁麼會得猶較些子若也形於紙墨何有吾宗裴乃贈詩一章曰自從大士傳心印額有圓珠七尺身挂錫十年棲蜀水浮杯今日渡漳濵一千龍象隨高步萬里香華結勝因擬欲事師為弟子不知將法付何人師亦無喜色自爾黃檗門風盛于江表矣問如何是道如何修行師云道是何物汝欲修行問諸方宗師相承參禪學道如何師云接引鈍根人語未可依憑云此既是接引鈍根人語未審接上根人復說何法師云若是上根人何處更就他覓他自己尚不可得何況更別有法當情不見教中云法法何狀云若如此則都不要求覓也師云若與麼則省心力云如是則渾成斷絕不可是無也師云阿誰教他無他是阿誰你擬覓他云既不許覓何故又言莫斷他師云若不覓即便休誰教你斷你見目前虗空作麼生斷他云此法可得便同虗空否師云虗空早晚向你道有同有異我暫如此說你便向者裏生解云應是不與人生解耶師云我不曾障你要且解屬於情情生則智隔云向者裏莫生情是否師云若不生情阿誰道是問纔向和尚處發言為什麼便道話墮師云汝自是不解語人有什麼墮負問向來如許多言說皆是抵敵語未曾有實法指示於人師云實法無顛倒汝今問處自生顛倒覓什麼實法云既是問處自生顛倒和尚答處如何師云你且將物照面看莫管他人又云只如箇癡狗相似見物動處便吠風吹草木也不別又云我此禪宗從上相承已來不曾教人求知求解只云學道早是接引之詞然道亦不可學情存學者却成迷道道無方所名大乘心此心不在內外中間實無方所第一不得作知解只是說汝如今情量處為道情量若盡心無方所此道天真本無名字只為世人不識迷在情中所以諸佛出來說破此事恐你諸人不了權立道名不可守名而生解故云得魚忘筌身心自然達道識心達本源故號為沙門沙門果者從息慮而成不從學得汝如今將心求心傍他家舍只擬學取有什麼得時古人心利纔聞一言便乃絕學所以喚作絕學無為閑道人今時人只欲得多知多解廣求文義喚作修行不知多知多解飜成壅塞唯知多與兒酥乳喫消與不消都總不知三乘學道人皆是此樣盡名食不消者所謂知解不消皆為毒藥盡向生滅中取真如之中都無此事故云我王庫內無如是刀從前所有一切解處盡須併却令空即是空如來藏如來藏者更無纖塵可有即是破有法王出現世間亦云我於然燈佛所無少法可得此語只為空你情解知量但消融表裏情盡都無依執是無事人三乘教網只是應機之藥隨宜所說臨時施設各各不同但能了知即不被惑第一不得於一機一教邊守文作解何以如此實無有定法如來可說我此宗門不論此事但知息心即休更不用思前慮後問從上來皆云即心是佛未審即那箇心是佛師云你有幾箇心云為復即凡心是佛即聖是佛師云何處有凡聖心耶云即今三乘中說有凡聖和尚何得言無師云三乘中分明向你道凡聖心是妄你今不解返執為有將空作實豈不是妄妄故迷心汝但除却凡情聖境心外更無別佛祖師西來直指一切人全體是佛汝今不識執凡執聖向外馳騁還自迷心所以向汝道即心是佛一念情生即墮異趣無始已來不異今日無有異法故名成等正覺云和尚所言即者是何道理師云覓什麼道理纔有道理便即心異云前言無始已來不異今日此理如何師云只為覓故汝自異他汝若不覓何處有異云既是不異何更用說即師云汝若不認凡聖阿誰向汝道即即若不即心亦不心可中心即俱忘阿你更擬向何處覓去問妄能障自心未審而今以何遣妄師云起妄遣妄亦成妄妄本無根只因分別而有你但於凡聖兩處情莫計念自然無妄更擬若為遣他都不得有纖毫依執名為我捨兩臂必當得佛云既無依執當何相承師云以心傳心云若心相傳云何言心亦無師云不得一法名為傳心若了此心即是無心無法云若無心無法云何名傳師云汝聞道傳心將謂有可得也所以祖師云認得心性時可說不思議了了無所得得時不說知此事若教會何堪也問只如目前虗空可不是境豈無指境見心乎師云什麼心教汝向境上見設汝見得只是箇照境底心如人以鏡照面縱然得見眉目分明元來只是影像何關汝事云若不因照何時得見師云若也涉因常須假物有什麼了時汝不見他向汝道撒手似君無一物徒勞謾說數千般云他若識了照亦無物耶師云若是無物更何用照你莫開眼䆿語去上堂云百種多知不如無求最第一也道人是無事人實無許多般心無事亦無散去問如何是世諦師云說葛藤作什麼本來清淨何假言說問答但無一切心即名無漏智汝每日行住坐臥一切言語但莫著有為法出言瞬目盡同無漏如今末法向去多是學禪道者皆著一切聲色何不與我心心同虗空去如枯木石頭去如寒灰死火去方有少分相應若不如是他日盡被閻老子拷你在你但離却有無諸法心如日輪常在虗空光明自然不照而照不是省力底事到此之時無棲泊處即是行諸佛路便是應無所住而生其心此是你清淨法身名為阿耨菩提若不會此意縱你學得多知勤苦修行草衣木食不識自心盡名邪行定作天魔眷屬如此修行當復何益故誌公云佛本是自心作那得向文字中求假饒你學得三賢四果十地滿心也只是在凡聖內坐不見道諸行無常是生滅法勢力盡箭還墜招得來生不如意爭似無為實相門一超直入如來地為你不是與麼人須要向古人建化門廣學知解誌公云不逢出世明師枉服大乘法藥你如今一切時中行住坐臥但學無心久久雖實為你力量小不能頓超但得三年五年或十年須得箇入處自然會去為汝不能如是須要將心學禪學道佛法有什麼交涉故云如來所說皆為化人如將黃葉為金止小兒啼決定不實若有實得非我宗門下客且與你本體有甚交涉故經云實無少法可得名為阿耨菩提若也會得此意方知佛道魔道俱錯本來清淨皎皎地無方圓無大小無長短等相無漏無為無迷無悟了了見無一物亦無人亦無佛大千沙界海中漚一切聖賢如電拂一切不如心真實法身從古至今與佛祖一般何處欠少一毫毛既會如是意大須努力盡今生去出息不保入息問六祖不會經書何得傳衣為祖秀上座是五百人首座為教授師講得三十二本經論云何不傳衣師云為他有心是有為法所修所證將為是也所以五祖付六祖六祖當時只是默契得密授如來甚深意所以付法與他汝不見道法本法無法無法法亦法今付無法時法法何曾法若會此意方名出家兒方好修行若不信云何明上座走來大庾嶺頭尋六祖六祖便問汝來求何事為求衣為求法明上座云不為衣來但為法來六祖云汝且暫時斂念善惡都莫思量明上座乃稟言六祖云不思善不思惡正當與麼時還我明上座父母未生時面目來明上座於言下忽然默契便禮拜云如人飲水冷暖自知某甲在五祖會中枉用三十年功夫今日方知不是六祖云如是到此之時方知祖師西來直指人心見性成佛不在言說豈不見阿難問迦葉云世尊傳金襴外別傳何法迦葉召阿難阿難應諾迦葉云倒却門前剎竿著此便是祖師之標牓也甚生阿難三十年為侍者只為多聞智慧被佛呵云汝千日學慧不如一日學道若不學道滴水也難消夫出家人須知有從上來事分始得且如四祖下牛頭橫說豎說猶未知向上關棙子有此眼目方辯得邪正宗黨且當人事宜不能體會得但知學言語念向皮袋裏安著到處稱我會禪還替得汝生死麼輕忽老宿入地獄如箭我纔見汝入門來便識得了也還知麼急須努力莫容易事持片衣口食空過一生明眼人笑汝久後總被俗漢算將去在宜自看遠近是阿誰面上事若會即便會若不會即散去珍重問如何是西來意師便打自餘施設皆被上機中下之流莫窺涯涘唐大中年終於本山諡斷際禪師塔曰廣業
