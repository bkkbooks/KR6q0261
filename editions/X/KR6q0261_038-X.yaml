body:
  text: 襄州洞山第二代初禪師語錄師上堂云楚山北面漢水南江擊法鼓而會禪徒舉宗風而明祖道若以揚眉瞬目竪拳竪指謦欬咳嗽是廚中拭鉢帛道什麼會也無也是衲僧破草鞋者瞎漢者漆桶是箇弄精魂鬼總與麼總不與麼是東司頭廁籌子以此稱提從上來事盡是邪魔所作謗大乘滅胡種與你天地懸殊且道衲僧據什麼道理出來對眾道看折脚鏜子各出一隻手貴得宗乘不斷亦表叢林有人有麼若無洞山不惜眉毛打葛藤去也葛藤之事只在目前萬象森羅乾坤大地百千諸佛日月星辰地獄三途起心動念每日經歷皆是諸德自己何不向這裏體當尋覓看驀然得倜儻分明不虗行脚也自得箇安樂田地洞山此語且作死馬醫若據明眼衲僧將草鞋驀口𡎺還怪得他也無怪即不怪你道憑箇什麼捉得將來脚跟下推尋毫末參差搥折你脚莫麤心好便下座上堂良久有僧問列祖昇堂人天堅請不昧宗乘乞師指示師云頭鬅鬙耳卓朔僧云一句流通人天聳耳師云墨黲襴衫日裏曬進云師唱誰家曲宗風嗣阿誰師云重言不當吃問赤水求珠猶是人間之寶和雲唱出猶非格外之談未審今日將何示人師云夜聞祭鬼鼓朝聽上灘歌問言超象表青霄外出語幽玄事若何師云岸上行人聲有韻船中漁父和不齊云幽玄事若何師云鈎長線短問從上來事未有人當頭道得請師當頭道師云八十翁翁不拄杖問聞師引出潭中意直透青霄事若何師云甲己之年丙作首云今日事若何師云大好雪晴問如何是佛師云麻三斤問海竭人亡時如何師云大難得云便與麼去時如何師云雲在青天水在瓶問道本無言如何理論師云十里鼓問如何是古佛心師云巢知風穴知雨問牛頭未見四祖時如何師云楖𣗖木拄杖云見後如何師云竇八布衫問佛法兩字即不問如何是從上來事師云眼裏瞳人吹木笛問百尺竿頭須進步如何是進底步師云炎裏放木鵝問如何是諸佛出身處師云寒山不語拾得笑問纔生便死時如何師云鍾馗解舞十八拍問如何是正法眼師云紙撚無油問智不落千差請師通不犯師云蒸餅搵餳問心未生時法在什麼處師云池中荷葉動決定有魚行問不當之言請師不發師云水流霧下云誠如是言師云人無遠慮必有近憂云與麼則因地而倒因地而起師云不當之言不發問佛及涅槃並為增語理既如此事又作麼生師云釋迦老子誠實之言問如何是禪不禪師云猢猻摘仙果問諸上善人皆說不二法門居士默然意旨如何師云無目不畵眉問如何是學人入理之門師云陽烏啼時西嶺上問如何是學人本源師云山高雲峻問心非意想道絕功勳如何是心師云鷰子不入楚云如何是道師云還我話頭來問幻與非幻未是學人極則處如何是入理之談師云八十翁翁牙不動問見境不動時如何師云眉長三尺二云如何是見境不動底事師云鼻孔占却三畆地師乃云明機自昧息慮迷源萬法同塵語默難顯不是情中法莫生種種心離此章句別有商量且道離却作麼生商量還有委悉者麼明明地揀破明明地顯示明明地舉唱明明地謌詠更無囊藏被蓋純說乾𪹼𪹼地禪若是靈利禪僧纔聞舉著便合眼卓朔地知箇落處豈不是自家具眼其柰罕遇奇人蓋緣洞山這裏言無味食無味法無味無味之句塞斷人口兄弟到這裏難為湊泊若向這裏得分明天下尊宿到與不到徹與不徹總被你驗破何故蓋智有邪正道有虗偽多只與麼心機意識認得門前屋後底學得路布葛藤一堆一擔蘊在胸襟道我會禪會道還夢見禪道也未喚作打底不遇作家到老只成愲懂待到明朝後日驀劄地踏著正脉省前所行履處方始羞見本命元辰下座上堂時有僧問師登文殊座請師唱道情師云天晴開水路無事設曹司僧云謝師指示師云賣鞋老婆著隻履問隘路不通風如何通得信師云飜著襴衫戴席帽問如何是道師云云如何是道中人師云失問平常心是道如何是平常心師云路不拾遺問和尚百年後向什麼處去師云從上孔丘甲乙己云此意如何師云不會即問人問如何是和尚撲不破底句師云親問劫火洞然大千俱壞未審這箇壞不壞師云天降蒲薄紙方圓一尺餘問大通徹底人作何語話即得不傷物義師云道士登醮壇問澄而不清混而不濁時如何師云額裂幞頭問萬法歸一一歸何所師竪兩指云如何得歸一去師云學語之流問如何是清淨法身師云烏龜不入水陸地弄塵行問如何是洞山圓鏡師云人將語試水將杖試問不向心頭安了義如何達得祖師言師云六脚蜘蛛上板床問動轉無私如何施設師云拶問根本智中如何趣向師云把火照魚行問如何是正法眼師云郭郎鼻孔云還鑒照也無師云纖毫總見問言不投機請師提撕師云六七對夜月問言無朕跡如何理論師云鍾馗不讀書問三界唯心萬法唯識識即不問如何是心師云泥裏蝦蟇雲裏走旱地蛇師水底行問如何是透法身句師云兩箇布針三箇眼問如何是出家師云剃頭不持鉢師乃云舉唱宗乘闡揚大教須得法眼精明方能鑒辯緇素切緣真要一源水乳同器到此難分洞山尋常以心中眼觀身外相觀之又觀乃辯真偽若不如是何名善知識者夫善知識者驅耕夫之牛奪飢人之食方名善知識即今天下那箇是真善知識諸德參得幾箇善知識來也不是等閑直須參教徹教透千聖莫能證明方顯大丈夫兒不見釋迦老子明星出時豁然大悟與大地眾生同時成佛無前後際豈不暢哉雖然如是若遇明眼衲僧也好擗脊棒便下座問法不孤起仗境方生向上一路請師便道師云聽事不真喚鐘作甕問如何是道師云竹竿頭上禮西方問如何是洞山水師云雲裏雹子云飲者如何師云大小問朕兆未生以何為證師云烏龜背上紋問金鱗不點額時如何師云左眼半斤右眼八兩問如何是免生死底人師云措大席帽問絕功勳處如何趣向師云蟻子不食鐵問如何是摩尼珠師云手𢹂針筒𦝫懸藥袋問如何是大通徹人師云漢高大王問文殊普賢來參師時何如師云趂向水牯牛欄裏著云與麼則和尚入地獄如箭射師云全憑子力問乾坤休駐意宇宙不留心時如何師云峴山亭起霧灘峻不留船問佛法無形從何建立師云神前木虎子問諸方盡落綣模請師出竅道師云十八女兒不繫裙云與麼則平地起骨堆師云自領出去問奔流渡刃疾焰過風時如何師云平常心是道上堂云言無展事語不投機承言者喪滯句者迷還得麼你衲僧分上事到者裏須具擇法眼始得只如洞山與麼道也有一場過且道過在什麼處僧問如何是透法身句師云土星犯牛宿問亡言事不到開口理相乖未審如何即是師云釋迦老子頭白問如何是衲僧本分事師云雲裹楚山頭決定多風雨問承教有言如人含一口水自不能言萬法不出於心各各皆住本位當與麼時請師接師云六隻骰子不成雙云畢竟如何師云插標嫌水淺問石門遷化向什麼處去師云麝香不合藥問學人未達本源時如何師云脚底毛生問遠遠投師時如何師云爭怪得老僧云終不敢造次師云恰似不齋來問如何是頭頭物物盡底句師云三歲孩兒入戲場問路逢達磨時如何師云鼻孔大小問四海無浪月輪孤時如何師云眼裏鬚眉長二尺問不落心機意識乞師一句師云楚山入漢水云未會請師更道師云湖南楂子問不惜時機用如何話祖宗師云三箇胡桃兩塊餳問如何是洞山劒師云金州客云用者如何師云伏惟尚饗問離却心機意識請師道一句師云道士著黃甕裏坐問如何是不動底心師云賜紫金魚袋問生死海中以何為津梁師云年盡不燒錢問祖師西來唯傳一心諸方為什麼各說異端師云貪觀白浪失却手撓問龍庭金口問如何對玉機師云海底紅塵起石裏瑞花生問智隔千重鏁如何擘得開師云波斯不戴帽問三乘十二分教即不問祖師西來意請師直指師云小兒不著鞋問如何是和尚臨機為人一句師云官差不自由云與麼則得一失一也師云自知較多少問大用現前時如何師云天不長惡問文殊問維摩以何為入不二法門維摩默然未審意旨如何師云六隻骰子一時赤問如何是當處常湛然師云淨手裝香云如何是覓即知君不可見師云觸手拈經問如何是竺土大僊心師云草鞋不入市問鐵石之心如何去得師云張良下殿走問如何是入不二法門師云眉長三尺二上堂云語中有語名為死句語中無語名為活句諸禪德作麼生是活句到者裏實難得人若也不動一塵不撥一境見事便道答話長老下脚不得東西南北莫知多少要得去離泥水活人眼目舉唱宗風激揚大事不道全無其柰還少即緣未達其源落在第八魔境界中識得箇不名不物無是無非頭頭物物無不具足道我得安樂田地更不求餘凡有扣擊問難即敲床豎拂更不惜便施說便行便用向惡水坑裏頭出頭沒弄箇無尾猢猻到臘月三十日鼓也打破猢猻又走却了手忙脚亂一無所成悔將何及你若是箇衲僧乍可凍殺餓殺終不著你鶻臭布衫便下座問不犯一切請師提綱師云瘂子得夢問如何履踐即得無譊訛師云見之不取思之千里問劫火洞然大千俱壞未審什麼人為主師云陳平不舉令問如何是和尚擘不破底句師云孫臏不入市問如何是真出家師云剃除鬚髮云只者莫便是也無師云因什麼五戒不持問言無展事意旨如何師云漢江不渡船問不落是非請師道師云責云慈悲何在師云苦口是良藥問如何是禪師云熊耳山下問如何是無縫塔師云十字路頭石師子問實際本無憑何建立師云新豐老人八十八問真源無朕兆如何話祖宗師云起席不謝坐問如何是清淨法身師云渤土裏兒問如何是佛法大意師云三日風五日雨問如何是露地白牛師云針劄不入云飲噉何物師云一任東西問如何是通身一句師云月似彎弓少雨多風問萬緣俱息時如何師云甕裏石人賣棗團問如何是道師云頭不梳面不洗問牛頭未見四祖時如何師云三山帽子大袖布衫云見後如何師云市食齋僧問一言道盡時如何師云吉凶不上卦問月不當戶時如何師云矮子騎馬問如何是真空妙用師云契書鐵券權為用妙句無私也是閒問絕點無蹤時如何師云尖斗量不盡問如何是學人佛性師云來日二十七問如何是衲僧本分事師云駱駝渡漢江問如何是親切一句師云達磨無當門齒上堂學須實學見須實見若未諦見當須克己參尋博問先達稍是不得且向洞山處討箇入路一切塵剎一切境界一切佛界一切眾生界盡十方界一切物類一時拈來手內在眼睛裏亦無來往等相不礙見聞覺知舉起一足乾坤一時震動行著一步海水盡皆波濤湧沸提起一足須彌山百雜碎唾一唾虗空撲落地諸德每日受用還自知也無洞山不獲已且作死馬醫對上機兄弟面前渾成一場笑具向他上機人前說箇什麼即得挨一挨拶一拶喝一喝棒一棒得麼指天指地五言七字得麼好風好雨得麼如斯舉唱遍大地攪不轉把掃掃作一堆將火燒把篾縛掉放江裏從他流下去且作麼生去也珍重問如何是洞山境師云村裏人油葫蘆問身手作罪橫羅口舌時如何師云看錮鏴著生鐵云知過後如何師云望煙尋食地錯入燻皮家問將何指示令學人得透金塵師云天子馬蹄鳴問心若無事萬法不生時如何師云風鈴有韻真堪聽聽得猶來曲不成云正當與麼時文殊普賢在什麼處師云長者八十一其樹不生耳云意旨如何師云一不成二不是問如何是學人本來眼師云旋風不左轉問維摩掌擎四世界未審維摩身在什麼處師云在闍黎後底云為什麼在學人後底師云還我話頭來問法無羈鏁為什麼趣入却難師云波斯讀梵書問便與麼去猶涉程途省力處乞師一言師云腰帶不著𩊓問如何是大道之源師云天寬地窄問一切諸佛及諸佛法從此經出未審此經從什麼處出師云一字不著點云如何是一字不著點師云碧眼胡僧笑點頭問如何是離却生死底句師云掃地添瓶問長蛇偃月即不問疋馬單鎗事如何師云線大鼻孔小問口欲談而詞喪心欲緣而慮忘猶是生死邊事如何是向上事師云阿難不持梵夾問但得本莫愁末如何是本師云手纖脚大云如何是末師云量不著上堂云洞山者裏尋常方丈內不似諸方一个上來一个下去啾啾唧唧地衷私說底禪道佛法盡是向你兄弟面前滿口說滿口道滿口拈提滿口欒揀無你左遮右掩處一時和底飜出諸德作麼生委悉汝試對眾道看譬如太末虫處處泊得不能泊於火焰之上被他諸方老禿甜唇美舌說作配當道這箇是禪這箇是道這箇是菩提涅槃者箇是真如解脫被丈二釘八尺楔楔在眼裏不知不覺乍到洞山這裏不知是何說話會得麼直饒會得真如涅槃菩提解脫毫末無差也被條繩子於脚跟下繫却不得出離若是靈利衲僧一咬咬斷作箇脫洒衲僧豈不快哉若三咬兩咬不斷準前打入愲懛社裏有什麼出頭時洞山事不獲已傍地裏為你著力珍重問如何是和尚接人一句師云雞啼不著時隣人半夜行云如何領會師云一任東西問只與麼便請益時如何師云千斤秤不住云鳥道不存也師云錯數定盤星問說者聽者二俱如幻無說無聽時如何師云馬趂不上云與麼則信受奉行師云還我話頭來問如何理論即得不昧師宗師云天地玄黃問不變不動是何境界師云臘月三十日問如何是一真境界師云衲僧破草鞋問離却有無請師端的師云三脚鐺子無耳桗問兩處俱亡時如何師云把針失却線問不歷古今句請師運普音師云措大騎驢云與麼則學人側聆也師云手提巾子問即今心即不問如何是本來心師云腰長脚短問不動智源如何接物師云大悲菩薩無手眼問面前三事變背後萬般形如何師云那吒不識父云如何是那吒不識父師云眼裏瞳人築氣毬問匝地普天即不問應機不失事若何師云三白大眾問如何是正法眼師云六祖愛喫和羅飯問未曾開口道十方佛已知時如何師云不來諸比丘說欲及清淨問生死事大請師相救師云三家村人失却火問承古有言剎說眾生說三世一時說即不無未審為什麼人說師云三頭兩面者云為即不無還當也無師云蝦跳不出㪷問如何是不從師邊得底事師云夜觀乾象問釋迦以何為師即得無上菩提師云三千條罪莫大於不孝問知有亦不立妄有亦不生正當與麼時如何話道師云六耳不同謀問如何是大道本源師云赤脚上船問古鏡未磨時如何師云三番羯磨云羯磨後如何師云為什麼五戒不持問只者猶不是如何即是師云天性不喫酒問自古及今不從人得六祖黃梅夜聞何事師云志公拄杖云得用時如何師云用那曲尺作什麼問如何是毛吞巨海師云六祖口脣大問如何是會佛法底人師云兩道行纏問青青翠竹盡是真如此理如何師云朝遊山水暮宿草菴問自肯己常人知見己不見己時如何師云看錮鏴著生鐵問纔伸一問悔思不及請師方便師云兩得便宜問如何是學人本分事師云三脚蝦𢋙無後脚問目前無朕兆如何顯真宗師云八十婆婆手擎扇問如何是無心鏡師云水深三尺云還照學人心也無師云徹膽見問一塵纔舉大地全收如何是一塵師云波斯上廟問只見龜毛長不見兔角生請師現兔角師云目裏瞳人築氣毬問絲盡停機是諸佛權行之義向上事請師直道師云多毋失愛問諸方即心即佛未審和尚此間如何師云無底楪子七八片問如何是超毗盧越釋迦之談師云迦葉目視佛上堂法鼓纔動大地全收諸德在鼓聲裏來往還知也無對眾道看若道不得被洞山熱瞞下座上堂即心即佛破執二疑非心非佛止宿草菴且居門外向上一路千聖不傳葛藤言語作麼生是衲僧分上事良久云拈得出來也是破草鞋下座問天堂地獄是什麼人居止師云洞山問如何是法身師云穿靴水上行云莫便是否師云水上烏龜頭赫赤問作止任滅猶是禪那之病如何免得師云梵僧不袒肩問未問未答如何商量師云持鉢不得撲破鉢盂問金烏出海耀天地與此光陰事若何師云崑崙渡海誇珍寶波斯門下騁鬚多上堂無邊剎境自他不隔於毫端洞山魚鼓聲動延慶白馬鷲嶺谷隱師僧盡隊隊入僧堂裏喫飯諸德識得幾箇對眾道看若向這裏道得即有可良善不無行脚若道不得閻老徵你草鞋錢有日在便下座問超佛越祖人難得請師一句顯根源師云裁衫錯却領問古寺清幽如何辯主師云責云你何方便得覩慈悲師云焚香胡跪問不斷佛種請師一言師云犯著太白星問遍地黃金便與麼用時如何師云滿天列宿白日雨下上堂諸德提將鉢囊拄杖千鄉萬里行脚蓋為生死不明要得達法悟道到處豈無親覲尊宿善知識若為你解粘去縛道眼分明甄別是非堪為師匠即便抝折拄杖高掛鉢囊取箇徹頭莫愁不成辦或若開口動舌說向上向下這邊那邊玄會妙會道出道入君臣父子明體明用盡是謗般若埋沒宗風不識好惡尿床鬼子帶累後人無有了日拽下繩床落脊棒趂出三門再教行脚與伊為增上緣也與宗門出得氣更向其中叉手竝脚唱諾撮他野狐涎唾自肯自重云得和尚為我揀為我說得箇安樂處還睡覺也未還洒洒也未喚作病不遇良醫悞服他毒藥認得箇驢鞍橋喚作阿爺下頷與你本分事有什麼交涉將知你一生行脚只是踏破草鞋始終成得箇不唧𠺕漢下去問尅己求真是修行人之大錯能辯邪正猶乖道體未審如何修證師云六隻骰子一時赤問不在內不在外不在中間未審在什麼處師云偏衫不蓋體問如何是學人自己師云親人不著便問萬緣俱罷六戶齊寧時如何師云天晴不肯去云便與麼去時如何師云須待雨霖頭問盡大地人來如何指示師云舌頭拄上腭問請師出榍師云七顛八倒問心境未明時如何師云吐舌至頂相問大藏教是一場是非學人親切請師道師云有手不彈指問天皇打典座意如何師云喫酒不謝座問如何是學人究竟事師云說云未審說箇什麼師云泥裏撼樁問如何趣向即得至理無差師云垂鈎水上云與麼則謬向途中枉施功師云自知較一半問但得本莫愁末如何是學人本師云草鞋無底問如何是塵劫不昧底事師云脫衣不渡水問添一減一理歸何所師云三年一閏問真修道人不見世間過未審世間有什麼過師云兩人著緋一人著皁問煙雲不到處喚作什麼師云燒錢不及時云與麼則劃地作佛像去也師云自屎不覺臰問三身中阿那身說法師云親言出親口問如何是說底口師云還我話頭來問如何是撥塵見佛底句師云楚山頭上播紅旗問心不是佛智不是道還有過也無師云知仙大小問生死根源請師指箇入路師云頭破額裂云學人不會乞師指示師云天上天下問承古有言天得一以清地得一以寧君王得一以治天下衲僧得一時如何師云五九四十五太陽來入戶問佛法禪道是同是別師云梳頭不洗面問明月當空如何鑒照師云量之不足問久淘砂磧未覩真金請師指示師云入水不濕脚云與麼則學人得用去也師云爭柰脚板潤云一言可以喪師云不知是不是是即也大奇問諸方盡在繩墨裏未審和尚此間如何師云篙箭射須彌問扶籬摸壁時人盡知諸佛正法眼請師直指師云夢裏打三更問十二時中行住坐臥自省覺時如何師云看人喫飯云爭柰樹影不斜何師云親言出親口問一法若有毗盧墮在凡夫萬法若無普賢失其境界未審如何即是師云眼裏瞳人築氣毬問森羅及萬象皆從一法所印如何是一法師云要你眼作什麼云還許學人受用也無師云可惜許問金鍮現前請師辯師云兩脚蝦䗫吞却月問的言無證時如何師云牙疼灸左耳云甘苦常言師云聽事不真喚鐘作甕問如何是不歷巨海獲驪珠底人師云四手八臂問久昧衣珠請師指示師云磁石不攝針問彎彎似月廓落三星西土即無此間事如何師云東南西北問十二時中如何得與道相應去師云拈東摸西問從上宗乘請師垂示師云老鵶線斷問一念未生為什麼不見自己師云劃地成牢問盡未來際遍法界中盡此一句時如何師云有錢千里通無錢隔壁聾上堂丸丹一顆點鐵成金至理一言轉凡成聖世間法亦復如是洞山且問諸德作麼生是轉凡成聖底道理試對眾道看雖然不出頭肚裏道了也作麼生是轉凡成聖底道理且道轉箇什麼莫瞌睡作麼生莫是一喝一棒麼如此見解是街頭巷尾打鐵磬輪木槵數珠念喝囉怛那行者輩見解在你衲僧家合作麼生須是具眼方能辯邪正莫只與麼過諸德時不待人切須努力睡一覺起來看取是什麼道理久立珍重問不與萬法為侶底人還有向上事也無師云道士頭戴冠問如何是佛師云灼然諦當問如何是三寶師云商量不下問如何是清淨法身師云醬甕裏蛆兒問一箭便中時如何師云過云過在什麼處師云著上堂且如禪師者須是己事分明具擇法眼遍參知識方辯祖宗法胤水乳岐分若不然者何名衲僧行脚不遇師匠最苦莫過於此可惜許大丈夫兒莫隈隈𨻵𨻵地禪德洞山尋常道待我家園麥熟事持磨麵作箇餕餡屈取東西南北善知識同共一筵破除了盡與伊出却釘却榍拈却炙脂帽子脫却鶻臭布衫作箇洒洒地禪師後代學人有可依倚豈不俊哉問如何是洞山劒師云問作什麼云也要知師云罪過問如何是古佛劒師云何不問云用者如何師云鉛刀子問承古有言諸旋未息彼物先住尚不可得意旨如何師云虗空擲骰子上堂莫揑目妄想總不如是道本無機豈留心法諸德且作麼生領會莫錯會好珍重問承古有言其中長者子箇箇盡無裩如何是長者子師云只你是云是箇什麼師云猫兒打筋斗問如何是洞山師云動則傾湫倒岳不動即天地黑暗問學人欲殺父殺母如何下手師云急問非時親覲請師一句師云對眾作麼生舉云據現定舉師云放你三十棒云有什麼罪過師云罪不重科問風不鳴條雨不破塊是什麼人分上事師云要道即道云便請道師云分付不著人却令道者怪問久居洞中為什麼一物全無師云脚大木履小云如何領會師云直步問如何是室中人師云不在外問壁上有一高僧至時還說法也無師云來去不住問大眾雲臻請師略舉綱要師云水上浮漚呈五色海底蝦蟇叫月明問洞山鬱茂為什麼無味師云驗在目前問朗月當空是什麼人境界師云闍黎境界云為什麼日用不知師云非洞山過問如何是籠中鳥師云在籠中多少時云只為籠中鳥師云却飛去問學人欲伸一問為自己不見時如何師云無背面問朗月當空為什麼不見自己師云近後問如何是沙門行師云不損人問雲水是人遊是什麼人能到峰頂頭師云無足人能行佛手人能執問佛即不問如何是法師云你為什麼不出家問無佛無人處法從何生師云你在什麼處出家云現在目前和尚自看師云五戒也不持問目覩瞿曇猶如黃葉意旨如何師云襄州土宜不出別物問量闊無邊為什麼不容自己師云窄問曹溪一句即不問如何是雲門一句師云天下人咬不著云還當得生死也無師云是何生死問佛佛相應祖祖相傳未審相傳底事如何師云此去韶州八百五十云與麼則有口不如無聲師云速須懺悔問擘破成狼籍渾崙又不成藥病俱消處便請師商量師云雲生嶺上水出高源云與麼則師子吼也師云還我師子吼來問無心道人還有法示人也無師云黑地入漆甕云既是無法緣何得入師云到老惺惺問如何是動乾坤底人師云須彌山上打筋斗問乍可永劫受沉淪誓不將身求半偈師云官不容針私通車馬云與麼則和尚容許也師云且領前話問大藏教是箇切脚如何是字母師云啞子上刀梯兵馬都監太保問眼處入正受諸塵三昧起此意如何師云洞山茶椀裏有太保太保茶椀裏有洞山太保無語將此話問尊宿谷隱云不落無言說延慶云喚什麼作三昧師問僧莫便是新到否僧云是師云夜來投栖處今朝事如何僧云今朝風較急青山背上行師云不是更道僧云珍重師便打問如何趣向即得至理無差師云垂鈎水上云與麼則謬向途中枉施功師云自知者少問鼓聲纔罷大眾雲臻學人與麼來請師速道師云撥雲看日暈坐水看山行問釋迦掩室於摩竭淨名杜口於毗耶猶是中下之機向上一路請師說破師云玄玄無倚靠逈逈勿人知問輪王寶劒常露現前輪王即不問如何是寶劒師云水裏無魚人皆信空裏行船笑殺人問諸佛非我道誰是最道者師云樓上打鼓聽聲在外問父母非我親誰是最親者師云瘂子買甜瓜問真即幻幻即真離此二途如何道師云臨河照影云與麼則叉手當胷退身三步師云若不同床臥焉知被裏穿問眾魔到來如何支遣師云鍾馗解舞十八拍云還受厭禳也無師云信邪倒見死入地獄問自知當作佛未審什麼人證明師云耆婆賣針筒問寂寂無惺惺時如何師云波斯不過江問藤蘿高萬丈身與白雲齊時如何師云昔時東海曾相識却向西山弄日頭問擬問和尚有煩尊重擬欲不問己事未明今日上來問即是不問即是師云今日敗闕云為什麼如此師云虗空烜赫無涯岸海月圓時無別天問如何是透法身句師云千江有水千江月萬里孤舟萬里身問學人擬歸鄉請師指路頭師云楚山頭向東問如何是祖師西來意師云衣衫不整問以字不成八字不是未審是什麼字師云波斯入市問大海有珠驪龍守護時如何師云困問如何是諸佛出身處師云楚山頭問心外無法不可所求法內無心不可所得離此二途如何是道師云紙上畵鍾馗問真空得之不空妙有得之不有衲僧得之如何師云拈匙不把筯云與麼則一切法常也師云只為不常問承師有言禪子相投西山月落未審落在什麼處師云手裏把釣問心外觀法法不際心心內觀法法源不達如何是本源師云面上眉長三尺二問停真罷想時如何師云水底弄傀儡云誰是看翫者師云停真罷想者云與麼則大盡三十日小盡二十九也師云你見什麼道理云某甲合喫和尚痛棒問知而不悟時如何師云草鞋子斷問虗空無口憑何說師云木履觜長三尺二問撥塵見佛時如何師云旛竿頭上不插標問德山入門便棒臨濟入門便喝未審和尚意旨如何師云尖斗量不盡云還有為人處也無師云頭戴天脚履地師到雲門雲門問近離什麼處師云楂渡門云夏在什麼處師云湖南報慈門云幾時離彼師云八月二十五門云放你三頓棒師晚間入室次却問今日祗對次蒙和尚放三頓棒未審過在什麼處門云江西湖南便與麼商量師於言下大悟遂云他後向無人煙處卓箇庵子不畜一粒米不種一莖菜接待十方往來盡與伊抽釘拔楔拈却炙脂帽子脫却鶻臭布衫教伊洒洒地作箇衲僧豈不俊哉門云你身如椰子大開得許大口上堂洞山普樂無言展托終日現前誰知適莫無遮無障不知不覺更有一言乾乾𪹼𪹼歌頌隨物通真頌并序至大莫若於道至廣莫若於法無言表而不顯於道無物象而不出於法且夫眾生浩浩窮本末以何歸處處忙忙據生死而何托洞山聊述一頌提舉大綱號隨物通真頌曰現在目前何易何難將何指陳表法無言物之有物言之有言明明無礙了了無邊見之成道不用再三物物是我河沙體全法法無法言無可言眼見耳聞白日青天東西南北竺土大僊印之可印燈之燈傳著衣喫飯文殊普賢手提巾子赤脚上船是水是火本絕諸緣禪僧座主庶民大官寬衣大袖窄領布衫接延賓客對答語言高之與下不在詐言上徹天界下透黃泉不是別物古聖皆傳得之可保見之安然今之浪說出自無端更有一言好看好看明道頌大道坦然廓落無邊了了虗徹寂然何安含容妙用隨物方圓自本心法眾生迷源道無別道玄無別玄向說不信須要攀緣識心是佛了即是安心將何識識者何心心識兩亡見道在先從古至今體自如然凡聖共有沙界同源前賢後哲悟此而傳著衣喫飯語默言詮不是別物是箇癡頑怏須提取勿放狂顛巧施妙句廣引多般揚眉瞬目閃爍機關以此為解千山萬山人迷逐物切要自看自看得力諸聖准則行住坐臥皆承恩力成佛作祖越此不得不得伊何要你消磨坐看北斗立黃河天南海北於我於何明明了了你何不曉惺惺皎皎於何不照世界根源眾生祖老終日現在名名善巧說之已說聽亦甚好會與不會任自長保真讚一巧一拙誰許甄別青山白雲兒孫皆說窈窕邪身頭尖鼻缺斫額看魚焚香祭獺又空生幻身幻滅空存谷傳其聲鐘受其音取之寫邈號之曰神一言纔發四驥難尋月之有水鏡之有塵不可虗傳洞山之真又身不奇兮貌不揚語不異兮法不藏滿天星宿兮月中月白日金烏兮海岳彰又我教不寫又被寫我教不圖又被圖可惜半匹青絲絹畵了令人笑一場又月兔走入海日烏飛上山見此若不會虗度幾千年色空頌眼病生色空病仍存真空真色日月乾坤白日買賣夜裏屈人東西南北碧眼胡僧示徒頌洞山寂寞無可依托禪子相投西山月落提綱頌洞山月冷雪漫漫綠水清風刮骨寒言談語句無滋味釋迦達磨海東邊投機頌向你道泄天機我不會汝惺惺徧法界何不明開眼睡悟即驚好問伊是阿誰共商量莫相悞快道取者眾生剪商量頌見非言說知真語即是非畵龍頭似馬那箇得便宜指話會頌洞山語孤孤言淡人難措舉目會宗風辜負西來祖指通機頌洞山寂寞一無可有無味之句塞斷人口明心頌禪不禪律不律赤脚著鞋水上立大洋海底黑雲生回頭西山日初出因事頌五臺山上雲蒸飯佛殿階前狗尿天幡竿頭上煎䭔子三箇猢猻夜簸錢牛兒頌自牧一牛兒出入無欄圈放在芳草中毛色方能顯朝去無人趂暮歸無人喚其力不可當有角無鼻綣不使任從伊使著隨人轉天下無荒田盡是此牛變有人若覓伊走去天涯畔牽來似諸人問汝見不見隨牛狗兒家有一狗兒駭小人難見終日隨牛去未省使人喚見客不作聲見人偏能善擬議上門來早是輸他便好好報禪師須著精神看任汝靈利人不覺為死漢法身頌法身寥廓徧河沙萬象森羅共一家法法盡含真妙用莫將眼病見空花報身頌報身具足無窮體現用分明勿是非悟了始知言無異休將巧妙用心機化身頌化身來往任縱橫隱顯諸緣應萬機只這見心非不見剛須見外強生疑又述一頌洞山有一語道得無用處對面共商量脫衫著却袴又道本無言詮言詮非本妙對面共商量誰人能得了又洞山有一言對答須提舉瞪目若思量者漢去去去彭殿直問和尚年多少師有頌一臘更一臘相續已年高住持無別物化導勿劬勞勸人常有語不用苦忉忉只為他不信佛大即泥多十心頌心是春普雨山河及大地澀酸鹹淡甘與苦盡受春功滋助力心是水任器方圓與寬窄或直隨人得濁惡諸般皆盡法王法心是火熱得眾生煩惱果枝枝葉葉普皆榮開得心蓮花一朵心是秤萬戶千門同共用纖毫輕重自低昂便合自知不高穩心是尺示與世人生條直莫教指下有推那地獄三塗難得出心是斗量盡天涯是非口堆山積岳在心思死後波吒親自受心是燈照見人間黑暗心指教直行不能行須作欺瞞地獄因心是鏡照破人間邪與正對面言談恰似直背後猶來黑似漆心是道凡聖同居月皓皓只於閙處證菩提便合如來真正道心是師條貫六賊不暫離時時呼喚在目前纔使出門不柰伊廓書狀上頌十載學玄微今朝方息機洞山一句子落處少人知師却問作麼生是洞山一句子書云逼塞虗空師云大好少人知書却問作麼生是洞山一句子師云峴山亭上無字
