  - {type: 其他, offset: 5169, content: 僧問趙州久嚮趙州石橋到來祇見掠犳不見你祇見掠犳不見石橋僧云如何是石橋州云渡驢渡馬, id: KR6q0261_X_039-mulu-20, level: '3'}
  - {type: 其他, offset: 5237, content: 趙州問南泉離四句絕百非請師道泉便歸方丈州云者老漢尋常口吧吧地不消一問, id: KR6q0261_X_039-mulu-21, level: '3'}
  - {type: 其他, offset: 5298, content: 同光帝命諸禪師坐次云朕收得中原之寶祇是無人酬價興化云如何是陛下中原之寶帝以兩手展幞頭脚化云君王之寶誰敢酬價, id: KR6q0261_X_039-mulu-22, level: '3'}
  - {type: 其他, offset: 5379, content: 南泉齋次自將生盤去首座前云出生杉山時為首座云無生泉云無生猶是未便過杉山乃召長老長老泉回首云作麼杉云莫道是未頌, id: KR6q0261_X_039-mulu-23, level: '3'}
  - {type: 其他, offset: 5461, content: 僧問長慶有問有答賓主歷然不問不答時如何慶云相逢盡道休官去林下何曾見一人頌, id: KR6q0261_X_039-mulu-24, level: '3'}
  - {type: 其他, offset: 5525, content: 僧問長慶眾手淘金誰是得者慶云有伎倆者得僧云學人還得也無慶云大遠在頌, id: KR6q0261_X_039-mulu-25, level: '3'}
  - {type: 'cbeta:juan-end', offset: 5586, content: 古尊宿語錄卷之三十九, id: KR6q0261_X_039-juan-end, juan_n: 039, jhead: 古尊宿語錄卷之三十九}
  - {type: 序, offset: 5586, content: 智門祚禪師語錄序, id: KR6q0261_X_039-mulu-26, level: '2'}
