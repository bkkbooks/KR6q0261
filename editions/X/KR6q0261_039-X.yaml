body:
  text: 智門祚禪師語錄門人住明州雪竇山資聖寺明覺大師賜紫重顯述上堂良久師顧視左右云莫有作家戰將出來雖然如是風不來樹不動時有僧問十地菩薩見性如隔羅縠祇如初地菩薩又隔什麼師云須彌山進云如何透得師云三生六十劫僧問一機未發如何辨其語脉師云大眾可驗僧云學人如何進向師云退後三步僧問格外稱提請師舉唱師云你合作麼生進云與麼則承指示也師云莫妄想問曹溪路上還有俗談也無師云六祖是盧行者問一切智智清淨還有地獄也無師云閻羅王是鬼做問如何是佛師云踏破草鞋赤脚走進云如何是佛向上事師云拄杖頭上挑日月問蓮華未出水時如何師云蓮華進云出水後如何師云荷葉師乃云一法若有毗盧墮在凡夫萬法若無普賢夫其境界正當與麼時文殊向什麼處出頭若也出頭不得金毛師子𦝫折又云正好一盤飯莫待糝椒薑便下座因舉僧問香林雲門親的旨今夜囑何人林云涅槃經僧云與麼則親的林云末後品時有僧問師涅槃經意旨如何師云大喻八百小喻三千進云末後品意旨如何師云雞足三峰頭倒卓又云會麼僧云不會師云直待彌勒下生來問師子返躑即不問虎頭生角時如何師云生得幾箇進云漝麼則學人退身三步師云龍頭蛇尾問如何是大乘修行師云擔枷帶鏁問既是龍居未審龍在什麼處師云眼下一帶青僧云學人未曉此意如何師云瞎上堂云汝若進一步即迷其理若退一步又失其事若也寂然地又同無性作麼生免得此過所以古人道明知與麼故合不犯正當與麼時切忌傾倒著便下座問古人拈起拄杖意旨如何師云看樓打樓進云放下拄杖意旨如何師云百雜碎問聖僧為什麼被大蟲咬師云不錯問如何是離却藥忌一句師云口是禍門又云叉手當胷問魚游陸地時如何師云取死不遲進云却下碧潭時如何師云鑽泥刺土問牛頭未見四祖時如何師云天寬地窄進云見後如何師云地窄天寬上堂云德山入門便棒臨濟入門便喝你且道山僧者裏用箇什麼還有人委悉麼不如歸堂向火珍重上堂云三兩日來好春雨可謂霶𩃰凡夫人見水是水天人見水是琉璃魚龍見水是窟宅餓鬼見水是火你衲僧家喚作什麼你若喚作水又同凡夫見若喚作琉璃又同天人見若喚作窟宅又同魚龍見若喚作火又同餓鬼見是你尋常還作麼生所以道若是得底人道火不燒口道水不溺身你每日喫飯還少得一粒麼又古人云終日著衣喫飯未曾咬著一粒米未曾掛著一縷線雖然如此又須實到者裏始得若未到者田地且莫掠虗問諸法寂滅相不可以言宣時如何師云好箇問頭進云漝麼則帀地普天師云更是一堆問如何是無縫塔師云四楞著地進云如何是塔中人師云鼻孔三斤稱不起問威音王以前是什麼人先悟師云何不問露柱僧云便漝麼會時如何師云二頭三手問威音一響妙色已彰時如何師云兩重公案問既是普眼為什麼不見普賢師云弄巧成拙問學人有龜毛拂子將奉師時如何師云老僧有兔角拄杖與闍黎進云與麼則進貢得賞也師云三十年後此話大行上堂云諸上座且得秋涼正好進道決擇還有疑情出來對眾大家共你商量理長處就所以趙州八十尚自行脚祇是要飽叢林又且不擔板若有作者但請對眾施呈忽有騎墻察辨呈中藏鋒忽棒忽喝或施圓相忽象王迴旋忽師子返躑忽作大師子吼忽拗折拄杖忽掀倒禪床但請施設還有麼眾無對又云若是宗門中兒孫須瞻祖師機方可是祖師苗裔不可喫却祖師飯著却祖師衣趂謴過日便道我是行脚僧者箇祇喚作名字比丘徒消信施閻羅王久後徵你草鞋錢有日在莫道我得便宜忽然一日眼光落地入地獄如箭射又圖箇什麼各自著便宜又不是憨漢也久立因歲朝上堂云斬新日月特地乾坤人人盡加一歲你道露柱年多少還有人道得麼對眾道看若道不得山僧與你註破也祇是甲子會時有僧問大用現前不存軌則時如何師云你為什麼趯破脚指頭問日用而不知常用事如何師云兩重公案進云漝麼則更不運步也師云草鞋底穿問金剛眼中著得箇什麼師云一把沙進云為什麼如此師云非公境界問如何是學人自己師云問底是誰僧云學人請益師云也是作賊人心虗問絕功勳處如何履踐師云更買兩緉草鞋進云漝麼則退步也師云太少在問如何是如來禪師云橫擔拄杖緊繫草鞋問如何是祖師禪師云上大人又云會麼僧云不會師云不會且順朱上堂云是你諸人橫擔拄杖出一叢林入一叢林你道叢林有幾種或有栴檀叢林栴檀圍繞或有荊棘叢林荊棘圍繞或有荊棘叢林栴檀圍繞或有栴檀叢林荊棘圍繞祇如四種叢林是你諸人在阿那箇叢林裏安身立命若無安身立命處虗踏破草鞋閻羅王久後徵你錢有日在問眾生有難炭庫裏藏身諸佛有難火𦦨裏藏身衲僧有難甚處藏身師云你不是衲僧問既是龍居為什麼不降甘雨師云踈田不貯水進云漝麼則眾生無賴也師云悲龍爭柰何問國師三喚侍者意旨如何師云憐兒不覺醜進云國師辜負侍者意旨如何師云美食不中飽人飡進云侍者辜負國師意旨如何師云粉骨碎身未足酬問三身中那身說法師云闍黎鼻孔塌進云因什麼如此師云謗斯經故獲罪如是問既是諸法寂滅相為什麼却有真說師云話墮也進云寂滅相又何在師云不在你口裏問如何是一大事因緣師云問取目犍連進云學人不會乞師再指師云舍利弗當知進云未審如何領會師云大似不齋來問作麼生是和尚歇人一句師云待闍黎不漝麼來即得僧云祇如漝麼來還得休歇也未師云驢年問盡大地人各置一問問問各別未審和尚如何祇對師彈指一下進云未審還副得他問也無師云隋州紙貴問如何是一合相師云明鏡當臺進云如何是貪著底事師云胡是胡漢是漢問從上古德以何酬効於師承師云驗在目前進云漝麼則心不負人面無慚色師云你為什麼辜負我僧云和尚也須領話師云放你三十棒問承教中有言譬如摩尼寶殿三角常隱一角常現如何是常現底一角師云險上堂云數日好雨且道雨從什麼處來若道從天降那箇是天若道從地出喚什麼作地若更不會所以古人道天地之前徑時人莫強移箇中生解會眼上更安錐又云赫日裏我人雲霧裏慈悲霜雪裏假褐雹子裏藏身還藏得身麼若藏不得却被雹子打破你髑髏上堂云茫茫宇宙人無數幾箇男兒是丈夫且道男兒與丈夫是同是別所以古人道佛法無多子其中難得人且道難得什麼人祇是難得不會佛法底人眾中還有不會佛法人麼若有吐露箇消息來看所以黃梅七百眾却被行者傳衣得法去且道行者還會佛法麼故知籌盈石室童子悟道又何關多口衲僧之事上堂云雪峰輥毬羅漢書字歸宗斬蛇大隨燒畬且道明什麼邊事還有人明得麼試道看若明不得所以道斬蛇須是斬蛇手燒畬須是燒畬人瞥起情塵生妄見眼裏無筋一世貧問如何是大通智勝佛師云言無再響進云如何是十劫坐道場師云禍不單行進云如何是佛法不現前師云金屑雖貴進云如何是不得成佛道師云眼裏著不得問久雨不晴時如何師云蘿蔔不生根進云既是久雨為什麼不生根師云一任叫皇天問如何是形山寶師云你有幾條袈裟進云請師指示師云一任亂走問如何是不變異句師云變也進云畢竟如何師云鳧脚長鶴脚短上堂云若欲多求恐妨於道祇如諸上座還得道業成辦也未若也未辦千般巧說不益其心萬種思量是何道理所以古人道你若無心我也休晴乾不肯去須待雨霖頭問如何是般若體師云蚌含明月進云如何是般若用師云兔子懷胎問三春已去九夏又臨學人未明乞師直指師云打你頭破作七分僧云也知師為迷徒切爭柰學人未曉何師云非日月咎問經有方便學人情學人上來乞師直指師云見成公案進云未審學人過在什麼處師云放你三十棒問未有世界時還有佛法也無師云少一時不生剩一時不死問拈槌竪拂揚眉瞬目即不問向上一路請師舉唱師云你為什麼擔枷過狀進云與麼則謝師方便師云罪不重科問師唱誰家曲宗風嗣阿誰師云重疊關山路進云今日一會又奚為師云對牛彈琴問真源無眹兆如何話祖宗師云句裏明人進云漝麼則南山起雲北山下雨師云楊花得暖風問如何是透法身句師云猢猻繫露柱上堂云千人排門不如一人拔關僧便問如何是千人排門師云守株待兔進云如何是一人拔關師云你不是者手脚問如何是禪師云最苦是黃連進云如何是道師云甜底是甘草上堂云皷聲纔罷罕遇作家僧出禮拜師云打鼓為三軍僧云長蛇偃月休施展匹馬單鎗謾立功師云氷消瓦解僧云諾師云蘇嚕蘇嚕問空王殿中以何為侍者師云樓至佛上堂云南泉道自小養一頭水牯牛擬向谿東放不免食他國王水草擬向谿西放不免食他國王水草不如隨處納些些他總不見所以雲門大師道平地上死人無數過得荊棘林是好手只饒你截斷凡聖及盡有無也祇是老鼠入飯甕未知有向上一竅在便有僧問如何是向上一竅師便打云我早是將一塊屎驀口抹了你更來咬我手作麼僧擬議師便趂上堂云神方祕術子父不傳山僧有箇藥方黑豆好合醬便下座問如何是清淨法身師云滿眼是埃塵問如何是色空師云薤園裏賣𦵇問應化非真佛亦非說法者未審是什麼人說師云露柱口脣缺問如何是無底鉢盂師云挂向壁上進云未審將何齋粥師云瓦椀竹筯問如何是佛師云抱贓叫屈問如何是祖師西來意師云山雲野雉問如何是然燈前師云空劫無閒人僧云如何是正然燈師云火星入牛斗進云如何是然燈後師云衲僧天下走問古鏡未磨時如何師云也祇是箇銅片進云磨後如何師云且收取問學人有一問未審師還答也無師云南地鵠北地狐進云意旨如何師云三月裏看問善財入樓閣是何時節師云末後殷勤進云畢竟如何折倒師云不如退後三步僧云恁麼則古人不先今人不後師云秦王擊缶問終日切切祇為庭前殘雪如何得雪消去師云相次春來進云恁麼則紅輪起處底穿盪盡師云雪上更加霜問閉門造車時如何師云還得成就也未進云出門合轍時如何師云魯般門下問承教有言一人發真歸源十方虗空悉皆銷殞既是虗空云何銷殞師云歸源者合知進云恁麼則一漚生處眾波同師云細看前話因李都尉奏師紫衣到日上堂僧問皇恩遠降紫服新披未審師今將何報答師云頭戴天脚踏地進云恁麼則知恩報恩也師云你也是老鼠喫鹽問照日絲綸自天而降皇恩極大師將何報師云大好天涼進云與麼則雲龍會合日月重明師云閑言語師乃云問話且止斯日皇恩且道自何而降老僧本志弊衣遮幻質糲食補飢瘡無何都尉聞天榮頒紫服著即又違本志不著又負天心挂不挂且致你道祖師挂什麼衣若也委悉許上座終日著衣未曾挂著一縷絲終日喫飯未曾咬著一粒米若不委悉看老僧今日披衣去也遂乃披衣師示眾云智門記得在母胎中時有一則語今日舉似大眾諸人又不得作道理商量還有人商量得麼若商量不得三十年後不得錯舉或云登天不假梯徧地無行路正當漝麼時向什麼處安身立命或云千人排門不如一人拔關還有人拔得關麼試對眾道看若道不得且在門外或云日來月往瘡痍轉多你將什麼醫得你若醫不得作麼生柰者瘡痍何或云三十年前即不問你三十年後不用將來正當即今還道得麼若道不得一處不通兩處失功或云荊棘叢林則不問你出身一句作麼生道或云頭上霹𮦷則不問你雲開雨散道將一句來或云天下行脚道我參禪你道禪是什麼義或云日裏來往總不疑著半夜裏道將一句來或云橫擔拄杖則不問你針箇鼻孔裏道將一句來或云鉢盂無底成得箇什麼或云狂象無鉤將何制勒若制勒不住莫教犯他苗稼或云天降時雨為什麼枯木不生花或云天地及日月時至皆歸盡作麼生是透脫一句或云出身一句則不問你三家村裏道將一句來或云衲僧須是透得名身句身方可具得衲僧一隻眼還有道得底麼或云滿口道不著底句還道得麼或云仰面看天為什麼不識月或云低頭拾芥為什麼不見地或云初秋夏末遊山翫水且從你驀劄一問快道將來或云出門一句不問你萬里無雲道將一句來或云險峻路上則不問你平田莊裏道將一句來或云黃卷赤軸則不問你衲僧分上一句作麼生道或云直得凡聖情盡未是衲僧本分事且作麼生是衲僧本分事試通箇洎息來若也道不得莫道龍居相埋沒好綱宗歌昆明池裏失却劒曲江池內撈得鋸䶥䶥齖齖且過時莽莽鹵鹵河沙數糲竭節拽路布刢利衲僧通一路師子不捉麒麟兒猛獸那堪牀下顧摩斯吒入水去者回休吐黑雲霧俊鷹俊摶天飛鈍鳥籬根捱不去佛祖言休更舉直饒格外猶未許見成公案早多端那堪更涉他門戶夜烏雞誰捉去天明戴雪遭指注胡蜂不戀舊時窠猛將那肯家中死三巴鼻座主巴鼻休誇不二維摩一默文殊失利衲僧巴鼻高原陸地不生蓮華豈容香氣禪師巴鼻師子遊戲水漲船高蒱牢贔屓示眾何物苦求而不得何物不求而自來何物鐵槌打不破何物夜合而晝開若人不會山僧意琉璃寶殿生青苔因事二首左轉復右轉身被摩訶衍放下搆深泉不論深與淺猛𦦨爐中看月輪急須著眼莫因循若未垂得勞生手如何出得𦦨光身世尊一日陞座大眾雲集文殊從座而起白槌云諦觀法王法法王法如是世尊便下座文殊白槌報眾知法王法令合如斯會中若有仙陀客不待眉間毫相輝汾州莫妄想頌馬祖出得一汾州妄想如雷播九州參禪若無衲子眼多於海上覓浮漚雪峰示眾云南山有一條鼈鼻蛇你等諸人切須好看鼈鼻事難提當陽薦者迷舉頭錯入草嶺上鷓鴣啼雪峰輥毬頌象骨輥毬孰辨機一千五百幾人知眨起眉毛千萬里須是吾門師子兒僧問雲門如何是吹毛劒門云祖頌吹毛寶劒問雲門來者投機豈更存路逢劒客如何也甑人𢹂首向南奔僧問雲門如何是和尚家風門云有讀書人來報在處叢林有家風且與雲門事不同門外若有讀書者任是顏回亦不通僧問雲門如何是祖師西來意門云日裏看山頌日裏看山也是常西來祖意謾商量金毛師子稀逢有多是狐狸喚作狼雲門抽顧頌雲門抽顧笑咦咦擬議遭他顧鑑咦任是張良多計䇿到頭於此亦難施僧問大隨劫火洞然大千俱壞未審者箇還壞也無隨云壞僧云與麼則隨他去也隨云隨他去頌切忌隨他不會他大隨此語播天涯真淨性中纔一念早是千差與萬差大隨和尚看烏龜在陸地僧便問一切眾生皮裏骨者箇眾生為什麼骨裹皮隨脫一隻鞋蓋却烏龜便去如龜藏六已彰名休向人前弄眼睛一隻皮鞋都蓋却直至如今猶未惺僧問洞山如何是佛山云麻三斤麻皮三斤不用秤秤頭那肯坐於蠅一念纔生筋骨露徒勞更覓定盤星僧問雲門如何是沙門行門云會不得僧云為什麼會不得門云祇守會不得君問沙門行沙門行最高若教人會得業性卒難逃僧問趙州久嚮趙州石橋到來祇見掠犳不見你祇見掠犳不見石橋僧云如何是石橋州云渡驢渡馬趙州石橋本無星水急游魚不易停橋上祇觀驢馬跡誰人敢向御街行趙州問南泉離四句絕百非請師道泉便歸方丈州云者老漢尋常口吧吧地不消一問離却四句絕百非作者相諳識得伊跳下禪牀便歸去從他子摶天飛同光帝命諸禪師坐次云朕收得中原之寶祇是無人酬價興化云如何是陛下中原之寶帝以兩手展幞頭脚化云君王之寶誰敢酬價君王之寶實難酬興化形言下一籌兩手展開幞頭脚敕書挂在鳳皇樓南泉齋次自將生盤去首座前云出生杉山時為首座云無生泉云無生猶是未便過杉山乃召長老長老泉回首云作麼杉云莫道是未頌古老巡堂親掠生渡水行舟不易耕莫道無生猶是未纖毫不了亂縱橫僧問長慶有問有答賓主歷然不問不答時如何慶云相逢盡道休官去林下何曾見一人頌人人盡道我心休問著何曾有地頭口說心違瞞自己業河迅速任漂流僧問長慶眾手淘金誰是得者慶云有伎倆者得僧云學人還得也無慶云大遠在頌眾手淘金得者誰纖塵窒礙豈能為洪波浩渺黃金遠一事無成空手歸智門祚禪師語錄序利生機要捨悲智無以立言暢道軌圍存中下無以臻極苟非曠發羣動越絕孤應則何以𦦨續千燈芳騰五葉師韶陽的孫香林嗣子闢天人之深域振今古之洪謨建化度門高運寰海既編聯而互出致流落以交參敢議窺班輒形刪定但貴其簡略而已於戲祖胄之來星布攸廣或局一方一師之解玷瀆先知蘊半禪半律之宜加諸後進起異端於筆舌固狂狷於辭鋒譏圓明有三句接人指淨慧列三聚之語既非摭實頗共傳虗衒惑見聞盜求聲利蓋叢室之巨蠧也豈堪忍乎夫欲抑其宗必先入其奧儻未甄別徒自傷殘魯語所謂君子非詩書不言非禮樂不動故昔賢人三緘其口以誡于心況吾徒萌一意立一事得不務於弘濟而恣銷金銷骨之毀說寧不畏慎滅身之斧耶可為龜鑑矣庶知我者觀斯文而絕其謗閱于集而味其道則凜凜慧風無遠不及時辛未歲蕤賓月之五日門人住明州雪竇山資聖寺明覺大師賜紫重顯序
