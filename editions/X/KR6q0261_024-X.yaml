body:
  text: 潭州神鼎山第一代諲禪師語錄神鼎禪師名洪諲襄水扈氏子自遊方一衲以度寒暑嘗與數耆宿至襄沔間一僧舉論宗乘頗敏捷會野飯山店中供辦而僧論說不已師曰三界唯心萬法唯識唯識唯心眼聲耳色是甚麼人語僧曰法眼語師曰其義如何曰唯心故根境不相到唯識故聲色縱然師曰舌味是根境否曰是師以筯夾菜置口中含胡而語曰何謂相入邪坐者駭然僧不能答師曰途路之樂終未到家見解入微不名見道參須實參悟須實悟閻羅大王不怕多語僧拱而退後返長沙隱於衡嶽三生藏有湘陰豪貴來遊福嚴即師之室見其氣貌閑靜一鉢挂壁餘無長物傾愛之遂拜跪請曰神鼎乃我家植福之地久乏宗匠願師俱往何如師笑而諾之即以己馬負師至十年始成叢席一朽牀為說法座開堂日指法座云未登此座化緣已畢諸人還委悉麼若委悉散去得也若不散去不免登於此座入方便品第二去也且不得恠山僧便陞座拈香此一炷香奉為今上皇帝聖壽無疆第二炷香為府主學士合郡尊官伏願長光佛日永佐明君第三炷香此香不是戒定慧香亦非旃檀沉水只是汝州土宜便燒云供養首山和尚以酬法乳師遂敷座顧視大眾云摩竭陀國親行此令大眾還知落處麼一句子該天括地逈超格外在眾聖之前所以五天和不齊梵夾不持來釋迦掩室於摩竭淨名杜口於毗耶三乘教外一句別傳敢問大眾作麼生是別傳底試對眾道看相證明良久云直饒道得亦未稱祖師意且道如何稱得祖師意諸兄弟直須打辦精神究徹根源到這裏不可說菩提涅槃真如解脫向上向下坐禪入定造橋梁開義井得麼然則如是不可無言也山僧初行脚時發足亦無正意參禪學道只欲東京聽一兩本經論以資平生不期行來行去到汝州襄城縣恰遇汝州風發鼓上首山就中見一老和尚彼時蒙它劈頭一錐直得浹背汗流當時不覺禮拜了悔之不及大眾且道悔箇什麼悔不拽下禪牀痛與一頓雖然如是官不容針私通車馬下座小參舉洞山云貪嗔癡太無知賴我今朝識得伊行便打坐便槌分付心王子細推無量劫來不解脫問汝三人知不知師云古人與麼道神鼎則不然貪瞋癡實無知十二時中任從伊行即往坐即隨分付心王擬何為無量劫來元解脫何須更問知不知舉資福三句語第一句祖師不知有師云無人解會第二句與祖佛為師師云鼻孔在山僧手裏第三句稱提祖佛師云分明向你道舉僧問首山如何是和尚家風山云一言截斷千江口萬仞峯前始得玄師云首山只解說家風不解用家風僧問如何是用家風師云𡎺乃云首山老漢若在聞神鼎恁麼道必然大笑一場且道肯神鼎不肯神鼎試商量看諸上座夫參學須具參學眼始得若只愛它人語句記在意識下自不能截斷俗士尚云男兒不用分時財衲僧家合作麼生猛著精彩始得珍重舉僧問靈泉和尚云如何是靈泉印泉云不傳不受曰交代時如何泉云淮南船子看洛陽師云古人與麼道意在如何要會麼不傳不受珍重舉僧問靈泉云如何是靈泉曲泉云無弦琴有韻絲竹動搖天曰還有知音也無泉云有曰如何是知音者泉云山上石人齊撫掌溪邊野老始知音師云神鼎即不然僧便問如何是神鼎曲師云要唱便唱曰還有知音也無師云有曰未審是什麼人師云無心意識者師云神鼎與麼道與靈泉如何試商量看須知各各家風事不同珍重小參舉古金峰頌云學道如鑽火逢烟未可休直待金星現歸家始到頭師云神鼎即不然學道如鑽火逢烟即便休莫待金星現燒脚又燒頭且道神鼎恁麼道為當違古人順古人別有道理汝道入麼去底人好入麼來底人好到這裏須具衲僧眼始得莫受人瞞珍重小參良久舉鏡清上堂良久有僧問祖歌如何唱清云拖送醉人酒曰入麼則辜負和尚也清云猛虎不食伏肉師云古人恁麼道句前明句後明會麼未問已前會取好小參舉僧問趙州黑豆未生芽時如何州云好合醬師云神鼎即不然若問黑豆未生芽時如何向伊道堪作什麼乃有頌曰黑豆未生芽誰道好合醬本色衲僧聞堪是甚模樣華岳頭倒卓須彌脚直上莫言無法用看取者相狀乃云古人與麼道神鼎與麼頌且道違古人順古人還會麼合醬也不中是什麼道理了取始得珍重舉僧問香嚴如何是道嚴云枯木裏龍吟曰如何是道中人嚴云髑髏裏眼睛後有僧舉問石霜枯木裏龍吟時如何霜云猶有喜在曰髑髏裏眼睛時如何霜云猶有識在師云石霜一向打疊去空界裏作活計後有僧舉似曹山山云這石霜老聲聞作這見解曹山有頌云枯木龍吟真見道髑髏無識眼初明意識盡時消息盡當人那辨濁中清師云恁麼會取好小參舉鳥窠和尚有小師辭窠問向什麼處去曰學佛法去窠云若是佛法我這裏也有些子小師便問如何是和尚佛法窠於身上拈起布毛示之隨後便吹小師忽然大悟師遂於身上拈起布毛呈大眾隨後與一吹云會麼久後不得辜負老僧珍重小參舉令初上座領眾上石門門曰萬仞峯前石牛吼穿雲渡水意如何初無對門云山僧住持事大參堂去石門後舉令僧下語曰久響和尚又云訪道尋師明的旨覺了根源顯異機門曰當時令初上座若下得遮語不將它作參學人師云不喚它作參學人喚作什麼人會麼把手共行無間路舉古人曰游江海涉山川尋師訪道為參禪自從認得曹溪路了知生死不相關作麼生是曹溪路有僧云得者飲水之義向阿誰說之師曰知云某甲即如是師意又如何師云出僧堂入佛殿便下座小參舉紫胡有狗上取人頭中取人腰下取人脚你若擬議即喪身失命師云古人提唱一段因緣你道恁麼時下得什麼語神鼎當時若在他會裏便出云者畜生又云死亦作退身勢白兆和尚亦云白兆有狗上不取人頭中不取人腰下不取人脚也不擬議咬得他死便得僧問如何是白兆狗兆作狗聲僧云猶是喋屎狗兆云作麼生是咬人狗僧把衲衣角便拂兆便打師云白兆道也不擬議咬得死便休且道其僧便拂兆便打誰得誰失白兆大似喪車後掉藥袋亦有僧問如何是神鼎狗向伊道誰敢倚門傍戶僧禮拜向伊道神鼎也大嶮有僧便請益此語師云我當時要箇不惜身命底人直至如今無人稱得老僧意你兩箇吐露箇消息看僧擬議師云死小參舉溈山示眾云老僧百年後於山下作一頭水牯牛左肋下書溈山僧某甲正當與麼時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧且作麼生商量師乃有頌不道溈山不道牛認著何處有來由分明裂破應須會會得還同不繫舟舉石門示眾云家山好家山好家山內有無根草澄源異草競芬芳春雷一震金仙道師云作麼生是春雷與大眾說破得麼喝一喝下座小參舉南泉上堂僧問摩尼珠人不識如來藏裏親收得珠即不問如何是藏泉云與你往來者是僧云不往不來者又如何泉云亦是藏僧云如何是珠泉喚僧僧應諾泉云你不會我意師乃有頌曰渠問摩尼珠摩尼在何許呼名應答聲諸方莫錯舉小參舉僧問風穴如何是第一句穴云三要印開朱點窄未容擬議主賓分師隨後一喝如何是第二句穴云妙解豈容無著問漚和爭赴截流機師著語云未問已前錯如何是第三句穴云但看棚頭弄傀儡牽抽都在裏頭人師著語云明破即不堪所以首山和尚道第一句薦得與祖佛為師第二句薦得與人天為師第三句薦得自救即不可又云自救也不了師云神鼎亦有人問如何是第一句云蒼天蒼天如何是第二句云有什麼驢漢如何是第三句云近前來向你道才近前便打若恁麼會得也不辜負祖師西來若是從頭一一問過幾時得休佛法不是磨稜合縫底道理似這一脉說話須是久在它門風來始得直是嫌佛不作嫌法不說方可如是子細珍重小參舉古人云是日已過命亦隨減如少水魚斯有何樂師云古人恁麼道非有利益非無利益神鼎即不然是日已過命亦隨減如少水魚有何不樂且道違古人順古人試撿點看珍重舉古僧問首山一毫未發時如何山云路逢穿耳客曰發後如何山云不用更遲疑曾有僧問神鼎一毫未發時如何神鼎只向伊道白雲嶺上云發後如何師云㵎下水流師乃云若是前來兩轉語有可咬嚼東看西看若是神鼎者語如喫木札瓦片相似實無滋味直是自見自悟始得會麼天高東南地傾西北肅宗帝問忠國師百年後所須何物國云與老僧作箇無縫塔帝云請師塔樣國師良久云會麼帝云不會師云吾有付法弟子躭源却諳此事已後但問此人國師遷化後帝詔問躭源源亦良久云會麼帝云不會源有頌湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識師曰前來國師如此作用不能明了次問躭源源恁麼頌且道盡善不盡善雖成方便須體解始得會麼神鼎為你諸人下四轉語湘之南潭之北師云君臣有路中有黃金充一國師云淨妙體常無影樹下合同船師云千聖同轍琉璃殿上無知識師云凡聖路絕師云若是恁麼會去必不相賺神鼎恁麼注解只是辜負國師馬王請石門蘊和尚住夾山鑾駕出接自問如何是西來大道蘊云御駕六龍千古秀玉街排杖出金門師云一等是祇對王臣太哥三昧寬廓何也恁麼祇對又不辜負西來大意又善能回互其中事理縱然若有問神鼎如何是西來大道對云行且道與古人是同是別久參禪客於神鼎語中有箇見處沒量大人只怕往往蹉過僧問大哥和尚千鈞之弩不為鼷鼠而發機忽遇大殺活底人來時如何哥云漢王纔入鴻門會項莊舞劒始知難又云單雄解弄棗木槊尉遲隨後唱番歌師云如有問千鈞之弩不為鼷鼠而發機忽遇大殺活底人來時如何神鼎即向他道千鈞之弩不為鼷鼠而發機亦曾有人問神鼎千鈞之弩不為鼷鼠而發機答他道阿剌剌阿剌剌其僧擬議劈脊便打且問諸人是什麼道理須知各各家風事不同究取好忠國師問僧近離什麼處僧云南方國云南方知識以何法示人曰南方知識道一朝風火散滅如虵脫皮如龍換骨本來真性宛然無壞國云苦哉苦哉南方佛法半生半滅僧便問未審和尚此間如何國云我此間身心一如身外無餘僧云何得將泡幻之身同於法體國云你為什麼入於邪道僧云什麼處是某入於邪道國云不見教中道若以色見我以音聲求我是人行邪道不能見如來師云若據者僧恁麼道傳語也不解累它南方知識據國師恁麼亦是龍頭虵尾前來身心一如向什麼處去試撿點看珍重小參舉溈山與仰山行次溈問仰曰前頭是什麼仰云枯樹子溈又問芸田翁翁亦云枯樹子溈云這田翁他後亦匡五百眾師云為復意在芸田翁處為在仰山處為復總不恁麼諸上座一切諸法縱然更不用生事它是父子說話同道者方知珍重僧問先德遠遠投師請師一接德云兩股金環鳴歷歷如來寶杖親蹤跡要會麼有問有答罕遇知音又問一先德云遠遠投師請師一接德云地湧無源水石人駕慈舟師云此語為復與前來語同耶別耶雖然一箇門風也須是知它尊宿發語處始得作麼生是地湧無源水石人駕慈舟會麼海闊無舟往來不隔珍重南泉云我十八上便會作活計趙州云我十八上便會破家散宅你道破家散宅好解作活計好初機底人且紹前語久參底人直須破家散宅更有一言萬里崖州僧問石門如何是和尚家風門云解接無根樹能挑海底燈後其僧入室問學人不解挑燈意請師方便接無根門云賈島筆頭挑古韻下筆之處阿誰分又云難遇知音神鼎當初問如何是知音門云逢迎直言三歲子唱起巴歌異路行又頌無形無相大威神為接羣生展手頻鳥道不遮圓鑑體金烏常出海東門師云石門恁麼道恁麼頌還會石門家風麼良久云金烏常出海東門珍重梁山觀和尚悟道頌云昔時珍寶被塵埋何事今朝出故懷參道喜明無說句通玄不是意中猜一炷定光輝法界萬重塵鏁豁然開超今異古終難況幸感西胡特地來師云諸上座古人恁麼道意在於何且問諸人作麼生是昔時珍寶試對眾道看道得神鼎與你酬箇價數若道不得猶如糞土久立小參風不鳴條雨不破塊即且止作麼生打得箇翻車筋斗到梵天去若有出來作箇伎倆有麼莫教帝釋惡發後有僧入室某甲當時出來左轉一轉便歸眾師云莫教帝釋發惡又作麼生僧云知恩者少負恩者多師云築着鼻孔應機揀辨問如何是賓中賓師云瞎如何是賓中主師云一似瞎問如何是主中賓師云放你三十捧問如何是主中主師云耶了問如何是接初機句師云山河大地問如何是辨衲僧句師云七棒對十三問如何是正令行句師云不通眨眼云如何是立乾坤句師云你擬作麼會問古人有言靈山話月曹溪指月如何是真月師云照問六國未寧時如何師云道什麼云寧後如何師云謼殺人問內外追尋一物無時如何師云月似彎弓少雨多風問古㵎寒泉時如何師云不是衲僧行履處云如何是衲僧行履處師云不見有古㵎寒泉問家家門前火把子意旨如何師云四時八節問問不轉時如何師云即今是轉不轉云謝和尚點破師云通身覺路玄問輪回六道底人畢竟如何師云不願成佛曰為什麼不願成佛師云佛亦不究竟云請一言師云昨日猶記得今朝話無門問不施寸刃便登九五時如何師云海晏河清曰治化事如何師云萬戶無門鑰皷腹和太平問路逢達道人時如何師云勘破問學人擬入海時如何師云海生海曰恁麼則全承此恩力也師云黑風吹羅剎回光却得妙問曉夜不停時如何師云是誰不停問倒戈卸甲時如何師云大勳不竪賞曰請師原賜師云退問疋馬單鎗時如何師云神鼎打退皷曰畢竟事如何師云想你不是者手脚問菩提涅槃即不問戴角披毛事若何師云不是上座分上事如何是學人分上事師云待你到這田地始向你道曰便恁麼時如何師云退身三步問二王相見時如何師云膝行肘步曰恁麼則全歸一主也師云天下浩浩問丹霄獨步時如何師云老僧只管看破也曰照破後如何師云還我話頭來問古人道午前來者木人喚得回頭午後來者木人喚不回頭正當午時喚即是不喚即是師云臈月二十五問然燈前即不問然燈後亦不問如何是正然燈師云一輪光灼灼今古無晦瞑問諸法未聞時如何師云風蕭蕭雨颯颯云聞後如何師云領話好問蓮花未出水時如何師云千山萬水云出水後如何師云萬水千山問古帆未掛時如何師云到岸也云到岸後如何師云猶是鈍漢問師子未出窟時如何師云吼曰出窟後如何師云悄問魚皷未鳴時如何師云看天看地云鳴後如何師云捧鉢上堂問和尚未見先德時如何師云東行西行云見後如何師云橫擔拄杖問達磨未來時如何師云西天此土云來後如何師云此土西天問寶劒未出匣時如何師云狼烟競起云出後如何師云天下太平問牛頭未見四祖時如何師云天知地知云見後如何師云猶較些子問和尚未見先德時如何師云山河大地云見後如何師云日月星辰問撥塵見佛時如何師云佛亦是塵問覺花未發時如何辨其真實師云冬寒夏熱又云天寒打撼戰問兩手獻尊堂時如何師云是什麼問學人到寶山空手回時如何師云﨟月三十日問戴角披毛即不問寶劒出匣事如何師云問處甚分明曰恁麼則盡法無民師云知時別儀堪作闍黎問三車引不出時如何師云好曰意旨如何師云宜應自忻慶問如何是和尚家風師云饑不擇食又云逢迎不展手門外有三車問如何是接人之機師云齋後來向你道曰即今為什麼不道僧隨聲一喝師云好僧禮拜云放你三十棒問如何是和尚為人句師云拈柴擇菜曰莫只者便是也無師云更須子細問如何是和尚辨衲僧句師竪起拳曰未審意旨如何師云你不妨辨得好師在眾日僧問上座久後唱誰家曲調師云手執無絃琴騎牛脚打鼓問如何是道人活計師云山僧自小不曾入學堂問濟物利生事如何師云闍黎有問山僧有答問如何是和尚深深處師云柴門不掩任聽往來曰還許人就近也無師云且領前話官人指木魚問這箇是什麼師云驚回多少瞌睡人官云洎不到此間師云無心打無心問古人道解接無根樹能挑海底燈如何是無根樹師云日用不知如何是海底燈師云徹髓問如何是清淨法身師云灰頭土面為什麼如此師云爭恠得山僧曰未審法身向上還有事也無師云有曰如何是向上事師云毗盧頂上金冠子問殺父殺母佛前懺悔殺佛殺祖什麼處懺悔師云水長船高問如何是真如體師云如如不動云如何是真如用師云斬問隔墻見角早知是牛隔山見烟便知是火隔墻不見角是什麼師云不麼問山僧問布以七淨花浴此無垢人既是無垢人為什麼却浴師云清淨亦不立問菩提本無樹何處得子來師云喚作無得麼問持地菩薩修路等佛和尚修橋等何人師云近後又云修猶未了在僧問首山如何是佛山云新婦騎驢阿家牽因僧請益師乃有頌新婦騎驢阿家牽誰後復誰先張三與李四拱手賀堯年又頌從上諸聖總皆然起坐忪諸沒兩般有問又須向伊道新婦騎驢阿家牽師復云然雖如此未盡首山大意在僧云如何是首山大意師云天長地久日月齊明靈雲桃花傷嗟尋劒客桃花遇春開靈雲一見處令我咲咍咍偶述三偈長安甚樂到人稀千聖同源到者須知不是歸方可校些子直道逈超凡聖外云有人不肯在由是曹溪第二槌青霄無路自在神鼎寺少鹽兼無醋內外推窮一物無雲水若到來撒手空回去我宗無語句亦無一法與人直下無一物休言無著處四大本空佛依何住禪流聞此說不用更重注更莫忉忉歲旦云眾不下山今年六十九到與麼田地四大將衰朽知自此不下山休白雲且相守彎彎圈圈且任麼過時僧見師舉話略有揀辨乃問如何得似和尚去師云闍黎受屈作麼一自學參玄諸方不問禪水聲流自響舉目看青天有宰官問師坐禪如何師頌云寂寂無一事醒醒亦復然森羅及萬象法法盡皆禪冬節頌冬節年年事世俗多般異祖師門下客長舒兩脚睡食後三巡茶以表山僧意皷聲若動時敢望同來至師不赴王莽山請僧問佛不違眾生之願和尚為什麼有請不赴師云莫錯恠老僧好頌曰一月普現一切水一切水月一月攝若人解了如斯意大地眾生無不徹師在眾時與汾陽昭和尚共作拄杖頌昭頌一條拄杖標揭徑直螺文𪹼節有時橫擔肩上大地乾坤挑括師頌得處不在高峯亦非深溪㵎壑如今幸得扶持老病是為依托一朝卓在孤峯一任諸方拈掇頌上玉泉和尚一種輪回又一迴入垂手化羣迷智大豈留生死界悲深不住涅槃堦毗盧經卷塵中現優鉢羅花火裏開非但我今難比況千佛稽首歎奇哉示初機一步一登臨無非般若心逢人只麼道終不悞他人珍重何方去家山一道光箇中若不會塵劫受忙忙送清首座神峯寒露別知音此後同誰話此心出匣大聲驚宇宙甚時終得會衣襟此日登途去烟雲氣色全我無相憶語更在蘊於言偶述八偈淡薄且隨時家風誰得知有人來請益搖頭未許伊神鼎有一機不用更遲疑日午打三更白淨崑崙兒神鼎有一言絕慮不忘緣日頭恰正午曉夜過西天神鼎有一約不用更斟酌分明向你道文殊問無著神鼎家風水泄不通禪客上來換手槌𦚾神鼎一言瞥爾三千禪客上來急急前行神鼎一說不用分別禪客上來清風明月生緣襄水度歲華偶携缾錫看天涯路逢一人穿耳客咄我回頭得到家自此端然無一事今居神鼎臥雲霞有人若問西來意遙指南山一段畬門人寫真求贊神鼎真誰人寫吾之相一如也真相既爾秋天月夜瞻之寫之摩訶般若
