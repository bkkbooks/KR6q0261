body:
  text: 黃檗斷際禪師宛陵錄丞相裴公問曰山中四五百人幾人得和尚法師云得者莫測其數何故道在心悟豈在言說言說祇是化童蒙耳問如何是佛師云即心是佛無心是道但無生心動念有無長短彼我能所等心心本是佛佛本是心心如虗空所以云佛真法身猶如虗空不用別求有求皆苦設使恒沙劫數行六度萬行得佛菩提亦非究竟何以故為屬因緣造作故因緣若盡還歸無常所以云報化非真佛亦非說法者但識自心無我無人本來是佛問聖人無心即是佛凡夫無心莫沈空寂否師云法無凡聖亦無沈寂法本不有莫作佛見法本不無莫作有見有之與無盡是情見猶如幻翳所以云見聞如幻翳知覺乃眾生祖宗門中只論息機忘見所以忘機則佛道隆分別則魔軍熾問心既本來是佛還修六度萬行否師云悟在於心非關六度萬行六度萬行盡是化門接物度生邊事設使菩提真如實際解脫法身直至十地四果聖位盡是度門非關佛心心即是佛所以一切諸度門中佛心第一但無生死煩惱等心即不用菩提等法所以道佛說一切法度我一切心我無一切心何用一切法從佛至祖竝不論別事唯論一心亦云一乘所以十方諦求更無餘乘此眾無枝葉唯有諸真實所以此意難信達磨來此土梁魏二國祇有可大師一人密信自心言下便會即心是佛身心俱無是名大道大道本來平等所以深信含生同一真性心性不異即性即心心不異性名之為祖所以云認得心性時可說不思議問佛度眾生否師云實無眾生如來度者我尚不可得非我何可得佛與眾生皆不可得云現有三十二相及度眾生何得言無師云凡所有相皆是虗妄若見諸相非相即見如來佛與眾生盡是汝作妄見祇為不識本心謾作見解纔作佛見便被佛障纔作眾生見便被眾生障作凡作聖作淨作穢等見盡成其障障汝心故總成輪轉猶如獼猴放一捉一無有歇期一等是學直須無學無凡無聖無淨無垢無大無小無漏無為如是一心中方便勤莊嚴聽汝學得三乘十二分教有一切見解總須捨却所以除去所有唯置一牀寢疾而臥祇是不起諸見無一法可得不被法障透脫三界凡聖境域始得名為出世佛所以云稽首如虗空空無所依出過外道心既不異法亦不異心既無為法亦無為萬法盡由心變所以我心空故諸法空千品萬類悉皆同盡十方空界同一心體心本不異法亦不異祇為汝見解不同譬如諸天同寶器食隨其福德飯色有異十方諸佛實無少法可得名為阿耨菩提祇是一心實無異相亦無光彩亦無勝負無勝故無佛相無負故無眾生相云心既無相豈得全無三十二相八十種好化度眾生耶師云三十二相屬相凡所有相皆是虗妄八十種好屬色若以色見我是人行邪道不能見如來問佛性與眾生性為同為別師云性無同異若約三乘教即說有佛性有眾生性遂有三乘因果即有同異若約佛乘及祖師相傳即不說如是事唯指一心非同非異非因非果所以云唯此一乘道無二亦無三除佛方便說問無邊身菩薩為什麼不見如來頂相師云實無可見何以故無邊身菩薩便是如來不應更見祇教汝不作佛見不落佛邊不作眾生見不落眾生邊不作有見不落有邊不作無見不落無邊不作凡見不落凡邊不作聖見不落聖邊但無諸見即是無邊身若有見處即名外道外道者樂於諸見菩薩於諸見而不動如來者即諸法如義所以云彌勒亦如也眾聖賢亦如也如即無生如即無滅如即無見如即無聞如來頂即圓亦無無圓無圓見故不落圓邊所以佛身無為不墮諸數權以虗空為喻圓同太虗無欠無餘等閑無事莫強辯他境辯著便成識所以云圓成沈識海流轉若飄蓬祇道我知也學得也契悟也解脫也有道理也強處即喜弱處生瞋似者箇見解有什麼用處我向汝道等閑無事莫謾用心不用求真唯須息見所以內見外見俱錯佛道魔道俱惡所以文殊暫起二見貶向二鐵圍山文殊即實智普賢即權智權實相對治究竟亦無權實唯是一心心且不佛不眾生無有異見纔有佛見便作眾生見有見無見常見斷見便成二鐵圍山被見障故祖師直指一切眾生本心本體本來是佛不假修成不屬漸次不是明暗不是明故無明不是暗故無暗所以無無明亦無無明盡入我此宗門切須在意如此見得名之為法見法故名之為佛佛法俱無名之為僧喚作無為僧亦名一體三寶夫求法者不著佛求不著法求不著眾求應無所求不著佛求故無佛不著法求故無法不著眾求故無僧問和尚見今說法何得言無僧亦無法師云汝若見有法可說即是以音聲求我若見有我即是處所法亦無法法即是心所以祖師云付此心法時法法何曾法無法無本心始解心心法實無一法可得名坐道場道場者祇是不起諸見悟法本空喚作空如來藏本來無一物何處有塵埃若得此中意逍遙何所論問本來無一物無物便是否師云無亦不是菩提無是處亦無無知解問何者是佛師云汝心是佛佛即是心心佛不異故云即心即佛若離於心別更無佛云若自心是佛祖師西來如何傳授師云祖師西來唯傳心佛直指汝等心本來是佛心心不異故名為祖若直下見此意即頓超三乘一切諸位本來是佛不假修成云若如此十方諸佛出世說於何法師云十方諸佛出世祇共說一心法所以佛密付與摩訶大迦葉此一心法體盡虗空徧法界名為諸佛理論者箇法豈是汝於言句上解得他亦不是於一機一境上見得他此意唯是默契得者一門名為無為法門若欲會得但知無心忽悟即得若用心擬學取即轉遠法若無歧路心一切取捨心心如木石始有學道分云如今現有種種妄念何以言無師云妄本無體即是汝心所起汝若識心是佛心本無妄那得起心更認於妄汝若不生心動念自然無妄所以云心生則種種法生心滅則種種法滅今正妄念起時佛在何處師云汝今覺妄起時覺正是佛可中若無妄念佛亦無何故如此為汝起心作佛見便謂有佛可成作眾生見便謂有眾生可度起心動念總是汝見處若無一切見佛有何處所如文殊纔起佛見便貶向二鐵圍山云今正悟時佛在何處師云問從何來覺從何起語默動靜一切聲色盡是佛事何處覓佛不可更頭上安頭觜上加觜但莫生異見山是山水是水僧是僧俗是俗山河大地日月星辰總不出汝心三千世界都來是汝箇自己何處有多般心外無法滿目青山虗空世界皎皎地無絲髮許與汝作見解所以一切聲色是佛之惠法不孤起仗境方生為物之故有其多智終日說何曾說終日聞何曾聞所以釋迦四十九年說未曾說著一字云若如此何處是菩提師云菩提無是處佛亦不得菩提眾生亦不失菩提不可以身得不可以心求一切眾生即菩提相云如何發菩提心師云菩提無所得你今但發無所得心決定不得一法即菩提心菩提無住處是故無有得者故云我於然燈佛所無有少法可得佛即與我授記明知一切眾生本是菩提不應更得菩提你今聞發菩提心謂將一箇心學取佛去唯擬作佛道任汝三祇劫修亦祇得箇報化佛與你本源真性佛有何交涉故云外求有相佛與汝不相似問本既是佛那得更有四生六道種種形貌不同師云諸佛體圓更無增減流入六道處處皆圓萬類之中箇箇是佛譬如一團水銀分散諸處顆顆皆圓若不分時祇是一塊此一即一切一切即一種種形貌喻如屋舍捨驢屋入人屋捨人身至天身乃至聲聞緣覺菩薩佛屋皆是汝取捨處所以有別本源之性何得有別問何者是精進師云身心不起是名第一牢強精進纔起心向外求者名為歌利王愛遊獵去心不外遊即是忍辱僊人身心俱無即是佛道問若無心行此道得否師云無心即便是行此道更說什麼得與不得且如瞥起一念便是境若無一念便是境忘心自滅無復可追尋問如何是出三界師云善惡都莫思量當處便出三界如來出世為破三有若無一切心三界亦非有如一微塵破為百分九十九分是無一分是有摩訶衍不能勝出百分俱無摩訶衍始能勝出上堂云即心是佛上至諸佛下至蠢動含靈皆有佛性同一心體所以達磨從西天來唯傳一心法直指一切眾生本來是佛不假修行但如今識取自心見自本性更莫別求云何識自心即如今言語者正是汝心若不言語又不作用心體如虗空相似無有相貌亦無方所亦不一向是無有而不可見故祖師云真性心地藏無頭亦無尾應緣而化物方便呼為智若應緣之時不可言其有無正應之時亦無踪跡既知如此如今但向無中棲泊即是行諸佛路經云應無所住而生其心一切眾生輪迴不息生死者意緣走作心於六道不停致使受種種苦淨名云難化之人心如猿猴故以若干種法制禦其心然後調伏所以心生種種法生心滅種種法滅故知一切諸法皆由心造乃至人天六道地獄修羅盡由心造如今但學無心頓息諸緣莫生妄想分別無人無我無貪瞋無憎愛無勝負但除却如許多種妄想性自本來清淨即是修行菩提法佛等若不會此意縱你廣學勤苦修行木食草衣不識自心皆名邪行盡作天魔外道水陸諸神如此修行當復何益誌公云本體是自心作那得文字中求如今但識自心息却思惟妄想塵勞自然不生淨名云唯置一牀寢疾而臥心不起也如人臥疾攀緣都息妄想歇滅即是菩提如今若心裏紛紛不定任你學到三乘四果十地諸位合殺祇向凡聖中坐諸行盡歸無常勢力皆有盡期猶如箭射於空力盡還墜却歸生死輪迴如斯修行不解佛意虗受辛苦豈非大錯誌公云未逢出世明師枉服大乘法藥如今但一切時中行住坐臥但學無心亦無分別亦無依倚亦無住著終日任運騰騰如癡人相似世人盡不識你你亦不用教人識不識之心如頑石頭都無縫罅一切法透汝心不入兀然無著如此始有少分相應透得三界境過名為佛出世不漏心相名為無漏智不作人天業不作地獄業不起一切心諸緣盡不生即此身心是自由人不是一向不生祇是隨意而生經云菩薩有意生身是也忽若未會無心著相皆屬魔業乃至作淨土佛事竝皆成業乃名佛障障汝心故被因果管束去住無自由分所以菩提等法本不是有如來所說皆是化人猶如黃葉為金錢權止小兒啼故實無有法名阿耨菩提如今既會此意何用驅驅但隨緣消舊業更莫造新殃心裏明明所以舊時見解總須捨却淨名云除去所有法華云二十年中常令除糞祇是除去心中作見解處又云蠲除戲論之糞所以如來藏本自空寂祇是竝不停留一法故經云諸佛國土亦復皆空若言佛道是修學而得如此見解全無交涉或作一機一境揚眉動目祇對相當便道契會也得證悟禪理也忽逢一人不解便道都無所知對他若得道理心中便歡喜若被他折伏不如他便即心懷惆悵如此心意學禪有何交涉任汝會得少許道理祇得箇心所法禪道總沒交涉所以達磨面壁都不令人有見處故云忘機是佛道分別是魔境此性縱汝迷時亦不失悟時亦不得天真自性本無迷悟盡十方虗空界元來是我一心體縱汝動用造作豈離虗空虗空本來無大無小無漏無為無迷無悟了了見無一物亦無人亦無佛絕纖毫的量是無依倚無黏綴一道清流是自性是無生法忍何有擬議真佛無口不解說法真聽無耳其誰聞乎珍重有僧辭歸宗宗云往甚處去云諸方學五味禪去宗云諸方有五味禪我者裏祇是一味禪云如何是一味禪宗便打僧云會也會也宗云道道僧擬開口宗又打其僧後到師處師問甚麼處來云歸宗來師云歸宗有何言句僧遂舉前話師乃上堂舉此因緣云馬大師出八十四人善知識問著箇箇屙漉漉地祇有歸宗較些子師在鹽官會裏大中帝為沙彌師於佛殿上禮佛沙彌云不著佛求不著法求不著眾求長老禮拜當何所求師云不著佛求不著法求不著眾求常禮如是事沙彌云用禮何為師便掌沙彌云太麤生師云者裏是什麼所在說麤說細隨後又掌沙彌便走師行脚時到南泉一日齋時捧鉢向南泉位上坐南泉下來見便問長老什麼年中行道師云威音王已前南泉云猶是王老師孫在師便下去師一日在茶堂內坐南泉下來問定慧等學明見佛性此理如何師云十二時中不依倚一物泉云莫便是長老見處麼師云不敢泉云漿水錢且置草鞋錢教什麼人還師便休後溈山舉此因緣問仰山莫是黃檗構他南泉不得麼仰山云不然須知黃檗有陷虎之機溈山云子見處得與麼長一日五人新到同時相看一人不禮拜以手畫一圓相而立師云還知道好隻獵犬麼云尋𦏰羊氣來師云𦏰羊無氣汝向什麼處尋云尋𦏰羊蹤來師云𦏰羊無踪汝向什麼處尋云尋𦏰羊跡來師云𦏰羊無跡汝向什麼處尋云與麼則死𦏰羊也師便休來日陞座退問昨日尋𦏰羊僧出來其僧便出師云老僧昨日後頭未有語在作麼生其僧無語師云將謂是本色衲僧元來祇是義學沙門師曾散眾在洪州開元寺裴相公一日入寺行次見壁畫乃問寺主者畫是什麼寺主云畫高僧相公云形影在者裏高僧在什麼處寺主無對相公云是間莫有禪僧麼寺主云有一人相公遂請師相見乃舉前話問師師召云裴休休應諾師云在什麼處相公於言下有省乃再請師開堂夫學道者先須併却雜學諸緣決定不求決定不著聞甚深法恰似清風屆耳瞥然而過更不追尋是為甚深入如來禪離生禪想從上祖師唯傳一心更無二法指心是佛頓超等妙二覺之表決定不流至第二念始似入我宗門如斯之法汝取次人到者裏擬作麼生學所以道擬心時被擬心魔縛非擬心時又被非擬心魔縛非非擬心時又被非非擬心魔縛非外來出自你心唯有無神通菩薩足跡不可尋若以一切時中心有常見即是常見外道若觀一切法空作空見者即是斷見外道所以三界唯心萬法唯識此猶是對外道邪見人說若說法身以為極果此對三賢十聖人言故佛斷二愚一者微細所知愚二者極微細所知愚佛既如是更說什麼等妙二覺來所以一切人但欲向明不欲向暗但欲求悟不愛煩惱無明便道佛是覺眾生是妄若作如是見解百劫千生輪迴六道更無斷絕何以故為謗諸佛本源自性故他分明向你道佛且不明眾生不暗法無明暗故佛且不強眾生且不弱法無強弱故佛且不智眾生且不愚法無愚智故是你出頭總道解禪開著口便病發不說本祇說末不說迷祇說悟不說體祇說用總無你話論處他一切法且本不有今亦不無緣起不有緣滅不無本亦不有本非本故心亦不心心非心故相亦非相相非相故所以道無法無本心始解心心法法即非法非法即法無法無非法故是心心法忽然瞥起一念了知如幻如化即流入過去佛過去佛且不有未來佛且不無又且不喚作未來佛現在念念不住不喚作現在佛佛若起時即不擬他是覺是迷是善是惡輒不得執滯他斷絕他如一念瞥起千重關鎖鎖不得萬丈繩索索他不住既若如是爭合便擬滅他止他分明向你道爾𦦨識你作麼生擬斷他喻如陽𦦨你道近十方世界求不可得始道遠看時祇在目前你擬趂他他又轉遠去你始避他他又來逐你取又不得捨又不得既若如此故知一切法性自爾即不用愁他慮他如言前念是凡後念是聖如手飜覆一般此是三乘教之極也據我禪宗中前念且不是凡後念且不是聖前念不是佛後念不是眾生所以一切色是佛色一切聲是佛聲舉著一理一切理皆然見一事見一切事見一心見一切心見一道見一切道一切處無不是道見一塵十方世界山河大地皆然見一滴水即見十方世界一切性水又見一切法即見一切心一切法本空心即不無不無即妙有有亦不有不有即有即真空妙有既若如是十方世界不出我之一心一切微塵國土不出我之一念若然說什麼內之與外如蜜性甜一切蜜皆然不可者箇蜜甜餘底苦也何處有與麼事所以道虗空無內外法性自爾虗空無中間法性自爾故眾生即佛佛即眾生眾生與佛元同一體生死涅槃有為無為元同一體世間出世間乃至六道四生山河大地有性無性亦同一體言同者名相亦空有亦空無亦空盡恒沙世界元是一空既若如此何處有佛度眾生何處有眾生受佛度何故如此萬法之性自爾故若作自然見即落自然外道若作無我無我所見墮在三賢十聖位中你如今云何將一尺一寸便擬量度虗空他分明向汝道法法不相到法自寂故當處自住當處自真以身空故名法空以心空故名性空身心總空故名法性空乃至千途異說皆不離你之本心如今說菩提涅槃真如佛性二乘菩薩者皆指葉為黃金拳掌之說若也展手之時一切大眾若天若人皆見掌中都無一物所以道本來無一物何處有塵埃本既無物三際本無所有故學道人單刀直入須見者箇意始得故達磨大師從西天來至此土經多少國土祗覓得可大師一人密傳心印印你本心以心印法以法印心心既如此法亦如此同真際等法性法性空中誰是授記人誰是成佛人誰是得法人他分明向你道菩提者不可以身得身無相故不可以心得心無相故不可以性得性即便是本源自性天真佛故不可以佛更得佛不可以無相更得無相不可以空更得空不可以道更得道本無所得無得亦不可得所以道無一法可得祇教你了取本心當下了時不得了相無了無不了相亦不可得如此之法得者即得得者不自覺知不得者亦不自覺知如此之法從上已來有幾人得知所以道天下忘己者有幾人如今於一機一境一經一教一世一時一名一字六根門前領得與機關木人何別忽有一人出來不於一名一相上作解者我說此人盡十方世界覓者箇人不可得以無第二人故繼於祖位亦云釋種無雜純一故言王若成佛時王子亦隨出家此意大難知祇教你莫覓覓便失却如癡人山上叫一聲響從谷出便走下山趂及乎覓不得又叫一聲山上響又應亦走上山上趂如是千生萬劫祇是尋聲逐響人虗生浪死漢汝若無聲即無響涅槃者無聞無知無聲絕迹絕踪若得如是稍與祖師隣房也問如王庫藏內都無如是刀伏願誨示師云王庫藏者即虗空性也能攝十方虗空世界皆總不出你心亦謂之虗空藏菩薩你若道是有是無非有非無總成羊角羊角者即你求覓者也問王庫藏中有真刀否師云此亦是羊角云若王庫藏中本無真刀何故云王子持王庫中真刀出至異國何得言無師云持刀出者此喻如來使者你若言王子持王庫中真刀出去者庫中應空去也本源虗空性不可被異人將去是什麼語設你有者皆名羊角問迦葉受佛心印得為傳語人否師云是云若是傳語人應不離得羊角師云迦葉自領得本心所以不是羊角若以領得如來心見如來意見如來色相者即屬如來使為傳語人所以阿難為侍者二十年但見如來色相所以被佛呵云唯觀救世者不能離得羊角問文殊執劒於瞿曇前者如何師云五百菩薩得宿命智見過去生業障五百者即你五陰身是以見此夙命障故求佛求菩提涅槃所以文殊將智解劍害此有見佛心故故言你善害云何者是劍師云解心是劍云解心既是劍斷此有見佛心祇如能斷見心何能除得師云還將你無分別智斷此有見分別心云如作有見有求佛心將無分別智劍斷爭奈有智劍在何師云若無分別智害有見無見無分別智亦不可得云不可以智更斷智不可以劍更斷劍師云劍自害劍劍劍相害即劍亦不可得智自害智智智相害即智亦不可得母子俱喪亦復如是問如何是見性云性即是見見即是性不可以性更見性聞即是性不可以性更聞性祇你作性見能聞能見性便有一異法生他分明道所可見者不可更見你云何頭上更著頭他分明道如盤中散珠大者大圓小者小圓各各不相知各各不相礙起時不言我起滅時不言我滅所以四生六道未有不如時且眾生不見佛佛不見眾生四果不見四向四向不見四果三賢十聖不見等妙二覺等妙二覺不見三賢十聖乃至水不見火火不見水地不見風風不見地眾生不入法界佛不出法界所以法性無去來無能所見既如此因什麼道我見我聞於善知識處得契悟善知識與我說法諸佛出世與眾生說法迦旃延祇為以生滅心傳實相法被淨名呵責分明道一切法本來無縛何用解他本來不染何用淨他故云實相如是豈可說乎汝今祇成是非心染淨心學得一知一解繞天下行見人便擬定當取誰有心眼誰強誰弱若也如此天地懸殊更說什麼見性問既言性即見見即性祇如性自無障礙無劑限云何隔物即不見又於虗空中近即見遠即不見者如何師云此是你妄生異見若言隔物不見無物言見便謂性有隔礙者全無交涉性且非見非不見法亦非見非不見若見性人何處不是我之本性所以六道四生山河大地總是我之性淨明體故云見色便見心色心不異故祇為取相作見聞覺知去却前物始擬得見者即墮二乘人中依通見解也虗空中近則見遠則不見此是外道中收分明道非內亦非外非近亦非遠近而不可見者萬物之性也近尚不可見更道遠而不可見有什麼意旨問學人不會和尚如何指示師云我無一物從來不曾將一物與人你無始已來祇為被人指示覓契覓會此可不是弟子與師俱陷王難你但知一念不受即是無受身一念不想即是無想身決定不遷流造作即是無行身莫思量卜度分明即是無識身你如今纔別起一念即入十二因緣無明緣行亦因亦果乃至老死亦因亦果故善財童子一百一十處求善知識祇向十二因緣中求最後見彌勒彌勒却指見文殊文殊者即汝本地無明若心心別異向外求善知識者一念纔生即滅纔滅又生所以汝等比丘亦生亦老亦病亦死酬因答果已來即五聚之生滅五聚者五陰也一念不起即十八界空即身便是菩提華果即心便是靈智亦云靈臺若有所住著即身為死屍亦云守死屍鬼問淨名默然文殊讚歎云是真入不二法門如何師云不二法門即你本心也說與不說即有起滅無言說時無所顯示故文殊讚歎云淨名不說聲有斷滅否師云語即默默即語語默不二故云聲之實性亦無斷滅文殊本聞亦不斷滅所以如來常說未曾有不說時如來說即是法法即是說法說不二故乃至報化二身菩薩聲聞山河大地水鳥樹林一時說法所以語亦說默亦說終日說而未甞說既若如是但以默為本問聲聞人藏形於三界不能藏於菩提者如何師云形者質也聲聞人但能斷三界見修已離煩惱不能藏於菩提故還被魔王於菩提中捉得於林中宴坐還成微細見菩提心也菩薩人已於三界菩提決定不捨不取不取故七大中覓他不得不捨故外魔亦覓他不得汝但擬著一法印子早成也印著有即六道四生文出印著空即無相文現如今但知決定不印一切物此印為虗空不一不二空本不空印本不有十方虗空世界諸佛出世如見電光一般觀一切蠢動含靈如響一般見十方微塵國土恰似海中一滴水相似聞一切甚深法如幻如化心心不異法法不異乃至千經萬論祗為你之一心若能不取一切相故言如是一心中方便勤莊嚴問如我昔為歌利王割截身體如何師云僊人者即是你心歌利王好求也不守王位謂之貪利如今學人不積功累德見者便擬學與歌利王何別如見色時壞却僊人眼聞聲時壞却僊人耳乃至覺知時亦復如是喚作節節支解云祗如僊人忍時不合更有節節支解不可一心忍一心不忍也師云你作無生見忍辱解無求解總是傷損云僊人被割時還知痛否又云此中無受者是誰受痛師云你既不痛出頭來覓箇甚麼問然燈佛授記為在五百歲中五百歲外師云五百歲中不得授記所言授記者你本決定不忘不失有為不取菩提但以了世非世亦不出五百歲外別得授記亦不於五百歲中得授記云了世三際相不可得已否師云無一法可得云何故言頻經五百世前後極時長師云五百世長遠當知猶是僊人故然燈授記時實無少法可得問教中云銷我億劫顛倒想不歷僧祇獲法身者如何師云若以三無數劫修行有所證得者盡恒沙劫不得若於一剎那中獲得法身直了見性者猶是三乘教之極談也何以故以見法身可獲故皆屬不了義教中收問見法頓了者見祖師意否師云祖師心出虗空外云有限劑否師云有無限劑此皆數量對待之法祖師云且非有限量非無限量非非有無限量以絕待故你今學者未能出得三乘教外爭喚作禪師分明向汝道一等學禪莫取次妄生異見如人飲水冷暖自知一行一住一剎那間念念不異若不如是不免輪迴問佛身無為不墮諸數何故佛身舍利八斛四斗師云你作如是見祇見假舍利不見真舍利云舍利為是本有為復功勳師云非是本有亦非功勳云若非本有又非功勳何故如來舍利唯鍊唯精金骨常存師乃呵云你作如此見解爭喚作學禪人你見虗空曾有骨否諸佛心同太虗覓什麼骨云如今見有舍利此是何法師云此從你妄想心生即見舍利云和尚還有舍利否請將出來看師云真舍利難見你但以十指撮盡妙高峯為微塵即見真舍利夫參禪學道須得一切處不生心祇論妄機即佛道隆分別即魔軍盛畢竟無毛頭許少法可得問祖傳法付與何人師云無法與人云云何是二祖請師安心師云你若道有二祖即合覓得心覓心不可得故所以道與你安心竟若有所得全歸生滅問佛窮得無明否師云無明即是一切諸佛得道之處所以緣起是道場所見一塵一色便合無邊理性舉足下足不離道場道場者無所得也我向你道祇無所得名為坐道場云無明者為明為暗師云非明非暗明暗是代謝之法無明且不明亦不暗不明祇是本明不明不暗祇者一句子亂却天下人眼所以道假使滿世間皆如舍利弗盡思共度量不能測佛智其無礙慧出過虗空無你語論處釋迦量等三千大千世界忽有一菩薩出來一跨跨却三千大千世界不出普賢一毛孔你如今把什麼本領擬學他云既是學不得為什麼道歸源性無二方便有多門如之何師云歸源性無二者無明實性即諸佛性方便有多門者聲聞人見無明生見無明滅緣覺人但見無明滅不見無明生念念證寂滅諸佛見眾生終日生而無生終日滅而無滅無生無滅即大乘果所以道果滿菩提圓華開世界起舉足即佛下足即眾生諸佛兩足尊者即理足事足眾生足生死足一切等足足故不求是你今念念學佛即嫌著眾生若嫌著眾生即是謗他十方諸佛所以佛出世來執除糞器蠲除戲論之糞祇教你除却從來學心見心除得盡即不墮戲論亦云搬糞出祇教你不生心心若不生自然成大智者決定不分別佛與眾生一切盡不分別始得入我曹谿門下故自古先聖云少行我法門所以無行為我法門祇是一心門一切人到者裏盡不敢入不道全無祇是少人得得者即是佛珍重問如何得不落階級師云但終日喫飯未曾齩著一粒米終日行未曾踏著一片地與麼時無人無我等相終日不離一切事不被諸境惑方名自在人念念不見一切相莫認前後三際前際無去今際無住後際無來安然端坐任運不拘方名解脫努力努力此門中千人萬人祇得三箇五箇若不將為事受殃有日在故云著力今生須了却誰能累劫受餘殃
