body:
  text: 趙州真際禪師語錄并行狀卷上南嶽下四世嗣南泉願師即南泉門人也俗姓郝氏本曹州郝鄉人也諱從諗鎮府有塔記云師得七百甲子歟值武王微沐避地岨崍木食草衣僧儀不易師初隨本師行脚到南泉本師先人事了師方乃人事南泉在方丈內臥次見師來參便問近離什麼處師云瑞像院南泉云還見瑞像麼師云瑞像即不見即見臥如來南泉乃起問你是有主沙彌無主沙彌師對云有主沙彌泉云那箇是你主師云孟春猶寒伏惟和尚尊體起居萬福泉乃喚維那云此沙彌別處安排師受戒後聞受業師在曹州西住護國院乃歸院省覲到後本師令郝氏云君家之子遊方已迴其家親屬忻懌不已祇候來日咸往觀焉師聞之乃云俗塵愛網無有了期已辭出家不願再見乃於是夜結束前邁其後自携瓶錫遍歷諸方常自謂曰七歲童兒勝我者我即問伊百歲老翁不及我者我即教他年至八十方住趙州城東觀音院去石橋十里已來住持枯槁志効古人僧堂無前後架旋營齋食繩床一脚折以燒斷薪用繩繫之每有別制新者師不許也住持四十年來未嘗賷一封書告其檀越因有南方僧來舉問雪峰古㵎寒泉時如何雪峰云瞪目不見底學云飲者如何峰云不從口入師聞之曰不從口入從鼻孔裏入其僧却問師古㵎寒泉時如何師云苦學云飲者如何師云死雪峰聞師此語讚云古佛古佛雪峰後因此不答話矣厥後因河北燕王領兵收鎮府既到界上有觀氣象者奏曰趙州有聖人所居戰必不勝燕趙二王因展筵會俱息交鋒乃問趙之金地上士何人或曰有講華嚴經大師節行孤邈若歲大旱咸命往臺山祈禱大師未迴甘澤如瀉乃曰恐未盡善或云此去一百二十里有趙州觀音院有禪師年臘高邈道眼明白僉曰此可應兆乎二王稅駕觀焉既屆院內師乃端坐不起燕王問曰人王尊耶法王尊耶師云若在人王人王中尊若在法王法王中尊燕王唯然矣師良久中間問阿那箇是鎮府大王趙王應諾弟子緣趙州屬鎮府以表知重之禮師云老僧濫在山河不及趨面須臾左右請師為大王說法師云大王左右多爭教老僧說法乃約令左右退師身畔時有沙彌文遠高聲云啟大王不是者箇左右大王乃問是什麼左右對曰大王尊諱多和尚所以不敢說法燕王乃云請禪師去諱說法師云故知大王曩劫眷屬俱是冤家我佛世尊一稱名號罪滅福生大王先祖纔有人觸著名字便生嗔怒師慈悲非倦說法多時二王稽首讚嘆珍敬無盡來日將迴燕王下先鋒使聞師不起凌晨入院責師慠亢君侯師聞之乃出迎接先鋒乃問曰昨日見二王來不起今日見某甲來因何起接師云待都衙得似大王老僧亦不起接先鋒聆師此語再三拜而去尋後趙王發使取師供養既屆城門闔城威儀迎之入內師纔下寶輦王乃設拜請師上殿正位而坐師良久以手斫額云堦下立者是何官長左右云是諸院尊宿并大師大德師云他各是一方化主若在階下老僧亦起王乃命上殿是日齋筵將罷僧官排定從上至下一人一問一人問佛法師既望見乃問作什麼云問佛法師云這裏已坐却老僧那裏問什麼法二尊不並化此乃語之詞也王乃令止其時國后與王俱在左右侍立國后云請禪師為大王摩頂受記師以手摩大王頂云願大王與老僧齊年是時迎師權在近院駐泊獲時選地建造禪宮師聞之令人謂王曰若動著一莖草老僧却歸趙州其時竇行軍願捨菓園一所直一萬五千貫號為真際禪院亦云竇家園也師入院後海眾雲臻是時趙王禮奉燕王從幽州奏到命服鎮府具威儀迎接師堅讓不受左右舁箱至師面前云大王為禪師佛法故堅請師著此衣師云老僧為佛法故所以不著此衣左右云且看大王面師云又干俗官什麼事乃躬自取衣挂身上禮賀再三師惟知應諾而已師住趙州二年將謝世時謂弟子曰吾去世之後焚燒了不用淨淘舍利宗師弟子不同浮俗且身是幻舍利何生斯不可也令小師送拂子一枝與趙王傳語云此是老僧一生用不盡底師於戊子歲十一月十日端坐而終于時竇家園道俗車馬數萬餘人哀聲振動於時盡送終之禮感歎之泣無異金棺匿彩於俱尸矣莫不高營鴈塔特豎豐諡號曰真際禪師光祖之塔後唐保大十一年孟夏月旬有三日有學者咨聞東都東院惠通禪師趙州先人行化厥由作禮而退乃授筆錄之師問南泉如何是道泉云平常心是道師云還可趣向不泉云擬即乖師云不擬爭知是道泉云道不屬知不知知是妄覺不知是無記若真達不疑之道猶如太虗廓然蕩豁豈可強是非也師於言下頓悟玄旨心如朗月南泉上堂師問明頭合暗頭合泉便歸方丈師便下堂云這老和尚被我一問直得無言可對首座云莫道和尚無語自是上座不會師便打又云這棒合是堂頭老漢喫師問南泉知有底人向什麼處去泉云山前檀越家作一頭水牯牛去師云謝和尚指示泉云昨夜三更月到窻師在南泉作爐頭大眾普請擇菜師在堂內呌救火救火大眾一時到僧堂前師乃關却僧堂門大眾無對泉乃拋鏁匙從窻內入堂中師便開門師在南泉井樓上打水次見南泉過便抱柱懸却脚云相救相救南泉上楜梯云一二三四五師少時間却去禮謝云適來謝和尚相救南泉東西兩堂爭猫兒泉來堂內提起猫兒云道得即不斬道不得即斬却大眾下語皆不契泉意當時即斬却猫兒了至晚間師從外歸來問訊次泉乃舉前話了云你作麼生救得猫兒師遂將一隻鞋戴在頭上出去泉云子若在救得猫兒師問南泉異即不問如何是類泉以兩手托地師便踏倒却歸涅槃堂內呌悔悔泉聞乃令人去問悔箇什麼師云悔不剩與兩踏南泉從浴室裏過見浴頭燒火問云作什麼云燒浴泉云記取來喚水牯牛浴浴頭應諾至晚間浴頭入方丈泉問作什麼云請水牯牛去浴泉云將得繩索來不浴頭無對師來問訊泉泉舉似師師云某甲有語泉便云還將得繩索來麼師便近前驀鼻便拽泉云是即是太麤生師問南泉離四句絕百非外請師道泉便歸方丈師云這老和尚每常口吧吧地及其問著一言不措侍者云莫道和尚無語好師便打一掌南泉便掩却方丈門便把灰圍却問僧云道得即開門多有人下語並不契泉意師云蒼天蒼天泉便開門師問南泉云心不是佛智不是道還有過也無泉云有師云過在什麼處請師道泉遂舉師便出去師上堂謂眾曰此事的的沒量大人出這裏不得老僧到溈山僧問如何是祖師西來意溈山云與我將床子來若是宗師須以本分事接人始得時有僧問如何是祖師西來意師云庭前栢樹子學云和尚莫將境示人師云我不將境示人云如何是祖師西來意師云庭前栢樹子師又云老僧九十年前見馬祖大師下八十餘員善知識箇箇俱是作家不似如今知識枝蔓上生枝蔓大都是去聖遙遠一代不如一代只如南泉尋常道須向異類中行且作麼生會如今黃口小兒向十字街頭說葛藤博飯噇覓禮拜聚三五百眾云我是善知識你是學人僧問如何是清淨伽藍師云丫角女子如何是伽藍中人師云丫角女子有孕問承聞和尚親見南泉是否師云鎮州出大蘿蔔頭問和尚生緣什麼處師以手指云西邊更向西問法無別法如何是法師云外空內空內外空問如何是佛真法身師云更嫌什麼問如何是心地法門師云古今榜樣問如何是賓中主師云山僧不問婦問如何是主中賓師云老僧無丈人問如何是一切法常住師云老僧不諱祖其僧再問師云今日不答話師上堂云兄弟莫久立有事商量無事向衣鉢下坐窮理好老僧行脚時除二時齋粥是雜用心力處餘外更無別用心處也若不如此出家大遠在問萬物中何物最堅師云相罵饒汝接嘴相唾饒汝潑水問曉夜不停時如何師云僧中無與麼兩稅百姓問如何是一句師云若守著一句老却你師又云若一生不離叢林不語十年五載無人喚你作啞漢已後佛也不柰你何你若不信截取老僧頭去師上堂云兄弟你正在第三冤裏所以道但改舊時行履處莫改舊時人共你各自家出家比來無事更問禪問道三十二十人聚頭來問恰似欠伊禪道相似你喚作善知識我是同受拷老僧不是戲好恐帶累他古人所以東道西說問十二時中如何用心師云你被十二時使老僧使得十二時你問那箇時問如何是趙州主人公師咄云這篐桶漢學人應諾師云如法篐桶著問如何是學人本分事師云樹搖鳥散魚驚水渾問如何是少神底人師云老僧不如你學云不占勝師云你因什麼少神問至道無難唯嫌揀擇是時人窠窟師云曾有問我直得五年分疎不得有官人問丹霞燒木佛院主為什麼眉鬚墮落師云官人宅中變生作熟是什麼人云所使師云却是他好手僧問毗目仙人執善才手見微塵佛時如何師遂執僧手云你見箇什麼有尼問如何是沙門行師云莫生兒尼云和尚勿交涉師云我若共你打交涉堪作什麼問如何是趙州主人公師云田厙奴問如何是王索仙陀婆師云你道老僧要箇什麼問如何是玄中玄師云說什麼玄中玄七中七八中八問如何是仙陀婆師云靜處薩婆訶問如何是法非法師云東西南北學云如何會去師云上下四維問如何是玄中玄師云這僧若在合年七十四五問王索仙陀婆時如何師驀起打躬叉手問如何是道師云不敢不敢問如何是法師云敕敕攝攝問趙州去鎮府多少師云三百學云鎮府來趙州多少師云不隔問如何是玄中玄師云玄來多少時也學云玄來久矣師云賴遇老僧洎合玄殺這屢生問如何是學人自己師云還見庭前栢樹子麼師上堂云若是久參底人莫非真實莫非亘古亘今若是新入眾底人也須究理始得莫趂者邊三百五百一千傍邊二眾叢林稱道好箇住持洎乎問著佛法恰似炒沙作飯相似無可施為無可下口却言他非我是面赫赤地良由世間出非法語真實欲明者意莫辜負老僧問在塵為諸聖說法總屬披搭未審和尚如何示人師云什麼處見老僧學云請和尚說師云一堂師僧總不會這僧語話別有一僧問請和尚說師云你說我聽問真化無跡無師弟子時如何師云誰教你來問學云更不是別人師便打之問此事如何辨師云我怪你學云如何辨得師云我怪你不辨學云還保任否師云保任不保任自看問如何是無知解底人師云說什麼事問如何是西來意師下禪床學云莫便是否師云老僧未有語在問佛法久遠如何用心師云你見前漢後漢把欖天下臨終時半錢也無分問時人以珍寶為貴沙門以何為貴師云急合取口學云合口還得也無師云口若不合爭能辨得問如何是趙州一句師云半句也無學云豈無和尚在師云老僧不是一句問如何得不被諸境惑師垂一足僧便出鞋師收起足僧無語有俗官問佛在日一切眾生歸依佛佛滅度後一切眾生歸依什麼處師云未有眾生學云現問次師云更覓什麼佛問還有不報四恩三有者也無師云有學云如何是師云這殺父漢筭你只少此一問問如何是和尚意師云無施設處師上堂云兄弟但改往修來若不改大有著你處在老僧在此間三十餘年未曾有一箇禪師到此間設有來一宿一食急走過且趂軟暖處去也問忽遇禪師到來向伊道什麼師云千鈞之弩不為鼷鼠而發機師云兄弟若從南方來者即與下載若從北方來即與裝載所以道近上人問道即失道近下人問道者即得道兄弟正人說邪法邪法亦隨正邪人說正法正法亦隨邪諸方難見易識我者裏易見難識問善惡惑不得底人還獨脫也無師云不獨脫學云為什麼不獨脫師云正在善惡裏尼問離却上來說處請和尚指示師咄云煨破鐵瓶尼將鐵瓶添水來請和尚答話師笑之問世界變為黑穴未審此箇落在何路師云不占學云不占是什麼人師云田厙奴問無言無意始稱得句既是無言喚什麼作句師云高而不危滿而不溢學云即今和尚是滿是溢師云爭柰你問我問如何是靈者師云淨地上屙一堆屎學云請和尚的旨師云莫惱亂老僧問法身無為不墮諸數還許道也無師云作麼生道學云與麼即不道也師笑之問如何是佛如何是眾生師云眾生即是佛佛即是眾生學云未審兩箇那箇是眾生師云問問問大道無根如何接唱師云你便接唱無根又作麼生師云既是無根什麼處繫縛你問正修行底人莫被鬼神測得也無師云測得云過在什麼處師云過在覓處云與麼即不修行也師云修行問孤月當空光從何生師云月從何生問承和尚有言道不屬修但莫染污如何是不染污師云檢校內外云還自檢校也無師云檢校云自己有什麼過自檢校師云你有什麼事師上堂云此事如明珠在掌胡來胡現漢來漢現老僧把一枝草作丈六金身用把丈六金身作一枝草用佛即是煩惱煩惱即是佛問佛與誰人為煩惱師云與一切人為煩惱云如何免得師云用免作麼師示眾云老僧此間即以本分事接人若教老僧隨伊根機接人自有三乘十二分教接他了也若是不會是誰過歟已後遇著作家漢也道老僧不辜他但有人問以本分事接人問從上至今即心是佛不即心還許學人商量也無師云即心且置商量箇什麼問古鏡不磨還照也無師云前生是因今生是果問三刀未落時如何師云森森地云落後如何師云迥迥地問如何是出三界底人師云籠不得問牛頭未見四祖百鳥銜花供養見後為什麼百鳥不銜花供養師云應世不應世問白雲自在時如何師云爭似春風處處閑問如何是露地白牛師云月下不用色云食噉何物師云古今嚼不著云請師答話師云老僧合與麼師示眾云擬心即差僧便問不擬心時如何師打三下云莫是老僧辜負闍黎麼問凡有問答落在意根不落意根師如何對師云問學云便請師道師云莫向者裏是非問龍女親獻佛未審將什麼獻師以兩手作獻勢師示眾云此間佛法道難即易道易即難別處難見易識老僧者裏即易見難識若能會得天下橫行忽有人問什麼處來若向伊道從趙州來又謗趙州若道不從趙州來又埋沒自己諸人且作麼生對他僧問觸目是謗和尚如何得不謗去師云若道不謗早是謗了也問如何是正修行路師云解修行即得若不解修行即參差落他因果裏又云我教你道若有問時但向伊道趙州來忽問趙州說什麼法但向伊道寒即言寒熱即言熱若更問道不問者箇事但云問什麼事若再問趙州說什麼法便向伊道和尚來時不交傳語上座若要知趙州事但自去問取問不顧前後時如何師云不顧前後且置你問阿誰師示眾云迦葉傳與阿難且道達磨傳與什麼人問且如二祖得髓又作麼生師云莫謗二祖師又云達磨也有語在外者得皮在裏者得骨且道更在裏者得什麼問如何是得髓底道理師云但識取皮老僧者裏髓也不立云如何是髓師云與麼皮也摸未著問與麼堂堂豈不是和尚正位師云還知有不肯者麼學云與麼即別有位師云誰是別者學云誰是不別者師云一任呌問上上人一撥便轉下下人來時如何師云汝是上上下下云請和尚答話師云話未有主在云某甲七千里來莫作心行師云據你者一問心行莫不得麼此僧一宿便去問不紹傍來者如何師云誰學云惠延師云問什麼學云不紹傍來者師以手撫之問如何是衲衣下事師云莫自瞞問真如凡聖皆是夢言如何是真言師云更不道者兩箇學云兩箇且置如何是真言師云唵𭊘啉㗶問如何是趙州師云東門西門南門北門問如何是定師云不定學云為什麼不定師云活物活物問不隨諸有時如何師云合與麼學云莫便是學人本分事師云隨也隨也問古人三十年一張弓兩下箭只射得半箇聖人今日請師全射師便起去師示眾云至道無難唯嫌揀擇纔有言語是揀擇是明白老僧却不在明白裏是你還護惜也無問和尚既不在明白裏又護惜箇什麼師云我亦不知學云和尚既不知為什麼道不在明白裏師云問事即得禮拜了退師示眾云法本不生今則無滅更不要道纔語是生不語是滅諸人且作麼生是不生不滅底道理問早是不生不滅麼師云者漢只認得箇死語問至道無難唯嫌揀擇纔有言語是揀擇和尚如何示人師云何不盡引古人語學云某甲只道得到這裏師云只這至道無難唯嫌揀擇上堂云看經也在生死裏不看經也在生死裏諸人且作麼生出得去僧便問只如俱不留時如何師云實即得若不實爭能出得生死問利劒鋒頭快時如何師云老僧是利劒快在什麼處問大難到來如何𢌞避師云恰好上堂良久大眾總來也未對云總來也師云更待一人來即說話僧云候無人來即說似和尚師云大難得人師示眾云心生即種種法生心滅即種種法滅你諸人作麼生僧乃問只如不生不滅時如何師云我許你者一問師因參次云明又未明道昏欲曉你在阿那頭僧云不在兩頭師云與麼即在中間也云若在中間即在兩頭師云這僧多少時在老僧者裏作與麼語話不出得三句裏然直饒出得也在三句裏你作麼生僧云某甲使得三句師云何不早與麼道問如何是通方師云離却金剛禪師示眾云衲僧家直須坐斷報化佛頭始得問坐斷報化佛頭是什麼人師云非你境界師示眾云大道只在目前要且難覩僧乃問目前有何形段令學人覩師云任你江南江北學云和尚豈無方便為人師云適來問什麼問入法界來還知有也無師云誰入法界學云與麼即入法界不知去也師云不是寒灰死木花錦成現百種有學云莫是入法界處用也無師云有什麼交涉問若是實際理地什麼處得來師云更請闍黎宣一遍問萬境俱起還有惑不得者也無師云有學云如何是惑不得者師云你還信有佛法否學云信有佛法古人道了如何是惑不得者師云為什麼不問老僧學云問了也師云惑也問未審古人與今人還有近也無師云相近即相近不同一體學云為什麼不同師云法身不說法學云法身不說法和尚為人也無師云我向惠裏答話學云爭道法身不說法師云我向惠裏救你阿爺他終不出頭問學人道不相見時還迴互也無師云測得迴互學云測他不得迴互箇什麼師云不與麼是你自己學云和尚還受測也無師云人即轉近道即轉遠也學云和尚為什麼自隱去師云我今現共你語話學云爭道不轉師云合與麼著師示眾云教化得底人是今生事教化不得底人是第三生冤若不教化恐墮却一切眾生教化亦是冤是你還教化也無僧云教化師云一切眾生還見你也無學云不見師云為什麼不見學云無相師云即今還見老僧否學云和尚不是眾生師云自知罪過即得師示眾云龍女心親獻盡是自然事問既是自然獻時為什麼師云若不獻爭知自然師示眾云八百箇作佛漢覓一箇道人難得問只如無佛無人處還有修行也無師云除却者兩箇有百千萬億學云道人來時在什麼處師云你與麼即不修行也其僧禮拜師云大有處著你在問白雲不落時如何師云老僧不會上象學云豈無賓主師云老僧是主闍黎是賓白雲在什麼處問大巧若拙時如何師云喪却棟梁材師示眾云佛之一字吾不喜聞問和尚還為人也無師云為人學云如何為人師云不識玄旨徒勞念靜學云既是玄作麼生是旨師云我不把本學云者箇是玄如何是旨師云答你是旨師示眾云各自有禪各自有道忽有人問你作麼生是禪是道作麼生祇對他僧乃問既各有禪道從上至今語話為什麼師云為你遊魂學云未審如何為人師乃退身不語師示眾云不得閑過念佛念法僧乃問如何是學人自己念師云念者是誰學云無伴師叱者驢上堂示眾云若是第一句與祖佛為師第二句與人天為師第三句自救不了有僧問如何是第一句師云與祖佛為師師又云大好從頭起學人再問師云又却人天去也師示眾云是他不是不將來老僧不是不祇對僧云和尚將什麼祇對師長吁一聲云和尚將這箇祇對莫辜負學人也無師云你適來肯我我即辜負你若不肯我我即不辜負你師示眾云老僧今夜答話去也解問者出來有僧纔出禮拜師云比來拋磚引玉只得箇墼子問狗子還有佛性也無師云無學云上至諸佛下至螘子皆有佛性狗子為什麼無師云為伊有業識性在問如何是法身師云應身云學人不問應身師云你但管應身問朗月當空時如何師云闍黎名什麼學云某甲師云朗月當空在什麼處問正當二八時如何師云東東西西學云如何是東東西西師云覓不著問學人全不會時如何師云我更不會云和尚還知有也無師云我不是木頭作麼不知云大好不會師拍掌笑之問如何是道人師云我向道是佛人問凡有言句舉手動足盡落在學人網中離此外請師道師云老僧齋了未喫茶馬大夫問和尚還修行也無師云老僧若修行即禍事云和尚既不修行教什麼人修行師云大夫是修行底人云某甲何名修行師云若不修行爭得撲在人王位中餧得來赤凍紅地無有解出期大夫乃下淚拜謝師示眾云闍黎不是不將來老僧不是不祇對又云闍黎莫擎拳合掌老僧不將禪床拂子對問思憶不及處如何師云過者邊來云過者邊來即是及處如何是思不及處師竪起手云你喚作什麼云喚作手和尚喚作什麼師云百種名字我亦道云不及和尚百種名字且喚什麼師云與麼即你思憶不及處僧禮拜師云教你思憶得及者云如何是師云釋迦教祖師教是你師云祖與佛古人道了也如何是思憶不及處師再舉指云喚作什麼僧良久師云何不當頭道著更疑什麼問如何是和尚家風師云老僧耳背高聲問僧再問師云你問我家風我却識你家風問萬境俱起時如何師云萬境俱起云一問一答是起如何是不起師云禪床是不起底僧纔禮拜次師云記得問答云記得師云試舉看僧擬舉師問問如何是目前佛師云殿裏底云者箇是相貌佛如何是佛師云即心是云即心猶是限量如何是佛師云無心是學云有心無心還許學人揀也無師云有心無心總被你揀了也更教老僧道什麼即得問遠遠投師未審家風如何師云不說似人學云為什麼不說似人師云是我家風學云和尚既不說似人爭柰四海來投師云你是海我不是海學云未審海內事如何師云老僧釣得一箇問祖佛近不得底是什麼人師云不是祖佛學云爭柰近不得何師云向你道不是祖佛不是眾生不是物得麼學云是什麼師云若有名字即是祖佛眾生也學云不可只與麼去也師云卒未與你去在問如何是平常心師云狐狼野干是問作何方便即得聞於未聞師云未聞且置你曾聞箇什麼來問承教有言隨色摩尼珠如何是本色師召僧名僧應諾師云過者邊來僧便過又問如何是本色師云且隨色走問平常心底人還受教化也無師云我不歷他門戶學云與麼則莫沉却那邊人麼師云大好平常心問如何是學人保任底物師云盡未來際揀不出問如何是大修行底人師云寺裏綱維是問學人纔到總不知門戶頭事如何師云上座名什麼學云惠南師云大好不知問學人欲學又謗於和尚如何得不謗去師云你名什麼學云道皎師云靜處去者米囤子問如何是和尚大意師云無大無小學云莫便是和尚大意麼師云若有纖毫萬劫不如問萬法本閑而人自閙是什麼人語師云出來便死問不是佛不是物不是眾生這箇是斷語如何是不斷語師云天上天下唯我獨尊問如何是毗盧圓相師云老僧自小出家不曾眼花學云和尚還為人也無師云願你長見毗盧圓相問佛祖在日佛祖相傳佛祖滅後什麼人傳師云古今總是老僧分上學云未審傳箇什麼師云箇箇總屬生死云不可埋沒却祖師也師云傳箇什麼問凡聖俱盡時如何師云願你作大德老僧是障佛祖漢問遠聞趙州到來為什麼不見師云老僧罪過問朗月當空未審室中事如何師云老僧自出家不曾作活計學云與麼即和尚不為今時也師云自疾不能救焉能救諸疾學云爭柰學人無依何師云依即踏著地不依即一任東西問在心心不測時如何師云測阿誰學云測自己師云無兩箇問不見邊表時如何師指淨瓶云是什麼學云淨瓶師云大好不見邊表問如何是歸根師云擬即差問不離言句如何得獨脫師云離言句是獨脫學云適來無人教某甲來師云因什麼到此學云和尚何不揀出師云我早箇揀了也問非心不即智請和尚一句師云老僧落你後問如何是畢竟師云畢竟學云那箇畢竟是師云老僧是畢竟你不解問者話學云不是不問師云畢竟在什麼處問不挂寸絲時如何師云不挂什麼學云不挂寸絲師云大好不挂寸絲問如救頭燃底人如何師云便學學云什麼處師云莫占他位次問空劫中阿誰為主師云老僧在裏許坐學云說甚麼法師云說你問底問承古有言虗明自照如何是自照師云不稱他照學云照不著處如何師云你話墮也問如何是的師云一念未起時問如何是法王師云州裏大王是云和尚不是師云你擬造反去都來一箇王不認問如何是佛心師云你是心我是佛奉不奉自看學云師即不無還奉得也無師云你教化我看問三身中那箇是本來身師云闕一不可問未審此土誰為祖師師云達磨來這邊總是學云和尚是第幾祖師云我不落位次學云在什麼處師云在你耳裏問不棄本不逐末如何是正道師云大好出家兒學云學人從來不曾出家師云歸依佛歸依法學云未審有家可出也無師云直須出家學云向什麼處安排他師云且向家裏坐問明眼人見一切還見色也無師云打却著學云如何打得師云莫用力學云不用力如何打得師云若用力即乖問祖佛大意合為什麼人師云只為今時學云爭柰不得何師云誰之過學云如何承當師云如今無人承當得學云與麼即無依倚也師云又不可無却老僧問了事底人如何師云正大修行學云未審和尚還修行也無師云著衣喫飯學云著衣喫飯尋常事未審修行也無師云你且道我每日作什麼崔郎中問大善知識還入地獄也無師云老僧末上入崔云既是大善知識為什麼入地獄師云老僧若不入爭得見郎中問毫釐有差時如何師云天地懸隔云毫釐無差時如何師云天地懸隔問如何是不睡底眼師云凡眼肉眼又云雖未得天眼肉眼力如是學云如何是睡底眼師云佛眼法眼是睡底眼問大庾嶺頭趂得及為什麼提不起師拈起衲衣云你甚處得者箇來學云不問者箇師云與麼即提不起問不合不散如何辨師云你有一箇我有一箇云者箇是合如何是散師云你便合問如何是不錯路師云識心見性是不錯路問明珠在掌還照也無師云照即不無喚什麼作珠問靈苗無根時如何師云你從什麼處來云太原來師云大好無根問學人擬作佛時如何師云大煞費力生云不費力時如何師云與麼即作佛去也問學人昏鈍在一浮沉如何得出師只據坐云某甲實問和尚師云你甚處作一浮一沉問不在凡不在聖如何免得兩頭路師云去却兩頭來答你僧不審師云不審從什麼處起在者裏時從老僧起在市裏時從什麼處起云和尚為什麼不定師云我教你何不道今日好風問如何是大闡提底人師云老僧答你還信否云和尚重言那敢不信師云覓箇闡提人難得問大無慚愧底人什麼處著得師云此間著不得云忽然出頭爭向師云將取去問用處不現時如何師云用即不無現是誰問空劫中還有人修行也無師云喚什麼作空劫云無一物是師云者箇始稱修行喚什麼作空劫問如何是出家師云不履高名不求垢壞問不指一法如何是和尚法師云老僧不說茆山法云既不說茆山法如何是和尚法師云向你道不說茆山法云莫者箇便是也無師云老僧未曾將者箇示人問如何是目前獨脫一路師云無二亦無三云目前有路還許學人進前也無師云與麼即千里萬里問如何是毗盧向上事師云老僧在你脚底云和尚為什麼在學人脚底師云你元來不知有向上事問如何是合頭師云是你不合頭云如何是不合頭師云前句辨取問如何是和尚的的意師云止止不須說我法妙難思問澄澄絕點時如何師云墮坑落壍云有什麼過師云你屈著與麼人問未審出家誓求無上菩提時如何師云未出家被菩提使既出家使得菩提有秀才見師手中拄杖乃云佛不奪眾生願是否師云是秀才云某甲就和尚乞取手中拄杖得否師云君子不奪人所好秀才云某甲不是君子師云老僧亦不是佛師因出外見婆子插田云忽遇猛虎作麼生婆云無一法可當情師云唋婆子云唋師云猶有者箇在有秀才辭去云某甲在此括撓和尚多時無可報答和尚待他日作一頭驢來報答和尚師云教老僧爭得鞍師到道吾處纔入僧堂吾云南泉一隻箭來師云看箭吾云過也師云中也問百骸俱潰散一物鎮長靈時如何師云今朝又風起問三乘十二分教即不問如何是祖師西來意師云水牯牛生兒也好看取云未審此意如何師云我亦不知問萬國來朝時如何師云逢人不得喚問十二時中如何淘汰師云柰河水濁西水流急云還得見文殊也無師云者瞳漢什麼處去來問如何是道場師云你從道場來你從道場去脫體是道場何處更不是問萌芽未發時如何師云齅著即腦裂云不齅時如何師云無者閑工夫問如何數量師云一二三四五云數量不拘底事如何師云一二三四五問什麼世界即無晝夜師云即今是晝是夜云不問即今師云爭柰老僧何問迦葉上行衣不踏曹溪路什麼人得披師云虗空不出世道人都不知問如何是混而不雜師云老僧菜食長齋云還得超然也無師云破齋也問如何是古人之言師云諦聽諦聽問如何是學人本分事師云與麼嫌什麼問萬法歸一一歸何所師云我在青州作一領布衫重七斤問如何是出家兒師云不朝天子父母返拜問覿面事如何師云你是覿面漢廬山棲賢寶覺禪院住持傳法賜紫沙門澄諟重詳定
