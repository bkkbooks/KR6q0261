body:
  text: 筠州大愚芝和尚語錄師太原王氏子陞座僧問如何是和尚家風師云一言已出駟馬難追問如何是城裏佛師云十字街頭石幢子問如何是為人一句師云四角六張進云意旨如何師云八凹九凸問不落三寸時如何師云乾三長坤六短進云意旨如何師云切忌地盈虗問昔日靈山分半座二師相見事如何師云記得麼僧良久師打禪牀一下云多年忘却也師云且住且住若向言中取則句裏明機也似迷頭認影若也舉唱宗乘大似一場寐語雖然如是官不容針私通車馬放一線道有箇葛藤處師遂打禪牀一下云三世諸佛盡皆頭痛且道大眾還有免得底麼若一人免得無有是處若免不得海印發光師乃豎起拂子云者箇是印那箇是光者箇是光那箇是印掣電之機徒勞佇思會麼老僧說夢且道夢見箇什麼南柯十更若不會聽取一頌北斗挂須彌杖頭挑日月林泉好商量夏末秋風切開堂升座僧正宣䟽白槌罷有僧問大用現前不存軌則請師揮劒師云點眼知人意看取令行時進云腦後穿師云齋後鐘問如何是佛法大意師云推天磕地問心法無形如何彫琢師云一丁兩丁進云未曉者如何領會師云透七透八問如何是大愚境師云四面峯巒秀㳂江一帶清進云如何是境中人師云滿城公子貴林下道人棲問拈槌豎拂即不問當機一句事如何師云燋頭燎面進云雷音已徹青雲外向上極則又如何師云且領前話乃云問話且住淨名杜口猶涉繁詞達磨西來平欺漢地放一線道去也放箇葛藤處所以李長者云有情之本同智海以還源抱識含流總法身而為體諸仁者既是總法身而為體還知道須彌吞却法身法身吞却須彌麼諸仁者朝夕與古佛同參與諸方老和尚同參山僧今日與大眾同參且道參箇什麼如是定當得且認得箇著衣喫猶去衲僧半月程在若定當不得來年更有新條在惱亂春風卒未休上堂僧問如何是道師云八斛四斗進云如何是道中人師云煑粥煠飯問寶劒未出匣時如何師云切忌道著進云出匣後如何師云天魔腦裂乃云舉一步須彌岌峇海水騰波不舉一步放微塵國土助一切諸佛出興於世轉大法輪還信得麼若信得西瞿耶尼喫飯去上堂僧問如何是祖師西來意師云白日燒地眠夜間炙地臥問既是清淨法身為什麼却澡浴師云頭出頭沒進云為什麼如此師云只為如此問古鏡未磨時如何師云照破天下人髑髏進云磨後如何師云黑似漆上堂僧問洪鐘纔擊大眾雲臻祖意西來乞師垂示師云六丁六甲進云未曉者如何領會師云會即錯問馬師未見讓師時如何師云緊進云見後如何師云切問如何是佛師云鋸解秤鎚師云德山入門便棒臨濟入門便喝一棒一喝若雙峰而互出賓主未辨恓恓而萬里鄉關照用雙行擬擬而千差塞路諸上座到者裏如何話會乃云棒喝齊施早已賒古今皆贊出周遮二途不涉憑何說南海波斯進象牙上堂僧問特特上來伸三拜乞師分付拄杖子師云科進云恁麼則功不虗施也師云重因請首座開堂僧問承和尚有言一人悟道三界平沉首座悟道三界還沉也無師云不淹不抑進云一言纔出大地全收師云落三落四師乃云為眾竭力葢為袈裟同肩一處喫莫是人各披一條同鍋喫麼此是分見還知道三世諸佛共披一條所以釋迦身長丈六留下袈裟與彌勒彌勒身長千尺披得恰好何故如此葢為長者長法身短者短法身要得易會麼古佛與露柱相交佛殿與天王鬬額若也不會單重交拆上堂云有時一喝只作一喝用有時一喝作探竿影草有時一喝如踞地師子有時一喝如金剛王寶劒若是金剛王寶劒不敢正眼覰著覰著即喪身失命乃有頌云不是干將鑄那關四氣吹匣內青虵吼逢妖任便揮若得全提者當機豈失時毗盧驚得走大眾盡攢眉上堂云大愚相接大雄孫五湖雲水競頭奔競頭奔有何門擊箭寧知枯木存枯木存一年還曾兩度春兩度春帳裏真珠撒與人撒與人思量也是慕西秦舉僧問汾州和尚如何是接初機句州云汝是行脚僧如何是辨衲僧句西方日出卯如何是正令行句千里特來呈舊面如何是立乾坤句北俱盧州長粳米食者無貪亦無嗔師云將此四句語以驗天下衲僧子細思量將此四句語被天下衲僧一時勘破筠州府主李密諫請就上藍開堂乃拈香云恭為今上皇帝萬歲太后千秋又拈香云此一瓣香奉為府主密諫洎闔郡官僚常居祿位此一瓣香奉為施主檀那在筵龍象師乃云還有人委得落處麼若委得隨機利物應化無方天上人間出沒卷舒縱橫自在若也未委落處釋迦老子三世諸佛二十八祖天下老和尚一時拋在爐中從聽老僧葛藤時有僧問如何是佛師云還記得麼僧云若不請益爭知如是師擊禪牀一下云早是忘却了僧云放和尚一線道師云一任𨁝跳問如何是洪州境答云滕王閣下千峯秀孺子亭前薄霧生僧云如何是境中人答云出入敲金鐙朱衣對錦屏問如何是翠巖境師云洪井滔滔急山高勢近人問如何是境中人師云朝去暮歸師復云問話且止山僧道薄人微素無德行叨承密諫諸官僚同伸堅請陞於此座上答皇恩國祚永安法輪常轉且道法輪作麼生轉欲得會麼須彌山上倒飜身却來堂中疊足坐呵呵呵是什麼飯籮裏坐却受餓和泥合水與麼過上士聞之下士聞之肯可子細思量却成口過要會麼一六三四二直言曲七一桃李火中開黃昏候日出久立尊官伏惟珍重上堂云翠巖路滑徒勞竚思又云翠巖路嶮巘舉步涉千谿更有洪源水滔滔在嶺西擊禪牀下座上堂云樵婦檐柴醫王辨價藥多病甚便下座上堂舉雪竇和尚云一問一答總未有事在假饒盡大地乾坤草木叢林盡為衲僧異口同音致百千問難不消老僧彈指一下並乃高低普應前後無差師云翠巖即不然盡乾坤大地微塵化為衲僧各致一問問問各別却向伊道你許多衲僧皮下還有血麼上堂云為眾竭力禍出私門便下座上堂云槌鐘擊皷聚集諸上座上來下去子承父業賺殺多少人上堂舉盤山頌云光非照境境亦非存光境俱忘復是何物師乃豎起拂子云微塵諸佛光明總在這裏照破你諸人心肝五臟脾胃肝膽衲僧面前不得道着切宜忌口擊禪牀下座小參示眾云一擊響玲瓏喧轟宇宙通知音纔側耳項羽過江東與麼會恰認得驢鞍橋作阿爺下頷小參示眾云僧中有奇人俗士中亦有奇人聖朝楊億侍郎有頌云八角磨盤空裏走金毛師子變作狗擬欲藏身北斗中應須合掌南辰後師云要會麼一偈播諸方塞斷衲僧口下座上堂云有句無句如藤倚樹樹倒藤枯恰認得箇倒根處上堂云霧卷雲收江山逈秀不傷物義波斯去帽上堂云麤言及細語皆歸第一義諸上座每日上來老僧說夢誑嚇諸人雖然如是子承父業賺殺多少人下座上堂云十地驚心二乘罔測銅頭鐵額擊禪牀下座上堂云端然據坐度脚買靴左視右顧不准一錢上堂舉先翠巖云我一夏與師僧東說西話你看我眉毛在麼保福云作賊人心虗師云何故如是得人一牛還人一馬下座上堂云大洋海底排班位從頭第二𩯭毛斑為什麼不道第一𩯭毛斑要會麼金蘂銀絲成玉露高僧不坐鳳凰臺下座上堂云竪窮三際橫徧十方拈起也帝釋心驚放下也地神膽戰不拈不放喚作什麼自云蝦䗫下座上堂云若有仙陀者更不待毫光下座上堂云三世諸佛不知有狸奴白牯却知有乃拈起拂子云狸奴白牯總在這裏放光動地何謂如此兩段不同下座上堂云德山入門便棒臨濟入門便喝翠巖這裏即不然三門前好與三十棒何謂如此棒喝齊施早已賒古今皆贊絕周遮二途不涉憑何說南海波斯獻象牙下座上堂云大眾集定現成公案也是打揲不辦下座上堂拈起香匣云明頭暗合道得天下橫行若道不得且合却下座上堂云砂裏無油事可哀翠巖嚼飯餧嬰孩他時好惡知端的始覺從前滿面灰擊禪牀下座因筠州張一郎到上堂云久思張處士相別十餘月今日上山來鐵鉢煑山蕨歸去到筠陽但請與麼說上堂僧問一切有為法如夢幻泡影真實事請師舉師云兩段不同向下文長問滿身是眼口在什麼處師云三跳僧云學人不會特伸請益師云章底詞秋罷歌韻向春生師乃云雲收霧卷江山白皎日凝波又多途下座拈古舉外道問佛不問有言不問無言世尊據坐外道云世尊大慈大悲開我迷雲令我得入師云大小世尊被外道當面塗糊只如外道云令我得入要且不曾夢見既不曾夢見為什麼悟去阿難問迦葉佛傳金襴外別傳箇什麼迦葉召阿難難應諾迦葉云倒却門前剎竿著師云千年無影樹今時沒底靴五通仙人問佛云佛有六通我有五通如何是那一通佛召五通仙人仙人應諾佛云那一通你問我師云五通仙人如是問佛如是答要且不會那一通祖師問童子云汝從何來子云我心非往祖云你住何所子云我心非止祖云汝無定也子云諸佛亦然祖云你非諸佛子云諸佛亦非師云祖師一問童子一答總欠會在如今諸人作麼生會罽賓國王仗劒問師子尊者云師得蘊空否者云已得蘊空王云還離生死否者云已離生死王云既離生死當施我頭者云身非我有豈況於頭王斬之白乳高數尺王臂自落師云當時尊者引頸王便舉刃當恁麼時有人出來諫得住麼至今無人斷此公案如今衲僧作麼生斷傅大士云夜夜抱佛眠朝朝還共起起坐鎮相隨如身影相似欲識佛去處只這語聲是玄沙云大小傅大士只認得箇昭昭靈靈師云認與不認來年更有新條在惱亂春風卒未休寶公令人傳語思大和尚云何不下山來教化眾生一向目視雲漢作什麼思云三世諸佛被我一口吞盡何處更有眾生可度師云思大只見錐頭利不見鑿頭方臨濟見僧來竪起拂子僧便禮拜濟便打師云這僧有理不伸死而不吊如今且作麼生與這僧出氣思和尚問神會從什麼處來會云曹溪來思云你在曹溪得何意旨會振身而立思云猶帶瓦礫在會云和尚這裏莫有真金與人麼思云設有向什麼處著師云真金瓦礫錯下名言如今喚作什麼思和尚令石頭送書與讓和尚回來與你一箇鈯斧子住山石頭才到便問不求諸聖不重己靈時如何讓云子問太高生何不向下問頭云寧可永劫受沉淪不從諸聖求解脫便歸去思云書達否頭云書亦不達信亦不通去日蒙和尚許箇鈯斧子便請思垂下一足頭便禮拜師云思和尚垂足石頭禮拜出去要且不得他鈯斧子且道後來石頭用箇什麼五洩到石頭便問一言相契即住一言不契即去石頭據坐洩云與麼則不相契也便出石頭召云闍棃洩回首頭云從生至老只是這箇回頭作麼洩忽然大悟便抝折拄杖洞山云當時若不是五洩先師也大難承當雖然如是猶涉途在師云石頭據坐五洩便去石頭召他却成多事有尼參臨濟要開堂談空勘云你有五障不得開堂尼云龍女成佛有幾障空云龍女現十八變你試變看尼云不是野狐精變箇什麼空便打數下師云且道尼具眼麼只擔得箇斷貫索且作麼生會僧問藥山學人有疑請師決山云晚間上來為闍棃決疑至晚上堂大眾集定山云今日決疑僧在麼其僧便出來山下座把住云大眾這僧有疑與一推便歸方丈師云藥山決疑土上加泥然雖如是這僧也不得孤負藥山藥山尋常不為師僧說話院主白云堂中師僧久思和尚示誨山云槌鐘著大眾集定便歸方丈院主隨後問云和尚許為大眾說話為什麼一言不措山云經有經師論有論師爭恠得老僧師云藥山歸方丈當初院主恠藥山不為他說話可謂誤他三軍藥山示眾云智不到處切忌道着道着即頭角生道吾便出去雲巖問藥山智師兄為什麼不祗對和尚山云却是智頭陁會得你去問取雲巖却去問師兄適來為什麼不祗對和尚吾云我今日頭痛你問取和尚雲巖遷化了吾云雲巖不知有悔不當初向伊道雖然如是要且不違藥山之子師云雲巖不知有悔不當初向伊道只如道吾與麼道還有也無大慈和尚云老僧一生不會答話只解識病時有僧出來大慈便歸方丈師云這僧出來大慈便歸方丈並無箇道理什麼處是識病處如今也須子細僧參汝州南院纔到面前僧云敗也院引拄杖向僧面前僧無語院便打師云這僧只知頂上生光不知脚下有刺觀和尚見新到來作麵引次以引示之其僧便去觀至晚間問首座新到在什麼處座云當時便去觀云是即是祇得一橛師云觀和尚道他得一橛大似壓良為賤何故為他彼此是出家兒南泉拈起蕨菜問杉山這箇大好供養山云非但者箇百味珍羞他亦不顧泉云雖然如是總須甞過師云杉山與麼道還免得麼若免得去未具眼在若免不得又違前言魯祖見僧來便面壁師云魯祖何勞如此不用面壁若有僧來云見什麼知時好鄧隱峯在襄州破威儀堂只著襯衣拈靜槌云道得即不打道不得即打眾皆默然峯便打師云此語有勘破處且道勘破阿誰臨濟上堂有僧出立濟便喝僧禮拜濟便打師云臨濟也大正如今作麼生會僧問洞山時時勤拂拭莫使有慶埃為什麼不得他衣鉢山云直道本來無一物也未得他衣鉢在師云總不得他衣鉢與佛同參且道參得阿誰同光帝問興化朕收得中原之寶只是無人酧價化云如何是陛下中原之寶帝引手展撲頭脚化云君王之寶誰敢酧價師云興化下一著語可謂酩酊如今作麼生斷靈雲悟桃花頌三十年來尋劒客幾回落葉又抽枝自從一見桃花後直至如今更不疑遂舉似溈山山云從緣得入永無退失汝善護持又舉似玄沙沙云諦當甚諦當敢保老兄未徹在師云有人如今問玄沙意作麼生且道這箇人還徹也未臨濟上堂有僧出來濟便喝僧亦喝便禮拜濟便打僧無語師云臨濟也太心麤好彩是這僧若是今時衲僧且作麼生出氣地藏問僧什麼處來僧云南方來藏云南方有何言教示徒僧云彼中金屑雖貴眼裏着不得藏云我道須彌山在你眼裏師云且道地藏還免得這僧眼麼僧問趙州大耳三藏第三度覓國師不見未審在什麼處州云在大耳三藏鼻孔裏師云只如三藏還免得國師鼻孔麼國師三喚侍者侍者三應國師云將為吾辜負汝誰知汝辜負吾師云國師與侍者總欠會在如今作麼生會欽山問德山云天皇也與麼道龍潭也與麼道未審德山如何道德山云你試舉天皇龍潭底欽山擬議德山便打師云欽山只顧其前不顧其後如今作麼生與欽山出氣石鞏為獵人趂一鹿從馬祖庵前過問云還見我鹿麼祖云你是甚人鞏云我是獵人祖云你會射麼鞏云解射祖云一箭射幾箇鞏云一箭射一箇祖云你不解射鞏云和尚莫解射否祖云我解射鞏云一箭射幾箇祖云一箭射一羣鞏云彼此生命何用射他祖云你既如是何不自射鞏云若教某甲自射直是無下手處祖云這漢無明煩惱頓歇鞏於是以刀斷髮在庵中執侍師云馬祖一箭射一羣猶未會射山僧一箭射蠢動含靈無不中者雖然如是只道一半留一半與後人道大禪佛參仰山翹一足云釋迦老子亦如是西天二十八祖亦如是和尚亦如是某甲亦如是仰山打四藤條師云此不得作賞不得作罰如今作麼生會香嚴示眾云如人上樹口㗸樹枝脚不踏樹手不攀枝忽有箇人問西來意擬欲詶他又喪身失命不對他又違他所問師云問者答者俱不免喪身失命如今衲僧作麼生會玄沙示眾云諸方老宿盡道接物利生忽遇三種病人作麼生接患盲者拈椎竪拂他又不見患聾者語言三昧他又不聞患瘂者教伊說又說不得且道作麼生接若接此人不得佛法無靈驗師云早知燈是火飯熟也多時玄沙上堂眾集定以拄杖一時趂下向侍者道我今日嶮入地獄若箭射者云且喜和尚再復人身師云大小玄沙前不至村後不至店且作麼生道得出身路龍牙問翠微如何是祖師西來意微云與我過禪板來牙取禪板微接得便打牙云打即任打要且無祖師意又問臨濟如何是祖師西來意濟云與我過蒲團來牙取蒲團濟接得便打牙云打即任打要且無祖師意後住龍牙僧問和尚那時問二尊宿祖師意此二尊宿道明也未牙云明即明矣只是無祖師意師云當初如是如今衲僧皮下還有血麼南泉歸宗麻谷禮拜國師到半路南泉於地上畵一圓相云道得即去歸宗入內坐麻谷作女人拜泉云與麼則不去也宗云是什麼心行師云當初若見每人打一棒且得天下太平法燈和尚示眾云某甲本欲居山藏拙養道過時柰緣先師有不了底公案出來了却時有僧問如何是先師不了公案燈打一拄杖云祖禰不了殃及兒孫僧云某甲有什麼過燈云過在我殃及你師云為眾竭力禍出私門龍牙問德山學人收得鏌鎁劒擬取師頭時如何山云你向什麼處下手牙指地後到洞山纔人事了便舉前話洞山拽拄杖云還我德山頭來牙無語洞山便打師云當斷不斷如今作麼生斷雲居齊和尚問僧從什麼處來僧云堂中來居云何得自謾師云若不如是爭知如是豐干欲遊五臺謂寒山拾得云你若共我遊臺便是我同流你若不共我遊臺不是我同流寒山云你去遊臺作什麼干云禮拜文殊山云你不是我同流師云豐干大似辨才遇蕭翼溈山問仰山甚處來仰山云田中來溈山云田中多少人仰山插鍬叉手而立溈山云南山大有人刈茆仰山拔鍬便行師云只得一橛諸人別有會處麼南泉一日兩堂爭猫兒泉遂提起云道得即不斬眾無語泉便斬後舉似趙州州將草鞋戴頭上出去泉云子若在救得猫兒師云大小趙州只可自救僧問六祖黃梅意旨什麼人得祖云會佛法人得僧云和尚還得否祖云不得僧云和尚為什麼不得祖云我不會佛法師云會得二頭不會三首作麼生道得出身路僧問趙州狗子還有佛性也無州云無僧云一切眾生皆有佛性為什麼狗子無佛性州云他有業識性在師云說有說無也好兩彩一賽如今作麼生道雲葢問石霜萬戶俱閉即不問萬戶俱開時如何霜云堂中事作麼生葢云無人接得渠霜云道也煞道只道得八九成葢云却請師道霜云無人識得渠師云先行不到末後太過呌紫湖和尚夜於僧堂前呌捉賊大眾皆驚有一僧堂中出紫湖攔𮌎把住云捉得也捉得也僧云某甲不是湖云是即是只是你不肯承當師云紫湖買帽相頭趙州一日雪裏臥呌云相救相救有一僧亦來邊臥州便起去師云這僧在趙州圈裏還有人出得麼洞山普請次巡寮見一僧不出山云你何不出普請僧云某甲不安山云你尋常安時又幾曾去師云且道此僧幾曾不去龐居士問大梅和尚久響大梅未審梅子熟也未梅云你向什麼處下口士云百雜碎梅云還我核來師云此二人前不至村後不至店魯祖見僧來便面壁南泉云我尋常不欲向師僧道未具胞胎已前會取尚不得一箇半箇魯祖與麼驢年去師云大愚這裏即不然未具胞胎已前會得打折你腰中邑和尚見僧來乃拍口作和和聲仰山來邑亦拍口山從東過西邑又拍口山從西過東邑又拍口山當面而立邑云你從何得山云從溈山得山却問邑師從何得邑云我從章敬得師云看兩箇老和尚可煞漏逗對面相謾瑘云愁人莫向愁人說達磨臨順世時謂二祖云你在吾身邊得箇什麼祖禮拜依位立磨云汝得吾髓師云二祖被達磨塗糊道得髓皮也未夢見因什麼紹嗣祖師位秘魔巖常持一叉見僧來乃云道得也叉下死道不得也叉下死後大禪佛來跳向秘巖懷裏巖便撫大禪背三下大禪起來斫手云三千里外賺我來師云還有賺處也無非但賺他大禪佛大愚今日也賺大眾上來瑘云雷聲浩大雨點全無仰山有僧來辭山以手劃一劃其僧不去山又劃一劃其僧乃去師云前為什麼不去後為什麼却去要會麼特為注破前一劃與後一劃都成兩劃佛在日有一女子旋遶世尊三匝乃入定世尊勑文殊出此女子定文殊盡其神力不能出得女子定世尊云下方去四十二恒河沙國有罔明菩薩能出此女子定于時罔明至女前彈指三下女子從定而出師云文殊是七佛之師為什麼出女子定不得罔明具什麼神力却出得要會麼僧投寺裏宿賊入不良家文殊問無著近離什麼處著云南方殊云南方佛法如何住持著云末法比丘少奉戒律殊云多少眾著云或三百或五百著却問此間佛法如何住持殊云龍蛇混雜凡聖同居著云多少眾殊云前三三與後三三師云文殊道前三三後三三作麼生會要會麼千年無影樹今時沒底靴古人道我有一句子待犢牛生兒即向汝道師云我即不然犢牛生兒也不向你道何故如是若向你道何處更有王老師道吾聞趙州來吾取豹皮裩著將吉嘹杖於三門下翹一足州纔到吾便唱諾州云小心伏事著吾又唱諾師云有人見得此二人落處不妨具眼若不知落處未具眼在乃擊禪床一下云若也不會打與三百德山小參示眾云今夜不答話有問話者三十棒有僧出禮拜德山便打僧云某甲話也未問和尚為什麼打某甲德山云你是甚處人僧云新羅人山云未踏船舷好與三十棒師云時人盡道德山作家用得好若與麼還曾夢見麼大愚道德山被這僧一推直得瓦解氷消雖然如是今日覔一箇尊宿也大難得普眼菩薩入定遍觀三千大千世界覔普賢菩薩不見未審普賢在什麼處佛言汝但於靜三昧中起一念必見普賢在空中乘六牙白象師云諸人者且作麼會普眼推倒世尊世尊推倒普眼你且道普賢在什麼處劒頌輝日流光勢還曾結眾疑吹毛橫宇宙擬把却施為瞥起和根去擡眸早已遲投機須得妙何處覓牟尼
