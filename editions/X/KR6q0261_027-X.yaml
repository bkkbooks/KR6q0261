body:
  text: 舒州龍門佛眼和尚語錄住南康雲居嗣法善悟編佛眼清遠禪師臨卭李氏子師初住舒州天寧開堂日提刑學士權郡承議燒香度䟽與師接得示大眾云天不能葢地不能載漏泄天機言言堪愛且道如何是堪愛之言良久云分明記取舉似作家遂度與表白宣罷師指法座云古聖道為法來耶為床座來耶我為法來非為床座師咄云是何言歟便陞座拈香云此一瓣香祝延今上皇帝陛下伏願龍圖永固鳳曆長新八表稱臣四維歌化次拈香云此一瓣香奉為提刑學士權郡承議洎闔郡尊官伏願嘉聲藹著善政日新頻承雨露之恩坐聽鹽梅之詔次拈香云此一瓣香還知落處麼欲隱彌露狂晦愈明本欲拋擲巖阿混于沙石苦為諸人敦逼不免細說來由奉為我先蘄州黃梅東山演禪師一爐爇却用陪法乳之恩聊表化儀雖然恩大難酬未免拋三放二遂趺坐山谷和尚白槌云法筵龍象眾當觀第一義師云觀即不一一即不觀第一義門今在何所問答不錄師云太阿橫按截萬機於掌握之中寶鑑當臺現羣象於無心之表有緣即應故問答以縱橫不令而行乃言象而罕測影響之士斯何足云所以佛付佛祖付祖更無絲髮之異豈有東西之殊不立階梯單傳是事若非靈根頓悟大用現前未免業惑海深妄塵自隔遂拈起拂子示眾云還見麼若見見箇什麼若見箇拂子正是凡夫若言不見此是拂子如何說不見底道理道人到此須是忖量不可輕心取於流轉誠非小事實在悟明所以聖人得此事莫不統三界領四生號令聖凡扶顛拯物大眾從上諸聖入此門中各各啟悟勞生破諸塵妄記得靈山會上四十九年說不盡末後分付飲光少林九年之間畢竟獨許二祖爾後光分震旦道滿寰中臨濟德山威行雷電皆為上祖不了致令殃及子孫遂舉拂子云大眾從上許多賢聖如今總在山僧拂子頭上各各坐大蓮花說微妙法交光相羅如寶絲網還信得及麼若信得及山僧出世一期之事已得周圓其或未然不免自通消息去也十字路頭吹玉笛談雲輕日正清秋久立上堂世尊拈花迦葉微笑親切親切省要省要眼目定動料料掉掉為報先生莫打之遶何也文不加點下座上堂云達磨未來此土時須信事元真實二祖禮三拜而立不得謾有商量大眾何故人到于今疑情不息良久曰早知燈是火飯熟已多時直饒恁麼信得及猶是錯承當自餘一切何足論之歸堂上堂奇怪尋常道出門便作還鄉計直至如今計未成誠哉是言也豈不見僧問古德學人欲歸鄉時如何古德曰子父母徧身紅爛臥在荊棘林中子歸何處曰恁麼則不歸也古德曰却須歸去有箇絕粮方子與你僧曰便請古德曰二時上堂不得咬破一粒米大眾荊棘林中紅爛盡無路還鄉二時堂內絕粮方却須歸去所以山僧二十年披雲嘯月未始遊方十來年接物利生何嘗出世諸人皆把父母契券論量祖業田園就赤水以求珠珠沉赤水向荊山而覔玉玉隱荊山說道赤水無珠荊山無玉是誑謼你說道赤水有珠荊山有玉亦是誑謼你山僧有時畫方成圓指南成北何故如此葢為諸人唱還鄉曲子曲調不圓熟路難忘鄉談未改非指南之不妙也如何得曲調圓去豈不見道平窺紅爛處暢殺子平生下座上堂良久云山僧今日與諸人同參一箇真善知識便下座上堂僧問德山入門便棒臨濟入門便喝未審師如何接人師云不虧不欠進云便恁麼去時如何師云第一不得垛根師復云光陰倏忽變化密移始見望朝又已念日諸人還知光陰不變化日月不遷流麼快須究取昔日六祖大師作居士時隱於廣州法性寺印宗法師席下遇夜廊廡間有二僧風幡競辯未盡厥理祖師躡步而謂曰可容俗士得預高論不直以非風幡動仁者心動告之大眾祇如夜來風起且道是風動不是風動若道不是風動如此觸簾動戶簸土揚塵作麼生不是風動還斷得出麼山僧道也不是風動也不是幡動也不是心動有人識得麼青山無限好猶道不如歸珍重上堂兩岸蘆花一葉舟涼風深夜月如鈎絲綸千尺慵拋放歸到家山即便休上堂舉僧問趙州萬法歸一一歸何處州云我在青州作一領布衫重七斤大眾至音絕韻妙曲非聲通身不挂寸絲赤體全無忌諱諸人切莫拈䭔䑛指直須截斷舌頭放下身心自然快活眼若不睡諸夢自除心若不異復名何物快活快活歸堂喫茶下座上堂若有一人發真歸源十方虗空悉皆消殞從前先聖豈不發真歸源如何十方虗空至今尚在又云漚滅空本無況復諸三有幻漚既滅虗空殞無三有眾生從茲殄悴四生九類如何得無又云清淨本然云何忽生山河大地既生山河大地如何得復清淨本然既復清淨本然云何却見山河大地大眾如何即是良久曰水自竹邊流去冷風從花裏過來香好大哥歸堂結夏上堂揮戈佛日不西流照徹人間洞九幽從此安居無一事休將玄妙挂心頭五祖演和尚遷化遺書至上堂昨朝六月二十六無角鐵牛生四足哮吼一聲人未知撼動天關并地軸隻履又西歸唱罷胡家曲可憐末後太分明無限清聲徧溪谷我先師出世四十餘年於舒蘄二郡四坐巨剎垂慈苦口接物利生未甞少暇於二十五日早陞座告眾至晚淨髮歸方丈二十六日早安然長往自始及末從初至終盡善盡美真善知識清遠忝承提訓痛傷可量古人道將此深心奉塵剎是則名為報佛恩昔日大梅遷化上堂聞鼯鼠聲乃云即此物非他物汝善護持吾當逝矣我先師上堂告眾云富嫌千口少貧恨一身多以今校古絲毫無差諸人還知大梅東山二老子去處麼若知得則不辜負先師若也未知有寒暑兮促人壽有鬼神兮妬人福下座上堂卓拄杖一下喝一喝云棒喝齊施古佛宗三玄三要絕狐蹤白雲消散青山在明月蘆花對蓼紅又卓拄杖一下喝一喝下座解夏上堂以一粒芥子擊修羅窟於中宴坐九旬振六鐶錫杖登須彌盧直上安居三月倚長松而自誓臨綠水以經行周游井邑則動止蕭蕭依處叢林則威儀濟濟豈論城隍聚落寧分勝地寶坊心月孤圓神珠炳煥六門虗靜萬法咸如如此護生豈有生之可護如此持律豈有律而可持囊內蠟人通身雪冷誠堪慶賀喜何如哉吳居士為師龍門創坦然菴請上堂淨名居士在家人不二門深入者親一鉢上方香積飯寥寥千古轉通津大眾維摩法力居士神通斷妙喜世界來于此中持香積佛飯悉飽眾會三萬二千師子座本爾莊嚴十方三世諸如來現前證據看他作一場佛事真箇希奇皆不思議之功勳自心之神力者也公明居士希風摩詰接跡龐公大省幻身久趍正覺願延瓶錫修建庵宇遂爾來此聚集禪徒記得昔日臨濟栽松次黃蘗問云深山裏栽許多松作什麼濟云一與山門作境致二與後人作標牓道了以鋤頭打地兩下蘗云吾宗到子大行于世大眾臨濟所栽者松可謂根盤沙界葉覆彌盧三賢十聖為憩息之方諸佛祖師為作止之地故得後代子孫昌盛永茂宗枝自古及今綿綿不斷如今眾中若有一員禪客出來道深山裏用起庵作什麼山僧也祇向伊道一與山門作境致二與後人作標牓且道與他古人相去多少大眾一與山門作境致見者頓超無學地二與後人作標牓凡聖悟迷皆一樣若是叢林向上關有人踏著喜無量下座上堂少室無言語曹溪有消息可憐門大開而人不能入蒼龍得雲雨猛虎生羽翼但解自承當何勞問知識上堂僧問劫火洞然大千俱壞未審此箇壞不壞師云黑漆桶裏黃金色進云請師答話師云閑言語師復云古人道我有時揚眉瞬目有時不揚眉瞬目有時揚眉瞬目是有時揚眉瞬目不是如今人不委得了便別作解會說道得底人道是也得不是也得問伊作麼生是得底人便道他分上不說得與不得得也好不得也好乃長噓一聲曰有什麼共語處祇如古人道恁麼也不得不恁麼也不得恁麼不恁麼總不得又作麼生他便道此是拂跡語拂你屋裏老爺老孃又問伊此是拂跡語不拂跡語如何便道恁麼也得不恁麼也得恁麼不恁麼總得此喚作實頭語實你屋裏老爺老孃師復吁兩聲曰有什麼共語處夫為衲僧須作衲僧說話你等合作麼生莫道龍門不肯我埋沒我心行我壓良我龍門恁麼是要你到不要你到也須子細看詳好珍重上堂總記不得天花滿裓縱有千言不如一默下座上堂昔玄沙大師示眾云諸方尋常盡道接物利生忽遇三種病人如何接得患盲者來拈槌竪拂他又不見患聾者來向他說他又不聞患啞者來教伊說又說不得若接此三人不得佛法無靈驗師云好諸兄弟還知真實相為處麼山僧不惜眉毛為諸人說破祇如諸人尋常有雙眼又何曾見來有雙耳又何曾聞來有片舌又何曾說來既無說無聞無見何處有色聲香味來雖然如是又能有幾人到者般田地所以道木伎機石女兒三冬陽氣盛六月降霜時有語非干舌無言切要詞會我最後句出世少人知午齋晨粥無餘事盞茗爐香話道奇下座上堂普光明殿在人間凡聖交羅絕往還若向一塵親得見毫光照處奉慈顏上堂昔日百丈大智禪師再參馬祖侍立次祖舉拂子丈云即此用離此用祖掛却拂子問云你他後開兩片皮將何為人丈取拂子竪起祖云即此用離此用丈掛拂子於舊處祖便喝百丈直得三日耳聾大眾說甚三日耳聾直得龍門打鼓上堂大眾盡皆雲集僧堂撗吞佛殿露柱倒掛燈籠天高地厚月白風清雨順風調河清海晏飢則共君飡苦菜渴則與子飲寒泉直饒天外雨花飛爭似歸堂喫茶去下座上堂臺山路上過客全稀破竈堂前感恩無地雪埋庭栢氷鎖偃溪雖在南方火爐頭不入他家虀甕裏看看臘月三十日便是孟春猶寒你等諸人各須努力向前切忌自生退屈下座上堂山僧適在寢堂中法堂上無山僧寢堂上有山僧下至法堂法堂上有山僧寢堂上無山僧有則心外有法無則心法不周諸上座在衣鉢下聞打鼓便上法堂法堂上添得上座衣鉢下減却上座添則成增減則成滅滅故落斷增故落常行脚人如何得離有離無離常離斷生死疑情大難透脫此是如來清淨心要宜須決擇不可等閑光景遷流動如飛箭浮世如此人生幾何彼此出家三界逆旅竹戶茅堂孰為其主冷淡共居寂寞同住何故何新何憂何慮下座行者落髮上堂露柱多年出家燈籠久已落髮佛殿堅持禁戒三門近得休歇大事本來平等無著清涼滿月度盡草木叢林一似陽和齊發下座元日上堂萬物咸新論故鄉擡眸元是舊爺娘先春花發馨香遠物外山河日月長僧問昔日䟦陀尊者問法照大師未審與今日是同是別師云古之今之進云栽松人老難傳鉢盧老區區入嶺南師云你試舉古人底看進云廚庫三門鐘樓佛殿師云恁麼又爭得進云忽遇七手八脚底人來又作麼生師云截斷脚根道將一句來進云昨日有人從舒州去師云亦是悠悠者復舉僧問百丈如何是奇特事丈云獨坐大雄峯僧禮拜丈便打師云錯打人僧問德山如何是奇特事山云我宗無語句亦無一法與人師云猶較些子僧問羅山如何是奇特事羅山云道什麼師云成何道理大眾古人鈎頭著餌意在得魚如今洗脚上船能有幾箇或若人問龍門如何是奇特事山僧向伊道此去太湖不遠恁麼說話有甚奇特又向伊道咫尺是棠梨大眾還會麼等閑如不會須作等閑看下座上堂身中有生老病死念上有生住異滅國土有成住壞空此十二種事甚能奇特凡夫不識為之漂流如來出世指出涅槃妙心常樂我淨譬如還丹一粒點鐵成金至理一言轉凡成聖此十二種祇是一法現定如今歷歷聽法者是還信得及麼乃云月中丹桂偏禁冷雪裏寒梅獨放香下座上堂悟時此事元來易迷後斯門實大難處處綠楊堪繫馬家家門口透長安上堂三月初三二月二不壞假名談大義眾生役役趂光陰道流所以為虗棄二月念九三月一摩訶般若波羅蜜假使多聞達古今歷劫何曾異今日今日事作麼生良久曰何更今日上堂從上諸聖見人樂著塵勞不求出離遂生憐慜之心告之曰你隨聲逐色名曰狂人大眾好言語慙愧諸聖恁麼道雖然如是已是打開布袋不能折合得龍門今日倒底傾出有人得者永息希求乃拈拄杖卓一下云豈不是聲你尋常作麼生隨又舉起拄杖曰豈不是色你尋常作麼生逐還會麼若能隨逐元無縛便是叢林了達人久立浴佛上堂如來妙色身真實難藏覆不掛本來衣豈著娘生袴無憂樹下降生時南北東西行七步行七步度盡眾生無所度今晨四月初八我佛如來降生之日天下精藍煎湯浴佛佛則從諸人浴且道如何是佛要知麼佛名如來常在不滅有人見得山僧更不忉忉若無人見得山僧重說偈言昨日如來垂法雨今朝法雨洗如來了然一味無差別雲外青山朵朵開欲報如來深恩殿上重新浴過下座結夏上堂龍門結夏勝諸方大地山河為舉揚若向九旬參得透更無佛法可商量上堂萬古長空一朝風月古人恁麼告報大好言詮豈可以一朝風月昧却萬古長空豈可以萬古長空不明一朝風月此是廣大深法自在之宗若也明得何處更有一絲頭剩法來久立上堂三日不相見莫作舊時看山僧近來非昔人也天是天地是地山是山水是水僧是僧俗是俗別也非昔人也有人問未審已前如何山僧往時天是天地是地山是山水是水僧是僧俗是俗所以迷情擁蔽翳障心源如今別也或有人出來道某甲亦如和尚天是天地是地山是山水是水僧是僧俗是俗還得否不可直是未在還有揀辨得麼若揀得是上座道眼圓明若揀不得絲竹喧天船上樂綺羅照水岸邊人珍重上堂僧問道遠乎哉觸事而真如何是道師云頂上八尺五進云未審此理如何師云方圓七八寸進云向上一路還許學人會也無師云不論向上向下却許你會進云恁麼則當處出生隨處滅盡師云多少人恁麼錯會進云作家宗師天然有在便禮拜師云未曾與上座共行在師復云親切中直是親切省要中直是省要還會得麼諸人盡是發志探玄意求出離山僧這裏終不拈今舉古取是捨非惑亂諸人你若不來山僧也無可得說你若上來山僧不免在你身上割一塊子似與你還知痛痒麼忽然知得可謂親切也若不知來由便道者一塊子那裏得來得恁麼香得恁麼臭得恁麼生得恁麼熟還委得麼不離當處常湛然覔即知君不可見珍重上堂了知一萬事畢釋迦彌勒欣今日但得心安是處安無灾無難無今昔要知佛法根源記取五月初一下座端午上堂今日端午世間人釘桃符書門閫使萬邪不窺其戶百鬼不入其門世間人又使針燒灸採藥登山使萬病不干其體疫癘不入其身遂失聲呌曰阿㖿㖿阿㖿㖿盡大地人燒破皮肉教山僧受無限苦痛昔楚大夫以忠言不用沉于湘江後人哀之以竹筒盛飯繫五色絲祭之風俗至今流傳不斷遂嘔吐數聲曰世間人喫却米粽教老僧脹破肚皮大眾別人燒灸別人喫物為什麼龍門長老受痛受飽未能情忘緣慮事出見聞於此門中遂為戲論豈不見先聖有言曰懷州牛喫禾益州馬肚脹天下覔醫人灸猪左膊上何也遠走不如近匍匐久立上堂入得龍門事事奇聞聲見色不思議山青水綠緣何事盡是諸人力使之上堂卓拄杖云還搆得麼莫道今日猶較些子直須向無摸索處傾湫倒岳搆得始得山僧恁麼道可殺不識好惡雖然如是直饒你搆得我更問你從前殺盜婬妄罪飲酒食肉罪教什麼人還又卓拄杖云金剛作醜佛受香油東山和尚忌晨上堂先師當年末後句與人皮下挑出刺譬如六月日中氷銷鎔處處皆相似後來聽響各流傳更加一二與三四箇中孰是無耳人明見去來不生死先師老和尚某奉侍日久多蒙苦口提撕追遠之誠何可忘也聊設小供諸人且道先師還來也無若道來入滅十餘年如何見得來底道理若道不來又用設齋作什麼道來也有詨訛道不來也有詨訛若為得無詨訛去還知得麼三箇渾崙鐵餕餡一雙無縫木饅頭久立上堂大眾或有人喚上座上座便應設使不應心中也須領覧今時學人便道應底是也領覧底是也若如此會便是入地獄漢子是即且置且道面前是阿誰喚你是有人喚耶是無人喚耶還裁斷得麼若是有人喚山精鬼魅喚你時天魔外道喚你時如何辨白若道無人喚你又不聾不騃如何得無人喚者箇是十二時中生死路頭事諸人明得麼有人喚生迷亂無人喚遭繫絆若能行生死斷萬兩金終不換下座解夏上堂毗目仙人執善財手頓見過去微塵諸佛及其放手宛然依舊龍門長老領諸大眾爰於此地結足安居及其解夏宛然依舊善財依舊處微塵諸佛含攝有歸大眾依舊處三月九旬斂收無迹還會麼毛端藏剎海芥子納須彌不離見聞緣超然登十地四生六道即心自性三塗八難普現色身居華藏海之中住不思議之內如斯之旨乃吾輩之常分耳還信得及麼上堂今日七月二十解夏來又是五日也你禪僧家盡道我會也且道今日是七月二十不是七月二十或若當此一問於佛法中如何祇對有底師僧道你何不問本分事者箇是世間日月大眾那箇是世間日月又豈有不管底法又有師僧道不動世間一星子就上便明取恁麼事今日七月二十也大眾那裏是不動底一星子得安樂底人終不作者般去就山僧問你今日是七月二十不是七月二十有人明得麼古人云世間事明不得佛法大遠在者裏若分疎不上一切處礙塞殺人還知麼大火聚中難著手清涼地內易安身久立上堂舉僧問雲居如何是道中人對云如死人手道中人相見時如何對云如死人眼大眾作麼生是如死人手師拈拄杖云不執捉怎生是如死人眼師擘開眼云不照燭你諸人好會取祇如前日送亡僧山僧道一隊死漢送箇活漢有人會恁麼說話麼怎生是一隊死漢師云移身不移步怎生是一箇活漢師云萬機俱不到後生兄弟初秋夏末何不哮吼一聲壁立千仞令我知道你是箇人向活中明取死句死中明取活句若不然者求生不得生求死不得死喫辛苦也直須哮吼一聲下座上堂僧問道在慵開口詩成自點頭時如何師點頭數下僧云今日得遇也師云莫亂開口師復云諸人每日行千行萬不是不到何故却不分曉祇為信之不及若信得及則不行而到也十方世界事不待思量一時曉了得諸人每日說千說萬不是說不到何故却不分曉亦是信之不及若也信得及則實無所說也三世如來所說之法不待思量一時曉了得大眾還到恁麼田地也未我此宗門祇論證悟不論會解若是為生死底人須求親證若是人我參學之人恥為不會須求覔解會到處覔相似語句遞相印證滅胡種族已後胡亂教壞人家男女我此門中都無是事還知麼聾人也唱胡笳曲好惡高低自不聞上堂世人盡道路行難本分真金入火看煉去煉來金體淨一槌打作玉欄干請化主上堂一竿一笠一蓑衣急水灘頭下釣絲鈎上錦鱗容易得蘆花深處月明歸舉古人問三尊宿二龍爭珠誰是得者一云得即失一云老僧祇管看一云誰是不得者師曰得即失著忙作什麼老僧祇管看看濟什麼事末後一則語誰是不得者若人會得祖師言句一大藏教自然不疑去還明得麼誰是不得者非取亦非捨馬載驢䭾時便是歸來也下座上堂打動龍門鼓喚起鐵餕餡請君一咬破山僧豈相賺先師曾得力滋味今不減若也不柰何好箇鐵餕餡上堂舉長沙和尚云我若一向舉揚宗教法堂前草深一丈誠哉是言也玄沙和尚云因汝顛倒知見方有往來誠哉是言也龍門尋常見汝諸人恁麼所以向汝道不恁麼你須是不恁麼始得諸人不恁麼龍門所以向汝道恁麼你須是恁麼始得諸人道恁麼不恁麼龍門所以道非恁麼非不恁麼你須是非恁麼非不恁麼始得諸人非恁麼非不恁麼龍門所以道恁麼不恁麼你須恁麼不恁麼始得大眾情亡智現病去藥除豈不是箇脫灑衲僧龍門尋常還有一句子到諸人分上麼不見僧問馬大師離四句絕百非請師直指西來意大師云我今日無心情汝去問取智藏僧問智藏藏云今日頭疼汝去問取海兄僧又去問海海云我到者裏却不會僧舉似馬大師師云藏頭白海頭黑大眾說白道黑理甚分明諸人還見馬大師麼久立也太無端上堂云若論此事如中秋夜望圓月相似淨無雲翳人皆見之南閻浮提無所不照諸人各在他鄉異井各有父母家山你道彼中還有麼山川溪谷逈絕無人到處彼中還有麼又爭得無來人各自謂得見是月然此滿月不此方來不彼方去若此方來彼則無也若彼方去此何故見之四維上下亦復如是所以道並安千器千器皆圓一道澄江一月孤瑩昔有人指月問南泉和尚何時得恁麼去南泉曰王老師二十年前亦曾恁麼來大眾向你道此事無你卜度處無你名邈處如今禪和家盡道我會得也什麼處是照不著且問你照得著底事上座前生自何趣中來此身沒後復生何處作天耶人耶地獄耶餓鬼耶作畜生耶若不委知空然有此語要作何用馬大師一日翫月次二三弟子侍座大師曰正當恁麼時如何西堂曰大好供養百丈曰大好修行南泉拂袖而去大師曰經歸藏禪歸海唯有普願獨超物外看他如斯論量也大奇恠大師致此一問諸大士直得息剠補劓望作全人塞壑移峯貴就平坦還契得馬大師此一問麼委悉得麼良久曰幸無偏照處剛有不明時上堂祖師云亦莫愛聖憎凡會得凡夫法便是聖人法識得聖人法即是凡夫法盡知道凡聖不二為什麼凡夫漂流諸聖解脫又道亦莫拋迷就悟如今悟底是向來迷底如今迷底是向來悟底盡知道迷悟不二為什麼迷者依前壅塞悟者依舊惺惺諸人還辨明得麼凡聖悟迷如透了洞然明見本來人敢問大眾如何是本來人尋常師僧家道什麼處不見本來人驢脣先生豈是泗州大聖又道渠無面目甚處逢渠遠水不救近火離此二途如何是本來人良久云設使聞來悟爭如自得親下座上堂昔無著和尚游五臺禮拜文殊到山下投一寺宿遇一老僧祇待次問無著曰上人自何而來無著曰南方來老僧曰南方佛法近日如何無著曰末法比丘少奉戒律僧曰多少眾著曰或三百或五百著問和尚此間佛法如何住持僧曰凡聖同居龍蛇混雜著曰多少眾僧曰前三三後三三著不省遂令童子以琉璃盞點茶度與著遂問曰南方還有者箇麼著云無曰既無將什麼喫茶著又不省復令童子送出門外著觀寺無額乃問童子此寺因何無額童子指背後金剛著回顧忽然不見童子止見身在一林中大眾無著遠遠遊五臺禮拜文殊及乎親見要且不識誠實苦哉是故明昭和尚頌云廓周沙界聖伽藍滿目文殊接話談言下不知開佛眼回頭祇見翠山巖雪竇和尚亦有頌云千峯盤屈色如藍誰謂文殊是對談堪笑清涼多少眾前三三與後三三大眾此二頌通古徹今美則美矣要且不見文殊山僧今為諸人頌出乃云青山門外白雲飛綠水溪邊引客歸莫恠坐來頻勸酒自從別後見君稀下座上堂靠拄杖肩上謂眾曰好笑好笑乃呵呵而笑昨日有兩人共說一件事與山僧山僧聞得一夜笑得腸肚痛又呵呵而笑大眾要知麼有一人云今日是初三官曆上寫來村裏人道是初四乃村下曆頭問老僧道是初三麼山僧向道是初三是官曆麼山僧云是官曆村裏謂之初四是村下曆頭麼山僧云初四是村下曆頭其人點頭又有一人云今日是初四官曆上寫來村裏人道是初三乃村下曆頭長老如何山僧向伊道是初四初三是村下曆頭其人點頭兩人相見具說其事一人云長老向我道是初三一人云長老向我道是初四兩人遂來見山僧云今日是初三是初四山僧聞得笑殺兩人云長老不要淈𣸩好好分明說山僧向道汝自不分明何處是淈𣸩大眾會得此意麼山僧見伊不曉也不柰何眾中禪僧道長老如何鳴鼓集眾了也不說些佛法及祖師西來意却理會世間閑日子此是世人情見山僧聞了問伊道世間有什麼閑日子又那箇是情見把來看伊元來不會見伊不會更作箇頌子舉似伊頌道言親事亦親無偽亦無真愚俗稱為我邪徒喚作神是我何曾我言神豈是神人生須特達乃提拄杖下禪床曰丈六紫金身座前又謂眾曰也不屈著你上堂僧問大用現前不存軌則時如何師云誰信你僧便喝師云更進一步看僧云幸有一弓三下箭當機要射不平人師云少年曾決龍蛇陣潦倒還同稚子歌僧又喝師云元來祇是野狐精僧禮拜師云何曾大用現前師復云古來有一人南泉和尚諸人還識否若識得一生不空過好南泉和尚莫教見而不識還識麼曾有一俗士問曰弟子家中有片石也曾坐也曾臥如今欲鐫作佛不知還得否南泉云得莫不得麼不得有人明得此旨也無南泉道得龍門云好箇佛南泉道不得龍門云好片石還見否是他道弟子家中作麼生說家家在什麼處諸仁者親從家裏來家中何所有持此一片石廣大堅且久靈山曾獻佛帝釋聊舉手心中出何物安樂并長壽下座
