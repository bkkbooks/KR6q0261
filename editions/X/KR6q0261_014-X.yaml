避云向甚處迴避師云恰好有僧上參次見師衲衣蓋頭坐次僧便退師云闍黎莫道老僧不祇對師問僧從什麼處來云南方來師云共什麼人為伴云水牯牛師云好箇師僧因什麼與畜生為伴云不異故師云好箇畜生云爭肯師云不肯且從還我伴來師問僧堂中還有祖師也無云有師云喚來與老僧洗脚堂中有二僧相推不肯作第一座主事白和尚師云總教他作第二座云教誰作第一座師云裝香著云裝香了也師云戒香定香師問僧離什麼處云離京中師云你還從潼關過麼云不歷師云今日捉得者販私鹽漢因送亡僧師云只是一箇死人得無量人送又云許多死漢送一箇生漢時有僧問是心生是身生師云身心俱不生云者箇作麼生師云死漢有僧見貓兒問云某甲喚作貓兒未審和尚喚作什麼師云是你喚作貓兒因鎮州大王來訪師侍者來報師云大王來師云大王萬福侍者云未在方到三門下師云又道大王來也因上東司召文遠文遠應諾師云東司上不可與你說佛法也因在殿上過乃喚侍者侍者應諾師云好一殿功德侍者無對師因到臨濟方始洗脚臨濟便問如何是祖師西來意師云正值洗脚臨濟乃近前側聆師云若會便會若不會更莫㗖作麼臨濟拂袖去師云三十年行脚今日為人錯下注脚師因到天台國清寺見寒山拾得師云久嚮寒山拾得到來只見兩頭水牯牛寒山拾得便作牛鬬師云叱叱寒山拾得咬齒相看師便歸堂二人來堂內問師適來因緣作麼生師乃呵呵大笑一日二人問師什麼處去來師云禮拜五百尊者來二人云五百頭水牯牛聻尊者師云為什麼作五百頭水牯牛去山云蒼天蒼天師呵呵大笑師行脚時見二菴主一人作丫角童師問訊二人殊不顧來日早晨丫角童將一鐺飯來放地上分作三分菴主將席子近前坐丫角童亦將席近前相對坐亦不喚師師乃亦將席子近前坐丫童目顧於師菴主云莫言侵早起更有夜行人師云何不教詔這行者菴主云他是人家男女師云洎合放過丫童便起顧視菴主云多口作麼丫童從此入山不見師因看經次沙彌文遠入來師乃將經側示之沙彌乃出去師隨後把住云速道速道文遠云阿彌陀佛阿彌陀佛師便歸方丈因沙彌童行參師向侍者道教伊去侍者向行者道和尚教去行者便珍重師云沙彌童行得入門侍者在門外師行脚時到一尊宿院纔入門相見便云有麼有麼尊宿竪起拳頭師云水淺船難泊便出去又到一院見尊宿便云有麼有麼尊宿竪起拳頭師云能縱能奪能取能撮禮拜便出去師一日拈數珠問新羅長老彼中還有者箇也無云有師云何似者箇云不似者箇師云既有為什麼不似無語師自代云不見道新羅大唐問新到什麼處來云南方來師竪起指云會麼云不會師云動止萬福不會師行脚時問大慈般若以何為體慈云般若以何為體師便呵呵大笑而出大慈來日見師掃地次問般若以何為體師放下掃呵呵大笑而去大慈便歸方丈師到百丈百丈問從什麼處來云南泉來百丈云南泉有何言句示人師云有時道未得之人亦須峭然去百丈叱之師容愕然百丈云大好峭然師便作舞而出師到投子處對坐齋投子將蒸餅與師喫師云不喫不久下糊餅投子教沙彌度與師師接得餅却禮沙彌三拜投子默然因僧寫師真呈師師云若似老僧即打殺我若不似即燒却師因與文遠行次乃以手指一片地云這裏好造一箇巡鋪子文遠便去彼中立云把將公驗來師便打一摑遠云公驗分明過師問新到近離甚處云臺山師云還見文殊也無僧展手師云展手頗多文殊難覩云只守氣急殺人師云不覩雲中鴈焉知沙塞寒問遠遠投師請師一接師云孫臏門下因什麼鑽龜僧拂袖出去師云將為當榮折他雙足師與首座看石橋乃問首座是什麼人造云李膺造師云造時向什麼處下手座無對師云尋常說石橋問著下手處也不知有新羅院主請師齋師到門首問此是什麼院云新羅院師云我與你隔海問僧什麼處來云雲居來師云雲居有什麼言句云有僧問𦏰羊掛角時如何雲居云六六三十六師云雲居師兄猶在僧却問未審和尚尊意如何師云九九八十一有一婆子日晚入院來師云作什麼婆云寄宿師云者裏是什麼所在婆呵呵大笑而去師出外逢見一箇婆子提一箇籃子師便問什麼處去云偷趙州笋去師云忽見趙州又作麼生婆子近前打一掌師因見院主送生飯鵶子見便總飛去師云鵶子兒見你為什麼却飛去院主云怕某甲師云是什麼語話師代云為某甲有殺心在師問僧什麼處來云江西來師云趙州著在什麼處僧無對師從殿上過見一僧禮拜師打一棒云禮拜也是好事師云好事不如無師因參潼關潼關問師云你還知有潼關麼師云知有潼關云有公驗者即得過無公驗者不得過師云忽遇鑾駕來時如何關云也須檢點過云你要造反師到寶壽寶壽見師來遂乃背面而坐師便展坐具寶壽起立師便出去師在南泉時泉牽一頭水牯牛入僧堂內巡堂而轉首座乃向牛背上三拍泉便休去師後將一束草安首座面前首座無對有秀才見師乃讚歎師云和尚是古佛師云秀才是新如來有僧問如何是涅槃師云我耳重僧再問師云我不害耳聾乃有頌騰騰大道者對面涅槃門但坐念無際來年春又春有僧問生死二路是同是別師乃有頌道人問生死生死若為論雙林一池水朗月耀乾坤喚他句上識此是弄精魂欲會箇生死顛人說夢春有僧問諸佛有難火𦦨裏藏身和尚有難向什麼處藏身師乃有頌渠說佛有難我說渠有灾但看我避難何處有相隨有無不是說去來非去來為你說難法對面識得來十二時歌鷄鳴丑愁見起來還漏逗裙子褊衫箇也無袈裟形相些些有裩無𦝫袴無口頭上青灰三五斗比望修行利濟人誰知變作不唧溜平旦寅荒村破院實難論解齋粥米全無粒空對閑窻與隙塵唯噪勿人親獨坐時聞落葉頻誰道出家憎愛斷思量不覺淚沾巾日出卯清淨却翻為煩惱有為功德被塵幔無限田地未曾掃攢眉多稱心少尀耐東村黑黃老供利不曾將得來放驢喫我堂前草食時辰煙火徒勞望四鄰饅頭䭔子前年別今日思量空嚥津持念少嗟歎頻一百家中無善人來者祇道覓茶喫不得茶噇去又嗔禺中巳削髮誰知到如此無端被請作村僧屈辱飢悽受欲死胡張三黑李四恭敬不曾生些子適來忽爾到門頭唯道借茶兼借紙日南午茶飯輪還無定度行却南家到北家果至北家不推註苦沙鹽大麥醋蜀黍米飯虀萵苣唯稱供養不等閑和尚道心須堅固日昳未者回不踐光陰地曾聞一飽忘百飢今日老僧身便是不習禪不論義鋪箇破蓆日裏睡想料上方兜率天也無如此日炙背晡時申也有燒香禮拜人五箇老婆三箇癭一雙面子黑皴皴油麻茶實是珍金剛不用苦張筋願我來年蠶麥熟羅睺羅兒與一文日入酉除却荒涼更何守雲水高流定委無歷寺沙彌鎮常有出格言不到口枉續牟尼子孫後一條拄杖麤楋藜不但登山兼打狗黃昏戌獨坐一間空暗室陽𦦨燈光永不逢眼前純是金州漆鐘不聞虗度日唯聞老鼠閙啾唧憑何更得有心情思量念箇波羅蜜人定亥門前明月誰人愛向裏唯愁臥去時勿箇衣裳著甚蓋劉維那趙五戒口頭說善甚奇怪任你山僧囊罄空問著都緣總不會半夜子心境何曾得暫止思量天下出家人似我住持能有幾土榻床破蘆䉬老榆木枕全無被尊像不燒安息香灰裏唯聞牛糞氣見起塔乃有頌本自圓成何勞疊石名邈雕鐫與吾懸隔若人借問終不指畫因見諸方見解異途乃有頌趙州南石橋北觀音院裏有彌勒祖師遺下一隻履直至如今覓不得因魚鼓有頌四大猶來造化功有聲全貴裏頭空莫怪不與凡夫說只為宮商調不同因蓮花有頌奇異根苗帶雪鮮不知何代別西天淤泥深淺人不識出水方知是白蓮附趙王與師作真贊碧溪之月清鏡中頭我師我化天下趙州哭趙州和尚二首師離㴲水動王侯心印光潛麈尾收碧落霧霾松嶺月滄溟浪覆濟人舟一燈乍滅波旬喜雙眼重昏道侶愁縱是了然雲外客每瞻瓶几淚還流佛日西傾祖印隳珠沉丹沼月沉輝影敷丈室爐烟慘風起禪堂松韻微隻履乍來留化跡五天何處又逢歸解空弟子絕悲喜猶自潸然對雪幃廬山棲賢寶覺禪院住持傳法賜紫沙門澄諟重詳定
