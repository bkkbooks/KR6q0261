body:
  text: 趙州真際禪師語錄之餘師上堂示眾云金佛不度爐木佛不度火泥佛不度水真佛內裏坐菩提涅槃真如佛性盡是貼體衣服亦名煩惱不問即無煩惱實際理地什麼處著一心不生萬法無咎但究理而坐二三十年若不會截取老僧頭去夢幻空花徒勞把捉心若不異萬法亦如既不從外得更拘什麼如羊相似更亂拾物安口中作麼老僧見藥山和尚道有人問著但教合取狗口老僧亦道合取狗口取我是垢不取我是淨一似獵狗相似專欲得物喫佛法向什麼處著一千人萬人盡是覓佛漢子覓一箇道人無若與空王為弟子莫教心病最難醫未有世界早有此性世界壞時此性不壞從一見老僧後更不是別人只是箇主人公者箇更向外覓作麼與麼時莫轉頭換面即失却也問如何是佛向上人師云只者牽耕牛底是問如何是急師云老僧與麼道你作麼生云不會師云向你道急急著靴水上立走馬到長安靴頭猶未濕問四山相逼時如何師云無路是趙州問古殿無王時如何師咳𠻳一聲云與麼即臣啟陛下師云賊身已露問和尚年多少師云一串數珠數不盡問和尚承嗣什麼人師云從諗問外方忽有人問趙州說什麼法如何祇對師云鹽貴米賤問如何是佛師云你是佛麼問如何是出家師云爭得見老僧問佛祖不斷處如何師云無遺漏問本源請師指示師云本源無病云了處如何師云了人知云與麼時如何師云與我安名字著問純一無雜時如何師云大煞好一問問無為寂靜底人莫落在沉空也無師云落在沉空云究竟如何師云作驢作馬問如何是祖師西來意師云床脚是云莫便是也無師云是即脫取去問澄澄絕點時如何師云老僧者裏不著客作漢問鳳飛不到時如何師云起自何來問實際理地不受一塵時如何師云一切總在裏許問如何是一句師應諾僧再問師云我不患聾問初生孩子還具六識也無師云急流水上打毬子問頭頭到來時如何師云猶較老僧百步問如何是和尚家風師云老僧自小出家抖擻破活計問請和尚離四句道師云老僧常在裏許問扁鵲醫王為什麼有病師云扁鵲醫王不離床枕又云一滴甘露普潤大千問如何是露地白牛師云者畜生問如何是大人相師側目視之云猶是隔階趨附在師云老僧無工夫趨得者閑漢僧問纔有心念落在人天直無心念落在眷屬時如何師云非但老僧作家亦答你不得問凡有施為盡落糟粕請師不施為答師叱尼云將水來添鼎子沸問如何是般若波羅蜜師云摩訶般若波羅蜜問如何是咬人師子師云歸依佛歸依法歸依僧莫咬老僧問離却言句請師道師咳嗽問如何得不謗古人不負恩去師云闍黎作麼生問如何是一句師云道什麼問如何是一句師云兩句問唯佛一人是善知識如何師云魔語問如何是菩提師云者箇是闡提問如何是大人相師云好箇兒孫問寂寂無依時如何師云老僧在你背後問如何是伽藍師云別更有什麼云如何是伽藍中人師云老僧與闍黎問二龍爭珠誰是得者師云老僧只管看問如何是離因果底人師云不因闍黎問老僧實不知問眾盲摸象各說異端如何是真象師云無假自是不知問如何是第一句師咳嗽云莫便是否師云老僧咳嗽也不得問大海還納眾流也無師云大海道不知云因什麼不知師云終不道我納眾流問如何是毗盧師師云毗盧毗盧問諸佛還有師也無師云有云如何是諸佛師師云阿彌陀佛阿彌陀佛問如何是學人師師云雲有出山勢水無投㵎聲云不問者箇師云是你師不認問諸方盡向口裏道和尚如何示人師脚跟打火爐示之云莫便是也無師云恰認得老僧脚跟問不行大道時如何師云者販私鹽漢云却行大道時如何師云還我公驗來問如何是本來身師云自從識得老僧後只這漢更不別云與麼即與和尚隔生去也師云非但今生千生萬生亦不識老僧問如何是祖師西來意師云東壁上掛葫蘆多少時也問方圓不就時如何師云不方不圓云與麼時如何師云是方是圓問道人相見時如何師云呈漆器問諦為什麼觀不得師云諦即不無觀即不得云畢竟如何師云失諦問行又不到問又不到時如何師云到以不到道人看如涕唾云其中事如何師唾地問如何是祖師西來意師云如你不喚作祖師意猶未在云本來底如何師云四目相覩更無第二主宰問不具形儀還會也無師云即今還會麼問如何是大無慚愧底人師云皆具不可思議問學人擬向南方學些子佛法去如何師云你去南方見有佛處急走過無佛處不得住云與麼即學人無依也師云柳絮柳絮問如何是急切處師云一問一答問不籍三寸還假今時也無師云我隨你道你作麼生會問如何是和尚家風師云茫茫宇宙人無數云請和尚不答話師云老僧合與麼問二龍爭珠誰是得者師云失者無虧得者無用問如何是大人相師云是什麼有俗士獻袈裟問披與麼衣服莫辜負古人也無師拋下拂子云是古是今問如何是沙門行師云展手不展脚問牛頭未見四祖時如何師云飽柴飽水云見後如何師云飽柴飽水問如何是學人自己師云喫粥了也未云喫粥也師云洗鉢盂去問如何是毗盧師師云白駝來也未云來也師云牽去餵草問如何是無師智師云老僧不曾教闍黎問如何是親切一句師云話墮也問不借口還許商量也無師云正是時云便請師商量師云老僧不曾出問二祖斷臂當為何事師云粉骨碎身云供養什麼人師云來者供養問無邊身菩薩為什麼不見如來頂相師云你是闍黎問晝是日光夜是火光如何是神光師云日光火光問如何是恰問處師云錯云如何是不問處師云向前一句裏辨取問如何是大人相師以手摸面叉手斂容問如何是無為師云者箇是有為問如何是祖師西來意師云欄中失却牛問學人遠來請和尚指示師云纔入門便好驀面唾問如何是直截一路師云淮南船子到也未云學人不會師云且喜到來問栢樹子還有佛性也無師云有云幾時成佛師云待虗空落地云虗空幾時落地師云待栢樹子成佛問如何是西來意師云因什麼向院裏罵老僧云學人有何過師云老僧不能就院裏罵得闍黎問如何是西來意師云板齒生毛問貧子來將什麼過與師云不貧云爭奈覓和尚何師云只是守貧問無邊身菩薩為什麼不見如來頂相師云如隔羅縠問諸天甘露什麼人得喫師云謝你將來問超過乾坤底人如何師云待有與麼人即報來問如何是伽藍師云三門佛殿問如何是不生不滅師云本自不生今亦無滅問如何是趙州主師云大王是問急切處請師道師云尿是小事須是老僧自去始得問如何是丈六金身師云腋不打領云學人不會師云不會請人裁問學人有疑時如何師云大宜小宜學云大疑師云大宜東北角小宜僧堂後問如何是佛向上人師下禪床上下觀瞻相云者漢如許長大截作三橛也得問什麼向上向下尼問如何是密密意師以手掐之云和尚猶有者箇在師云是你有者箇師示眾云老僧三十年前在南方火爐頭有箇無賓主話直至如今無人舉著問和尚受大王如是供養將什麼報答師云念佛云貧子也解念佛師云喚侍者將一錢與伊問如何是和尚家風師云屏風雖破骨格猶存問如何是不遷之義師云你道這野鴨子飛從東去西去問如何是西來意師云什麼處得者消息來問如何是塵中人師云布施茶鹽錢來問大耳三藏第三度覓國師不見未審國師在什麼處師云在三藏鼻孔裏問盲龜值浮木孔時如何師云不是偶然事問久居巖谷時如何師云何不隱去問如何是佛法大意師云禮拜著僧擬進話次師喚沙彌文遠文遠到師叱云適來去什麼處來問如何是自家本意師云老僧不用牛刀問久嚮趙州石橋到來只見掠彴子師云闍黎只見掠彴子不見趙州石橋云如何是石橋師云過來過來又云度驢度馬問和尚姓什麼師云常州有云甲子多少師云蘇州有上堂云纔有是非紛然失心還有答話分也無有僧出撫侍者一下云何不祇對和尚師便歸方丈後侍者請益適來僧是會不會師云坐底見立底立底見坐底問如何是道師云墻外底云不問者箇師云問什麼道云大道師云大道通長安問撥塵見佛時如何師云撥塵即不無見佛即不得問如何是無疾之身師云四大五陰問如何是闡提師云何不問菩提云如何是菩提師云只者便是闡提師有時屈指云老僧喚作拳你諸人喚作什麼僧云和尚何得將境示人師云我不將境示人若將境示闍黎即埋沒闍黎去也云爭奈者箇何師便珍重問一問一答總落天魔外道設使無言又犯他匡網如何是趙州家風師云你不解問云請和尚答話師云若據你合喫二十棒師示眾云纔有是非紛然失心還有答話分也無有僧出將沙彌打一掌便出去師便歸方丈至來日問侍者昨日者師僧在什麼處侍者云當時便去也師云三十年弄馬騎被驢子撲問與麼來底人師還接也無師云接云不與麼來底人師還接也無師云接云與麼來從師接不與麼來師如何接師云止止不須說我法妙難思鎮府大王問師尊年有幾箇齒在師云只有一箇牙大王云爭喫得物師云雖然一箇下下咬著問如何是學人珠師云高聲問僧禮拜師云不解問何不道高下即不問如何是學人珠何不與麼問僧便再問師云洎合放過者漢問二邊寂寂師如何闡揚師云今年無風波問大眾雲集合談何事師云今日拽木頭竪僧堂云莫只者箇便是接學人也無師云老僧不解雙陸不解長行問如何是真實人體師云春夏秋冬云與麼即學人難會師云你問我真實人體問如何是佛法大意師云你名什麼云某甲師云含元殿裏金谷園中問如何是七佛師師云要眠即眠要起即起問道非物外物外非道如何是物外道師便打云和尚莫打某甲已後錯打人去在師云龍蛇易辨衲子難瞞師見大王入院不起以手自拍膝云會麼大王云不會師云自小出家今已老見人無力下禪床問如何是忠言師云你娘醜陋問從上至今不忘底人如何師云不可得繫心常思念十方一切佛問如何是忠言師云喫鐵棒問如何是佛向上事師便撫掌大笑問一燈燃百千燈一燈未審從什麼處發師便趯出一隻履又云作家即不與麼問問歸根得旨隨照失宗時如何師云老僧不答者話云請和尚答話師云合與麼問如何是不思處師云快道快道問夜昇兜率晝降閻浮其中為什麼摩尼不現師云道什麼僧再問師云毗婆尸佛早留心直至如今不得妙問非思量處如何師云速道速道問如何是衣中寶師云者一問嫌什麼云者箇是問如何是寶師云與麼即衣也失却問萬里無店時如何師云禪院裏宿問狗子還有佛性也無師云家家門前通長安問覿面相呈還盡大意也無師云低口云收不得處如何師云向你道低口問如何是目前一句師云老僧不如你問出來底是什麼人師云佛菩薩問靈草未生時如何師云齅著即腦裂云不齅時如何師云如同立死漢云還許學人和合否師云人來莫向伊道問祖意與教意同別師云才出家未受戒到處問人問如何是聖師云不凡云如何是凡師云不聖云不凡不聖時如何師云好箇禪僧問兩鏡相向那箇最明師云闍黎眼皮蓋須彌山問學人近入叢林乞師指示師云蒼天蒼天問前句已往後句難明時如何師云喚作即不可云請師分師云問問問高峻難上時如何師云老僧不向高峯頂問不與萬法為侶者是什麼人師云非人問請師宗乘中道一句子師云今日無錢與長官問學人不別問請師不別答師云奇怪問三乘教外如何接人師云有此世界來日月不曾換問三處不通如何離識師云識是分外問眾機來湊未審其中事如何師云我眼本正不說其中事