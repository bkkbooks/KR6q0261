body:
  text: 寶峰雲庵真淨禪師住金陵報寧語錄三上堂今朝欲入室侍者報言參搥鐘并擊鼓分明為指南非但鐘鳴鼓響飛禽走獸草木叢林森羅萬象昨日仁上人設齋一一為諸人徹困還有知恩報恩者麼老僧亦在其間良久云欲知端的意盡在不言中下座上堂今朝二月二十五金銀琉璃握成土禪家如意自在心妙用縱橫無不是彼此男兒大丈夫勸君莫咬他人語上堂三月本不生二月何曾滅不滅與不生人心自分別分別既不生一切皆寂滅山河大地不可不寂滅如今一一現前不可不寂滅大眾還入此境界麼即今又總在何處喝一喝下座上堂今朝三月初五天地不晴久雨雲門劄意分明衲僧如何伸吐驀拈拄杖云雲門大師來也劄久雨不晴臨時變化不涉途程遂擲下云切忌隨他拄杖子去下座上堂今日三月十朝衲僧知見雄豪步步直須有主擬議打折驢腰上堂先上座煑栗黃粥供養禪眾喫了總飽地掛起鉢盂知恩方解報恩三十年後不得辜負趙州老直饒當下見得倜儻分明不隨古人言語所轉各證無生法忍得大解脫須知三年一閏九月重陽是何宗旨喝一喝下座上堂今朝九月初五佛法未甞間阻開單心印發光何況上來下去大眾了然生死不相干快樂自在喝一喝下座上堂今朝九月初十衲僧門風壁立不是宗乘強為欲破禪家法執遂拈拄杖云若喚作拄杖子翳汝眼睛不喚作拄杖子避色逃聲乃擲下云還我師子兒來喝一喝下座上堂今朝九月十五月色十分顯露人心纔有是非便被浮雲點污喝一喝下座上堂今朝九月二十大道本無拘執放開把住自由還要人人悟入喝一喝下座因施主上堂佛以一音演說法眾生隨類各得解僧俗男女平等心一一皆同證法界上堂今朝十月初十滴水滴凍禪眾上來長老說夢忽然夢裏覺來顯發人人佛之妙用乃垂一足云不是佛之妙用又喝一喝云不是佛之妙用大眾上來下去不是佛之妙用復召云大眾分明是夢師一日到法座前乃提起數珠復顧視云大眾數珠一百八便歸方丈上堂茲日夏首眾僧結制之辰泐潭山比丘克文與清淨大眾踞菩薩乘修寂滅行以大圓覺為我伽藍身心安居平等本際涅槃自性無繫屬故今我敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故離諸垢染清淨梵行若能如是所謂如蓮華不著水心清淨超於彼上堂清大師則上人數年在浙中緣化石筧供具等比者迴山不勝欣喜然於道人分上一切所作而無作意既無作意則是無功用大解脫法門所謂無為而無所不為信手拈來不勞心力種種聖像種種經卷種種莊嚴種種供具種種佛事驀拈拄杖云總在拄杖頭上東涌西沒南涌北沒撒開也堂上庫下佛殿僧堂及諸寮舍種種莊嚴種種清淨法喜禪悅遂擲下云撲亦撲不破蕩亦蕩不散來無所從去無所至無成無壞東海鯉魚打一棒雨似盆傾若信不及華藏世界所有塵一一塵中現法界寶光化佛如雲集此是如來剎自在却還清公大師伏惟珍重上堂今朝四月二十五為報禪家莫莽鹵淥水青山在目前一一分明佛淨土擬心早不淨了也不擬心又作麼生歸堂喫茶上堂倐忽又是五月時節交參總別同異成壞重重一一融通皎潔驀拈拄杖云一切時分總在拄杖頭上不見有一塵一眾生不成佛者且道泐潭山一眾有不成佛者也無乃擲下云是成是壞喝一喝下座上堂今朝五月復端午隨眾生心解分布糉子雖然應所知要須一一知來處且道從什麼處來驀拈拄杖云若知拄杖子來處即知一切法來處所以道隨眾生心應所知量循業發現只如大眾從甚麼處發現一一分明在目前若知發現不妨奇特若也不知何名出家遂擲下云只者末後一著也大難會喝一喝下座上堂今朝五月半為眾決定斷普請共成佛不須怪老漢下座出外歸上堂古人所謂有物流動人之常情情若不生則老僧出入動靜無去來之作自然人事周徧又何妨遊戲神通藏法喜禪悅樂則與大眾同住如來寂滅海究竟覺喝一喝下座上堂今朝六月又初一為報諸人莫自屈日用無非大智門摩訶般若波羅蜜上堂般若靈智二親而歸佛國沙門誠信設一飯以飽禪僧因緣既在功德何窮驀拈拄杖云所謂靈源明皎潔枝派闇流注乃擲下云參同不二心歸堂喫茶去喝一喝下座上堂今朝六月二十却歎時光催急看看解夏到來拂拭拄杖與笠無非妙用神通盡是心心證入不須向外馳求拋却自家城邑上堂今朝又是七月一夏去秋來自相失各悟自己性無生人人當下成佛訖大眾莫道我不受者惡水潑如今叢林多作此解上堂舉古德問僧云是什麼聲云虵蛟蝦䗫聲德云將謂眾生苦更有苦眾生又有古德問僧曰是什麼聲曰雨滴芭蕉聲德曰莫謗如來正法輪師云有一轉語可以安定國主聖臣賢有一轉語國清才子貴家富小兒嬌若是辨得出許你於十字路頭不畜一粒米不種一莖菜接待往來真善知識若辨不出炙脂帽子鶻臭布衫且與麼東過西過喝一喝下座上堂但以禪門了却心頓入無生知見力驀拈拄杖云不是無生𡎺著你鼻孔東海鯉魚打一棒雨似盆傾不是知見誰不明了誰不具足阿誰無分不是頓入閻老子呵呵大笑云泐潭山裏一眾若於者裏薦得去盡作雲門烜赫兒孫若薦不得總屬閻羅老子所管遂擲下拄杖下座上堂昨日有人從袁州來却得洪州信說道長安米價高福建路茘枝熟前三三後三三泐潭山裏五日一參下座上堂今朝又是九月一暑往寒來春復秋須信人人一段事不同時節逐遷流既是人人一段事為什麼有信者有不信者不見世尊云一雨所潤三草二木上堂舉古人云如珠在盤不撥而自轉只如大眾開單展鉢拈匙把筯一切時中所作所為又何假人撥而後轉乃至雲門糊餅趙州栢樹德山棒臨濟喝又何假人撥而後應自是你諸人不悟後錯會又干他糊餅栢樹棒喝甚麼事豈不見六祖大師云汝當一念自知非自己靈光常顯現上堂舉雲門大師云盡大地是箇解脫門枉作佛法會却何不見山是山見水是水師云大小雲門錯下名言好與三十棒如今既不喚作山不喚作水又喚作什麼若有明眼衲僧辨得出三十棒却還泐潭若辨不出三十棒分付闍棃喝一喝下座上堂舉祖師云正說知見時知見即是心當心即知見知見即如今師云若道是教外別傳又說道即如今況此一心知見為復是諸人即今一心知見為復是諸佛知見若道是諸人即今一心知見有底又不肯說心說性若道是諸佛知見又有何差別試為泐潭定當看若定當不出虗消信施上堂今朝十一月節候又嚴寒倐忽光陰過死生君自看是日已過命亦隨減如少水魚斯有何樂須知人人赤肉團上有一物能隨萬事變不逐四時凋且道是什麼喝一喝下座上堂舉僧問雲門如何是學人自己門云遊山翫水師云且道雲門答這僧不答這僧莫謗雲門好若道不答這僧什麼處是不答處眾中多是師承學解承言者喪縱不在文字語言上又打在無事裏所謂滯句者迷若識得雲門大師即識得自己可見不見一法即如來方得名為觀自在上堂祖師西來教外別傳所謂如牛駕車車若不行打車即是打牛即是大眾人各有一頭水牯牛駕箇車子即是毛色有異心相不同有赤者白者青者黃者黑者如今莫待下痛鞭各自拽箇車子歸堂喫茶去下座元旦日上堂問話畢師云一問一答皆是當人各各神通光明清淨妙心一一從自己運將出來烜赫現前自是眾生迷情不覺不知改旦新元伏惟知事首座大眾尊候萬福良久云昨日今朝事不同人人依舊主人翁雖然平等添新歲夢覺元來總是空是空却不空二十空門元不著一性如來體共同喝一喝下座供養羅漢上堂三界唯心萬法唯識未有一法不從心之所生心若滅也一切法滅所以過去心不可得未來心不可得現在心不可得三際既不有一心何所生大眾但盡浮想盡證阿羅漢浮想不盡總屬流浪生死喝一喝下座上堂古人云仁者見之謂之仁智者見之謂之智雲門云一切智通無障礙拈起扇子云釋迦老子來也又拈起扇子云𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾好一切智智清淨無二無二分無別無斷故佛手開驢脚步東西生緣別處喝一喝下座上堂今日供養羅漢夜來四方高人諷誦妙法蓮華經安樂行品一遍大眾作麼生是安樂行擬心早不安樂了也乃喝一喝云豈不是安樂行如何是透法身北斗裏藏身豈不是安樂行如何是祖師西來意庭前栢樹子豈不是安樂行如何是超佛越祖之談糊餅豈不是安樂行以至僧俗大眾一一清淨光明住持豈不是安樂行乃至一佛二菩薩一一羅漢一一辟支佛無不清淨實相住持所謂安樂行也大眾唯有髻中寶珠不妄與之雖然不與亦人人具足十二時中光明烜赫阿誰欠少還會麼歸堂喫茶去喝一喝下座上堂衲僧門下有賓有主有時賓也和其光同其塵四五百條花柳巷二三千處管絃樓有時主也奪賊馬殺乎賊披毛戴角入來優鉢羅花火裏開大眾只如賓主未分時如何今朝三月十五章江長老來上堂舉僧問雲門如何是諸佛出身處門云東山水上行泐潭即不然若有人問如何是諸佛出身處但向伊道遠離洪井深入寶山大眾且道是同是別忽有箇衲僧出來云這裏是什麼所在說同說別也難得須是實到這田地始得若未到且不得草草上堂舉僧問雲門如何是學人自己門云遊山翫水而今多作自己會承言者喪既不作自己會又作麼生會滯句者迷德山入門便棒其僧擬議山云不得作棒會既不作棒會又作麼生會臨濟一喝不作喝用既是一喝何故不作一喝用宗旨如何其宗旨者諸佛諸祖教外別傳不屬文字言句其文字言句是心外戲論之法既不屬戲論直須自悟若自悟也事同一家苟不然者彼我途轍喝一喝下座上堂今朝四月二十五栽秧漸漸徧南畆半飢半飽淡飯羮泥裏雨裏可憐許唯有高僧總不知各自歸堂喫茶去上堂衲僧門下有春有冬有秋有夏有陰有陽有晝有夜天地蓋載日月運行成就四時長養萬物善知識者觀機設教應病與藥成就眾生種種方便亦復如是然則無智人前莫說打你頭破額裂上堂釋迦老子道一切眾生生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉大眾要得生死不相續妄想心滅但直下識取自己常住真心性淨明體則自然生死不相關共生慶快所謂一得永得若信不及不聽受則沉在業識無明海喝一喝下座供養羅漢上堂大眾一切法即諸佛法一切心即諸佛心一切語即諸佛語一切道即羅漢道法也心也語也道也且道是一也是二也是同別也二由一有一亦莫守一心不生萬法無咎上堂二月復三月一一應時節柳絲弄春風梨花白如雪門門法界門法法離言說驀拈拄杖云欲知交參處杖頭諸佛剎乃擲下云不妨拋來擲去總在諸人眼睛裏上堂今朝三月初五普天之下好雨非但百姓歌謠老僧不勝手舞何也豈不見乾闥婆王奏樂迦葉起舞直得須彌岌嶪海水騰波驀拈拄杖云大眾一波纔動眾波隨萬法皆從一法歸衲子大家同會取七顛八倒總光輝擲下拄杖下座上堂今朝又是三月半離念身心登彼岸泯其所以歸自然兩箇五百作一貫喝一喝下座上堂舉世尊問波斯匿王曰汝以何相觀佛王曰觀身實相觀佛亦然觀佛實相觀法亦然法界眾生界根根塵塵一切清淨大眾欲識如來大寂滅汝但盡攀緣喝一喝下座閉馬祖塔上堂祖宗門下總有關捩子應機接物有開有閉苟開而不能閉喪家失計閉而不能開誰辨往來或開而能閉也不妨遊戲閉而能開也重重善財或不開不閉時又作麼生大眾僧堂裏隨例軟餅頭橫咬竪咬喝一喝下座上堂心生種種法生心滅種種法滅喚什麼作釋迦老子驀拈起拄杖云假名三十二八十也空聲一切人間總強名卓拄杖下座上堂云天心得自在盛熱復清凉衲僧如薦得珍重法中王喝一喝下座上堂佛言捨家出家難學道見性難元來捨家出家難學道見性復難如今學道者如恒河沙見性者未有一二佛又言性成無上道永嘉云自性天真佛雲門云如今諸方多是說心說性教裏少哩師云雲門又不許說心說性佛言性成無上道且道佛說底是雲門說底是大眾差之毫釐謬以千里上堂知事首座大眾出入相拋歸來依舊南山對北山忙者自忙閑自閑閑忙彼此不相關依舊水雲間上堂舉僧問雲門如何是佛法大意門云春來草自青又僧問首山如何是佛法大意山云楚王城畔汝水東流忽有人問泐潭如何是佛法大意向伊道久雨不晴此三轉語有一轉語可以作諸佛如來之法藥治一切眾生病有一轉語可以作諸祖之秘關菩薩直截之要道有一轉語可以作衲僧解脫大道場是禪者放身命處大眾若擇得出如久客歸家若擇不出若行人失路喝一喝下座上堂諸佛如來說一切眾生身中有三大何者為三體大相大用大又古德云十方無壁落四面亦無門露躶躶赤灑灑沒可把既沒可把喚什麼作三大莫有人擇得出麼若擇得出不妨好手若擇不出眾生日用而不知喝一喝下座上堂大眾好雨點點不落別處且道落在什麼處莫是落在法堂前麼莫是落在田野中麼莫是落在山林間若是通達底人神通妙用無可不可有一般人更不求妙悟但作平常一路實頭見解又喚做不走作人此之見解未出常流若妙悟明眼底人他一一知來處一一知落處更不顢頇大眾且道落在什麼處久參先德一舉便了後進初機更宜子細因雪上堂舉龐居士辭藥山因緣師云全禪客當斷不斷返遭其亂且道全禪客當時合下得什麼語免被龐公折挫如今莫有扶持佛事者麼出來開發大眾眼目亦表自己參學身心如無老僧為你說破今日臘月初十山門街坊丐者入寮打疊忽有人問諸丐者已在寮中時又作麼生良久乃喝云相逢不下馬各自有前程上堂今朝又是三月一大道何曾有得失桃花處處靈雲心却笑玄沙弄不出只這弄不出罕遇知音上堂今朝七月秋初一時節循環夏又畢衲僧活計拄杖頭去兮住兮無固必去住自由且道祖意是同是別只如古人云雞寒上樹鴨寒下水意旨如何喝一喝下座上堂雲門云久雨不晴劄大眾且道雲門一劄與德山棒臨濟喝是同是別若道別祖宗門下豈有兩般若道同爭柰德山臨濟雲門家風有異衲僧到這裏如何剖判若剖判得出可謂無邊剎境自他不隔於毫端十世古今始終不離於一劄今朝三月二十五各自歸堂喫茶去上堂舉印宗法師問盧行者云仁者在黃梅有何言教旨趣傳授盧曰彼指授者唯論見性成佛不說禪定解脫無念無為宗云何故不說禪定解脫無念無為盧曰況是二法不是佛法不二之法宗云如何是不二之法盧曰如仁者講涅槃經明見佛性是名佛法不二之法師云彼時小巧禪道早是中半了也如今叢林多是唯論禪定解脫無念無為且道六祖底是如今底是分即是不分即是若分去有違有順有是有非若不分又不辨邪正埋沒我宗乘譬如世間道路有直有迃有險有善其行路者可行即行可止即止大眾還識泐潭老僧麼良久云將此深心奉塵剎是則名為報佛恩喝一喝下座師首座時在仰山結夏小參云莫有真師子兒試出來對眾哮吼看時有僧出禮拜師云不知是不是是即也大奇僧問鐘聲纔動大眾雲臻禁足已臨如何指示師云大家在這裏進云莫便是和尚為人處也無師云多是向言句中轉却進云一堂風冷淡千古意分明師云且莫亂道僧問承古有言眾生日用而不知未審不知箇什麼師云道進云忽然知後如何師云十萬八千僧提起坐具云爭柰者箇何師便喝僧云好一喝未有斷在師云喫棒且待別時復云更有問話者麼良久云洎合放過乃喝復舉拂子云耶耶盡十方世界若凡若聖若僧若俗若草若木盡向拂子下成佛作祖無前無後一時解脫還有不解脫者麼設有命若懸絲又撫掌云知音者少所以此箇事論實不論虗參須實參悟須實悟若纖毫不盡總落魔界豈不見古人道平地上死人無數過得荊棘林是好手如今人多是得箇身心寂滅前後際斷一念萬年去休去歇去似古廟裏香爐去冷湫湫地去便為究竟殊不知却被此勝妙境界障蔽自己正知見不能現前神通光明不得發露或又執箇一切平常心是道以為極則天是天地是地山是山水是水僧是僧俗是俗大盡三十日小盡二十九此依草附木不知不覺一向迷將去忽然問他我手何似佛手便道是和尚手我脚何似驢脚便道是和尚脚人人盡有生緣處那箇是上座生緣處便道某是某州人是何言歟且莫錯會好凡百施為須要平常一路子以為穩當定將去合將去更不敢別移一步怕墮坑落塹長時一似雙盲底人行路一條拄杖子寸步拋不得緊把著憑將去步步依倚一日若道眼豁開頓覺前非拋却杖子撒開兩手十方蕩蕩七縱八橫東西南北無可不可豈可一向倚他門戶傍他行脚有甚快活自己畢竟如何不見雲門大師道而今天下老和尚多是師承學解路布葛藤印板上打來模子裏脫出當人若是明去何不一切臨時又不見臨濟大師云我者裏是活祖師西來意把來便用立處皆真他不說古又如何今又如何者語得那語不得那裏是虗者裏是實你與我拈出絲毫許實底道理來看此蓋當人眼不開自無見處一向承虗接響百般忌諱自纏自縛直饒與麼說當下忽然見得倜儻分明去也是棺木裏瞪眼如今還有無師智自然智不與萬法為侶者烜赫底丈夫漢䶥䶥齖齖千變萬化見我恁麼胡言漢語便好近前驀口摑拽下椅子擲向三門外喝散大眾豈不快哉還有麼良久云若無且看老僧騎案山跳入你諸人眼睛裏七顛八倒呵佛罵祖去也喝一喝下座師到崇勝眾請小參僧問未明心地印難過趙州關如何是趙州關師云過進云莫便是和尚為人處也無師云你作麼生會僧作一圓相師云且喜勿交涉進云也不得壓良為賤師便喝復云更有問話者麼良久無人出師云不因一事不長一智說事亦不妨說理亦無礙為報學道人莫作理事會阿呵呵欲求長須入水是非中聲色裏放一倒扶一起是何宗囉囉哩驀拈拄杖畫一畫云適來許多葛藤向甚麼處去也復舉拄杖云拄杖子變作觀世音菩薩以甘露水灌入你諸人頂門裏還有眼開心悟神清氣爽底麼乃喝云莫妄想活落落須彌山把便撲擲下拄杖云耶耶三十三天不知不覺帝釋居善法堂為諸天說法勸喻云汝等諸仙盡是閻浮提歸依佛歸依法歸依僧不殺不盜不邪婬不妄語不飲酒不食肉布施持戒廣作善業來生此間受種種勝妙快樂汝等諸仙不得一向迷於妙樂須知無常念念不停念念遷謝速疾速疾便是到來相將墜墮汝等當求不來不去不生不滅究竟解脫清淨涅槃之樂師乃噓噓今日為眾竭力禍出私門笑破衲僧口然雖如是也不得草草乃撫膝下座師到九峯山眾請小參僧問古人道前三三後三三前三三即不問如何是後三三師云的進云恁麼則進前三步也師云關進云大眾證明真善知識師云杜撰衲僧復示大眾此事若全提也便須荒却院散却眾拳倒須彌山踏翻四大海三世諸佛諸代祖師天下老和尚十二分教填其溝塞其壑雖然如此盡法無民且向世諦流布建化門中即不可乃拈拂子云三世諸佛諸代祖師天下老和尚十二分教總在拂子頭上分開也懷州牛喫禾益州馬腹脹天下覓醫人灸豬左膊上以拂子左邊敲云太虗為鼓須彌作槌遂喝云鼕鼕閙市裏識取天子將錯就錯以拂子右邊敲云大地作床長天為幕蹶倒打睡百草頭上薦取祖師病鳥栖蘆噫九年空面壁撫掌不回頭笑煞傍觀如今莫有傍觀底麼良久乃喝云洎合停囚長智又舉拂子云穿却你鼻孔却向脚跟下走出東西南北土曠人稀天上天下唯我獨尊阿喇喇遂擲下拂子云是什麼下座師到大愚眾請小參師云二三月來天氣和暖萬物生長百鳥和鳴桃花紅李花白到處園林翠連野色誰家年少賞勝踏青唯有古寺老僧坐對庭栢遂以拂子敲禪床云敲枷打鎻出釘拔楔大有癡頑怕吞熱鐵醍醐上味候伊時節趙州石橋循途守轍百丈野狐為君一決狐疑淨盡眼光電掣南北東西有誰辨別還有辨別底麼試出來撫掌呵呵大笑打箇筋斗供養大眾一者慶快平生二與天下人作標牓有麼有麼祇為情生智隔想變體殊我者裏不免拆東籬補西壁去也以拂子畫云十方世界百雜碎何處更有山河大地耶看看四大海水在諸人面前滔滔地氣象萬端魚龍變化還見麼見則不無忽然有箇巡海夜叉出來道禪和子如何是脫生死底句向他道什麼即得若不向他道被他一吉橑棒打殺餧魚鼈喫當此之際以何為身以何為心以何為人以何為我以何為佛以何為祖以何為禪以何為道會麼良久云五更侵早起更有夜行人乃以拂子擊禪床下座
