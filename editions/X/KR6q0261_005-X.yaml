body:
  text: 臨濟禪師語錄之餘師問洛浦云從上來一人行棒一人行喝阿那箇親洛浦云總不親師曰親處作麼生洛浦便喝師便打一日大覺到參師舉起拂子大覺敷坐具師擲下拂子大覺收坐具入僧堂眾僧云這僧莫是和尚親故不禮拜又不喫棒師聞令喚覺覺出師云大眾道汝未參長老覺云不審便自歸眾麻谷到參敷坐具問十二面觀音阿那面正師下繩牀一手收坐具一手搊麻谷云十二面觀音向什麼處去也麻谷轉身擬坐繩牀師拈拄杖打麻谷接却相捉入方丈師問僧有時一喝如金剛王寶劒有時一喝如踞地金毛師子有時一喝如探竿影草有時一喝不作一喝用汝作麼生會僧擬議師便喝師問一尼善來惡來尼便喝師拈棒云更道更道尼又喝師便打龍牙問如何是祖師西來意師云與我過禪板來牙便過禪板與師師接得便打牙云打即任打要且無祖師意牙後到翠微問如何是祖師西來意微云與我過蒲團來牙便過蒲團與翠微翠微接得便打牙云打即任打要且無祖師意牙住院後有僧入室請益云和尚行脚時參二尊宿因緣還肯佗也無牙云肯即深肯要且無祖師意徑山有五百眾少人參請黃檗令師到徑山乃謂師曰汝到彼作麼生師云某甲到彼自有方便師到徑山裝腰上法堂見徑山徑山方舉頭師便喝徑山擬開口師拂袖便行尋有僧問徑山這僧適來有什麼言句便喝和尚徑山云這僧從黃檗會裏來你要知麼自問取佗徑山五百眾太半分散普化一日於街市中就人乞直裰人皆與之普化俱不要師令院主買棺一具普化歸來師云我與汝做得箇直裰了也普化便自擔去繞街市呌云臨濟與我做直裰了也我往東門遷化去市人競隨看之普化云我今日未來日往南門遷化去如是三日人皆不信至第四日無人隨看獨出城外自入棺內倩路行人釘之即時傳布市人競往開棺乃見全身脫去祇聞空中鈴響隱隱而去行錄師初在黃檗會下行業純一首座乃歎曰雖是後生與眾有異遂問上座在此多少時師云三年首座云曾參問也無師云不曾參問不知問箇什麼首座云汝何不去問堂頭和尚如何是佛法的的大意師便去問聲未絕黃檗便打師下來首座云問話作麼生師云某甲問聲未絕和尚便打某甲不會首座云但更去問師又去問黃檗又打如是三度發問三度被打師來白首座云幸蒙慈悲令某甲問訊和尚三度發問三度被打自恨障緣不領深旨今且辭去首座云汝若去時須辭和尚去師禮拜退首座先到和尚處云問話底後生甚是如法若來辭時方便接佗向後穿鑿成一株大樹與天下人作陰凉去在師去辭黃檗檗云不得往別處去汝向高安灘頭大愚處去必為汝說師到大愚大愚問什麼處來師云黃檗處來大愚云黃檗有何言句師云某甲三度問佛法的的大意三度被打不知某甲有過無過大愚云黃檗與麼老婆心切為汝得徹困更來這裏問有過無過師於言下大悟云元來黃檗佛法無多子大愚搊住云這尿牀鬼子適來道有過無過如今却道黃檗佛法無多子你見箇什麼道理速道速道師於大愚脅下築三拳大愚托開云汝師黃檗非干我事師辭大愚却回黃檗黃檗見來便問這漢來來去去有什麼了期師云祇為老婆心切便人事了侍立黃檗問什麼處去來師去昨奉慈旨令參大愚去來黃檗云大愚有何言句師遂舉前話黃檗云作麼生得這漢來待痛與一頓師云說什麼待來即今便喫隨後便掌黃檗云這風顛漢却來這裏捋虎鬚師便喝黃檗云侍者引這風顛漢參堂去後溈山舉此話問仰山臨濟當時得大愚力得黃檗力仰山云非但騎虎頭亦解抵虎尾師栽松次黃檗問深山裏栽許多作什麼師云一與山門作境致二與後人作標榜道了將钁頭打地三下黃檗云雖然如是子已喫吾三十棒了也師又以钁頭打地三下作噓噓聲黃檗云吾宗到汝大興於世後溈山舉此語問仰山黃檗當時祇囑臨濟一人更有人在仰山云有祇是年代深遠不欲舉似和尚溈山云雖然如是吾亦要知汝但舉看仰山云一人指南吳越令行遇大風即止讖風穴和尚也師侍立德山次山云今日困師云這老漢𥧌語作什麼山便打師掀倒繩牀山便休師普請鋤地次見黃檗來拄钁而立黃檗云這漢困那師云钁也未舉困箇什麼黃檗便打師接住棒一送送倒黃檗喚維那維那扶起我維那近前扶云和尚爭容得這風顛漢無禮黃檗纔起便打維那師钁地云諸方火葬我這裏一時活埋後溈山問仰山黃檗打維那意作麼生仰山云正賊走却邏蹤人喫棒師一日在僧堂前坐見黃檗來便閉却目黃檗乃作怖勢便歸方丈師隨至方丈禮謝首座在黃檗處侍立黃檗云此僧雖是後生却知有此事首座云老和尚脚跟不點地却證據箇後生黃檗自於口上打一摑首座云知即得師見普化乃云我在南方馳書到溈山時知你先在此住待我來及我來得汝佐贊我今欲建立黃檗宗旨汝切須為我成褫普化珍重下去克符後至師亦如是道符亦珍重下去三日後普化却上問訊云和尚前日道甚麼師拈棒便打下又三日克符亦上問訊乃問和尚前日打普化作什麼師亦拈棒打下師會下有同學二人相問離却中下二機請兄道一句子一人云擬問即失一人云恁麼則禮拜老兄去也前人云賊師聞得陞堂云要會臨濟賓主句問取堂中二禪客便下座有僧來問禮拜則是不禮拜則是師便喝僧作禮師云這賊僧亦云這賊便出去師云莫道無事好首座侍立師回顧云還有過也無座云有師云賓家有過主家有過座云二俱有過師云過在甚麼處座便出去師云莫道無事好後有僧舉似南泉泉云官馬相踏師問僧什麼處來僧便喝師便揖坐僧擬議師便打師見僧來便竪起拂子僧禮拜師便打又見僧來亦竪起拂子僧不顧師亦打示眾云參學之人大須子細如賓主相見便有言論往來或應物現形或全體作用或把機權喜怒或現半身或乘師子或乘象王如有真正學人便喝先拈出一箇膠盆子善知識不辨是境便上他境上作模作樣便被學人又喝前人不肯放下此是膏肓之病不堪醫治喚作賓看主或是善知識不拈出物祇隨學人問處即奪學人被奪抵死不肯放此是主看賓或有學人應一箇清淨境出善知識前知識辨得是境把得拋向坑裏學人言大好善知識知識即云咄哉不識好惡學人便禮拜此喚作主看主或有學人披枷帶鎻出善知識前知識更與安一重枷鎻學人歡喜彼此不辨喚作賓看賓大德山僧所舉皆是辨魔揀異知其邪正師到明化化問來來去去作什麼師云祇徒踏破草鞋化云畢竟作麼生師云老漢話頭也不識又往鳳林路逢一婆婆問甚處去師云鳳林去婆云恰值鳳林不在師云甚處去婆便行師乃喚婆婆回頭師便行師陞堂有僧出師便喝僧亦喝便禮拜師便打問僧甚處來曰定州來師拈棒僧擬議師便打僧不肯師曰已後遇明眼人去在僧後參三聖纔舉前話三聖便打僧擬議聖又打師應機多用喝會下參徒亦學師喝師曰汝等總學我喝我今問汝有一人從東堂出一人從西堂出兩人齊喝一聲這裏分得賓主麼汝且作麼生分若分不得已後不得學老僧喝示眾云我有時先照後用有時先用後照有時照用同時有時照用不同時先照後用有人在先用後照有法在照用同時駈耕夫之牛奪飢人之食敲骨取髓痛下鍼錐照用不同時有問有答立賓立主合水和泥應機接物若是過量人向未舉已前撩起便行猶較些子師見僧來舉起拂子僧禮拜師便打又有僧來師亦舉拂子僧不顧師亦打又有僧來參師舉拂子僧曰謝和尚指示師亦打師在堂中睡黃檗下來見以拄杖打板頭一下師舉頭見是黃檗却睡黃檗又打板頭一下却往上間見首座坐禪乃云下間後生却坐禪汝這裏妄想作什麼首座云這老漢作什麼黃檗打板頭一下便出去後溈山問仰山黃檗入僧堂意作麼生仰山云兩彩一賽一日普請次師在後行黃檗回頭見師空手乃問钁頭在什麼處師云有一人將去了也黃檗云近前來共汝商量箇事師便近前黃檗豎起钁頭云祇這箇天下人拈掇不起師就手掣得豎起云為什麼却在某甲手裏黃檗云今日大有人普請便歸院後溈山問仰山钁頭在黃檗手裏為什麼却被臨濟奪却仰山云賊是小人智過君子師為黃檗馳書去溈山時仰山作知客接得書便問這箇是黃檗底那箇是專使底師便掌仰山約住云老兄知是般事便休同去見溈山溈山便問黃檗師兄多少眾師云七百眾溈山云什麼人為導首師云適來已達書了也師却問溈山和尚此間多少眾溈山云一千五百眾師云太多生溈山云黃檗師兄亦不少師辭溈山仰山送出云汝向後北去有箇住處師云豈有與麼事仰山云但去已後有一人佐輔老兄在此人祇是有頭無尾有始無終師後到鎮州普化已在彼中師出世普化佐贊於師師住未久普化全身脫去師因半夏上黃檗見和尚看經師云我將謂是箇人元來是揞黑豆老和尚住數日乃辭去黃檗云汝破夏來不終夏去師云某甲暫來禮拜和尚黃檗遂打趂令去師行數里疑比事却回終夏師一日辭黃檗檗問什麼處去師云不是河南便歸河北黃檗便打師約住與一掌黃檗大笑乃喚侍者將百丈先師禪板机案來師云侍者將火來黃檗云雖然如是汝但將去已後坐却天下人舌頭去在後溈山問仰山臨濟莫辜負佗黃檗也無仰山云不然溈山云子又作麼生仰山云知恩方解報恩溈山云從上古人還有相似底也無仰山云有祇是年代深遠不欲舉似和尚溈山云雖然如是吾亦要知子但舉看仰山云祇如楞嚴會上阿難讚佛云將此深心奉塵剎是則名為報佛恩豈不是報恩之事溈山云如是如是見與師齊減師半德見過於師方堪傳授師到達磨塔頭塔主云長老先禮佛先禮祖師云佛祖俱不禮塔主云佛祖與長老是什麼冤家師便拂袖而出師行脚時到龍光光上堂師出問云不展鋒鋩如何得勝光據坐師云大善知識豈無方便光瞪目云嗄師以手指云這老漢今日敗闕也到三峰平和尚問曰什麼處來師云黃檗來平云黃檗有何言句師云金牛昨夜遭塗炭直至如今不見蹤平云金風吹玉管那箇是知音師云直透萬重關不住清霄內平云子這一問太高生師云龍生金鳳子衝破碧琉璃平云且坐喫茶又問近離甚處師云龍光平云龍光近日如何師便出去到大慈慈在方丈內坐師問端居丈室時如何慈云寒松一色千年別野老拈花萬國春師云今古永超圓智體三山鏁斷萬重關慈便喝師亦喝慈云作麼師拂袖便出到襄州華嚴嚴倚拄杖作睡勢師云老和尚瞌睡作麼嚴云作家禪客宛爾不同師云侍者點荼來與和尚喫嚴乃喚維那第三位安排這上座到翠峯峯問甚處來師云黃檗來峯云黃檗有何言句指示於人師云黃檗無言句峯云為什麼無師云設有亦無舉處峯云但舉看師云一箭過西天到象田師問不凡不聖請師速道田云老僧祇與麼師便喝云許多禿子在這裏覔什麼椀到鳳林林問有事相借問得麼師云何得剜肉作瘡林云海月澄無影遊魚獨自迷師云海月既無影遊魚何得迷林云觀風知浪起翫水野帆飄師云孤輪獨照江山靜自笑一聲天地驚林云任將三寸輝天地一句臨機試道看師云路逢劒客須呈劒不是詩人莫獻詩鳳林便休師乃有頌大道絕同任向西東石火莫及電光罔通溈山問仰山石火莫及電光罔通從上諸聖將什麼為人仰山云和尚意作麼生溈山云但有言說都無實義仰山云不然溈山云子又作麼生仰山云官不容針私通車馬到金牛牛見師來橫按拄杖當門踞坐師以手敲拄杖三下却歸堂中第一位坐牛下來見乃問夫賓主相見各具威儀上座從何而來太無禮生師云老和尚道什麼牛擬開口師便打牛作倒勢師又打牛云今日不著便溈山問仰山此二尊宿還有勝負也無仰山云勝即總勝負即總負師臨遷化時據坐云吾滅後不得滅却吾正法眼藏三聖出云爭敢滅却和尚正法眼藏師云已後有人問你向他道什麼三聖便喝師云誰知吾正法眼藏向這瞎驢邊滅却言訖端然示寂興化禪師語錄南嶽下六世嗣臨濟師諱存獎初謁臨濟濟令師充侍者濟問新到甚處來云鑾城濟云有事相借問得麼云新戒不會濟云打破大唐國覓箇不會人難得參堂去師問適來新到是成褫伊耶濟云我誰管你成褫不成褫師云和尚只會將死就地彈不解將一轉語葢覆却濟云你又作麼生師云請和尚作新到濟遂云新戒不會師云却是老僧罪過濟云你語藏鋒師擬議濟便打至晚濟謂師云我今日問新到是將死就地彈就窠裡打及你出得語又喝起向青雲裡打師云草賊大敗濟又打師開堂日拈香云此一炷香本為三聖師兄三聖為我太孤便合承嗣大覺大覺為我太賒我於三聖處會得賓主句若不遇大覺師兄洎乎誤却我平生我於大覺處喫棒見得臨濟先師在黃檗處喫棒底道理此一炷香供養我臨濟先師示眾云今日不問如何若何便請單刀直入興化與你證明時有旻德長老出作禮起便喝師亦喝德又喝師又喝德作禮歸眾師云適來若是別人三十棒一棒也不較何故為他旻德長老會一喝不作一喝用師入堂見首座乃云我見你了也座便喝師打露柱一下便出去首座隨後上方丈云適來觸忤和尚便作禮師就地打一棒座無語師見同參來纔上法堂師便喝僧亦喝行三兩步師又喝僧亦喝須臾近前師拈棒僧又喝師云你看這瞎漢猶作主在僧擬議師便打直打下法堂時有僧問這僧有甚觸忤和尚處師云是伊適來也有權也有實也有照也有用及乎我將手向伊面前橫兩遭便去不得似這般瞎漢不打更待何時僧問四方八面來時如何師云打中間底僧作禮師云興化今日赴箇村齋中路遇一陣卒風暴雨却去古廟裡避得過僧問多子塔前共談何事師云一人傳虗萬人傳實師舉三聖僧問如何是祖師西來意三聖云臭肉來蠅師云興化即不然破脊驢上足蒼蠅上堂云我聞三聖道我逢人即出出即不為人興化即不然我逢人即不出出即便為人下座師巡堂次埀語云我有一隻聖箭遇作家即分付至下間有一道者云便請師云你喚什麼作聖箭道者把衲衣便拂師接住云祇者箇別更有在道者擬議師便打師到雲居問權借一問以為影草時如何雲居道不得師三度舉話頭雲居無語師云情知和尚道不得且禮三拜雲居一日上堂云我二十年前興化問我當時機思遲鈍道不得為他致得問頭奇特不敢辜他如今祇消一箇何必後有僧舉似師師云二十年祇道得箇何必興化即不然不消一箇不必後三聖拈云二十年道得底是雲居如今商量猶較興化半月程師見僧來云你未恁麼來山僧早行了也僧便喝師云據令而行僧又喝師云作家僧又喝師便打問王程有限時如何師云日馳五百同光帝駕幸河北回至魏府行宮常坐朝僧錄名員來朝後帝遂問左右此間莫有德人否近臣奏曰適來僧錄名員皆是德人帝曰此是名利之德莫有道德之人否近臣奏曰此間有興化長老甚是德人帝乃召之師來朝見帝賜坐茶湯畢帝遂問朕收下中原獲得一寶未曾有人酧價師云如何是陛下中原之寶帝以手舒幞頭脚師云君王之寶誰敢酧價聖顏大悅賜紫衣師號師皆不受宣馬一疋與師乘騎馬忽驚墜師遂傷足帝聞宣藥救療師喚院主院主至侍立次師云與我作箇木柺子院主做了將來師接得遶院行問僧云汝等還識老僧麼僧云和尚爭得不識師云癘脚法師說得行不得又至法堂上令維那聲鐘上堂師如前埀示眾皆無對師擲下柺子端然而逝勅諡廣濟大師墖曰通寂臨濟慧照禪師塔記師諱義玄曹州南華人也俗姓邢氏幼而頴異長以孝聞及落髮受具居於講肆精究毗尼愽賾經論俄而歎曰此濟世之醫方也非教外別傳之旨即更衣游方首參黃檗次謁大愚其機緣語句載于行錄既受黃檗印可尋抵河北鎮州城東南隅臨滹沱河側小院住持其臨濟因地得名時普化先在彼佯狂混眾聖凡莫測師至即佐之師正旺化普化全身脫去乃符仰山小釋迦之懸記也適丁兵革師即棄去太尉默君和於城中捨宅為寺亦以臨濟為額迎師居焉後拂衣南邁至河府府主王常侍延以師禮住未幾即來大名府興化寺居于東堂師無疾忽一日攝衣據坐與三聖問答畢寂然而逝時唐咸通八年丁亥孟陬月十日也門人以師全身建塔於大名府西北隅勑諡慧照禪師塔號澄靈合掌稽首記師大略住鎮州保壽嗣法小師延沼謹書住大名府興化嗣法小師存獎校勘
