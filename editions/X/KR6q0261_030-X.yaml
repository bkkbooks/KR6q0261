body:
  text: 舒州龍門佛眼和尚語錄住南康雲居嗣法善悟編偈頌示道三偈并敘宗乘一舉作者埋冤古路縱橫若為措足苟非知方俊眼出格上機舉一明三普同流浪其或循言執滯病在見聞杜口藏形過歸傍認欲得決求大寶莫作小商撒手懸崖當空便擲百千三昧豈在外求若認語言即名邪解至於警物垂務衡鑒將來百匝千重少諧手足或中途病轍半路絕粮引諸子以伶葢指南之不妙良由澄潭月影隱隱迷蹤直須坐斷毗盧優游大徑故作示道三偈以資唱道之萬一固非次第淺深數量名字之所得也冀達之士相期於茲矣隨流千聖靈蹤百草頭卓然放去號隨流後教萬古無人識笑殺溈山水牯牛合轍水中月是天邊月南北東西更無別新羅打鐵火星飛燒著指頭名合轍雙唱坐斷千差古路頭解開種岸濟人舟明明一句該羣象善唱非聲作麼求標指六偈并敘諸佛出世無法示人祖師西來無道可指唯談自悟是謂頓門若尚筌蹄必難話會然則忘其方便迷者難以進途標指示人或有可曉故循好言之士唱偈六篇以舉一隅無勞三返後之冥合者或有可取焉迷悟迷者迷悟悟者悟迷迷悟同體悟者方知迷南為北實情取則北本是南悟無移忒返究迷緣莫得來處忽悟正方迷復何去其迷則迷妄自高低生死惡覺枉受膠黐達迷無妄歡喜無量殺無明賊祇在一餉一餉之間冥通大千直下了了三際虗玄無始時來總由今日盡未來際更不尋覔當念無念靈光焰焰靈焰騰輝心知難掩靈源蕩碧森羅普入海印發明非關動息根塵不偶心珠寧守返不我觀出兮還有有無齊出無有蹤跡智用雖奇猶遭悟覔悟為法障身招罔象犴狢無風徒勞展掌祖父書契本來家業舊日風光不妨要截哆哆和和依前疑著元無病痛何勞說藥足踏實地開眼瞌睡大地茫茫會我如是如是之法不因迦葉是誰兒孫喃喃亂說你解亂說智者便瞥此門廣大愚人自爇自謗自爇不干我事我是癡人汝能靈利坐禪心光虗映體絕偏圓金波匝匝動寂常禪念起念滅不用止絕任運滔滔何曾起滅起滅寂滅現大迦葉坐臥經行未曾間歇禪何不坐坐何不禪了得如是始號坐禪坐者何人禪是何物而欲坐之用佛覔佛佛不用覔覔之轉失坐不我觀禪非外術初心鬧亂未免回換所以多方教渠靜觀端坐收神初則紛紜久久恬淡虗閑六門六門稍歇於中分別分別纔生似成起滅起滅轉變從自心現還用自心返觀一徧一返不再圓光頂戴靈焰騰輝心心無礙橫該豎入生死永息一粒還丹點金成汁身心客塵透漏無門迷悟且說逆順休論細思昔日冷坐尋覔雖然不別也大狼籍剎那凡聖無人能信匝地茫茫大須謹慎如其不知端坐思惟一日築著伏惟伏惟入道道本無瑕擬心已差纔生眹兆徧界空花若欲全舉除非直與不用增添現成規矩洞徹根源法法周圓靈明法爾妙絕言詮言詮不得得亦差忒逈出根塵古今取則存不可見亡兮對面匪存匪亡森羅自現心外無法法外無心心法齊照境智甚深心忘照滅境智同歇一道通同十方俱攝生死涅槃元無兩般四生六道息苦停酸平等大道無有邪正胡漢不來欲何為鏡像虗鏡皎鏡像斯照像去鏡亡千聖非妙此門難入唯君自息若入此門半錢不直不直半錢萬國爭觀所以說云大道體寬見聞見極垂光聽圓含響若謂見聞法成塵想光流大千響傳沙界對現全彰無在不在聲不是聲色不是色非色非聲山高水急眼不可見耳不可聞非見非聞宛爾見聞見色聞聲脫出根塵水月鏡像夢幻施陳文殊寶剎觀音普門周羅法界唯子一人身土交映妙絕凡聖本有天真非病不病長歌且唱妙舞更誇東西南北示現空花生死去來去來生死若不如是多過多咎茲言未諦此語皆宗標指若示古人同風水月水月指陳最疎最親若謂可見還帶重輪月皎於上水流於下彼此非干應緣何假聲回響轉垛成招箭指喻孰明標門誰辨凡夫見聞月皎水渾心波業識奔流苦門二乘聞見如鏡中面對像迷真渠還未薦水澄月映孤光逈逈滅此化城更須前進一月耀天光吞大千森羅頓現亘爾無邊齊含寶月交光廓徹非中非外一多融攝毗盧性海自他無礙迷悟悟迷相亡相在一塵百億百億一塵奔走塵剎不動本身光亡月落幾人摸索四十九年渾用不著丈夫壯志自有行市十字路頭看人失利不忻諸聖不厭凡夫拈箕奉跨馬騎驢若人笑我我亦笑渠更問如何我不識書語默至道非言言亦可傳可傳何也應物而宣言雖應物物自無物無物之言言音自沒絕言之語妙應還普道非晦明語默同取舉復誰唱物物虗曠咸通大千徧乎塵想品類非一同言異出圓音落落凡聖俱適千品萬類薰含種智故此一門稱無量義山河宣演草木揚音長說無間所謂甚深深兮甚淺不動情見最省工夫凡夫不薦不薦最親妙義敷陳歡言即笑恚怒即嗔嗔為金剛喜為迦葉華藏毗盧心心相接接兮可見莫看背面無字密言從茲出現現復誰論非用耳聞六根共戶妙偈星分森羅經文不出一塵非舌非辯雷轉電奔展之在手何法不有縱橫三界無一滲漏時人不信執言說病依倚前塵以為決定決定是心決定是塵心塵所使非自由人諸聖苦口隨愚過咎巧說多詞強為分剖法無言說汝須善別捨離語言生死自絕凡夫聞此無說過咎取彼無言冥然長久端坐暗獄以心相續背却語言猶如土木捨有之無落在邪途有無俱病二病俱祛祛復何去不離當處當處不生語默相取取兮不知是東是西說即不說不疑即疑故稱佛子了事凡夫是何凡夫問取李胡彼我不二諸人行李處非我君不能我今憑子力還與汝同心彼我無差忒超然絕古今千差非止水生死自平沉對容誰不妙拂袖省知音不墮機前路明明定淺深其如未覺了彼我徒自侵動靜常一本自未常迷何勞今日悟守住寂寞城知君還錯悞從前諸聖人元是凡夫做豈有別路岐教人離憂苦祇者生死中即是佛去處有人忽踏著選甚淨穢土一向不回頭喚之亦不顧千聖不柰何何不省言語了却貪嗔癡即是諸佛母妙語方知佛與祖師言拈花示癡子我今發此談何言顛倒爾當人自天真譬之秋潭水一物著不得豈用安名字切莫向其中認之還不是不見須菩提空空達彼彼了妄元真問汝貪嗔癡家住在何處我今要與汝各各分頭去好好細思量免被他官府大者名為貪養得二舍弟三郎都一處日夜共活計令汝家戶大使汝善調制子今苦厭我我與子發誓一要子自知二要子依例三要當處生四要歡喜偈與汝善和同一一無凡穢一覺一切了何須去煩翳我是諸佛母十方及三世物我無差青山是我身流水為我命養之以四時蕭然自條正覆育諸眾生六度自修省栽花種菩提拂石要安靜不見楊柳飛自有蒲萄影玩之且不厭去亦無冤競一性一切性娑婆大圓鏡同居善說世人不識我求我以形容形容不相似徒觀紙上龍若要識得我問取主人翁主人好家業物物要安藏六兄誇藝術三母足溫良南廳善書筭北庫多財粮住來但覺久懶去問張王君若一識得與汝同屋梁美容可觀一別海山中十年春草綠相思在方寸顏容皎如玉音書杳不來桃李繁且熟唯有意中人使我眉頭蹙妙容非覩通身無影像脫體露堂堂不話非聲色何曾有短長河沙恒徧現故號法中王優曇花正開嗅著不聞香延促自爾春日春山裏春事盡皆春春光照春水春氣結春雲春客春情動春詩春更新唯有識春人萬劫元一春寂體咸周妙體無方具徧知近遠利絕毫釐根塵應念周沙界坐斷毗盧發大機應緣不錯法法無差是正修見聞從此絕漂流窮心未到忘心處一聚根塵安得休祖師地種花及總頌四首地性地本無生因生說有地流傳古至今非愚亦非智種從昔未曾迷於今何所悟祇緣種性深更亦無別路花有種有心地因緣花自開要知成果處却笑祖師來總五葉花開後山長水更深亂雲橫谷口游子謾追尋六句偈六首并敘六句偈者各盡自心功德藏無少間然也不離六句而超六句方曉此意前念是凡前念是凡短布裁衫長亭送客落日張帆後念是聖後念是聖一拳打正干戈叢裏拾得性命前念非凡前念非凡語正言讒天高海濶毛羽𣯶𣯶後念非聖後念非聖萬象明鏡不假薰修本來清淨前念即凡前念即凡凡不能測若人要知終不指劃後念即聖後念即聖聖不能知鐵牛過海石女生兒十憶偈并敘余甞謂先聖雖往其道則存苟或契同吾斯在矣百丈因言之溈山曰如忘忽憶所言憶者歷然神解如耳目所對更不差錯者也故作十憶偈十首以自發明先旨使千載之下咸令信受亦貴知余未始少忘也吾既知之矣爾等知之乎憶少林一從三拜後千古錯流通永日無人到蕭蕭檜栢風憶曹溪葉落歸根後曹溪一滴深山居人少到真實好知音憶南泉一歸方丈後何處覔南泉昨夜三更月寒光照座前憶趙州不下禪床後曾無善巧言平常安樂事今古謾流傳憶南陽丹霞相訪後從此話南陽草作青青色春風任短長憶雙林一入雙林後天宮事可猜賣魚人不厭何處見如來憶寒山一住天台後身單布亦穿雖然筋骨露歌笑不堪傳憶龐翁石上栽花後生涯自是春若逢親切問端的不饒君憶先師一見先師後堪悲復堪笑為問何以然八十重年少憶伊余憶著伊余後呵呵笑未休何人知此意有語不堪酬十可行十頌并敘華嚴以十法界總攝多門示無盡之理禪門有十玄談以明唱道洞山有十不歸以表超證山僧述十可行以示後生庶資助道譬諸蓬生麻中不扶而直又如染香之人亦有香氣有少益者書之于后宴坐清虗之理竟無身一念歸根萬法平物我頓忘全體露箇中殊不計功程入室問道趍師印自心入門端的訪知音此生不踏曹溪路到老將何越古今普請拈柴擇菜師先匠進業修身見古人若到諸方須審實龍門此法是通津粥飯三下板鳴生死斷十聲佛唱古今通開單展鉢親明取不可麤心昧苦空掃地田地生塵便掃除房廊蕭洒共安居裝香掃地無餘事默耀韜光示智珠洗衣臨流洗浣莫疎慵入眾衣裳垢不中上下隣肩薰炙久身心動念肯消鎔經行石上林間鳥道平齋餘無事略經行歸來試問同心侶今日如何作麼生誦經夜靜更深自誦經意中無惱睡魔惺雖然暗室無人見自有龍天側耳聽禮拜禮佛為除憍慢垢由來身業獲清涼玄沙有語堪歸敬是汝非他事理長道話相逢話道莫虗頭大語高聲笑上流言下若能窮本末肯將無義結朋儔感興二首空裏形骸夢裏身夢中身世莫追尋可憐一脉嵓前水流入人間古到今夢幻空花祇自知潛思二十九年非夕陽芳草曾行處誰料紅蓮步步隨海會辭老和尚來時無有語去亦不知聞此曲誰能和轟轟出白雲五祖老和尚寄鐵牛歌與師附昨夜三更前鐵牛耕盡田喫著三春草吐氣在青天也無欄也無圈前山後山任方便不曾造次損田苗愛惜皮毛不輕賤忽然大震一聲雷始覺從前得顯現師和混沌未分先剖判生成不假陰陽煅頭角前來是好牛皮毛更不重更換滿目平田無寸草飢飡渴飲無生老威音王佛是如今有甚眾生可尋討哮吼一聲天地動達人見處吾無用坐斷毗盧世界寬自是衲僧眼皮重一遇知音和始齊自餘總是閑陪從山中閴寂爐邊靜坐因思四十年人間世外林泉之樂與夫區區世上者何遼遠也諦思究極于至道遂成山偈聊以自勉并示諸禪人使勿如老夫之回頭晚也動境徧娑婆以之成逼迫安心一處坐從是虗生白逼迫何逼迫膏火煎魂魄虗白何虗白廣教揚孤翮良哉靜者心四海猶為窄匹彼在動士天地何遼隔故茲審觀究二者俱介僻棄彼而奔此安得有深益樂者自何至苦者自何適苦樂忘根緒由夫征路陌路陌苟不征躭躭本家宅昔未厭瓦礫今豈重金璧金璧有所重瓦礫未可擲瓦礫謂金璧殺盜應非逆金璧謂瓦礫聖賢失蹤跡金璧而金璧瓦礫而瓦礫苦樂各平等法法無假借大空離眾念真實無改易樂而無樂相苦亦無苦跡苦樂同十虗心門廣開闢龍吟而鳳鳴天淵發金液人不念諸道飢口枉求食一也及夫此曹溪稱上客因思賢聖人不寐徹殘夕時哉各勉旃升沉在咫尺題四面法智禪師塔珍重靈知者綿綿亘古今人居千聖外塔鎻亂雲深碧落杉松色丹崖虎豹音回光如到此必也見師心與太平四面夜坐城中應接同摩詰雲外無心似老盧月白風清深夜坐出家全不費工夫示看經僧句義縱橫那畔彰五千餘卷總含藏如何不覔根頭意空看枝邊木葉黃讀傳燈錄二首虗名虗說傳來久真語真蹤示後人虗實灼然知下落清風千古見芳塵家家門前火把子半夜愚夫說相似碧天如水月如鈎古今流落閑名字示栽松僧一寸靈苗手自栽前崗後隴作良材敢將不朽傳他日唯把青青示後來山中偶作三首分明不了却成迷無限風光付與誰若得家山田地穩自然處處不思議舊事成空莫可追舊心將把再思惟古今不隔絲毫許會得如斯也大奇休處言休便好休五湖蹤跡任遨遊莫嫌活計無多子此箇牟尼用到頭示眾求心心未諦等人人不來嵓花曉來雨寂寞為誰開三句頌禹穴龍門寺探珠欲問龍驪珠吞在腹如何取得請續末後句讀靈源十二時歌一日日一時時龍門老心自知師常以六隻骰子示禪人六面皆六點復作三頌六隻骰子滿盆紅不用安排祇麼通擬欲進前求解會大似西行却向東六隻骰子滿盆紅塵墨河沙用莫窮誰能解展金剛手祖佛親來亦掃蹤六隻骰子滿盆紅馬載驢駞一擲空赫赤窮來無可賽請君從此現神通僧問六隻骰子滿盆紅時如何師云無人能賽云忽遇恁麼人來時如何師云平出云請君從此現神通作麼生現師云骰子在我手裏迷逢達磨信步遊梁魏乘時別少林長安車馬客無限利名心因法眼頌呪咀毒藥形聲之逆眼耳若通本人何適師復頌之根問本人何所適塗割等平忘順逆有為雖偽性常真法法無依稱善吉無情說法無情說法異盲聾聽得之人眼耳通不但近塵并遠剎十方度盡顯全功寒食禮先師真五首雲水參尋訪此宗十年磨刮太虗空區區力盡還依舊方知萬法本來同一悟吾師心便息信門入處還無入二十年中事密如向人殊不勞心力前人說法後人聽由來兩箇總無情祇緣口耳都相似所以流通道自成去人去矣叮嚀囑住者相承無斷續若遇知音一和時乃知去住常充足清明寒食與諸人共禮先師不動身萬法本閑心亦爾將來誰是得吾真和珪首座二頌祇論親切不論時回笑諸方陷虎機一句未容開口對片帆先逐便風歸頭頭有路堪行履物物無差莫棄違不見黃梅足奇士盧公却得祖師衣媿爾相求識歲寒不嫌危磴路千盤歸堂一劄曾親訪閑戶深山肯自瞞月下篇章應獨和壺中天地共誰看臨機大用全收放何必區區握雪團送郭大夫知鉅野東歸半載漁樵樂北去三年父母來金馬玉堂彈指入寶樓香閣一時開題陳子美息陰堂湛湛寒溪疊疊山息陰投老得身閑武陵花好春常在漁掉歌清事不關眼底兒孫從富貴罇前𩯭髮任斕斑天機日有真消息頻許禪僧共往還題孫欽之養素軒善養不教聲色亂素絲無染是天真有時來此軒中坐作箇忘機混沌人智海化士乞頌乞食山城歸帝里毗耶鉢飯香而美莫念故園桃李春更參上國西來旨示圍爐僧爐邊靜坐默無言勿論麤疎若市冷暖此中看火色祖師心印為親傳題徐四翁壁徐翁活計天真年老無喜無嗔參取面前桑樹乾坤不出一塵題祇園庵祇園誰住此謂是钁頭通物外庵邊竹人間耳畔風露畦青戢戢煙浦綠濛濛祇箇潛心處分明古者同夏散輙病既病且惱因書山偈示一一禪者萬劫一瞬視塵沙不動移若為論過未併總入無時海濶波仍帀心通佛可齊床頭木枕子推出恐人迷題侍者寮香林閣葛廚松枕午窗涼臥看風雲草木香彈指徧遊塵剎盡故山歸路笑羊腸送常侍者西歸省親本從綿竹過南方依前歸入綿竹去井舍猶為舊日居山川不改當時處鄰人見之莫驚愕親里歡迎斷思慮有問南方所得時瘦藤為我聊輕據小師崇堅乞偈事辦須尋道方明爾本來禪關無鎻鑰祇要用心開龍門偶作五首明月何皎皎永夜入我室照出萬古心念此百年質隔窻風露泫擁毳衣衾密遲遲不能寐餘光在東壁叨叨林鳥啼披衣中夜坐撥火悟平生窮神歸破墮事皎人自迷曲淡誰能和念之永不忘門開少來過嗚嗚鼯鼠啼時人皆不喜得意即相呼意去當自止吉凶由之生吾未見其理此言如未聞大梅有宗旨初夜涼生早微雲卷太空燈懸松竹露簾捲薜蘿風可笑千年事能將一念通相逢禪客問細細話吾宗每念心中事頻開掌內珠欲憑天上鴈待寄水中魚此意終難寫斯言不可書含毫竟寂寞遶屋樹扶疎題靈光臺壁政和七年院成別於南山下作靈光臺臺上立雙浮圖西向見日沒處是謂歸根收藏之旨也一窣堵波以奉前後宗師化盡報體一窣堵波用安十方禪僧火後遺骨是二者爰彰寂滅之道殊途而同歸萬靈咸會者也吾之朽骨亦藏于此世世宜遵守之長而且久與夫虗空齊壽者斯雙塔之所以建也其年寒食日住山清遠記并述二偈云吾初欲作真常語更恐真常暗流注不如不語人共知人欲知之反勞慮崖頭浮圖示其相臺上野雲飛不住周遊獨步或可追錦繡谷中歸舍去古云獨步四山頂周遊三大路百骸潰散此日言一物長靈異時語此日長靈猶可知異時潰散憑誰舉可知所以有生滅解舉方能忘取與光明寂照徧河沙慎勿於中論爾汝花山石龜不念歲月古舊記已滅名尚留道傍蒼木老霜雪㵎畔野草隨春秋訛傳細讀華陽傳靈跡獨聞姚比丘可憑定力驗今昔人間萬事徒悠悠木魚無端擊此溝中斷鐘鼓相參無雜亂能聞所聞非二緣以此及此通回換凡夫何故作追攀達士若為成智觀可憐流入薩婆若醉眠尚爾排魚貫讀經不染而染妄本虗染而不染悉無餘本虗自是能成事體淨何妨應萬殊斷妄證真心豈息非真非妄智還迃了真了妄如無礙自在圓明始是珠不寐毗耶離城居士家環堵十笏容河沙八萬四千高座眾咄嗟已辦熏天花迢迢不到迷是障念念常入心無差須彌盧山四大海我見如一粟與麻早起老來愈見心無事夜永偏知膽更涼淺淺地爐猶有火依依山月尚臨墻試將寂滅那伽定暗寫雕蟲篆刻章剛被啼鷄忽驚斷一時歸入正思量起晚展脚縮脚飢鼠啼合眼開眼重露晞覺來始了夢時事夢處寧容覺後知瞬息黃粱猶未熟翩翻蝴蝶正狂飛披衣獨坐日正午試問何如半夜時遊定明塔院作二頌大士安禪地千松塔院春門深松檜老事古歲時新人禮香燈夜鳥啼花雨晨祇應禪石上去住亦通神白塔雲中路晴空鳥外簷好山長入望終日坐無厭幾箇竹生石數枝花映簾長安曾未到神力動飛潛因舉楞嚴經七處徵心成頌善逝明知直不邪要窮妄識是空花故令慶喜推心目勝相初觀始出家在內何緣昧肝胃相知在外又成差琉璃比眼還同境閉障開明未有涯合處隨生難定體根塵兼帶轉蓬麻世間一切都無著水陸空行作翳瑕七處無歸全失措從茲始得徧河沙述懷示學者細思五十三年事併入初中後夜心須信剎那通過未更無毫髮作追尋隨消舊業根先斷永絕新殃道已深此是安身立命處故吹一曲報知音病中示光道者我病無形不可見曼殊室利得深知再三若欲通消息推出床頭木枕兒蔣山送無著道人歸舒州已禮雲中塔更瞻堂上師方思江水北共集定林西一句無多子千差永不疑到家勤愛護此道少人知送禪人入京千人叢與萬人叢無喜無嗔耳目通要識太原孚上座六街鐘鼓閙鼕鼕再得旨退褒山成三偈代違和守錢公住山久有煙霞疾得請放還麋鹿羣厚意於公殊未報深禪聊復對爐薰公家忠靖有遺德乃與定明開道緣異世今時豈人意一麾千里是家傳出岫油然亦乘興勌飛隨意即知還有心知到無心域鳥戀故林雲在山真贊釋迦如來出山像贊妙色非身形容乃普閻浮未下雙林已覩曠濟功深六年行苦塵沙相好萬億剎土眾生心淨佛日常午正念蒙光迷人外取雕檀寫氎像未孩乳今茲模傳從乃古象步出山智珠河吐水月頓澄豁開覺戶瞻之仰之豈敢自侮常在不滅此言手舞觀音像贊二首曠大劫來離眾苦心心永斷諸分別聞處真聞實不聞說時雖說常無說法身普現凡聖等耳根釆聽音聲絕娑婆最有大因緣一念清涼除惱熱曠大劫來不虗妄言言故得皆真實應念蒙光迅電飛尋聲救苦奔風疾千章萬句離文字異韻殊音垂祕密現相宣揚遇此時見聞頴脫欣今日天台三大士像贊岩岩天台曠濶寰宇大士不我毫端莫取蜀客心狂纖塵一縷屈指拊掌松石猛虎生涯何有流傳今古靜對虗堂非謂無補達磨大師贊振搖梁魏斟酌皮髓孰云西來空槨而已素壁虗堂少林熊耳百丈大師贊慧燈續傳福庭宜敞常住世間水月鏡像是謂叢林大智百丈楊岐和尚贊鬧市竿頭呈戲眾眼曾驚栗棘蒲上橫吞諸方盡畏宜陽秀水萍實楊岐雨過雲橫天高地下白雲端和尚贊綱紀著明不忘付授淨空無際如日處晝欲究根源瞻之龍岫五祖演和尚贊遇冤則親傳虗果當剛硬齒牙生鐵腸臟風清淮楚道實宗匠不有智悲子孫安嚮浮山圓鑒和尚贊并汾鐵騎老息荒丘雲施雨罷花落水流褒山定明禪師贊四海稱唐師出華陽不起燕坐翱翔帝鄉名與山俱道逐時芳濟民助國能雨能暘貧者獲富熱者得涼羣蒙所歸實在不亡悟首座圖余幻質復求為贊廓然無聖儼爾有容明明絕眹密密垂蹤昔也懷寶枯木藏龍今其示人巨嶽喬松龍吞萬類松茂三冬神而不改風雲必從吾形既得爾道自鍾褒斜路險漢水朝宗珪首座求贊如珪如璋惟子非我且陋且拙在余是可子今傳余拙則成奇物感神會形動心隨凝雲不飛寒月下映孰謂之凡孰謂之聖余猶爾也奇拙同貫嘻嘻期文大朴未散順知藏求贊色裏膠青不見形影中所以邈吾真吾真定有非形礙為對凡夫顯幻塵塵既顯道彌新不貴西來彼上人淵禪人求贊似余似余類我類我我復謂誰如火與火描邈不就迎隨不果寫出龍門衲僧災禍如大師求贊比類則踈現形仍普得在一瞬照窮千古雲起吟龍風生嘯虎贊之絕辭瞻焉奚覩賢監院求贊徧界不藏毫端獨妙縱未嚬呻已先微笑吾子識也水月斯照纖塵不遺是為宗要肱維那求贊識余者誰請觀端的孰云丹青謾勞尋覔斷雲架巘皎月在壁昭爾惺惺悟茲寂寂勤禪人求贊滄溟一滴鹹無際厚地纖塵廣有餘何事陋容人寫得祇緣蹤跡在龍舒昕侍者求贊吾行爾隨吾喚爾應唯隨與應不欠不剩因吾識爾此像果親靜而瞻之道實絕倫元侍者求贊道雖光明形則山野提折脚鐺住深蘭若拙韻無取陋容誰寫常在左右覺元侍者小師崇戒求贊似即踈比仍失廓爾空皎然日顧丹青寫容質誰使之省尋覔無着道人求贊植杖望雲何處空山獨立凝情媿我蕭然無物謝伊裝點相成馮濟川教授求贊天地無物我無物隱顯空雲隨出沒此間誰是悟玄人霹𮦷光中轟一咄吳公明求贊欲識坦然老乃是龍門人聲名落四方坐臥今十春會見移庵去何妨邈形真平生香火緣對比即神通張公壽求贊首到東山晚親龍岫歲經寒暑人非新舊塗毒長鳴優曇勿嗅靜對終日弟子公壽戴巨濟求贊畫出人皆識相逢道更親起雲峯後路記得往來頻龍門常住圖師真知事求贊寥廓無狀孰為龍門有指南路絕刀斧痕因緣去住任物所論黃竹寒湫曉而復昏
