body:
  text: 寶峰雲庵真淨禪師住筠州聖壽語錄一嗣法門人法深錄開堂日宣疏罷師乃云大通智勝佛十劫坐道場佛法不現前不得成佛道今日四眾圍繞佛法現前還得不得良久云欲行千里一步為初便登座拈香祝聖罷又拈香云大眾此一瓣香還知落處麼更不覆藏直為先黃龍南禪師爇向爐中去也於是趺坐白槌竟師召大眾云當須自觀若此觀者名為正觀若他觀者名為邪觀邪正未分有疑請問僧問列祖陞堂賢侯堅請向上宗乘請師舉唱師云六六三十六進云常憶江南三月裏鷓鴣啼處百花香師云好箇消息進云今日郎中承此善退身三拜謝師恩師云深僧禮拜問語默二途皆易辨師今得法嗣何人師云早來向你道了也進云恁麼別黃龍的子臨濟親孫去也師云猶自卜度在進云而今四海清如鏡行人莫與路為讎師云速禮三拜問世尊出世梵釋相隨郎中請師將何報答師云一雨普及萬物咸滋進云一言生筆下萬古落人間師云人間事又作麼生進云浪盡還歸水月落不離天師云閑言語行者問天地以萬物為芻狗聖人以百姓為芻狗未審和尚以何為芻狗師云點進云禍入僧門師云交行者擬議師便喝行者禮拜師云得與麼有前無後問此日人天普集太守臨筵祖意西來乞師端的師云的進云一句已蒙師指示向上宗乘事若何師云向下底進云若不登樓望焉知滄海深師云過進云四眾沾恩學人禮謝師云猶欠一著在進云傍觀者醜師云放有僧出云這裏是什麼所在師云好好問著且莫虗頭問如何是虗頭一句師云這虗頭漢僧無語師便喝僧擬進語師云鈍置殺人進云真善知識師云你是不得已也復云問話且止祇知問佛問法殊不知佛法來處且道從什麼處來乃垂下一足云昔日黃龍親行此令十方諸佛無敢違者諸代祖師一切聖賢無敢越者無量法門一切妙義天下老和尚舌頭始終一印無敢異者無異即且止印在什麼處還見麼若見非僧非俗無偏無黨一一分付若不見而我自收遂收足乃喝云兵隨印轉將逐符行佛手驢脚生緣老好痛與三十棒而今會中莫有不甘者麼若有不妨奇特若無新長老謾你諸人去也故我大覺世尊昔日於摩竭陀國十二月八日明星現時豁然悟道大地有情一時成佛今有釋子沙門克文於東震旦國大宋筠陽城中六月十三日赫日現時又悟箇什麼以拂子畫一畫云我不敢輕於汝等汝等皆當作佛下座師於熈寧八年在洞山受請於法座前拈帖示眾云最初一句子便要眾人知還會麼良久云符到奉行維那宣帖罷師乃云大眾諸佛出興於世總祇赴箇時節且道貧道今日赴箇什麼時節遂指法座召大眾云今古應無墜分明在目前便陞座乃云還有問話者麼時有僧問承古有言不見一法即如來方得名為觀自在如何是自在底事師云透七透八進云龍得水時添意氣虎逢山色長威獰師云暗進云前村深雪裏昨夜一枝開師云閑言語問施主慇懃伸三請今日當筵事若何師云新豐洞裏水潺潺進云若然者得聞於未聞去也師云且道聞底事作麼生僧提起坐具師云杜撰禪和進云大眾證明學人禮謝師乃噓噓復云更有問話者麼良久乃喝云昔日大覺世尊起道樹詣鹿苑為五比丘轉四諦法輪唯憍陳如最初悟道貧道今日向新豐洞裏只轉箇拄杖子遂拈拄杖向禪牀左畔云還有最初悟道底麼良久云可謂丈夫自有衝天志不向如來行處行喝一喝下座初入院陞座僧問天地亢陽願垂一雨師云自有清涼者進云與麼則羣生有賴也師云知恩者少進云雲散家家月春來處處花師云不易念得來問如何是聖壽境師云參差舊屋宇到者始應知進云如何是境中人師云一似不相識進云人境已蒙師指示向上宗乘事若何師便喝僧禮拜師云不消一喝問昔日世尊出世坐斷乾坤今朝和尚出世意旨如何師云四眾圍繞進云大眾證明學人禮拜師云何不更問復云青山淥水不能住白日紅塵却自歸而今避不得也且混俗和光灰頭土面笑他林下人也要笑若解笑甚奇妙十字街頭拈得箇被布衲襖抖擻塵埃示眾人好不好曉不曉從他肉案頭歌呌喝一喝云回頭轉腦晚參上堂僧問不離當處常湛然覔即知君不可見見即不問如何是不離底事師云傾心吐膽進云若不登樓望安知滄海深師云祇如湛然底事又作麼生進云三門佛殿長相對翠竹松風滿院寒師云多虗不如少實進云也須檢點過師便喝復云彌勒真彌勒分身百千億時時示時人時人皆不識拈拄杖云還識麼千箇萬箇但識取這箇擲下拄杖下座因請首座維那典座上堂問流水下山非有意片雲歸洞本無心如何是無心一句師云你是有心耶無心耶進云疊石峰高嶮白雲出故關師云莫道無心好僧禮拜師云三十年後醒去在復云三德六味施佛及僧香積廚中善調在手三世諸佛向砧槌上聲聲相應且道相應箇什麼良久云問取堂中第一座上堂僧問曉色未分人盡望及乎天曉意如何師云你見麼進云城隍雖淡薄林下道相親師云這裏是什麼處所復云有進有退有急有緩道在變通事乃成就監院荷檐竭力街坊善巧化人知客臨時接引長老據欵結案還有不涉斯美者麼良久云明年更有新條在惱亂春風卒未休上堂僧問真則是幻幻則是真真幻既除道歸何處師云若有處所堪作什麼進云千江有水千江月萬里孤舟萬里身師云却不如是進云江上漁人空點頭師云適來向你道什麼僧便喝師云好一喝僧又喝師云兩喝後又作麼生僧禮拜云猶嫌少在師乃噓噓復云大眾宿來萬福數日人事相煩更不一一陳謝禮繁則亂知是般事便休且道是什麼事驀拈拄杖云風不鳴條雨不破塊堯風蕩蕩行人讓路萬姓歌歡筠陽城中誰家竈窟裏無煙張公吃酒李公醉卓拄杖云寒山拾得上堂昨日有僧從泐潭來却往仰山去驀拈拄杖云筠陽城中聖壽院裏打鼓普請喫茶上堂有化主問承古有言天得一以清地得一以寧君王得一以治天下未審衲僧得一時如何師云善為化導進云恁麼則紅塵路上無閑客也師云家家觀世音僧禮拜師云更須著力復云我觀法王法法王法如是驀拈拄杖云穿却你諸人鼻孔換却你諸人眼睛還我法王法來乃喝云差之毫釐失之千里擲下拄杖下座上堂僧問十方佛土中唯有一乘法如何是一乘法師云百尺幡竿尾指天進云學人退身三步去也師云脚跟下七縱八橫進云月色和雲白松聲帶露寒師便喝僧亦喝師云這野狐精復云宿來大眾萬福方期首夏已是初秋今朝改旦七月一日嗟乎流光電速四序推移是事不常人亦漸老還有不涉老少者麼良久云八十翁翁著繡靴因逍遙長老來上堂僧問一句了然超百億一句即不問如何是百億師云道士繫腰帶進云一堂風冷淡千古意分明師云番人頭戴冠進云大眾證明且禮三拜師喝云瞎漢復云青山深處人來我紅塵裏紅塵偶不見白雲與流水耳目何所分浮名與浮利為是紅塵非為復青山是是非兩途間幾多殊未已幸遇逍遙人可述逍遙理下座上堂天地與我同根萬物與我一體脚頭脚尾橫三豎四北俱盧洲火發燒著帝釋眉毛東海龍王忍痛不禁轟一箇霹𮦷直得傾湫倒岳雲黯長空十字街頭廖胡子醉中驚覺起來撫掌呵呵大笑云筠陽城中近來少賊乃拈拄杖云賊賊下座上堂開雲門門七通八達却須知有關棙子去著若也不知雖活如死現黃龍龍千變萬化更須到伊窟宅潛處若不到有眼如盲諸德我觀法王法法王法如是有眼者辨取因清涼長老到上堂熱惱既盡清凉現前分別不生虗明自照然後我當按指海印發光汝暫舉心塵勞先起乃喝云三世諸佛一棒打殺填溝塞壑拋東擲西一任諸人看驀拈拄杖云過去諸佛亦如是現在諸佛亦如是未來諸佛亦如是遂擲下云看上堂僧問如何是珠師云炟赫光明在目前進云滿城盡是知音者吟出新詩與眾看師云誰是知音者僧云大眾證明學人禮拜師云虗頭漢復云一葉落天下秋老僧慵剃雪霜頭風浩浩水潺潺忙者自忙閑者閑終南山色翠相倚湘岸橘朵紅鈎攀諸禪德會即途中受用不會且世諦流傳拈拄杖云不是途中受用又作麼生傳良久乃喝云夜靜水寒魚不食滿船空載月明歸謝月化主上堂靈山話月曹溪指月聖壽今朝謝月且道與古人誰親誰踈莫有人辨得麼若也辨得將此身心奉塵剎是則名為報佛恩若辨不得無角鐵牛眠少室生兒石女老黃梅笑殺栽松道者參上堂方經七月十五已是八月中秋徒知暑往寒來人老區區未休休休看看便是結交頭大眾丹霞老道底百骸俱潰散一物鎮長靈乃喝云無端騎聖僧上堂東西南北四維上下觀機設教應病與藥驀拈拄杖云馬大師來也看看日面佛月面佛一一為君重拈出若善服者病瘥藥除舉足下足無非道場不善服者藥病相治盡大地是藥觸途成滯遂擲下云祇在諸人面前便下座上堂有時灰頭土面橫身荒草眾生處處著引之令得出其柰飢逢王饍不能飡又爭怪得老僧上堂德山呵佛罵祖承其言者多見德山者少黃龍佛手驢脚見黃龍者眾善其機者稀驀拈拄杖云欲得見德山麼遂左邊卓云看要知佛手驢脚麼復右邊卓云看乃橫云佛手驢脚我宗廓德山披毛黃龍戴角萬化目前磊磊落落乃喝云眼孔定動總是著縛下座上堂道泰不傳天子令行人盡唱太平歌五九四十五莫有人從懷州來麼若有不得忘却臨江軍豆鼓因等慈長老到上堂以平等慈度一切生洒一法雨潤一切物良由根機不等所受不同互有得失又爭怪老僧下座上堂因城中失火僧問養兵千日用在一朝正當立國安為什麼各生退志師云千兵易得一將難求進云忽遇軍旗急速又作麼生師云自有安者進云與麼則汗馬不施功勞不著也師云你是什麼人僧便喝師云敗將不斬復云欻然火起焚燒舍宅及至煙消火滅萬事成空冷地裏一場懡㦬遂喝云轉凡成聖又是什麼人永固長老至上堂幽固深遠無人能到到則山青水淥別是人間好諸禪德江月照松風吹永夜清宵何所為却怪長時杜䳌子春山無限好猶道不如歸上堂十月十五迎寒送暑唯有這箇不來不去該天括地亘今亘古雖則全彰要且不露喝一喝下座晚參上堂十七十八早是漏泄若也不會守繫驢橛上堂聖壽有時壁立千仞欲發人人之大機我與麼來你擬心早是蹉過了也何故此事非汝思心注意常情之所能諸禪德盡情說了也合作麼生上堂十月二十五臨濟太莽鹵開却雲門門德山罵佛祖下座上堂以字不成八字不是有利無利不離行市驀拈拄杖云寰中天子塞外將軍擊禪床下座晚參上堂十月二十三天寒下暖簾黃昏一覺睡南海出榆甘上堂聖壽長老不會禪不會道祇會解粘去縛應病與藥諸佛子無禪可參無法可學棄本逐末區區客作不如歸去來識取自家城郭城中自有法王尊一呼百諾髻晃明月珠手振黃金鐸還要一切羣生自家省覺來來應是從前佛法知見一時放却乃得自己毗盧心印明廓乃喝云大丈夫兒莫錯莫錯上堂真不掩偽曲不藏直雪後始知松栢操夜深方見把針人參檀越散藏經請上堂奉佛至孝四郎及孝眷等為先考二郎終七追薦乃請真如聖壽二禪眾開轉大藏經一遍供僧一千員斯晨闔郭齋以用表懺上件龍藏琅函靈文聖教經律論三藏五乘十二分諸佛之祕詮頓也漸也半也滿也中也邊也權也實也種種法門智慧海種種因果德相海種種進修行願海種種教導方便海種種依正究竟海種種互融攝入海不可說不可說法門功德光明海薦嚴先考二郎超生淨界然冀四郎及孝眷等生生世世獲大善慶居諸佛法會中共證菩提乃召大眾今日與諸人在什麼會中驀拈拄杖敲香卓云大眾還聞麼佛以一音演說法眾生隨類各得解諸佛於此得之成一切種智具正遍知菩薩於此得之獲無生忍法眼清淨獨覺於此得之現神通光明出無佛世聲聞於此得之證寂滅樂永斷後有天人於此得之增長十善世人於此得之永盡三業地獄於此得之頓超十地阿脩羅餓鬼畜生於此得之永除癡業四生六類一切有情於此得之各隨根性一一解脫且道長老於此得之又作麼生良久喝一喝下座上堂聖壽有時戴寶冠挂纓珞出來十人有九人一時驚怖毀謗罵詈避走遠去見伊不識遂更著垢弊衣與伊相見百人千人一時讚歎歡喜信知我所得智慧微妙最第一眾生之根鈍著樂癡所盲如斯之等類云何而可度以拄杖擊香卓下座因快山長老至上堂快然大道祇在目前縱橫十字擬即留連乃顧大眾良久喝一喝下座上堂舉僧問古德云深山裏還有佛法也無德云有進云如何是深山裏佛法德云石頭大底大小底小忽有人問聖壽云十字街頭還有佛法也無但向伊道無為什麼無貪名逐利大眾聖壽道無古人道有是同是別試斷看斷得出也大奇在洞山受請眾請小參師云新豐古洞萬疊爭攢悟本真宗千林競簇古今勝地佛事常興所以昔日悟本大師有時提唱唯有佛菩提是真歸仗處復喝一喝云猶有者箇去就在諸德祇如大師道猶作者箇去就在且道意作麼生還知落處麼叢林中多有商量者有底道聞佛聞法似生冤家況更有歸仗處故遭悟本大師檢點有底道悟本祇要人休歇去有底道悟本祇見錐頭利不見鑿頭方似與麼匹配又何曾夢見他古人既不如是又且如何諸德此箇事大須子細不可麤心一等參禪窮教到底宗門中千差萬別隱顯殊途唯大智方明降茲已往莫測涯際而今多是抱不哭孩兒打淨潔毬子把放船抱橋柱澡洗彼此丈夫阿誰無分若便明去驅耕夫之牛奪飢人之食入火不燒入水不溺於一切處不留一切處成就靈光獨耀烜赫殊分可謂蕩蕩乎落落乎張起濟岸帆撥動渡人舟於生死海內白浪堆中出沒去來逍遙自在乃喝云從他謗任他非雨中兼箬笠蓑衣而今暫別海門月𢹂魚且向市𨞬歸下座住洞山語錄在聖壽開堂眾官燒香宣䟽至白槌竟師良久乃云會麼少室峰前曾示此高安灘上復誰傳會中若有僊陀客莫學神光廢九年遂喝云有疑請問僧問有一人欲出長安有一人欲入長安未審那箇在先師云多少人疑著進云不許夜行師云蚊子錐鐵牛進云山頂老猿啼古木渡頭新鴈下平沙師云長安人已入你合作麼生進云春日華山青師云者僧雖然後生却可與商量問新豐勝剎古佛道場侯伯請師願垂方便師云耀古騰今進云此莫是和尚為人處也無師云將謂是古佛道中人進云洞山境色重添翠悟本玄風復振清師云有甚了期復云問話且止言多道遠然則通人分上無可不可問答縱橫何是何非不二門開一道清淨所以古人云道無不在觸事而真心若不邪所為自正正覺之道得在乎心不在乎言言語道斷心行處滅非去來今今日一會法法本然心心本佛官也私也僧也俗也智也愚也凡也聖也天也地也悟則事同一家迷乃萬別千差差之毫𨤲失之千里遂拈拂子召大眾云一花開五葉結果自然成施主捨法衣上堂僧問久晴無雨時如何師云點進云學人有賴也師云赫日爍破闍黎面門僧回首召云大眾高著眼師云三十年後有人笑你復云諸佛出世咸披此衣說法度人洞山今日亦披此衣說法度人遂拈起衣角召大眾云還有不受惡水潑者麼良久云月到天心白波歸海上清上堂久晴忽雨久雨又晴天機莫測吾道可明乃喝云具頂門眼者看因請知事上堂至道無難唯嫌揀擇豈可以親踈好醜擇而然後用之要用便用入到手中土作黃金拋來擲去滿目光輝也要眾人見諸德又作麼生不揀擇好醜而用之喝一喝下座上堂佛法不順人情諸方長老大開口盡道我會禪會道且道伊會也未無端向屎坑裏坐瞞神謼鬼似者般的打殺千萬箇與狗子喫有什麼過又有一般禪和子大開著眼被伊狐魅殊不自知驀頭著屎澆亦不厭惡召云大眾彼此丈夫爭受與麼自己合作麼生下座上堂欲雨不雨使我伸舉半陰半晴要汝惺惺果惺惺也與天地合其德日月齊其明乃喝云切忌拖泥帶水下座上堂智不到處切忌道著道著則頭角生諸禪德古人一期唱道則無可不可若是洞山即不然智不到處正好道道不著時無所生無生大道閙縱橫縱橫任運人難測新羅日午打三更參上堂今朝八月一漸熱既消漸涼復至調爕人間育養萬類成就四時無思焉無為焉寂然不動感而遂通祖師門下豈孤然哉是以真機無定祖道難思有時熱有時涼生也殺也撈籠萬有提拔四生破妄想塵出大經卷而無心焉而無為焉緣感乃應豈預搔而待癢乎諸禪德且作麼生是各各當人一卷大經會麼垢盡則明現也三千大千世界遐邇祇在於毫端十世古今始終不離於當念乃喝云不信自殊勝甘為下劣人上堂摩尼珠人不識如來藏裏親收得既收得不護惜也要眾人見驀拈拄杖擲下云還識麼若識燒沉水香供養諸禪德明月照見夜行人良由不是他家事參上堂佛法現前僧俗儼然八月初五冷落秋天晚參上堂有相身中無相身無明路上無生路志公和尚欺我等愚迷壓良為賤然則敢問諸人而今四大五蘊是有相之身那箇是當人無相之體良久噓欲報先聖護念恩粉骨碎身又安得上堂舉雪峰云南山有條鼈鼻蛇汝等諸人出入好看玄沙云用南山作麼師云奇哉善知出處非父不生其子驀拈拄杖召大眾云南山鼈鼻蛇却在者裏便擲下云擬即喪身失命上堂昔有五百羅漢以六神通降一毒龍了不能得忽異方有一尊者至眾謂曰我等盡其神力降不可得尊者可能降之尊者乃彈指一下其龍便伏諸禪德據此還有優劣也無若言無五百眾盡其神力皆曰不能此尊者一彈指而毒龍便伏既有優劣如何可明於此明得作箇出格道人動靜去來五眼不能覩十力不能知堪受人天供養日消萬兩黃金於此未明山門今日作齋供養羅漢且隨隊長連床上開單展鉢下座上堂祇知今日明日不覺前秋後秋諸禪德休得也未便好休而今更有什麼事見麼四大海水灌入你諸人鼻孔裏須彌山突出額角邊三十年後不得辜負洞山長老上堂師子吼無畏說百獸聞之皆腦裂遂拍禪床左邊云不是師子吼又拍禪床右邊云不是無畏說你擬心早是腦裂也更擬如何若何一隊野狐精喝一喝下座上堂平旦寅狂機中有道人身乃喝云不是狂機又唾云不是狂機若作狂機會又爭得行住坐臥山河大地不是狂機且道作麼生是道人身良久云各自歸堂喫茶晚參上堂此箇事學不得教不得傳不得須是當人悟始得悟得也可可地閑閑地了了明明地歷歷落落地一切神通變化悉自具足不用外求乃拈拄杖橫按云橫按鏌鎁全正令太平寰宇斬癡頑遂擲下良久喝一喝下座上堂師子不食鵰殘快鷹那打臥兔放出臨濟大龍抽却雲門一顧遂拈拄杖云雲行雨至三草二木上堂撫掌左右顧大眾云歸堂喫茶去因發化主上堂出家沙門當清淨自活以乞食為正命食不過分離憍慢故以乞法為正念增長智慧不滯寂故驀拈拄杖云你有拄杖子與你拄杖子你無拄杖子奪却你拄杖子於此薦得增汝智慧破汝憍慢火焰裏藏身淤泥中出現千手千眼大悲菩薩一任神通變化於此不薦有清泉兮恣汝飲有碧巖兮從汝栖切忌寒猿深夜啼謝主首上堂實際理地不受一塵佛事門中不捨一法乃拈拄杖云不是一法又捨箇什麼佛事也三德六味施佛及僧法界人天普同供養受供養則不無還知滋味也無若不知分付與首座復敲香臺云五千餘軸言言異一一龍宮海藏來遂擲下云實際理地不用安排分付與藏主上堂九日無白醪飽餐黃栗餻十日有黃菊催人打禾穀五更鐘未鳴隣雞已數聲相逢不下馬各自奔前程參上堂昨日風氣暖今朝天色寒乾坤共著力衲子眼皮寬下座上堂古德道從門入者不是家珍又作麼生是家珍驀拈拄杖召大眾云還見麼遂敲香臺復乃噓噓釋迦老子棒打不殺文殊普賢喚不回頭休休虗費力且隨流待伊時節至一葉落天下秋上堂洞山門下要行便行要坐便坐鉢盂裏屙屎淨瓶中吐唾執法修行如牛拽磨參上堂謝黃檗先馳云分枝列派共闡宗猷祖令全提各隨機變洒黃龍之一雨枯木重榮繼斷際之遺蹤真燈再焰光我先覺以進後昆不任歡慶某無似之者何承先馳上人遠離鷲嶺深入洞山得得馳書敘其法乳過沐周勤仰荷弗已復拈拄杖召大眾云實謂雖與我同條生不與我同條死阿喇喇也大奇筭來彼此丈夫兒睡則同床各自夢古今此理少人知少人知付先馳傳歸鷲嶺分明舉向師上堂洞山門下要道便道要用便用救得眉毛失却鼻孔乃喝云久雨不晴參出縣回上堂云三日不相見不得故眼相看是何言歟洞山數日不相見相見祇是舊時人乃合掌云不審過去諸佛現在諸佛未來諸佛參退喫茶上堂洞山門下有時和泥合水有時壁立千仞你諸人擬向和泥合水處見洞山洞山且不在和泥合水處擬向壁立千仞處見洞山洞山且不在壁立千仞處擬向一切處見洞山洞山且不在一切處你不要見洞山鼻祇在洞山手裏擬瞌睡也把鼻索一掣祇見眼孔定動又不相識也不要你識洞山且識得自己也得下座謝監院上堂僧問用之則行捨之則藏時如何師云斬新日月特地乾坤進云龍得水時添意氣虎逢山色長威獰師云且得天下太平進云與麼則道泰不傳天子令師云老僧被你鈍置一場復云身是光明幢心是神通藏大眾各自照顧抖擻精神而今現定僧也如是俗也如是釋迦也如是彌勒也如是還有人信得及麼若信得及不為分外若信不及亦不虧欠信與不信光明幢神通藏各自參堂去下座上堂舉僧問雲門如何是和尚家風門云有讀書人來報諸德千聞不如一見又作麼生見良久云祇為分明極翻令所得遲上堂洞山門下八凹九凸交交加加屈屈曲曲崎崎嶇嶇嵲嵲屼屼水雲掩映煙嵐重疊一道直截觀者遊者十人九人舉步早是迷却路頭也其中莫有不迷者麼乃喝云且道洞山路頭在什麼處上堂舉昔日天台國清寺因炙茄次有拾得以竹丳向維那背上打一下維那叫直歲你看這風顛漢拾得云蒼天蒼天寒山問你打伊作什麼拾得云費却多少鹽醬諸禪德拾得打維那實謂費鹽醬多也唯當別有道理明眼衲僧試出來斷看一為眾決疑已曉未悟二表自己參學辨其是非冷地裏說葛藤貶剝古今不為好手有麼若無老僧為你決疑去也直歲苦苦告退再三留得寒山拾得總分付却掃地底教掃地燒火底教燒火諸寮兒子莫令空過饒舌豐干到來老僧為伊勘過監院維那典座直歲更須要知寒山拾得姓箇什麼若也不知異日他時總遭伊把鼻孔領過喝一喝下座上堂光剃頭淨洗鉢好便住惡便脫好諸禪德莫將世俗見埋沒道人心上堂洞山深幽且固千年林木生煙霧林間多少葛藤枝左攀右惹難回互回而更相涉不爾依位住呵呵呵將謂洞山多葛藤元來却是參同契乃喝云明眼衲僧莫容易上堂但知隨例飡䭔子也得三文買草鞋祇如新婦騎驢阿家牽又作麼生直饒道得更問祖師鼻孔長多少在下座上堂裩無襠袴無口頭上青灰三五斗趙州老漢少賣弄然則國清才子貴家富小兒嬌其柰禾黍不陽𦦨競栽桃李春翻令力耕者半作賣花人上堂但離虗妄名為解脫其實未得一切解脫作麼生是一切解脫驀拈拄杖云關又云雲門大師在拄杖頭上𨁝跳還見翠巖眉毛麼若也不見洞山為你注破長慶來也遂擲下云吹笛打鼓普請看上堂謝莊主監收云參玄上士味道高人於動靜日用間百事成現受用具足一一要知來處所以古人云譬如大地何物不從地之所生諸佛唯指一心何法不從心之所立洞山分野地之所生或麥或麻或豆或稻然非其人則不能成辦安立既有安立得不勞乎神用然神用雖勞粒粒不落別處且道落在什麼處遂拈拄杖擲下召大眾云見麼阿誰無分知來處麼若知可謂不風流處也風流上堂久參先德不在斯限後進初機不用妄想更依倚箇什麼何不撥開自己心地靈源放出神通光明滔滔流注成辦佛事豈不快哉驀拈拄杖云不是神通光明又擊香卓云不是佛事遂擲下良久喝一喝云夜半烏鷄誰捉去天明帶雪遭指註上堂識情安排工夫造作一向攀緣己事荒却不信吾家正徧知論劫莫能成正覺喝一喝下座上堂舉三聖云我逢人即出出即不為人興化云我逢人即不出出即便為人師云看者兩箇老古錐竊得臨濟些子活計各自分疆列界氣衝宇宙使明眼衲僧只得好笑諸禪德且道笑作什麼還知落處麼若知一任七顛八倒若不知且向三聖興化葛藤裏咬嚼下座除夜小參云一年將盡夜萬里未歸人今夜一眾盡是他鄉之子因何不歸阿呵呵直饒便歸得歸得亦無家正是諸人歸處歸得麼君不聞龐居士云十方同聚會箇箇學無為此是選佛場心空及第歸以拂子敲禪床便起歲旦上堂不見一法即如來方得名為觀自在諸禪德今日人人添一歲還見麼若不見又道人人添一歲若見在什麼處安著既見著處便見出處出處既明方能世出世間於法自在觀自在菩薩將錢買餬餅放下却是饅頭好諸禪德一年添一歲一歲一如來拈拄杖云拄杖子亦成佛也看上堂佛法二字不用道著道著則頭角生古人祇解殺人不解活人何不道佛法二字一一現成諸禪德欲知佛麼祇諸人是欲知法麼祇諸人日用者是是不是是即也大奇不是也大奇殺也活也一處不通兩處失功兩處不通觸途成滯出州回上堂山中城裏事不相知有一句子未敢泄機候遍到寮中一一當面分付直是臨時各自著精彩莫教蹉過上堂汾州莫忘想俱胝豎指頭古今佛法事到此一時休休休却憶趙州勘婆子不風流處也風流拈拄杖云為眾竭力發化主後上堂丐者月餘朝束裝有煩知事首座大眾一動一靜寧不有勞然則勞動若是道人分上無非佛事所謂往復無際動靜一源苟契神於動靜則無滯於往還心迹不生順逆何咎此則於心無心於事無事又何妨於動靜往還之勤其或得之者正乎心失之者亂乎性蓋得失之自殊非動靜之有異乃拈拄杖擲下喝一喝下座上堂放過一著落在第二仲春漸暄景色明媚一眾高人起居輕利莫有不涉春緣底麼良久云遠道擎空鉢深山踏落花上堂相拋又十日歸來山水中眼開如夢覺是事半成空喝一喝下座上堂欲識佛性義當觀時節因緣古人無端向虗空裏釘橛誑惑後人今日四月一初夏時節久雨不晴伏惟知事首座大眾道體萬福更討什麼佛性義你諸人各自有眼有鼻有口有耳何不散去莫妨我東行西行下座上堂舉雲門云劄久雨不晴師云雲門雖善臨時變豹東劄西劄未免和泥合水和泥合水即且止祇如雲門云劄是那箇劄字莫有明眼衲僧識麼若識雲門有甚氣息若不識衲僧有甚氣息祇者氣息有鼻孔者辨下座上堂世尊拈花迦葉微笑乃拈起拄杖云洞山拈起拄杖子你諸人合作麼生遂擊香卓下座上堂此事如明珠在盤不撥自轉有底撥不轉按不活又爭怪得老僧要識明珠麼各自歸堂喫茶上堂聖僧每日入骨入髓為諸人說適來擊鼓重為宣揚更待長老開口動舌又堪作什麼老僧恁麼道也是為蛇畵足結夏日上堂十方聚會三月一結息狂妄心除苦惱熱獲勝清涼證大寂滅到波羅岸出生死轍以此聖制故不虗設聲聞緣覺不見不聞三世諸佛祇可自知衲僧跳不出打在綣繢裏動即開眼尿床夢中說夢且向洞山門下九十日討箇活路上堂舉昔日鹽官常教僧看見性法門聞大溈亦爾密遣二僧往探之既至座下凡百提唱俱不識乃生慢意一日會小釋迦曰你莫麤心小釋迦遂作一圓相以手捧向前二僧又不識小釋迦云你莫麤心便起去師云小釋迦三昧二僧不知洞山門下莫有知者麼是什麼三昧良久云打麵還他州土麥唱歌須是帝鄉人上堂槌鐘復擊鼓日輪正當午拾得語寒山畵龍却得虎下座上堂佛法兩字直是難得人有底不信自己佛事唯憑少許古人影響相似般若所知境界定相法門動即背覺合塵黏將去脫不得或學者來如印印泥第相印授不唯自誤亦乃誤他洞山門下無佛法與人祇有一口劒凡是來者一一斬斷使伊性命不存見聞俱泯却向父母未生前與伊相見見伊纔向前便為斬斷然則剛刀雖利不斬無罪之人莫有無罪底麼也好與三十拄杖上堂臘月二十新豐一眾衲僧巴鼻滴水滴凍上堂人貧智短馬瘦毛長趙州云我青州做一領布衫重七斤師云有年無德洞山見兔放鷹知生不知其死大眾欲出生死不涉有無大用現前勿隨言語請首座典座及逍遙和尚來上堂不動真際為諸法立處昨日監院名今朝首座號緣應百千般立處頭頭妙典座把杓柄一一臨時料眾口若能調逍遙同一道諸法立處今已彰作麼生說箇不動真際底道理喝一喝下座上堂佛法門中有縱有奪縱也四五百條花柳巷二三千所管絃樓奪也天上天下唯我獨尊不縱不奪又作麼生良久云長把一聲歸去笛夜深吹過汨羅灣下座因華嚴座主到上堂法界者一切眾生身心之本體也乃拈拄杖云不是法界是諸人無始已來靈明廓徹廣大虗寂之妙體故此土他界天堂地獄六凡四聖情與無情同一無異無壞無雜猶帝網之明珠互相融通更相涉入可謂無邊剎境自他不隔於毫端十世古今始終不離於拄杖頭上若爾則何啻擲大千於方外納須彌於芥中而今百億日月百億須彌百億世界都在拄杖子裏許乃擲下云擲在諸人面前還見麼信得及麼不思議解脫力神通游戲妙用現前非假於他術皆吾心之常分耳喝一喝下座出州回上堂古人道去去實不去途中好善為來來實不來路上莫虧危古人見不透脫強生節目惑於後人洞山即不然來但言來去但言去有什麼過老僧入州途中晚便住曉便行又善為箇什麼歸來路上困便歇飢便飯又有什麼虧危今復林下與諸道人相見又有什麼事參退喫茶上堂季冬極寒伏惟知事首座大眾尊體萬福仲冬已過孟春未來季冬現前過去已過去未來實未來現在當無住三世既不留四時何處去若爾則衲僧門下是是非非長長短短有什麼過喝一喝下座上堂入州僅十日出縣又兩朝此心苟無為動靜皆逍遙拈拄杖云拄杖子不可不逍遙良久云莫動著動著則打折你驢腰晚參上堂舉僧問古德覿面來時如何答云分付與典座又云如何是有漏答云笊籬如何是無漏答云木杓師云笊籬木杓一時分付與典座更莫外求一一現成物雖常式妙在乎人有底祇在面前拽不來推不去縱拽得來又千疑萬慮不敢用有底信手拽來超今越古所以僧問雲門如何是超佛越祖之談門云餬餅諸禪德好省力是即是還有超佛越祖底道理也無試斷看斷得出僧堂裏一任橫咬竪咬若斷不出有煩新舊二典座上堂舉古有僧半夜大叫云我悟也傍僧把住云你悟箇什麼其僧云師姑元是女人做師云善即甚善賺殺多少人却須知有賺人處洞山也有箇悟處且道悟箇什麼化主元是徒弟做美即甚美笑殺多少人却須知有笑人處賺人笑人兩語雙陳飽參衲子試辨親疎上堂僧問新豐吟雲門曲舉世知音能和續大眾臨筵願清耳目師以右手拍禪床一下進云木人撫掌石女揚眉師以左手拍禪床一下進云猶是學人疑處師云何不脚跟下薦取僧以坐具拂一拂師云爭柰脚跟下何進云却是和尚見處師云爾見處又作麼生僧云三十年後自有人舉著師云蒼天蒼天復云僧問雲門如何是雲門一曲門云臘月二十五師云今日是臘月二十五若作雲門曲又是臘月二十五若作臘月二十五又是雲門曲又云唱者如何門云且緩緩師云雲門云且緩緩為不肯這僧也別有道理良久云一般佛法從人妙兩處誵訛試斷看歲旦上堂去年貧未是貧今年貧始是貧去年貧猶有卓錐之地今年貧錐也無師云香嚴與麼道奇特甚奇特要且只知其貧不知其富洞山即不然去年富未是富今年富始是富去年富唯有一領墨黲布褊衫今年富添得一條百衲山水袈裟歲朝抖擻呈禪眾實謂風流出當家諸禪德洞山與麼為復是不肯古人耶為復扶古人耶試辨看立春日因雪上堂大地雪漫漫春來依舊寒說禪說道易成佛作祖難洞山則不然而今坐立一一成佛作祖何更有難有易遂拈拄杖云不可不成佛所以假言三十二八十也空聲拄杖子喚作成佛不是空聲釋迦彌勒文殊普賢不是空聲而今觸目遇緣萬別千差不是空聲都無實事佛法到者裏也要人有麼有麼乃擊香臺下座上堂發化主舉王大王向雪峰會裏請晏監院住鼓山雪峰謂眾曰有一隻聖箭子入九重城裏建立佛事去也有孚上座去中路截住問云承聞聖箭子入九重城裏去是否晏云是孚云忽遇三軍圍繞時如何晏云他家自有通霄路孚云與麼則離宮失殿去也晏云何處不稱尊孚遂回謂雪峰云聖箭子途中折了也峰云他道什麼孚舉前話峰云奴奴他語也得孚云和尚肐膊終不向外曲師云雪峰雖為一千五百人善知識受侯王供養福報因緣即不無若是佛法未在洞山則不然云和尚聖箭子途中折了也云他道什麼師云待伊舉了拽拄杖打將出去一使孚上座於後作箇本色衲僧二與聖箭子出其鋒鋩三與禪門作箇真正宗匠為後人眼目諸禪德是也不是有眼者辨取良久云洞山也有三隻聖箭子各往一方作大佛事莫有作家戰將向途中截住將聖箭子總與摺折却來洞山手裏請棒喫有麼有麼若無明日普請向新豐亭上隨例喫茶相送上堂舉悟本大師云古路坦然誰措足無人解唱還鄉曲清風月下守株人涼兔漸遙春草綠乃拈拄杖云不是古路豈不坦然我措足也海印發光只是少人信復擊香卓云不是還鄉曲且作麼生唱若唱得五音六律應難比步步逍遙達本鄉唱未得也守株月下渾閒事却恐蹉跎過一生喝一喝下座施主捨大藏經函上堂僧問施主入山崇勝事琅函星布意如何師云天無私蓋地無私載進云恁麼則佛法得人永鎮龍宮師云日月昭彰進云一人有慶兆民賴之師云者僧却善知時節進云施主霑恩學人禮拜復云世出世間法立處皆相參舉天便有地舉北便知南舉僧便見俗舉聖便明凡以新當見舊以經方顯函宜哉一一法所立皆雙兼雙兼不涉二所立無不堪此大解脫門智者乃深諳故石頭禪師云當明中有暗勿以暗相覩當暗中有明勿以明相遇明暗各相對比如前後步乃拈拄杖云且道是明是暗跳得出也大奇跳不出且在明暗裏只這明暗也大難明遂擊香卓下座上堂丹霞燒木佛院主眉鬚落又教中云未見自作他受他作自受若爾則禪門與教乘敵體相違故丹霞自燒木佛傍僧受殃未審此理如何莫有人明得麼良久云若無人唯澄公首座深明此理希諸高德旦暮親而扣之就而明之下座上堂丹霞燒木佛院主眉鬚墮落驀拈拄杖云不是木佛便擲下云誰敢燒你擬即眉鬚墮落不擬又且如何遂高聲叫行者拈起拄杖下座上堂僧問江西佛手驢脚接人未審聖壽如何接人師云鮎魚上竹竿進云全因今日去也師云烏龜入水僧云大眾證明學人禮謝師云你作麼生會僧便喝師云掠虗漢僧又喝師云一任𨁝跳僧云也不得放過師却喝復云五月六月飛霜散雪水中火中藕白蓮紅參解夏日小參師云有問話者麼乃以拂子擊禪床云天地造化有陰有陽有生有殺日月照臨有明有暗有隱有顯江河流注有高有下有壅有決明王治化有君有臣有禮有樂有賞有罰佛法住世有頓有漸有權有實有結有解結也四月十五十方法界是聖是凡若草若木以拂子左邊敲云從者裏一時結舉拂子云總在拂子頭上還見麼乃喝云解也七月十五日十方法界若草若木乃聖乃凡以拂子右邊敲云從者裏一時解舉拂子云總在拂子頭上還見麼乃喝云祇如四月十五日已前七月十五日已後且道是解是結舉拂子云總在拂子頭上還見麼乃喝云諸高德此三喝中有一喝是金剛王寶劒有一喝是踞地師子有一喝是探竿影草若人一一辨得始見臨濟大師道出常情黃檗被掌大愚遭築雖相去三二百年許你親為的子然後大開不二妙門權諸祖道摧邪顯正扶宗立教整頓頹綱縱大知見耀大法眼不動本際決勝魔軍乃喝云更須知有一喝不作一喝用到者裏須是具爍迦羅眼向未屙已前驀提得去諸德且道提得箇什麼良久喝一喝下座因檀越入山小參師云眾中還有具頂門上眼底衲子出來照天照地看問鋪蓆既開當路畔行人爭忍不相過師云我者裏釣鼇魚跛鼈出來作什麼進云未審招賢事如何師云你不是賢者進云欲觀深閤內更打一重關師云笑殺傍觀問一棒一喝未當宗乘說妙談玄全乖道體去此二途請師端的師云葛藤杜家別置一問來進云若然者猶未是衲僧分上事師云是進云相識滿天下知心能幾人師云杜撰禪和進云三十年後有人舉此話去在師呵呵大笑問昔日龍女獻珠得成佛道未審施主設齋還成佛也無師云善惡若無報乾坤必有私進云施主知心如何領會師云知心底事作麼生進云有水皆含月無山不帶雲師云却是闍黎會得好復云還更有問話底麼良久云三十年弄馬騎却被驢撲遂撫膝云直得須彌岌嶪海水騰波三十三天一時退位十八大地獄盡乃停酸見麼若者裏見得釋迦拱手彌勒攢眉文殊普賢與伊作侍者若也不見看我七縱八橫且向葛藤裏薦取阿呵呵諸高德且道我笑箇什麼噫我笑昔日雲門臨濟德山巖頭螢火之光蚊蚋之解一人道我呵佛罵祖一人道我得末後句一人道黃檗佛法無多子一人道大覺世尊初生下時一手指天一手指地天上天下唯我獨尊我當時若見一棒打殺與狗子喫似者一隊掠虗漢總直一期無佛處稱尊若是如今喚來一時與伊生按過自餘之輩放過即不可豈不聞僧問乾峰云十方薄伽梵一路涅槃門未審路頭在什麼處乾峰拈拄杖云在者裏祇如乾峰恁麼曾夢見也未若是老僧即不然十方薄伽梵一路涅槃門未審路頭在什麼處擗脊便棒却問伊路頭在什麼處待伊擬開口熱喝出去更有箇雲門折脚老比丘不分緇素不辨正邪拈扇子云𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾似者般和泥合水漢糞掃堆裏埋却十箇五箇又有甚過阿呵呵樂不樂足不足而今幸對山青水淥年來是事一時休信任身心嬾狗束大眾休瞌睡好下座
