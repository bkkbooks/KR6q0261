body:
  text: 佛照禪師奏對録宋淳熙三年十一月初三日孝宗皇帝召對便殿致恭三呼訖賜坐師奏云今春伏蒙聖旨令灑掃靈隱三月三十日又准降香開堂實增感激令蒙召對獲覩清光千載一遇帝問師生何處嗣法何人師對曰臣生長臨江軍禮南山光化禪院長老普吉為師荷陛下天地覆載之恩行腳參五十餘員善知識末後於大慧禪師宗杲處打徹遂法嗣之上曰朕惜不見大慧師云陛下既留心祖道時時與大慧於大光明藏把手共行豈在聚頭接耳為相見耶嘗蒙賜語録入藏作萬世光明種子非獨法門增輝臣與天下衲子不勝榮幸上曰且喜得晴師云郊祀在即乃陛下聖德所感上曰朕此心與佛心通師云直下更無第二人聞陛下萬機之暇留心祖道游泳楞嚴圓覺自古帝王未有如陛下篤信此道上曰自古帝王英雄者有之信此道者極少如梁武帝亦未徹師云當面蹉過達磨上曰陷在泥坑裏師云只為柄不入手不得受用師云臣山野語言無倫恐瀆聖聰上曰這裏正要與長老忘懷論道師云陛下日應萬機直須向一切處著眼看是什麼道理上曰天下事來即應之師云可謂明鏡當臺物來斯照上曰步步踏著實地師云直須恁麼始得上曰臨濟因緣可舉一二師遂舉臨濟在黃蘗因第一座勉令問黃蘗如何是佛法的的大意蘗遂與三十棒如是三次問每蒙賜棒所恨愚魯且往諸方去第一座遂白黃蘗云義玄上座雖是後生却甚奇特他日為一株大樹蔭覆天下人去在他若來辭和尚願垂提誨濟明日力辭黃蘗蘗指往大愚處必為汝說濟至大愚愚問甚處來濟云黃蘗來愚云黃蘗有何言句濟遂舉前話復云不知過在甚處愚云黃蘗恁麼老婆心切為汝得徹困猶覓過在濟於是大悟乃云元來黃蘗佛法無多子愚云尿床鬼子適來道我不會而今道甚無多子是多少扭住云道道濟便向大愚肋下築三拳愚托開云汝師黃蘗非干我事濟返黃蘗蘗問云來來去去有甚了期濟云只為老婆心切遂舉前話蘗云這大愚老婆饒舌待見與打一頓濟云說甚待見即今便打遂與黃蘗一掌蘗吟吟而笑云這風顛漢來這裏捋虎鬚濟便喝蘗云侍者引這風顛漢來參堂去上曰悟了直是快活師云溈山問仰山云臨濟得大愚力得黃蘗力仰云非但捋虎鬚亦解坐虎頭自此臨濟法道大興上曰源流好師云臣曾有頌上曰舉看師舉云黃蘗山頭遭痛棒大愚肋下報冤讎當機一喝驚天地直得曹溪水逆流又問興化打克賓克賓如此答興化如何便打師云不可放過臣有頌上曰舉看師舉云罰錢出院揚家醜興化聱頭遇克賓父子不傳真祕訣棒頭敲出玉麒麟師復云昔翠巖可真禪師頌即心即佛非心非佛因緣曰百萬雄兵出將軍獵渭城不間弓矢力斜漢月初生令晦堂心禪師看後因答客問西來意有頌東吳幾度為間客南越曾經作主人可笑年來身老大得同塵處且同塵真見之云子徹也且如即心即佛非心非佛陛下如何會上云包含萬像師云包含萬像底是什麼上曰對面底是師云認著依前還不是上乃默契上曰長老且歸觀堂師云謹領聖旨乃辭下殿繼而遣中使賜御製頌一首曰大暑流金石寒風結凍雲梅花香度遠自有一枝春師答山頌一首曰當陽一句子平地步青雲踏翻關棙處便是主家春初四日復進即心即佛非心非佛一頌即心即佛無蹊徑非佛非心有變通直下兩頭俱透脫新羅不在海門東上復答師頌一首曰欲言心佛難分別俱是精微無礙通跳出千重縛不住天涯海角任西東師再山頌云一句截流心路絶千差萬別豁然通等間更進竿頭步莫問西來及與東復召對賜坐師云夜來今日兩蒙宣示御頌神思粲發夜來頌好不如今日頌語句尤痛快上曰夜來得長老開發乃有此頌師云陛下前後宣諸山尊宿論道如何上曰難得似長老直截師云聞陛下於心隨萬境轉轉處實能幽隨流認得性無喜亦無憂處得個入頭但未曾遇人上曰真個如此師云如人學射久久自然中的所以五祖演禪師云悟了須是遇人始得若不遇人十個有五雙杜撰上曰須要遇人師云正是遂舉羅山問石霜云起滅不停時如何霜云直須寒灰枯木去一念萬年去函蓋相應去純清絶點去山不契却往巖頭處問起滅不停時如何巖頭喝云是誰起滅山於此大悟上曰長老意謂如何師云巖頭與他本分草料上曰長老見大慧幾年後打徹師云臣癸亥年有個發明了却被禪道佛法礙又做十五年工夫後到育王一見大慧便打徹慧一日掛牌臣入室慧舉僧問趙州如何是趙州州云東門西門南門北門你作麼生會答云大小趙州坐在屎窖裏慧云你甚處見趙州答云莫瞌睡慧打一竹篦云只恁麼做工夫答云莫掩彩慧乃喚侍者問這僧名什麼答云不得名慧云你看這漆桶亂做答云未為分外便出又一日入室慧問喚作竹篦則觸不喚作竹篦則背如何答云請和尚放下竹篦與學人相見慧擲下竹篦云如何相見答云伎倆已盡慧云你看這漢又來老僧頭上行答云也是尋常行履處禮拜便出又一日入室慧問喚作竹篦則觸不喚作竹篦則背不得下語不得無語不得意根下卜度不得向舉起處承當速道速道答云杜撰長老如麻似粟慧云你是第幾個答云今日捉敗這老賊慧深肯之上曰如此相投師云禪家當機不讓遂舉靈雲見桃花悟道頌云三十年來尋劒客幾回葉落又抽枝自從一見桃花後直至如今更不疑玄沙云諦當甚諦當敢保老兄未徹在每舉問禪和子那裏是不疑處陛下且道那裏是不疑處上擬議師云只就疑處看驀然看破不疑處便是陛下受用不盡底上曰長老且道那裏是不疑處師云紅爐上一點雪上乃點頭師云昔黑齒梵志得五神通常在雪山說法得梵王帝釋閻羅王洎諸天神常來聽法日說法畢閻羅王目視梵志而泣志曰大王何得視吾而泣王曰吾觀於汝善能說法七日後命終當來吾界受諸苦痛梵志惶怖求免無門雪山諸天神謂梵志曰欲免斯難唯有大覺世尊乃能為汝免得此難梵志曰世尊者何人也天神曰豈不聞淨飯王太子十九出家三十成道為人天師其名曰佛諸大菩薩八部龍天常轉法輪度一切衆生梵志聞已復作思惟我去見佛將何供養乃運神力手執合歡梧桐華兩株飛空向世尊前供養世尊召五通梵志志應諾世尊云放下著梵志棄左手華於世尊前世尊又云放下著梵志又棄右手華於世尊又云放下著梵志云世尊我祇擎兩株華一時放下了我今空身無可放捨世尊云五通梵志吾非教汝放捨其華汝當放捨內六根外六塵中六識一時捨却到無可捨處是汝免生死處梵志乃於言下悟無生法忍上曰只是人不向緊要處做工夫師云欲得徑捷須離却語言文字真實參究所以古德道念得楞嚴圓覺經猶如瀉水響泠泠有人問著西來意恰似蚊䗈咬鐵釘上曰直是難入師云正好著力上曰如長老者難得真可為人師師云陛下過褒初六日復召對上曰觀堂中穩便麼師云荷陛下聖眷極穩便上曰前日長老云直至如今更不疑處朕有一轉語師云那裏是不疑處朕有一轉語師云那裏是不疑處上曰空手牽鐵牛師云如何見得上擬議師云才入思惟便成剩法上曰若問長老如何祇對師云千聞不如一見上喜曰朕且做工夫師云陛下果位中承願力來示現帝王身不被富貴聲色籠但念念扣己而參驀然一念相應如桶底子脫相似直至成佛永無退轉師云若論此事如兩陳對敵進前則有活路若望崖而退不是丈夫漢昔香嚴參溈山溈山云我聞你在百丈處問一答十問十答百是否嚴云不敢山云試向父母未生已前道一句看嚴無語乃云請和尚為某甲道山云我若為汝說破子他時後日眼開罵我去在嚴遂檢尋平日看讀文字討一句祇對了不可得乃云今生不學佛法也且作長行粥飯僧乃辭溈山往南陽覩忠國師遺跡遂憩止焉一日芟除草木以瓦礫擊竹作聲忽然大悟遽歸沐浴遙禮溈山云和尚大慈恩踰父母當時若為我說破何更有今日事乃述一頌云一擊忘所知更不假修持動容揚古路不墮悄然機處處無踪跡聲色外威儀諸方達道者咸言上上機歸告溈山溈山舉似仰山仰山云待某甲勘過乃云聞師弟有悟道頌試舉看香嚴舉了仰山云此是間時計較得底香嚴再舉一頌云去年貧未是貧今年貧始是貧去年貧有卓錐之地今年貧錐也無仰山云只會得如來禪未會祖師禪香嚴又舉一頌云吾有一機瞬目視伊若也不會別喚沙彌仰山云且喜師弟會祖師禪上曰如來禪與祖師禪一般何故分別師云殺人活人不眨眼上曰莫便是昨日道諦當甚諦當敢保老兄未徹麼師云陛下須具透關眼始得上曰如長老直截者難得想見為衲子尤切師云臣不避誅昨以直言上曰正要如此師云先師大慧與溈山佛性泰禪師同參圓悟一日持論古今次泰曰香嚴悟道頌云一擊忘所知只消此一句便了大慧云五祖演和尚頌狗子無佛性話云趙州露刃劒一句便了下面都是注腳悟了底人與悟了底人說話如兩鏡相照直是明白如陛下道欲言心佛難分別一句便了下面三句亦是注腳上曰適來道父母未生前一句子朕道得也師云如何是父母未生前一句上曰昨夜今朝又明日師云若如此方得古今無間斷上曰何不挨拶師云拶著須是有出身之路上曰長老可謂循循然善誘人聖訓謙沖非臣敢當師云臣不敢久居觀堂乞歸靈隱上曰更要與長老說話在師云謹領聖旨却歸觀堂至初七日中使傳旨且歸靈隱待賜禪號師遂歸靈隱四年正月二十四日特賜佛照禪師號師領衆門迎勑黃歸寺次至法堂捧敕黃示衆云天書親自日邊來一道神光遍九垓為瑞為祥恩力大直教枯木解花開舉起便知不妨慶快苟或未然重宣一遍遂升座拈香云此一瓣香恭為祝延兩宮皇帝聖壽無疆乃斂衣就座僧問九重宣對超過南陽忠國師五宿禁闈提持聖諦第一義與二千年前釋迦老子出氣使後五百世比丘增長威光佛照禪師蒙特賜世間出世更無雙是什麼得恁麼奇特師云彼此一時皆盛事未必今人愧古人進云兵隨印轉將逐符行師云正令已行風凜凜斗間劒氣燭天光進云同光帝問興化朕收中原獲得一寶至今未有人酬價興化云略借陛下寶看帝引手舒幞頭腳示之意旨如何師云奇特中奇特進云龍袖拂開千聖眼金毛師子現全威師云點進云興化道君王之寶誰敢酬價又作麼生師云古今榜樣進云普光明殿裏撥轉上頭關師云虎頭虎尾一時收進云只如知恩報恩一句如何話會師云一雨普霑沙界潤羣生何處不承恩進云飛來峯頂瞻天闕選佛場中謝聖恩師云錦上鋪花僧禮拜又僧問直截根源到日邊帝恩降自九重天中興吾道超今古佛放毫光照大千既沐宸恩請師祝聖師云萬年松在祝融峯進云一言已祝南山壽八表無私賀太平師云當頭道著進云直得九重城畔祥雲起七寶山前瑞氣生師云清風來未休進云君恩師已報祖意又如何師云一著高一著一步闊一步進云王道與祖道相去多少師云不隔一絲毫進云靈雲見桃花悟道意旨如何師云更參三十年進云只如空手牽鐵牛意旨如何師云非子境界進云未審向什麼處見靈雲師云撞著額頭磕著鼻進云莫謂靈雲消息斷桃花依舊笑春風師云逢人不得錯舉僧禮拜師乃云當陽目擊直下知歸左右逢原七通八達著著有出身之路頭頭具透脫之機有時神出鬼沒換斗移星有時八字打開兩手分付恁麼也得不恁麼也得恁麼不恁麼總得我為法王於法自在放去收來有何罣礙直得龍驤鳳翥鸞翔奇特中奇特殊勝中殊勝正當恁麼時且道知恩報恩一句作麼生道吾皇萬萬年復舉黃蘗和尚示衆云汝等諸人盡是不著便底恁麼行腳何處有今日還知大唐國裏無禪師麼師著語云打草要蛇驚時有僧出衆云只如諸方聚徒領衆又作麼生蘗云不道無禪只是無師師云黃蘗眼觀東南意在西北點檢將來未免面皮厚三寸且道靈隱恁麼批判意在什麼處從前汗馬無人識只要重論蓋代功下座師淳熙戊戌十月初二日召對便殿引見致恭即日孟冬薄塞恭惟皇帝陛下聖躬萬福臣前冬𣵡奉清光繼蒙頒賜禪號仰荷聖恩賜坐師就坐上曰朕近看華嚴經至善財入法界品思見善知識如卿在前師云陛下今日召臣僧陛下是主臣僧是伴主伴交參機感相投便是入華嚴法界所以道無邊剎境自他不隔於毫端十世古今始終不離於當念此乃不出陛下一念上曰是朕得暇常於損齊靜坐但日用事繁不能純一師云陛下但正心術自然如明鏡當臺物來斯照上曰朕每見臣僚上殿開口便知他肺腑可與者即與不可即不與師云世間事不出一個公字上曰是如此朕每看方冊自古帝王無悟道者師云古今唯陛下一人更須退步體究方得純一覺得省力處便是得力處上曰秀才家多不信佛法師云佛者覺也須是當人見性成佛昔有一官人著無佛論呈仰山接得便問云公所述論意謂本來有佛故論謂本來無佛故論官人無對山又云若本來有公爭得云無若本來無今製此論豈不成有官人又無對上曰好一拶師云三教聖人設教只要整頓今人腳手且如孔子道二三子以我為隱乎吾無隱乎爾此乃八字打開自是時人不會上曰孔子好孟子辨不及孔子師云陛下聖明見得甚親切昔德山和尚道凡有文字語言盡是依草附木竹石精靈所以老僧從頭棒將出去待有獨脫底出來共伊商量陛下須是獨脫始得上曰朕未嘗放捨此事師云此事無有窮盡譬如入海轉深上曰是宗門緊要因緣更舉一二師云昔興化和尚一日見同參來才上法堂化便喝僧亦喝行三兩步化又喝僧亦喝須臾近前化拈棒僧又喝化云你看這漢猶作主在僧擬化便打直打下法堂却歸方丈侍僧問云適來僧有甚言句觸忤和尚化云是他適來也有權也有實也有照也有用我將手向伊面前橫兩遭却去不得似這般漢不打更待何時上曰如此作家師云只如興化道我將手向伊面前橫兩遭處這些子須是著眼向上看得透始得此是臨濟骨髓上曰山中想多有衲子理會得者師云做工夫者極多亦有受得鉗鎚者上曰聞說住持得甚好師云上感聖恩乃辭下殿師淳熙七年四月二十九日進劄乞歸老明州阿育王山廣利禪寺奉聖旨依准至五月三十日召對便殿賜坐上曰禪師何遽思山林而去朕耶師云臣本是山林人今復山林去理當然也既此心契合雖千里對面又安能逃於至化也昔南泉和尚道山僧自小牧得一頭水牯牛擬向溪東放不免食他國王水草擬向溪西放亦不免食他國王水草臣今雖歸林下實不出陛下所統上曰然但不得時復論道師云道不可說時有不說時無且諸天天鼓常演苦空彌陀國上水鳥樹林皆悉念佛念法儻正念現前喧寂不間則彈絲吹竹皆談實相也上曰造次必於是師云直須如此上曰朕今心意釋然常自怡說且如尋常所做工夫并所作偈頌語言透徹已否師云陛下乘夙願力下生以夙熏種智純熟聞舉便知落處既知落處自然身心喜悅此乃初心入道境界暫得如是實未曾啐地折嚗地斷百了千當如臣所見陛下所得正住歡喜地耳上曰何謂歡喜地師云菩薩進修有十地歡喜乃初地故經云若有菩薩深種善根善修諸行善集助道乃至立廣大智生廣大解慈悲現前又云菩薩始發如是心即得超凡夫地入菩薩位生如來家乃至決定當得無上菩提住如是法名住歡喜地菩薩住此地成就多歡喜今陛下心意釋然常自怡悅正合此耳上曰餘九地可盡說師云辭繁恐浼聖聽容別具奏聞上曰古來悟得性燥者誰師云臨濟水潦德山巖頭諸大老皆悟得性燥上曰說看師云臨濟因緣向來已曾舉了如水潦參江西馬大師當胸踏倒忽然大悟起來撫掌大笑云百千三昧無量妙義盡向一毫頭上識得根源去已後示衆每云自從一喫馬師踏直至如今笑不休又呵呵大笑上曰悟後直得如此快活師云這個便是啐地折嚗地斷底樣子上曰德山巖頭如何師云德山參龍潭因侍立至夜深潭云子且下去山便珍重揭簾而出却回云外面昏黑龍潭乃點紙燭度與德山山擬接潭即吹滅山便禮拜潭云子見個什麼道理山云某甲從今日去更不疑天下老和尚舌頭後來保寧勇和尚頌云一條瀑布巖前落半夜金烏掌上明大開口來張意氣與誰天下共橫行又巖頭參德山才跨門便問是凡是聖德山便喝巖頭便禮拜洞山聞得乃云若不是奯公也大難承當巖頭云洞山老漢不識好惡我當時一手擡一手搦上曰祖師也是性燥俗人中還有如此者麼師云有如本朝李附馬問石門聰和尚云弟子欲學禪得否門云此是大丈夫事非將相之所能為李於是契悟乃述頌云學道須是鐵漢著手心頭便判直趣無上菩提一切是非莫管上曰俗人能如此也難得師云此事無僧無俗上至佛祖下及蠕動皆悉具足故古人有言悟則事同一家不悟則萬別千差上曰至言朕須到此田地方已師云佛法至妙無有窮已如有窮已則成住著才成住著便有窠臼如僧問石霜撥塵見佛時如何霜云直須揮劒若不揮劒漁父棲巢望陛下卓起脊梁以金剛王寶劒揮除見刺自然一著高一著一步闊一步佛祖亦奈何不得也上曰當如禪師之言今辭朕去後幾時復來師云臣既歸林下不敢妄動上曰每遇朕生辰可來一次師云謹領聖旨乃辭下殿上賜御製云禪師所陳菩薩十地乃是修行漸次從凡入聖夫復何疑方知腳踏實處十二時中曾無間斷以至圓熟雜染純淨俱成障礙任作止滅脫此禪病當如禪師之言常揮劒刃卓起脊梁發心精進猶恐退墮每思到此兢兢業業未嘗敢忽今俗人乃有以禪為虗空以語為戲論其不知道也如此事至大豈在筆下可窮也聊敘所得耳師淳熙九年十月十一日恭奉聖旨召對便殿起居并進香畢師云臣恭別聖顏三載荷陛下恩覆隆厚臣與徒衆日夕焚誦仰報萬一上曰聞安衆行道不易師云上感聖恩良久賜坐上曰久思與禪師說話師云陛下聖明天縱道德日新大圓鏡中初無間隔上曰做工夫如何得徹師云做工夫是有心打徹是無心陛下但於日用應緣處常常提撕上曰朕於日用應緣甚覺得力師云只這得力便是受用處陛下地位中人乘願力而來示現帝王身但正心術於富貴聲色中使得富貴聲色乃見力量正如趙州道時人被十二時辰使老僧使得十二時辰底道理七月間蒙賜問以物見則惑以目見則著臣嘗對云見見之時見非是見此語乃體聖意而對上曰善師有語云心不負人面無慚色上曰好個心不負人面無慚色如向來所答圓覺經中四病語亦愜朕意且如經中道居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實大意如何師云這個境界須是親證自然世出世間打成一片昔妙喜因讀至此嘗有頌上曰舉看師云荷葉團團團似鏡菱角尖尖尖似錐風吹柳絮毛毬走雨打梨花蛺蝶飛上曰好頌別有甚因緣更舉一二師云昔興化大覺會下每云我在南方二十年腳尖頭未嘗踢著個會佛法底覺云你據什麼道理化便喝覺便打化又喝覺又打至明日大覺在法堂上見興化乃云我直下疑你昨日兩喝化便喝覺便打化又喝覺又打化云我在三聖處學得賓主句總被師兄折倒了也覺云這漢來這裏納敗闕脫下衲衣痛打一頓化於是大悟上曰古人相見直是痛快師云臨濟不作用當如此上曰見禪師舉此𮌎次豁然師云又如俱胝住庵時有一尼戴笠子繞禪床一匝云道得即放下笠子胝無對尼拂袖便打胝云何不且住尼云道得即住胝又無對尼去後自歎云我雖是丈夫漢無丈夫志氣擬棄庵往諸方參學其夜山神告曰不須下山將有肉身大士來為和尚說法也果旬日天龍舉起一指示之胝下大悟後凡有問只舉一指有一童子每見人問事也舉指祗對有人謂胝曰和尚這童子也會佛法凡有所問也舉一指胝聞得一日潛袖刀子喚童子問云聞你也會佛法是否童子云是胝云如何是佛童子舉起一指頭被胝一刀斫斷童子叫喚走出胝遂喚童子子回首胝云如何是佛童子將手起不見指頭忽然大悟上曰俱胝為人如此切師云俱胝自謂我得天龍一指頭禪一生受用不盡上曰正如彈琴初拘指法已後絃指俱忘自然得妙師云又如惠超問法眼如何是佛眼云汝是惠超法眼與麼答聖意以謂如何上曰昨夜三更月正明師云陛下多了這一句上曰曾有人頌麼師云有雪竇頌云江國春風吹不起鷓鴣啼在深山裏三級浪高魚化龍癡人猶戽夜塘水又白雲頌云一文大光錢買得個油糍喫放肚裏了當下便不飢上曰古人製頌大能顯理師云昔保寧嘗作清淨行者不入涅槃破戒比丘不入地獄頌云平生疏散無拘檢酒肆茶坊任意游漢地不收秦不管又騎驢子下揚州上曰可謂雲無心而出岫鳥倦飛而知還師云陛下此語暗合孫吳昔佛果與妙喜俱愛前頌佛果云我二人各說一頌要勝過他底時有小兒子於窗外念壁上安燈盞堂前置酒臺悶來喫三盞何處得愁來妙喜云某甲頌得了也適來兒子念便是圓悟大喜乃云我與你改一字可作悶來打三盞大底古人發揚先德因緣所有言句乃借路經過爾其實縱橫妙用於言意之外初不在文飾上曰甚善復云臣不敢久坐謝恩下殿師紹熙元年十一月初八日壽皇召對賜坐師云陛下釋萬機燕御重華想於此道日有新證壽皇云朕向來得禪師開發日用便覺省力師云省力處得無限力得力處省無限力壽皇云朕於一切事物亦不著師云陛下視天下如脫敝屣以寶位授聖子俾太祖丕祚中興的的相承綿億萬載若非得大自在受用三昧焉能如是遂舉喚作竹篦則觸不喚作竹篦則背陛下如何會壽皇云放下著師云放下即不無著在什麼處壽皇云二邊不立師云如何行履壽皇云中道不安師云正坐在百尺竿頭陛下如何進步壽皇擬議師噁一聲壽皇云謝禪師提撕壽皇云世法佛法不出這背觸兩字師云若能轉物即同如來遂指御案淨瓶云只如淨瓶作麼生轉壽皇云去來自在師云去來自在底是什麼壽皇咳嗽一聲師云更進一步始得壽皇朕直是要打徹師云但辦肯心必不相賺壽皇復云禪師所陳直指因緣甚好其間亦有理會不得處師云陛下但扣己研窮自然七通八達壽皇云因緣更舉一二師舉夾山初住潤州鶴林時道吾到遇上堂有僧問如何是法身云無相如何是法眼云法眼無瑕吾不覺失笑夾山便下座請道吾問某甲適來祗對僧話必有不是處致令上座失笑望上座不吝慈悲吾云和尚一等是出世未有師在夾山云某甲甚處不是望為說破吾云某甲終不說請和尚却往秀州華亭船子處去夾山云此人如何吾云此人上無片瓦下無寸土和尚若去須易服裝束夾山乃散衆易服直造華亭船子才見便問大德住什麼寺夾山云寺即不住住即不似船子云不似又不似個什麼夾山云不是目前法船子云甚處學得來夾山云非耳目之所到船子云一句合頭語萬劫繫驢橛船子又問垂絲千尺意在深潭離鈎三寸子何不道夾山擬開口船子以篙打落水中才上船船子又云道道擬開口又打夾山於此有省乃點頭三下壽皇云他到此悟也師云可謂慶快平生師又曰船子云竿頭絲線從君弄不犯清波意自殊夾山遂問拋綸擲釣師意如何船子云絲懸淥水浮定有無之意夾山云語帶玄而無路話頭談而不談船子云釣盡江波金鱗始遇夾山乃掩耳船子云如是如是遂囑云汝向去直須藏身處沒踪跡沒踪跡處莫藏身吾二十年在藥山單明斯事汝今既得他後不得住城隍聚落但向深山裏钁頭邊接取一個半個接續無令斷絶夾山乃辭行頻頻回顧船子遂喚闍黎闍黎夾山回首船子舉起橈云汝將謂別有乃覆船入水而逝壽皇云此公案好禪師曾頌否師云有頌驀口一橈全殺活點頭三下鼻遼天至今千古風流在誰道華亭覆却船壽皇云好頌師云不敢謝恩下殿師紹熙四年二月十九日壽皇聖帝召對於苑門宣引壽皇望見師曰遠來不易師云即日仲春謹時恭惟至尊聖躬萬歲萬萬歲至尊賜坐師云臣昨自庚子年蒙恩歸老育王今十四年矣幸無曠敗藉陛下蔭覆去年臘月十六日蒙聖恩移住徑山臣兩入奏告兩宮辭免至尊云此南內之意朕亦要與禪師說話遂教師速渡江相見師云今日再覩清光不勝榮幸至尊云朕意師十六七渡江師云臣十四渡江如履平地至尊云聞古有浮笠而渡者師云昔日黃蘗和尚路逢異僧同行乃一羅漢至天台值江漲不能濟植杖久之異僧以笠當舟登之浮去黃蘗指而罵曰這自了漢我早知汝定捶折其脛異僧乃歎曰道人猛利非我所及至尊云可謂神通師云宗門下不貴神通只貴眼明至尊云須是如此始得朕尋常不信幻怪等事師云陛下聖智洞明見得如此至尊云莫也寬住幾日師云臣已選二十五日入院至尊云師所至處緣熟師云上感聖恩至尊云朕每日常誦楞嚴圓覺并儒書終日翛然無一事師云足見陛下聖學日新大抵看經教展卷時便與古人對偶正不在多讀至尊云朕常念茲在茲師云陛下乃菩薩地位中來所以願力堅固然一切語默動靜處直教正念現在莫起第二念只如臣即今與陛下相對臣又安知陛下微細流注處只此微細流注處謂之偷心偷心若無自然不起第二念至尊云朕得禪師提這一念不為無補師云昔日雪峯和尚出嶺參秀州精嚴靈光禪師值靈光遷化雪峯問其徒曰靈光在日如何指示學者其徒曰但云莫起第二念至尊云這一則語可以指示人做工夫師云所謂棒打石人頭嚗嚗論實事至尊云有甚機緣更舉一二則師云昔紙衣道者參曹山山云如何是紙衣下事道者云一裘才挂體萬法悉皆如山云如何是紙衣下用道者近前應諾便脫去山云汝只解恁麼去不解恁麼來道者忽然開眼問云一靈真性不假胞胎時如何山云未是妙道者云如何是妙山云不徣借道者珍重復脫去曹山乃有頌云覺性圓明無相身莫將知見妄疏親念異便於玄體昧心差不與道相鄰情分萬法沉前境識鑒多端喪本真如是句中全曉會了然無事昔時人至尊云參禪到這裏方始得受用師云古人念念無間方得到此真實田地不敢久坐聖躬謝恩下殿三月初五日壽皇諭問札云朕每日止是塊坐別做得個什麼煩師寫來師答云恭承至尊垂問每日止是塊坐別做得個什麼陛下但於塊坐處提撕看是什麼若別有即是剩法所以南臺和尚有頌云南臺靜坐一炷香終日凝然萬慮忘不是息心除妄想都緣無事可思量此是古德腳踏實地處陛下於此契證非但塊坐向四威儀中總是現成受用安樂法也謹奏四月初六日壽皇論問朕近頗悟佛法無多子一言以蔽之但無妄念而已若起妄念則有生滅未知此說是否師云恭承聖諭近頗悟佛法無多子足見聖心昭徹陛下所謂一言以蔽之但無妄念而已若起妄念則有生滅誠如聖意更能到妄忘起滅處則乾坤獨露應用縱橫方是受用三昧謹奏
