body:
  text: 寶峰雲庵真淨禪師偈頌下中嗣法門人福深録僧請問三聖問雪峰云透網金鱗以何為食峰云待你透出網來即向你道聖云一千五百人善知識話頭也不識師以頌示之潦倒漁翁坐釣臺金鱗赫赫鼓波來海門空闊才施網霹靂一聲天地開雪峰云老僧住持事大放去收來得自由不堪優處亦堪優可憐滯句承言者爭是爭非空白頭僧請問丹霞騎聖僧意旨如何千變萬化七顛八倒騎却聖僧踏倒水潦釋迦起身比丘悟道若會此意寒來著襖僧請問雪峰鱉鼻蛇因緣打鼓弄琵琶相逢一會家雲門能合調長慶解隨邪古曲非音律南山鱉鼻蛇何人知妙訣的子是玄沙僧問南臺圓和尚大隨龜話圓以手翻覆示之其僧不肯乃質於師師以頌釋之少室之妙訣觀根而密付大隨曾泄機南臺亦失誤翻手與覆手脫履著龜處明明言外傳信何有今古擲金鐘輥鐵鼓水東流日西去僧請問馬大師日面佛月面佛日面月面胡來漢現一點靈光萬化千變僧請益僧問雲門如何是正法眼門云普但無一切心自然合大道應用在臨時莫分妙不妙僧請問雲門如何是諸佛出身處門云東山水上行目前有路誰解通方東山水上求者茫茫諸佛出身處東山水上行目前一彈指遍現煞分明日面月面過佛手驢腳呈皆承此箇力言外度迷情僧曰衆中多以無事商量師復成頌多將無事會無事困人心有無俱勿念自可剖靈音落落雖殊應寥寥不在尋宜哉萬化首都祇屬于今僧請問僧問首山如何是佛法的的大意山云楚王城畔汝水東流楚王城畔水東流樹倒藤枯笑不休好是自從投子去更無人解道油油僧舉趙州庭前柏樹子話或云有此語或云無此語師以頌決之庭前柏樹子趙州無此語若是本色人直下未相許庭前柏樹子趙州有此語為報同道流覿面如何舉僧舉雲門北斗裏藏身東涌西沒北斗藏身法王法令德非有鄰趙州勘破婆子似狂不狂趙州老或凡或聖人難曉是非長短任君裁老婆被伊勘破了婆子云好箇阿師又與麼去臨岐有水復有火遇賤即貴全可可臺山一路去無差幾箇行人脫羈鎖庭前柏樹子二首庭前柏樹子我道不如松枯枝折落地打著去年棕造化無私不思力一一青青歲寒色長短大小在目前可笑時人會不得頌黃龍和尚垂示佛手驢腳生緣我手何似佛手翻覆誰辨好醜若非師子之兒野干謾為開口我腳何似驢腳隱顯千差萬錯欲開金剛眼睛看取目前善惡人人盡有生緣處認著依前還失路長空雲破日華開東西南北從君去鳥窠和尚吹布毛鳥窠吹布毛紅日午方高趙王因好劒滿國人帶刀僧問雲門如何是啐之機門云響有問啐機雲門答云響昨日雷轟天夜來山水長寶壽開堂三聖推出僧探騎飛來棒下寧瞎人翻滿鎮州城太平本是將軍致不許將軍見太平石火光中電影分怒雷隨震動乾坤耳聾眼瞎人無數誰是知恩解報恩僧問風穴如何是佛穴云杖林山下竹筋鞭杖林山下竹筋鞭水在深溪月在天良馬不知何處去阿難依舊世尊前靈雲見桃花悟道奇哉一見桃花後萬別千差更不疑獨有玄沙言未徹子孫幾箇是男兒昔日靈雲見悟時香苞紅萼一枝枝如今到處還開也陌上相逢説向誰僧問趙州狗子還有佛性也無州云無僧云上至諸佛下至螻蟻皆有佛性狗子為什麼無州云有業識在言有業識在誰云意不深海枯終見底人死不知心僧問雲門如何是吹毛劒門云骼誰謂吹毛利雲門骼可知一朝權在手看取令行時僧問龍牙古人得箇什麼道理便休去歇去牙云如賊入空室買帽相頭量才補職明眼衲僧面前不識僧問長沙了即業障本來空未了還須償夙債祇如二祖是了不了沙云空臨機無巧妙得意不勞功其如人不會聞空便謂空僧問趙州一物不將來時如何州云放下著移高就下縱威權解脫門開信可憐不得空王真妙訣動隨聲色被勾牽僧問雲門如何是超佛越祖之談門云糊餅超佛越祖之談覿面相呈誰領不知箭過新羅動地間爭糊餅雲門關棙子雲門關棙子消息少人知有時一撥動大地眼𭿇𭿇雲門抽顧雲門抽顧自有來由一點不到休休休休臨濟三度問黃檗佛法大意三度被打資糧更不著些些岐路年深恐轉賒直下痛施三頓棒夜來依舊宿蘆花臨濟到大愚處悟便言黃檗無多法大丈夫兒豈自乖脅下兩拳明有信不從黃檗付將來僧問首山如何是佛法大意山云新婦騎驢阿家牽張顛不似首山顛不動毫芒百怪全猶得黃龍再拈出四方明眼若為傳新婦騎驢阿家牽低頭拈得一文錢十字街頭拍手笑東村王老屋頭穿雲門云火裏蝍蟟吞大蟲秦時𨍏轢鑽頭通大施門開妙莫窮火裏蝍蟟依舊活拈來誰解恣英雄火裏蝍蟟吞大蟲去年不似今年窮直得黃茅瘴氣發雪壓桃花處處紅臨濟鋤茶園次見黃檗來遂拄鋤頭而立檗云者漢困那濟云鋤也未鋤困箇什麼檗以拄杖便打濟接住一送檗便倒叫云維那相救維那近前扶云爭容得這風顛漢與麼無禮檗以拄杖却打維那濟乃連鋤地數下云諸方火葬這裏一時活埋奪旗掣鼓著精神父子雖親法不親為報四方禪者道等間莫作守株人百丈再參馬祖客情步步隨人轉有大威光不能現突然一喝雙耳聾那吒眼開黃檗面興化打克賓維那丈夫當斷不解斷興化為人徹底漢已後從教眼自開棒了罰錢趂出院雲門臘月二十五臘月二十五一曲超今古鎮州大蘿蔔生長在深土僧問雲門不起一念還有過也無門云須彌山不起一念海裏須彌把來便用休別針錐百丈野狐不落藏鋒不昧分要伊從此脫狐身相逢盡道休官去林下何曾見一人寄百丈玿首座百丈雄峰倚碧虗其間今古道非孤不知一句墮狐事借問當時有也無有無聞説笑咍咍不是知音不問來莫把祖機容易泄待伊狐眼自醒開潛能展事密投機落草之談信有之言下罕逢師子子成群作隊野狐兒和酬運使蔣公頌古八絶句仰山溈仰法幢摧已久從頭提起又重新誰知斷臂傳來事光顯須憑大智人父子有時揚密意神通變化不相知喚回業識茫茫者笑倒溈山老古錐疏山呵呵大笑意難論樹倒藤枯問有因縱向明招言下悟眼開只是舊時人因茲自抱無弦琴歸隱疏山煙翠深有箇荊溪蔣居士曾聞得得訪知音末山末山不露凌雲頂今古岧嶤在目前又道本無男女相非君莫辨火中蓮非色非心非行業成男成女解隨緣而今僧俗并群有一一昭然總不偏洞山掩耳重開眼界寬金部到洞山留偈云眼處聞時方得知誤作耳字故云爾廓然無法不同觀山林瓦石縱橫説若到常情取信難按部不妨間訪道新豐一宿話皮膚水聲山色紅塵外軒蓋重來得也無寄雲居長老五頌絶頂雲居北斗齊雲門知見便高提莫將透脫常情解須是當機離水泥絶頂雲居北斗齊藏身北斗最難提叢林總作平常解無限高僧沒在泥絶頂雲居北斗齊出羣消息要人提其中未善宗乘者奇特商量滿眼泥絶頂雲居北斗齊參差光裏閙中提擎頭戴角誇能解一一重教上細泥絶頂雲居北斗齊橫三竪四目前提空中鶻眼殊無礙還笑獰蛇不離泥雪朝上堂舉龐居士辭藥山因緣復頌其意示諸禪者龐翁境界滴水滴凍藥山闍黎兩目定動機不發時一場困夢本自天真阿誰解用師室中問僧云了也未僧云未了師云你喫粥了也未僧云了師云又道未了復云門外什麼聲僧云雨聲師云又道未了復云面前是什麼僧云屏風師云又道未了復云還會麼僧云不會乃云聽取一頌隨緣事事了日用何欠少一切但尋常自然不顛倒見僧來以火筯敲火爐僧云不會師乃頌曰火筯敲火爐日用更無餘開單并展鉢何處有親疏僧又問達磨西來單傳心印又如何復乃成頌火筯敲火爐直指更無餘開單并展鉢一一晃心珠師室中問僧如何是無文字一句僧無語僧却問如何是無文字一句師云廬陵米作麼價又云面前是屏風一一超然一一玄莫將情計自留連從來大道無文字不要安排喚作禪僧云洞山禪難參師乃有頌洞山禪也不為難與君時復且間間楖𣗖迸開天地眼一重山後一重山示衆二頌了無一法祇在臨時把來便用莫更遲疑於法應自由更莫向餘求殺活劒在手到處得風流法界三觀六頌色空無礙如意自在萬象森羅影現中外出沒去來此土他界心印廓然融通廣大理事無礙如意自在倒把須彌卓向纖芥清淨法身圓滿土塊一點鏡燈十方海會事事無礙如意自在不動道場十方世界東涌西沒千差萬怪火裏蝍蟟吞却螃蟹事事無礙如意自在手把豬頭口誦淨戒趂出淫坊未還酒債十字街頭解開布袋事事無礙如意自在拈起一毛重重法界一念遍入無邊剎海只在目前或顯或晦事事不知空色誰會理事既休鐵船下海石火電光咄哉不快橫按鏌鎁魔軍膽碎讀金剛經是法平等無有高下佛意非傅大士頌指南則異説者多矣故水陸同真際飛行體一如則佛佛道同信斯也因成一頌用示諸禪者平等群生類迷為七趣因悠悠終莫覺擾擾但隨塵賴我從凡質何緣獲法身神通雖未具作佛亦天真短歌寄端上人鷲峰深黃檗苦一來知味便回去去去不回顧大地何曾有寸土廓然胸臆寰宇寬東涌西沒胡為難早言云往逍遙山又聞已在袁城間因思孤坐雪寒夜松風瑟瑟添蕭灑端師端師聽我言玉鑰在手須牢把寄人一二三四五清平打鼓道吾舞腳踏金船海月高無根樹下蹲龍虎優鉢羅花火裏開軒轅寶鑑埋糞土為報潁川善女人信受摩耶千佛母送和禪者南雄作丐見不見逢不逢千里萬里圓光中左顧右華藏海輕提重按開盲聾此箇妙窮不窮是處園林落花紅乾坤造化有時節莫比仁者無間風忽釋迦慢彌勒彼既丈夫我亦爾都來祇在一毛頭也解分身千百億臨機一一不思量好笑時人識不識送清禪者石城丐清乃善畫菩提數珠一百八楖𣗖拄杖六七尺象王蹴踏潤無邊達磨唯留履一隻至今天下重黃金笑殺寒山與拾得觀音慈布袋憨維摩問疾文殊堪千奇萬怪狀無盡皎然此理誰相諳石城人物多賢善仁者一到皆和南有人問著新豐老切忌承言落二三送生禪者袁州丐箭穿紅日影山鬼把住麒麟兒竇八破布衫海神捧出珊瑚枝臨濟三關透不透雲門一字知不知間思昔日同參者笑倒新豐老古錐小釋迦大禪佛集雲峰下有窠屈相逢須辨是與非莫順人情剛負屈鱉鼻蛇遼天鶻遍問知音是底物奇哉高步下層巒好向前途恣輕忽送從禪者廬陵丐乃閩人石霜受業鼓山頭上雲成蓋石霜霜水清如鏡新豐洞裏伸腳眠眼開起來天地迥拍手呵呵笑不休堂上老胡俗姓鄭廬陵米價高復低兔角拄杖須親携欲度門門一切境當知密室爛如泥送長上人袁州丐集雲峰下四藤條誰復得逍遙祝融峰頂萬年松天下名標新豐五位拄杖頭挑橫三豎四東西南北偏中來正中去遇賤即貴逢低且高撞著三家村裏老婆掣斷裙腰十字街頭醉翁子扶起來與伊繫絛或是或非胡抄亂抄休話祖師密意莫問世俗塵勞道人活計舉措堪褒咄將此深心奉塵剎諸子不同袍海裏須彌日月高送雅禪者石城丐雞不鵮無功之食水長船高物歸乎有道之心泥多佛大德山呵佛罵祖曾遭巖頭僧堂前領過臺山路上老婆有箇趙州不出門勘破獨有雲門古錐有口不妨道火火本無火承言者紛紛自我不然也非言道不通非事理不果理事通達人利生無不可既然也有却解臨時建立又不善逐旋包褁但可以直用好心殊不知返遭惡禍末法衆生知恩者能有幾箇雅禪者為爾老婆葛藤會麼寄南康魏處士寄茶南康有箇魏處士生來心淨開蓮華蓮華妙心空無物能為佛事如塵沙衆生佛種不自發莫不覩相生道芽觀音勢至自可仰文殊普賢人共誇豈惟慈善佛菩薩不獨忿怒惡那吒有時人頭及鬼面有時虎豹諸龍蛇一一臨時能變化一一所應曾無差當知皆承此箇力不知處士自知耶此也從來最靈物當頭一著輸丹霞誰言僧俗有南北我道聖凡同一家音通不問識不識逢人便寄趙州茶助我日用作佛事啜者唯嫌苦澀加苦也澀也益何盡泥也水也興無涯人間萬事即佛事正者自正邪者邪因思昔日洞山老問佛解道三斤麻寄吉州清平跨牛庵庵內不知庵外事跨牛誰識樂生緣或舒驢腳步荒草又把佛手開人前頭頭應現頭頭別元與跨者曾不偏肥苗嫩稼觸途秀飽亦不餐牛可憐青煙萬戶太和邑白雪一曲清平禪客來欲辨牛毛色唯見長老庵中眠世人有牛自可識毛角分明頭角全跨行一一乘他力莫問清平別有玄送淨禪者丐南康逢人便出有理但伸一錐一劄要見通人三頭兩面任起情塵道不屬諍法何有因心既無住道乃通津南康教化平等為人富亦不富貧元不貧男之與女佛也天真賢之與愚性也法身孰為彼我誰為疏親一一明妙一一精神臨事活潑應機妙陳不自覺悟逐樂因循從頭指出無使漂淪海淨禪者莫憚苦辛送言隆二禪者之南華禮六祖真曾聞菩提本無樹又云一花開五葉是非有眼分不分可使吾道生暐曄曹溪分派共入海寶林人間翠相接其中塔廟居真身同往瞻禮不可輟又聞彼既丈夫我亦爾不應自當生退怯又不見古人己靈尚不重況求諸祖解脫乎大丈夫大丈夫靈光烜赫阿誰無當機大用脫知解舉措何曾涉道途本非文字不屬教亦非禪道莫昧渠明明一一離諸相剛把迷頭麵糊二禪者是不是若是不妨南去見老盧送十一禪者往諸方緣化身是光明寶幢心是神通法藏多虗不如少實千語終歸一當欲知教外別傳便是西來榜樣神通利物昭昭光明到處晃晃不屬諸方語言豈關森羅萬象大機大用天真或是或非過量一得永絶攀緣無法更堪比況唯此一事真實其餘總是虗妄可使法界有情同悟此心無上十一禪者化行雄雄法王大將後又添一人之萬載緣化元是十一人添子成十二有利及無利終不離行市木塔老婆禪河陽新婦子普化解風顛我今故直指上高李居士求頌李翁李翁慧性自通知身幻妄處世皆空尊卑貴賤暫且相逢共若朝露總如春紅倐忽變滅誰是我儂唯心即佛靈妙難窮長生不死人性皆同明明日用不自信崇悟無彼此迷有西東李翁李翁夙植善功一家蒙庇吉慶常隆兒孫樂善齋心融融正信清淨諸佛法中或讚或毀如盲如聾一切魔惱自然銷鎔道心堅固有始有終送照禪者䶥䶥齖齖人謂我惡是是非非我謂人莫不莫不作不惡不樂法喜禪悅去黏解縛黃龍家風佛手驢腳後代兒孫須自開拓大啓三關末後一著雖涉語言不在糟粕皎潔靈源此彼何若神通光明圓滿大覺切忌思量應病與藥方禪人求師親書偈送字要親手書偈不憑人作彼此有如意應病即與藥鬧裏何妨佛手開擬議之前出驢腳任是碧眼胡兒也須路頭迷却不是特地要辨清濁活明落落本自天然何須自縛還鄉曲調和者稀干木逢場但戲樂送諸郡丐者諸郡丐者道無此彼直截根源更何擬議性本一源用無有二但盡凡情別無勝義觸目遇緣無非佛事有利無利不離行市干木隨身逢場作戲或逆或順或非或是一主一賓一坐一起照用臨時縱奪有以臨濟兒孫衲僧巴鼻教化衆生成就根器家家觀音門門勢至兒女大小神通活計通人不疑法王已矣送德禪者丐平江平江一派東流穿過千門萬戶佛法大意分明自是時人不顧直到大海方休浩浩無今無古滔滔自有靈源亦似參禪大悟若也心地洞然正法眼藏發露何妨運出家珍所在觀機救度明年是日歸來不爾却依位住南臺和福嚴長老結夏今夏南嶽南臺晚飯不通水泄杉松空引寒風田地莓苔不潔又道禁足九旬人人口中一舌去夏臘人消盡今後渾鑄成鐵殊不知有佛有法豈更解移凹就凸祇待置箇葛衫準備來年夏熱送葉道人一葉落天下秋夕陽西去水東流黃河澄清聖人出三千年事何悠悠稀復稀少復少使我虗生幾回老如今共喜居太平何妨學佛間訪道歸去來歸去來老盧得不在黃梅普光心印神通藏日用分明眼自開送琪道者作丐衲僧門下縱奪臨時靈蛇在手猛虎當騎有鬚便捋無尾莫追放去防渴把住知飢賓主易見隱顯難思禪家大道法眼慈悲送間上人之黃龍覲老師間間一片祥雲別海山卷舒出沒自有信豈同薄霧縈漁灣間間間情意態西南還黃龍久約待為雨我今目送胡高攀和黃檗老和尚送李居士踏斷稱槌兩截分明為君直説黃檗苦口多嫌三冬何處無雪難難翻憶龐公與兒女不婚不娉共頭活送吉州曾居士昆季來從山下來去從山下去行也曉便行住也晚便住在路同弟兄到家會兒女莫嫌言語太尋常最是為君省要處省要處三四五須彌𨁝跳迦葉舞寄福嚴謹上人時在南臺白雲籠高峰明月照淺水誰云與日同方曰為知己北嶺壤邊人南臺石上子救得老盧頭失却少林齒送一禪者袁州丐佛子之心絲毫不挂無底籃子驪珠滿瀉袁州城裏任人著價異日歸來倒騎鐵馬送儼禪者吉州丐佛子之心大喜大捨喚龜作鱉指鹿為馬偃溪水聲廬陵米價一一法門死蛇活把送慶禪者崇陽丐佛子之心無非利樂衆生界中應病與藥或呈佛手或出驢腳我宗赫然莫錯莫錯送泰禪者丐米佛子之心能施惠澤山前穀熟人間米白十升一斗大翁二伯但盡凡情錢不露陌送際修造佛子之心逢場作戲遇緣即興常可如意佛殿三門觀音勢至彈指乃成九峰山寺過義井莊猛才上人求頌古佛家風在尋常已自知不勞心力處忽迸電光時既作韶陽客當為師子兒目前凡與聖一一莫存伊又滿莊主求頌智者能孤立開花自有春不為萬法侶肯作半途人快臆乾坤大威光日月新尋常拋擲裏誰識是天真寄饒守鄒幾聖此身穢惡聚無他又不得智者知是幻飲食聊滋益中有淨法身精明妙誰識君與我無差一得即永得寄葉推官二首此心難是便忘機況屬衣冠富貴時終日素餐甘自得浮生虗幻許誰知能將悟意唯書偈不把吟情更作詩一種家居超俗類西天摩詰亦如斯近想道彌著前來所得深虗通真法性皎潔淨名心王事何妨及塵勞已不侵妙靈居日用誰古復誰今和宜春張簿見寄萬類紛然居有為一一天真本無住豈是明公獨妙明我亦從中獲靈悟情與無情及聖凡解脫門開同一路王也臣也自可知此是如來親付囑卿上人禮師乞頌有僧近從廬山來輒然問我求禪偈我既臨時解變通人頭鬼面超言義而況佛法無定機宗門自有通人至子應久歷叢林師潦倒所説是也不是張道人寂庵離念性虗明居此常寂照萬象圓光中清淨同一妙開池養白蓮門當市井道我無人事心人事不相到寄塘浦張道人世俗塵勞今已徹如淨琉璃含寶月鍊磨不易到如今寶月身心莫教別死生倐忽便到來幻化身心若春雪唯有道人明月心日用廓然長皎潔靖安令程節推一日遊山以諸堂寮舊名猥冗各隨事易之揭為熏修精進廓然證宗性空實際不二了義法忍妙用和集雲鶴老拙乃一一頌之又作通人偈共十三首寄呈熏修圓滿菩提道熏修乃得成理雖頓悟勝事要漸除輕鏡藉重磨瑩金須再煉精勸令先自利然後利群生精進六種波羅岸先乘般若舟自然無所住何更有蹤由勇猛能成佛疏慵不到頭蒙君共著力禪者總精修廓然每來常默坐却洞廓然襟廣大乾坤量包含日月心龐公雖去世程老復知音別聽為霖雨當期外護深證宗達佛心宗也寸無差互時相應存解行瞻敬見師資琢玉當成器磨磚莫問伊西來諸祖令一一總如斯性空佛及衆生性圓明體本同見聞皆共有取捨總非空在事能潛隱當機解變通談禪并治俗一一見全功實際妙湛總持際光明覺性身在家疑是客別國却為親漸誘終難信高提復倍嗔如今法末世教我若為人不二平等觀諸子家門不二開客程無是處浪迹總歸來法寶名如意禪朋號善財共遊華藏界寰宇一塵該了義迷頭曾認影了悟總成非唯有道心在更無禪病依靜中聞水過間裏見蜂飛一一天真事何人共所歸法忍對境心常寂靈源本不生事隨高下應機逐淺深評剖判彰神用觀瞻洞覺明無非法忍力更莫外求聲妙用神通并妙用迎送及攀陪更不假人教自然隨事來幻身同草木淨性出塵埃多謝程居士迷頭總喚回和集法門元不二所到便為家圓頂栴檀樹方袍萏菡花六和儀有伴四攝道無涯豈獨攜禪者俱登大寶車雲鶴旦過晚應宿山堂任去留孤雲能自在隻鶴更優遊楖𣗖開青眼袈裟伴白頭未明西祖意萍迹謾悠悠寄通人通人何揀擇一一道無偏擬欲分優劣還應落蓋纏心心同作佛法法共談禪但盡常情也東流水滿川禪定軒十偈攝心名淨戒禪定號波羅到岸仍留筏行慈復度他悟懷生極樂見性識彌陀即此明軒下菩提薩摩訶其二雖然迷悟別平等一禪心莫向雲門覓休從臨濟尋瑕銷成白玉礦盡得黃金無比不思議靈源最甚深其三本來同作佛妄想共留連此日不為道何時能去纏便宜歸寶所休更認空拳一一天真性花開火裏蓮其四西來元不二天下所傳差佛法無多子門庭有幾家主賓分兔馬棒喝辨龍蛇學者宜詳審如今正可嗟其五諸祖傳心印何曾別有禪宗乘迷有異佛法悟無偏寶覺人人大靈機事事圓莫求奇特説荒却自家田其六小乘不見性心外別有禪妄現涅槃樂迷遭煩惱纏豈知潭底月元在屋頭天更把古人語將為奇特傳其七神通遊戲力一一本無生菩薩能親證如來更妙明聲聞聞未信緣覺覺猶驚唯有大乘器靈源發便清其八佛性天真事誰言別有師男兒彈指處女子出禪時不費纖毫力何曾動所思衆生總平等日用自多疑其九學道先須明有悟法王法印印無偏拈來事事皆過量把出心心總離緣由是衆生顛倒解不觀諸祖上來傳蓮花世界同遊戲主伴交參影像前其十龍象朝昏禪悅處幽深難勝此軒窗心為遊戲神通藏身是光明智照幢徇物高低雖有二歸源本末且無雙但能知見同真正外道天魔稽首降大義寮大義無文字誰云達磨傳此心元淨妙是法本明圓有據人人佛無生念念禪開單兼展鉢一一火中蓮其二大義即為寮包容起一朝聖凡同寂滅主伴共逍遙少語工夫大多聞慧解饒禪餘遊覺苑朋友好相邀照軒本性本明妙如何却妄緣常光常寂照淨智淨空圓舉衆皆平等臨機總見前唯除不信者教外豈虗傳其二西來教外傳開悟却憑言心是神通藏身為智照軒法空平等座善巧總持門大義靈無盡禪家各有源法會寮蘭軒晚應清涼候花苞吐國香謝庭家世短孔子教風長有德更誰並無人亦自芳蘭軒禪者衆佛性戒氷霜其二無人亦自秀況植梵王家僧衆共白業禪庭開素花對談為法會長養壅溪沙正似修行者常將戒定加春秋皆有蘭復作偈以原之鶴白兼烏黑心為造化元二儀雖有象一氣本無言萬物遂其性四時歸所存秋花與春豔香每滿蘭軒寄荊南高司戶五偈若把心無却教誰辨主賓不知妄想性便是聰明人祇要自覺了頓忘能所親但觀佛與祖一一洞天真其二知見無生力禪門已了心不從達磨得豈向釋迦尋莫被無言溺須妨有語沈現成常現在唯悟始知深其三小乘修小法妄現寂寥禪務靜欣無念嫌喧怖有緣不知佛世界即是己心田起坐明如日衆生共皎然其四學道多沙數阿誰能自尋二人禪悅性千里月明心瑩徹同僧俗靈通共古今莫將間藝解可惜枉埋沉其五男兒丈夫志開鑿自家田莫逐雲門語休依臨濟禪人人元具足法法本周圓但作主中主門門日月天和開福長老送強禪者七偈逆行順行皆青春或是或非不動神往往總隨聲色轉回頭又昧本來人一氣才和萬物春不勞功力豈勞神非言非句非文字快活當機有主人多執平常夢裏春依他妄計自傷神更傳臨濟雲門語奇特商量愁殺人雲門臨濟百花春一一靈機總有神到底不關言語事錯傳錯解誤他人直截根源教外春阿誰不聖不通神雖然向道離蚖舍又作無心常醉人言句清新便謂春平常為實用安神希望成道不求悟更把糟粳教授人悟來無物不為春荊棘林中解養神常與不常虗對實臨機提出總由人寄浮山巖中渙達二上人若是金毛那守窟奮迅東西警群物有時踞地吼一聲突然驚起遼天鶻所食不食雕之殘戲來還是弄活物翻嗟疥狗一何癡到處荒園咬枯骨送宣上人落落空門子心空法亦空肩橫楖𣗖杖南北與西東寄玿首座時在大愚高安灘上古禪關吾祖曾開徹困顏經幾百年真迹在長應留待子孫還和答筠守錢郎中圓相頌送住洞山未有難名既形可措圓滿現前羣迷得路送榮上人往黃檗禮積翠庵老和尚了然逆順皆方便往往宗師昧者多君欲決明心地印鷲峰問取老禪和到日應須次第攀入方境界妙堪觀重重無盡重重異一一憑君仔細看和真首座施茶從苗辨地知音少獨有吾師鑒最靈烹出異常還普施幾人於味得全醒留真首座名山靈迹遍優遊賞勝心應近已休好住新豐古洞裏共揚佛事老春秋因事祖師心印鐵牛機直要當鋒決是非掣電未收轟霹𮦷相逢誰是丈夫兒南臺石頭真堂南臺石上子今古何人道可齊昔日住庵真斧在夜來明月落前溪寄信上人時在般若臺要行便行住便住去住尋常與誰語而今又在般若臺無錢取妻衣自補和香嚴和尚石磬亂山深處雲藏久不是知音辨也難一日禪堂高挂著時時響應萬機寒玎璫報曉會茶晨直下無私喚起人各各殷勤烹啜了可憐幽韻又虗陳送道嚴沙彌南康丐步步登高鳥道玄心心開發火中蓮沙彌品格沙門行始解南康化有緣送則上人困魚止濼鳥栖蘆空奮雙拳大丈夫一一盡從𮌎臆裏蓋天蓋地灑醍醐送全禪者廣南作丐達磨遺下一隻履老盧把住諸祖衣家家門前赫日月太平不用將軍威送文禪人之吉州丐自心隨色摩尼寶莫問廬陵米價高更欲遍遊華藏界都歸仁者一眉毛滁州全椒塔院鑒上人邀宿草庵未能直到覺元妙且向途中息草庵勿謂無心便休去前三三有後三三庵內不知塵世事此心能有幾人全黑龍山寺椒城外路入青林隱翠煙和酬運判李大夫同鄉同姓通玄土應念羣迷復現身時向庵中開舊論還隨法界在微塵按行雖是江西漕藜杖分明長者身須信此心能自在外官作論總非塵李公自言是長者之後又贈李運判公道生平為布施況聞高潔到如今利民利國何人識元是仁慈古佛心竹炬點來明有盡智燈然去照無窮故知般若靈光妙行處輝華到處通和泐潭乾長老見寄泐潭乾老真淨翁白頭彼此雪霜蒙道人不必重相見千里長同月下風長愛末山塵世外老來無用更深藏人間是事只如此巖穴誰同一炷香答新昌簿求圓通頌何妨識取主人公妙性雖空用不空王事更繁皆自了未聞裴楷獨清通送昭禪者馬駒踏處水雲深問道無非特訪尋別我又投三祖去取魚不在一清潯和楊川秀才見別詩句清新已出塵西來祖道更能親雖然頭戴烏紗帽心是蓮花社裏人龍湫參天四面碧崔嵬中有龍湫偃石堆往往山前為雨雹正應從此起風雷別江西漕王正言滌盡塵勞破盡疑廓然還得本心時荒田不揀拈來草生殺臨風自在施和人歲旦剃髮因驚雪滿刀年華須信不相饒逃生脫死勤為佛莫謂明朝與後朝送華禪者此心本是法中王南北東西豈有方若遇風雲轟霹𮦷任教群鴈不成行寄程承事老也須知不老身同行同坐有精神雖然無相無容貌能為羣生作主人筠洪中路有驛名大通其傍精舍曰竹下因投宿題之有寺路傍名竹下去洪一驛大通前偶來投宿滿窗月伴我寥寥永夜禪送曉化主滕王閣上江山勝洪井城中萬事間祖意西來本清淨不須更要離人間仙遊觀愚溪閣濟用古今流不盡閣中誰是不言人此心若似愚溪水天下悠悠總任真觀彭學士會黃檗老宿覺林院頌遂乃詠之性覺瑩無垢廓然圓滿心發生功若地長養行如林居士從元大禪師復本深相逢一家內僧俗出殊欽雪朝升座僧問雪上蹤由事若何師云片片色無別高僧因雪問長老令當行片片色無別紛紛性共明一陽曾告報萬物待生成不獨資禪悅臨機要盡情弔黃龍和尚塔示滅師何速空遺塔此中僧間四海錫誰復九年風鳥外千峰繞人間一徑通寥寥朝與暮唯有白雲同新荷示徒濁泥終不染況在梵宮生潔性一池碧幽香滿座清團團初映水短短漸分莖更待蓮花出禪心妙可明投老庵示衆九峰山色裏拙者草庵深投老遂踈懶問禪徒訪尋欲知諸祖道不越衆人心彼此同成佛聊為直指吟題清居柏樹昔人曾指出今古道傳馨祖意憑君悟禪心使我惺故知非俗物還長在僧庭凡木幾回老高標依舊青呈筠守徐朝議辭九峰命二首捨家從學道無用樂天真豈謂至愚者仍慚老病身不堪為度世止合作間人乞放歸山去翛然老百春六十四年期歸間已是遲一身終有限萬事畢無時學道當求靜為僧亦合宜蜀江賢太守外護却應知張文結再任洪州洪都王者府復鎮見君臣不責辭南越唯佳奉老親江山千里舊賓主一時新曾對談禪客慚非下榻人大寧山堂禪家能自靜住處是深山門外事雖擾座中人亦間漁歌聞別浦鴈陳下前灣即此非他物何妨洪府間散珠亭一一分龍口當軒號散珠若教收拾得却恐久長無合浦圓相似隋庭夜不殊豈惟能善利萬物有工夫擬王元澤題鳳凰臺鳳去臺長在園林別嶼連因傷故國事願學老盧禪淨練澄江地餘霞散綺天六朝人不見極目舊山川寄西庵法眼安師不聞庵外事此意有誰知林壑路窮處世途心盡時鐘聲來舊寺月色下新池却笑承風者區區老若為寂軒本來心自寂不必更論禪我欲辭多事誰來共少緣萬杉青靄裏五老碧峰邊第一幽藏處廬山小洞天留題天水居士靜宴閣收心安養處靜不在山中冬暖一爐火夏涼三面風遣時緣既薄樂道意何窮莫問人間事勞生總是空洞山訥庵寂寂坐無語何人知此心別傳來自昔密付到如今胡氏田園上雷家洞府深高僧庵舍在誰為訥相尋留題東軒佛子異行藏開軒亦有方故因迎夜月仍得待朝陽群木煙初暖幽蘭花正芳坐來禪性淡蜂蝶自輕狂寄香城順禪師靈觀拋頭後名山護有神道場千古舊法席幾翻新廢去何由物興來故在人況師先達者不與衆同塵寄程承事七十六七八時來又共新青煙池上柳白髮鏡中人但逐年華轉焉知佛性真寄言程老子有酒且歌春答靖安黃尉問疾二首書來蒙慰問外護力何偏槌鼓會雲侶焚香開雪箋滿池蓮出水逈漢月生天又似新裁錦文章少比肩老病連綿發寧忘苦惱縈百骸雖朽敗一物却精明古屋縱傾倒間心亦坦平但知行大道懶更問前程宿彬上人房人事少相干亦由居處遍不隨流過日常得自安禪野色郊源接雞聲市井連此身仍老矣風暖杏花天退洞山上毛大夫名山不到處間欲遍追尋擬把新豐月將還悟本心禪門無著性仙府有知音筠陽乃李八伯昔隱之地也聞説寒巖在天台第一深遊東鼓寺東鼓與西鼓開先瀑布前廬山圍不匝勢更近南邊遊景福訪省長老人生倐忽間春色又東還方丈新宗匠禪門舊竹間嶺雲飛片片溪水瀉潺潺總是天真物高僧心共間寄績溪蘇子由達人居處樂誰謂績溪荒但得雲山在從教塵世忙文章三父子德行二賢良却恐新天子無容老石房蘇子由闢東軒有顏子陋巷之説因而寄之才淹居亦弊道在不為貧未灑傅巖雨且蒙顏巷塵曠懷隨處樂大器任天真半夜東軒月勞生屬幾人訪寶雲長老相見呵呵笑園林落葉多青松色尚在仁者道如何世態期朝暮風光逐綺羅居山禪寂子無猒我頻過經宣梵院延亭積善一方人延祥日益新共當千百載長若二三春座客心心靜環簷物物真院頒宣梵號天子福黎民寄無為居士世俗事無盡養高心自間蔬園通緑野林塢帶青山丹竈慵添火雲庵懶著關別應修有術七十見朱顏快亭門徑松杉老悠悠日月間法王真境界禪者舊家山祖意傳來久人情自別攀如何快我臆滿座水聲還清涼軒夏間逃暑處軒戶對巖阿溪水漱無盡竹風來更多百骸煩既謝諸祖意如何坐久聞魚戲時時動淥波師在雙嶺清旦維那問訊乃曰寂寞師曰寂寞僧家事遂成其偈逈然生計別趣向少知音寂寞僧家事喧譁世俗心長遭兒女纍莫厭水雲深但樂西來意塵勞久自沉途中逢建州三秀才桃紅兼柳緑天地雨初澄琴劍三才子瓶盂一老僧文章投北闕道業繼南能邂逅征途上生平識未曾送周道士歸去靈溪觀匡廬碧嶂深澗松多偃蓋嵓溜盡鳴琴不死徒餐藥長生可練心他年如有道飛錫一相尋送張僉判遊開先步入青松裏迢迢一徑通漸分華藏界深隱法王宮道與神仙別人非世俗同欲知西祖意庭柏老春風謝新昌權宰見訪秋試舉人回峨峨將相材過橋分路處勒馬入山來邑佐間空望林僧靜可陪何當布霖雨天下活枯荄送然上人化導曾聽新豐曲簷頭雨滴聲還吹無孔笛用度有緣生欲破他迷暗當開己悟明春風活萬物天道美何評清公默庵久息遊方念庵居道可親依依雖有主寂寂似無人池裏蓮從老門前事自新此心誰會得庭柏對長春留題玿公寂照軒幽軒名寂照四海坐中間景物有遷色主人無異顏野泉澄檻外香靄起簷間涼夜誰相問寥寥月滿山送人之南嶽境幽南嶽寺一一碧巖分遠近松相接高低鐘共聞靈禽時奏樂香石日籠雲想到經行處昭然趣不羣雷秀才顯閣靜搆南池上群芳益我曹蘭仍霑雨露松下隱蓬蒿環坐山川秀開懷意氣豪為儒斯有業何慮桂枝高上藍清涼軒觀機唯説法一聽一清涼欲盡衆生病當開甘露場幽深方丈後掩映府門傍有問西來意城頭角韻長遊桃源贈劉君實宛若神仙府疑無世俗風人家山色裏門徑水聲中柳綿共垂緑桃花相映紅煙光正和暖遊樂意何窮與道士話長生悠悠人共老誰復解追尋豈信長生道分明不滅心魂飛瑤闕遠夢役海山深語此迷方者無勞競寸陰書道士壁仙學迷多説當依柱史評無心歸大道有得失長生物我同真宰親踈豈可名良哉衆妙本一一在忘情留贈香城淳長老簾卷西山色禪心共月華香城深處寺靈觀上人家絶頂壇猶在盈頭乳已賒而今淳道者經誦白蓮華題矮雞冠潔白異衆卉階前莎草齊曉來和露看只欠一聲啼再遊永固院悠悠塵世外居者少關心是事有遷謝斯門無古今乾坤同永久山水共幽深我愧重來此諸方懶去尋淨頭端上人求洗滌之説因而成偈段食共滋養皆名有漏身焉知大小事不昧往來人歷歷隨聞見惺惺應屈伸變通元自在鑒照本天真由逐江湖客恥為堯舜臣所依投旅舍妄計困風塵病故嫌王膳飢仍預國民既能分皂白須解別踈親朽宅蚖蛇會浮泡屎尿陳何妨觀穢惡却要滅貪嗔除垢超凡果談空入聖因迦文教雖舊釋子道應新革屣排朱戶禪衣挂緑筠攝心彰戒定彈指覺坑神吐唾防塗壁拋籌怕動鄰為僧當異俗學佛便行仁伏忍冤憎盡興悲鳥獸馴汲湯宜讓伴盥手忌淋垠受用生慚愧供承識苦辛階甎同鏡面瓦宇若魚鱗狼籍欣歡少光明讚歎頻桶盆還次第灰土最精淳塞鼻奢紅棗迎賓熾絳脣去驕終遠害習慢必遭迍匾器易盈滿曠懷忘賤貧沙門修慧命菩薩振慈綸總具如蓮性誰偏可意珍莫迷臭皮袋苦海枉沉淪石筧二十韻帶月眠霜磨復琢南康匠者好規模引回鹿野靈源水瀉入梵宮香積廚宜作奇祥當聖代永為盛事在元符年號依依數里松蘿下往往諸方佛剎無左摺右盤何繚繞高來低去更縈紆屈伸宛若蒼虬活裁剪分明碧玉俱解逐方圓稱上善能隨甜苦任殊途既成蔬飯鳴犍椎還奉林僧洗鉢盂及物泠冷離洞府宛湍瑟瑟近簾隅禪堂客喜滋茶味祖席人傳美畫圖澄湛池塘榮菡萏清涼肺腑飲醍醐調和口腹功非小蕩滌塵埃德不孤遐邇溪山同掩映朝昏鳥獸共歡呼屯雲坳裏龍擡首貯雪巖前虎踞軀夾道栽杉根漸著傍垠種竹葉微蘇橋橫深澗優遊也亭起危巒悅望乎佛手開時慚潦倒馬蹄踏處愧踈愚賢將世子勤其力則與清師忘所劬清則賢世四十人共成筧事千載石門憑沃潤萬家檀越賴霑濡輒將長句伽陀讚誰謂江河壯帝都題雙嶺曇顯法師影堂雨花臺下真身在便是梁朝顯法師南嶽早傳思大道北齊曾挫陸修詞沙門既悟神通妙道士休誇呪術奇舉一無人能舉二至今佛日聖明時秋夜宿景德院荷滿秋塘菊滿籬凄涼軒檻冷風吹西來祖意堪任處方丈禪心正寂時岸住何妨停棹子車行須是打牛兒通人聞説呵呵笑帶水拖泥老古錐和積翠庵老和尚送李二十歸袁州深入靈山罷問禪還家林徑步苔錢悟懷此去須知幸付偈誰來得有緣隱俗但忘憎愛見同塵寧畏是非遷時時好味庵中旨若遇如君始可傳和揚川秀才同是浮泡幻化身鬢邊白髮但驚春墜星灣裏曾分舊卷簟山中又話新君把詩篇多適性我將佛法獨怡神雖然禪悅吟情別得意逍遙總要津謝毛大夫見留山野欣逢太守賢故伸鄙臆下雲巔莫嫌苦死辭幽隱却為勞生屬晚年多病況慚非道德踈慵虗占好林泉片雲飄逸情無限不用羈留重愛憐次韻郡倅李朝散留題洞山凌空疊翠嵐光裏一簇樓臺釋子宮誰謂道場無事到自須蓮社有緣通曾迎彩旆長松下得奉氷顏纍日同從此承恩何以報悠悠心在白雲中悟本道場三百載至今香火盛玄關未遊長謂於人外及到分明在世間境屬化風林壑靜僧依勝迹錫瓶間訟庭無事民情樂洞寺何妨一再還寄蘇子由遍因訪祖參禪後拙直尋常見愛稀有道却從人事得無心應與世情違時光易變誰驚老真趣難窮自覺微尤荷多才深此意喧譁聲裏共忘機與會勝禪老同坐夏琅琊至秋作偈相別以敘一時之事涼秋時節諸禪子去去楊朱路任差到處有山容駐錫何方無寺不為家萬緣脫去輕浮世一性常來看落花我亦與師雖老大更尋幽隱過年華送祥長老住雲門曾學雲門自在禪而今歸去豈無緣南山下雨機雖妙北斗藏身語更玄衣到老盧長把住法從少室廣流傳諸方彼此休分別唯佛功深見處圓退居彭判官以詩見留次韻奉答勝剎當年偶重棲老來猶占自知非欲憑別選僧中德可使重拈石上衣法付王臣千古振道期高下一心歸何妨免我羈留事間為君通佛祖機和饒守周開祖見贈休話東西北與南群生佛性妙相參詩書未必無夫子道德何妨有老聃不二靈源誰共覺以三真教自殊探山間老也為遺物多謝通人顧草庵寫懷寄五峰長老此寄欲拋拋未得長思來伴老嵩丘道因無念殊途會人到有年諸事休間徑草深方禁足碧林蟬呌又驚秋世情追逐何時盡覽鏡那堪更白頭送西安丐者禪性天真蓮出水等慈及物別巖阿供投野老門門到飯謁林僧寺寺過獨木溪橋人戶少孤村草店路頭多風寒日晚宿歸處猶隔畬園五里坡別洪帥張左司歸泐潭自笑年來七十三瓶盂又汲石門潭偶迎府帥一時意拋却雲山幾處庵大道也知無固必通人應亦重相諳翻思恩德何由報潦倒扶持強指南寄洪帥張天覺雲賴德風輕舉力飄然又寄寶山中龍蛇每用春雷覺草木時將法雨蒙馬祖妙心傳不盡泐潭靈派瀉無窮回頭為報張居士豈獨今生外護功聞説當年蛇虎穴法王居後杳無蹤庭幽寂寂深深處山好千千萬萬重張氏腴田圍大嶺馬師靈塔蔟長松勝遊輸却君先到還屬南昌一化封楞嚴偈寄撫守許朝散十卷楞嚴萬行林法門開闢備機深八還四就且除礦三漸七徵猶鍊金見見見時當見性聞聞聞處要聞心使君為物延僧講付囑無忘佛正音留題佚老庵勞生唯有僧無事若悟真乘老更間三徑園林禪性在一庵風月道心還傍欄碧澗長來水隔岸青岑不買山却顧群情塵土裏名牽利役自忘艱送僧遊南嶽住亦無求去亦間飄然到處是家山偶棲龍嶠重嵓寺又憶融峰絶頂關禪性誰同秋月皎吟情自得古風還平生聚散三回也知向何時更會顏送黃州丐者東西南北齊安道舜日高高照不偏千里江山稱佛國萬家香火祝堯天麻城長者思聞道柏子真身尚坐禪機但大悲平等化無人無我智為先和仙上人秋夜對月香殘火冷漏將沉孤坐寥寥對碧岑萬井共當門有月幾人同在道無心風傳喬木時時雨泉瀉幽巖夜夜琴為報參玄諸子道西來消息好追尋大丞相請疏附録觀文殿大學士司空上柱國荊國公王安石伏以肇置仁祠水延睿算歸誠善導開迹勝緣文公長老獨受正傳歷排戲論求心之所祈嚮發趣之所歸宗俯惟慈哀晚徇勤企謹疏元豐八年三月日判府左丞請疏資政殿學士太中大夫魏郡開國侯王安禮伏以施緑野之林園蔚然華構立青蓮之場地寵以嘉名申祝壽祺推明美報必資達識為覺迷情文公長老夙悟真乘久臨清衆若心數法非外假於虗名由聞思修可內觀於實相舉揚密義和會勝緣謹疏元豐八年三月日寶峰雲庵真淨禪師語録序眉山蘇轍述水流於地發為草木鹹酸甘苦皆水也火傳於薪化為飲食飯餅羮胾皆火也心藏於人見於百骸視聽言動皆心也古之達人推而通之大而天地山河細而秋毫微塵此心無所不在無所不見是以小中見大大中見小一為千萬千萬為一皆心爾法然而非有所造也故其指心法以示人也有以光明相好化人有以飲食臥具衣服有以園林臺觀虗空有以寂默無説無示蓋事無非法者然有聞思修法門衆生由之以入如大衢路既徑且易自達磨西來諸祖相承皆因言以曉人心地既明出語皆法譬如古木生氣調達華葉無數顛倒向背穠纖長短無一不可譬如大海濕性融溢隨風舒卷波濤流轉充遍洲浦無一不到觀者眩耀莫測其故然至於循流返源識其終始可以拊手而笑有禪師文公幼治儒業弱冠出家求道得法於黃龍南公説法於高安諸山晚居洞山實繼悟本辨博無礙徒衆自遠而至元豐三年轍以罪來南一見如舊相識既而其徒以語録相示讀之縱橫放肆為之茫然自失蓋余雖不能詰然知其為證正法眼藏得遊戲三昧者也故題其篇首寶峰雲庵真淨禪師語録後序鄱陽任軒程袞述真淨文老以華嚴海藏無量珍奇放大光明照四天下高安閙處妙應化城赫日現時最初一句新豐古洞悟本家風路徑依然七凹八凸開山建業宰輔檀那再拊清音天然氣格斬蛇機峻祖令重行鶻眼龍睛亦遭摴駮石門壁立宴坐寶山雲隱西堂潭澄秋月緒餘珠霧流落人間衲子允平貫穿收拾揭為標鑒挂向叢林自性天真此味元無差別百千三昧諸方各任招提崇寧改元季春望日靖安日舒軒序
